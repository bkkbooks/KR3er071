body:
  text: 一醫方一治陰虛勞熱方資生湯治勞瘵羸弱已甚飲食減少喘促咳嗽身熱脈虛數者亦治女子血枯不月生山藥一兩玄參五錢於朮三錢生雞內金二錢搗碎牛蒡子三錢炒搗熱甚者加生地黃五六錢脾為後天之本能資生一身脾胃健壯多能消化飲食則全身自然健壯何曾見有多飲多食而病勞瘵者哉內經陰陽別論曰二陽之病發心脾有不得隱曲在女子為不月其傳為風消其傳為息賁者死不治夫病至於風消息賁勞瘵之病成矣而名為二陽之病者以其先不過陽明胃腑不能多納飲食也而原其飲食減少之故曰發於心脾原其發於心脾之故曰有不得隱曲者何居蓋心為神明之府有時心有隱曲思想不得自遂則心神拂鬱心血亦遂不能濡潤脾土以成過思傷脾之病脾傷不能助胃消食變化津液以溉五臟在男子已隱受其病而尚無顯徵在女子則顯然有不月之病此乃即女以徵男也至於傳為風消傳為息賁無論男女病證至此人人共見勞瘵已成挽回實難故曰不治然醫者以活人為心病證之危險雖至極點猶當於無可挽回之中盡心設法以挽回之而其挽回之法仍當遵二陽之病發心脾之旨戒病者淡泊寡欲以養其心而復善於補助其脾胃使飲食漸漸加多其身體自漸漸復原如此湯用於術以健脾之陽脾土健壯自能助胃山藥以滋胃之陰胃汁充足自能納食胃化食賴有酸汁特是脾為統血之臟內經謂血生脾蓋謂脾系血液結成故中多函血西人亦謂脾中多回血管為血匯萃之所此證因心思拂鬱心血不能調暢脾中血管遂多閉塞或如爛炙或成絲膜此脾病之由而脾與胃相助為理一氣貫通臟病不能助腑亦即胃不能納食之由也雞內金為雞之脾胃中有瓷石銅鐵皆能消化其善化有形鬱積可知且其性甚和平兼有以脾胃補脾胃之妙故能助健補脾胃之藥特立奇功迥非他藥所能及也方中以此三味為不可挪移之品玄參神農本草經謂其微寒善治女子産乳余疾且其味甘勝於苦不至寒涼傷脾胃可知故用之以去上焦之浮熱即以退周身之燒熱且其色黑多液神農本草經又謂能補腎氣故以治勞瘵之陰虛者尤宜也牛蒡子體滑氣香能潤肺又能利肺與山藥玄參並用大能止嗽定喘以成安肺之功故加之以為佐使也地黃生用其涼血退熱之功誠優於玄參西人謂其中函鐵質人之血中又實有鐵鏽地黃之善退熱者不但以其能涼血滋陰實有以鐵補鐵之妙使血液充足而蒸熱自退也又勞瘵之熱大抵因真陰虧損相火不能潛藏地黃善引相火下行安其故宅神農本草經列之上品洵良藥也然必燒熱過甚而始加之者以此方原以健補脾胃為主地黃雖系生用經水火煎熬其汁漿仍然黏泥恐於脾胃有不宜也至熱甚者其脾胃必不思飲食用地黃退其熱則飲食可進而轉有輔助脾胃之效生山藥即坊間所鬻之乾山藥而未經火炒者也此方若用炒熟山藥則分毫無效於朮色黃氣香乃浙江於潛所産之白朮也色黃則屬土氣香則醒脾其健補脾胃之功迥異於尋常白朮若非於潛産而但觀其色黃氣香用之亦有殊效此以色味為重不以地道為重也西人謂胃之所以能化食者全賴中有酸汁腹飢思食時酸汁自然從胃生出若憂思過度或惱怒過度則酸汁之生必少或分毫全無胃中積食即不能消化此論與內經二陽之病發心脾過思則傷脾之旨暗合或問曰內經謂脾主思西人又謂思想發於腦部子則謂思發於心者何也答曰內經所謂脾主思者非謂脾自能思也蓋脾屬土土主安靜人安靜而後能深思至西人謂思發於腦部內經早寓其理脈要精微論曰頭者精明之府夫頭之中心點在腦頭為精明之府即腦為精明之府矣既曰精明豈有不能思之理然亦非腦之自能思也試觀古文思字作恖囟者腦也心者心也是知思也者原心腦相輔而成又須助以脾土鎮靜之力也或問曰子解二陽之病發心脾一節與王氏內經之注不同豈王氏之注解謬歟答曰愚實不敢云然然由拙解以繹經文自覺經文別有意味且有實用也夫二陽之病發心脾與下三陽為病發寒熱一陽發病少氣善咳善泄句法不同即講法可以變通蓋二陽之病發心脾謂其病自心脾而來也三陽為病發寒熱是形容三陽之病狀也故將之病之字易作為字至一陽發病數句其句法又與三陽為病句不同而其理則同也或又問三陽一陽病皆形容其發病之狀二陽病獨推究其發病之原因者何居答曰三陽一陽若不先言其病發之狀人即不知何者為三陽一陽病至二陽胃腑原主飲食人人皆知至胃腑有病即不能飲食此又人人皆知然其所以不能飲食之故人多不能知也故發端不言其病狀而先發明其得病之由來也或又問胃與大腸皆為二陽經文既渾曰二陽何以知其所指者專在於胃答曰胃為足陽明大腸為手陽明人之足經長手經短足經原可以統手經論六經者原當以足經為主故凡內經但曰某經而不別其為手與足者皆指足經而言或言足經而手經亦統其中若但言手經則必別之曰手某經矣經文俱在可取而細閲也一九一三年客居大名治一室女勞瘵年餘月信不見羸弱不起詢方於愚為擬此湯連服數劑飲食增多身猶發熱加生地黃五錢五六劑後熱退漸能起床而腿疼不能行動又加丹參當歸各三錢服至十劑腿愈月信亦見又言有白帶甚劇向忘言及遂去丹參加生牡蠣六錢又將於術加倍連服十劑帶證亦愈遂將此方郵寄家中月餘門人高來函云趙病勞瘵數年不愈經醫不知凡幾服藥皆無效今春驟然咳嗽喘促異常飲食減少脈甚虛數投以資生湯十劑全愈審斯則知此方治勞瘵無論男女服之皆有捷效也女子月信若日久不見其血海必有堅結之血治此等證者但知用破血通血之藥往往病猶未去而人已先受其傷雞內金性甚和平而善消有形鬱積服之既久瘀血之堅結者自然融化矧此方與健脾滋陰之藥同用新血活潑滋長生新自能化瘀也附録直隸青縣張來函津埠宋氏婦年將四旬身體羸弱前二年即咳嗽吐痰因不以為事未嘗調治今春證浸加劇屢次服藥無效診其脈左部弦細右部微弱數近六至咳嗽吐痰白色氣腥臭喘促自汗午後發熱夜間尤甚胸膈滿悶飲食減少大便祕結知其已成癆瘵而兼肺病也從前所服藥十餘紙但以止嗽藥治其肺病而不知子虛補母之義所以無效為疏方用資生湯加減生山藥八錢玄參大生地淨萸肉各六錢生牡蠣生杭芍生赭石各四錢於朮生雞內金甘草各二錢煎服二劑汗止喘輕發熱咳嗽稍愈遂將前方去牡蠣加蔞仁地骨皮各三錢山藥改用一兩赭石改用六錢連服十劑諸病皆愈為善後計用生山藥細末八錢煮粥調白糖服之早晚各一次後月餘與介紹人晤面言此時宋氏婦飲食甚多身體較前健壯多矣又族嫂年三十五歲初患風寒咳嗽因懶於服藥不以為事後漸至病重始延醫診治所服之藥皆溫散燥烈之品不知風寒久而化熱故越治越劇幾至不起後生於臘底回里族兄邀為診視脈象虛而無力身瘦如柴咳嗽微喘飲食減少大便泄瀉或兼白帶午後身熱顴紅確係癆瘵已成授以資生湯加炒薏仁茯苓片生龍骨生牡蠣各三錢茵陳炙甘草各錢半服二劑身熱顴紅皆退咳嗽泄瀉亦見愈後仍按此方加減又服六劑諸病皆痊囑其每日用生懷山藥細末煮粥調以白糖服之以善其後四川涇南周來函楊姓女年十九歲出嫁二載月事猶未見身體羸瘦飲食減少乾咳無痰五心煩熱診其脈細數有力仿用資生湯方用生山藥一兩於朮二錢牛蒡子三錢玄參五錢生地黃四錢生雞內金一錢連服五劑熱退咳減食欲增加遂於原方中去生地倍於朮又服三劑泛潮忽至共服二十劑全愈奉天法庫縣萬來函族弟婦産後虛羸少食遷延月餘漸至發灼自汗消瘦乏氣乾嘔頭暈等證此方書所謂蓐勞也經醫四人治不效並添顴紅作瀉適生自安東歸為之診視六脈虛數檢閲所服之方有遵醫宗金鑑三合飲者有守用養榮湯者要皆平淡無奇然病勢至此誠難入手幸脈雖虛數未至無神顴雖紅猶不摶聚若摶聚則陰陽離矣不摶聚是其陰陽猶未離似尚可治此蓋素即陰虛又經産後亡血氣亦隨之陰不中守陽不外固故汗出氣乏其陰陽不相維繫陰愈虧而陽愈浮故發燒咳嗽頭暈其顴紅者因其部位應腎腎中真陽上浮故發現於此而紅且熱也其消瘦作瀉者以二陽不納無以充肌肉更不特腎陰虛而脾陰胃液均虛中權失司下陷不固所必然者此是病之原委歟再四思維遂處方用生懷山藥二兩於朮三錢玄參四錢雞內金牛蒡子各二錢此係資生湯原方稍加重外加淨萸肉龍骨牡蠣各五錢止汗並以止瀉五劑後汗與瀉均止飲食稍進惟乾咳與發熱僅去十之二三又照原方加粉甘草天冬生地等味連服七劑再照方減萸肉加黨參二錢服四劑後飲食大進並能起坐矣惟經尚未行更按資生湯原方加當歸四錢服數劑後又復少有加減一月經脈亦通十全育真湯治虛勞脈弦數細微肌膚甲錯形體羸瘦飲食不壯筋力或自汗或咳逆或喘促或寒熱不時或多夢紛紜精氣不固野臺參四錢生黃耆四錢生山藥四錢知母四錢玄參四錢生龍骨四錢搗細生牡蠣四錢搗細丹參二錢三稜錢半莪朮錢半氣分虛甚者去三稜莪朮加生雞內金三錢喘者倍山藥加牛蒡子三錢汗多者以白朮易黃耆倍龍骨牡蠣加山萸肉生白芍各六錢若其汗過多服藥仍不止者可但用龍骨牡蠣萸肉各一兩煎服不過兩劑其汗即止汗止後再服原方若先冷後熱而汗出者其脈或更兼微弱不起多系胸中大氣下陷細閲拙擬升陷湯後跋語自知治法仲景治勞瘵有大黃蟅蟲丸有百勞丸皆多用破血之藥誠以人身經絡皆有血融貫其間內通臟腑外溉周身血一停滯氣化即不能健運勞瘵恆因之而成是故勞瘵者肌膚甲錯血不華色即日食珍饈服參苓而分毫不能長肌肉壯筋力或轉消瘦支離日甚一日誠以血瘀經絡阻塞其氣化也玉田王清任著醫林改錯一書立活血逐瘀諸湯按上中下部位分消瘀血統治百病謂瘀血去而諸病自愈其立言不無偏處然其大旨則確有主見是以用其方者亦多效驗今愚因治勞瘵故擬十全育真湯於補藥劑中加三稜莪朮以通活氣血竊師仲景之大黃蟅蟲丸百勞丸之意也且仲景於金匱列虛勞一門特以血痹虛勞四字標為提綱益知虛勞者必血痹而血痹之甚又未有不虛勞者並知治虛勞必先治血痹治血痹亦即所以治虛勞也或問治勞瘵兼用破血之藥誠為確當之論但破血用三稜莪朮將毋其力過猛乎答曰仲景之大黃蟅蟲丸與百勞丸所用破血之藥若大黃乾漆水蛭皆猛於三稜莪朮而方中不用三稜莪朮者誠以三稜莪朮神農本草經不載至梁陶弘景著名醫別録於神農本草經外增藥品三百六十五味皆南北朝以前名醫所用之藥亦未載三稜莪朮是當仲景時猶無三稜莪朮即有之亦未經試驗可知而愚於破血藥中獨喜用三稜莪朮者誠以其既善破血尤善調氣補藥劑中以為佐使將有瘀者瘀可徐消即無瘀者亦可借其流通之力以行補藥之滯而補藥之力愈大也況後天資生納穀為寶無論何病凡服藥後飲食漸增者易治飲食漸減者難治三稜莪朮與參朮耆諸藥並用大能開胃進食又愚所屢試屢效者也或問勞瘵之證陰虛發熱者居其強半故錢仲陽之減味地黃丸張景嶽之左歸飲皆為對證良方以其皆以熟地黃為君大能滋真陰退虛熱也子方中何以獨不用也答曰若論用熟地我固過來人也憶初讀方書時曾閲趙氏醫貫張氏八陳馮氏錦囊諸書遂確信其説臨證最喜用熟地曾以八味地黃丸作湯加蘇子白芍治吸不歸根之喘逆加陳皮白芍治下虛上盛之痰涎加蘇子厚朴治腎不攝氣以致沖氣上逆之脹滿時病人服之覺有推蕩之力後製參赭鎮氣湯治此證更效又嘗減茯苓澤瀉三分之二治女子消渴小便頻數金匱謂治男子消渴以治女子亦效案詳玉液湯下又嘗去附子加知母白芍治陰虛不能化陽致小便不利積成水腫又嘗用六味地黃丸作湯加川芎知母以治如破之頭疼加膽草青黛以治非常之眩暈加五味枸杞柏子仁以斂散大之瞳子且信其煎汁數碗浩蕩飲之之説用熟地四兩茯苓一兩以止下焦不固之滑瀉用熟地四兩白芍一兩以通陰虛不利之小便又嘗於一日之中用熟地斤許治外感大病之後忽然喘逆脈散亂欲脫之險證此證當用後來復湯彼時其方未擬出惟知用熟地亦幸成功是知馮楚瞻謂熟地能大補腎中元氣誠有所試也且不獨治內傷也又嘗用熟地阿膠大滋真陰之類治溫病脈陽浮而陰不應不能作汗一日連服二劑濟陰以應其陽使之自汗詳案在寒解湯下並一切傷寒外感因下元虛憊而邪深陷者莫不重用熟地補其下元即以托邪外出惟用以治陰虛勞熱之證輕者可效若脈數至七八至鮮有效者彼時猶不知改圖且以為地黃丸即金匱之腎氣丸自古推為良方此而不效則他方更無論矣不知腎氣丸原用乾地黃即藥坊間之生地也其桂用桂枝即神農本草經之牡桂也與今之地黃丸迥不侔矣其方金匱凡五見一治腳氣上入少腹不仁一治虛勞腰痛少腹拘急小便不利一治短氣有微飲當從小便去之一治男子消渴小便反多飲一斗小便一斗一治婦人轉胞胞系了戾不得溺統觀五條原治少腹膀胱之疾居多非正治勞瘵之藥況後世之修制又失其本然乎後治一婦人年近五旬身熱勞嗽脈數幾至八至先用六味地黃丸加減作湯服不效繼用左歸飲加減亦不效愚忽有會悟改用生黃耆六錢知母八錢為方數劑見輕又加丹參當歸各三錢連服十劑全愈以後凡遇陰虛有熱之證其稍有根柢可挽回者於方中重用黃耆知母莫不隨手奏效始知叔和脈法謂數至七八至為不治之脈者非確論也蓋人稟天地之氣以生人身之氣化即天地之氣化天地將雨之時必陽氣溫暖上升而後陰雲會合大雨隨之黃耆溫升補氣乃將雨時上升之陽氣也知母寒潤滋陰乃將雨時四合之陰雲也二藥並用大具陽升陰應雲行雨施之妙膏澤優渥煩熱自退此不治之治也況勞瘵者多損腎黃耆能大補肺氣以益腎水之源使氣旺自能生水而知母又大能滋肺中津液俾陰陽不至偏勝即肺臟調和而生水之功益普也黃耆知母雖可並用以退虛熱然遇陰虛熱甚者又必須加生地黃八錢或至一兩方能服之有效或又問腎氣丸雖非專治虛勞之藥而金匱虛勞門明載其治虛勞腰疼似虛者皆可服之子獨謂無甚效驗豈古方不可遵歟答曰腎氣丸若果按古方修制地黃用乾地黃桂用桂枝且止為丸劑而不作湯劑用之得當誠有效驗蓋生地能逐血痹神農本草經而熟地無斯效也桂枝能調營衛而肉桂無斯效也血痹逐則瘀血自消營衛調則氣血自理至於山萸肉之酸溫亦能逐痹神龍本草經山茱萸逐寒濕痹牡丹皮之辛涼亦能破血附子之大辛大溫又能溫通血脈與地黃之寒涼相濟以共成逐血痹之功是腎氣丸為補腎之藥實兼為開瘀血之藥故列於金匱虛勞門而為要方也其止為丸劑而不作湯劑者誠以地黃經水火煎熬則汁漿稠黏性近熟地其逐血痹之力必減是以神農本草經謂地黃生者尤良也後賢徐靈胎曾治一人上盛下虛胸次痰火壅滯喘不能臥將人參切作小塊用清水理痰之藥煎湯送服而愈後其病復發病家自用原方並人參亦煎服病益甚靈胎仍教以依從前服法其病仍愈夫同一人參也生切塊送服則效煎湯則不惟不效轉至增劇觸類引伸可以悟古人制腎氣丸之精義矣或又問腎氣丸既按古方修制可以有效而金匱虛勞門腎氣丸與大黃蟅蟲丸之外又有七方皆可隨證採擇則子之十全育真湯似亦可以不擬歟答曰金匱虛勞門諸方雖皆有效而一方專治虛勞門一證若拙擬十全育真湯實兼治虛勞門諸證如方中用黃耆以補氣而即用人參以培元氣之根本用知母以滋陰而即用山藥元參以壯真陰之淵源用三稜莪朮以消瘀血而即用丹參以化瘀血之渣滓至龍骨牡蠣若取其收澀之性能助黃耆以固元氣若取其涼潤之性能助知母以滋真陰若取其開通之性神農本草經龍骨主癥瘕後世本草亦謂牡蠣消血又能助三稜莪朮以消融瘀滯也至於療肺虛之咳逆腎虛之喘促山藥最良治多夢之紛紜虛汗之淋漓龍骨牡蠣尤勝此方中意也以尋常藥餌十味彙集成方而能補助人身之真陰陽真氣血真精神故曰十全育真也勞瘵者多兼瘀血其證原有兩種有因勞瘵而瘀血者其人或調養失宜或縱欲過度氣血虧損流通於周身者必然遲緩血即因之而瘀其瘀多在經絡有因瘀血而成勞瘵者其人或有跌傷碰傷或力小任重或素有吐衄證服藥失宜以致先有瘀血日久浸成勞瘵其瘀血多在臟腑此二者服十全育真湯皆可愈而瘀血在臟腑者尤須多用破血之藥又瘀在經絡者亦可用前方資生湯加當歸丹參瘀在臟腑之劇者又宜用拙擬理沖湯或理沖丸此數方可參變匯通隨時制宜也世俗醫者遇脈數之證大抵責之陰虛血涸不知元氣虛極莫支者其脈可至極數設有人或力作或奔馳至氣力不能支持之時其脈必數乃以力倦之不能支持以仿氣虛之不能支持其事不同而其理同也愚臨證細心體驗凡治虛勞之證固不敢純用補藥然理氣藥多於補氣藥則脈即加數補氣藥多於理氣藥則脈即漸緩是知脈之數與不數固視乎血分之盈虧實尤兼視乎氣分之強弱故此十全育真湯中臺參黃耆各四錢而三稜莪朮各錢半補氣之藥原數倍於理氣之藥若遇氣分虛甚者猶必以雞內金易三稜莪朮也藥性之補破寒熱雖有一定亦視乎服藥者之資稟為轉移嘗權衡黃耆之補力與三稜莪朮之破力等分用之原無軒輊嘗用三稜莪朮各三錢治臟腑間一切癥瘕積聚恐其傷氣而以黃耆六錢佐之服至數十劑病去而氣分不傷且有愈服而愈覺強壯者若遇氣分甚虛者才服數劑即覺氣難支持必須加黃耆或減三稜莪朮方可久服蓋虛極之人補藥難為攻而破藥易見過也若其人氣壯而更兼郁者又必須多用三稜莪朮或少用黃耆而後服之不至滿悶又嘗權衡黃耆之熱力與知母之寒力亦無軒輊等分用之可久服無寒熱也此論湯劑作丸劑則知母寒力勝於黃耆熱力而素畏熱者服之必至增熱素畏寒者服之又轉增寒其寒熱之力無定亦猶補破之力無定也故臨證調方者務須細心斟酌隨時體驗息息與病機相符而後百用不至一失也附録直隸滄縣李來函弟長男媳年二十四歲於本年丙寅正月間患寒熱往來自因素畏服藥故隱忍不肯言至四月初家人來迓弟言兒媳病劇回家視之雖未臥床不起而瘦弱實難堪矣診其脈弦而浮數細詢病情言每逢午後先寒後熱時而微咳無痰日夜作瀉十餘次黎明則頭汗出胸間綿綿作疼食一下咽即脹滿難堪而諸虛百損之狀顯然盡露籌思良久為立逍遙散方服兩劑無效因復至滄取藥適逢張自津來滄遂將兒媳之病細述本末張曰以弟之意將用何方以治之答曰余擬將資生湯十全育真湯二方匯通用之可乎張曰得之矣此良方也服之必效弟遂師二方之義用生懷山藥八錢生白朮淨萸肉生雞內金生龍骨生牡蠣鮮石斛各三錢丹參四錢連服四劑諸證皆大輕減又於原方加三稜莪朮十全育真湯中用此二藥者因虛勞之證多血痹也各一錢粉丹皮地骨皮各二錢又連服八劑諸病悉退飲食增加今已完全成功矣醴泉飲治虛勞發熱或喘或嗽脈數而弱生山藥一兩大生地五錢人參四錢玄參四錢生赭石四錢軋細牛蒡子三錢炒搗天冬四錢甘草二錢勞熱之證大抵責之陰虛有肺陰虛者其人因肺中虛熱熏蒸時時癢而作嗽甚或肺中有所損傷略一動作輒發喘促宜滋補肺陰兼清火理痰之品有腎陰虛者其人因腎虛不能納氣時時咳逆上氣甚或喘促宜填補下焦真陰兼用收降之品若其脈甚數者陳修園謂宜滋養脾陰蓋以脾脈原主和緩脈數者必是脾陰受傷宜於滋陰藥中用甘草以引之歸脾更兼用味淡之藥如薏米石斛之類特是人身之陰所蓋甚廣凡周身之濕處皆是也故陰虛之甚者其周身血脈津液皆就枯涸必用汁漿最多之藥滋臟腑之陰即以溉周身之液若方中之山藥地黃是也然脈之數者固系陰虛亦系氣分虛弱有不能支持之象猶人之任重而體顫也故用人參以補助氣分與玄參天冬之涼潤者並用又能補助陰分且慮其升補之性與咳嗽上逆者不宜故又佐以赭石之壓力最勝者可使人參補益之力下行直至湧泉而上焦之逆氣浮火皆隨之順流而下更可使下焦真元之氣得人參之峻補而頓旺自能吸引上焦之逆氣浮火下行也至於牛蒡子與山藥並用最善止嗽甘草與天冬並用最善潤肺此又屢試屢效者也初制此方時原無赭石有丹參三錢以運化人參之補力後治一年少婦人信水數月不行時作寒熱干嗽連連且兼喘逆胸隔滿悶不思飲食脈數幾至七至治以有丹參原方不效遂以赭石易丹參一劑咳與喘皆愈強半胸次開通即能飲食又服數劑脈亦和緩共服二十劑諸病皆愈以後凡治婦女月閉血枯浸至虛勞或兼咳嗽滿悶者皆先投以此湯俾其飲食加多身體強壯經水自通間有瘀血暗阻經道或顯有癥瘕可據者繼服拙擬理沖湯或理沖丸以消融之則婦女無難治之病矣若其人胸中素覺短氣或大便易滑瀉者又當預防其大氣下陷大氣下陷詳升陷湯用醴泉飲時宜減赭石牛蒡子並一切蘇子蔞仁紫菀杏仁治咳喘套藥皆不宜用按短氣與喘原迥異短氣者難於呼氣不上達也喘者難於吸氣不下降也而不善述病情者往往謂喘為上不來氣是以愚生平臨證凡遇自言上不來氣者必細細詢問確知其果系呼氣難與吸氣難而後敢為施治也又按方書名咳喘曰咳逆喘曰喘逆因二證多由逆氣上干也而愚臨證實驗以來知因大氣下陷而咳喘者亦復不少蓋肺懸胸中必賴大氣以包舉之而後有所附麗大氣以鼓舞之而後安然呼吸大氣一陷則包舉之力微肺即無所附麗而咳嗽易生鼓舞之機滯肺必努力呼吸而喘促易作曾治一少年泄瀉半載方愈後因勞力過度覺喉中之氣不舒五六呼吸之間必咳嗽一兩聲而其氣始舒且覺四肢無力飲食懶進診其脈微弱異常知其胸中大氣下陷投以拙擬升陷湯數劑而愈又曾治一人年近五旬素有喘疾因努力任重舊證復發延醫服藥罔效後愚診視其脈數近六至而兼有沉濡之象愚疑其陰虛不能納氣因其脈兼沉濡不敢用降氣之藥遂用熟地生山藥枸杞玄參大滋真陰之藥大劑煎湯送下人參小塊二錢連服三劑脈即不數仍然沉濡喘雖見輕仍不能愈因思此證得之努力任重胸中大氣因努力而陷所以脈現沉濡且其背惡寒而兼發緊此亦大氣下陷之徵也亦治以升陷湯方中升麻柴胡桔梗皆不敢用以桂枝尖三錢代之因其素有不納氣之證桂枝能升大氣又能納氣歸腎也理詳參赭鎮氣湯下又外加滋陰之藥數劑全愈詳案在升陷湯下按此二證之病因與醴泉飲所主之病迥異而其咳喘則同必詳觀升陷湯後跋語及所載諸案始明治此二證之理而附載於此者恐臨證者審證不確誤以醴泉飲治之也瀋陽婁年二十二虛勞咳嗽其形羸弱脈數八至按之即無細詢之自言曾眠熱炕之上晨起覺心中發熱從此食後即吐出夜間咳嗽甚劇不能安寢因二十餘日寢食俱廢遂覺精神恍惚不能支持愚聞之知脈象雖危仍系新證若久病至此誠難挽回矣遂投以醴泉飲為其嘔吐將赭石改用一兩重用赭石之理詳參赭鎮氣湯下一劑吐即止可以進食嗽亦見愈從前五六日未大便至此大便亦通下如此加減服之三日後脈數亦見愈然猶六至余心中猶覺發熱遂將玄參生地皆改用六錢又每日於午時用白蔗糖沖水送服西藥阿斯匹林藥性詳參麥湯下七釐許數日諸病皆愈脈亦復常瀋陽蘇年三十許勞嗽二年不愈動則作喘飲食減少更醫十餘人服藥數百劑分毫無效羸弱轉甚來院診治其脈數六至雖細弱仍有根柢知其可治自言上焦恆覺發熱大便三四日一行時或乾燥遂投以醴泉飲為其便遲而燥赭石改用六錢又加雞內金二錢搗細恐其病久臟腑經絡多瘀滯也數劑後飯量加增心中仍有熱時大便已不燥間日一行遂去赭石二錢加知母二錢俾於晚間服湯藥後用白蔗糖水送服阿斯匹林四分之一瓦得微汗後令於日間服之不使出汗數日不覺發熱脈亦復常惟咳嗽未能全愈又用西藥幾阿蘇六分薄荷冰四分和以緑豆粉為丸梧桐子大每服三丸日兩次湯藥仍照方服之五六日後咳嗽亦愈身體從此康健一味薯蕷飲治勞瘵發熱或喘或嗽或自汗或心中怔忡或因小便不利致大便滑瀉及一切陰分虧損之證生懷山藥四兩切片煮汁兩大碗以之當茶徐徐溫飲之山藥之性能滋陰又能利濕能滑潤又能收澀是以能補肺補腎兼補脾胃且其含蛋白質最多在滋補藥中誠為無上之品特性甚和平宜多服常服耳陳修園謂山藥為尋常服食之物不能治大病非也若果不治大病何以金匱治勞瘵有薯蕷丸嘗治一室女溫病痰喘投以小青龍加石膏湯又遵傷寒論加減法去麻黃加杏仁喘遂定時已近暮一夜安穩至黎明喘大作脈散亂如水上浮麻不分至數此將脫之候也取藥不及適有生山藥兩許急煮汁飲之喘稍定脈稍斂可容取藥方中仍重用山藥而愈詳案在仙露湯下一室女月信年餘未見已成勞瘵臥床不起治以拙擬資生湯復俾日用生山藥四兩煮汁當茶飲之一月之後體漸復初月信亦通一婦人産後十餘日大喘大汗身熱勞嗽醫者用黃耆熟地白芍等藥汗出愈多後愚診視脈甚虛弱數至七至審證論脈似在不治俾其急用生山藥六兩煮汁徐徐飲之飲完添水重煮一晝夜所飲之水皆取于山藥中翌日又換山藥六兩仍如此煮飲之三日後諸病皆愈一人年四十餘得溫病十餘日外感之火已消十之八九大便忽然滑下喘息迫促且有煩渴之意其脈甚虛兩尺微按即無亦急用生山藥六兩煎汁兩大碗徐徐溫飲下以之當茶飲完煎渣再飲兩日共用山藥十八兩喘與煩渴皆愈大便亦不滑瀉附録直隸青縣張來函侄女已於歸數載因患瘰癧證成癆喘嗽不休或自汗或心中怔忡來函索方余揣此係陰分虧損已極所致俾先用一味薯蕷飲每日用生懷山藥四兩煮汁兩大碗當茶頻頻溫飲之不數劑喘定汗止咳嗽亦見輕繼又兼服薯蕷粥作點心用之漸漸全愈奉天法庫縣萬來函家慈患痰喘咳嗽病三十年於茲矣百方不效且年愈高病愈進乃於今春宿病既發又添發灼咽乾頭汗出食不下等證生雖習醫此時惟戰兢不敢處方遂請一宿醫診視云是痰盛有火孰知是肺氣與脾陰腎陰將虛竭也與人參清肺湯加生地丹皮等味服二劑非特未效遂發灼如火更添泄瀉有不可終日之勢於是不敢延醫自選用資生湯方服一劑亦無顯效轉思此時方中於朮牛蒡子雞內金等味有未合也因改用一味薯蕷飲用生懷山藥四兩加玄參三錢服一劑見效二劑大見效三劑即病愈強半矣後乃改用薯蕷粥用生懷山藥一兩為細末煮作粥少調以白糖每日兩次當點心服之又間進開胃之藥旬余而安參麥湯治陰分虧損已久浸至肺虛有痰咳嗽勞喘或兼肺有結核者人參三錢干麥冬四錢帶心生山藥六錢清半夏二錢牛蒡子三錢炒搗蘇子二錢炒搗生杭芍三錢甘草錢半人參為補肺之主藥而有肺熱還傷肺之虞有麥冬以佐之則轉能退熱麥冬為潤肺之要品而有咳嗽忌用之説有半夏以佐之則轉能止嗽至於山藥其收澀也能助人參以補氣其黏潤也能助麥冬以滋液雖多服久服或有壅滯而牛蒡子之滑利實又可以相濟且牛蒡子能降肺氣之逆半夏能降胃氣沖氣之逆蘇子與人參同用又能降逆氣之因虛而逆平其逆氣則喘與嗽不治自愈矣用白芍者因肝為肺之對宮肺金虛損不能清肅下行以鎮肝木則肝火恆恣橫而上逆故加芍藥以斂戢其火且芍藥與甘草同用甘苦化合味近人參即功近人參而又為補肺之品也按古方多以麥冬治肺虛咳嗽獨徐靈胎謂嗽者斷不宜用蓋以其汁漿膠黏太甚肺中稍有客邪即可留滯不散惟濟以半夏之辛燥開通則不惟治嗽甚效即治喘亦甚效故仲景治傷寒解後虛羸少氣氣逆欲吐有竹葉石膏湯麥冬與半夏同用治火逆上氣有麥門冬湯以麥冬為君亦佐以半夏也又肺虛勞嗽者醫者多忌用半夏是未知半夏之性者也徐靈胎曰肺屬金喜斂而不喜散蓋斂則肺葉垂而氣順散則肺葉張而氣逆半夏之辛與薑桂之辛迥別入喉則閉不能言塗金瘡則血不復出辛中滯澀故能疏又能斂也又辛之斂與酸之斂不同酸則一主於斂辛則斂中有發散之意尤與肺投合也又喻嘉言贊麥門冬湯中用半夏曰於大建中氣大生津液藥中增入半夏之辛溫一味以利咽下氣此非半夏之功實善用半夏之功也愚對於此證悉心研究知其治法當細分為數種腎傳肺者以大滋真陰之藥為主以清肺理痰之藥為佐若拙擬之醴泉飲是也肺傳腎者以清肺理痰之藥為主以滋補真陰之藥為佐若此參麥湯是也其因肺腎俱病而纍及脾胃者宜肺腎雙補而兼顧其脾胃若拙擬之滋培湯珠玉二寶粥是也如此分途施治斟酌咸宜而又兼服阿斯匹林凡其脈之稍有根柢可挽回者需以時日皆愈也至於但肺有結核而未纍及他臟者可於斯編治肺病方中酌其治法論肺病治法實合虛勞肺病詳細論之也凡治虛勞及肺病者皆宜參觀阿斯匹林其性涼而能散善退外感之熱初得外感風熱服之出涼汗即愈兼能退內傷之熱肺結核者借之以消除其熱誠有奇效又善治急性關節腫疼發表痘毒麻疹及腸胃炎肋膜炎諸證西藥中之最適用者也特其發汗之力甚猛若結晶堅而大者以治外感半瓦即可出汗若當天氣寒涼或近寒帶之地須服至一瓦或至瓦半若其略似白粉微有結晶者藥力薄弱服至一瓦方能出汗多可服至瓦半或二瓦是在臨證者相其藥力之優劣而因時因地因人制宜也至用阿斯匹林治內傷其分量尤須少用因內傷發熱之人陰虛陽浮最易發汗西人用治肺結核之熱日服三瓦其在歐洲地寒且其人自幼多肉食臟腑營衛壯固或者猶可在吾中華則定然不可是以丁仲祜用阿斯匹林治肺結核一日三次共服一瓦半則視西人所用之分量減半矣愚用阿斯匹林治肺結核視西人所用之數則減之又減曾治一少年染肺結核咳嗽食少身體羸弱半載不愈求為診治遂投以理肺清痰健胃滋陰之藥又於晚間臨睡時用白蔗糖沖水送服阿斯匹林三分之一瓦須臾周身即得大汗過三點鐘其汗始止翌日覺周身痠懶蓋因汗太過也而咳嗽則較前見輕食欲亦少振繼服滋補之藥數劑每日只用阿斯匹林六分之一瓦作一次服下或出微汗或不出汗從此精神漸漸清爽調治月餘而愈自此以後用阿斯匹林治肺結核必先少少試服初次斷不敢稍多也至西人謂防其出汗可與止汗之藥同服亦系善法然仍恐服後止汗之藥不效而阿斯匹林之發汗仍然甚效也愚治肺結核證若一日用至一瓦或一瓦強恆作十次或十餘次服下勿須用止汗之藥亦可不出汗即有時微見汗亦系佳兆凡勞瘵陰虛之證其脈之急數者無論肺結核與不結核於每服滋補劑外皆宜服阿斯匹林或半瓦或至一瓦恐其出汗多分幾次服下其初日服之俾微見汗後日日常服以或出汗或不出汗為適宜如此旬日之間脈之數者可漸和緩附録廣西柳州賓來函治一婦人年四十三歲素因家務勞心又兼傷心遂患吐血後吐血雖愈而喘嗽殊甚夜不能臥諸醫率用枇杷葉款冬花杏仁紫菀貝母等藥治之其後右邊面顴淡紅腫起嗽喘仍不少愈後僕為診治先投以王清任少腹逐瘀湯加蘇子沉香二劑繼服書中參麥湯八劑喘嗽皆愈又治一男子年四十六歲心中發熱作喘醫治三年無效僕為診視先投以書中首方資生湯遵注加生地黃六錢一劑見輕數劑病愈強半繼用參麥湯數劑病愈十之八九然病已數年身體羸弱非倉猝所能復原望先生賜惠為擬一善後之方則幸甚矣珠玉二寶粥治脾肺陰分虧損飲食懶進虛熱勞嗽並治一切陰虛之證生山藥二兩生薏米二兩柿霜餅八錢上三味先將山藥薏米搗成粗渣煮至爛熟再將柿霜餅切碎調入融化隨意服之山藥薏米皆清補脾肺之藥然單用山藥久則失於黏膩單用薏米久則失於淡滲惟等分並用乃可久服無弊又用柿霜之涼可潤肺甘能歸脾者以為之佐使病人服之不但療病並可充飢不但充飢更可適口用之對證病自漸愈即不對證亦無他患柿霜餅即柿霜熬成者為柿霜白而淨者甚少故用其熬成餅者然熬此餅時恆有摻以薄荷水者其性即不純良遇陰虛汗多之證用之即有不宜若果有白淨柿霜尤勝於餅一少年因感冒懶於飲食猶勤稼穡枵腹力作遂成勞嗽過午發熱徹夜咳吐痰涎醫者因其年少多用滋陰補腎之藥間有少加參耆者調治兩月不效飲食減少痰涎轉增漸至不起脈虛數兼有弦象知其肺脾皆有傷損也授以此方俾一日兩次服之半月全愈或問脈現弦象何以即知其脾肺傷損答曰脈雖分部位而其大致實不分部位今此證左右之脈皆弦夫弦為肝脈肝盛必然侮脾因肝屬木脾屬土也且五行之中惟土可以包括四行即脾氣可以包括四臟故六部脈中皆以和緩為貴以其饒有脾土之氣也今其脈不和緩而弦硬其脾氣受傷不能包括四臟可知又肺屬金所以鎮肝木者也故肺金清肅之氣下行肝木必不至恣橫即脈象不至於弦今其脈既現如此弦象則肺金受傷不能鎮肝木更可知也沃雪湯治同前證更兼腎不納氣作喘者生山藥一兩半牛蒡子炒搗四錢柿霜餅沖服六錢一人年四十餘素有喘證薄受外感即發醫者投以小青龍湯一劑即愈習以為常一日喘證復發連服小青龍湯三劑不愈其脈五至余右寸浮大重按即無知其從前服小青龍即愈者因其證原受外感今服之而不愈者因此次發喘原無外感也蓋其薄受外感即喘肺與腎原有傷損但知治其病標不知治其病本則其傷損必益甚是以此次不受外感亦發喘也為擬此湯服兩劑全愈又服數劑以善其後水晶桃治肺腎兩虛或咳嗽或喘逆或腰膝痠疼或四肢無力以治孺子尤佳核桃仁一斤柿霜餅一斤先將核桃仁飯甑蒸熟再與柿霜餅同裝入瓷器內蒸之融化為一晾冷隨意服之凡果核之仁具補益之性者皆能補腎核桃乃果核之最大者其仁既多脂味更香美為食中佳品性善補腎可知柿霜色白入肺而甘涼滑潤其甘也能益肺氣其涼也能清肺熱其滑也能利肺痰其潤也能滋肺燥與核桃同用肺腎同補金水相生虛者必易壯實且食之又甚適口飢時可隨便服之故以治小兒尤佳也附方俗傳治勞嗽方秋分日取鮮萊蔔十餘枚去葉自葉中心穿以鮮槐條令槐條頭透出根外懸於茂盛樹上滿百日至一百零一日取下用時去槐條將萊蔔切片煮爛調紅沙糖服之每服一枚數服即愈按萊蔔色白入肺槐條色黑入腎如此作用蓋欲導引肺氣歸腎其懸於茂盛樹上者因茂樹之葉多吐氧氣萊蔔借氧氣醞釀其補益之力必增也懸之必滿百日者欲其飽經霜露借金水之氣以補金水之臟也邑中孫姓叟年近六旬勞喘百藥不效後得此方服之而愈每歲多備此藥以贈勞喘者服之愈者甚多醫話附録崔來函介紹三方中治嗽方甚效宜選用既濟湯治大病後陰陽不相維繫陽欲上脫或喘逆或自汗或目睛上竄或心中搖搖如懸旌陰欲下脫或失精或小便不禁或大便滑瀉一切陰陽兩虛上熱下涼之證大熟地一兩萸肉去淨核一兩生山藥六錢生龍骨搗細六錢生牡蠣搗細六錢茯苓三錢生杭芍三錢烏附子一錢或問既濟湯原為救脫之藥方中何以不用人參答曰人參之性補而兼升以治上脫轉有氣高不返之虞喻嘉言寓意草中論之甚詳惟與赭石同用始能納氣歸根而證兼下脫者赭石又不宜用為不用赭石所以不敢用人參且陽之上脫也皆因真陰虛損不能潛藏元陽陽氣始無所繫戀而上奔故方中重用熟地山藥以峻補真陰俾陰足自能潛陽而佐以附子之辛熱原與元陽為同氣協同芍藥之苦降神農本草經味苦自能引浮越之元陽下歸其宅更有萸肉龍骨牡蠣以收斂之俾其陰陽固結不但元陽不復上脫而真陰亦永不下脫矣一人年二十餘稟資素羸弱又耽煙色於秋初患瘧兩旬始愈一日大便滑瀉數次頭面汗出如洗精神頽憒昏昏似睡其脈上盛下虛兩寸搖搖兩尺欲無數至七至延醫二人皆不疏方愚後至為擬此湯一劑而醒又服兩劑遂復初友人張曾治一少年素患心疼發時晝夜號呼醫者屢投以消通之藥致大便滑瀉虛氣連連下泄汗出如洗目睛上泛心神驚悸周身瞤動須人手按而心疼如故延醫數人皆不敢疏方張投以此湯將方中萸肉倍作二兩連服兩劑諸病皆愈心疼竟從此除根或問此方能治脫證宜矣而並能治心疼者何也答曰凡人身內外有疼處皆其氣血痹而不通神農本草經謂山茱萸主心下邪氣寒熱溫中逐寒濕痹是萸肉不但酸斂而更善開通可知李士材治肝虛作疼萸肉與當歸並用愚治肝虛腿疼曾重用萸肉隨手奏效詳案在曲直湯下蓋萸肉得木氣最厚酸斂之中大具條暢之性故善於治脫尤善於開痹也大抵其證原屬虛痹氣血因虛不能流通而作疼醫者不知惟事開破逮開至陰陽將脫而其疼如故醫者亦束手矣而投以此湯惟將萸肉加倍竟能於救脫之外更將心疼除根此非愚制方之妙實張之因證施用而善於加減也來復湯治寒溫外感諸證大病瘥後不能自復寒熱往來虛汗淋漓或但熱不寒汗出而熱解須臾又熱又汗目睛上竄勢危欲脫或喘逆或怔忡或氣虛不足以息諸證若見一端即宜急服萸肉去淨核二兩生龍骨搗細一兩生牡蠣搗細一兩生杭芍六錢野臺參四錢甘草二錢蜜炙萸肉救脫之功較參朮耆更勝蓋萸肉之性不獨補肝也凡人身之陰陽氣血將散者皆能斂之故救脫之藥當以萸肉為第一而神農本草經載於中品不與參朮耆並列者竊憶古書竹簡韋編易於錯簡此或錯簡之誤歟凡人元氣之脫皆脫在肝故人虛極者其肝風必先動肝風動即元氣欲脫之兆也又肝與膽臟腑相依膽為少陽有病主寒熱往來肝為厥陰虛極亦為寒熱往來為有寒熱故多出汗萸肉既能斂汗又善補肝是以肝虛極而元氣將脫者服之最效愚初試出此藥之能力以為一己之創見及詳觀神農本草經山茱萸原主寒熱其所主之寒熱即肝經虛極之寒熱往來也特從前涉獵觀之忽不加察且益嘆神農本草經之精當實非後世本草所能及也又神農本草經謂山茱萸能逐寒濕痹是以本方可用以治心腹疼痛曲直湯用以治肢體疼痛以其味酸能斂補絡補管湯用之以治咳血吐血再合以此方重用之最善救脫斂汗則山茱萸功用之妙真令人不可思議矣一人年二十餘於孟冬得傷寒證調治十餘日表裡皆解忽遍身發熱頓飯頃汗出淋漓熱頓解須臾又熱又汗若是兩晝夜勢近垂危倉猝迎愚診治及至見汗出渾身如洗目上竄不露黑睛左脈微細模糊按之即無此肝膽虛極而元氣欲脫也蓋肝膽虛者其病象為寒熱往來此證之忽熱忽汗亦即寒熱往來之意急用淨萸肉二兩煎服熱與汗均愈其半遂為擬此方服兩劑而病若失趙叟年六十三歲於仲冬得傷寒證痰喘甚劇其脈浮而弱不任循按問其平素言有勞病冬日恆發喘嗽再三籌思強治以小青龍湯去麻黃加杏仁生石膏為其脈弱俾預購補藥數種備用服藥後喘稍愈再診其脈微弱益甚遂急用淨萸肉一兩生龍骨生牡蠣各六錢野臺參四錢生杭芍三錢為方皆所素購也煎湯甫成此時病人呼吸俱微自覺氣息不續急將藥飲下氣息遂能接續李年五旬偶相值求為診脈言前月有病服藥已愈近覺身體清爽未知脈象何如診之其脈尺部無根寸部搖搖有將脫之勢因其自謂病愈若遽悚以危語彼必不信姑以脈象平和答之遂祕謂其侄曰令叔之脈甚危險當服補斂之藥以防元氣之暴脫其侄向彼述之果不相信後二日忽遣人迎愚言其驟然眩暈不起求為診治既至見其周身顫動頭上汗出言語錯亂自言心怔忡不能支持其脈上盛下虛之象較前益甚急投以淨萸肉兩半生龍骨生牡蠣野臺參生赭石各五錢一劑即愈繼將萸肉改用一兩加生山藥八錢連服數劑脈亦復常按此方赭石之分量宜稍重於臺參附録湖北天門縣崔來函張港朱之兒媳産後角弓反張汗出如珠六脈散亂無根有將脫之象迎為診治急用淨萸肉二兩俾煎湯服之一劑即愈鎮攝湯治胸膈滿悶其脈大而弦按之似有力非真有力此脾胃真氣外泄衝脈逆氣上干之證慎勿作實證治之若用開通之藥凶危立見服此湯數劑後脈見柔和即病有轉機多服自愈野臺參五錢生赭石軋細五錢生芡實五錢生山藥五錢萸肉去淨核五錢清半夏二錢茯苓二錢服藥數劑後滿悶見輕去芡實加白朮二錢脈之真有力者皆有洪滑之象洪者如波濤疊湧勢作起伏滑者指下滑潤纍纍如貫珠此脈象弦直既無起伏之勢又無貫珠之形雖大而有力實非真有力之象和緩者脾胃之正脈弦長者肝膽之正脈然脾胃屬土其脈象原宜包括金木水火諸臟腑故六部之脈皆有和緩乃為正象今其脈弦而有力乃肝木橫恣侵侮脾土之象故知其脾胃虛也衝脈上隸陽明故沖氣與胃氣原相貫通今因胃氣虛而不降沖氣即易於上干此時脾胃氣化不固既有外越之勢沖氣復上干而排擠之而其勢愈外越故其脈又兼大也一媼年過六旬胸腹滿悶時覺有氣自下上衝飲食不能下行其子為書賈且知醫曾因賣書至愚書校述其母病證且言脈象大而弦硬為擬此湯服一劑滿悶即減又服數劑全愈一人年近五旬心中常常滿悶嘔吐痰水時覺有氣起自下焦上衝胃口其脈弦硬而長右部尤甚此沖氣上衝並迫胃氣上逆也問其大便言甚乾燥遂將方中赭石改作一兩又加知母生牡蠣各五錢厚朴蘇子各錢半連服六劑全愈附録直隸鹽山李來函天津王媼得病月餘困頓已極求治於弟診其脈六部皆弦硬有力更粗大異常詢其病則胸膈滿悶食已即吐月餘以來未得一飯不吐且每日大便兩三次所便少許有如雞矢自云心中之難受莫可言喻不如即早與世長辭脫此苦惱細思胸膈滿悶頗似實證者然而脈象弦硬粗大無一點柔和之象遂憶鎮攝湯下注云治胸膈滿悶其脈大而弦按之有力此脾胃真氣外泄衝脈逆氣上干之證慎勿以實證治之云云即抄鎮攝湯原方豫之服一劑吐即見減大便次數亦見減脈遂有柔和之象四五劑即諸病全愈以後遇此等脈象即按此湯加減治之無不效如桴鼓二治陽虛方敦復湯附服硫黃法治下焦元氣虛憊相火衰微致腎弱不能作強內經云腎者作強之官脾弱不能健運或腰膝痠疼或黎明泄瀉一切虛寒諸證野臺參四錢烏附子三錢生山藥五錢補骨脂四錢炒搗核桃仁三錢萸肉四錢去淨核茯苓錢半生雞內金錢半搗細敦復湯原為補相火之專方而方中以人參為君與萸肉茯苓並用借其收斂下行之力能大補腎中元氣元氣既旺相火自生又用烏附子補骨脂之大熱純陽直達下焦以助相火之熱力核桃仁之溫潤多脂峻補腎臟以厚相火之基址且附子與人參同用名參附湯為回元陽之神丹補骨脂與核桃仁並用名青蛾丸為助相火之妙品核桃仁屬木補骨脂屬火並用之有木火相生之妙又恐藥性太熱於下焦真陰久而有礙故又重用生山藥取其汁漿稠黏能滋下焦真陰其氣味甘溫又能固下焦氣化也至於雞內金其健運脾胃之力既能流通補藥之滯其收澀膀胱之力又能逗留熱藥之性也人身之熱力方書恆責重相火而不知君火之熱力較相火尤勝蓋生育子女以相火為主消化飲食以君火為主君火發於心中為陽中之火其熱下濟大能溫暖脾胃助其消化之力此火一衰脾胃消化之力頓減若君火旺而相火衰者其人仍能多飲多食可享大壽是知君火之熱力關於人身者甚大也愚自臨證實驗以來遇君火虛者不勝計其人多廉於飲食寒飲留滯為恙投以辛熱升補之劑即隨手奏效拙擬理飲湯為治是病的方彼謂心臟惡熱用藥惟宜寒涼者猶是一偏之論曾治一人年二十餘嗜睡無節即動作飲食之時亦忽然昏倒鼾睡診其脈兩尺洪滑有力知其腎經實而且熱也遂用黃柏知母各八錢茯苓澤瀉各四錢數劑而愈是知人之資稟不齊心臟多惡熱而亦有宜溫補者腎臟多惡寒而亦有宜涼瀉者是在臨證時細心與之消息不可拘於成見也欲明心火之熱力今又得一確實證驗愚資稟素強壯心火頗旺而相火少衰飲食不忌寒涼恆畏坐涼處因此數年來常於食前服生硫黃如黑豆大一塊約有四釐甚見效驗附服硫黃法嘗觀葛稚川肘後方首載扁鵲玉壺丹系硫黃一味九轉而成治一切陽分衰憊之病而其轉法所需之物頗難備具今人鮮有服者愚臨證實驗以來覺服制好之熟硫黃猶不若徑服生者其效更捷蓋硫黃制熟則力減少服無效多服又有燥渴之弊服生硫黃少許即有效而又無他弊也十餘年間用生硫黃治愈沉寒錮冷之病不勝計蓋硫黃原無毒其毒也即其熱也使少服不令覺熱即於人分毫無損故不用制熟即可服更可常服也且自古論硫黃者莫不謂其功勝桂附惟徑用生者系愚之創見而實由自家徐徐嘗驗確知其功效甚奇又甚穩妥然後敢以之治病今邑中日服生硫黃者數百人莫不飲食加多身體強壯皆愚為之引導也今略舉生硫黃治驗之病數則於下一孺子三歲失乳頻頻滑瀉米穀不化瘦弱異常俾嚼服生硫黃如緑豆粒大兩塊當日滑瀉即愈又服數日飲食加多肌肉頓長後服數月嚴冬在外嬉戲面有紅光亦不畏寒一叟年近六旬得水腫證小便不利周身皆腫其脈甚沉細自言素有疝氣下焦常覺寒涼愚曰欲去下焦之寒非服硫黃不可且其性善利水施之火不勝水而成水腫者尤為對證為開苓桂朮甘湯加野臺參三錢威靈仙一錢一日煎渣再服皆送服生硫黃末二分十日後小便大利腫消三分之二下焦仍覺寒涼遂停湯藥單服硫黃試驗漸漸加多一月共服生硫黃四兩周身腫盡消下焦亦覺溫暖一人年十八九常常嘔吐涎沫甚則吐食診其脈象甚遲濡投以大熱之劑毫不覺熱久服亦無效驗俾嚼服生硫黃如黃豆粒大徐徐加多以服後移時覺微溫為度後一日兩次服每服至二錢始覺溫暖共服生硫黃四斤病始除根一數月孺子乳汁不化吐瀉交作常常啼號日就羸瘦其啼時蹙眉似有腹疼之意俾用生硫黃末三釐許乳汁送服數次而愈一人年四十許因受寒腿疼不能步履投以溫補宣通之劑愈後因食豬頭豬頭鹹寒與豬肉不同反復甚劇疼如刀刺再服前藥不效俾每於飯前嚼服生硫黃如玉秫粒大服後即以飯壓之試驗加多後每服至錢許共服生硫黃二斤其證始愈一叟年六十有一頻頻咳吐痰涎兼發喘逆人皆以為勞疾未有治法診其脈甚遲不足三至知其寒飲為恙也投以拙擬理飲湯加人參附子各四錢喘與咳皆見輕而脈之遲仍舊因思脈象如此非草木之品所能挽回俾服生硫黃少許不覺溫暖則徐徐加多兩月之間服生硫黃斤余喘與咳皆愈脈亦復常一婦人年五旬上焦陽分虛損寒飲留滯作嗽心中怔忡飲食減少兩腿畏寒臥床不起者已二年矣醫者見其咳嗽怔忡猶認為陰分虛損復用熟地阿膠諸滯泥之品服之病益劇後愚診視脈甚弦細不足四至投以拙擬理飲湯加附子三錢服七八日咳嗽見輕飲食稍多而仍不覺熱知其數載沉疴非程功半載不能愈也俾每日於兩餐之前服生硫黃三分體驗加多後服數月其病果愈按古方中硫黃皆用石硫黃而今之硫黃皆出於石其色黃而亮砂粒甚大且無臭氣者即堪服食且此物燃之雖氣味甚烈嚼之實無他味無論病在上在下皆宜食前嚼服服後即以飯壓之若不能嚼服者為末開水送服亦可且其力最長即一日服一次其熱亦可晝夜不歇三治大氣下陷方升陷湯治胸中大氣下陷氣短不足以息或努力呼吸有似乎喘或氣息將停危在頃刻其兼證或寒熱往來或咽乾作渴或滿悶怔忡或神昏健忘種種病狀誠難悉數其脈象沉遲微弱關前尤甚其劇者或六脈不全或參伍不調生箭耆六錢知母三錢柴胡一錢五分桔梗一錢五分升麻一錢氣分虛極下陷者酌加人參數錢或再加山萸肉去淨核數錢以收斂氣分之耗散使升者不至復陷更佳若大氣下陷過甚至少腹下墜或更作疼者宜將升麻改用錢半或倍作二錢升陷湯以黃耆為主者因黃耆既善補氣又善升氣惟其性稍熱故以知母之涼潤者濟之柴胡為少陽之藥能引大氣之陷者自左上升升麻為陽明之藥能引大氣之陷者自右上升桔梗為藥中之舟楫能載諸藥之力上達胸中故用之為嚮導也至其氣分虛極者酌加人參所以培氣之本也或更加萸肉所以防氣之渙也至若少腹下墜或更作疼其人之大氣直陷至九淵必需升麻之大力者以升提之故又加升麻五分或倍作二錢也方中之用意如此至隨時活潑加減尤在臨證者之善變通耳大氣者充滿胸中以司肺呼吸之氣也人之一身自飛門以至魄門一氣主之然此氣有發生之處有培養之處有積貯之處天一生水腎臟先成而腎繫命門之中包腎之膜油連於脊椎自下上數七節處有氣息息萌動此乃乾元資始之氣內經所謂少火生氣也此氣既由少火發生以徐徐上達培養於後天水穀之氣而磅礴之勢成績貯於膺胸空曠之府而盤據之根固是大氣者原以元氣為根本以水穀之氣為養料以胸中之地為宅窟者也夫均是氣也至胸中之氣獨名為大氣者誠以其能撑持全身為諸氣之綱領包舉肺外司呼吸之樞機故鄭而重之曰大氣夫大氣者內氣也呼吸之氣外氣也人覺有呼吸之外氣與內氣不相接續者即大氣虛而欲陷不能緊緊包舉肺外也醫者不知病因猶誤認為氣鬱不舒而開通之其劇者呼吸將停努力始能呼吸猶誤認為氣逆作喘而降下之則陷者益陷凶危立見矣其時作寒熱者蓋胸中大氣即上焦陽氣其下陷之時非盡下陷也亦非一陷而不升也當其初陷之時陽氣鬱而不暢則作寒既陷之後陽氣蓄而欲宣則作熱逮陽氣蓄極而通仍復些些上達則又微汗而熱解其咽乾者津液不能隨氣上潮也其滿悶者因呼吸不利而自覺滿悶也其怔忡者因心在膈上原懸於大氣之中大氣既陷而心無所附麗也其神昏健忘者大氣因下陷不能上達於腦而腦髓神經無所憑藉也其證多得之力小任重或枵腹力作或病後氣力未復勤於動作或因泄瀉日久或服破氣藥太過或氣分虛極自下陷種種病因不同而其脈象之微細遲弱與胸中之短氣實與寒飲結胸相似然診其脈似寒涼而詢之果畏寒涼且覺短氣者寒飲結胸也診其脈似寒涼而詢之不畏寒涼惟覺短氣者大氣下陷也且即以短氣論而大氣下陷之短氣與寒飲結胸之短氣亦自有辨寒飲結胸短氣似覺有物壓之大氣下陷短氣常覺上氣與下氣不相接續臨證者當細審之寒飲結胸詳理飲湯下肺司呼吸人之所共知也而謂肺之所以能呼吸者實賴胸中大氣不惟不業醫者不知即醫家知者亦鮮並方書亦罕言及所以愚初習醫時亦未知有此氣逮臨證細心體驗始確知於肺氣呼吸之外別有氣貯於胸中以司肺臟之呼吸而此氣且能撑持全身振作精神以及心思腦力官骸動作莫不賴乎此氣此氣一虛呼吸即覺不利而且肢體痠懶精神昏憒腦力心思為之頓減若其氣虛而且陷或下陷過甚者其人即呼吸頓停昏然罔覺愚既實驗得胸中有此積氣與全身有至切之關係而尚不知此氣當名為何氣涉獵方書亦無從考證惟金匱水氣門桂枝加黃耆湯下有大氣一轉其氣乃散之語後又見喻嘉言醫門法律謂五臟六腑大經小絡晝夜循環不息必賴胸中大氣斡旋其間始知胸中所積之氣當名為大氣因憶向讀內經熱論篇有大氣皆去病日已矣之語王氏注大氣為大邪之氣也若胸中之氣亦名為大氣仲景與喻氏果何所本且二書中亦未嘗言及下陷於是復取內經挨行逐句細細研究乃知內經所謂大氣有指外感之氣言者有指胸中之氣言者且知內經之所謂宗氣亦即胸中之大氣並其下陷之説內經亦嘗言之今試取內經之文釋之靈樞五味篇曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣愚思肺懸胸中下無透竅胸中大氣包舉肺外上原不通於喉亦並不通於咽而曰出於肺循喉咽呼則出吸則入者蓋謂大氣能鼓動肺臟使之呼吸而肺中之氣遂因之出入也所謂天地之精氣常出三入一者蓋謂吸入之氣雖與胸中不相通實能隔肺膜透過四分之一以養胸中大氣其餘三分吐出即換出臟腑中渾濁之氣此氣化之妙用也然此篇專為五味養人而發故第言飲食能養胸中大氣而實未發明大氣之本源愚嘗思之人未生時皆由臍呼吸其胸中原無大氣亦無需乎大氣逮胎氣日盛臍下元氣漸充遂息息上達胸中而為大氣大氣漸滿能鼓動肺膜使之呼吸即脫離母腹由肺呼吸而通天地之氣矣西人謂肺之呼吸延髓主之胸中大氣實又為延髓之原動力至大氣即宗氣者亦嘗深考內經而得之素問平人氣象論曰胃之大絡名虛里出於左乳下其動應衣脈宗氣也按虛里之絡即胃輸水穀之氣於胸中以養大氣之道路而其貫膈絡肺之餘又出於左乳下為動脈是此動脈當為大氣之餘波而曰宗氣者是宗氣即大氣為其為生命之宗主故又尊之曰宗氣其絡所以名虛里者因其貫膈絡肺遊行於胸中空虛之處也又靈樞客邪篇曰五穀入於胃其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉觀此節經文則宗氣即為大氣不待詮解且與五味篇同為伯高之言非言出兩人而或有異同且細審以貫心脈而行呼吸之語是大氣不但為諸氣之綱領並可為周身血脈之綱領矣至大氣下陷之説內經雖無明文而其理實亦寓於內經中靈樞五色篇雷公問曰人無病卒死何以知之黃帝曰大氣入於臟腑者不病而卒死夫人之膈上心肺皆臟無所謂腑也經既統言臟腑指膈下臟腑可知以膈上之大氣入於膈下之臟腑非下陷乎大氣既陷無氣包舉肺外以鼓動其闟闢之機則呼吸頓停所以不病而猝死也觀乎此則大氣之關於人身者何其重哉愚深憫大氣下陷之證醫多誤治因制升陷湯一方又有回陽升陷湯理郁升陷湯二方皆由升陷湯加減而成此三升陷湯後附載治愈之案其病之現狀有呼吸短氣者有心中怔忡者有淋漓大汗者有神昏健忘者有聲顫身動者有寒熱往來者有胸中滿悶者此因呼吸不利而自覺滿悶若作滿悶治之立危有努力呼吸似喘者此種現狀尤多乃肺之呼吸將停其人努力呼吸以自救若作喘證治之立危有咽乾作渴者有常常呵欠者有肢體痿廢者有食後易飢者有二便不禁者有癃閉身腫者有張口呼氣外出而氣不上達肛門突出者在女子有下血不止者更有經水逆行者證因氣逆者多若因氣陷致經水逆行者曾見有兩人皆投以升陷湯治愈種種病狀實難悉數其案亦不勝録治愈大氣下陷之案略登數則於下以備考徵有兄弟二人其兄年近六旬弟五十餘冬日畏寒共處一小室中熾其煤火復嚴其戶牖至春初二人皆覺胸中滿悶呼吸短氣蓋因戶牖不通外氣屋中氧氣全被煤火著盡胸中大氣既乏氧氣之助又兼受炭氣之傷日久必然虛陷所以呼吸短氣也因自覺滿悶醫者不知病因竟投以開破之藥逮開破益覺滿悶轉以為藥力未到而益開破之數劑之後其兄因誤治竟至不起其弟服藥亦增劇而猶可支持遂延愚診視其脈微弱而遲右部尤甚自言心中發涼少腹下墜作疼呼吸甚覺努力知其胸中大氣下陷已劇遂投以升陷湯升麻改用二錢去知母加乾薑三錢兩劑少腹即不下墜呼吸亦順將方中升麻柴胡桔梗皆改用一錢連服數劑而愈一人年四十八素有喘病薄受外感即發每歲反復兩三次醫者投以小青龍加石膏湯輒效一日反復甚劇大喘晝夜不止醫者投以從前方兩劑分毫無效延愚診視其脈數至六至兼有沉濡之象疑其陰虛不能納氣故氣上逆而作喘也因其脈兼沉濡不敢用降氣之品遂用熟地黃生山藥枸杞玄參大滋真陰之品大劑煎湯送服人參小塊二錢連服三劑喘雖見輕仍不能止復診視時見令人為其椎背言背常發緊椎之則稍輕呼吸亦稍舒暢此時其脈已不數仍然沉濡因細詢此次反復之由言曾努力搬運重物當時即覺氣分不舒遲兩三日遂發喘乃恍悟此證因陰虛不能納氣故難於吸因用力太過大氣下陷故難於呼其呼吸皆須努力故呼吸倍形迫促但用納氣法治之止治其病因之半是以其喘亦止愈其半也遂改用升陷湯方中升麻柴胡桔梗皆不敢用以桂枝尖三錢代之又將知母加倍再加玄參四錢連服數劑全愈按此證雖大氣下陷而初則實兼不納氣也升麻柴胡桔梗雖能升氣實與不納氣之證有礙用之恐其證仍反復惟桂枝性本條達能引臟腑之真氣上行而又善降逆氣仲景苓桂朮甘湯用之以治短氣取其能升真氣也桂枝加桂湯用之以治奔豚取其能降逆氣也且治咳逆上氣吐吸喘也神農本草經原有明文既善升陷又善降逆用於此證之中固有一無二之良藥也或問桂枝一物耳何以既能升陷又能降逆答曰其能升陷者以其枝直上而不下垂且色赤屬火而性又溫也其能降逆者以其味辛得金氣而善平肝木凡逆氣之緣肝而上者逆氣上升者多由於肝桂枝皆能鎮之大抵最良之藥其妙用恆令人不測拙擬參赭鎮氣湯後有單用桂枝治一奇病之案可以參觀一人年二十餘動則作喘時或咳嗽醫治數年病轉增劇皆以為勞疾不可治其脈非微細而指下若不覺其動知其大氣下陷不能鼓脈外出以成起伏之勢也投以升陷湯加人參天冬各三錢連服數劑而愈因其病久俾於原方中減去升麻為末煉蜜作丸藥徐服月餘以善其後一人年二十四胸中滿悶晝夜咳嗽其咳嗽時脅下疼甚診其脈象和平重按微弦無力因其脅疼又兼胸滿疑其氣分不舒少投以理氣之藥為其脈稍弱又以黃耆佐之而咳嗽與滿悶益甚又兼言語聲顫動乃細問病因知其素勤稼穡因感冒懶食猶枵腹力作以致如此據此病因且又服理氣之藥不受其為大氣下陷無疑遂投以升陷湯四劑其病脫然按此證之形狀似甚難辨因初次未細詰問致用藥少有差錯猶幸迷途未遠即能醒悟而病亦旋愈由斯觀之臨證者甚勿自矜明察而不屑瑣瑣細問也一人年四十許失音半載漸覺咽喉發緊且常潰爛畏風惡寒冬日所著衣服至孟夏猶未換飲食減少浸成虛勞多方治療病轉增劇診其脈兩寸微弱毫無軒起之象知其胸中大氣下陷也投以升陷湯加玄參四錢兩劑咽喉即不發緊遂減去升麻又連服十餘劑諸病皆愈西豐縣張年十八九患病數年不愈來院診治其證夜不能寐飲食減少四肢無力常覺短氣其脈關前微弱不起知系胸中大氣下陷故現種種諸證投以升陷湯為其不寐加熟棗仁龍眼肉各四錢數劑全愈奉天於氏女出嫁而孀依居娘門因病還家中夜忽不能言並不能息其同院住者王系愚門生急來院扣門求為援救因素為診脈調藥知其大氣虛損此次之證確知其為大氣下陷遂為疏方用生箭耆一兩當歸四錢升麻二錢煎服須臾即能言語翌晨舁至院中診其脈沉遲微弱其呼吸仍覺短氣遂將原方減升麻一錢又加生山藥知母各三錢柴胡桔梗各一錢連服數劑全愈按此證脈遲而仍用知母者因大氣下陷之脈大抵皆遲非因寒涼而遲也用知母以濟黃耆之熱則藥性和平始能久服無弊奉天袁姓少婦小便處常若火炙有時覺腹中之氣下墜則炙熱益甚診其脈關前微弱關後重按又似有力其呼吸恆覺短氣心中時或發熱知其素有外感伏邪久而化熱又因胸中大氣下陷伏邪亦隨之下陷也治以升陷湯加生石膏八錢後漸加至二兩服藥旬日全愈或疑大氣下陷者氣不上達也喘者氣不下降也何以歷述大氣下陷之病狀竟有努力呼吸有似乎喘者答曰此理不易驟解仍宜以治愈之案證之一人年二十餘因力田勞苦過度致胸中大氣下陷四肢懶動飲食減少自言胸中滿悶其實非滿悶乃短氣也病人不善述病情往往如此醫者不能自審病因投以開胸理氣之劑服之增重又改用半補半破之劑服兩劑後病又增重又延他醫投以桔梗當歸木香各數錢病大見愈蓋全賴桔梗升提氣分之力也醫者不知病愈之由再服時竟將桔梗易為蘇梗升降易性病驟反復自此不敢服藥遲延二十餘日病勢垂危喘不能臥晝夜倚壁而坐假寐片時氣息即停心下突然脹起急呼醒之連連喘息數口氣息始稍續倦極偶臥片時覺腹中重千斤不能轉側且不敢仰臥其脈乍有乍無寸關尺或一部獨見或兩部同見又皆一再動而止此病之危已至極點因確知其為大氣下陷遂放膽投以生箭耆一兩柴胡升麻淨萸肉各二錢煎服片時腹中大響一陳有似昏憒蘇息片時恍然醒悟自此呼吸復常可以安臥轉側輕鬆其六脈皆見仍有雀啄之象自言百病皆除惟覺胸中煩熱遂將方中升麻柴胡皆改用錢半又加知母玄參各六錢服後脈遂復常惟左關三五不調知其氣分之根柢猶未實也遂用野臺參一兩玄參天冬麥冬帶心各三錢兩劑全愈蓋人之胸中大氣實司肺臟之呼吸此證因大氣下陷過甚呼吸之機關將停遂勉強鼓舞肺氣努力呼吸以自救其迫促之形有似乎喘而實與氣逆之喘有天淵之分觀此證假寐片時肺臟不能努力呼吸氣息即無其病情可想也設以治氣逆作喘者治此證之喘以治此證之喘者治氣逆作喘皆凶危立見然欲辨此二證原有確實徵驗凡喘證無論內傷外感其劇者必然肩息內經謂喘而肩上抬者為肩息大氣下陷者雖至呼吸有聲必不肩息蓋肩息者因喘者之吸氣難不肩息者因大氣下陷者之呼氣難也欲辨此證可作呼氣難與吸氣難之狀以默自體驗臨證自無差謬又喘者之脈多數或有浮滑之象或尺弱寸強大氣下陷之脈皆與此成反比例尤其明徵一人年四十許每歲吐血兩三次如此四年似有一年甚於一年之勢其平素常常咳嗽痰涎壅滯動則作喘且覺短氣其脈沉遲微弱右部尤甚知其病源系大氣下陷投以升陷湯加龍骨牡蠣皆不用煅生地黃各六錢又將方中知母改用五錢連服三劑諸病皆愈遂減去升麻又服數劑以善其後或問吐血之證多由於逆氣上干而血隨氣升此證既大氣下陷當有便血溺血之證何以竟吐血乎答曰此證因大氣陷後肺失其養勞嗽不已以致血因嗽甚而吐出也究之胸中大氣與上逆之氣原迥異夫大氣為諸氣之綱領大氣陷後諸氣無所統攝或更易於上干且更有逆氣上幹過甚排擠胸中大氣下陷者案詳參赭鎮氣湯下至便血溺血之證由於大氣下陷者誠有之在婦女更有因之血崩者案詳固沖湯下又轉有因大氣下陷而經血倒行吐血衄血者案詳加味麥門冬湯下是知大氣既陷諸經之氣無所統攝而或上或下錯亂妄行有不能一律論者或問龍骨牡蠣為收澀之品大氣陷者宜升提不宜收澀今方中重用二藥皆至六錢獨不慮其收澀之性有礙大氣之升乎答曰龍骨牡蠣最能攝血之本源此證若但知升其大氣恐血隨升氣之藥復妄動於升陷湯中加此二藥所以兼顧其血也且大氣下陷後慮其耗散有龍骨牡蠣以收斂之轉能輔升陷湯之所不逮況龍骨善化瘀血神農本草經主癥瘕牡蠣善消堅結觀其治瘰癧可知二藥並用能使血之未離經者永安其宅血之已離經者盡化其滯加於升陷湯中以治氣陷兼吐血之證非至穩善之妙藥乎按吐血證最忌升麻此證兼吐血服升陷湯時未將升麻減去者因所加之龍骨牡蠣原可監製之而服藥之時吐血之證猶未反復也若恐升麻有礙血證時亦可減去之多加柴胡一錢一人年四十餘小便不利周身漫腫自腰以下其腫尤甚上焦痰涎杜塞劇時幾不能息咳嗽痰中帶血小便亦有血色遷延半載屢次延醫服藥病轉增劇其脈滑而有力疑是濕熱壅滯詢之果心中發熱遂重用滑石白芍以滲濕清熱佐以柴胡乳香沒藥以宣通氣化為其病久不任疏通每劑藥加生山藥兩許以固氣滋陰又用藥汁送服三七末二錢以清其血分數劑熱退血減痰涎亦少而小便仍不利偶於診脈時見其由臥起坐因稍費力連連喘息十餘口呼吸始順且其脈從前雖然滑實究在沉分此時因火退滑實既減且有濡象恍悟此證確係大氣下陷遂投以升陷湯知母改用六錢又加玄參五錢木通二錢一劑小便即利又服數劑諸病全愈一人年四十七咳嗽短氣大汗如洗晝夜不止心中怔忡病勢危急遣人詢方俾先用山萸肉去淨核二兩煎服以止其汗翌日迎愚診視其脈微弱欲無呼吸略似迫促自言大汗雖止而仍有出汗之時怔忡見輕仍覺短氣知其確係大氣下陷遂投以升陷湯為其有汗加龍骨牡蠣皆不用煅各五錢三劑而愈一婦人年二十餘資稟素羸弱因院中失火驚恐過甚遂覺呼吸短氣心中怔忡食後更覺氣不上達常作太息其脈近和平而右部較沉知其胸中大氣因驚恐下陷內經所謂恐則氣陷也遂投以升陷湯為心中怔忡加龍眼肉五錢連服四劑而愈一婦人年二十餘因境多拂鬱常作惱怒遂覺呼吸短氣咽乾作渴劇時覺氣息將停努力始能呼吸其脈左部如常右部來緩去急分毫不能鼓指內經謂宗氣貫心脈宗氣即大氣也此證蓋因常常惱怒致大氣下陷故不能鼓脈外出以成波瀾也遂投以升陷湯為其作渴將方中知母改用六錢連服三劑病愈強半右脈亦較前有力遂去升麻又服數劑全愈或問內經謂恐則氣陷前案中已發明之然內經又謂怒則氣逆也何以與此案中之理相矛盾乎答曰內經所謂怒則氣逆者指肝膽之氣而言非謂胸中大氣也然肝膽之氣上逆上衝大氣亦上逆者故人當怒急之時恆有頭目眩暈其氣呼出不能吸入移時始能呼吸此因大氣上逆也有肝膽之氣上逆排擠大氣轉下陷者拙擬參赭鎮氣湯下有治驗之案可考也況大氣原賴穀氣養之其人既常惱怒納穀必少大氣即暗受其傷而易下陷也一婦人因臨盆努力過甚産後數日脅下作疼又十餘日更發寒熱其翁知醫投以生化湯兩劑病大見愈遲數日寒熱又作遂延他醫調治以為産後瘀血為恙又兼受寒於活血化瘀藥中重加乾薑數劑後寒熱益甚連連飲水不能解渴時當仲夏身熱如炙又復嚴裹厚被略以展動即覺冷氣侵膚後愚診視左脈沉細欲無右脈沉緊皆有數象知其大氣下陷又為熱藥所傷也其從前服生化湯覺輕者全得芎藭升提之力也治以升陷湯將方中知母改用八錢又加玄參六錢一劑而寒熱已亦不作渴從前兩日不食至此遂能飲食惟脅下微疼繼服拙擬理郁升陷湯二劑全愈按産後雖有實熱若非寒溫外感之熱忌用知母而不忌用玄參以玄參原為治産乳之藥神農本草經有明文也此證雖得之産後時已逾月故敢放膽重用知母或問緊為受寒之脈故傷寒麻黃湯證其脈必緊此證既為熱藥所傷何以其右脈沉緊答曰脈沉緊者其脈沉而有力也夫有力當作洪象此證因大氣下陷雖內有實熱不能鼓脈作起伏之勢故不為洪而為緊且為沉緊也其獨見於右部者以所服乾薑之熱胃先受之也按脈無起伏為弦弦而有力即緊脈也若但弦則為寒矣仲景平脈篇謂雙弦者寒偏弦者飲究之飲為稀涎亦多系因寒而成也一婦人年三十餘得下痿證兩腿痿廢不能屈伸上半身常常自汗胸中短氣少腹下墜小便不利寢不能寐延醫治療數月病勢轉增診其脈細如絲右手尤甚知其系胸中大氣下陷欲為疏方病家疑而問曰大氣下陷之説從前醫者皆未言及然病之本源既為大氣下陷何以有種種諸證乎答曰人之大氣雖在胸中實能統攝全身今因大氣下陷全身無所統攝肢體遂有廢而不舉之處此兩腿之所以痿廢也其自汗者大氣既陷外衛之氣亦虛也其不寐者大氣既陷神魂無所依附也小便不利者三焦之氣化不升則不降上焦不能如霧下焦即不能如瀆也至於胸中短氣少腹下墜又為大氣下陷之明徵也遂治以升陷湯因其自汗加龍骨牡蠣皆不用煅各五錢兩劑汗止腿稍能屈伸諸病亦見愈繼服拙擬理郁升陷湯數劑兩腿漸能著力然痿廢既久病在筋脈非旦夕所能脫然俾用舒筋通脈之品製作丸藥久久服之庶能全愈一婦人年三十許胸中滿悶不能飲食醫者純用開破之藥數劑忽然寒熱脈變為遲醫者見脈遲又兼寒熱方中加黃耆桂枝乾薑各數錢而仍多用破氣之藥購藥未服愚應其鄰家延請適至其村病家求為診視其脈遲而且弱問其呼吸覺短氣乎答曰今於服藥數劑後新添此證知其胸中大氣因服破氣之藥下陷時醫者在座不便另為疏方遂謂醫曰子方中所加之藥極為對證然此時其胸中大氣下陷破氣藥分毫不可再用遂單將所加之黃耆桂枝乾薑煎服寒熱頓已呼吸亦覺暢舒後醫者即方略為加減又服數劑全愈門人高曾治一人年三十餘因枵腹勞力過度致大氣下陷寒熱往來常常短氣大汗淋漓頭疼咽乾畏涼嗜睡遷延日久不能起床醫者誤認為肝氣鬱結投以鱉甲枳實麥芽諸藥病益劇診其脈左寸關尺皆不見右部脈雖見而微弱欲無知其為大氣下陷投以升陷湯加人參三錢一劑左脈即見又將知母改用五錢連服數劑全愈高又治一婦人年三十許胸中短氣常常出汗劇時覺氣不上達即昏不知人移時始蘇睡時恆自驚寤診其脈微弱異常知其胸中大氣下陷甚劇遂投以升陷湯知母改用五錢又加人參萸肉去淨核各三錢連服數劑全愈大氣下陷之證不必皆內傷也外感證亦有之一人年四十許於季春得溫證延醫調治不愈留連兩旬病益沉重後愚診視其兩目清白無火竟昏憒不省人事舌乾如磋卻無舌苔問之亦不能言語周身皆涼其五六呼吸之頃必長出氣一口其脈左右皆微弱至數稍遲此亦胸中大氣下陷也蓋大氣不達於腦中則神昏大氣不潮於舌本則舌乾神昏舌乾故問之不能言也其周身皆涼者大氣陷後不能宣布於營衛也其五六呼吸之頃必長出氣者大氣陷後胸中必覺短氣故太息以舒其氣也遂用野臺參一兩柴胡二錢煎湯灌之一劑見輕兩劑全愈按此證從前原有大熱屢經醫者調治大熱已退精神愈憊醫者諉為不治病家亦以為氣息奄奄待時而已乃遲十餘日而病狀如故始轉念或可挽回而迎愚診視幸投藥不瘥隨手奏效是知藥果對證誠有活人之功也又按此證若不知為大氣下陷見其舌乾如斯但知用熟地阿膠枸杞之類滋其津液其滯泥之性填塞膺胸既陷之大氣將何由上達乎愚願業醫者凡遇氣分不舒之證宜先存一大氣下陷理想以細心體察倘遇此等證庶可挽回人命於頃刻也一人年三十餘於初夏得溫病醫者用涼藥清解之兼用枳實青皮破氣諸品連服七八劑譫語不省人事循衣摸床周身顫動再延他醫以為內風已動辭不治後愚診視其脈五至浮分微弱而重按似有力舌苔微黃周身肌膚不熱知其溫熱之邪隨破氣之藥下陷已深不能外出也遂用生石膏二兩知母野臺參各一兩煎湯兩茶杯分二次溫服自午至暮連進二劑共服藥四次翌日精神清爽能進飲食半日進食五次猶飢而索食看護者不敢復與則周身顫動復發譫語疑其病又反復求再診視其脈象大致和平而浮分仍然微弱恍悟其胸中大氣因服破氣之藥下陷雖用參數次至此猶未盡復故亟亟求助於水穀之氣且胃中之氣因大氣下陷無所統攝或至速於下行而飲食亦因之速下也遂用野臺參兩許佐以麥門冬帶心三錢柴胡二錢煎湯飲下自此遂愈或問子所治大氣下陷證有兩日不食者有飲食減少者此證亦大氣下陷何以轉能多食答曰事有常變病亦有常變王清任醫林改錯載有所治胸中瘀血二案一則胸不能著物一則非以物重壓其胸不安皆治以血腑逐瘀湯而愈夫同一胸中瘀血其病狀竟若斯懸殊故同一大氣之下陷也其脾胃若因大氣下陷而運化之力減者必然少食若大氣下陷脾胃之氣亦欲陷者或轉至多食曾治一少婦忽然飲食甚多一時覺飢不食即心中怔忡醫者以為中消證屢治不效向愚詢方疑其胸中大氣下陷為開升陷湯方加龍骨牡蠣皆不用煅各五錢數劑而愈蓋病因雖同而病之情狀恆因人之資稟不同而有變易斯在臨證者細心體察耳按此證與前證雖皆大氣下陷而實在寒溫之餘故方中不用黃耆而用人參因寒溫之熱最能鑠耗津液人參能補氣兼能生津液是以傷寒論方中凡氣虛者皆用人參而不用黃耆也上所列者皆大氣下陷治驗之案也然此證為醫者誤治及失於不治者甚多略登數則於下以為炯戒庚戍秋在滄州治病有趙姓忽過訪言有疑事欲質諸先生問何疑曰豫妹半月前來歸寧數日間無病而亡未知何故愚曰此必有病子蓋未知耳曰其前一日覺咽喉發悶診其脈沉細疑其胸有鬱氣俾用開氣之藥一劑翌日不覺輕重惟自言不再服藥斯夕即安坐床上而逝其咽喉中發悶並不甚劇故曰無病也愚曰此胸中大氣下陷耳時行篋中有治大氣下陷諸案因出示之且為剖析其理泫然流涕曰斯誠為藥誤矣一人年三十餘呼吸短氣胸中滿悶醫者投以理氣之品似覺稍輕醫者以為藥病相投第二劑遂放膽開破其氣分晚間服藥至夜如廁便後遂不能起看護者扶持至床上昏昏似睡呼之不應須臾張口呼氣外出若呵欠之狀如斯者日余而亡後其兄向愚述之且問此果何病因歷舉大氣下陷之理告之其兄連連太息既自悔擇醫不慎又痛恨醫者誤人以後不敢輕於延醫服藥一農家媼年五十餘因麥秋農家忙甚井臼之事皆自任之漸覺呼吸不利氣息迫促醫者誤認為氣逆作喘屢投以納氣降氣之藥氣息遂大形迫促其努力呼吸之聲直聞戶外延愚診視及至診其脈左右皆無勉為疏方取藥未至而亡此亦大氣下陷也其氣息之迫促乃肺之呼吸將停努力呼吸以自救也醫者又復用藥降下其氣何其謬哉一諸生年五十六為學校教員每講説後即覺短氣向愚詢方愚曰此胸中大氣虛而欲陷為至緊要之證當多服升補氣分之藥彼欲用燒酒燉藥謂朝夕服之甚便愚曰如此亦可然必須將藥燉濃多飲且常飲耳遂為疏方用生黃耆四兩野臺參二兩柴胡桔梗各八錢先用黃酒斤許煎藥十餘沸再用燒酒二斤同貯瓶中置甑中燉開每飯前飲之旬日而愈後因病愈置不復飲隔年一日步行二里許自校至家似有氣息迫促之狀不能言語倏忽而亡蓋其身體素胖艱於行步胸中大氣素有欲陷之機因行動勞苦而遂下陷此誠內經所謂大氣入於臟腑不病而猝死者也方書有氣厥中氣諸名目大抵皆大氣下陷之證特未窺內經之旨而妄為議論耳按內經原有氣厥二字乃謂氣厥逆上行非後世所謂氣厥也或問案中所載大氣下陷證病因及其病狀皆瞭如指掌矣然其脈之現象或見於左部或見於右部或左右兩部皆有現象可徵且其脈多遲而又間有數者同一大氣之下陷也何以其脈若是不同乎答曰胸中大氣包舉肺外原與肺有密切之關係肺之脈診在右部故大氣下陷右部之脈多微弱者其常也然人之元氣自腎達肝自肝達於胸中為大氣之根本其人或肝腎素虛或服破肝氣之藥太過其左脈或即更形微弱若案中左部寸關尺皆不見左脈沉細欲無左關參伍不調者是也至其脈多遲而又間有數者或因陰分虛損或兼外感之熱或為熱藥所傷乃兼證之現脈非大氣下陷之本脈也或問李東垣補中益氣湯所治之證若身熱惡寒心煩懶言或喘或渴或陽虛自汗子所治大氣下陷案中類皆有之至其內傷外感之辨謂內傷則短氣不足以息尤為大氣下陷之明徵至其方中所用之藥又與子之升陷湯相似何以其方名為補中益氣但治中氣之虛陷而不言升補大氣乎答曰大氣之名雖見於內經然素問中所言之大氣乃指外感之邪氣而言非胸中之大氣也至靈樞所言雖系胸中大氣而從來讀內經者恆目靈樞為針經而不甚注意即王氏注內經亦但注素問而不注靈樞後人為其不易索解則更廢而不讀至仲景傷寒金匱兩書惟金匱水氣門有大氣一轉其氣乃散之語他如難經千金外臺諸書並未言及大氣是以東垣於大氣下陷證亦多誤認為中氣下陷故方中用白朮以健補脾胃而後來之調補脾胃者皆以東垣為法夫中氣誠有下陷之時然不若大氣下陷之尤屬危險也間有因中氣下陷泄瀉日久或轉致大氣下陷者可仿補中益氣湯之意於拙擬升陷湯中去知母加白朮數錢若但大氣下陷而中氣不下陷者白朮亦可不用恐其氣分或有鬱結而耆術並用易生脹滿也按補中益氣湯所治之喘證即大氣下陷者之努力呼吸也若果系真喘桔梗尚不宜用況升麻乎愚少時觀東垣書至此心嘗疑之後明大氣下陷之理始覺豁然而究嫌其立言欠妥設醫者真以為補中益氣湯果能治喘而於氣機上逆之真喘亦用之豈不足僨事乎此有關性命之處臨證者當審辨之附録直隸青縣張來函湖北韓妻年六旬素多肝鬱浸至胸中大氣下陷其氣短不足以息因而努力呼吸有似乎喘喉干作渴心中滿悶怔忡其脈甚沉微知其胸中大氣下陷過甚肺中呼吸幾有將停之勢非投以升陷湯以升補其大氣不可為録出原方遵注大氣陷之甚者將升麻加倍服一劑後吐出黏涎數碗胸中頓覺舒暢又於方中加半夏陳皮連服三劑病遂霍然蓋此證因大氣下陷其胸肺胃脘無大氣以斡旋之約皆積有痰涎逮服藥後大氣來復故能運轉痰涎外出此金匱水氣門所謂大氣一轉其氣水氣即痰涎乃散也後大氣下陷證數見不鮮莫不用升陷湯加減治愈河北省淪縣張來函族嬸母年四十餘歲身體素弱因境遇不順又多抑鬱癸亥十月下旬忽患頭疼甚劇已三日矣族叔來舍俾生往診及至聞呻吟不已臥床不起言已針過百會及太陽兩處均未見效其左脈微細如絲按之即無右脈亦無力自言氣息不接胸悶不暢不思飲食自覺精神恍惚似難支持知其胸中之大氣下陷也其頭疼者因大氣陷後有他經之逆氣乘虛上干也遵用升陷湯原方升提其下陷之大氣連服數劑全愈四川涇南周來函程姓男孩年五歲乳哺不足脫肛近四載醫不能治其面白神疲身體孱弱大腸墜出二寸許用手塞入旋又墜出其脈濡弱無力呼吸促短狀若不能接續知其胸中大氣下陷下焦之氣化因之不能固攝也仿用升陷湯方用生箭耆四錢知母二錢桔梗柴胡升麻各一錢潞參淨萸肉各三錢煎湯一盅分兩次溫飲下連服二劑肛即收縮乃減去升麻再服三劑全愈直隸唐山張來函之內以其夫病勢沉重深恐難起憂慮成疾心內動悸痞塞短氣醫者以為痰鬱用二陳湯加減清之病益加劇因鑑其父為藥所誤其父因下痢十餘日醫用大黃四錢降之覆杯而卒遂停藥不敢服此際愚正在城中為其夫調治余病俟愚來家求診見其滿面油光兩手尺寸之脈皆極沉惟關脈堅而有力愚曰此乃胸中大氣下陷何醫者不明如是而用清痰之二陳也今兩關脈之堅弦乃彼用藥推蕩之力診際大氣一陷遂全身一戰冷汗滿額心即連次跳動十餘次遂用升陷湯再仿逍遙散炙甘草湯之意提其下陷之氣散其中宮之滯並以交其心腎一劑而三部平大氣固嗣因尺中太微而理氣藥及升柴等藥皆不敢用遂按治大氣下陷方之意及治虛勞之法精心消息調治而愈安徽績溪章來函有馮務農而家小康其母章氏年正八秩體豐善飯一日忽覺左手麻痹漸至不能持碗越朝方食麵餅倏然僵厥坐向下墮肢冷額汗氣息僅屬人皆以為猝中也聚商救治自午至晡逐見危殆來請吾為籌挽救簡方以老人素不服藥且口噤鼻塞恐藥汁亦難下咽耳吾意謂年老久厥詎能回陽姑囑以紅靈丹少許吹鼻中倘嚏氣能宣通再議用藥乃藥甫入而嚏作似漸蘇醒然呼吸甚微如一線遊絲恐風吹斷先按口鼻溫度甚低音在喉中猶言誓不服藥診其脈則沉微察其瞳亦渙散遂確定為大氣下陷但值耄年勢難遽投重峻之劑爰照升陷湯方而小其劑用生箭耆一錢五分知母八分淨萸肉一錢柴胡四分升麻三分煎服須臾即漸有轉機續進兩劑逐次平復繼俾服潞黨參每日二錢加五味子五粒廣陳皮少許頻飲代茶今春見之較未病前更倍康強矣山東德州盧來函五家嫂及內子兩人系因家務心力煎勞自覺無日不病者五家嫂怔忡異常每犯此病必數日不能起床須人重按其心終日面目虛浮無病不有而內子則不但怔忡寒熱往來少腹重墜自汗盜汗亦無定時面目手足及右腿無日不腫而兩人丸藥日不離口不但無效更漸加劇後侄查大氣下陷一切方案確知兩人皆系大氣下陷無疑服升陷湯數劑並加滋補之味而各病若失現今均健壯如常矣直隸鹽山孫來函一九二六年冬河東友人翟之母乳部生瘡疼痛難忍同事王約往診視翟言昨日請醫診治服藥一劑亦不覺如何惟言誓不再服彼醫方藥生診視時其脈左關弦硬右寸獨微弱口不能言氣息甚微病勢已危險萬分生斷為年高因病瘡大氣下陷為開升陷湯以升舉其氣又加連翹丹參諸藥以理其瘡一劑能言病人喜甚非按原方再服一劑不可後生又診數次即方略為加減數服全愈後遇此證數次亦皆用升陷湯加減治愈奉天桓仁縣閻來函客歲家慈得大氣下陷證吾以向未行醫未敢率爾用藥遂聘本縣名流再三診治終無效驗遲至今歲正月初二日氣息奄奄迫不及待遂急用升陷湯遵方後所注更番增減按證投藥數月沉疴數日全愈江蘇平臺王來函一婦人産後乳上生癰腫疼殊甚延西醫治不效繼延吾診治其膿已成用針刺之出膿甚多第二日已眠食俱安矣至第三日忽神昏不食並頭疼其母曰此昨日受風寒以致如此診其脈微細若無身無寒熱心跳少腹微疼知非外感當系胸中大氣下陷投以升陷湯兩劑全愈回陽升陷湯治心肺陽虛大氣又下陷者其人心冷背緊惡寒常覺短氣生黃耆八錢乾薑六錢當歸身四錢桂枝尖三錢甘草一錢周身之熱力借心肺之陽為之宣通心肺之陽尤賴胸中大氣為之保護大氣一陷則心肺陽分素虛者至此而益虛欲助心肺之陽不知升下陷之大氣雖日服熱藥無功也或問心臟屬火西人亦謂周身熱力皆發於心其能宣通周身之熱宜矣今論周身熱力不足何以謂心肺之陽皆虛答曰肺與心同居膈上左心房之血脈管右心房之回血管皆與肺循環相通二臟之宣通熱力原有相助為理之妙然必有大氣以斡旋之其功用始彰耳按喻嘉言醫門法律最推重心肺之陽謂心肺陽旺則陰分之火自然潛伏至陳修園推廣其説謂心肺之陽下濟大能溫暖脾胃消化痰飲皆確論也一童子年十三四心身俱覺寒涼飲食不化常常短氣無論服何熱藥皆分毫不覺熱其脈微弱而遲右部兼沉知其心肺陽分虛損大氣又下陷也為制此湯服五劑短氣已愈身心亦不若從前之寒涼遂減桂枝之半又服數劑全愈俾停藥日服生硫黃分許以善其後一人年五十餘大怒之後下痢月餘始愈自此胸中常覺滿悶飲食不能消化數次延醫服藥不外通利氣分之品即間有溫補脾胃者亦必雜以破氣之藥愈服病愈增重後愚診視其脈沉細微弱至數甚遲詢其心中常有覺涼之時知其胸中大氣下陷兼上焦陽分虛損也遂投以此湯十劑全愈後因怒病又反復醫者即愚方加厚朴二錢服後少腹下墜作疼徹夜不能寐復求為診治仍投以原方而愈趙姓媼年近五旬忽然昏倒不語呼吸之氣大有滯礙幾不能息其脈微弱而遲詢其生平身體羸弱甚畏寒涼恆覺胸中滿悶且時常短氣即其素日資稟及現時病狀以互戡病情其為大氣下陷兼寒飲結胸無疑然此時形勢將成痰厥住在鄉村取藥無及遂急用胡椒二錢搗碎煎兩三沸澄取清湯灌下須臾胸中作響呼吸頓形順利繼用乾薑八錢煎湯一盅此時已自能飲下須臾氣息益順精神亦略清爽而仍不能言且時作呵欠十餘呼吸之頃必發太息知其寒飲雖開大氣之陷者猶未復也遂投以拙擬回陽升陷湯服數劑呵欠與太息皆愈漸能言語按此證初次單用乾薑開其寒飲而不敢佐以赭朴諸藥以降下之者以其寒飲結胸又兼大氣下陷也設若辨證不清而誤用之必至凶危立見此審證之當細心也理郁升陷湯治胸中大氣下陷又兼氣分鬱結經絡湮淤者生黃耆六錢知母三錢當歸身三錢桂枝尖錢半柴胡錢半乳香三錢不去油沒藥三錢不去油脅下撑脹或兼疼者加龍骨牡蠣皆不用煅各五錢少腹下墜者加升麻一錢一婦人年三十許胸中滿悶時或作疼鼻息發熱常常作渴自言得之産後數日勞力過度其脈遲而無力籌思再三莫得病之端緒姑以生山藥一兩滋其津液雞內金二錢陳皮一錢理其疼悶服後忽發寒熱再診其脈無力更甚知其氣分鬱結又下陷也遂為制此湯一劑諸病皆覺輕又服四劑全愈一少女年十五臍下左邊起一癥瘕沉沉下墜作疼上連腰際亦下墜作疼楚時發呻吟劇時常覺小便不通而非不通也診其脈細小而沉詢其得病之由言因小便不利便時努力過甚其初腰際墜疼後遂結此癥瘕其方結時揉之猶軟今已五閲月其患處愈堅結每日晚四點鐘疼即增重至早四點鐘又漸覺輕愚聞此病因再以脈象參之知其小便時努力過甚上焦之氣陷至下焦而鬱結也遂治以理郁升陷湯方中乳香沒藥皆改用四錢又加丹參三錢升麻錢半二劑而墜與疼皆愈遂去升麻用藥汁送服朱血竭末錢許連服數劑癥瘕亦消或問龍骨牡蠣為收澀之品兼脅下脹疼者何以加此二藥答曰脅為肝之部位脅下脹疼者肝氣之橫恣也原當用瀉肝之藥又恐與大氣下陷者不宜用龍骨牡蠣以斂戢肝火肝氣自不至橫恣此斂之即以瀉之古人治肝之妙術也且黃耆有膨脹之力脹疼者原不宜用有龍骨牡蠣之收斂以縮其膨脹之力可放膽用之無礙此又從體驗而知道也嘗治一少婦經水兩月不見寒熱往來脅下作疼脈甚微弱而數至六至詢之常常短氣投以理郁升陷湯加龍骨牡蠣各五錢為脈數又加玄參生地白芍各數錢連服四劑覺脅下開通瘀血下行色紫黑自此經水調順諸病皆愈蓋龍骨牡蠣性雖收澀而實有開通之力神農本草經謂龍骨消癥瘕而又有牡蠣之咸能軟堅者以輔之所以有此捷效也醒脾升陷湯治脾氣虛極下陷小便不禁生箭耆四錢白朮四錢桑寄生三錢川續斷三錢萸肉四錢去淨核龍骨四錢煅搗牡蠣四錢煅搗川萆薢二錢甘草二錢蜜炙內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱是脾也者原位居中焦為水飲上達下輸之樞機樞機不旺則不待上達而即下輸此小便之所以不禁也然水飲降下之路不一內經又謂肝熱病者小便先黃又謂肝壅兩胠脅也滿臥則驚悸不得小便且芍藥為理肝之主藥而善利小便由斯觀之是水飲又由胃入肝而下達膀胱也至胃中所餘水飲傳至小腸滲出此又人所共知故方中用黃耆白朮甘草以升補脾氣即用黃耆同寄生續斷以升補肝氣更用龍骨牡蠣萸肉萆薢以固澀小腸也又人之胸中大氣旺自能吸攝全身氣化不使下陷黃耆與寄生並用又為填補大氣之要藥也或問黃耆為補肺脾之藥今謂其能補肝氣何也答曰肝屬木而應春令其氣溫而性喜條達黃耆性溫而升以之補肝原有同氣相求之妙用愚自臨證以來凡遇肝氣虛弱不能條達一切補肝之藥不效者重用黃耆為主而少佐以理氣之品服之覆杯之頃即見效驗治驗詳黃耆解是知謂肝虛無補法者非見道之言也或問神農本草經謂桑寄生能治腰疼堅齒髮長鬚眉是當為補肝腎之藥而謂其能補胸中大氣何也答曰寄生根不著土寄生樹上最善吸空中之氣以自滋生故其所含之氣化實與胸中大氣為同類嘗見有以補肝腎而多服久服胸中恆覺滿悶無他因其胸中大氣不虛故不受寄生之補也且神農本草經不又謂其治癰腫乎然癰腫初起服之必無效惟癰腫潰後生肌不速則用之甚效如此而言又與黃耆之主癰疽敗證者相同則其性近黃耆更可知矣或問萆薢世醫多用以治淋夫淋以通利為主蓋取萆薢能利小便也此方中用之以固小便其性果固小便乎抑利小便乎答曰萆薢為固澀下焦之要藥其能治失溺名醫別録原有明文時醫因古方有萆解分清飲遂誤認萆薢為利小便之要藥而於小便不利淋澀諸證多用之嘗見有以利小便而小便轉癃閉者以治淋證竟致小便滴瀝不通者其誤人可勝道哉蓋萆薢分清飲之君萆薢原治小便頻數溺出旋白如油乃下焦虛寒氣化不固之證觀其佐以縮小便之益智溫下焦之烏藥其用意可知特當日命名時少欠斟酌遂致庸俗醫輩錯有會心貽害無窮可不慎哉四治喘息方參赭鎮氣湯治陰陽兩虛喘逆迫促有將脫之勢亦治腎虛不攝沖氣上干致胃氣不降作滿悶野臺參四錢生赭石六錢軋細生芡實五錢生山藥五錢萸肉六錢去淨核生龍骨六錢搗細生牡蠣六錢搗細生杭芍四錢蘇子二錢炒搗生赭石壓力最勝能鎮胃氣衝氣上逆開胸膈墜痰涎止嘔吐通燥結用之得當誠有捷效虛者可與人參同用仲景旋覆代赭石湯赭石人參並用治傷寒發汗若吐若下解後心下痞硬噫氣不除者參赭鎮氣湯中人參借赭石下行之力挽回將脫之元氣以鎮安奠定之亦旋覆代赭石湯之義也一婦人年三十餘勞心之後兼以傷心忽喘逆大作迫促異常其翁知醫以補斂元氣之藥治之覺胸中窒礙不能容受更他醫以為外感投以小劑青龍湯喘益甚延愚診視其脈浮而微數按之即無知為陰陽兩虛之證蓋陽虛則元氣不能自攝陰虛而肝腎又不能納氣故作喘也為制此湯病人服藥後未及覆杯曰吾有命矣詢之曰從前呼吸惟在喉間幾欲脫去今則轉落丹田矣果一劑病愈強半又服數劑全愈一婦人年二十餘因與其夫反目怒吞鴉片已經救愈忽發喘逆迫促異常須臾又呼吸頓停氣息全無約十餘呼吸之頃手足亂動似有蓄極之勢而喘復如故若是循環不已勢近垂危延醫數人皆不知為何病後愚診視其脈左關弦硬右寸無力精思良久恍然悟曰此必怒激肝膽之火上衝胃氣夫胃氣本下行者也因肝膽之火沖之轉而上逆並迫肺氣亦上逆此喘逆迫促所由來也逆氣上干填塞胸膈排擠胸中大氣使之下陷夫肺懸胸中須臾無大氣包舉之即須臾不能呼吸此呼吸頓停所由來也此理參觀升陷湯後跋語方明逮大氣蓄極而通仍上達胸膈鼓動肺臟使得呼吸逆氣遂仍得施其擊撞此又病勢之所以循環也神農本草經載桂枝主上氣咳逆結氣喉痹吐吸吸不歸根即吐出其能降逆氣可知其性溫而條達能降逆氣又能升大氣可知遂單用桂枝尖三錢煎湯飲下須臾氣息調和如常夫以桂枝一物之微而升陷降逆兩擅其功以挽回人命於頃刻誠天之生斯使獨也然非親自經驗者又孰信其神妙如是哉繼用參赭鎮氣湯去山藥蘇子加桂枝尖三錢知母四錢連服數劑病不再發此喘證之特異者故附記於此附録直隸青縣張來函定縣吳妻病服藥罔效弟診其脈浮而無力胸次鬱結如有物杜塞飲食至胃間恆覺燒熱不下仿參赭鎮氣湯之義用野臺參六錢赭石細末二兩將二藥煎服胸次即覺開通服至二劑飲食下行無礙因其大便猶燥再用當歸肉蓯蓉各四錢俾煎服病若失安徽績溪章來函洪年五十餘家素貧苦曾吸鴉片戒未多年由咳而成喘疾勉強操勞每屆冬令則加劇然病發時亦往往不服藥而自愈茲次發喘初由外感兼發熱頭痛醫者投以二活防葛大劑表散遂汗出二日不止喘逆上衝不能平臥胸痞腹脹大便旬余未行語不接氣時或瘛瘲種種見證已瀕極險診其脈微細不起形狀頽敗殊甚詳細勘視誠將有陰陽脫離之虞適日前閲赭石解記其主治揣之頗合但恐其性太重鎮而正氣將隨以下陷也再四躊躇因配以真潞黨參生懷山藥野茯神淨萸肉廣桔紅京半夏龍骨牡蠣蘇子蒡子等皆屬按證而擬竟與參赭鎮氣湯大致相同一劑病愈大半兩劑即扶杖起行三劑則康復如恆矣前月遇之自言冬不知寒至春亦未反復薯蕷納氣湯治陰虛不納氣作喘逆生山藥一兩大熟地五錢萸肉五錢去淨核柿霜餅四錢沖服生杭芍四錢牛蒡子二錢炒搗蘇子二錢炒搗甘草二錢蜜炙生龍骨五錢搗細前方治陰陽兩虛作喘此方乃專治陰虛作喘者也方書謂肝腎虛者其人即不能納氣此言亦近理然須細為剖析空氣中有氧氣乃養物之生氣也人之肺臟下無透竅而吸入之養氣實能隔肺胞息息透過以下達腹中充養周身肝腎居於腹中其氣化收斂不至膨脹自能容納下達之氣且能導引使之歸根有時腎虛氣化不攝則上注其氣於沖以衝下連腎也夫沖為血海實亦主氣今因為腎氣貫注則沖氣又必上逆於胃以衝上連胃也由是沖氣兼挾胃氣上逆並迫肺氣亦上逆矣此喘之所由來也又內經謂肝主疏泄腎主閉藏夫肝之疏泄原以濟腎之閉藏故二便之通行相火之萌動皆與肝氣有關方書所以有肝行腎氣之説今因腎失其閉藏之性肝遂不能疏泄腎氣使之下行更迫於腎氣之膨脹轉而上逆由斯其逆氣可由肝系直透膈上亦能迫肺氣上逆矣此又喘之所由來也方中用地黃山藥以補腎萸肉龍骨補肝即以斂腎芍藥甘草甘苦化陰合之柿霜之涼潤多液均為養陰之妙品蘇子牛蒡又能清痰降逆使逆氣轉而下行即能引藥力速於下達也至方名薯蕷納氣湯者因山藥補腎兼能補肺且饒有收斂之力其治喘之功最弘也或問養氣雖能隔肺胞透過亦甚屬些些無多何以當吸氣內入之時全腹皆有膨脹之勢答曰若明此理益知所以致喘之由人之臟腑皆賴氣以撑懸是以膈上有大氣司肺呼吸者也膈下有中氣保合脾胃者也臍下有元氣固性命之根蒂者也當吸氣入肺之時肺胞膨脹之力能鼓舞諸氣節節運動下移而周身之氣化遂因之而流通且喉管之分支下連心肝以通於奇經諸脈當吸氣內入之時所吸之氣原可由喉管之分支下達以與肺中所吸之氣相助為理也下焦肝腎奇經與腎相維繫屬陰陰虛氣化不攝則內氣膨脹遂致吸入之氣不能容受而急於呼出此陰虛者所以不納氣而作喘也滋培湯治虛勞喘逆飲食減少或兼咳嗽並治一切陰虛羸弱諸證生山藥一兩於術三錢炒廣陳皮二錢牛蒡子二錢炒搗生杭芍三錢玄參三錢生赭石三錢軋細炙甘草二錢痰鬱肺竅則作喘腎虛不納氣亦作喘是以論喘者恆責之肺腎二臟未有責之於脾胃者不知胃氣宜息息下行有時不下行而轉上逆並迫肺氣亦上逆即可作喘脾體中空能容納諸回血管之血運化中焦之氣以為氣血寬間之地有時失其中空之體或變為緊縮或變為脹大以致壅激氣血上逆迫肺亦可作喘且脾脈緩大為太陰濕土之正象虛勞喘嗽者脈多弦數與緩大之脈反對乃脾土之病脈也故重用山藥以滋脾之陰佐以於術以理脾之陽脾臟之陰陽調和自無或緊縮或漲大之虞特是脾與胃臟腑相依凡補脾之藥皆能補胃而究之臟腑異用脾以健運磨積宣通津液為主胃以熟腐水穀傳送糟粕為主若但服補藥壅滯其傳送下行之機胃氣或易於上逆故又宜以降胃之藥佐之方中之赭石陳皮牛蒡是也且此數藥之性皆能清痰涎利肺氣與山藥玄參並用又為養肺止嗽之要品也用甘草白芍者取其甘苦化合大有益於脾胃兼能滋補陰分也並治一切虛勞諸證者誠以脾胃健壯飲食增多自能運化精微以培養氣血也一人年二十二喘逆甚劇脈數至七至用一切治喘藥皆不效為制此方將藥煎成因喘劇不能服溫湯三次始服下一劑見輕又服數劑全愈或問藥之健脾胃者多不能滋陰分能滋陰分者多不能健脾胃此方中芍藥甘草同用何以謂能兼此二長答曰神農本草經謂芍藥味苦後世本草謂芍藥味酸究之芍藥之味苦酸皆有陳修園篤信神農本草經謂芍藥但苦不酸然嚼服芍藥錢許恆至齼齒兼有酸味可知若取其苦味與甘草相合有甘苦化陰之妙甘苦化陰説始於葉天士故能滋陰分若取其酸味與甘草相合有甲己化土之妙甲木味酸己土味甘故能益脾胃此皆取其化出之性以為用也又陳修園曰芍藥苦平破滯本瀉藥非補藥也若與甘草同用則為滋陰之品與生薑大棗桂枝同用則為和營衛之品與附子乾薑同用則能收斂元陽歸根於陰又為補腎之品本非補藥昔賢往往取為補藥之主其旨微矣按此論甚精能示人用藥變化之妙故連類及之西人謂心有病可以纍肺作喘此説誠信而有徵蓋喘者之脈多數夫脈之原動力發於心脈動數則心動亦數可知心左房之赤血與右房之紫血皆與肺循環相通若心動太急逼血之力過於常度則肺臟呼吸亦因之速過常度此自然之理也然心與腎為對待之體心動若是之急數腎之真陰不能上潮以靖安心陽可知由是言之心纍肺作喘之證亦即腎虛不納氣之證也西人又謂喘證因肺中小氣管痰結塞住忽然收縮氣不通行呼吸短促得痰出乃減有日日發作者又數日或因辛苦寒冷而發作者又有因父母患此病傳延者發作時苦劇不安醫治無良法應用紙浸火硝水內取出曬乾置盆內燃點乘煙焰熏騰時以口吸養氣入肺火硝多含養氣或用醉仙桃干葉當煙吸之內服樟腦鴉片酒一二錢更加薑末一分半白礬七釐共為散水調服雖未必能除根亦可漸輕按此證乃勞疾之傷肺者當名為肺勞雖發作時甚劇仍可久延歲月其治法當用拙擬黃耆膏肺勞之證因肺中分支細管多有瘀滯熱時肺胞松客氣化猶可宣通故病則覺輕冷時肺胞緊縮其痰涎恆益杜塞故病則加重此乃肺部之錮疾自古無必效之方惟用曼陀羅熬膏和以理肺諸藥則多能治愈爰將其方詳開於下曼陀羅正開花時將其全科切碎榨取原汁四兩入鍋內熬至若稠米湯再加入硼砂二兩熬至融化再用遠志細末甘草細末各四兩生石膏細末六兩以所熬之膏和之以適可為丸為度分作小丸每服錢半若不效可多至二錢白湯送下一日兩次久服病可除根若服之覺熱者石膏宜加重肺臟具闟闢之機其闟闢之機自如自無肺勞病證遠志硼砂最善化肺管之瘀甘草末服不經火炙水煮亦善宣通肺中氣化此所以助肺臟之闢也曼陀羅膏大有收斂之力此所以助肺臟之闟也用石膏者因曼陀羅之性甚熱石膏能解其熱也且遠志甘草硼砂皆為養肺之品能多生津液融化痰涎俾肺臟闟闢之機靈活無滯則肺勞之喘嗽自愈也按醉仙桃即曼陀羅花也其花白色狀類牽牛而大其葉大如掌而有尖結實大如核桃實蒂有托盤如錢皮有芒刺如包麻中含細粒如火麻仁渤海之濱生殖甚多俗呼為洋金花李時珍謂服之令人昏昏如醉可作麻藥又謂熬水洗脫肛甚效蓋大有收斂之功也西人藥學謂用醉仙桃花實葉俱要鮮者榨汁或熬干或曬乾作膏每服三釐能補火止疼令人熟睡善療喘嗽正與時珍之説相似然此物有毒不可輕用今人治勞喘者多有取其花與葉作煙吸之者實有目前捷效較服其膏為妥善也五治痰飲方理飲湯治因心肺陽虛致脾濕不升胃郁不降飲食不能運化精微變為飲邪停於胃口為滿悶溢於膈上為短氣漬滿肺竅為喘促滯膩咽喉為咳吐黏涎甚或陰霾布滿上焦心肺之陽不能暢舒轉鬱而作熱或陰氣逼陽外出為身熱迫陽氣上浮為耳聾然必診其脈確乎弦遲細弱者方能投以此湯於朮四錢乾薑五錢桂枝尖二錢炙甘草二錢茯苓片二錢生杭芍二錢桔紅錢半川厚朴錢半服數劑後飲雖開通而氣分若不足者酌加生黃耆數錢方中用桂枝乾薑以助心肺之陽而宣通之白朮茯苓甘草以理脾胃之濕而淡滲之茯苓甘草同用最瀉濕滿用厚朴者葉天士謂厚朴多用則破氣少用則通陽欲借溫通之性使胃中陽通氣降運水穀速於下行也用桔紅者助白朮茯苓甘草以利痰飲也至白芍若取其苦平之性可防熱藥之上僭平者主降若取其酸斂之性可制虛火之浮遊神農本草經謂芍藥苦平後世謂芍藥酸斂其味實苦而微酸且藥之熱者宜於脾胃恐不宜於肝膽又取其涼潤之性善滋肝膽之陰即預防肝膽之熱也況其善利小便小便利而痰飲自減乎一婦人年四十許胸中常覺滿悶發熱或旬日或浹辰之間必大喘一兩日醫者用清火理氣之藥初服稍效久服轉增劇後愚診視脈沉細幾不可見病家問系何病因愚曰此乃心肺陽虛不能宣通脾胃以致多生痰飲也人之脾胃屬土若地輿然心肺居臨其上正當太陽部位膈上屬太陽觀傷寒論太陽篇自知其陽氣宣通若日麗中天暖光下照而胃中所納水穀實借其陽氣宣通之力以運化精微而生氣血傳送渣滓而為二便清升濁降痰飲何由而生惟心肺陽虛不能如離照當空脾胃即不能借其宣通之力以運化傳送於是飲食停滯胃口若大雨之後陰霧連旬遍地汙淖不能幹滲則痰飲生矣痰飲既生日積月纍鬱滿上焦則作悶漬滿肺竅則作喘阻遏心肺陽氣不能四布則作熱醫者不識病源猶用涼藥清之勿怪其久而增劇也遂為制此湯服之一劑心中熱去數劑後轉覺涼甚遂去白芍連服二十餘劑胸次豁然喘不再發一婦人年三十許身形素豐胸中痰涎鬱結若礙飲食上焦時覺煩熱偶服礞石滾痰丸有效遂日日服之初則飲食加多繼則飲食漸減後則一日不服即不能進飲食又久服之竟分毫無效日僅一餐進食少許猶不能消化且時覺熱氣上騰耳鳴欲聾始疑藥不對證求愚診治其脈象浮大按之甚軟愚曰此證心肺陽虛脾胃氣弱為服苦寒攻瀉之藥太過故病證脈象如斯也擬治以理飲湯病家謂從前醫者少用桂附即不能容受恐難再用熱藥愚曰桂附原非正治心肺脾胃之藥況又些些用之病重藥輕宜其不受若拙擬理飲湯與此證針芥相投服之必無他變若畏此藥不敢輕服單用乾薑五錢試服亦可病家依愚言煎服乾薑後耳鳴即止須臾覺胸次開通繼投以理飲湯服數劑心中亦覺涼甚將乾薑改用一兩又服二十餘劑病遂除根一婦人年四十許上焦滿悶煩躁思食涼物而偶食之則滿悶益甚且又黎明泄瀉日久不愈滿悶益甚將成臌脹屢次延醫服藥多投以半補半破之劑或佐以清涼或佐以收澀皆分毫無效後愚診視脈象弦細而遲知系寒飲結胸阻塞氣化欲投以理飲湯病家聞而遲疑似不敢服亦俾先煎乾薑數錢服之胸中煩躁頓除為其黎明泄瀉遂將理飲湯去厚朴白芍加生雞內金錢半補骨脂三錢連服十餘劑諸病皆愈一婦人年近五旬常覺短氣飲食減少屢次延醫服藥或投以宣通或投以升散或投以健補脾胃兼理氣之品皆分毫無效浸至飲食日減羸弱不起奄奄一息病家亦以為不治之證矣後聞愚在其鄰村屢救危險之證復延愚診視其脈弦細欲無頻吐稀涎詢其心中言覺有物杜塞胃口氣不上達知其為寒飲凝結也遂投以理飲湯方中乾薑改用七錢連服三劑胃口開通又覺呼吸無力遂於方中加生黃耆三錢連服十餘劑病全愈方書謂飲為水之所結痰為火之所凝是謂飲涼而痰熱也究之飲證亦自分涼熱其熱者多由於憂思過度甚則或至癲狂雖有飲而恆不外吐其涼者則由於心肺陽虛如方名下所言種種諸情狀且其證時吐稀涎常覺短氣飲食廉少是其明徵也後世謂痰之稀者為飲稠者為痰與金匱所載四飲名義不同邑韓醫學傳家年四十有四偶得奇疾臥則常常發搐旋髮旋止如發寒戰之狀一呼吸之間即愈即不發搐時人偶以手撫之又輒應手而發自治不效廣求他醫治療皆不效留連半載病勢浸增後愚診視脈甚弦細詢其飲食甚少知繫心肺脾胃陽分虛憊不能運化精微以生氣血血虛不能榮筋氣虛不能充體故發搐也必發於臥時者臥則氣不順也人撫之而輒發者氣虛則畏人按也授以理飲湯方數劑飲食加多搐亦見愈二十劑後病不再發理痰湯治痰涎鬱塞胸膈滿悶短氣或漬於肺中為喘促咳逆停於心下為驚悸不寐滯於胃口為脹滿噦厄溢於經絡為肢體麻木或偏枯留於關節著於筋骨為俯仰不利牽引作疼隨逆氣肝火上升為眩暈不能坐立生芡實一兩清半夏四錢黑芝麻三錢炒搗柏子仁二錢炒搗生杭芍二錢陳皮二錢茯苓片二錢世醫治痰習用宋局方二陳湯謂為治痰之總劑不知二陳湯能治痰之標不能治痰之本何者痰之標在胃痰之本原在於腎腎主閉藏以膀胱為腑者也其閉藏之力有時不固必注其氣於膀胱膀胱膨脹不能空虛若谷即不能吸引胃中水飲速於下行而為小便此痰之所由來也又腎之上為血海奇經之衝脈也其脈上隸陽明下連少陰為其下連少陰也故腎中氣化不攝則沖氣易於上干為其上隸陽明也沖氣上干胃氣亦多上逆不能息息下行以運化水飲此又痰之所由來也此方以半夏為君以降沖胃之逆即重用芡實以收斂沖氣更以收斂腎氣而厚其閉藏之力腎之氣化治膀胱與沖之氣化自無不治痰之本原清矣用芝麻柏實者潤半夏之燥兼能助芡實補腎也用芍藥茯苓者一滋陰以利小便一淡滲以利小便也用陳皮者非借其化痰之力實借其行氣之力佐半夏以降逆氣並以行芡實芝麻柏實之滯膩也友人毛曾治一婦人年四十餘上盛下虛痰涎壅滯飲食減少動則作喘他醫用二陳湯加減治之三年病轉增劇後延毛診視投以此湯數劑病愈強半又將芡實減去四錢加生山藥五錢連服二十餘劑痰盡消諸病皆愈至今數年未嘗反復毛又嘗治一少婦患癇風初兩三月一發浸至兩三日一發脈滑體豐知系痰涎為恙亦治以此湯加赭石三錢數劑竟能拔除病根後與愚覿面述之愚喜曰向擬此湯時原不知能治癇風經兄加赭石一味即建此奇功大為此方生色矣按此方若治癇風或加硃砂或加生鐵落或用磨刀水煎藥皆可龍蠔理痰湯治因思慮生痰因痰生熱神志不寧清半夏四錢生龍骨六錢搗細生牡蠣六錢搗細生赭石三錢軋細朴硝二錢黑芝麻三錢炒搗柏子仁三錢炒搗生杭芍三錢陳皮二錢茯苓二錢此方即理痰湯以龍骨牡蠣代芡實又加赭石朴硝也其所以如此加減者因此方所主之痰乃虛而兼實之痰實痰宜開礞石滾痰丸之用硝黃者是也虛痰宜補腎虛泛作痰當用腎氣丸以逐之者是也至虛而兼實之痰則必一藥之中能開痰亦能補虛其藥乃為對證若此方之龍骨牡蠣是也蓋人之心腎原相助為理腎虛則水精不能上輸以鎮心而心易生熱是由腎而病及心也心因思慮過度生熱必暗吸腎之真陰以自救則腎易虧耗是由心而病及腎也於是心腎交病思慮愈多熱熾液凝痰涎壅滯矣惟龍骨牡蠣能寧心固腎安神清熱而二藥並用陳修園又稱為治痰之神品誠為見道之言故方中用之以代芡實而猶恐痰涎過盛消之不能盡消故又加赭石朴硝以引之下行也一人年三十餘常覺膽怯有時心口或少腹瞤動後須臾覺有氣起自下焦上衝胸臆鬱而不伸連作厄逆脖項發熱即癲狂唱呼其夾咽兩旁內突起若瘰癧而不若瘰癧之硬且精氣不固不寐而遺上焦覺熱下焦覺涼其脈左部平和微嫌無力右部直上直下李士材脈訣云直上直下衝脈昭昭倣佛有力而按之非真有力從前屢次醫治皆無效此腎虛致沖氣挾痰上衝亂其心之神明也投以此湯減厚朴之半加山萸肉去淨核五錢數劑諸病皆愈惟覺短氣知系胸中大氣下陷理詳升陷湯下投以拙擬升陷湯去升麻柴胡加桂枝尖二錢兩劑而愈蓋此證從前原有逆氣上干升麻柴胡能升大氣恐兼升逆氣桂枝則升大氣兼降逆氣故以之代升柴也一媼年六十二資稟素羸弱偶當外感之餘忽然妄言妄見驚懼異常手足擾動飢渴不敢飲食少腹塌陷胸膈突起脈大於平時一倍重按無力知系肝腎大虛沖氣上逆痰火上並心神擾亂也投以此湯去朴硝倍赭石加生山藥山萸肉去淨核生地黃各六錢又磨取鐵鏽水煎藥理詳一味鐵養湯下一劑即愈又服一劑以善其後健脾化痰丸治脾胃虛弱不能運化飲食以至生痰生白朮二兩生雞內金二兩去淨瓦石糟粕上藥二味各自軋細過羅各自用慢火焙熟不可焙過煉蜜為丸梧桐子大每服三錢開水送下白朮為健補脾胃之主藥然土性壅滯故白朮多服久服亦有壅滯之弊有雞內金之善消瘀積者以佐之則補益與宣通並用俾中焦氣化壯旺流通精液四布清升濁降痰之根柢蠲除矣又此方不但治痰甚效凡廉於飲食者服之莫不飲食增多且久服之並可消融腹中一切積聚初擬此方時原和水為丸而久服者間有咽乾及大便燥結之時後改用蜜丸遂無斯弊期頤餅治老人氣虛不能行痰致痰氣鬱結胸次滿悶脅下作疼凡氣虛痰盛之人服之皆效兼治疝氣生芡實六兩生雞內金三兩白麵半斤白沙糖不拘多少先將芡實用水淘去浮皮曬乾軋細過羅再將雞內金中有瓦石糟粕去淨分量還足軋細過羅置盆內浸以滾水半日許再入芡實白糖白麵用所浸原水和作極薄小餅烙成焦黃色隨意食之雞內金以補助脾胃大能運化飲食消磨瘀積食化積消痰涎自除再者老人痰涎壅盛多是下焦虛憊氣化不攝痰涎隨沖氣上泛芡實大能斂沖固氣統攝下焦氣化且與麥面同用一補心一補腎使心腎相濟水火調和而痰氣自平矣或問老人之痰既由於氣虛不行何不加以補助氣分之品答曰凡補氣之藥久服轉有他弊此方所用藥品二穀食一肉食復以沙糖調之可作尋常服食之物與他藥餌不同且食之能令人飲食增多則氣虛者自實也此方去芡實治小兒疳積痞脹大人癥瘕積聚治痰點天突穴法附捏結喉法明礬湯麝香香油灌法點天突穴以治痰厥善針灸者大抵知之而愚臨證體驗尤曲盡點法之妙穴在結喉頸間高骨下宛宛中點時屈手大指指甲長鬚剪之以指甲貼喉指端著穴直向下用力勿斜向里其氣即通指端當一起一點令痰活動兼頻頻撓動其指端令喉癢作嗽其痰即出一婦人年二十許數日之前覺胸中不舒一日忽然昏昏似睡半日不醒適愚自他處歸過其村病家見愚喜甚急求診治其脈沉遲兼有閉塞之象唇瞤動凡唇動者為有痰之徵脈象當系寒痰壅滯上焦過甚遂令人扶之坐以大指點其天突穴俾其喉癢作嗽約點半點鐘咳嗽十餘次吐出涼痰一碗始能言語又用乾薑六錢煎湯飲下而愈歲在甲寅客居大名之金灘鎮時當孟春天寒雨且雪一兵士衣裝盡濕因凍甚不能行步其夥舁之至鎮昏不知人呼之不應用火烘之且置於溫暖之處經宿未醒聞愚在鎮曾用點天突穴法治愈一人求為診治見其僵臥不動呼吸全無按其脈倣佛若動以手掩其口鼻每至呼吸之頃微覺有熱知猶可救遂令人扶起俾坐冶以點天突穴之法兼捏其結喉約兩點鐘咳嗽二十餘次共吐涼痰碗半始能呻吟亦飲以乾薑而愈捏結喉法得之滄州友人張其令人喉癢作嗽之力尤速欲習其法者可先自捏其結喉如何捏法即可作嗽則得其法矣然當氣塞不通時以手點其天突穴其氣即通捏結喉必癢嗽吐痰後其氣乃通故二法宜相輔並用也按西人謂凍死者若近火則寒氣內迫難救宜置寒冷室中或樹陰無風處將衣服脫除用雪團或冷水周身摩擦或將身置冷水中周身摩擦及四肢漸次柔軟行人工呼吸法此時摩擦更不宜間斷逮患者自能呼吸先被以薄衾繼用稍厚之被漸移入暖室按此法必周身血肉凍至冰凝呼吸全無者方宜用之若凍猶不至若是之劇用其法者又宜斟酌變通究之其法雖善若果有寒痰杜塞必兼用點天突穴捏結喉法方能挽救人工呼吸法即患者呼吸全無以法復其呼吸之謂也其法先將患者仰臥俾其頭及胸稍高啓其口將舌周遭纏以細布條緊結之防舌退縮及口之收閉救護者跪於頭之旁以兩手握患者之兩肘上提過頭俾空氣流入肺中以助其吸後須臾將兩肘放下緊壓於胸脅之際以助其呼助其呼時更有人以兩手心按其胸及心窩更佳如此往復行至患者自能呼吸而止此為救急之良方凡呼吸暴停者皆可用此方救之明礬湯生白礬長於治頑痰熱痰急證用之誠有捷效惟涼痰凝滯者斷不可用一婦人年二十餘因悲泣過度痰涎杜塞胃口其胃氣蓄極上逆連連乾嘔形狀又似厄逆氣至咽喉不能上達劇時渾身抖戰自掇其發有危在頃刻之狀醫者用生薑自然汁灌之益似不能容受愚診視之其脈左手沉濡右三部皆無然就其不受生薑觀之仍當是熱痰杜塞其脈象如此者痰多能瘀脈也且其面有紅光亦系熱證遂用生白礬二錢化水俾飲之即愈此方愚用之屢次審知其非寒痰杜塞皆可隨手奏效即痰厥至垂危者亦能救愈麝香香油灌法嚴用和云中風不醒者麝香清油灌之曾治一人年二十餘因夫妻反目身軀忽然後挺牙關緊閉口出涎沫及愚診視已閲三點鐘矣其脈閉塞不全先用痧藥吹鼻得嚏氣通忽言甚渴及詢之仍昏昏如故惟牙關微開可以進藥因憶嚴用和麝香清油灌法雖治中風不醒若治痰厥不醒亦當有效況此證形狀未必非內風掀動遂用香油二兩燉熱調麝香一分灌之即醒又硼砂四錢化水治痰厥可代白礬較白礬尤穩妥若治寒痰杜塞用胡椒三錢搗碎煎湯灌之可代生薑自然汁與乾薑湯附録滄縣董來函朱姓婦産後旬余甚平順適伊弟來視午後食煮包一大碗伊弟去後竟猝然昏倒四肢抽搐不省人事延為診視六脈皆伏當系産後五內空虛驟而飽食填息胸中大氣不能宣通諸氣亦因之閉塞故現此證取藥不及急用點天突穴及捏結喉法又用針刺十宣及少商穴須臾咳吐稠痰若干氣順腹響微汗而愈六治肺病方黃耆膏治肺有勞病薄受風寒即喘嗽冬時益甚者生箭耆四錢生石膏四錢搗細淨蜂蜜一兩粉甘草二錢細末生懷山藥三錢細末鮮茅根四錢銼碎如無鮮者可用乾者二錢代之上藥六味先將黃耆石膏茅根煎十餘沸去渣澄取清汁二杯調入甘草山藥末同煎煎時以箸攪之勿令二末沉鍋底一沸其膏即成再調入蜂蜜令微似沸分三次溫服下一日服完如此服之久而自愈然此乃預防之藥喘嗽未犯時服之月餘能祓除病根肺胞之體原玲瓏通徹者也為其玲瓏通徹故具闟闢之機而司呼吸之氣其闟闢之機無礙即呼吸之氣自如也有時肺臟有所損傷其微絲血管及肺胞涵津液之處其氣化皆湮淤凝滯致肺失其玲瓏之體即有礙於闟闢之機呼吸即不能自如矣然當氣候溫和時肺葉舒暢呼吸雖不能自如猶不至甚劇有時薄受風寒及令屆沍寒之時肺葉收縮則瘀者益瘀能闟而不能闢而喘作矣肺中之氣化瘀而且喘痰涎壅滯而嗽亦作矣故用黃耆以補肺之陽山藥以滋肺之陰茅根以通肺之竅俾肺之陰陽調和竅絡貫通其闟闢之力自適均也用石膏者因其涼而能散其涼也能調黃耆之熱其散也能助茅根之通也用甘草者因其味甘歸脾益土即以生金也用蜂蜜者因其甘涼滑潤為清肺潤肺利痰寧嗽之要品也茅根稟初春少陽之氣升而能散原肺臟對宮肝家之藥也夫肺金主斂肝木主散此證因肺金之斂太過故用茅根導引肝木之氣入肺以宣散之俾其闟闢之機自若而喘嗽均不作矣或問凡藥之名膏者皆用其藥之原汁久經熬煉而成膏今僅取黃耆石膏茅根之清汁而調以山藥甘草之末與蜜以成膏者何也答曰古人煎藥皆有火候及藥之宜先入後入或浸水摻入及藥之宜湯宜膏宜丸宜散之區別然今人不講久矣如此方黃耆茅根過煉則宣通之力微石膏過煉則清涼之力減此三味所以不宜熬膏也然猶恐藥入胃之後由中焦而直趨下焦其力不能灌注於肺故加山藥蜂蜜之潤而黏甘草之和而緩者調入成膏使人服之能留戀胃中不遽下俾其由胃輸脾由脾達肺也或問調之成膏者恃山藥蜂蜜也至甘草何不與黃耆石膏同煎取汁而亦為末調入答曰西人謂甘草微有苛苛即薄荷辣之味煎之則甘味減而苛辣之味轉增是以西人潤肺之甘草水止以開水浸之取其味甘且清輕之氣上升也此方將甘草調入湯中止煎一沸亦猶西人作甘草水之意也清金益氣湯治尪羸少氣勞熱咳嗽肺痿失音頻吐痰涎一切肺金虛損之病生黃耆三錢生地黃五錢知母三錢粉甘草三錢玄參三錢沙參三錢川貝母二錢去心牛蒡子三錢炒搗一婦人年四十上焦發熱咳吐失音所吐之痰自覺腥臭漸漸羸瘦其脈弦而有力投以清火潤肺之藥數劑不效為制此湯於大隊清火潤肺藥中加生黃耆一味以助元氣數劑見輕十餘劑後病遂全愈或問脈既有力矣何以復用補氣之藥答曰脈之有力有真有假凡脈之真有力者當於敦厚和緩中見之此脾胃之氣壯旺能包括諸臟也脾胃屬土能包括金木水火諸臟腑其餘若脈象洪而有力多系外感之實熱若滑而有力多系中焦之熱痰若弦而有力多系肝經之偏盛尤為有病之脈此證之脈是也蓋肺屬金肝屬木金病不能鎮木故脈現弦而有力之象此肝木橫恣轉欲侮金之象也凡肺痿肺癰之病多有脅下疼者亦系肝木偏勝所致一人年三十餘肺中素郁痰火又為外感拘束頻頻咳嗽吐痰腥臭恐成肺癰求為診治其脈浮而有力關前兼滑遂先用越婢湯解其外感咳嗽見輕而吐痰腥臭如故次用葶藶生者三錢紗袋裝之大棗七枚擘開湯瀉其肺中壅滯之痰間日一服又用三七川貝粉甘草金銀花為散鮮地骨皮煎湯少少送服日三次即用葶藶大棗湯之日亦服一次如此調治數日葶藶大棗湯用過三次痰涎頓少亦不腥臭繼用清金益氣湯貝母牛蒡子各加一錢連服十餘劑以善其後清金解毒湯治肺臟損爛或將成肺癰或咳嗽吐膿血者又兼治肺結核生明乳香三錢生明沒藥三錢粉甘草三錢生黃耆三錢玄參三錢沙參三錢牛蒡子三錢炒搗貝母三錢知母三錢三七二錢搗細藥汁送服將成肺癰者去黃耆加金銀花三錢一人年四十八咳吐痰涎甚腥臭夜間出汗日形羸弱醫者言不可治求愚診視脈數至六至按之無力投以此湯加生龍骨六錢又將方中知母加倍兩劑汗止又服十劑全愈肺結核之治法曾詳載於參麥湯下然所論者因肺結核而成勞瘵之治法此方及下方乃治肺結核而未成勞瘵者也安肺寧嗽丸治肺郁痰火及肺虛熱作嗽兼治肺結核嫩桑葉一兩兒茶一兩蓬砂一兩蘇子一兩炒搗粉甘草一兩上藥五味為細末蜜作丸三錢重早晚各服一丸開水送下肺臟具闟闢之機治肺之藥過於散則有礙於闟過於斂則有礙於闢桑得土之精氣而生根皮甚黃燧應夏季是其明徵故長於理肺家之病以土生金之義也至其葉涼而宣通最解肺中風熱其能散可知又善固氣化治崩帶脫肛肺氣旺自無諸疾其能斂可知斂而且散之妙用於肺臟闟闢之機尤投合也蓬砂之性涼而滑能通利肺竅兒茶之性涼而澀能安斂肺葉二藥並用與肺之闟闢亦甚投合又佐以蘇子之降氣定喘甘草之益土生金蜂蜜之潤肺清燥所以治嗽甚效也按蓬砂兒茶醫者多認為瘡家專藥不知其理痰寧嗽皆為要品且二藥外用能解毒化腐生肌故內服亦治肺結核或肺中損爛亦甚有效驗清涼華蓋飲治肺中腐爛浸成肺癰時吐膿血胸中隱隱作疼或旁連脅下亦疼者甘草六錢生明沒藥四錢不去油丹參四錢知母四錢病劇者加三七二錢搗細送服脈虛弱者酌加人參天冬各數錢肺癰者肺中生癰瘡也然此證肺中成瘡者十之一二肺中腐爛者十之八九故治此等證若葶藶皂莢諸猛烈之藥古人雖各有專方實不可造次輕用而清火解毒化腐生肌之品在所必需也甘草為瘡家解毒之主藥且其味至甘得土氣最厚故能生金益肺凡肺中虛損糜爛皆能愈之是以治肺癰便方有單用生粉草四兩煎湯頻頻飲之者而西人潤肺藥水亦單有用甘草製成者特其性微溫且有壅滯之意而調以知母之寒滑則甘草雖多用無礙且可借甘草之甘溫以化知母之苦寒使之滋陰退熱而不傷胃也丹參性涼清熱色赤活血其質輕鬆其味微辛故能上達於肺以宣通臟腑之毒血鬱熱而消融之乳香沒藥同為瘡家之要藥而消腫止疼之力沒藥尤勝故用之以參贊丹參而癰瘡可以內消三七化瘀解毒之力最優且化瘀血而不傷新血其解毒之力更能佐生肌藥以速於生肌故於病之劇者加之至脈虛者其氣分不能運化藥力方雖對證無功又宜助以人參而猶恐有肺熱還傷肺之虞是以又用天冬以解其熱也一人年三十餘晝夜咳嗽吐痰腥臭胸中隱隱作疼恐成肺癰求為診治其脈浮而有力右勝於左而按之卻非洪實投以清金解毒湯似有煩躁之意大便又滑瀉一次自言從前服藥略補氣分即覺煩躁若專清解又易滑瀉故屢次延醫無效也遂改用粉甘草兩半金銀花一兩知母牛蒡子各四錢煎湯一大碗分十餘次溫飲下俾其藥力常在上焦十劑而愈後兩月因勞力過度舊證復發胸中疼痛甚於從前連連咳吐痰中兼有膿血再服前方不效為制此湯兩劑疼止為脈象虛弱加野臺參三錢天冬四錢連服十劑全愈邑曾精通醫學曾告愚曰治肺癰方林屋山人犀黃丸最效余用之屢次皆隨手奏功今録其方於下以備參觀外科證治全生集王洪緒所著犀黃丸用乳香沒藥末各一兩麝香錢半犀牛黃三分共研細取黃米飯一兩搗爛入藥再搗為丸萊蔔子大曬乾忌火烘每服三錢熱陳酒送下徐靈胎曰蘇州錢復庵咳血不止諸醫以血證治之病益劇余往診見其吐血滿地細審血中似有膿而腥臭因謂之曰此肺癰也膿已成矣金匱云膿成則死然有生者余遂多方治之病家亦始終相信一月而愈蓋余平日因此證甚多集唐人以來驗方用清涼之藥以清其火滋肺之藥以養其血滑降之藥以祛其痰芳香之藥以通其氣更以珠黃之藥解其毒金石之藥填其空兼數法而行之屢試必效今治復庵亦兼此數法而痊按此論誠為治肺癰者之準繩故録之以備參觀西人東人對於肺結核皆視為至險之證愚治以中藥湯劑輔以西藥阿斯匹林恆隨手奏效參麥湯下論之甚詳而於近今又得一治法奉天宿之兄年近五旬素有肺病東人以為肺結核屢次醫治皆無效一日忽給其弟來電報言病勢已革催其速還宿因來院中求為疏方謂前數日來信言痰嗽較前加劇又添心中發熱今電文未言及病情大約仍系前證而益加劇也夫病勢至此誠難挽回因其相求懇切遂為疏方玄參生山藥各一兩而佐以川貝牛蒡甘草諸藥至家將藥煎服其病竟一汗而愈始知其病之加劇者繫有外感之證外感傳裡陽明燥熱得涼潤之藥而作汗所以愈也其從前肺病亦愈者因肺中之毒熱隨汗外透暫覺愈快而其病根實猶伏而未除也後旬余其肺病復發咳嗽吐痰腥臭宿復來詢治法手執一方言系友人所贈問可服否視之林屋山人犀黃丸也愚嚮者原擬肺結核可治以犀黃丸及徐氏所論治肺癰諸藥為其價皆甚昂恐病者辭費未肯輕於試用今有所見與愚同者意其方必然有效慫恿制其丸服之未盡劑而愈奉天趙年四十許心中發熱懶食咳嗽吐痰腥臭羸弱不能起床詢其得病之期至今已遷延三月矣其脈一分鐘八十五至左脈近平和右脈滑而實舌有黃苔滿布大便四五日一行且甚燥知其外感稽留於肺胃久而不去以致肺臟生炎久而欲腐爛也西人謂肺結核證至此已不可治而愚慨然許為治愈投以清金解毒湯去黃耆加生山藥六錢生石膏一兩三劑後熱大清減食量加增咳嗽吐痰皆見愈遂去山藥仍加黃耆三錢又去石膏以花粉六錢代之每日兼服阿斯匹林四分之一瓦如此十餘日後病大見愈身體康健而間有咳嗽之時因忙碌遂停藥不服二十日後咳嗽又劇仍吐痰有臭再按原方加減治之不甚效驗亦俾服犀黃丸病遂愈七治吐衄方寒降湯治吐血衄血脈洪滑而長或上入魚際此因熱而胃氣不降也以寒涼重墜之藥降其胃氣則血止矣生赭石六錢軋細清半夏三錢蔞仁四錢炒搗生杭芍四錢竹茹三錢牛蒡子三錢炒搗粉甘草錢半金匱治心氣不足吐衄有瀉心湯大黃與黃連黃芩並用後世未窺仲景制方之意恆多誤解不知所謂心氣不足者非不足也若果不足何又瀉之蓋此證因陽明胃腑之熱上逆衝心以致心中怔忡不安若有不足之象仲景從淺處立説冀人易曉遂以心氣不足名之故其立方獨本內經吐血衄血責重陽明不降之旨用大黃直入陽明之腑以降其逆上之熱又用黃芩以清肺金之熱使其清肅之氣下行以助陽明之降力黃連以清心火之熱使其元陽潛伏以保少陰之真液是瀉之實所以補之也且黃連之性肥腸止瀉與大黃並用又能逗留大黃之力使之不至滑瀉故吐衄非因寒涼者服之莫不立愈且愈後而瘀血全消更無他患真良方也即使心氣果系不足而吐衄不止將有立危之勢先用瀉心湯以止其吐衄而後從容調補徐復其正所謂急則治標亦醫家之良圖也乃世人竟畏大黃力猛不敢輕用即或用之病家亦多駭疑是以愚不得已擬此寒降湯重用赭石以代大黃降逆之力屢次用之亦可隨手奏效也或問後世本草謂血證忌用半夏以其辛而燥也子所擬寒降湯治吐衄之因熱者何以方中仍用半夏獨不慮其辛燥傷血乎答曰血證須有甄別若虛勞咳嗽痰中帶血半夏誠為所忌若大口吐血或衄血不止雖虛勞證亦可暫用半夏以收一時之功血止以後再徐圖他治蓋吐血之證多由於胃氣挾沖氣上逆衄血之證多由於胃氣衝氣上逆並迫肺氣亦上逆內經厥論篇曰陽明厥逆喘咳身熱善驚衄嘔血煌煌聖言萬古不易是治吐衄者原當以降陽明之厥逆為主而降陽明胃氣之逆者莫半夏若也一童子年十四陡然吐血一晝夜不止勢甚危急求為診視其脈洪長右部尤重按有力知其胃氣因熱不降血隨逆氣上升也為擬此湯一劑而愈又服一劑脈亦和平一人年十八偶得吐血證初不甚劇因醫者誤治遂大吐不止診其脈如水上浮麻莫辨至數此虛弱之極候也若不用藥立止其血危可翹足而待遂投以此湯去竹茹加生山藥一兩赭石改用八錢一劑血止再診其脈左右皆無重按亦不見愚不禁駭然詢之心中亦頗安穩惟覺痠懶無力忽憶呂滄洲曾治一發斑證亦六脈皆無滄洲謂脈者血之波瀾今因發斑傷血血傷不能復作波瀾是以不見斑消則脈出矣遂用白虎加人參湯化其斑毒脈果出詳案在青盂湯下今此證大吐亡血較之發斑傷血尤甚脈之重按不見或亦血分虛極不能作波瀾歟其吐之時脈如水上浮麻者或因氣逆火盛強迫其脈外現歟不然聞其診畢還里相距十里途中復連連嘔吐豈因路間失血過多歟躊躇久之乃放膽投以大劑六味地黃湯減茯苓澤瀉三分之二又加人參赭石各數錢一劑脈出又服平補之藥二十餘劑始復初按因寒因熱皆可使胃氣不降然因熱胃氣不降者人猶多知之因寒胃氣不降者則知者甚鮮黃氏論胃氣不降專主因寒一面蓋有所感觸而言也曾有一少婦上焦煩熱不能飲食頻頻咳吐皆系稀涎脈象弦細無力知系脾胃濕寒不能運化飲食下行致成留飲為恙也詢其得病之初言偶因咳嗽懶食延本處名醫投以栝蔞貝母麥冬之類旋愈旋即反復服藥月餘竟至如此遂為開苓桂朮甘湯加乾薑半夏細觀理飲湯後跋語自知且細為剖析用藥之意及愚旋里其藥竟不敢服復請前醫治之月餘而亡夫世之所謂名醫者其用藥大抵如此何不讀黃氏之論而反躬自省也哉門人高實驗一方赭石滑石等分研細熱時新汲井泉水送服冷時開水送服一兩或至二兩治吐衄之因熱者甚效高又在保陽治一吐血證甚劇者諸藥皆不效診其脈浮而洪至數微數重按不實初投以拙擬保元寒降湯稍見效旋又反復高遂放膽投以赭石二兩臺參六錢生杭芍一兩一劑而愈附録直隸青縣張來函天津曹年二十五歲自春日患吐血證時發時愈不以介意至仲冬忽吐血較前劇咳嗽音啞面帶貧血胸中煩熱食少倦怠屢治罔效來寓求診左脈細弱右脈則弦而有力知其病久生熱其胃氣因熱上逆血即隨之上升也為開寒降湯方為其咳嗽音啞加川貝三錢連服二劑病大輕減又服二劑不但吐血已止而咳嗽音啞諸病皆愈安徽當陽吳來函孟夏二十三日赤日晴天鑠人臟腑有陶者因業商斯日出外買糧午後忽於路中患吐血逮抵家尚嘔不止凌晨來院求治診其脈象洪滑重按甚實知其為熱所迫而胃氣不降也因夫子嘗推金匱瀉心湯為治吐衄良方遂俾用其方煎湯送服黑山梔細末二錢服後病稍愈而血仍不止診其脈仍然有力遂為開寒降湯加廣三七細末三錢俾將寒降湯煎一大盅分兩次將三七細末送服果一劑而愈溫降湯治吐衄脈虛濡而遲飲食停滯胃口不能消化此因涼而胃氣不降也以溫補開通之藥降其胃氣則血止矣白朮三錢清半夏三錢生山藥六錢乾薑三錢生赭石六錢軋細生杭芍二錢川厚朴錢半生薑二錢或問此湯以溫降為名用藥宜熱不宜涼矣乃既用乾薑之熱復用芍藥之涼且用乾薑而更用生薑者何也答曰脾胃與肝膽左右對待之臟腑也肝膽屬木中藏相火其性恆與熱藥不宜用芍藥者所以防乾薑之熱力入肝也且肝為藏血之臟得芍藥之涼潤者以養之則寧謐收斂而血不妄行更與生薑同用且能和營衛調經絡引血循經此所以用乾薑又用生薑也內經厥論篇謂陽明厥逆衄嘔血所謂陽明者指胃腑而言也所謂厥逆者指胃腑之氣上行而言也蓋胃以消化飲食傳送下行為職是以胃氣以息息下行為順設或上行則為厥逆胃氣厥逆可至衄血嘔血因血隨胃氣上行也然胃氣厥逆因熱者固多因寒者亦間有之歲在壬寅邑之北境有學生劉者年十三歲一日之間衄血四次診其脈甚和平詢其心中不覺涼熱因思吐衄之證熱者居多且以童子少陽之體時又當夏令遂略用清涼止血之品衄益甚脈象亦現微弱知其胃氣因寒不降轉迫血上逆而為衄也投以拙擬溫降湯一劑即愈隔數日又有他校學生年十四歲吐血數日不愈其吐之時多由於咳嗽診其脈甚遲濡右關尤甚疑其脾胃虛寒不能運化飲食詢之果然蓋吐血之證多由於胃氣不降飲食不能運化胃氣即不能下降咳嗽之證多由於痰飲入肺飲食遲於運化又必多生痰飲因痰飲而生咳嗽因咳嗽而氣之不降者更轉而上逆此吐血之所由來也亦投以溫降湯一劑血止接服數劑飲食運化咳嗽亦愈近在瀋陽論及此事李謂從前有老醫徐者曾用理中湯治愈歷久不愈之吐血證是吐血誠有因寒者之明徵也然徐但用理中湯以暖胃補胃而不知用赭石半夏佐之以降胃氣是處方猶未盡善也特是藥房製藥多不如法雖清半夏中亦有礬以治吐衄及嘔吐必須將礬味用微溫之水淘淨淘時必於方中原定之分量外多加數錢以補其淘去礬味所減之分量及藥力又薛立齋原有血因寒而吐者治用理中湯加當歸之説特其因寒致吐血之理未嘗説明是以後世間有駁其説者由斯知著醫書者宜將病之原因仔細發透俾讀其書者易於會悟不至生疑為善不惟吐衄之證有因寒者即便血之證亦有因寒者特其證皆不多見耳鄰村高某年四十餘小便下血久不愈其脈微細而遲身體虛弱惡寒飲食減少知其脾胃虛寒中氣下陷黃坤載所謂血之亡於便溺者太陰不升也為疏方乾薑於朮各四錢生山藥熟地黃各六錢烏附子炙甘草各三錢煎服一劑血即見少連服十餘劑全愈此方中不用肉桂者恐其動血分也清降湯治因吐衄不止致陰分虧損不能潛陽而作熱不能納氣而作喘甚或沖氣因虛上干為厄逆為眩暈心血因虛甚不能內榮為怔忡為驚悸不寐或咳逆或自汗諸虛證蜂起之候生山藥一兩清半夏三錢淨萸肉五錢生赭石六錢軋細牛蒡子二錢炒搗生杭芍四錢甘草錢半保元寒降湯治吐血過多氣分虛甚喘促咳逆血脫而氣亦將脫其脈上盛下虛上焦兼煩熱者生山藥一兩野臺參五錢生赭石八錢軋細知母六錢大生地六錢生杭芍四錢牛蒡子四錢炒搗三七二錢細軋藥汁送服一叟年六十四素有勞疾因勞嗽太甚嘔血數碗其脈搖搖無根或一動一止或兩三動一止此氣血虛極將脫之候也診脈時見其所嗽吐者痰血相雜詢其從前嘔吐之時心中發熱為制此湯一劑而血止又服數劑脈亦調勺附録直隸青縣張來函河間裘年二十八歲患咳嗽吐血且咯吐甚多氣分太虛喘息迫促上焦煩熱其脈大而無力右部尤甚蓋血脫而氣亦將脫也急用保元寒降湯加青竹茹麥門冬各三錢一劑血止至第二劑將臺參五錢易為西洋參一錢服之而愈方病相投效如影響洵不誤也保元清降湯治吐衄證其人下元虛損中氣衰憊沖氣胃氣因虛上逆其脈弦而硬急轉似有力者野臺參五錢生赭石八錢軋細生芡實六錢生山藥六錢生杭芍六錢牛蒡子二錢炒搗甘草錢半附録友人毛曾治一少年吐血證其人向經醫者治愈旋又反復毛診其脈弦而有力知其為沖胃之氣上逆也遂於治吐血方中重用半夏赭石以降逆白芍牡蠣不煅以斂沖瀉熱又加人參以補其中氣使中氣健旺以斡旋諸藥成功有從前為治愈之醫者在座頗疑半夏不可用毛力主服之一劑血止再劑脈亦和平醫者訝為異事毛曉知曰此證乃下元虛損沖氣因虛上逆並迫胃氣亦上逆脈似有力而非真有力李士材四字脈訣所謂直上直下衝脈昭昭者即此謂也若誤認此脈為實熱而恣用苦寒之藥涼其血分血分因涼而凝亦可止而不吐而異日瘀血為恙竟成勞瘵者多矣今方中用赭石半夏以鎮沖氣使之安其故宅而即用白芍牡蠣以斂而固之使之永不上逆夫血為氣之配氣為血之主氣安而血自安矣此所以不治吐血而吐血自止也況又有人參之大力者以參贊諸藥使諸藥之降者斂者皆得有所憑藉以成功乎祕紅丹治肝鬱多怒胃鬱氣逆致吐血衄血及吐衄之證屢服他藥不效者無論因涼因熱服之皆有捷效川大黃一錢細末油肉桂一錢細末生赭石六錢細末上藥三味將大黃肉桂末和勻用赭石末煎湯送下一婦人年近三旬咳嗽痰中帶血劇時更大口吐血常覺心中發熱其脈一分鐘九十至按之不實投以滋陰寧嗽降火之藥數劑無效因思此證若用藥專止其嗽嗽愈其吐血亦當愈遂用川貝九錢煎取清湯四茶盅調入生山藥細末一兩煮作稀粥俾於一日連進二劑其嗽頓止此方可為治虛嗽良方吐血證亦遂愈數日後覺血氣上潮肺復作癢而嗽因此又復吐血自言夜間睡時常作生氣惱怒之夢怒極或夢中哭泣醒後必然吐血據所云云其肝氣必然郁遏遂改用舒肝連翹薄荷不可多用瀉肝龍膽楝子之品而以養肝柏子仁生阿膠鎮肝生龍骨生牡蠣之藥輔之數劑病稍輕減而猶間作惱怒之夢夢後仍復吐血欲辭不治病家又信服難卻再四躊躇恍悟平肝之藥以桂為最要肝屬木木得桂則枯也以桂作釘釘樹其樹立枯而單用之則失於熱降胃止血之藥以大黃為最要觀金匱治吐衄有瀉心湯重用大黃可知胃氣不上逆血即不逆行也而單用之又失於寒若二藥並用則寒熱相濟性歸和平降胃平肝兼顧無遺況俗傳方原有用此二藥為散治吐血者用於此證當有捷效而再以重墜之藥輔之則力專下行其效當更捷也遂用大黃肉桂細末各一錢和勻更用生赭石細末煎湯送下吐血頓愈惱怒之夢亦從此不作後又遇吐血者數人投以此方皆隨手奏效至其人身體壯實而暴得吐血者又少變通其方大黃肉桂細末各用錢半將生赭石細末六錢與之和勻分三次服白開水送下約點半鐘服一次二鮮飲治虛勞證痰中帶血鮮茅根四兩切碎鮮藕四兩切片煮汁常常飲之旬日中自愈若大便滑者茅根宜減半再用生山藥細末兩許調入藥汁中煮作茶湯服之茅根善清虛熱而不傷脾胃藕善化瘀血而兼滋新血合用之為涵養真陰之妙品且其形皆中空均能利水血亦水屬故能引泛濫逆上之血徐徐下行安其部位也至於藕以治血證若取其化瘀血則紅蓮者較優若用以止吐衄則白蓮者勝於紅蓮者堂兄年五旬得吐血證延醫治療不效脈象滑數搖搖有動象按之不實時愚在少年不敢輕於疏方因擬此便方煎湯兩大碗徐徐當茶溫飲之當日即見愈五六日後病遂脫然自言未飲此湯時心若虛懸無著既飲後覺藥力所至若以手按心使復其位此其所以愈也三鮮飲治同前證兼有虛熱者即前方加鮮小薊根二兩大小薊皆能清血分之熱以止血熱之妄行而小薊尤勝凡因血熱妄行之證單用鮮小薊根數兩煎湯或榨取其自然汁開水沖服均有捷效誠良藥也小薊莖中生蟲即結疙瘩如小棗若取其鮮者十餘枚搗爛開水沖服治吐衄之因熱者甚效鄰村李曾告愚曰余少年曾得吐血證屢次服藥不效後得用小薊疙瘩便方服一次即愈因呼之謂清涼如意珠真藥中之佳品也化血丹治咳血兼治吐衄理瘀血及二便下血花蕊石三錢煅存性三七二錢血餘一錢煅存性共研細分兩次開水送服世醫多謂三七為強止吐衄之藥不可輕用非也蓋三七與花蕊石同為止血之聖藥又同為化血之聖藥且又化瘀血而不傷新血以治吐衄愈後必無他患此愚從屢次經驗中得來故敢確實言之即單用三七四五錢或至一兩以治吐血衄血及大小便下血皆效常常服之並治婦女經閉成癥瘕至血餘其化瘀血之力不如花蕊石三七而其補血之功則過之以其原為人身之血所生而能自還原化且煅之為炭而又有止血之力也曾治一童子年十五大便下血數月不愈所下者若爛炙雜以油膜醫者諉謂不治後愚診視其脈弦數無力俾用生山藥軋細作粥調血餘炭六七分服之日二次旬日全愈補絡補管湯治咳血吐血久不愈者生龍骨一兩搗細生牡蠣一兩搗細萸肉一兩去淨核三七二錢研細藥汁送服服之血猶不止者可加赭石細末五六錢張景嶽謂咳嗽日久肺中絡破其人必咳血西人謂胃中血管損傷破裂其人必吐血龍骨牡蠣萸肉性皆收澀又兼具開通之力三藥之性詳既濟湯來復湯與理郁升陷湯清帶湯下故能補肺絡與胃中血管以成止血之功而又不至有遽止之患致留瘀血為恙也又佐以三七者取其化腐生新使損傷之處易愈且其性善理血原為治衄之妙品也咳血之原由於肺吐血之原由於胃人之所共知也而西人於吐血論之尤詳其説謂胃中多回血管有時潰裂一二處而血出其故或因胃本體自生炎證爛壞血管或因跌打外傷胃中血管斷裂其血棕黑而臭穢危險難治但此類甚少常見之證大概血管不曾潰裂其血亦可自管中溢出其血多帶黑色因回血管之血色原紫黑而溢出在胃胃中酸汁又能令血色變黑也若血溢自胃中血管即時吐出其色亦可鮮紅其病原或因胃致病或因身虛弱血質稀薄皆能溢出有胃自不病或因別經傳入於胃如婦女倒經是子宮之血傳入於胃又如肝脾脹大血不易通行回血管滿溢入胃則吐出入大小腸則便出便與吐之路不同其理一也或問內經謂陽明厥逆則吐衄西人謂胃中血管損傷破裂出血則吐血此二説亦相通乎答曰陽明厥逆胃腑氣血必有膨脹之弊此血管之所以易破也降其逆氣血管之破者自閉設有不閉則用龍骨牡蠣諸收澀之藥以補之防其潰爛佐以三七乳香沒藥諸生肌之品以養之此拙擬補絡補管湯所以效也設使陽明未嘗厥逆胃中血管或因他故而破裂則血在胃中亦恆隨飲食下行自大便出不必皆吐出也此方原無三七有乳香沒藥各錢半偶與友人談及謂余治吐血亦用兄補絡補管湯以三七代乳香沒藥則其效更捷愚聞之遂欣然易之又謂龍骨牡蠣能收斂上溢之熱使之下行而上溢之血亦隨之下行歸經至萸肉為補肝之妙藥凡因傷肝而吐血者萸肉又在所必需也且龍骨牡蠣之功用神妙無窮即脈之虛弱已甚日服補藥毫無起象或病虛極不受補者投以大劑龍骨牡蠣莫不立見功效余亦不知其何以能然也愚曰人身陽之精為魂陰之精為魄龍骨能安魂牡蠣能強魄魂魄安強精神自足虛弱自愈也是龍骨牡蠣固為補魂魄精神之妙藥也邑有吐血久不愈者有老醫於重用赤石脂二兩與諸止血藥治之一劑而愈後其子向愚述其事因詰之曰重用赤石脂之義何據其子曰凡吐血多因虛火上升然人心中之火亦猶爐中之火其下愈空虛而火上升之力愈大重用赤石脂以填補下焦虛火自不上升矣愚曰兄之論固佳然猶有剩義赤石脂重墜之力近於赭石故能降沖胃之逆其黏澀之力近於龍骨牡蠣故能補血管之破兼此二義重用石脂之奧妙始能盡悉是以愚遇由外傷內若跌碰致吐血久不愈者料其胃中血管必有傷損恆將補絡補管湯去萸肉變湯劑為散劑分數次服下則龍骨牡蠣不但有黏澀之力且較煎湯服者更有重墜之力而吐血亦即速愈也其子聞之欣然曰先嚴用此方時我年尚幼未知詳問今聞兄言貺我多矣曾治滄州馬氏少婦咳血三年百藥不效即有愈時旋覆如故後愚為診視其夜間多汗遂用淨萸肉生龍骨生牡蠣各一兩俾煎服擬先止其汗果一劑汗止又服一劑咳血亦愈蓋從前之咳血久不愈者因其肺中之絡或胃中血管有破裂處萸肉與龍骨牡蠣同用以澀之斂之故咳血亦隨之愈也又治本村表弟張年三十許或旬日或浹辰之間必吐血數口浸至每日必吐亦屢治無效其脈近和平微有芤象亦治以此方三劑全愈後又將此方加三七細末三錢煎藥湯送服以治咳血吐血久不愈者約皆隨手奏效若遇吐血之甚者宜再加赭石五六錢與此湯前三味同煎湯送服三七細末更效邑張某家貧傭力身挽鹿車運貨遠行因枵腹努力太過遂致大口吐血臥病旅邸恐即不起意欲還里又乏資斧乃勉強徒步徐行途中又復連吐不止目眩心慌幾難舉步腹中覺飢懷有干餅又難下咽偶拾得山楂十數枚遂和干餅食之覺精神頓爽其病竟愈蓋酸者能斂而山楂則酸斂之中兼有化瘀之力與拙擬補絡補管湯之意相近故獲此意外之效也附録江蘇崇明縣蔡來函回憶畢業中學時勞心過度致患吐血雖家祖世醫終難療治遍求名醫診治亦時止時吐及肄業大學時吐血更甚醫者多勸輟學靜養方可望痊乃輟學家居服藥靜養病仍如舊計無所施自取數世所藏醫書遍閲之又汗牛充棟渺茫無涯況玉石混雜瑜瑕莫辨徒增望洋之嘆也幸今秋自周小農處購得衷中參西録閲至吐衄方補絡補管湯知為治僕病的方抄出以呈家祖父命將藥劑減半煎服頗見效驗遂放膽照原方兼取寒降湯之義加赭石六錢連服三劑全愈從前半月之間必然反復今已月餘安然無恙自覺身體漸強精神倍加化瘀理膈丹治力小任重努力太過以致血瘀膈上常覺短氣若吐血未愈者多服補藥或涼藥或多用諸藥炭強止其血亦可有此病皆宜服此藥化之三七二錢搗細鴨蛋子四十粒去皮上藥二味開水送服日兩次凡服鴨蛋子不可嚼破若嚼破即味苦不能下咽強下咽亦多嘔出一童子年十四夏日牧牛野間衆牧童嬉戲強屈其項背納頭袴中倒縛其手置而弗顧戲名為看瓜後經人救出氣息已斷俾盤膝坐捶其腰背多時方蘇惟覺有物填塞胸膈壓其胸中大氣妨礙呼吸劇時氣息仍斷兩目上翻身軀後挺此必因在袴中悶極之時努掙不出熱血隨努掙之氣力上溢而停於膈上也俾單用三七三錢搗細開水送服兩次全愈一人年四十七素患吐血醫者謂其虛弱俾服補藥連服十餘劑覺胸中發緊而血益不止後有人語以治吐血便方大黃肉桂各五分軋細開水送服一劑血止然因從前誤服補藥胸中常覺不舒飲食減少四肢痠懶無力愚診之脈似沉牢知其膈上瘀血為患也俾用鴨蛋子五十粒去皮糖水送服日兩次數日而愈八治心病方定心湯治心虛怔忡龍眼肉一兩酸棗仁五錢炒搗萸肉五錢去淨核柏子仁四錢炒搗生龍骨四錢搗細生牡蠣四錢搗細生明乳香一錢生明沒藥一錢心因熱怔忡者酌加生地數錢若脈沉遲無力者其怔忡多因胸中大氣下陷詳觀拙擬升陷湯後跋語及諸案自明治法內經謂心藏神神既以心為舍字即以心中之氣血為保護有時心中氣血虧損失其保護之職心中神明遂覺不能自主而怔忡之疾作焉故方中用龍眼肉以補心血棗仁柏仁以補心氣更用龍骨入肝以安魂牡蠣入肺以定魄魂魄者心神之左輔右弼也且二藥與萸肉並用大能收斂心氣之耗散並三焦之氣化亦可因之團聚特是心以行血為用心體常有舒縮之力心房常有啓閉之機若用藥一於補斂實恐於舒縮啓閉之運動有所妨礙故又少加乳香沒藥之流通氣血者以調和之其心中兼熱用生地者因生地既能生血以補虛尤善涼血而清熱故又宜視熱之輕重而斟酌加之也西人曰人身心肺關係尤重與腦相等凡關係重者護持之尤謹故腦則有頭額等八骨以保護之而心肺亦有胸脅諸骨以保護之心肺體質相連功用亦相倚賴心之功用關係全體心病則全體皆受害心之重如此然論其體質不過赤肉所為其能力專主舒縮以行血脈有左右上下四房左上房主接肺經赤血右上房主接周身回血左下房主發赤血運行周身右下房主接上房回血過肺更換赤血而回左上房左上房赤血落左下房入總脈管以養全體右上房回血落右下房上注於肺以出炭氣而接養氣故人一身之血皆經過於心肺心能運血周流一身無一息之停即時接入即時發出其跳躍即其逼發也以時辰表驗試一睯眤即一分鐘跳七十五次每半時跳四千五百次一晝夜計跳十萬八千次然平人跳不自覺若覺心跳即是心經改易常度心房之內左厚於右左下房厚於右下房幾一倍蓋左房主接發赤血功用尤勞故亦加厚也心位在胸中居左當肋骨第四至第七節尖當肋骨第五第六之間下於乳頭約一寸至半寸橫向胸骨病則自覺周遭皆跳凡心經本體之病或因心房變薄變厚或心房之門有病或夾膜有病或總管有病亦如眼目之病或在明角罩或在瞳人或在睛珠非必處處皆病也大概心病左多於右因左房功用尤勞故耳心病約有數端一者心體變大有時略大或大過一半因心房之戶有病攔阻血出入不便心舒縮之勞過常度勞多則變大亦與手足過勞則腫大之理相同大甚則逼血舒縮之用因之不靈矣一者心房門戶變小或變大或變窄或變闊俱為非宜蓋心血自上房落下房之門開張容納血入後門即翕閉不令血得回旋上出其自下房入總管處亦有門血至則開張使之上出血出後門即翕閉不令血得下返若此處太窄太小則血不易出太大太闊則血逼發不盡或已出復返運行不如常度矣再者心跳凡無病之人心跳每不自覺若因病而跳時時自覺撫之或覺動然此證有真有假真者心自病而跳也或心未必有病但因身虛而致心跳亦以真論若偶然心跳其人驚懼防有心病其實心本無病即心跳亦暫時之事是為假心跳證醫者均須細辨凡心勻跳無止息側身而臥可左可右呼吸如常大概心自不病所慮跳躍不定或三四次一停停後復跳不能睡臥左半身著床愈覺不安當慮其門戶有病血不回運如常有停滯妄流而為膨脹者有纍肺而咳嗽難呼吸或喘者有纍腦而昏矇頭疼中風慌怯者有纍肝而血聚積滿溢者有纍胃不易消化食後不安心更跳者皆心病之關係也若胸脅骨之下有時動悸人或疑為心跳其實因胃不消化內有風氣與心跳病無涉虛弱人及婦女患者最多略服補胃及微利藥可也按西人論心跳證有真假真者手捫之實覺其跳假者手捫之不覺其跳其真跳者又分兩種一為心體自病若心房門戶變大小窄闊之類可用定心湯將方中乳香沒藥皆改用三錢更加當歸丹參各三錢一為心自不病因身弱而纍心致跳當用治勞瘵諸方治之至假心跳即怔忡證也其收發血脈之動力非大於常率故以手捫之不覺其跳特因氣血虛而神明亦虛即心之尋常舒縮徐徐跳動神明當之亦若有沖激之勢多生驚恐此等證治以定心湯時磨取鐵鏽水煎藥更佳至於用鐵鏽之説不但如西人之説取其能補血分實借其鎮重之力以安心神也載有一味鐵養湯細觀方後治驗諸案自知鐵鏽之妙用惟怔忡由於大氣下陷者斷不宜用安魂湯治心中氣血虛損兼心下停有痰飲致驚悸不眠龍眼肉六錢酸棗仁四錢炒搗生龍骨五錢搗末生牡蠣五錢搗末清半夏三錢茯苓片三錢生赭石四錢軋細若服一兩劑後無效者可於服湯藥之外臨睡時用開水送服西藥臭剝一瓦借其麻痹神經之力以收一時之效俾湯劑易於為力也方書謂痰飲停於心下其人多驚悸不寐蓋心火也痰飲水也火畏水刑故驚悸至於不寐也然痰飲停滯於心下者多由思慮過度其人心臟氣血恆因思慮而有所傷損故方中用龍眼肉以補心血酸棗仁以斂心氣龍骨牡蠣以安魂魄半夏茯苓以清痰飲赭石以導引心陽下潛使之歸藏於陰以成瞌睡之功也一媼年五十餘纍月不能眠屢次服藥無效診其脈有滑象且其身形甚豐腴知其心下停痰也為制此湯服兩劑而愈一婦人年三十許一月之間未睡片時自言倦極倣佛欲睡即無端驚恐而醒診其脈左右皆有滑象遂用苦瓜蒂十枚焙焦軋細空心時開水送服吐出膠痰數碗覺心中異常舒暢於臨眠之先又送服熟棗仁細末二錢其夜遂能安睡後又調以利痰養心安神之藥連服十餘劑其證永不反復矣內經邪客篇有治目不得瞑方用流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪水沸置秫米一升製半夏制好之半夏五合徐炊令竭為一升半去其渣飲汁一小杯日三稍益以知為度知覺好也故其病新發者覆杯則臥汗出而已矣久則三飲而已也觀此方之義其用半夏並非為其利痰誠以半夏生當夏半乃陰陽交換之時實為由陽入陰之候故能通陰陽和表裡使心中之陽漸漸潛藏於陰而入睡鄉也秫米即蘆稷之米俗名高粱取其汁漿稠潤甘緩以調和半夏之辛烈也水用長流水更揚之萬遍名曰勞水取其甘緩能滋養也薪用葦薪取其能暢發腎氣上升以接引心氣下降而交其陰陽也觀古人每處一方並其所用之薪與水及其煎法服法莫不詳悉備載何其用心之周至哉按內經之方多奇驗半夏秫米湯取半夏能通陰陽秫米能和脾胃陰陽通脾胃和其人即可安睡故內經謂飲藥後覆杯即瞑言其效之神速也乃後世因其藥簡單平常鮮有用者則良方竟埋沒矣門生高治天津劉姓年四十二四月未嘗少睡服藥無效問治法於愚告以半夏秫米湯方高因其心下發悶遂變通經方先用鮮萊蔔四兩切絲煎湯兩茶杯再用其湯煎清半夏四錢服之時當晚八點鐘其人當夜即能安睡連服數劑心下之滿悶亦愈九治癲狂方蕩痰湯治癲狂失心脈滑實者生赭石二兩軋細大黃一兩朴硝六錢清半夏三錢鬱金三錢蕩痰加甘遂湯治前證頑痰凝結之甚者非其證大實不可輕投其方即前方加甘遂末二錢將他藥煎好調藥湯中服凡用甘遂宜為末水送服或用其末調藥湯中服若入湯劑煎服必然吐出又凡藥中有甘遂不可連日服之必隔兩三日方可再服不然亦多吐出又其性與甘草相犯用者須切記甘遂性猛烈走竄後世本草稱其以攻決為用為下水之聖藥痰亦水也故其行痰之力亦百倍於他藥曾治一少年癲狂醫者投以大黃六兩連服兩劑大便不瀉後愚診視為開此方惟甘遂改用三錢病家謂從前服如許大黃未見行動今方中止用大黃兩許豈能效乎愚曰但服無慮也服後大便連瀉七八次降下痰涎若干癲狂頓愈見者以為奇異彼蓋不知甘遂三錢之力遠勝於大黃六兩之力也痰脈多滑然非頑痰也愚治此證甚多凡癲狂之劇者脈多瘀塞甚或六脈皆不見用開痰藥通之其脈方出以是知頑痰之能閉脈也癲狂之證乃痰火上泛瘀塞其心與腦相連竅絡以致心腦不通神明皆亂故方中重用赭石借其重墜之力攝引痰火下行俾竅絡之塞者皆通則心與腦能相助為理神明自復其舊也是以愚治此證之劇者赭石恆有用至四兩者且又能鎮甘遂使之專於下行不至作嘔吐也癲者性情顛倒失其是非之明狂者無所畏懼妄為妄言甚或見聞皆妄大抵此證初起先微露癲意繼則發狂狂久不愈又漸成癲甚或知覺全無蓋此證由於憂思過度心氣結而不散痰涎亦即隨之凝結又加以思慮過則心血耗而暗生內熱痰經熱煉而膠黏益甚熱為痰錮而消解無從於是痰火充溢將心與腦相通之竅絡盡皆瘀塞是以其神明淆亂也其初微露癲意者痰火猶不甚劇也逮痰火積而益盛則發狂矣是以狂之甚者用藥下其痰恆作紅色痰而至於紅其熱可知逮病久則所瘀之痰皆變為頑痰其神明淆亂之極又漸至無所知覺而變為癲證且其知覺欲無從前之憂思必減其內熱亦即漸消而無火以助其狂此又所以變為癲也然其初由癲而狂易治其後由狂而癲難治故此證若延至三四年者治愈者甚少人之神明原在心與腦兩處金正希曰人見一物必留一影於腦中小兒善忘者腦髓未滿也老人健忘者腦髓漸空也汪訒庵釋之曰凡人追憶往事恆閉目上瞪凝神於腦是影留於腦之明徵由斯觀之是腦原主追憶往事也其人或有思慕不遂而勞神想象或因從前作事差誤而痛自懊憹則可傷腦中之神若因研究理解工夫太過或有將來難處之事而思患預防躊躇太過苦心思索則多傷心中之神究之心與腦原徹上徹下共為神明之府一處神明傷則兩處神俱傷腦中之神明傷可纍及腦氣筋心中之神明傷亦可纍及腦氣筋且腦氣筋傷可使神明顛倒狂亂心有所傷亦可使神明顛倒狂亂也曾治一少婦癲狂強灌以藥不能下咽遂俾以朴硝代鹽每飯食之病人不知月餘而愈誠以朴硝鹹寒屬水為心臟對宮之藥以水勝火以寒勝熱能使心中之火熱消解無餘心中之神明自得其養非僅取朴硝之能開痰也調氣養神湯治其人思慮過度傷其神明或更因思慮過度暗生內熱其心肝之血消耗日甚以致心火肝氣上衝頭部擾亂神經致神經失其所司知覺錯亂以是為非以非為是而不至於瘋狂過甚者龍眼肉八錢柏子仁五錢生龍骨五錢搗碎生牡蠣五錢搗碎遠志二錢不炙生地黃六錢天門冬四錢甘松二錢生麥芽三錢菖蒲二錢甘草錢半鏡面硃砂三分研細用頭次煎藥湯兩次送服磨取鐵鏽濃水煎藥此乃養神明滋心血理肝氣清虛熱之方也龍眼肉色赤入心且多津液最能滋補血分兼能保合心氣之耗散故以之為主藥柏子仁多含油質故善養肝兼能鎮肝又與龍骨牡蠣之善於斂戢肝火肝氣者同用則肝火肝氣自不挾心火上升以擾亂神經也用生地黃者取其能瀉上焦之虛熱更能助龍眼肉生血也用天門冬者取其涼潤之性能清心寧神即以開燥痰也用遠志菖蒲者取其能開心竅利痰涎且能通神明也用硃砂鐵鏽水者以其皆能鎮安神經又能定心平肝也用生麥芽者誠以肝為將軍之官中寄相火若但知斂之鎮之或激動其反應之力故又加生麥芽以將順其性蓋麥芽炒用能消食生用則善舒肝氣也至於甘松其性在中醫用之以清熱開瘀逐痹在西醫則推為安養神經之妙藥而兼能治霍亂轉筋蓋神經不失其所司則筋可不轉此亦足見安養神經之效也十治癇風方加味磁朱丸治癇風磁石二兩能吸鐵者研極細水飛出切忌火煅赭石二兩清半夏二兩硃砂一兩上藥各製為細末再加酒麴半斤軋細過羅可得細曲四兩炒熟二兩與生者二兩共和藥為丸桐子大鐵鏽水煎湯送服二錢日再服磁石為鐵養二種原質化合含有磁氣其氣和異性相引同性相拒頗類電氣故能吸鐵煅之則磁氣全無不能吸鐵用之即無效然其石質甚硬若生用入丸散中必製為極細末再以水飛之用其隨水飛出者方妥或和水研之若拙擬磨翳散之研飛爐甘石法更佳硃砂無毒而煅之則有毒按化學之理硃砂原硫黃水銀二原質合成故古方書皆謂硃砂內含真汞汞即水銀也若煅之則仍將分為硫黃水銀二原質所以有毒又原方原用神麯而改用酒麴者因坊間神麯窨發皆未能如法多帶酸味轉不若造酒麴者業有專門曲發甚精用之實勝於神麯也磁朱丸方乃千金方中治目光昏耗神水寬大之聖方也李瀕湖解曰磁石入腎鎮養真陰使腎水不外移硃砂入心鎮養心血使邪火不上侵佐以神麯消化滯氣溫養脾胃生髮之氣然從前但知治眼疾而不知治癇風至柯韻伯稱此方治癇風如神而愚試之果驗然不若加赭石半夏之尤為效驗也原方止此三味為加赭石半夏者誠以癇風之證莫不氣機上逆痰涎上湧二藥並用既善理痰又善鎮氣降氣也送以鐵鏽湯者以相火生於命門寄於肝膽相火之暴動實於肝膽有關此肝膽為木臟即為風臟內風之煽動亦莫不於肝膽發軔鐵鏽乃金之餘氣故取金能制木之理鎮肝膽以熄內風又取鐵能引電之理借其重墜之性以引相火下行也附録友人祁之弟患癇風百藥不效後得一方用干熊膽若黃豆粒大一塊約重分半涼水少許浸開服之冬月宜溫水浸開溫服數次而愈祁向愚述之因試其方果效通變黑錫丹治癇風鉛灰二兩研細硫化鉛一兩研細麥曲兩半炒熟上三味水和為丸桐子大每服五六丸多至十丸用淨芒硝四五分沖水送服若服藥後大便不利者鉛灰硫化鉛皆能澀大便芒硝又宜多用古方有黑錫丹用硫黃與鉛化合以治上熱下涼上盛下虛之證洵為良方而猶未盡善者因其雜以草木諸熱藥其性易升浮即不能專於下達向曾變通其方專用硫化鉛和熟麥曲為丸以治癇風數日一發者甚有效驗乃服至月餘因覺熱停服旬余病仍反復遂又通變其方多用鉛灰少用硫化鉛俾其久服不致生熱加以纍月之功癇風自能除根更佐以健脾利痰通絡清火之湯劑治法尤為完善取鉛灰法用黑鉛數斤熔化後其面上必有浮灰屢次熔化即可屢次取之制硫化鉛法用黑鉛四兩鐵鍋內熔化再用硫黃細末四兩撒於鉛上硫黃皆著急用鐵鏟拌炒鉛經硫黃燒煉結成砂子取出晾冷碾軋成餅者系未化透之鉛去之余者再用乳鉢研極細一味鐵養湯治癇風及肝膽之火暴動或脅疼或頭疼目眩或氣逆喘吐上焦煩熱至一切上盛下虛之證皆可用其湯煎藥又兼能補養血分方用長鏽生鐵和水磨取其鏽磨至水皆紅色煎湯服之化學家名鐵鏽為鐵養以鐵與氧氣化合而成鏽也其善於鎮肝膽者以其為金之餘氣借金以制木也其善治上盛下虛之證者因其性重墜善引逆上之相火下行相火為陰中之火與電氣為同類此即鐵能引電之理也其能補養血分者因人血中原有鐵鏽且取鐵鏽嗅之又有血腥之氣此乃以質補質以氣補氣之理且人身之血得氧氣則赤鐵鏽原鐵與氧氣化合故能補養血分也西人補血之藥所以有鐵酒一六歲幼女初數月一發癇風後至一日數發精神昏昏若睡未有醒時且兩目露睛似兼慢驚遂先用福幼編治慢驚之方治之而露睛之病除繼欲治其癇風偶憶方書有用三家磨刀水洗瘡法因鐵鏽能鎮肝以其水煎藥必能制肝膽上衝之火以熄內風乃磨水者但以水貯罐中而煎藥者誤認為藥亦在內遂但煎其水服之其病竟愈後知藥未服仍欲煎服愚曰磨刀水既對證藥可不服自此日煎磨刀水服兩次連服數日癇風永不再發一人年三十許癇風十餘年不愈其發必以夜授以前加味磁朱丸方服之而愈年餘其病又反復然不若從前之劇俾日磨濃鐵鏽水煎湯服之病遂除根族家嫂年六旬夜間忽然嘔吐頭疼心中怔忡甚劇上半身自汗其家人以為霍亂證診其脈關前浮洪搖搖而動俾急磨濃鐵鏽水煎湯服下即愈友人韓曾治一人當惱怒之後身軀忽然後挺氣息即斷一日數次韓診其脈左關虛浮遂投以萸肉去淨核龍骨牡蠣皆不用煅白芍諸藥用三家磨刀水煎之一日連服二劑病若失西藥治癇風者皆系麻醉腦筋之品強制腦筋使之不發鮮能祓除病根然遇癇風之劇而且勤身體羸弱不能支持者亦可日服其藥兩次以圖目前病不反復而徐以健脾利痰通絡清火之藥治之逮至身形強壯即可停止西藥而但治以健脾利痰通絡清火之品或更佐以鎮驚若硃砂磁石類祛風若蜈蚣全蠍類透達臟腑若麝香牛黃類之品因證制宜病根自能祓除無餘也十一治小兒風證方定風丹治初生小兒綿風其狀逐日抽掣綿綿不已亦不甚劇生明乳香三錢生明沒藥三錢硃砂一錢全蜈蚣大者一條全蠍一錢共為細末每小兒哺乳時用藥分許置其口中乳汁送下一日約服藥五次此方以治小兒綿風或驚風大抵皆效而能因證制宜再煮湯劑以送服此丹則尤效一小兒生後數日即抽綿風一日數次兩月不愈為擬此方服藥數日而愈所餘之藥又治愈小兒三人附録宗弟張喜用此丹以治小兒驚風又恆隨證之涼熱虛實作湯劑以送服此丹其所用之湯藥方頗有可採爰録其治驗之原案二則於下原案一己巳端陽前友人黃幼子生六月頭身胎毒終未愈稟質甚弱忽肝風內動抽掣綿綿不休囟門微凸按之甚軟微有赤色指紋色紫為爪形目睛昏而無神或歪脈浮小無根此因虛氣化不固致肝陽上衝腦部擾及神經也黃云此證西醫已諉為不治不知尚有救否答曰此證尚可為聽吾用藥當為竭力治愈遂先用定風丹三分水調灌下繼用生龍骨生牡蠣生石決明以潛其陽鉤藤鉤薄荷葉羚羊角銼細末三分以熄其風生箭耆生山藥山萸肉西洋參以補其虛清半夏膽南星粉甘草以開痰降逆和中共煎湯多半杯調入定風丹三分頻頻灌之二劑肝風止又增損其方四劑全愈按黃耆治小兒百病明載神農本草經惟此方用之微有升陽之嫌然神農本草經又謂其主大風肝風因虛內動者用之即能熄風可知且與諸鎮肝斂肝之藥並用若其分量止用二三錢原有益而無損也原案二天津聶姓幼子生七月夜間忽患肝風抽動喘息不知啼時當仲夏天氣亢旱燥熱察其風關氣關紋紅有爪形脈數身熱知系肝風內動急囑其乳母將小兒置床上不致懷抱兩熱相併又囑其開窗以通空氣先用急救回生丹吹入鼻中以鎮涼其腦系遂灌以定風丹三分又用薄荷葉黃菊花鉤藤鉤梔子羚羊角以散風清熱生龍骨生牡蠣生石決明以潛陽鎮逆天竹黃牛蒡子川貝母以利痰定喘將藥煎好仍調入定風丹三分囑其作數次灌下勿擾其睡嗣來信一劑風熄而病愈矣按此二證雖皆系肝風內動抽掣而病因虛實迥異張皆治以定風丹而其煎湯送服之藥因證各殊如此善用成方可為妙手靈心矣又獻縣劉姓之嬰孩抽綿風不已夜半詢方知病危急適存有按小兒風證方所制定風丹與以少許服之立止永未再犯後屢用此方皆效附方鮑云韶驗方新編預防小兒臍風散方用枯礬蓬砂各二錢半硃砂二分冰片麝香各五釐共為末凡小兒降生後洗過即用此末擦臍上每小兒換襁布時仍擦此末臍帶落後亦仍擦之擦完一料永無臍風之證按此方最妙愚用之多次皆效真育嬰之靈丹也鎮風湯治小兒急驚風其風猝然而得四肢搐溺身挺頸痙神昏面熱或目睛上竄或痰涎上壅或牙關緊閉或熱汗淋漓鉤藤鉤三錢羚羊角一錢另燉兌服龍膽草二錢青黛二錢清半夏二錢生赭石二錢軋細茯神二錢殭蠶二錢薄荷葉一錢硃砂二分研細送服磨濃生鐵鏽水煎藥小兒得此證者不必皆由驚恐有因外感之熱傳入陽明而得者方中宜加生石膏有因熱瘧而得者方中宜加生石膏柴胡急驚之外又有所謂慢驚者其證皆因寒與急驚之因熱者有冰炭之殊方書恆以一方治急慢驚風二證殊屬差謬慢驚之證惟莊在田福幼編辨之最精用方亦最妙其辨慢驚風共十四條一慢驚吐瀉脾胃虛寒也一慢驚身冷陽氣抑遏不出也一慢驚鼻風煽動真陰失守虛火燒肺也一慢驚面色青黃及白氣血兩虛也一慢驚口鼻中氣冷中寒也一慢驚大小便清白腎與大腸全無火也一慢驚昏睡露睛神氣不足也一慢驚手足抽掣血不行於四肢也一慢驚角弓反張血虛筋急也一慢驚乍寒乍熱陰血虛少陰陽錯亂也一慢驚汗出如洗陰虛而表不固也一慢驚手足瘛瘲血不足養筋也一慢驚囟門下陷虛至極也一慢驚身雖發熱口唇焦裂出血卻不喜飲冷茶水進以寒涼愈增危篤以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦黑乃真陰之不足也明矣脾風之證亦小兒發痙之證即方書所謂慢驚風也因慢驚二字欠解近世方書有改稱慢脾風者有但稱脾風者二名較之似但稱脾風較妥因其證之起點由於脾胃虛寒也蓋小兒雖為少陽之體而少陽實為稚陽有若草木之萌芽嬌嫩畏寒是以小兒或飲食起居多失於涼或因有病過服涼藥或久瘧久痢即不服涼藥亦可因虛生涼浸成脾風之證其始也因脾胃陽虛寒飲凝滯於賁門之間阻塞飲食不能下行即下行亦不能消化是以上吐而下瀉久之則真陰虛損可作灼熱其寒飲充盛迫其身中之陽氣外浮亦可作灼熱浸至肝虛風動纍及腦氣筋遂至發痙手足抽掣此證莊在田福幼編論之最詳其所擬之逐寒蕩驚湯及加味理中地黃湯二方亦最善先用逐寒蕩驚湯大辛大熱之劑衝開胸中寒痰可以受藥不吐然後接用加味理中地黃湯諸證自愈愚用其方救人多矣而因證制宜又恆有所變通方能隨手奏效附方逐寒蕩驚湯胡椒炮薑肉桂各一錢丁香十粒共搗成細渣以灶心土三兩煮湯澄清煎藥大半茶杯藥皆搗碎不可久煎肉桂又忌久煎三四沸即可頻頻灌之接服加味理中地黃湯定獲奇效按此湯當以胡椒為君若遇寒痰結胸之甚者當用二錢而稍陳者又不堪用族侄六歲時曾患此證飲食下咽胸膈格拒須臾吐出如此數日昏睡露睛身漸發熱投以逐寒蕩驚湯原方盡劑未吐欲接服加味理中地黃湯其吐又作恍悟此藥取之鄉間小藥坊其胡椒必陳且只用一錢其力亦小遂於食料鋪中買胡椒二錢炮薑肉桂丁香仍按原方煎服一劑而寒痰開豁可以受食繼服加味理中地黃湯一劑而愈方中所用灶心土須為變更凡草木之質多含鹼味草木燒化其鹼味皆歸灶心土中若取其土煎湯鹼味濃厚甚是難服且與脾胃不宜以灶壙內周遭火燎紅色之土代之則無鹼味其功效遠勝於灶心土加味理中地黃湯熟地五錢焦白朮三錢當歸黨參炙耆故紙炒搗棗仁炒搗枸杞各二錢炮薑萸肉去淨核炙草肉桂各一錢生薑三片紅棗三枚捭開胡桃二個用仁打碎為引仍用灶心土代以灶壙土二兩煮水煎藥取濃汁一茶杯加附子五分煎水攙入量小兒大小分數次灌之如咳嗽不止者加米殼金櫻子各一錢如大熱不退者加生白芍一錢泄瀉不止去當歸加丁香七粒隔二三日止用附子二三分蓋因附子大熱中病即宜去之如用附子太多則大小便閉塞不出如不用附子則臟腑沉寒固結不開若小兒虛寒至極附子又不妨用一二錢若小兒但瀉不止或微見驚搐尚可受藥吃乳便利者並不必服逐寒蕩驚湯只服此湯一劑而風定神清矣若小兒尚未成慢驚不過昏睡發熱或有時熱止或晝間安靜夜間發熱均宜服之若新病壯實之小兒眼紅口渴者乃實火之證方可暫行清解但果系實火必大便閉結氣壯聲洪且喜多飲涼水若吐瀉交作則非實火可知倘大虛之後服一劑無效必須大劑多服為妙方書所謂天吊風慢脾風皆系此證按此原方加減治瀉不止者但加丁香不去當歸而當歸最能滑腸瀉不止者實不宜用若減去當歸恐滋陰之藥少可多加熟地一二錢又服藥瀉仍不止者可用高麗參二錢搗為末分數次用藥湯送服其瀉必止慢驚風不但形狀可辨即其脈亦可辨族侄七八歲時瘧疾愈後忽然吐瀉交作時霍亂盛行其家人皆以為霍亂證診其脈弦細而遲六脈皆不閉塞愚曰此非霍亂吐瀉帶有黏涎否其家人謂偶有帶時愚曰此寒痰結胸格拒飲食乃慢驚風將成之兆也投以逐寒蕩驚湯加味理中地黃湯各一劑而愈又此二湯治慢驚風雖甚效驗然治此證者又當防之於預乃為完全之策一孺子年五六歲秋夏之交恣食瓜果當飯至秋末其行動甚遲正行之時或委坐於地愚偶見之遂懇切告其家人曰此乃慢驚風之先兆也小兒慢驚風證最為危險而此時調治甚易服藥兩三劑即無患矣其家人不以為然至冬初慢驚之形狀發現嘔吐不能受食又不即治遷延半月病勢垂危始欲調治而服藥竟無效矣又有狀類急驚而病因實近於慢驚者一童子年十一二咽喉潰爛醫者用吹喉藥吹之數日就愈忽然身挺四肢搐搦不省人事移時始醒一日數次診其脈甚遲濡詢其心中雖不覺涼實畏食涼物其呼吸似覺短氣時當仲夏以童子而畏食涼且徵以脈象病情其為寒痰凝結瘀塞經絡無疑投以傷寒論白通湯一劑全愈又治一五歲幼童先治以逐寒蕩驚湯可進飲食矣而滑瀉殊甚繼投以加味理中地黃湯一日連進兩劑泄瀉不止連所服之藥亦皆瀉出遂改用紅高麗參大者一支軋為細末又用生懷山藥細末六錢煮作粥送服參末一錢強如此日服三次其瀉遂止翌日仍用此方恐作脹滿又於所服粥中調入西藥百布聖六分如此服至三日病全愈又治一未周歲小孩食乳即吐屢次服藥亦吐出囟門下陷睡時露晴將成脾風俾其於每吃乳時用生硫黃細末一捻置兒口中乳汁送下其吐漸稀旬日全愈十二治內外中風方搜風湯治中風防風六錢真遼人參四錢另燉同服或用野臺參七錢代之高麗參不宜用清半夏三錢生石膏八錢殭蠶二錢柿霜餅五錢沖服麝香一分藥汁送服中風之證多因五內大虛或秉賦素虛或勞力勞神過度風自經絡襲入直透膜原而達臟腑令臟腑各失其職或猝然昏倒或言語謇澀或溲便不利或溲便不覺或兼肢體痿廢偏枯此乃至險之證中之輕者猶可遲延歲月中之重者治不如法危在翹足間也故重用防風引以麝香深入臟腑以搜風猶恐元氣虛弱不能運化藥力以逐風外出故用人參以大補元氣扶正即以勝邪也用石膏者因風蘊臟腑多生內熱人參補氣助陽分亦能生熱石膏質重氣輕性復微寒其重也能深入臟腑其輕也能外達皮毛其寒也能祛臟腑之熱而即解人參之熱也用殭蠶者徐靈胎謂邪之中人有氣無形穿經入絡愈久愈深以氣類相反之藥投之則拒而不入必得與之同類者和入諸藥使為嚮導則藥至病所而邪與藥相從藥性漸發邪或從毛孔出從二便出不能復留此從治之法也殭蠶因風而僵與風為同類故善引祛風之藥至於病所成功也用半夏柿霜者誠以此證皆痰涎壅滯有半夏以降之柿霜以潤之而痰涎自息也此證有表不解而浸生內熱者宜急用發汗藥解其表而兼清其內熱又兼有內風煽動者可與後內中風治法匯通參觀於治外感之中兼有熄內風之藥方為完善中風之證有偏寒者有偏熱者有不覺寒熱者拙擬此方治中風之無甚寒熱者也若偏熱者宜金匱風引湯加減乾薑桂枝宜減半若偏寒者愚別有經驗治法曾治一媼年五十許於仲冬忽然中風昏倒呼之不應其胸中似有痰涎壅滯大礙呼吸診其脈微細欲無且遲緩知其素有寒飲陡然風寒襲入與寒飲凝結為恙也急用胡椒三錢搗碎煎兩三沸取濃汁多半茶杯灌之呼吸頓覺順利繼用乾薑六錢桂枝尖當歸各三錢連服三劑可作呻吟肢體漸能運動而左手足仍不能動又將乾薑減半加生黃耆五錢乳香沒藥各三錢連服十餘劑言語行動遂復其常若其人元氣不虛而偶為邪風所中可去人參加蜈蚣一條全蠍一錢若其證甚實而閉塞太甚者或二便不通或脈象郁澀可加生大黃數錢內通外散仿防風通聖散之意可也徐靈胎曾治一人平素多痰手足麻木忽昏厥遺尿口噤手拳痰聲如鋸醫者進參附熟地等藥煎成末服診其脈洪大有力面赤氣粗此乃痰火充實諸竅皆閉服參附立危遂以小續命湯去桂附加生軍一錢為末假稱他藥納之恐旁人之疑駭也三劑而有聲五劑而能言然後以養血消痰之藥調之一月後步履如初此案與愚所治之案對觀則涼熱之間昭然矣又遺尿者多屬虛而此案中之遺尿則為實是知審證者不可拘於一端也然真中風證極少類中風者極多中風證百人之中真中風不過一二人審證不確即凶危立見此又不可不慎也逐風湯治中風抽掣及破傷後受風抽掣者生箭耆六錢當歸四錢羌活二錢獨活二錢全蠍二錢全蜈蚣大者兩條蜈蚣最善搜風貫串經絡臟腑無所不至調安神經又具特長而其性甚和平從未有服之覺瞑眩者曾治一媼年六旬其腿為狗咬破受風周身抽掣延一老醫調治服藥十餘日抽掣愈甚所用之藥每劑中皆有全蠍數錢佐以祛風活血助氣之藥倣佛此湯而獨未用蜈蚣遂為擬此湯服一劑而抽掣即止又服一劑永不反復又治一人年三十餘陡然口眼歪斜其受病之邊目不能瞬俾用蜈蚣二條為末防風五錢煎湯送服三次全愈審斯則蜈蚣逐風之力原迥異於他藥也且其功效不但治風也愚於瘡癰初起甚劇者恆加蜈蚣於托藥之中莫不隨手奏效雖神農本草經謂有墜胎之弊而中風抽掣服他藥不效者原不妨用內經所謂有故無殞亦無殞也況此湯中又有黃耆當歸以保攝氣血則用分毫何損哉加味黃耆五物湯治歷節風證周身關節皆疼或但四肢作疼足不能行步手不能持物生箭耆一兩於術五錢當歸五錢桂枝尖三錢秦艽三錢廣陳皮三錢生杭芍五錢生薑五片熱者加知母涼者加附子脈滑有痰者加半夏金匱桂枝芍藥知母湯治歷節風之善方也而氣體虛者用之仍有不效之時以其不勝麻黃防風之發也今取金匱治風痹之黃耆五物湯加白朮以健脾補氣而即以逐痹神農本草經逐寒濕痹當歸以生其血血活自能散風方書謂血活風自去秦艽為散風之潤藥性甚和平祛風而不傷血陳皮為黃耆之佐使又能引肌肉經絡之風達皮膚由毛孔而出也廣橘紅其大者皆柚也非橘也神農本草經原橘柚並稱故用於藥中橘柚似無須分別他處柚皮不可入藥且名為橘紅其實皆不去白誠以原不宜去也附録直隸青縣張來函湖北張某患歷節風證西醫名僂麻質斯服其藥年餘無效步履艱難天未涼即著皮褲診其脈浮數有力知為經絡虛而有熱之象遂用加味黃耆五物湯遵注熱者加知母又加生薏米鮮桑枝牛膝木通服一劑覺輕減三劑離杖五劑痊愈近年用此方治痛風歷節證愈者甚多若無熱者即用書中原方亦甚效驗江蘇平臺王來函顧患肢體痿廢時當溽暑遍延中西醫診治無效用加味黃耆五物湯治之連服數劑全愈加味玉屏風散治破傷後預防中風或已中風而瘛瘲或因傷後房事不戒以致中風生箭耆一兩白朮八錢當歸六錢桂枝尖錢半防風錢半黃蠟三錢生白礬一錢作湯服此方原為預防中風之藥故用黃耆以固皮毛白朮以實肌肉黃蠟白礬以護膜原猶恐破傷時微有感冒故又用當歸防風桂枝以活血散風其防風桂枝之分量特輕者誠以此方原為預防中風而設故不欲重用發汗之藥以開腠理也蓋神農本草經原謂黃耆主大風方中重用黃耆一兩又有他藥以為之佐使宜其風證皆可治也若已中風抽掣者宜加全蜈蚣兩條若更因房事不戒以致中風抽風者宜再加真鹿角膠三錢另煎兌服獨活一錢半若脈象有熱者用此湯時知母天冬皆可酌加自擬此方以來凡破傷後恐中風者俾服藥一劑永無意外之變用之數十年矣表侄高之族人被人用槍彈擊透手心中風抽掣牙關緊閉自牙縫連灌藥無效勢已垂危從前其莊有因破傷預防中風服此方者高見而録之至此高將此方授族人一劑而愈又一人被傷後因房事不戒中風抽掣服藥不效友人毛治之亦投以此湯而愈夫愚擬此方原但為預防中風而竟如此多效此愚所不及料者也鎮肝熄風湯治內中風證亦名類中風即西人所謂腦充血證其脈弦長有力即西醫所謂血壓過高或上盛下虛頭目時常眩暈或腦中時常作疼發熱或目脹耳鳴或心中煩熱或時常噫氣或肢體漸覺不利或口眼漸形歪斜或面色如醉甚或眩暈至於顛仆昏不知人移時始醒或醒後不能復原精神短少或肢體痿廢或成偏枯懷牛膝一兩生赭石一兩軋細生龍骨五錢搗碎生牡蠣五錢搗碎生龜板五錢搗碎生杭芍五錢玄參五錢天冬五錢川楝子二錢搗碎生麥芽二錢茵陳二錢甘草錢半心中熱甚者加生石膏一兩痰多者加膽星二錢尺脈重按虛者加熟地黃八錢淨萸肉五錢大便不實者去龜板赭石加赤石脂喻嘉言謂石脂可代赭石一兩風名內中言風自內生非風自外來也內經謂諸風掉眩皆屬於肝蓋肝為木臟木火熾盛亦自有風此因肝木失和風自肝起又加以肺氣不降腎氣不攝沖氣胃氣又復上逆於斯臟腑之氣化皆上升太過而血之上注於腦者亦因之太過致充塞其血管而纍及神經其甚者致令神經失其所司至昏厥不省人事西醫名為腦充血證誠由剖解實驗而得也是以方中重用牛膝以引血下行此為治標之主藥而復深究病之本源用龍骨牡蠣龜板芍藥以鎮熄肝風赭石以降胃降沖玄參天冬以清肺氣肺中清肅之氣下行自能鎮制肝木至其脈之兩尺虛者當系腎臟真陰虛損不能與真陽相維繫其真陽脫而上奔並挾氣血以上衝腦部故又加熟地萸肉以補腎斂腎從前所擬之方原止此數味後因用此方效者固多間有初次將藥服下轉覺氣血上攻而病加劇者於斯加生麥芽茵陳川楝子即無斯弊蓋肝為將軍之官其性剛果若但用藥強制或轉激發其反動之力茵陳為青蒿之嫩者得初春少陽生髮之氣與肝木同氣相求瀉肝熱兼舒肝鬱實能將順肝木之性麥芽為谷之萌芽生用之亦善將順肝木之性使不抑鬱川楝子善引肝氣下達又能折其反動之力方中加此三味而後用此方者自無他虞也心中熱甚者當有外感伏氣化熱故加石膏有痰者恐痰阻氣化之升降故加膽星也內中風之證曾見於內經而內經初不名為內中風亦不名為腦充血而實名之為煎厥大厥薄厥今試譯內經之文以明之內經脈解篇曰肝氣當治而未得故善怒善怒者名曰煎厥蓋肝為將軍之官不治則易怒因怒生熱煎耗肝血遂致肝中所寄之相火掀然暴發挾氣血而上衝腦部以致昏厥此非因肝風內動而遂為內中風之由來乎內經調經論曰血之與氣並走於上此為大厥厥則暴死氣反則生氣不反則死蓋血不自升必隨氣而上升上升之極必至腦中充血至所謂氣反則生氣不反則死者蓋氣反而下行血即隨之下行故其人可生若其氣上行不反血必隨之充而益充不至血管破裂不止猶能望其復蘇乎讀此節經文內中風之理明腦充血之理亦明矣內經生氣通天論曰陽氣者大怒則形絶血宛即郁字於上使人薄厥觀此節經文不待詮解即知其為肝風內動以致腦充血也其曰薄厥者言其腦中所宛之血激薄其腦部以至於昏厥也細思三節經文不但知內中風即西醫所謂腦充血且更可悟得此證治法於經文之中不難自擬對證之方而用之必效也特是證名內中風所以別外受之風也乃自唐宋以來不論風之外受內生渾名曰中風夫外受之風為真中風內生之風為類中風其病因懸殊治法自難從同若辨證不清本系內中風而亦以祛風之藥發表之其臟腑之血必益隨發表之藥上升則腦中充血必益甚或至於血管破裂不可救藥此關未透誠唐宋醫學家一大障礙也逮至宋末劉河間出悟得風非皆由外中遂創為五志過極動火而猝中之論此誠由內經諸風掉眩皆屬於肝句悟出蓋肝屬木中藏相火木盛火熾即能生風也大法以白虎湯三黃湯沃之所以治實火也以逍遙散疏之所以治鬱火也逍遙散中柴胡能引血上行最為忌用是以鎮肝熄風湯中止用茵陳生麥芽諸藥疏肝以通聖散方中防風亦不宜用涼膈散雙解之所以治表裡之邪火也以六味湯滋之所以壯水之主以制陽光也以八味丸引之所謂從治之法引火歸源也雖曰引火歸源而桂附終不宜用細審河間所用之方雖不能絲絲入扣然勝於但知治中風不知分內外者遠矣且其謂有實熱者宜治以白虎湯尤為精確之論愚治此證多次其昏僕之後能自蘇醒者多不能蘇醒者少其於蘇醒之後三四日間現白虎湯證者恆十居六七因知此證多先有中風基礎伏藏於內後因外感而激發是以從前醫家統名為中風不知內風之動雖由於外感之激發然非激發於外感之風實激發於外感之因風生熱內外兩熱相併遂致內風暴動此時但宜治外感之熱不可再散外感之風此所以河間獨借用白虎湯以瀉外感之實熱而於麻桂諸藥概無所用蓋發表之藥皆能助血上行是以不用此誠河間之特識也吾友張山雷江蘇嘉定人著有中風斠詮一書發明內中風之證甚為精詳書中亦獨有取於河間可與拙論參觀矣後至元李東垣朱丹溪出對於內中風一證於河間之外又創為主氣主濕之説東垣謂人之元氣不足則邪湊之令人猝倒僵仆如風狀夫人身之血原隨氣流行氣之上升者過多可使腦部充血排擠腦髓神經至於昏厥前所引內經三節文中已言之詳矣若氣之上升者過少又可使腦部貧血無以養其腦髓神經亦可至於昏厥是以內經又謂上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之眩觀內經如此云云其劇者亦可至於昏厥且其謂腦為之不滿實即指腦中貧血而言也由斯而論東垣之論內中風由於氣虛邪湊原於腦充血者之中風無關而實為腦貧血者之中風開其治法也是則河間之主火為腦充血東垣之主氣為腦貧血一實一虛迥不同也至於丹溪則謂東南氣溫多濕有病風者非風也由濕生痰痰生熱熱生風此方書論中風者所謂丹溪主濕之説也然其證原是痰厥與腦充血腦貧血皆無涉即使二證當昏厥之時間有挾痰者乃二證之兼證非二證之本病也按其所謂因熱生風之見解似與河間主火之意相同而實則迥異蓋河間所論之火生於燥故所用之藥注重潤燥滋陰丹溪所論之熱生於濕其所用之藥注重去濕利痰夫濕非不可以生熱然因濕生熱而動肝風者甚少矣肝風之動多因有燥熱是則二子之説仍以河間為長也至清中葉王勳臣出對於此證專以氣虛立論謂人之元氣全體原十分有時損去五分所餘五分雖不能充體猶可支持全身而氣虛者經絡必虛有時氣從經絡虛處透過並於一邊彼無氣之邊即成偏枯爰立補陽還五湯方中重用黃耆四兩以峻補氣分此即東垣主氣之説也然王氏書中未言脈象何如若遇脈之虛而無力者用其方原可見效若其脈象實而有力其人腦中多患充血而復用黃耆之溫而升補者以助其血愈上行必至凶危立見此固不可不慎也前者邑中某人右手廢不能動足仍能行其孫出門遇一在津業醫者甫歸言此證甚屬易治遂延之診視所立病案言脈象洪實已成瘓證無疑其方仿王氏補陽還五湯有黃耆八錢服藥之後須臾昏厥不醒矣夫病本無性命之憂而誤服黃耆八錢竟至如此可不慎哉劉丁卯來津後其腦中常覺發熱時或眩暈心中煩躁不寧脈象弦長有力左右皆然知系腦充血證蓋其憤激填胸焦思積慮者已久是以有斯證也為其腦中覺熱俾用緑豆實於囊中作枕為外治之法又治以鎮肝熄風湯於方中加地黃一兩連服數劑腦中已不覺熱遂去川楝子又將生地黃改用六錢服過旬日脈象和平心中亦不煩躁遂將藥停服又天津於氏所娶新婦過門旬余忽然頭疼醫者疑其受風投以發表之劑其疼陡劇號呼不止延愚為之診視其脈弦硬而長左部尤甚知其肝膽之火上衝過甚也遂投以鎮肝熄風湯加龍膽草三錢以瀉其肝膽之火一劑病愈強半又服兩劑頭已不疼而脈象仍然有力遂去龍膽草加生地黃六錢又服數劑脈象如常遂將藥停服加味補血湯治身形軟弱肢體漸覺不遂或頭重目眩或神昏健忘或覺腦際緊縮作疼甚或昏僕移時蘇醒致成偏枯或全身痿廢脈象遲弱內中風證之偏虛寒者肝過盛生風肝虛極亦可生風此即西人所謂腦貧血病也久服此湯當愈生箭耆一兩當歸五錢龍眼肉五錢真鹿角膠三錢另燉同服丹參三錢明乳香三錢明沒藥三錢甘松二錢服之覺熱者酌加天花粉天冬各數錢覺發悶者加生雞內金錢半或二錢服數劑後若不甚見效可用所煎藥湯送服麝香二釐或真冰片半分亦可若服後仍無甚效可用藥湯送制好馬錢子二分腦充血者其腦中之血過多固能傷其腦髓神經腦貧血者其腦中之血過少又無以養其腦髓神經是以究其終極皆可使神經失其所司也古方有補血湯其方黃耆當歸同用而黃耆之分量竟四倍於當歸誠以陰陽互為之根人之氣壯旺者其血分自易充長況人之腦髓神經雖賴血以養之尤賴胸中大氣上升以斡旋之是以內經謂上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之眩所謂上氣者即胸中大氣上升於腦中者也因上氣不足血之隨氣而注於腦者必少而腦為之不滿其腦中貧血可知且因上氣不足不能斡旋其神經血之注於腦者少無以養其神經於是而耳鳴頭傾目眩其人可忽至昏僕可知由此知因腦部貧血以成內中風證者原當峻補其胸中大氣俾大氣充足自能助血上升且能斡旋其腦部使不至耳鳴頭傾目眩也是以此方不以當歸為主藥而以黃耆為主藥也用龍眼肉者因其味甘色赤多含津液最能助當歸以生血也用鹿角膠者因鹿之角原生於頭頂督脈之上督脈為腦髓之來源故鹿角膠之性善補腦髓凡腦中血虛者其腦髓亦必虛用之以補腦髓實可與補血之藥相助為理也用丹參乳香沒藥者因氣血虛者其經絡多瘀滯此於偏枯痿廢亦頗有關係加此通氣活血之品以化其經絡之瘀滯則偏枯痿廢者自易愈也用甘松者為其能助心房運動有力以多輸血於腦且又為調養神經之要品能引諸藥至腦以調養其神經也用麝香梅片者取其香能通竅以開閉也用制過馬錢子者取其能瞤動腦髓神經使之靈活也甘松即西藥中之纈草其氣香味微酸神農本草經謂其治暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣名醫別録謂其治癰腫浮腫結熱風痹不足産後痛甄權謂其治毒風𤸷痹破多年凝血能化膿為水産後諸病止腹痛余疹煩渴大明謂其除血氣心腹痛破癥結催生落胞血暈鼻血吐血赤白帶下眼障膜丹毒排膿補痿西人則以為興奮之品善治心臟麻痹霍亂轉筋東人又以為鎮靜神經之特效藥用治癲狂癇痙諸病蓋為其氣香故善興奮心臟使不至於麻痹而其馨香透竅之力亦自能開痹通瘀也為其味酸故能保安神經使不至於妄行而酸化軟堅之力又自能化多年之癥結使盡消融也至於其能補痿能治霍亂轉筋者即心臟不麻痹神經不妄行之功效外著者也孰謂中西醫理不相貫通哉高姓臾年過六旬漸覺兩腿乏力浸至時欲眩僕神昏健忘恐成痿廢求為診治其脈微弱無力為制此方服之連進十劑兩腿較前有力健忘亦見愈而仍有眩暈之時再診其脈雖有起色而仍不任重按遂於方中加野臺參天門冬各五錢威靈仙一錢連服二十餘劑始愈用威靈仙者欲其運化參耆之補力使之靈活也門人張曾治一人年三十餘於季冬負重貿易日行百餘里歇息時又屢坐寒地後覺腿疼不能行步浸至臥床不能動轉周身筋骨似皆痿廢服諸藥皆不效張治以加味補血湯將方中乳香沒藥皆改用六錢又加淨萸肉一兩數劑後腿即不疼又服十餘劑遂全愈按加味補血湯原治內中風之氣血兩虧者而略為變通即治腿疼如此效驗可謂善用成方者矣十三治肢體痿廢方振頽湯治痿廢生黃耆六錢知母四錢野臺參三錢於術三錢當歸三錢生明乳香三錢生明沒藥三錢威靈仙錢半乾薑二錢牛膝四錢熱者加生石膏數錢或至兩許寒者去知母加烏附子數錢筋骨受風者加明天麻數錢脈弦硬而大者加龍骨牡蠣各數錢或更加山萸肉亦佳骨痿廢者加鹿角膠虎骨膠各二錢另燉同服然二膠偽者甚多若恐其偽可用續斷菟絲子各三錢代之手足皆痿者加桂枝尖二錢痿證之大旨當分為三端有肌肉痹木抑搔不知疼癢者其人或風寒襲入經絡或痰涎鬱塞經絡或風寒痰涎互相凝結經絡之間以致血脈閉塞而其原因實由於胸中大氣虛損蓋大氣旺則全體充盛氣化流通風寒痰涎皆不能為恙大氣虛則腠理不固而風寒易受脈管湮淤而痰涎易郁矣有周身之筋拘攣而不能伸者蓋人身之筋以宗筋為主而能榮養宗筋者陽明也其人脾胃素弱不能化谷生液以榮養宗筋更兼內有蘊熱以鑠耗之或更為風寒所襲致宗筋之伸縮自由者竟有縮無伸浸成拘攣矣有筋非拘攣肌肉非痹木惟覺骨軟不能履地者乃骨髓枯涸腎虛不能作強也方中用黃耆以補大氣白朮以健脾胃當歸乳香沒藥以流通血脈靈仙以祛風消痰恐其性偏走泄而以人參之氣血兼補者佐之乾薑以開氣血之痹知母以解乾薑人參之熱則藥性和平可久服而無弊其陽明有實熱者加石膏以清陽明之熱仿金匱風引湯之義也營衛經絡有凝寒者加附子以解營衛經絡之寒仿金匱近效朮附湯之義也至其脈弦硬而大乃內風煽動真氣不固之象故加龍骨牡蠣以熄內風斂真氣骨痿者加鹿膠虎膠取其以骨補骨也筋骨受風者加明天麻取其能搜筋骨之風又能補益筋骨也若其痿專在於腿可但用牛膝以引之下行若其人手足並痿者又宜加桂枝兼引之上行或問此方治痿之因熱者可加生石膏至兩許其證有實熱可知而方中仍用乾薑何也答曰金匱風引湯治熱癱癇之的方原石膏寒水石與乾薑並用蓋二石性雖寒而味則淡其寒也能勝乾薑之熱其淡也不能勝乾薑之辣故痿證之因熱者仍可借其異常之辣味以開氣血之痹也振頽丸前證之劇者可兼服此丸或單服此丸亦可並治偏枯痹木諸證人參二兩於術二兩炒當歸一兩馬錢子一兩法制乳香一兩沒藥一兩全蜈蚣大者五條不用炙穿山甲一兩蛤粉炒共軋細過羅煉蜜為丸如桐子大每服二錢無灰溫酒送下日再服馬錢子即番本鱉其毒甚烈而其毛與皮尤毒然治之有法則有毒者可至無毒而其開通經絡透達關節之力實遠勝於他藥也今將制馬錢子法詳載於下法將馬錢子先去淨毛水煮兩三沸即撈出用刀將外皮皆刮淨浸熱湯中旦暮各換湯一次浸足三晝夜取出再用香油煎至純黑色擘開視其中心微有黃意火候即到將馬錢子撈出用溫水洗數次將油洗淨再用沙土同入鍋內炒之土有油氣換土再炒以油氣盡淨為度馬錢子為健胃妙藥馬錢子性雖有毒若制至無毒服之可使全身瞤動以治肢體麻痹此興奮神經之作用若少少服之但令胃腑瞤動有力則胃中之食必速消此非但憑理想實有所見而云然也滄州朱媼年過六旬素有癇風證醫治數十年先服中藥無效繼服西藥麻醉腦筋之品雖見效然必日日服之始能強制不發因諸藥性皆鹹寒久服傷胃浸至食量減少身體羸弱後有人授以王勳臣龍馬自來丹方其方原以馬錢子為主藥如法制好服之數日食量頓增旬余身體漸壯癇病雖未即除根而已大輕減矣由斯知馬錢子健胃之功效迥異乎他藥也特是龍馬自來丹馬錢子伍以地龍為治癇風設也若用以健胃宜去地龍加炒白朮細末其健胃之效益著爰擬定其方於下炒白朮四兩細末制好馬錢子一兩細末二藥調勺水和為丸一分重乾透足一分飯後服五丸一日再服旬余自見功效薑膠膏治肢體受涼疼痛或有凝寒阻遏血脈麻木不仁鮮薑自然汁一斤明亮水膠四兩上二味同熬成稀膏攤於布上貼患處旬日一換凡因受寒肢體疼痛或因受寒肌肉麻木不仁者貼之皆可治愈即因受風而筋骨疼痛或肌肉麻木者貼之亦可治愈惟有熱腫疼者則斷不可用蓋此等證心中無病原宜外治鮮薑之辛辣開通熱而能散故能溫暖肌肉深透筋骨以除其凝寒痼冷而渙然若冰釋也用水膠者借其黏滯之力然後可熬之成膏也若證因受風而得者擬用細辛細末摻於膏藥之中或用他祛風猛悍之藥摻於其中其奏效當更捷也有人因寢涼炕之上其右腿外側時常覺涼且有時疼痛用多方治之不效語以此方貼至二十日全愈又有人常在寒水中捕魚為寒水所傷自膝下被水浸處皆麻木抑搔不知疼癢漸覺行動乏力語以此方俾用長條布攤藥膏纏於腿上其足趺足底皆貼以此膏亦數換而愈十四治膈食方參赭培氣湯治膈食論胃病噎膈治法及反胃治法宜參看潞黨參六錢天門冬四錢生赭石八錢軋細清半夏三錢淡蓯蓉四錢知母五錢當歸身三錢柿霜餅五錢服藥後含化徐徐咽之人之一身自飛門以至魄門一氣主之亦一氣懸之故人之中氣充盛則其賁門胃之上口寬展自能容受水穀下通幽門胃之下口以及小腸大腸出為二便病何由而作若中氣衰憊不能撑懸於內則賁門縮小以及幽門小腸大腸皆為之緊縮觀膈證之病劇者大便如羊矢固因液短實亦腸細也況中氣不旺胃氣不能息息下降而沖氣轉因胃氣不降而乘虛上干致痰涎亦隨逆氣上並以壅塞賁門夫此時賁門已縮如藕孔又加逆氣痰涎以壅塞其間又焉能受飲食以下達乎故治此證者當以大補中氣為主方中之人參是也以降逆安沖為佐以清痰理氣為使方中之赭石半夏柿霜是也又慮人參性熱半夏性燥故又加知母天冬當歸柿霜以清熱潤燥生津生血也用蓯蓉者以其能補腎即能斂沖沖氣不上衝則胃氣易於下降且患此證者多有便難之虞蓯蓉與當歸赭石並用其潤便通結之功又甚效也若服數劑無大效當系賁門有瘀血宜加三稜桃仁各二錢仲景傷寒論有旋覆代赭石湯原治傷寒發汗若吐若下解後心下痞硬噫氣不除者周揚俊喻嘉言皆謂治膈證甚效拙擬此方重用赭石不用旋覆花者因旋覆花神農本草經原言味鹹今坊間所鬻旋覆花苦而不咸用之似無效驗惟邑武帝臺為漢武帝築臺望海之處地多鹹鹵周圍所産旋覆花大於坊間鬻者幾一倍其味鹹而兼辛以治膈食甚效或問神農本草經旋覆花未言苦亦未言辛藥坊之苦者既與神農本草經之氣味不合豈武帝臺之辛者獨與神農本草經之氣味合乎答曰古人立言尚簡多有互文以見義者神農本草經為有文字後第一書其簡之又簡可知故讀神農本草經之法其主治未全者當於氣味中求之其氣味未全者即可於主治中求之旋覆花神農本草經載其主結氣脅下滿驚悸除水去五臟間寒熱補中下氣三復神農本草經主治之文則復花當為平肝降氣之要藥應借辛味以鎮肝木其味宜咸而兼辛明矣至於苦味性多令人湧吐是以旋覆花不宜兼此味也其味不至甚苦亦可斟酌加入也一叟年六十餘得膈證向愚求方自言猶能細嚼焦脆之物用湯水徐徐送下然一口咽之不順即嘔吐不能再食且嘔吐之時帶出痰涎若干診其脈關後微弱關前又似滑實知其上焦痰涎壅滯也用此湯加邑武帝臺所産旋覆花二錢連服四劑而愈一人年四十六素耽葉子戲至廢寢食初覺有氣上衝咽喉浸至妨礙飲食時或嘔吐不能下行其脈弦長而硬左右皆然知系沖氣挾胃氣上衝治以此湯加武帝臺旋覆花二錢生芡實四錢降其沖逆之氣而收斂之連服十劑而愈族家姑年五旬有六初覺飲食有礙後浸增重惟進薄粥其脈弦細無力蓋生平勤儉持家自奉甚薄勞心勞力又甚過其脈之細也因飲食菲薄而氣血衰其脈之弦也因勞心過度而痰飲盛也姑上有兩姊皆以此疾逝世氣同者其病亦同惴惴自恐不愈愚毅然以為可治投以此湯加白朮二錢龍眼肉三錢連服十餘劑全愈堂侄女年四十八歲素羸弱多病因自理家務勞心過度恆徹夜不寐於癸卯夏日得膈證時愚遠出遂延他醫調治屢次無效及愚旋里病勢已劇其脈略似滑實重按無力治以此湯加龍眼肉五錢兩劑見輕又服十餘劑全愈奉天北鎮縣蕭叟年六十七歲得膈證延醫治不愈遷延五六月病浸加劇飲水亦間有難下之時來院求為診治其脈弦長有力右部尤甚知其沖氣上衝過甚迫其胃氣不下降也詢其大便乾燥不易下多日不行又須以藥通之投以參赭培氣湯赭石改用一兩數劑後飲食見順脈亦稍和覺胃口仍有痰涎杜塞為加清半夏三錢連服十劑飲食大順脈亦復常大便亦較易遂減赭石之半又服數劑大便一日兩次遂去赭石柿霜餅當歸知母加於術三錢數劑後自言覺胃中消化力稍弱此時痰涎已清又覺胃口似有疙瘩稍礙飲食之路遂將於術改用六錢又加生雞內金搗細二錢佐於術以健運脾胃即藉以消胃口之障礙連服十餘劑全愈友人吳治薑姓叟年六十餘得膈食證屢次延醫調治服藥半載病轉增進吳投以參赭培氣湯為其脈甚弦硬知其沖氣上衝又兼血液枯少也遂加生芡實以收斂沖氣龍眼肉以滋潤血液一劑能進飲食又連服七八劑飲食遂能如常附録奉天義縣馬來函去歲乙丑舍侄患膈食延醫診治年餘無效及病至垂危諸醫束手無策有舊戚贈一良方言系衷中參西録所載之方名參赭培氣湯服之立見功效連服十劑其病全愈奉天法庫縣萬來函邱之女年十五天癸已至因受驚而經閉兩閲月發現心熱心跳膨脹等證經醫治療未效更添翻胃吐食便燥自汗等證又經兩月更醫十數病益劇適友人介紹為之診視脈浮數而濡尺弱於寸面色枯稿肢體消瘦不能起床蓋兩月間食入即吐或俟半日許亦必吐出不受水穀之養並灼熱耗陰無怪其支離若是也思之再四此必因受驚氣亂而血亦亂遂至遏其生機且又在童年血分未充即不能應月而潮久之不下行必上逆氣機亦即上逆況沖為血海隸屬陽明陽明有升無降沖血即隨之上逆瘀而不行以至作灼作脹其心跳者為上衝之氣血所擾也其出汗吐食者為上衝之氣血所迫也其津液因汗吐過多而消耗所以大便乾燥也勢非降逆滋陰鎮心解瘀之藥並用不可查參赭鎮氣湯及參赭培氣湯二方實為治斯證之津梁爰即二方加減赭石兩半當歸淨萸肉龍骨牡蠣各五錢白芍肉蓯蓉黨參天冬生雞內金各三錢磨取鐵鏽之水煎服一劑病似覺甚病家譁然以為藥不對證欲另延醫惟介紹人主持甚力勉又邀生再診此中喧變生固未之知也既診脈如故決無病進之象後聞有如此情形生亦莫解因反復思之恍悟此必胃虛已極兼胃氣上逆過甚遽投以如此重劑其胃虛不能運化氣逆更多衝激想有一番瞑眩故病似加重也於斯將原方減半煎湯一盅又分兩次溫服下並送服柿霜三錢其第一次服仍吐藥一半二次即不吐服完此劑後略進薄粥亦未吐病家始歡然相信又連服三劑汗與吐均止心跳膨脹亦大見輕惟灼熱猶不甚減遂去淨萸肉龍骨牡蠣加生地玄參各四錢服五劑後灼熱亦愈強半如此加減服之一月後遂能起床矣囑其仍守服原方至諸病全愈後可停藥勿服月事至期亦當自至也十五治嘔吐方鎮逆湯治嘔吐因胃氣上逆膽火上衝者生赭石六錢細軋青黛二錢清半夏三錢生杭芍四錢龍膽草三錢吳茱萸一錢生薑二錢野臺參二錢薯蕷半夏粥治胃氣上逆沖氣上衝以致嘔吐不止聞藥氣則嘔吐益甚諸藥皆不能下咽者生山藥一兩軋細清半夏一兩上二味先將半夏用微溫之水淘洗數次不使分毫有礬味用做飯小鍋勿用藥瓶煎取清湯約兩杯半去渣調入山藥細末再煎兩三沸其粥即成和白沙糖食之若上焦有熱者以柿霜代沙糖涼者用粥送服乾薑細末半錢許吐後口舌乾燥思飲水者熱也吐後口舌濕潤不思飲水者涼也若嘔吐既久傷其津液雖有涼者亦可作渴又當細審其脈滑疾為熱弦遲為涼滑而無力為上盛下虛上則熱而下或涼弦而有力為沖胃氣逆脈似熱卻非真熱又當問其所飲食者消化與否所嘔吐者改味與否細心詢問體驗自能辨其涼熱虛實不誤也從來嘔吐之證多因胃氣衝氣並而上逆半夏為降胃安沖之主藥故金匱治嘔吐有大小半夏湯特是嘔者最忌礬味而今之坊間鬻者雖清半夏亦有礬故必將礬味洗淨而後以治嘔吐不至同於抱薪救火也其多用至一兩者誠以半夏味本辛辣因坊間治法太過辣味全消又經數次淘洗其力愈減必額外多用之始能成降逆止嘔之功也而必與山藥作粥者凡嘔吐之人飲湯則易吐食粥則借其稠黏留滯之力可以略存胃腑以待藥力之施行且山藥在上大能補肺生津則多用半夏不慮其燥在下大能補腎斂沖則沖氣得養自安其位且與半夏皆無藥味故用於嘔吐甚劇不能服藥者尤宜也有因膽倒而嘔吐不止者續名醫類案載許宣治一兒十歲從戲臺倒跌而下嘔吐苦水緑如菜汁許曰此膽倒也膽汁傾盡則死矣方用溫膽湯加棗仁代赭石正其膽腑可名正膽湯一服吐止按此證甚奇異附載於此以備參考十六治霍亂方急救回生丹治霍亂吐瀉轉筋諸般痧證暴病頭目眩暈咽喉腫疼赤痢腹疼急性淋證硃砂頂高者一錢五分冰片三分薄荷冰二分粉甘草一錢細末上藥四味共研細分作三次服開水送下約半點鐘服一次若吐劇者宜於甫吐後急服之若於將吐時服之恐藥未暇展布即吐出服後溫復得汗即愈服一次即得汗者後二次仍宜服之若服完一劑未全愈者可接續再服一劑若其吐瀉已久氣息奄奄有將脫之勢但服此藥恐不能挽回宜接服後急救回陽湯硃砂能解心中竄入之毒且又重墜善止嘔吐俾服藥後不致吐出此方中冰片宜用樟腦煉成者因樟腦之性原善振興心臟通活周身血脈尤善消除毒菌特其味稍劣煉之為冰片味較清馥且經煉而其力又易上升至腦以清腦中之毒也薄荷冰善解虎列拉之毒西人屢發明之且其味辛烈香竄無竅不通無微不至周身之毒皆能掃除矧與冰片又同具發表之性服之能作汗解使內蘊之邪由汗透出且與冰片皆性熱用涼無論症之因涼因熱投之咸宜也粉甘草最善解毒又能調和中宮以止吐瀉且又能調和冰片薄荷冰之氣味使人服之不致過於苛辣也霍亂之證西人所謂虎列拉也因空氣中有時含有此毒而地面積穢之處又釀有毒氣與之混合觀此證起點多在大埠不潔之處可知隨呼吸之氣入肺由肺傳心胞即心肺相連之脂膜由心胞傳三焦上焦心下膈膜中焦包脾連胃脂膜下焦絡腸包腎脂膜為手厥陰少陽臟腑之相傳然其毒入三焦其人中氣充盛無隙可乘猶伏而不動有時或飲食過量或因寒涼傷其脾胃將有吐瀉之勢毒即乘虛內襲盤據胃腸上下不通遂揮霍撩亂而吐瀉交作矣吐瀉不已其毒可由腸胃而入心更由心而上竄於腦致腦髓神經與心俱病左心房輸血之力與右心房收血之力為之頓減是以周身血脈漸停而通體皆涼也其證多發於秋際者因此毒氣釀成多在夏令人當暑熱之時周身時時有汗此毒之伏於三焦者猶得隨汗些些外出逮至秋涼汗閉其毒不得外出是以蓄極而動乘脾胃之虛而內攻也故治此症者當以解毒之藥為主以助心活血之藥為佐以調陰陽奠中土之藥為使爰擬此方名之曰急救回生丹附録直隸故城縣袁來函前次寄來急救回生丹方不知何以斟酌盡善初故城鬧疫按方施藥六十劑皆隨手輒效後故城外鎮鄭家口鬧疫又施藥二百劑又莫不全活衛生防疫寶丹治霍亂吐瀉轉筋下痢腹疼及一切痧症平素口含化服能防一切癘疫傳染粉甘草十兩細末細辛兩半細末香白芷一兩細末薄荷冰四錢細末冰片二錢細末硃砂三兩細末先將前五味和勻用水為丸如桐子大晾乾不宜日曬再用硃砂為衣勿令餘剩裝以布袋雜以琉珠來往撞蕩務令光滑堅實如此日久可不走氣味若治霍亂證宜服八十丸開水送服餘證宜服四五十丸服後均宜溫復取微汗若平素含化以防疫癘自一丸至四五丸皆可此藥又善治頭疼牙疼含化心下脅下及周身關節經絡作疼氣鬱痰鬱食鬱厄逆嘔噦醒腦養神在上能清在下能溫種種利益不能悉數以上二方後方較前方多溫藥兩味前方性微涼後方則涼熱平均矣用者斟酌於病因涼熱之間分途施治可也後方若臨證急用不暇為丸可製為散每服一錢效更速附録直隸鹽山孫來函一九二四年六月友人杜之母得霍亂證上吐下瀉轉筋腹疼六脈閉塞生診視後為開衛生防疫寶丹方共研作粉每次服一錢服第一次吐瀉稍止服第二次病即痊愈斯年初冬鄧之兒媳得霍亂證時已夜半請為診視吐瀉轉筋六脈皆無心中迷亂時作譫語治以衛生防疫寶丹初服仍吐服至二次脈即徐出而愈急救回陽湯治霍亂吐瀉已極精神昏昏氣息奄奄至危之候潞黨參八錢生山藥一兩生杭芍五錢山萸肉八錢去淨核炙甘草三錢赭石四錢研細硃砂五分研細先用童便半盅燉熱送下硃砂繼服湯藥以上二方皆為治霍亂之要藥矣然彼以祛邪為主此以扶正為主誠以得此證者往往因治不如法致日夜吐瀉不已虛極將脫危在目前病勢至此其從前之因涼因熱皆不暇深究惟急宜重用人參以回陽山藥芍藥以滋陰山萸肉以斂肝氣之脫此證吐瀉之始肝木助邪侮土吐瀉之極而肝氣轉先脫炙甘草以和中氣之漓此急救回陽湯所以必需也用赭石者不但取其能止嘔吐俾所服之藥不致吐出誠以吐瀉已久陰陽將離赭石色赤入心能協同人參助心氣下降而方中山藥又能溫固下焦滋補真陰協同人參以回腎氣之下趨使之上行也用硃砂且又送以童便者又以此時百脈閉塞繫心臟為毒氣所傷將熄其鼓動之機故用硃砂直入心以解毒又引以童便使毒氣從尿道瀉出而童便之性又能啓發腎中之陽上達以應心臟也是此湯為回陽之劑實則交心腎和陰陽之劑也服此湯後若身溫脈出覺心中發熱有煩躁之意者宜急滋其陰分若玄參生芍藥之類加甘草以和之煎一大劑分數次溫飲下此傷寒論太陽篇先用甘草乾薑湯繼用甘草芍藥湯之法也門人高曾治一少婦吐瀉一晝夜甚是困憊濃煎人參湯送服益元散而愈蓋獨參湯能回陽益元散能滋陰又能和中滑石甘草能和中以止吐瀉解毒甘草硃砂能解毒且可引毒氣自小便出是以應手奏效此亦拙擬急救回陽湯之意也此證之轉筋者多因吐瀉不已肝木乘脾氣之虛而侮土故方書治轉筋多用木瓜以其酸能斂肝即所以平肝也然平肝之藥不必定用木瓜壬寅秋際霍亂流行曾單用羚羊角三錢治愈數人因羚羊角善解熱毒又為平肝之妙藥也又曾有一人向愚詢治泄瀉之方告以酸石榴連皮搗爛煎湯服之後值霍亂髮生其人用其方治霍亂初起之泄瀉者服之瀉愈而霍亂亦愈由是觀之石榴亦為斂肝之要藥而斂肝之法又實為治霍亂之要著也霍亂之證有實熱者居多其真寒涼者不過百中之一二即百脈閉塞周身冰冷但其不欲覆被思飲涼水即不可以涼斷當先少少與以涼水若飲後病增重者其人雖欲復飲而不至急索者涼水可勿與也若飲後病不增重須臾不與有不能忍受之狀可儘量與之任其隨飲隨吐借涼水將內毒換出亦佳方也曾遇有恣飲涼水而愈者問之言當病重之時若一時不飲涼水即覺不能復活則涼水之功用可知矣然涼水須用新汲井泉水方效無井泉水處可以冰水代之或吞服小冰塊亦佳王孟英曰雞矢白散為金匱治霍亂轉筋入腹之方愚仿其意擬得蠶矢湯治霍亂轉筋腹疼口渴煩躁危急之證甚效方用晚蠶砂木瓜各三錢生薏仁大豆芽如無可代以生麥芽各四錢川黃連炒山梔各二錢醋炒半夏酒炒黃芩吳茱萸各一錢以陰陽水煎稍涼徐徐服之丁酉八九月間吾杭盛行霍亂轉筋之證有沈氏婦者夜深患此繼即音啞肢寒比曉其夫皇皇求為救治診其脈弦細以澀兩尺如無口極渴而沾飲即吐不已腓堅硬如石其時疼楚異常因擬此方治之徐徐涼飲藥入口竟得不吐外以好燒酒令人用力摩擦轉筋堅硬之處擦將一時許其硬塊始漸軟散而筋不轉吐瀉亦減甫時復與前藥半劑夜間居然安寐矣後治相類者多人悉以是法獲效陸九芝曰霍亂一證有寒有熱熱者居其九寒者居其一凡由高樓大廈乘涼飲冷而得之者仲景則有理中四逆諸方後世亦有漿水大順復元冷香飲子諸方病多屬寒藥則皆宜熱若夫春分以後秋分以前少陽相火少陰君火太陰濕土三氣合行其令天之熱氣則下降地之濕氣則上騰人在氣交之中清氣在陰濁氣在陽陰陽反戾清濁相干氣亂於中而上吐下瀉治此者宜和陰陽分清濁以定其亂亂定即無不愈此則病非寒也而亦非盡用寒藥也即如薷藿平陳胃苓等湯習用之劑亦皆溫通特不用薑附丁萸之大辛大熱者耳又有不吐不瀉而揮霍撩亂者則多得之飽食之後凡夏月猝然冒暑惟食填太陰亦曰飽食填息此證為病最速為禍最酷而人多忽之即有知者亦僅以停食為言絶不信其為閉證之急者閉則手足肢冷六脈俱伏甚則喜近烈日此乃邪閉而氣道不宣其畏寒也正其熱之甚也此等證只欠一吐法耳自吐法之不講本屬一吐即愈之病而竟不知用也此外更有四肢厥逆甚至周身如冰而竟不惡寒反有惡熱者此更是內真熱外假寒即厥陰中熱深厥深之象豈獨不可用四逆理中即薑湯米飲及五苓散中之桂枝亦不可用而且宜苦寒之劑佐以挑痧刮痧等法刺出其惡血以泄熱毒者同治壬戌江蘇滬瀆時疫盛行綿延而至癸亥余嘗以石膏芩連清而愈之者則暑濕熱之霍亂也以涼水調膽礬吐而愈之者則飽食填息之霍亂也其肢皆冷而其脈皆伏維時大醫競用丁萸桂附日誤數人而竟不知改圖豈不深可惜哉上所録二則皆於霍亂之證有所發明故詳志之以備採擇霍亂之證宜兼用外治之法以輔藥餌所不逮而外治之法當以針灸為最要至應針之處若十宣中脘尺澤足三里陰陵承山太溪太倉太衝公孫等穴約略舉之未能悉數習針灸者大抵皆知惟督脈部分有素髎穴刺同身寸之三分出血最為治霍亂之要著凡吐瀉交作心中撩亂者刺之皆效諸針灸之書皆未言其能治霍亂世之能針灸者間有知刺其處者而或刺鼻準之尖或刺鼻柱中間又多不能刺其正穴兩鼻孔中間為鼻柱內經王注謂此穴在鼻柱之上端則非鼻準之尖及鼻柱中間可知然刺未中其正穴者猶恆有效驗況刺中其正穴乎蓋此穴通督脈而鼻通任脈刺此一處則督任二脈可互相貫通而周身之血脈亦因之可貫通矣又宜佐以刮痧之法蓋此證病劇之時周身冰冷回血管之血液凝滯不行當用細口茶碗將碗邊一處少塗香油兩手執定其無油之處先刮其貼脊兩旁脊椎上亦可輕刮以刮處盡紅為度蓋以臟腑之系皆連於脊而諸臟腑腧穴亦貼脊兩旁故以刮此處為最要而刮時又宜自上而下挨次刮之可使毒氣下行次刮其胸與脅次刮其四肢曲處尺澤委中及腿內外胻至頭額項肩亦可用錢刮之又當兼用放痧之法將四肢回血管之血用手趕至腿臂曲處用帶上下扎緊於尺澤委中兩旁回血管用扁針刺出其血以助其血脈之流通且又放出炭氣俾霍亂之毒菌從此輕減也又宜佐以溫體之法用滾水煮新磚八個以尉腋下及四肢曲處及兩腳湧泉穴或水煮粗厚之布乘熱迭數層復於轉筋之處即不轉筋者亦可復於少腹及腿肚之上涼則易之或以茶壺及水籠袋滿貯熱水以尉各處或醋炒蔥白切絲或醋炒乾艾葉揉碎尉之或用手醮火酒或燒酒急速擦摩其周身及腿肚發硬之處種種助暖之法不一臨證者隨事制宜可也十七治泄瀉方益脾餅治脾胃濕寒飲食減少長作泄瀉完穀不化白朮四兩乾薑二兩雞內金二兩熟棗肉半斤上藥四味白朮雞內金皆用生者每味各自軋細焙熟先軋細而後焙者為其焙之易勻也再將乾薑軋細共和棗肉同搗如泥作小餅木炭火上炙乾空心時當點心細嚼咽之曾為友人制此方和藥一料服之而愈者數人後屢試此方無不效驗一婦人年三十許泄瀉數月用一切治瀉諸藥皆不效其脈不涼亦非完穀不化遂單用白朮棗肉如法為餅服之而愈此證並不用雞內金者因雞內金雖有助脾胃消食之力而究與瀉者不宜也附録直隸青縣張來函胞妹年四十餘歲體素瘦弱久患脾胃濕寒胃脘時覺疼痛飲食減少常作泄瀉完穀不化因照益脾餅原方為制一料服之即愈為善後計又服一料永久祓除病根扶中湯治泄瀉久不止氣血俱虛身體羸弱將成勞瘵之候於術一兩炒生山藥一兩龍眼肉一兩小便不利者加椒目三錢炒搗龍眼肉味甘能補脾氣香能醒脾誠為脾家要藥且心為脾母龍眼肉色赤入心又能補益心臟俾母旺自能蔭子也愚治心虛怔忡恆俾單購龍眼肉斤許飯甑蒸熟徐徐服之皆大有功效是能補心之明徵又大便下血者多因脾虛不能統血亦可單服龍眼肉而愈是又補脾之明徵也一婦人年四十許初因心中發熱氣分不舒醫者投以清火理氣之劑遂泄瀉不止更延他醫投以溫補之劑初服稍輕久服則瀉仍不止一日夜四五次遷延半載以為無藥可治後愚為診視脈雖濡弱而無弦數之象知猶可治但瀉久身弱虛汗淋漓心中怔忡飲食減少躊躇久之為擬此方補脾兼補心腎數劑瀉止而汗則加多遂於方中加龍骨牡蠣皆不用煅各六錢兩劑汗止又變為漫腫蓋從前瀉時小便短少瀉止後小便仍少水氣下無出路故蒸為汗汗止又為漫腫也斯非分利小便使水下有出路不可特其平素常覺腰際涼甚利小便之藥涼者斷不可用遂用此方加椒目三錢連服十劑全愈薯蕷粥治陰虛勞熱或喘或嗽或大便滑瀉小便不利一切羸弱虛損之證生懷山藥一斤軋細過羅上藥一味每服用藥七八錢或至一兩和涼水調入鍋內置爐上不住以箸攪之兩三沸即成粥服之若小兒服或少調以白糖亦可此粥多服久服間有發悶者摻以西藥百布聖一瓦同服則無此弊且更多進飲食門生吳年二十一羸弱發熱脈象虛數不能飲食俾早晚服山藥粥加百布聖晌午單服玄參三錢煎湯服如此數日食量增加發熱亦愈自此健壯一婦人年三十餘泄瀉數月不止病勢垂危倩人送信於其父母其父將往瞻視詢方於愚言從前屢次延醫治療百藥不效因授以山藥煮粥方日服三次兩日全愈又服數日身亦康健一娠婦日發癇風其脈無受娠滑象微似弦而兼數知陰分虧損血液短少也亦俾煮山藥粥服之即愈又服數次永不再發奉天關氏少婦素有勞疾因産後暴虛喘嗽大作治以此粥日服兩次服至四五日喘嗽皆愈又服數日其勞疾自此除根奉天鄭之女年五歲秋日為風寒所束心中發熱醫者不知用辛涼表散而純投以苦寒之藥連服十餘劑致脾胃受傷大便滑瀉月餘不止而上焦之熱益熾醫者皆辭不治始求愚為診視其形狀羸弱已甚脈象細微浮數表裡俱熱時時噁心不能飲食晝夜猶瀉十餘次治以此粥俾隨便飲之日四五次一次不過數羹匙旬日全愈農村小兒於秋夏之交多得滑瀉證蓋農家此時多飲涼水而小兒尤喜飲之農家此時多食瓜果而小兒尤喜食之生冷之物皆傷脾胃脾胃傷則滑瀉隨之此自然之理也而滑瀉之證在小兒為最難治蓋小兒少陽之體陰分未足滑瀉不止尤易傷陰分往往患此證者數日即渾身發熱津短燥渴小便不利乾嘔懶食唯嗜涼物當此之際欲滋其陰而脾胃愈泥欲健其脾而真陰愈耗涼潤溫補皆不對證而小兒又多苦服藥病家又多姑息以婉隨小兒之意以致遷延歲月竟成不治者多矣惟山藥脾腎雙補在上能清在下能固利小便而止大便真良藥也且又為尋常服食之物以之作粥少加沙糖調和小兒必喜食之一日兩次煮服數日必愈若系哺乳稚子不能食粥即食之亦不能多者但濃煮生山藥汁飲之亦可愚以此方治小兒多矣志在救人者甚勿以為尋常服食之物而忽之也薯蕷雞子黃粥治泄瀉久而腸滑不固者即前薯蕷粥加熟雞子黃三枚一人年近五旬泄瀉半載不愈羸弱已甚遣人來詢方言屢次延醫服藥皆分毫無效授以薯蕷粥方數日又來言服之雖有效驗瀉仍不止遂俾用雞子數枚煮熟取其黃捏碎調粥中服之兩次而愈蓋雞子黃有固澀大腸之功且較雞子白易消化也以後此方用過數次皆隨手奏效附録直隸青縣張來函河間劉年五十餘歲漏瘡甚劇屢治不痊後兼泄瀉不止蓋腸滑不固故醫藥無靈診其脈甚小弱漸已成癆囑其用薯蕷雞子黃粥一劑瀉止三服精神煥發十數日後身體復原此後凡遇虛瀉久不愈者用之屢收特效薯蕷芣苜湯治陰虛腎燥小便不利大便滑瀉兼治虛勞有痰作嗽生山藥一兩軋細生車前子四錢上二味同煮作稠粥服之一日連服三次小便自利大便自固蓋山藥能固大便而陰虛小便不利者服之又能利小便車前子能利小便而性兼滋陰可為補腎藥之佐使五子衍宗丸中用之又能助山藥以止大便況二藥皆汁漿稠黏同作粥服之大能留戀腸胃是以效也治虛勞痰嗽者車前宜減半蓋用車前者以其能利水即能利痰且性兼滋陰於陰虛有痰者尤宜而仍不敢多用者恐水道過利亦能傷陰分也按車前子能利小便而驟用之亦無顯然功效惟將車前子炒熟此藥須買生者自家經手炒以微熟為度過熟則無力嚼服少許須臾又服約六點鐘服盡一兩小便必陡然利下連連不止此愚實驗而得之方也又單用車前子兩半煮稠粥頓服之治大便滑瀉亦甚效驗黃姓媼大便滑瀉百藥不效或語以此方一服即愈然必用生者煮之始能成粥若炒熟者則不能成粥矣加味天水散治暑日泄瀉不止肌膚燒熱心中燥渴小便不利或兼喘促小兒尤多此證用此方更佳生山藥一兩滑石六錢粉甘草三錢作湯服此久下亡陰又兼暑熱之證也故方中用天水散以清溽暑之熱而甘草分量三倍原方原方滑石六甘草一故亦名六一散其至濃之味與滑石之至淡者相濟又能清陰虛之熱又重用山藥之大滋真陰大固元氣者以參贊之真陰足則小便自利元氣固則泄瀉自止且其汁漿稠黏與甘草之甘緩者同用又能逗留滑石不至速於淡滲俾其清涼之性由胃輸脾由脾達肺水精四布下通膀胱則周身之熱與上焦之燥渴喘促有不倏然頓除者乎小兒少陽之體最不耐熱故易傷暑而飲食起居喜貪寒涼故又易泄瀉瀉久則亡陰作熱必愈畏暑氣之熱病熱循環相因所以治之甚難也此方藥止三味而用意周匝內傷外感兼治無遺一兩劑後暑熱漸退即滑石可以漸減隨時斟酌用之未有不應手奏效者小兒暑月瀉久虛熱上逆與暑熱之氣相併填塞胃口恆至噁心嘔吐不受飲食此方不但清暑滋陰和中止瀉其重墜之性又能鎮胃安沖使上逆之熱與暑氣之熱徐徐下行自小便出而其噁心嘔吐自止初定此方時授門人高録之翌日高還里遇一孺子泄瀉月餘身熱燥渴嗜飲涼水強與飲食即噁心嘔吐多方調治不愈高投以此湯一劑燥渴與泄瀉即愈其半又服一劑能進飲食諸病皆愈加味四神丸治黎明腹疼泄瀉補骨脂六兩酒炒吳茱萸三兩鹽炒五味子四兩炒肉豆蔻四兩麵裹煨花椒一兩微焙生硫黃六錢大棗八十一枚生薑六兩切片先煮薑十餘沸入棗同煮至爛熟去薑余藥為細末棗肉為丸桐子大人稟天地之氣而生人身一小天地也天地之一陽生於子故人至夜半之時腎繫命門之處有氣息息萌動即人身之陽氣也至黎明寅時為三陽之候人身之陽氣亦應候上升自下焦而將達中焦其人或元陽之根柢素虛當臍之處或兼有凝寒遮蔽即互相薄激致少腹作疼久之陽氣不勝凝寒上升之機轉為下降大便亦即溏下此黎明作瀉之所由來也夫下焦之陽氣少火也即相火也其火生於命門而寄於肝膽故四神方中用補骨脂以補命門吳茱萸以補肝膽此培火之基也然瀉者關乎下焦實又關乎中焦故又用肉豆蔻之辛溫者以暖補脾胃且其味辛而澀協同五味之酸收者又能固澀大腸攝下焦氣化且薑棗同煎而丸以棗肉使辛甘化合自能引下焦之陽以達於中焦也然此藥病輕者可愈病重者服之間或不愈以其補火之力猶微也故又加花椒硫黃之大補元陽者以助之而後藥力始能勝病也十八治痢方化滯湯治下痢赤白腹疼裡急後重初起者若服藥後病未全愈繼服後方生杭芍一兩當歸五錢山楂六錢萊蔔子五錢炒搗甘草二錢生薑二錢若身形壯實者可加大黃朴硝各三錢下之方中之意用芍藥以泄肝之熱甘草以緩肝之急萊蔔子以開氣分之滯當歸山楂以化血分之滯生薑與芍藥並用又善調寒熱之互相凝滯且當歸之汁液最滑痢患滯下而以當歸滑之其滯下愈而痢自愈也燮理湯治下痢服前藥未全愈者若下痢已數日亦可徑服此湯又治噤口痢生山藥八錢金銀花五錢生杭芍六錢牛蒡子二錢炒搗甘草二錢黃連錢半肉桂一錢半去粗皮將藥煎至數十沸再入單赤痢加生地榆二錢單白痢加生薑二錢血痢加鴨蛋子二十粒去皮藥汁送服痢證古稱滯下所謂滯下者誠以寒火凝結下焦瘀為膿血留滯不下而寒火交戰之力又逼迫之以使之下也故方中黃連以治其火肉桂以治其寒二藥等分並用陰陽燮理於頃刻矣用白芍者傷寒論諸方腹疼必加芍藥協同甘草亦燮理陰陽之妙品且痢證之噤口不食者必是膽火逆沖胃口後重裡急者必是肝火下迫大腸白芍能瀉肝膽之火故能治之矧肝主藏血肝膽火戢則膿血自斂也用山藥者滯下久則陰分必虧山藥之多液可滋臟腑之真陰且滯下久則氣化不固山藥之收澀更能固下焦之氣化也又白芍善利小便自小便以瀉寒火之凝結牛蒡能通大便自大便以瀉寒火之凝結金銀花與甘草同用善解熱毒可預防腸中之潰爛單白痢則病在氣分故加生薑以行氣單赤痢則病在血分故加生地榆以涼血至痢中多帶鮮血其血分為尤熱矣故加鴨蛋子以大清血分之熱拙擬此方以來歲遇患痢者不知凡幾投以此湯即至劇者連服數劑亦必見效痢證多因先有積熱後又感涼而得或飲食貪涼或寢處貪涼熱為涼迫熱轉不散逮歷日既多又浸至有熱無涼猶傷於寒者之轉病熱也所以此方雖黃連肉桂等分並用而肉桂之熱究不敵黃連之寒況重用白芍以為黃連之佐使是此湯為燮理陰陽之劑而實則清火之劑也或問以此湯治痢雖在數日之後或服化滯湯之後而此時痢邪猶盛遽重用山藥補之獨無留邪之患乎答曰山藥雖饒有補力而性略遲鈍與參耆之迅速者不同在此方中雖與諸藥同服約必俟諸藥之涼者熱者通者利者將痢邪消融殆盡而後大發其補性以從容培養於諸藥之後俾邪去而正已復此乃完全之策又何至留邪乎且山藥與芍藥並用大能瀉上焦之虛熱與痢之噤口者尤宜是以愚用此湯遇痢之挾虛與年邁者山藥恆用至一兩或至一兩強也或問地榆方書多炒炭用之取其黑能勝紅以制血之妄行此方治單赤痢加地榆何以獨生用乎答曰地榆之性涼而且澀能涼血兼能止血若炒之則無斯效矣此方治赤痢所以必加生地榆也且赤痢之證其劇者或因腸中潰爛林屋山人治湯火傷皮膚潰爛用生地榆末和香油敷之甚效夫外敷能治皮膚因熱潰爛而內服亦當有此效可知也鴨蛋子一名鴉膽子苦參所結之子也不但善治血痢凡諸痢證皆可用之即純白之痢用之亦有效驗而以治噤口痢煙後痢尤多奇效並治大小便因熱下血其方單用鴨蛋子去皮擇成實者五六十粒白沙糖化水送服日兩次大有奇效若下血因涼者亦可與溫補之藥同用其善清血熱而性非寒涼善化瘀滯而力非開破有祛邪之能兼有補正之功誠良藥也坊間將鴨蛋子去皮用益元散為衣治二便下血如神名曰菩提丹一人年五十餘素吸鴉片當霍亂盛行之時忽然心中覺疼噁心嘔吐下痢膿血參半病家懼甚以為必是霍亂暴證診其脈毫無閉塞之象惟弦數無力左關稍實愚曰此非霍亂乃下焦寒火交戰故腹中作疼下痢膿血上焦虛熱壅迫故噁心嘔吐實系痢證之劇者遂投以白芍六錢竹茹清半夏各三錢甘草生薑各二錢一劑嘔吐即愈腹疼亦輕而痢獨不愈不思飲食俾單用鴨蛋子五十粒一日連服兩次病若失審斯鴨蛋子不但善理下焦即上焦虛熱用之亦妙此所以治噤口痢而有捷效也一人年四十八資稟素弱亦吸鴉片於季秋溏瀉不止一日夜八九次且帶紅色心中怔忡不能飲食日服溫補之藥分毫無效延愚診治其脈左右皆微弱而尺脈尤甚知系下焦虛寒為其便帶紅色且從前服溫補之藥無效俾先服鴨蛋子四十粒瀉愈其半紅色亦略減思飲食繼用溫補下焦之藥煎湯送服鴨蛋子三十粒後漸減至十粒十劑全愈蓋此證雖下焦虛寒而便帶紅色實兼有痢證也故單服鴨蛋子而溏瀉已減半然亦足徵鴨蛋子雖善清熱化瘀而實無寒涼開破之弊洵良藥也滄州友人滕壬寅之歲於中秋下赤痢且多鮮血醫治兩旬不愈適愚他出新歸過訪之求為診治其脈象洪實知其純系熱痢遂謂之曰此易治買苦參子百餘粒去皮分兩次服下即愈矣翌日愚復他出二十餘日始歸又訪之言曾遍問近處藥坊皆無苦參子後病益劇遣人至敝州取來如法服之兩次果愈後滕旋里其族人有適自奉天病重歸來者大便下血年餘一身悉腫百藥不效滕授以此方如法服之三次全愈附録直隸青縣張來函蘆臺李年四十二歲壬戌五月間因勞碌暑熱大便下血且腹疼醫者多用西洋參野於朮地榆炭柏葉炭溫澀之品投之愈服愈危小站王余友也代寄函詢方並將病源暨前方開示余閲畢遂為郵去菩提丹四服每服六十粒日服一次未幾接覆函謂服畢血止腹疼亦愈極贊藥之神妙近年用此丹治赤痢及二便下血愈者甚多山東德州盧來函族嫂因逃荒驚恐又兼受暑致患痢兩月餘服藥無效益加沉重侄為開烏梅六個山楂兩半煎湯送服益元散四錢去皮鴨蛋子四十粒煎藥渣時亦如此送服一劑病若失解毒生化丹治痢久鬱熱生毒腸中腐爛時時切疼後重所下多似爛炙且有腐敗之臭金銀花一兩生杭芍六錢粉甘草三錢三七二錢搗細鴨蛋子六十粒去皮揀成實者上藥五味先將三七鴨蛋子用白沙糖化水送服次將余藥煎湯服病重者一日須服兩劑始能見效此證乃痢之最重者若初起之時氣血未虧用拙擬化滯湯或加大黃朴硝下之即愈若未全愈繼服燮理湯數劑亦可全愈若失治遷延日久氣血兩虧浸至腸中腐爛生機日減致所下之物色臭皆腐敗非前二方所能愈矣此方則重在化腐生肌以救腸中之腐爛故服之能建奇效也一人年五十二因大怒之後中有鬱熱又寢於冷屋之中內熱為外寒所束愈鬱而不散大便下血延醫調治醫者因其得於寒涼屋中謂系脾寒下陷投以參耆溫補之藥又加升麻提之服藥兩劑病益增重腹中切疼常常後重所便之物多如爛炙更延他醫又以為下元虛寒而投以八味地黃丸作湯服之病益加重後愚診視其脈數而有力兩尺愈甚確知其毒熱鬱於腸中以致腸中腐爛也為擬此方兩劑而愈一婦人年五十許素吸鴉片又當惱怒之餘初患赤痢滯下無度因治療失宜漸至血液腐敗間如爛炙噁心懶食少腹切疼其脈洪數純是熱象亦治以此湯加知母白頭翁各四錢煎湯服又另取鴨蛋子六十粒三七二錢送服每日如此服藥兩次三日全愈天水滌腸湯治久痢不愈腸中浸至腐爛時時切疼身體因病久羸弱者生山藥一兩滑石一兩生杭芍六錢潞黨參三錢白頭翁三錢粉甘草二錢一媼年六十一歲於中秋痢下赤白服藥旋愈旋又反復如此數次遷延兩月因少腹切疼自疑寒涼燒磚尉之初尉時稍覺輕以為對證遂日日尉之而腹中之疼益甚晝夜呻吟噤口不食所下者痢與血水相雜且系腐敗之色其脈至數略數雖非洪實有力實無寒涼之象舌上生苔黃而且厚病人自謂下焦涼甚若用熱藥溫之疼當愈愚曰前此少腹切疼者腸中欲腐爛也今為熱磚所尉而腹疼益甚敗血淋漓則腸中真腐爛矣再投以熱藥危可翹足而待病人亦似會悟為制此方因河間天水散即六一散原為治熱痢之妙藥此方中重用滑石甘草故名之天水滌腸湯連服四劑疼止痢亦見愈減去滑石四錢加赤石脂四錢再服數劑病愈十之八九因上焦氣微不順俾用鮮藕四兩切細絲煎湯頻頻飲之數日而愈此證亦痢中至險之證而方中用黨參者因痢久體虛所下者又多腐敗故於滋陰清火解毒藥中特加黨參以助其生機而其産於潞者性平不熱於痢證尤宜也此證若服此湯不效則前方之三七鴨蛋子金銀花亦可酌加或加生地榆亦可試觀生地榆為末香油調塗湯火傷神效其能治腸中因熱腐爛可知也通變白頭翁湯治熱痢下重腹疼及患痢之人從前曾有鴉片之嗜好者生山藥一兩白頭翁四錢秦皮三錢生地榆三錢生杭芍四錢甘草二錢旱三七三錢軋細鴨蛋子六十粒去皮揀成實者上藥共八味先將三七鴨蛋子用白蔗糖水送服一半再將余煎湯服其相去之時間宜至點半鐘所餘一半至煎湯藥渣時仍如此服法傷寒論治厥陰熱痢下重者有白頭翁湯其方以白頭翁為主而以秦皮黃連黃柏佐之愚用此方而又為之通變者因其方中盡卻病之藥而無扶正之藥於證之兼虛者不宜且連柏並用恐其苦寒之性妨礙脾胃過侵下焦也矧傷寒論白頭翁湯原治時氣中初得之痢如此通變之至痢久而腸中腐爛者服之亦可旋愈也奉天王年四十許己未孟秋自鄭州病歸先瀉後痢腹疼重墜赤白稠黏一日夜十餘次先入奉天東人所設醫院中東人甚畏此證處以隔離所醫治旬日無效遂出院歸寓求為診治其脈弦而有力知其下久陰虛肝膽又蘊有實熱也投以此湯一劑痢愈仍變為瀉日四五次自言腹中涼甚愚因其疾原先瀉此時痢愈又瀉且恆以溫水袋自尉其腹疑其下焦或有伏寒遂少投以溫補之藥才服一劑又變為痢下墜腹疼如故惟次數少減知其病原無寒不受溫補仍改用通變白頭翁湯一劑痢又愈一日猶瀉數次繼用生山藥一兩龍眼蓮子各六錢生杭芍三錢甘草茯苓各二錢又少加酒麴麥芽白蔻消食之品調補旬日全愈奉天李年近四旬因有事連夜廢寢陡然腹疼繼而泄瀉兼下痢其痢赤多於白上焦有熱不能飲食其脈弦而浮按之不實先投以三寶粥方腹疼與瀉痢皆見輕仍不能飲食繼用通變白頭翁湯方連服兩劑痢愈可進飲食腹疼泄瀉猶未全愈後仍用三寶粥方去鴨蛋子日服兩次數日病全愈三寶粥治痢久膿血腥臭腸中欲腐兼下焦虛憊氣虛滑脫者生山藥一兩軋細三七二錢軋細鴨蛋子五十粒去皮上藥三味先用水四盅調和山藥末煮作粥煮時不住以箸攪之一兩沸即熟約得粥一大碗即用其粥送服三七末鴨蛋子己巳之歲愚客居德州有盧姓婦年五十六於季夏下痢赤白遷延至仲冬不愈延醫十餘人服藥百劑皆無效驗亦以為無藥可醫矣後求愚診治脈象微弱至數略數飲食減少頭目時或眩暈心中微覺煩熱便時下墜作疼然不甚劇詢其平素下焦畏涼是以從前服藥略加溫補上即煩熱略為清理下又腹疼泄瀉也為擬此方一日連服兩次其病遂愈後旬余因登樓受涼舊證陡然反復日下十餘次腹疼覺劇其脈象微弱如前至數不數俾仍用山藥粥送服生硫黃末三分亦一日服兩次病愈強半翌日又服一次心微覺熱繼又改用前方兩劑全愈戊午秋日愚初至奉天有李年二十八下痢四十餘日膿血雜以脂膜屢次服藥病益增劇羸弱已甚診其脈數而細弱兩尺尤甚亦治以此方服後兩點鐘腹疼一陳下膿血若干病家言從前腹疼不若是之劇所下者亦不若是之多似疑藥不對證愚曰腹中瘀滯下盡即愈矣伸再用白蔗糖化水送服去皮鴨蛋子五十粒此時已屆晚九點鐘一夜安睡至明晨大便不見膿血矣後間日大便又少帶紫血俾仍用山藥粥送服鴨蛋子二十粒數次全愈又斯秋中元節後有劉者下痢兩月不愈求為診治其脈近和平按之無力日便五六次血液腐敗便時不甚覺疼後重亦不劇亦治以此方一劑病愈強半翌日將行囑以再接原方服兩劑當愈後至奉接其來函言服第二劑效驗不如從前至三劑病轉似增重因恍悟此證下痢兩月其脈毫無數象且按之無力其下焦當系寒涼俾仍用山藥粥送服炒熟小茴香末一錢連服數劑全愈或問西人謂痢為腸中生炎所謂炎者紅熱腫疼甚則腐爛也觀此案與治盧姓之案皆用熱藥成功亦可謂之腸炎乎既非腸炎何以其腸亦欲腐爛乎答曰痢證原有寒有熱熱證不愈其腸可至腐爛寒證久不愈其腸亦可腐爛譬如瘡瘍紅腫者陽而熱白硬者陰而寒其究竟皆可變為膿血賞觀韜園隨筆録言其曾患牙疳醫者治以三黃犀角純寒之品滿口肉爛盡而色白不知疼後醫者改用肉桂附子等品一服知疼連服十餘劑而愈夫人口中之肌肉猶腸中之肌肉也口中之肌肉可因寒而腐爛腸中之肌肉獨不可因寒而腐爛乎曾治一人因久居潮濕之地致下痢三月不愈所下者紫血雜以脂膜腹疼後重或授以龍眼肉包鴨蛋子方服之下痢與腹疼益劇後愚診視其脈微弱而沉左部幾不見俾用生硫黃研細摻熟面少許作丸又重用生山藥熟地龍眼肉煎濃湯送服連服十餘劑共計服生硫黃兩許其痢始愈由是觀之即純系赤痢亦誠有寒者然不過百中之二三耳且嘗實驗痢證若因寒者雖經久不愈猶可支持且其後重腹疼較因熱者亦輕也且傷寒論有桃花湯治少陰病下利便膿血者原赤石脂與乾薑並用此為以熱藥治寒痢之權輿注家不知謂少陰之火傷陰絡所致治以桃花湯原系從治之法又有矯誣藥性謂赤石脂性涼重用至一斤乾薑雖熱止用一兩其方仍以涼論者今試取其藥十分之一煎湯服之果涼乎熱乎此皆不知傷寒論此節之義而強為注解者也通變白虎加人參湯治下痢或赤或白或赤白參半下重腹疼周身發熱服涼藥而熱不休脈象確有實熱者生石膏二兩搗細生杭芍八錢生山藥六錢人參五錢用野黨參按此分量若遼東真野參宜減半至高麗參則斷不可用甘草二錢上五味用水四盅煎取清湯兩盅分二次溫飲之此方即傷寒論白虎加人參湯以芍藥代知母山藥代粳米也痢疾身熱不休服清火藥而熱亦不休者方書多諉為不治夫治果對證其熱焉有不休之理此乃因痢證夾雜外感其外感之熱邪隨痢深陷永無出路以致痢為熱邪所助日甚一日而永無愈期惟治以此湯以人參助石膏能使深陷之邪徐徐上升外散消解無餘加以芍藥甘草以理下重腹疼山藥以滋陰固下連服數劑無不熱退而痢愈者按外感之熱已入陽明胃腑當治以苦寒若白虎湯承氣湯是也若治以甘寒其病亦可暫愈而恆將餘邪錮留胃中變為骨蒸勞熱永久不愈世補齋醫書論之甚詳石膏雖非苦寒其性寒而能散且無汁漿迥與甘寒黏泥者不同而白虎湯中又必佐以苦寒之知母即此湯中亦必佐以芍藥芍藥亦味苦神家本草經微寒之品且能通利小便故以佐石膏可以消解陽明之熱而無餘也一叟年六十七於中秋得痢證醫治二十餘日不效後愚診視其痢赤白膠滯下行時覺腸中熱而且干小便亦覺發熱腹痛下墜並迫其脊骨盡處亦下墜作痛且時作眩暈其脈洪長有力舌有白苔甚厚愚曰此外感之熱挾痢毒之熱下迫故現種種病狀非治痢兼治外感不可遂投以此湯兩劑諸病皆愈其脈猶有餘熱擬再用石膏清之病家疑年高石膏不可屢服愚亦應聘他往後二十餘日痢復作延他醫治療於治痢藥中雜以甘寒濡潤之品致外感之餘熱永留腸胃不去其痢雖愈而屢次反復延至明年仲夏反復甚劇復延愚診治其脈象病證皆如舊因謂之曰去歲若肯多服石膏數兩何至有以後屢次反復今不可再留邪矣仍投以此湯連服三劑病愈而脈亦安和一人年四十二患白痢常覺下墜過午尤甚心中發熱間作寒熱醫者於治痢藥中重用黃連一兩清之熱如故而痢亦不愈留連兩月浸至不起診其脈洪長有力亦投以此湯為其間作寒熱加柴胡二錢一劑熱退痢止猶間有寒熱之時再診其脈仍似有力而無和緩之致知其痢久而津液有傷也遂去白芍柴胡加玄參知母各六錢一劑寒熱亦愈一媼年六旬素多疾病於夏季晨起偶下白痢至暮十餘次秉燭後忽然渾身大熱不省人事循衣摸床呼之不應其脈洪而無力肌膚之熱烙指知系氣分熱痢又兼受暑多病之身不能支持故精神昏憒如是也急用生石膏三兩野臺參四錢煎湯一大碗徐徐溫飲下至夜半盡劑而醒痢亦遂愈詰朝煎渣再服其病脫然一人年五十餘於暑日痢而且瀉其瀉與痢俱帶紅色下墜腹疼噤口不食醫治兩旬病勢浸增精神昏憒氣息奄奄診其脈細數無力周身肌膚髮熱詢其心中亦覺熱舌有黃苔知其證夾雜暑溫暑氣溫熱瀰漫胃口又兼痢而且瀉虛熱上逆是以不能食也遂用生山藥兩半滑石一兩生杭芍六錢粉甘草三錢一劑諸病皆見愈可以進食又服一劑全愈此證用滑石不用石膏者以其證兼瀉也為不用石膏即不敢用人參故倍用山藥以增其補力此就通變之方而又為通變也痢證又有肝膽腸胃先有鬱熱又當暑月勞苦於烈日之中陡然下痢多帶鮮血脈象洪數此純是一團火氣宜急用大苦大寒之劑若芩連知柏膽草苦參之類皆可選用亦可治以白虎湯方中生石膏必用至二兩再加生白芍一兩若脈大而虛者宜再加人參三錢若其脈洪大甚實者可用大承氣湯下之而佐以白芍知母有痢久而清陽下陷者其人或間作寒熱或覺胸中短氣當於治痢藥中加生黃耆柴胡以升清陽脈虛甚者亦可酌加人參又當佐以生山藥以固下焦然用藥不可失於熱也有痢初得兼受外感者宜於治痢藥中兼用解表之品其外邪不隨痢內陷而痢自易治不然則成通變白虎加人參湯所主之證矣痢證初得雖可下之然必確審其無外感表證方可投以下藥其身體稍弱又宜少用參耆佐之痢證忌用滯泥之品然亦不可概論外祖母年九旬仲夏下痢赤白甚劇脈象數而且弦愚用大熟地生杭芍各一兩煎湯服下即愈又服一劑脈亦和平痢證間有涼者然不過百中之一耳且又多系純白之痢又必脈象沉遲且食涼物坐涼處則覺劇者治以乾薑白芍小茴香各三錢山楂四錢生山藥六錢一兩劑即愈用白芍者誠以痢證必兼下墜腹疼即系涼痢其涼在腸胃而其肝膽間必有伏熱亦防其服熱藥而生熱也凡病人酷嗜之物不可力為禁止嘗見患痢者有恣飲涼水而愈者有飽食西瓜而愈者總之人之資稟不齊病之變態多端尤在臨證時精心與之消息耳曾治一少年下痢晝夜無數裡急後重投以清火通利之藥數劑痢已減半而後重分毫不除疑其腸中應有阻隔投以大承氣湯下燥糞長數寸而愈設此證若不疑其中有阻隔則燥糞不除病將何由愈乎有奇恆痢者張隱菴謂其證三陽並至三陰莫當九竅皆塞陽氣旁溢咽乾喉塞痛並於陰則上下無常薄為腸澼其脈緩小遲澀血溫身熱者死熱見七日者死蓋因陽氣偏盛陰氣受傷是以脈小遲澀此證急宜用大承氣湯瀉陽養陰緩則不救若不知奇恆之因見脈氣平緩而用平易之劑必至誤事十九治燥結方硝蔔通結湯治大便燥結久不通身體兼羸弱者淨朴硝四兩鮮萊蔔五斤將萊蔔切片同朴硝和水煮之初次煮用萊蔔片一斤水五斤煮至萊蔔爛熟撈出就其餘湯再入萊蔔一斤如此煮五次約得濃汁一大碗頓服之若不能頓服者先飲一半停一點鐘再溫飲一半大便即通若脈虛甚不任通下者加人參數錢另燉同服軟堅通結朴硝之所長也然其味鹹性寒若遇燥結甚實者少用之則無效多用之則鹹寒太過損肺傷腎其人或素有勞疾或下元虛寒者尤非所宜也惟與萊蔔同煎數次則朴硝之鹹味盡被萊蔔提出萊蔔之汁漿盡與朴硝融化夫萊蔔味甘性微溫煨熟食之善治勞嗽短氣方附水晶桃下其性能補益可知取其汁與朴硝同用其甘溫也可化朴硝之鹹寒其補益也可緩朴硝之攻破若或脈虛不任通下又借人參之大力者以為之扶持保護然後師有節制雖猛悍亦可用也一媼年近七旬傷寒初得無汗原是麻黃湯證因誤服桂枝湯遂成白虎湯證上焦煩熱太甚聞藥氣即嘔吐但飲所煎石膏清水亦吐俾用鮮梨片蘸生石膏細末嚼咽之約用石膏兩半陽明之大熱遂消而大便旬日未通其下焦餘熱仍無出路欲用硝黃降之聞藥氣仍然嘔吐且其人素患勞嗽身體羸弱過用鹹寒尤其所忌為制此方煎汁一大碗仍然有朴硝餘味復用萊蔔一個切成細絲同蔥泄油醋和藥汁調作羹病人食之香美並不知是藥大便得通而愈一媼年七旬勞嗽甚劇飲食化痰涎不化津液致大便燥結十餘日不行飲食漸不能進亦擬投以此湯為羸弱已甚用人參三錢另燉汁和藥服之一劑便通能進飲食復俾煎生山藥稠汁調柿霜餅服之勞嗽亦見愈赭遂攻結湯治宿食結於腸間不能下行大便多日不通其證或因飲食過度或因恣食生冷或因寒火凝結或因嘔吐既久胃氣衝氣皆上逆不下降生赭石二兩軋細朴硝五錢乾薑二錢甘遂一錢半軋細藥汁送服熱多者去乾薑寒多者酌加乾薑數錢嘔多者可先用赭石一兩乾薑半錢煎服以止其嘔吐嘔吐止後再按原方煎湯送甘遂末服之朴硝雖能軟堅然遇大便燥結過甚腸中毫無水氣者其軟堅之力將無所施甘遂辛竄之性最善行水能引胃中之水直達燥結之處而後朴硝因水氣流通乃得大施其軟堅之力燥結雖久亦可變為溏糞順流而下也特是甘遂力甚猛悍以攻決為用能下行亦能上達若無以駕馭之服後恆至吐瀉交作況此證多得之湧吐之餘或因氣機不能下行轉而上逆未得施其攻決之力而即吐出者故以赭石之鎮逆乾薑之降逆協力下行以參贊甘遂成功也且乾薑性熱朴硝性寒二藥並用善開寒火之凝滯寒火之凝滯於腸間者開宿物之停滯於腸間者亦易開也愚用此方救人多矣即食結中脘下脘亦未有不隨手奏效者乙卯之歲客居廣平忽有車載病人造寓求診者其人年過五旬呻吟不止言自覺食物結於下脘甚是痛楚數次延醫調治一劑中大黃用至兩半不下且凡所服之藥覺行至所結之處即上逆吐出飲食亦然此時上焦甚覺煩躁大便不通者已旬日矣診其脈雖微弱至數不數重按有根知猶可任攻下因謂之曰此病易治特所服藥中有猛悍之品服藥時必吾親自監視方妥然亦無須久淹能住此四點鐘結處即通下矣遂用此湯去乾薑方中赭石改用三兩朴硝改用八錢服後須臾腹中作響遲兩點半鐘大便通下而愈後月餘又患結證如前仍用前方而愈附録山東德州盧來函族侄孫患腸結證纏綿兩月有餘更醫數十人服藥百餘劑不但無效轉大增劇伊亦以為無人能治無藥可醫氣息奄奄殮服已備後接先生來信曾為去信服衷中參西録中赭遂攻結湯即攜衷中參西録往視幸伊心神未昏將赭遂攻結湯方查出示之伊素知醫臥觀一小時即猛起一手拍腑言我病即愈幸不當死立急派人取藥服後片刻腹中大響一陳自覺其結已開隨即大瀉兩三盆停約兩句鍾又瀉數次其病竟愈隨即食山藥粉稀粥兩茶杯繼用補益濡潤之藥數劑以善其後通結用蔥白尉法治同前證大蔥白四斤切作細絲干米醋多備待用將蔥白絲和醋炒至極熱分作兩包乘熱尉臍上涼則互換不可間斷其涼者仍可加醋少許再炒熱然炒蔥時醋之多少須加斟酌以炒成布包後不至有湯為度尉至六點鐘其結自開一孺子年六歲因食肉過多不能消化鬱結腸中大便不行者六七日腹中脹滿按之硬如石用一切通利藥皆不效為用此法尉之至三點鐘其腹漸軟又尉三點鐘大便通下如羊矢其脹遂消一童子年十五六因薄受外感腹中脹滿大便數日不通然非陽明之實熱燥結也醫者投以承氣湯大便仍不通而腹轉增脹自覺為腹脹所迫幾不能息且時覺心中怔忡診其脈甚微細按之即無脈虛證實幾為束手亦用蔥白尉法腹脹頓減又尉三點鐘覺結開行至下焦繼用豬膽汁導法大便得通而愈一人年四十許素畏寒涼愚俾日服生硫黃如黑豆粒大兩塊大見功效已年餘矣偶因暑日勞碌心中有火恣食瓜果又飽餐肉食不能消化腸中結而不行且又疼痛時作嘔吐醫者用大黃附子細辛湯降之不效又用京都薛氏保赤萬應散三劑並作一劑服之腹疼減去而仍不通行後愚診視其脈近和平微弦無力蓋此時不食數日不大便十日矣遂治以蔥白尉法覺腹中松暢且時作開通之聲而仍然噁心欲作嘔吐繼用赭石二兩乾薑錢半俾煎服以止其噁心仍助以蔥白尉法通其大便外尉內攻藥逾五點鐘大便得通而愈按金匱大黃附子細辛湯誠為開結良方愚嘗用以治腸結腹疼者甚效即薛氏保赤萬應散三劑作一劑服之以治大人亦為開結良方愚用過屢次皆效而以治此證二方皆不效者以其證兼嘔吐二方皆不能止其嘔吐故也病人自言從前所服之藥皆覺下行未至病所即上逆吐出獨此次服藥則沉重下達直抵病結之處所以能攻下也一人年四十三房事後恣食生冷忽然少腹抽疼腎囊緊縮大便四日不通上焦兼有煩躁之意醫者投以大黃附子細辛湯兩脅轉覺疼脹診其脈弦而沉兩尺之沉尤甚先治以蔥白尉法腹中作響大有開通之意腎囊之緊縮見愈而大便仍未通又用赭石二兩附子五錢當歸蘇子各一兩煎湯甫飲下即覺藥力下墜俾復煎渣飲之有頃降下結糞若干諸病皆愈按此證用蔥白尉之雖未即通而腸中之結已開至所服之藥重用赭石者因此證原宜用熱藥以溫下焦而上焦之煩躁與大便之燥結又皆與熱藥不宜惟重用赭石以佐之使其熱力下達自無僭上之患而其重墜之性又兼有通結之功上焦之浮熱因之歸根下焦之凝寒因之盡化矣附豬膽汁導法乃傷寒論下燥結之法也原用豬膽汁和醋少許以灌穀道中今變通其法用醋灌豬膽中手捻令醋與膽汁融和再用以通氣長竹管一端裝豬膽中用細繩扎住一端納穀道中用手將豬膽汁由竹管擠入穀道若穀道離大便猶遠宜將竹管深探至燥糞之處若結之甚者又必連用兩三個若畏豬膽汁涼或當冷時可將豬膽置水中溫之若無鮮豬膽可將乾者用醋泡開再將醋灌豬膽中以手捻至膽汁之凝結者皆融化亦可用若有灌腸注射器則用之更便古方治小便忽然不通者有蔥白炙法用蔥白一握捆作一束將兩端切齊中留二寸以一端安臍上一端用炭火炙之待炙至臍中發熱小便自通此蓋借其溫通之性自臍透達轉入膀胱以啓小便之路也然僅以火炙其一端則熱力之透達頗難若以拙擬蔥白尉法代之則小便之因寒不通或因氣滯不通者取效當更速也按此尉法不但可通二便凡疝氣初得用此法尉之無不愈者然須多尉幾次即尉至疝氣消後仍宜再尉兩三次或更加以小茴香胡椒諸末同炒亦佳用胡椒末時不宜過五錢小茴香可多用二十治消渴方玉液湯治消渴消渴即西醫所謂糖尿病忌食甜物生山藥一兩生黃耆五錢知母六錢生雞內金二錢搗細葛根錢半五味子三錢天花粉三錢消渴之證多由於元氣不升此方乃升元氣以止渴者也方中以黃耆為主得葛根能升元氣而又佐以山藥知母花粉以大滋真陰使之陽升而陰應自有云行雨施之妙也用雞內金者因此證尿中皆含有糖質用之以助脾胃強健化飲食中糖質為津液也用五味者取其酸收之性大能封固腎關不使水飲急於下趨也方書消證分上消中消下消謂上消口乾舌燥飲水不能解渴繫心移熱於肺或肺金本體自熱不能生水當用人參白虎湯中消多食猶飢系脾胃蘊有實熱當用調胃承氣湯下之下消謂飲一斗溲亦一斗系相火虛衰腎關不固宜用八味腎氣丸白虎加人參湯乃傷寒論治外感之熱傳入陽明胃腑以致作渴之方方書謂上消者宜用之此借用也愚曾試驗多次然必胃腑兼有實熱者用之方的中消用調胃承氣湯此須細為斟酌若其右部之脈滑而且實用之猶可若其人飲食甚勤一時不食即心中怔忡且脈象微弱者系胸中大氣下陷中氣亦隨之下陷宜用升補氣分之藥而佐以收澀之品與健補脾胃之品拙擬升陷湯後有治驗之案可參觀若誤用承氣下之則危不旋踵至下消用八味腎氣丸其方金匱治男子消渴飲一斗溲亦一斗而愚嘗試驗其方不惟治男子甚效即治女子亦甚效曾治一室女得此證用八味丸變作湯劑按後世法地黃用熟地桂用肉桂丸中用幾兩者改用幾錢惟茯苓澤瀉各用一錢兩劑而愈後又治一少婦得此證投以原方不效改遵古法地黃用乾地黃即今生地桂用桂枝分量一如前方四劑而愈此中有宜古宜今之不同者因其證之涼熱與其資稟之虛實不同耳消渴證若其肺體有熱當治以清熱潤肺之品若因心火熱而鑠肺者更當用清心之藥若肺體非熱因腹中氣化不升輕氣即不能上達於肺與吸進之養氣相合而生水者當用升補之藥補其氣化而導之上升此拙擬玉液湯之義也然消渴之證恆有因脾胃濕寒真火衰微者此腎氣丸所以用桂附而後世治消渴亦有用乾薑白朮者嘗治一少年咽喉常常發乾飲水連連不能解渴診其脈微弱遲濡投以四君子湯加乾薑桂枝尖一劑而渴止矣又有濕熱鬱於中焦作渴者蒼柏二妙散丹溪越鞠丸皆可酌用邑人某年二十餘貿易津門得消渴證求津門醫者調治三閲月更醫十餘人不效歸家就醫於愚診其脈甚微細旋飲水旋即小便須臾數次投以玉液湯加野臺參四錢數劑渴見止而小便仍數又加萸肉五錢連服十劑而愈滋膵飲治消渴生箭耆五錢大生地一兩生懷山藥一兩淨萸肉五錢生豬胰子三錢切碎上五味將前四味煎湯送服豬胰子一半至煎渣時再送服餘一半若遇中上二焦積有實熱脈象洪實者可先服白虎加人參湯數劑將實熱消去強半再服此湯亦能奏效消渴一證古有上中下之分謂其證皆起於中焦而極於上下究之無論上消中消下消約皆渴而多飲多尿其尿有甜味是以聖濟總録論消渴謂渴而飲水多小便中有脂似麩而甘至謂其證起於中焦是誠有理因中焦膵病而纍及於脾也蓋膵為脾之副臟在中醫書中名為散膏即扁鵲難經所謂脾有散膏半斤也膵尾銜接於脾門其全體之動脈又自脾脈分支而來故與脾有密切之關係有時膵髒髮酵多釀甜味由水道下陷其人小便遂含有糖質逮至膵病纍及於脾致脾氣不能散精達肺內經謂脾氣散精上達於肺則津液少不能通調水道內經謂通調水道下歸膀胱則小便無節是以渴而多飲多溲也嘗閲報有患消渴延中醫治療服藥竟愈者所用方中以黃耆為主藥為其能助脾氣上升還其散精達肺之舊也金匱有腎氣丸善治消渴其方以乾地黃即生地黃為主取其能助腎中之真陰上潮以潤肺又能協同山萸肉以封固腎關也又向因治消渴曾擬有玉液湯方中以生懷山藥為主屢試有效近閲醫報且有單服山藥以治消渴而愈者以其能補脾固腎以止小便頻數而所含之蛋白質又能滋補膵臟使其散膏充足且又色白入肺能潤肺生水即以止渴也又俗傳治消渴方單服生豬胰子可愈蓋豬胰子即豬之膵是人之膵病而可補以物之膵也此亦猶雞內金諸家本草皆謂其能治消渴之理也雞內金與豬胰子同為化食之物也愚因集諸藥合為一方以治消渴屢次見效二十一治癃閉方宣陽湯治陽分虛損氣弱不能宣通致小便不利野臺參四錢威靈仙錢半寸麥冬六錢帶心地膚子一錢濟陰湯治陰分虛損血虧不能濡潤致小便不利懷熟地一兩生龜板五錢搗碎生杭芍五錢地膚子一錢陰分陽分俱虛者二方並用輪流換服如下案所載服法小便自利一媼年六十餘得水腫證延醫治不效時有專以治水腫名者其方祕而不傳服其藥自大便瀉水數桶一身腫盡消言忌咸百日可保永愈數日又見腫旋覆如故服其藥三次皆然而病人益衰憊矣蓋未服其藥時即艱於小便既服藥後小便滴瀝全無所以旋消而旋腫也再延他醫皆言服此藥愈後復發者斷乎不能調治後愚診視其脈數而無力愚曰脈數者陰分虛也無力者陽分虛也膀胱之腑有下口無上口水飲必隨氣血流行而後能達於膀胱出為小便內經所謂州都之官津液藏焉氣化則能出者是也此脈陰陽俱虛致氣化傷損不能運化水飲以達膀胱此小便所以滴瀝全無也一方以人參為君輔以麥冬以濟參之熱靈仙以行參之滯少加地膚子為嚮導藥名之曰宣陽湯一方以熟地為君輔以龜板以助熟地之潤芍藥以行熟地之滯芍藥善利小便故能行熟地之泥亦少加地膚子為嚮導藥名之曰濟陰湯二方輪流服之先服濟陰湯取其貞下起元也服至三劑小便稍利再服宣陽湯亦三劑小便大利又再服濟陰湯小便直如泉湧腫遂盡消一婦人年三十許因陰虛小便不利積成水腫甚劇大便亦旬日不通一老醫投以八正散不效友人高為出方用生白芍六兩煎汁兩大碗再用阿膠二兩熔化其中俾病人儘量飲之老醫甚為駭疑高力主服之盡劑而二便皆通腫亦頓消後老醫與愚覿面為述其事且問此等藥何以能治此病答曰此必陰虛不能化陽以致二便閉塞白芍善利小便阿膠能滑大便二藥並用又大能滋補真陰使陰分充足以化其下焦偏勝之陽則二便自能通利也子治一水腫證其人年六旬二便皆不通利心中滿悶時或煩躁知其陰虛積有內熱又兼氣分不舒也投以生白芍三兩橘紅柴胡各三錢一劑二便皆通繼服滋陰理氣少加利小便之藥而愈一婦人年四十許得水腫證百藥不效偶食緑豆稀飯覺腹中松暢遂連服數次小便大利而愈有人向愚述其事且問所以能愈之故答曰緑豆與赤小豆同類故能行水利小便且其性又微涼大能滋陰退熱凡陰虛有熱致小便不利者服之皆有效也白茅根湯治陽虛不能化陽小便不利或有濕熱壅滯以致小便不利積成水腫白茅根一斤掘取鮮者去淨皮與節間小根細切將茅根用水四大碗煮一沸移其鍋置爐旁候十數分鐘視其茅根若不沉水底再煮一沸移其鍋置爐旁須臾視其根皆沉水底其湯即成去渣溫服多半杯日服五六次夜服兩三次使藥力相繼周十二時小便自利茅根鮮者煮稠汁飲之則其性微涼其味甘而且淡為其涼也故能去實火為其甘也故能清虛熱為其淡也故能利小便又能宣通臟腑暢達經絡兼治外感之熱而利周身之水也然必須如此煮法服之方效若久煎其清涼之性及其宣通之力皆減服之即無效矣所煮之湯歷一晝夜即變緑色若無發酵之味仍然可用一婦人年四十餘得水腫證其翁固諸生而精於醫者自治不效延他醫診治亦不效偶與愚遇問有何奇方可救此危證因細問病情知系陰虛有熱小便不利遂俾用鮮茅根煎濃汁飲旬日全愈一媼年六十餘得水腫證醫者用藥治愈三次皆反復再服前藥不效其子商於梓匠欲買棺木梓匠固其親屬轉為求治於愚因思此證反復數次後服藥不效者必是病久陰虛生熱致小便不利細問病情果覺肌膚髮熱心內作渴小便甚少俾單用鮮白茅根煎湯頻頻飲之五日而愈一婦人年四十許得水腫證其脈象大致平和而微有滑數之象俾濃煎鮮茅根湯飲之數日病愈強半其子來送信愚因囑之曰有要緊一言前竟忘卻患此證者終身須忌食牛肉病愈數十年食之可以復發孰意其子未返已食牛肉且自覺病愈出坐庭中又兼受風其證陡然反復一身盡腫兩目因腫甚不能開視愚用越婢湯發之以滑石易石膏用越婢湯原方常有不汗者若以滑石易石膏則易得汗一劑汗出小便頓利腫亦見消再飲白茅根湯數日病遂全愈白茅根拙擬二鮮飲與三鮮飲用以治吐衄此方又用以治水腫而其功效又不止此也愚治傷寒溫病於大便通後陽明之盛熱已消恆俾濃煮鮮茅根湯渴則飲之其人病愈必速且愈後即能飲食更無反復之患蓋寒溫愈後其人不能飲食與屢次復病者大抵因餘熱未盡與胃中津液未復也白茅根甘涼之性既能清外感餘熱又能滋胃中津液至內有鬱熱外轉覺涼者其性又善宣通鬱熱使達於外也按凡膨脹無論或氣或血或水腫治愈後皆終身忌食牛肉蓋牛肉屬土食之能壅滯氣血且其彭亨之形有似腹脹故忌之也醫者治此等證宜切囑病家慎勿誤食溫通湯治下焦受寒小便不通椒目八錢炒搗小茴香二錢炒搗威靈仙三錢人之水飲由三焦而達膀胱三焦者身內脂膜也曾即物類驗之其脂膜上皆有微絲血管狀若紅絨毛即行水之處此管熱則膨漲涼則凝滯皆能閉塞水道若便濁兼受涼者更凝結稠黏杜塞溺管滴瀝不通故以椒目之滑而溫茴香之香而熱者散其凝寒即以通其竅絡更佐以靈仙溫竄之力化三焦之凝滯以達膀胱即化膀胱之凝滯以達溺管也涼甚者肉桂附子乾薑皆可酌加氣分虛者更宜加人參助氣分以行藥力加味苓桂朮甘湯治水腫小便不利其脈沉遲無力自覺寒涼者於術三錢桂枝尖二錢茯苓片二錢甘草一錢乾薑三錢人參三錢烏附子二錢威靈仙一錢五分腫滿之證忌用甘草以其性近壅滯也惟與茯苓同用轉能瀉濕滿故方中未將甘草減去若腫脹甚劇恐其壅滯者去之亦可服藥數劑後小便微利其脈沉遲如故者用此湯送服生硫黃末四五釐若不覺溫暖體驗漸漸加多以服後移時覺微溫為度人之水飲非陽氣不能宣通上焦陽虛者水飲停於膈上中焦陽虛者水飲停於脾胃下焦陽虛者水飲停於膀胱水飲停蓄既久遂漸漬於周身而頭面肢體皆腫甚或腹如抱甕而膨脹成矣此方用苓桂朮甘湯以助上焦之陽即用甘草協同人參乾薑以助中焦之陽又人參同附子名參附湯能固下焦元陽將脫協同桂枝更能助下焦之陽桂枝上達胸膈下通膀胱故腎氣丸用桂枝不用肉桂三焦陽氣宣通水飲亦隨之宣通而不復停滯為患矣至靈仙與人參並用治氣虛小便不利甚效此由實驗而知故前所載宣陽湯並用之而其通利之性又能運化朮草之補力俾脹滿者服之毫無滯礙故加之以為佐使也若藥服數劑後脈仍如故病雖見愈實無大效此真火衰微太甚恐非草木之品所能成功故又用生硫黃少許以補助相火諸家本草謂其能使大便潤小便長補火之中大有行水之力故用之因涼成水腫者尤良也服生硫黃法其中有治水腫之驗案宜參觀脈沉水腫與脈浮水腫迥異脈浮者多系風水腠理閉塞小便不利當以金匱越婢湯發之通身得汗小便自利若浮而兼數者當是陰虛火動宜兼用涼潤滋陰之藥脈沉水腫亦未可遽以涼斷若沉而按之有力者系下焦蘊熱未化仍當用涼潤之藥滋陰以化其陽小便自利惟其脈沉而且遲微弱欲無詢之更自覺寒涼者方可放膽用此湯無礙或但服生硫黃試驗漸漸加多亦可奏效特是腫之劇者脈之部位皆腫似難辨其沉浮與有力無力必重按移時使按處成凹始能細細辨認苓桂朮甘湯為治上焦停飲之神方金匱曰短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之喻嘉言注云呼氣短宜用苓桂朮甘湯以化太陽膈上之氣吸氣短宜用腎氣丸以納少陰腎經之氣推喻氏之意以為呼氣短則上焦陽虛吸氣短則下焦陰虛故二方分途施治然以之為學者説法以自明其別有會心則可以之釋金匱謂其文中之意本如是則不可愚臨證體驗多年見有膈上氣旺而膺胸開朗者必能運化水飲下達膀胱此用苓桂朮甘湯治飲之理也見有腎氣旺而膀胱流通者又必能吸引水飲下歸膀胱此用腎氣丸治飲之理也故仲景於上焦有微飲而短氣者並出兩方任人取用其一皆能立建功效況桂枝為宣通水飲之妙藥茯苓為淡滲水飲之要品又為二方之所同乎且金匱之所謂短氣乃呼氣短非吸氣短也何以言之吸氣短者吸不歸根即吐出神農本草經所謂吐吸即喘之替言也金匱之文有單言喘者又有短氣與喘並舉者若謂短氣有微飲句當兼呼氣短與吸氣短而言而喘與短氣並舉者又當作何解耶惟論溢飲變其文曰氣短似言吸氣短用越婢湯治風水愚曾經驗遇藥病相投功效甚捷其方金匱以治風水惡風一身悉腫脈浮不渴續自汗出無大熱者而愚臨證體驗以來即非續自汗出者用之亦可若一劑而汗不出者可將石膏易作滑石分量須加重寒通湯治下焦蘊蓄實熱膀胱腫脹溺管閉塞小便滴瀝不通滑石一兩生杭芍一兩知母八錢黃柏八錢一人年六十餘溺血數日小便忽然不通兩日之間滴瀝全無病人不能支持自以手揉擠流出血水少許稍較輕鬆揉擠數次疼痛不堪揉擠倣徨無措求為診治其脈沉而有力時當仲夏身復厚被猶覺寒涼知其實熱鬱於下焦溺管因熱而腫脹不通也為擬此湯一劑稍通又加木通海金沙各二錢服兩劑全愈升麻黃耆湯治小便滴瀝不通偶因嘔吐咳逆或側臥欠伸可通少許此轉胞也用升提藥提其胞而轉正之胞系不了戾小便自利生黃耆五錢當歸四錢升麻二錢柴胡二錢一婦人産後小便不利遣人詢方俾用生化湯加白芍治之不效復來詢方言有時噁心嘔吐小便可通少許愚恍悟曰此必因産時努力太過或撑擠太甚以致胞系了戾是以小便不通噁心嘔吐則氣機上逆胞系有提轉之勢故小便可以稍通也遂為擬此湯一劑而愈三焦之氣化不升則不降小便不利者往往因氣化下陷鬱於下焦滯其升降流行之機也故用一切利小便之藥不效而投以升提之藥恆多奇效是以拙擬此湯不但能治轉胞並能治小便癃閉也古方有但重用黃耆治小便不利積成水腫者參閲陸定圃冷廬醫話水腫之證有虛有實實者似不宜用黃耆然其證實者甚少而虛者居多至其證屬虛矣又當詳辨其為陰虛陽虛或陰陽俱虛陽虛者氣分虧損可單用重用黃耆陰虛者其血分枯耗宜重用滋陰之藥兼取陽生陰長之義而以黃耆輔之至陰陽俱虛者黃耆與滋陰之藥可參半用之醫者不究病因痛詆為不可用固屬鹵莽至其連用除濕猛劑其鹵莽尤甚蓋病至積成水腫即病因實者其氣血至此亦有虧損猛悍藥或一再用猶可若不得已而用至數次亦宜以補氣血之藥輔之況其證原屬重用黃耆治愈之虛證乎至今之醫者對於此證縱不用除濕猛劑亦恆多用利水之品不知陰虛者多用利水之藥則傷陰陽虛者多用利水之藥亦傷陽夫利水之藥非不可用然貴深究其病因而為根本之調治利水之藥不過用作嚮導而已附方葛稚川肘後方治小便不通用大螻蛄二枚取下體以水一升漬飲須臾即通又壽域方用土狗後半焙研調服半錢小便即通生研亦可又唐氏經驗方用土狗後截和麝香搗納臍中縛定即通按土狗即螻蛄日華諸家本草謂其治水腫頭面腫李時珍謂其通大小便治石淋誠為利小便要藥凡小便不通者無論涼熱虛實皆可加於藥中以為嚮導即單服之亦甚有效驗然觀古方皆用其後半截蓋其前半開破之力多後半利水力多若治二便皆不通者當全用之俗傳治小便不通聞藥方用明雄黃一錢蟾酥五分焙發麝香六釐共研細鼻聞之小便即通雞胵湯治氣鬱成臌脹兼治脾胃虛而且郁飲食不能運化生雞內金四錢去淨瓦石糟粕搗碎於術三錢生杭芍四錢柴胡二錢廣陳皮二錢生薑三錢內經謂諸濕腫滿皆屬於脾誠以脾也者與胃相連以膜能代胃行其津液且地居中焦為中焦油膜所包更能為四旁宣其氣化脾若失其所司則津液氣化凝滯腫滿即隨之矣是臌脹者當以理脾胃為主也西人謂脾體中虛內多回血管若其回血管之血因脾病不能流通瘀而成絲成塊原非草木之根荄所能消化雞內金為雞之脾胃中有瓦石銅鐵皆能消化其善化有形瘀積可知故能直入脾中以消回血管之瘀滯而又以白朮之健補脾胃者以駕馭之則消化之力愈大柴胡神農本草經謂主腸胃中飲食積聚能推陳致新其能佐雞內金消瘀可知且與陳皮並用一升一降而氣自流通也用芍藥者因其病雖系氣臌亦必挾有水氣芍藥善利小便即善行水且與生薑同用又能調和營衛使周身之氣化流通也夫氣臌本為難治之證從擬此方之後連治數證皆效治一叟年六旬腹脹甚劇治以此湯數劑其效不速用黑醜一錢炒研細煎此湯送下兩劑大見功效又去黑醜再服數劑全愈若小便時覺熱且色黃赤者宜酌加滑石數錢雞內金雖饒有消化之力而諸家本草實有能縮小便之説恐於證之挾有水氣者不宜方中用白芍以利小便所以濟雞內金之短也內經謂按之窅而不起者風水也愚臨證體驗以來知凡系水臌按之皆不能即起氣臌則按之舉手即起或疑若水積腹中不行於四肢如方書所謂單腹脹者似難辨其為氣為水不知果為水證重按移時舉手則有微痕而氣證則無也且氣臌證小便自若水臌證多小便不利此又其明徵也雞胵茅根湯治水臌氣臌並病兼治單腹脹及單水臌脹單氣臌脹生雞內金五錢去淨瓦石糟粕軋細生於術分量用時斟酌鮮茅根二兩銼細先將茅根煎湯數茶盅不可過煎一兩沸後慢火溫至茅根沉水底湯即成先用一盅半加生薑五片煎雞內金末至半盅時再添茅根湯一盅七八沸後澄取清湯不拘一盅或一盅多服之所餘之渣仍用茅根湯煎服日進一劑早晚各服藥一次初服小便即多數日後大便亦多若至日下兩三次宜減雞內金一錢加生於術一錢又數日脹見消大便仍勤可減雞內金一錢加於術一錢又數日脹消強半大便仍勤可再減雞內金一錢加於術一錢如此精心隨病機加減俾其補破之力適與病體相宜自能全愈若無鮮茅根可用藥房中干茅根一兩代之無鮮茅根即可不用生薑所煎茅根湯宜當日用盡煎藥後若有餘剩可當茶溫飲之雞內金之功效前方下已詳論之矣至於茅根最能利水人所共知而用於此方不但取其利水也茅根春日發生最早是稟一陽初生之氣而上升者也故凡氣之鬱而不暢者茅根皆能暢達之善利水又善理氣故能佐雞內金以奏殊功也加生薑者恐鮮茅根之性微寒也且其味辛能理氣其皮又善利水也繼加於術減雞內金者因脹已見消即當扶正以勝邪不敢純用開破之品致傷其正氣也或疑此方初次即宜少加於術者而愚曾經試驗早加於術固不若晚加之有效也或問茅根能清熱利小便人所共知至謂兼理氣分之郁諸家本草皆未言及子亦曾單用之而有確實之徵驗乎答曰此等實驗已不勝記曾治一室女心中常覺發熱屢次服藥無效後愚為診視六脈皆沉細診脈之際聞其太息數次知其氣分不舒也問其心中脅下恆隱隱作疼遂俾剖取鮮茅根銼細半斤煎數沸當茶飲之兩日後復診其脈已還浮分重診有力不復聞其太息問其脅下已不覺疼惟心中仍覺發熱耳再飲數日其心中發熱亦愈又嘗治少年得肺鼠疫病其咽喉唇舌異常乾燥精神昏昏似睡周身肌膚不熱脈象沉微問其心中時常煩悶此鼠疫之邪閉塞其少陰致腎氣不能上達也問其大便四日未行遂投以大劑白虎加人參湯先用茅根數兩煎湯以之代水煎藥取汁三盅分三次飲下其脈頓起變作洪滑之象精神已復周身皆熱諸病亦皆見愈俾仍按原方將藥煎出每飲一次調入生雞子黃一枚其病遂全愈蓋茅根生於水邊原兼稟寒水之氣且其出地之時作尖鋭之錐形故能直入少陰助腎氣上達與心相濟則心即跳動有力是以其脈遂洪滑外現也再加生雞子黃以滋少陰之液俾其隨氣上升以解上焦之因燥生熱因熱生煩是以諸病皆愈也此二案皆足徵茅根理氣之效也二十二治淋濁方理血湯治血淋及溺血大便下血證之由於熱者生山藥一兩生龍骨六錢搗細生牡蠣六錢搗細海螵蛸四錢搗細茜草二錢生杭芍三錢白頭翁三錢真阿膠三錢不用炒溺血者加龍膽草三錢大便下血者去阿膠加龍眼肉五錢血淋之症大抵出之精道也其人或縱欲太過而失於調攝則腎臟因虛生熱或欲盛強制而妄言採補則相火動無所泄亦能生熱以致血室男女皆有男以化精女以系胞中血熱妄動與敗精混合化為腐濁之物或紅或白成絲成塊溺時杜塞牽引作疼故用山藥阿膠以補腎臟之虛白頭翁其性寒涼其味苦而兼澀涼血之中大有固脫之力故以清腎臟之熱茜草螵蛸以化其凝滯而兼能固其滑脫龍骨牡蠣以固其滑脫而兼能化其凝滯芍藥以利小便而兼能滋陰清熱所以投之無不效也此證間有因勞思過度而心熱下降忿怒過甚而肝火下移以成者其血必不成塊惟溺時牽引作疼此或出之溺道不必出自精道也投以此湯亦效溺血之證不覺疼痛其證多出溺道間有出之精道者大抵心移熱於小腸則出之溺道肝移熱於血室則出之精道方中加生地黃者瀉心經之熱也若系肝移熱於血室者加龍膽草亦可一人年三十許患血淋溲時血塊杜塞努力始能溲出疼楚異常且所溲者上多浮油膠黏結於器底是血淋而兼膏淋也從前延醫調治經三十五人服藥年餘分毫無效尪羸已甚後愚診視其脈弦細至數略數周身肌膚甲錯足骨凸處其肉皮皆成旋螺高寸余觸之甚疼蓋臥床不起者已半載矣細詢病因謂得之忿怒之餘誤墜水中時當秋夜覺涼甚遂成斯證知其忿怒之火為外寒所束鬱於下焦而不散而從前居室之間又有失保養處也擬投以此湯為脈弦遂以柏子仁炒搗八錢代方中山藥以其善於養肝也疏方甫定其父出所服之方數十紙欲以質其同異愚曰無須細觀諸方與吾方同者惟阿膠白芍耳閲之果然其父問何以知之愚曰吾所用之方皆苦心自經營者故與他方不同服三劑血淋遂愈而膏淋亦少減改用拙擬膏淋湯連服二十餘劑膏淋亦愈而小便仍然頻數作疼細詢其疼之實狀謂少腹常覺疼而且墜時有欲便之意故有尿即不能強忍知其又兼氣淋也又投以拙擬氣淋湯十劑全愈周身甲錯足上旋螺盡脫溺血之證熱者居多而間有因寒者則此方不可用矣曾治一人年三十餘陡然溺血其脈微弱而遲自覺下焦涼甚知其中氣虛弱不能攝血又兼命門相火衰微乏吸攝之力以致腎臟不能封固血隨小便而脫出也投以四君子湯加熟地烏附子連服二十餘劑始愈又有非涼非熱但因脾虛不能統血而溺血者方書所謂失於便溺者太陰之不升也仍宜用四君子湯以龍骨牡蠣佐之大便下血者大抵由於腸中回血管或血脈管破裂方中龍骨牡蠣之收澀原可補其破裂之處而又去阿膠者防其滑大腸也加龍眼肉者因此證間有因脾虛不能統血而然者故加龍眼肉以補脾若虛甚者又當重用白朮或更以參耆佐之若虛而且陷者當兼佐以柴胡升麻若虛而且涼者當兼佐以乾薑附子減去芍藥白頭翁一少婦大便下血月餘屢次服藥不效愚為診視用理血湯去阿膠加龍眼肉五錢治之而僻處藥坊無白頭翁權服一劑病稍見愈翌日至他處藥坊按方取藥服之病遂全愈則白頭翁之功效何其偉哉附録直隸唐山張來函張年二十八歲於冬月初得膏淋繼之血淋所便者或血條或血塊後則繼以鮮血溺頻莖疼屢經醫者調治病轉加劇其氣色青黑六脈堅數肝脈尤甚與以理血湯俾連服三劑血止脈稍平他證仍舊繼按治淋濁方諸方加減治之十餘劑全愈膏淋湯治膏淋生山藥一兩生芡實六錢生龍骨六錢搗細生牡蠣六錢搗細大生地六錢切片潞黨參三錢生杭芍三錢膏淋之證小便混濁更兼稠黏便時淋澀作疼此證由腎臟虧損暗生內熱腎臟虧損則蟄藏不固精氣易於滑脫內熱暗生則膀胱熏蒸小便改其澄清久之三焦之氣化滯其升降之機遂至便時牽引作疼而混濁稠黏矣故用山藥芡實以補其虛而兼有收攝之功龍骨牡蠣以固其脫而兼有化滯之用地黃芍藥以清熱利便潞參以總提其氣化而斡旋之也若其證混濁而不稠黏者是但出之溺道用此方時宜減龍骨牡蠣之半氣淋湯治氣淋生黃耆五錢知母四錢生杭芍三錢柴胡二錢生明乳香一錢生明沒藥一錢氣淋之證少腹常常下墜作疼小便頻數淋澀疼痛因其人下焦本虛素蘊內熱而上焦之氣化又復下陷鬱而生熱則虛熱與濕熱互相結於太陽之腑滯其升降流通之機而氣淋之證成矣故以升補氣化之藥為主而以滋陰利便流通氣化之藥佐之勞淋湯治勞淋生山藥一兩生芡實三錢知母三錢真阿膠三錢不用炒生杭芍三錢勞淋之證因勞而成其人或勞力過度或勞心過度或房勞過度皆能暗生內熱耗散真陰陰虧熱熾熏蒸膀胱久而成淋小便不能少忍便後仍復欲便常常作疼故用滋補真陰之藥為主而少以補氣之藥佐之又少加利小便之藥作嚮導然此證得之勞力者易治得之勞心者難治得之房勞者尤難治又有思欲無窮相火暗動而無所泄積久而成淋者宜以黃柏知母以涼腎澤瀉滑石以瀉腎其淋自愈或問以上治淋四方中三方以山藥為君將山藥之性與淋證最相宜乎答曰陰虛小便不利者服山藥可利小便氣虛小便不攝者服山藥可攝小便蓋山藥為滋陰之良藥又為固腎之良藥以治淋證之淋澀頻數誠為有一無二之妙品再因證而加以他藥輔佐之所以投之輒效也砂淋丸治砂淋亦名石淋黃色生雞內金一兩雞鴨皆有肫皮而雞者色黃宜去淨砂石生黃耆八錢知母八錢生杭芍六錢蓬砂六錢朴硝五錢硝石五錢共軋細煉蜜為丸桐子大食前開水送服三錢日兩次石淋之證因三焦氣化瘀滯或又勞心勞力過度或房勞過度膀胱暗生內熱內熱與瘀滯煎熬久而結成砂石杜塞溺道疼楚異常其結之小者可用藥化之若大如桃杏核以上者不易化矣須用西人剖取之法此有關性命之證剖取之法雖險猶可於險中求穩也雞內金為雞之脾胃原能消化砂石蓬砂可為金銀銅焊藥其性原能柔五金治骨鯁故亦善消硬物朴硝神農本草經謂其能化七十二種石硝石神農本草經不載而名醫別録載之亦謂其能化七十二種石想此二物性味相近古原不分即包括於朴硝條中至陶隱居始別之而其化石之能則同也然諸藥皆消破之品恐於元氣有傷故加黃耆以補助氣分氣分壯旺益能運化藥力猶恐黃耆性熱與淋證不宜故又加知母芍藥以解熱滋陰而芍藥之性又善引諸藥之力至膀胱也按此證有救急之法當石杜塞不通時則仰臥溺之可通若仍不通或側臥或立或以手按地俾石離其杜塞之處即可通寒淋湯治寒淋生山藥一兩小茴香二錢炒搗當歸三錢生杭芍二錢椒目二錢炒搗上所論五淋病因不同而證皆兼熱此外實有寒熱凝滯寒多熱少之淋其證喜飲熱湯喜坐暖處時常欲便便後益抽引作疼治以此湯服自愈祕真丹治諸淋證已愈因淋久氣化不固遺精白濁者五倍子一兩去淨蟲糞粉甘草八錢上二味共軋細每服一錢竹葉煎湯送下日再服曾治一人從前患毒淋服各種西藥兩月餘淋已不疼白濁亦大見輕然兩日不服藥白濁仍然反復愚俾用膏淋湯送服祕真丹兩次而愈毒淋湯治花柳毒淋疼痛異常或兼白濁或兼溺血金銀花六錢海金沙三錢石韋二錢牛蒡子二錢炒搗甘草梢二錢生杭芍三錢三七二錢搗細鴨蛋子三十粒去皮上藥八味先將三七末鴨蛋子仁用開水送服再服余藥所煎之湯此證若兼受風者可加防風二三錢若服藥數劑後其疼瘥減而白濁不除或更遺精者可去三七鴨蛋子加生龍骨生牡蠣各五錢鴨蛋子味至苦而又善化瘀解毒清熱其能消毒菌之力全在於此又以三七之解毒化腐生肌者佐之以加於尋常治淋藥中是以治此種毒淋更勝於西藥也清毒二仙丹治花柳毒淋無論初起日久凡有熱者服之皆效丈菊子一兩搗碎鴨蛋子四十粒去皮仁破者勿用服時宜囫圇吞下上藥二味將丈菊子煎湯一盅送服鴨蛋子仁丈菊俗名向日葵其花善催生子善治淋鄰村一少年患此證便時膏淋與血液相雜疼痛頗劇語以此方數次全愈鮮小薊根湯治花柳毒淋兼血淋者鮮小薊根一兩洗淨銼細上一味用水煎三四沸取清湯一大茶盅飲之一日宜如此飲三次若畏其性涼者一次用六七錢亦可曾治一少年患此證所便者血溺相雜其血成絲成塊間有脂膜疼痛甚劇且甚腥臭屢次醫治無效授以此方連服五日全愈按如毒淋之兼血淋者而與鴨蛋子三七鮮小薊根並用則效小薊於三鮮飲下曾言之然彼則用治吐血此則用治毒淋中之血淋皆極效驗而其功用實猶不止此也一十五六歲童子項下起疙瘩數個大如巨栗皮色不變發熱作疼知系陽證俾濃煎鮮小薊根湯連連飲之數日全消蓋其善消血中之熱毒又能化瘀開結故有如此功效也澄化湯治小便頻數遺精白濁或兼疼澀其脈弦數無力或咳嗽或自汗或陰虛作熱生山藥一兩生龍骨六錢搗細牡蠣六錢搗細牛蒡子三錢炒搗生杭芍四錢粉甘草錢半生車前子三錢布包清腎湯治小便頻數疼澀遺精白濁脈洪滑有力確係實熱者知母四錢黃柏四錢生龍骨四錢搗細生牡蠣三錢炒搗海螵蛸三錢搗細茜草二錢生杭芍四錢生山藥四錢澤瀉一錢半或問龍骨牡蠣收澀之品也子治血淋所擬理血湯中用之前方治小便頻數或兼淋澀用之此方治小便頻數疼澀亦用之獨不慮其收澀之性有礙於疼澀乎答曰龍骨牡蠣斂正氣而不斂邪氣凡心氣耗散肺氣息賁肝氣浮越腎氣滑脫用之皆有捷效即證兼瘀兼疼或兼外感放膽用之毫無妨礙拙擬補絡補管湯理郁升陷湯從龍湯清帶湯諸方中論之甚詳皆可參觀一叟年七十餘遺精白濁小便頻數微覺疼澀診其六脈平和兩尺重按有力知其年雖高而腎經確有實熱也投以此湯五劑全愈一人年三十許遺精白濁小便時疼如刀剺又甚澀數診其脈滑而有力知其系實熱之證為其年少疑兼花柳毒淋遂投以此湯加沒藥不去油三錢鴨蛋子去皮四十粒藥汁送服數劑而愈舒和湯治小便遺精白濁因受風寒者其脈弦而長左脈尤甚桂枝尖四錢生黃耆三錢續斷三錢桑寄生三錢知母三錢服此湯數劑後病未全愈者去桂枝加龍骨牡蠣皆不用煅各六錢東海漁者年三十餘得騙白證甚劇旬日之間大見衰憊懼甚遠來求方其脈左右皆弦而左部弦而兼長夫弦長者肝木之盛也木與風為同類人之臟腑無論何處受風其風皆與肝木相應內經陰陽應象論所謂風氣通於肝者是也脈之現象如此肝因風助倍形其盛而失其和也況病人自言因房事後小便當風從此外腎微腫遂有此證尤為風之明徵乎蓋房事後腎臟經絡虛而不閉風氣乘虛襲入鼓動腎臟不能蟄藏內經謂腎主蟄藏而為腎行氣之肝木又與風相應以助其鼓動而大其疏泄內經肝主疏泄故其病若是之劇也為擬此湯使脈之弦長者變為舒和服之一劑見輕數劑後遂全愈以後凡遇此等症其脈象與此同者投以此湯無不輒效二十三治傷寒方麻黃加知母湯治傷寒無汗麻黃四錢桂枝尖二錢甘草一錢杏仁二錢去皮炒知母三錢先煮麻黃五六沸去上沫納諸藥煮取一茶盅溫服覆被取微似汗不須啜粥余如桂枝法將息麻黃湯原方桂枝下有去皮二字非去枝上之皮也古人用桂枝惟取梢尖嫩枝折視之內外如一皮骨不分若見有皮骨可分辨者去之不用故曰去皮陳修園之侄鳴岐曾詳論之傷寒論太陽篇中麻黃湯原在桂枝湯後而麻黃證多桂枝證不過十中之一二且病名傷寒麻黃湯為治傷寒初得之主方故先録之傷寒之證先自背受之背者足太陽所轄之部位也是以其證初得周身雖皆惡寒而背之惡寒尤甚周身雖皆覺疼而背下連腿之疼痛尤甚其脈陰陽俱緊者誠以太陽為周身外衛之陽陡為風寒所襲逼其陽氣內陷與脈相併其脈當有力而作起伏迭湧之勢而寒氣之縮力凡物之體熱則漲寒則縮又將外衛之氣縮緊逼壓脈道使不得起伏成波瀾而惟現弦直有力之象甚或因不能起伏而至左右彈動凡脈之緊者必有力夫脈之跳動心臟主之而其跳動之有力不但心主之也諸臟腑有熱皆可助脈之跳動有力營衛中有熱亦可助脈之跳動有力特是脈之有力者恆若水之有浪大有起伏之勢而緊脈雖有力轉若無所起伏誠以嚴寒束其外表其收縮之力能逼營衛之熱內陷與脈相併以助其有力而其收縮之力又能遏抑脈之跳動使無起伏是緊脈之真相原於平行中見其有力也至於緊脈或左右彈者亦蓄極而旁溢之象也仲師治以麻黃湯所以解外表所束之寒也方中用麻黃之性熱中空者直走太陽之經外達皮毛借汗解以祛外感之寒桂枝之辛溫微甘者偕同甘草以溫肌肉實腠理助麻黃托寒外出杏仁之苦降者入胸中以降逆定喘原方止此四味而愚為加知母者誠以服此湯後間有汗出不解者非因汗出未透實因餘熱未清也佐以知母於發表之中兼寓清熱之意自無汗後不解之虞此乃屢經試驗而確知其然非敢於經方輕為加減也或問喘為肺臟之病太陽經於肺無涉而其證多兼微喘者何也答曰胸中亦太陽部位其中所積之大氣原與周身衛氣息息相通衛氣既為寒氣所束則大氣內郁必膨脹而上逆沖肺此喘之所由來也又風寒襲於皮毛必兼入手太陰肺經挾痰涎凝郁肺竅此又喘之所由來也麻黃能兼入手太陰經散其在經之風寒更能直入肺中以瀉其鬱滿所以能發太陽之汗者不僅麻黃而仲景獨取麻黃為治足經之藥而手經亦兼顧無遺此仲景制方之妙也凡利小便之藥其中空者多兼能發汗萹蓄木通之類是也發汗之藥其中空者多兼能利小便麻黃柴胡之類是也太陽經病往往兼及於膀胱以其為太陽之腑也麻黃湯治太陽在經之邪而在腑者亦兼能治之蓋在經之邪由汗而解而在腑之邪亦可由小便而解彼後世自作聰明恆用他藥以代麻黃湯者於此義蓋未之審也大青龍湯治傷寒無汗煩躁是胸中先有內熱無所發泄遂鬱而作煩躁故於解表藥中加石膏以清內熱然麻黃與石膏並用間有不汗之時若用此方將知母加重數錢其寒潤之性能入胸中化合而為汁隨麻桂以達於外而煩躁自除矣傷寒與溫病始異而終同為其始異也故傷寒發表可用溫熱溫病發表必須辛涼為其終同也故病傳陽明之後無論寒溫皆宜治以寒涼而大忌溫熱茲編於解表類中略取傷寒論太陽篇數方少加疏解俾初學知傷寒初得治法原異於溫病因益知溫病初得治法不同於傷寒至於傷寒三陰治法雖亦與溫病多不同然其證甚少若擴充言之則凡因寒而得之霍亂痧證又似皆包括其中精微浩繁萬言莫罄欲精其業者取原書細觀可也加味桂枝代粥湯治傷寒有汗桂枝尖三錢生杭芍三錢甘草錢半生薑三錢大棗三枚掰開生黃耆三錢知母三錢防風二錢煎湯一茶盅溫服覆被令一時許遍身漐漐微似有汗者益佳不可如水流漓病必不除禁生冷黏滑肉面五辛酒酪及臭惡等物桂枝湯為治傷風有汗之方釋者謂風傷營則有汗又或謂營分虛損即與外邪相感召斯説也愚嘗疑之人之營衛皆為周身之外廓衛譬則郭也營譬則城也有衛以為營之外圍外感之邪何能越衛而傷營乎蓋人之胸中大氣息息與衛氣相關大氣充滿於胸中則饒有吸力將衛氣吸緊以密護於周身捍禦外感使不得著體即或著體亦止中於衛而不中於營此理固顯然也有時胸中大氣虛損不能吸攝衛氣衛氣散漫不能捍禦外邪則外邪之來直可透衛而入營矣且愚臨證實驗以來凡胸中大氣虛損或更下陷者其人恆大汗淋漓拙擬升陷湯下載有數案可參觀也是知凡桂枝湯證皆因大氣虛損其汗先有外越之機而外邪之來又乘衛氣之虛直透營分擾其營中津液外泄而為汗也究之風寒原不相離即系傷風其中原挾有寒氣若但中於衛則亦能閉汗矣故所用桂枝湯中不但以祛風為務而兼有散寒之功也陳古愚曰桂枝辛溫陽也芍藥苦平陰也桂枝又得生薑之辛同氣相求可恃之調周身之陽氣芍藥而得大棗甘草之甘苦化合可恃之以滋周身之陰液既取大補陰陽之品養其汗源為勝邪之本又啜粥以助之取水穀之津以為汗汗後毫不受傷所謂立身於不敗之地以圖萬全也按此解甚超妙而於啜粥之精義猶欠發揮如謂取水穀之津以為汗而人無傷損他發汗藥何以皆不啜粥蓋桂枝湯所主之證乃外感兼虛之證所虛者何胸中大氣是也內經曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海由斯觀之大氣雖本於先天實賴後天水穀之氣培養而成桂枝湯證既因大氣虛損致衛氣漫散邪得越衛而侵營故於服藥之後即啜熱粥能補助胸中大氣以勝邪兼能宣通薑桂以逐邪此誠戰則必勝之良方也乃後世醫者忽不加察雖用其方多不啜粥致令服後無效病轉深陷故王清任醫林改錯深詆桂枝湯無用非無用也不啜粥故也是以愚用此方時加黃耆升補大氣以代粥補益之力防風宣通營衛以代粥發表之力服後啜粥固佳即不啜粥亦可奏效而又恐黃耆溫補之性服後易至生熱故又加知母以預為之防也按凡服桂枝湯原方欲其出汗者非啜粥不效趙晴初曰族侄柏堂二十一歲時酒後寐中受風遍身肌膚麻痹搔之不知疼癢飲食如常時淮陰吳鞠通適寓伊家投以桂枝湯桂枝五錢白芍四錢甘草三錢生薑三片大棗兩枚水三杯煎二杯先服一杯得汗止後服不汗再服並囑弗夜膳臨睡腹覺飢服藥一杯須臾啜熱稀粥一碗覆被取汗柏堂如其法只一服便由頭面至足遍身漐漐得微汗汗到處一手搔之輒知疼癢次日病若失觀此醫案知欲用桂枝湯原方發汗者必須啜粥若不啜粥即能發汗恐亦無此功效或問桂枝湯證其原因既為大氣虛損宜其陽脈現微弱之象何以其脈轉陽浮而陰弱乎答曰人之一身皆氣之所撑懸也此氣在下焦為元氣在中焦為中氣在上焦為大氣區域雖分而實一氣貫注故一身之中無論何處氣虛脈之三部皆現弱象今其關前之脈因風而浮轉若不見其弱而其關後之脈仍然微弱故曰陽浮而陰弱也如謂陰弱為下焦陰虛則其脈宜兼數象而愚生平所遇此等證其脈多遲緩不及四至其為氣分虛損而非陰分虛損可知即所謂嗇嗇惡寒淅淅惡風翕翕發熱亦皆氣分怯弱之形狀也從龍湯治外感痰喘服小青龍湯病未全愈或愈而復發者繼服此湯龍骨一兩不用煅搗牡蠣一兩不用煅搗生杭芍五錢清半夏四錢蘇子四錢炒搗牛蒡子三錢炒搗熱者酌加生石膏數錢或至一兩從來愚治外感痰喘遵傷寒論小青龍湯加減法去麻黃加杏仁熱者更加生石膏莫不隨手而愈然間有愈而復發再服原方不效者自擬得此湯後凡遇此等證服小青龍湯一兩劑即愈者繼服從龍湯一劑必不再發未全愈者服從龍湯一劑或兩劑必然全愈名曰從龍湯者為其最宜用於小青龍湯後也或疑方中重用龍骨牡蠣收澀太過以治外感之證雖當發表之餘仍恐餘邪未盡被此收澀之藥固閉於中縱一時強制不喘恐病根益深異日更有意外之變答曰若是以品龍骨牡蠣淺之乎視龍骨牡蠣者也斯可徵之以前哲之説徐靈胎曰龍骨最黏澀能收斂正氣凡心神耗散腸胃滑脫之疾皆能已之此藥但斂正氣而不斂邪氣所以仲景於傷寒邪氣未盡者亦恆與牡蠣同用若仲景之柴胡加龍骨牡蠣湯桂枝甘草龍骨牡蠣湯諸方是也愚於傷寒溫病熱實脈虛心中怔忡精神騷擾者恆龍骨與萸肉生石膏並用即可隨手奏效門人高曾治一外感痰喘其喘劇脈虛醫皆諉為不治高投以小青龍湯去麻黃加杏仁又加生石膏一兩野臺參五錢一劑而喘定恐其反復又繼投以從龍湯亦加人參與生石膏其病霍然頓愈又子治曲姓叟年六十餘外感痰喘十餘日不能臥醫者投以小清龍湯兩劑病益加劇脈有熱而不敢多加生石膏者其病必加劇視之其脈搏一息六至上焦煩躁舌上白苔滿布每日大便兩三次然非滑瀉審證論脈似難挽回而仍投以小青龍湯去麻黃加杏仁又加野臺參三錢生龍骨生牡蠣各五錢生石膏一兩半一劑病愈強半又服一劑全愈按前案但加補氣之藥於小青龍湯中後案並加斂氣之藥於小青龍湯中似近於少年鹵莽而皆能挽回至險之證亦可為用小青龍湯者多一變通之法矣邑鄭年五十許感冒風寒痰喘甚劇服表散清火理痰之藥皆不效留連二十餘日漸近垂危其甥劉從愚讀書與言醫學頗能記憶聞其舅病革往省之既至則衣冠竟屬纊矣劉用葶藶四錢生者布包大棗五枚擘開湯加五味子二錢煎湯灌之豁然頓醒繼服從龍湯一劑全愈蓋此證乃頑痰鬱塞肺之竅絡非葶藶大棗湯不能瀉之且喘久則元氣必虛加五味子二錢以收斂元氣並可借葶藶下行之力以納氣歸腎也可知拙擬從龍湯固宜於小青龍湯後而服過發表之藥者臨時制宜皆可酌而用之不必盡在小青龍湯後也餾水石膏飲治胸中先有蘊熱又受外感胸中煩悶異常喘息迫促其脈浮洪有力按之未實舌苔白而未黃者生石膏二兩軋細甘草三錢麻黃二錢上藥三味用蒸汽水煎兩三沸取清湯一大碗分六次溫服下前三次一點鐘服一次後三次一點半鐘服一次病愈則停服不必盡劑下焦覺涼者亦宜停服僻處若無汽水可用甘瀾水代之作甘瀾水法用大盆盛水以杓揚之揚久水面起有若干水泡旁有人執杓逐取之即甘瀾水若以治溫病中似此證者不宜用麻黃宜用西藥阿斯匹林一瓦融化於湯中以代之若僻處藥房無阿斯匹林又可代以薄荷葉二錢奉天錢姓婦於仲冬得傷寒證四五日間喘不能臥胸中煩悶異常頻頻呼喚欲自開其胸診其脈浮洪而長重按未實舌苔白厚知其證雖入陽明而太陽猶未罷也胸中屬太陽此時欲以小青龍湯治喘則失於熱欲以白虎湯治其煩熱又遺卻太陽之病而喘不能愈躊躇再三為擬此方取汽水輕浮之力能引石膏上升以解胸中之煩熱甘草甘緩之性能逗留石膏不使下趨以專其上行之力又少佐以麻黃解散太陽之餘邪兼藉以瀉肺定喘而胸中滿悶可除也湯成後俾徐徐分六次服之因病在上焦若頓服恐藥力下趨則藥過病所而病轉不愈也服至三次胸間微汗病頓見愈服至盡劑病愈十之八九再診其脈關前猶似浮洪喘息已平而從前兼有咳嗽未愈繼用玄參一兩杏仁去皮二錢蔞仁牛蒡子各三錢兩劑全愈通變大柴胡湯治傷寒溫病表證未罷大便已實者柴胡三錢薄荷三錢知母四錢大黃四錢此方若治傷寒以防風易薄荷傷寒論大柴胡湯治少陽經與陽明府同病之方也故方中用柴胡以解在經之邪大黃以下陽明在府之熱方中以此二藥為主其餘諸藥可加可減不過參贊以成功也然其方宜於傷寒而以治溫病與表證不在少陽者又必稍為通變而後所投皆宜也或問其表果系少陽證固宜用柴胡矣若非少陽證既加薄荷防風以散表邪何須再用柴胡乎答曰凡表證未罷遽用降藥下之恆出兩種病證一為表邪乘虛入里傷寒論所載下後胸滿心下痞硬下後結胸者是也一為表邪乘虛入里且下陷傷寒論所謂下之利不止者是也此方中用防風薄荷以散之所以防邪之內陷用柴胡以升之所以防邪之下陷也一人年二十餘傷寒六七日頭疼惡寒心中發熱咳吐黏涎至暮尤寒熱交作兼眩暈心中之熱亦甚其脈浮弦重按有力大便五日未行投以此湯加生石膏六錢芒硝四錢下大便二次上半身微見汗諸病皆見輕惟心中猶覺發熱脈象不若從前之浮弦而重按仍有力擬投以白虎加人參湯恐當下後易作滑瀉遂以生山藥代粳米連服兩劑全愈加味越婢加半夏湯治素患勞嗽因外感襲肺而勞嗽益甚或兼喘逆痰涎壅滯者麻黃二錢石膏三錢煅搗生山藥五錢寸麥冬四錢帶心清半夏三錢牛蒡子三錢炒搗玄參三錢甘草一錢五分大棗三枚擘開生薑三片傷寒論有桂枝二越婢一湯治太陽病發熱惡寒熱多寒少金匱有越婢湯治受風水腫有越婢加半夏湯治外感襲肺致肺中痰火壅滯脹而作喘今因其人素患勞嗽外感之邪與肺中蘊蓄之痰互相膠漆壅滯肺竅而勞嗽益甚故用越婢加半夏湯以祛外襲之邪而復加山藥玄參麥冬牛蒡子以治其勞嗽此內傷外感兼治之方也一叟年近七旬素有勞嗽初冬宿病發動又兼受外感痰涎壅滯胸間幾不能息劇時昏不知人身軀後挺診其脈浮數無力為制此湯一劑氣息通順將麻黃石膏減半又服數劑而愈或問子嘗謂石膏宜生用不宜煅用以石膏寒涼之中原兼辛散煅之則辛散之力變為收斂服之轉可增病乃他方中石膏皆用生者而此獨用煅者何也答曰此方所主之病外感甚輕原無大熱方中用麻黃以祛肺邪嫌其性熱故少加石膏佐之且更取煅者收斂之力能將肺中痰涎凝結成塊易於吐出此理從用煅石膏點豆腐者悟出試之果甚效驗後遇此等證無論痰涎如何壅盛如何杜塞投以此湯須臾藥力行後莫不將痰涎結成小塊連連吐出此皆煅石膏與麻黃並用之效也若以治寒溫大熱則斷不可煅若更多用則更不可煅也煅石膏用於此方且止三錢自無妨礙然愚後來志願欲全國藥房皆不備煅石膏後有用此方者若改用生石膏四錢更佳二十四治溫病方清解湯治溫病初得頭疼周身骨節痠疼肌膚壯熱背微惡寒無汗脈浮滑者薄荷葉四錢蟬蛻三錢去足土生石膏六錢搗細甘草一錢五分傷寒論曰太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡息必鼾言語難出此仲景論溫病之提綱也乃提綱詳矣而後未明言治溫病之方及反復詳細觀之乃知傷寒論中原有治溫病方且亦明言治溫病方特涉獵觀之不知耳六十一節云發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之夫此證既汗後不解必是用辛熱之藥發不惡寒證之汗即溫病提綱中所謂若發汗已也提綱中所謂若發汗是用辛熱之藥強發溫病之汗其汗出而喘無大熱者即溫病提綱中所謂若發汗已身灼熱及後所謂自汗出多眠睡息必鼾也睡而息鼾醒則喘矣此證既用辛熱之藥誤發於前仲景恐醫者見其自汗再誤認為桂枝湯證故特戒之曰不可更行桂枝湯而宜治以麻杏甘石湯此節與溫病提綱遙遙相應合讀之則瞭如指掌然麻杏甘石湯誠為治溫病初得之的方矣而愚於發表藥中不用麻黃而用薄荷蟬蛻者曾於葛根黃芩黃連湯解後詳論之茲不再贅今者論溫病之書甚夥而鄭衛紅紫適足亂真愚本內經仲景間附以管見知溫病大綱當分為三端今逐端詳論臚列於下庶分途施治不至錯誤一為春溫其證因冬月薄受外感不至即病所受之邪伏於膜原之間阻塞脈絡不能宣通暗生內熱逮至春日陽生內蘊之熱原有萌動之機而復薄受外感與之相觸則陡然而發表裡俱熱內經所謂冬傷於寒春必病溫者是也宜治以拙擬涼解湯熱甚者治以拙擬寒解湯有汗者宜仲景葛根黃連黃芩湯或拙擬和解湯加生石膏若至發於暑月又名為暑溫其熱尤甚初得即有脈洪長渴嗜涼水者宜投以大劑白虎湯或拙擬仙露湯一為風溫猶是外感之風寒也其時令已溫外感之氣已轉而為溫故不名曰傷寒傷風而名風溫即傷寒論中所謂風溫之為病者是也然其證有得之春初者有得之春暮者有得之夏秋者當隨時序之寒熱參以脈象而分別治之若當春初秋末時令在寒溫之間初得時雖不惡寒脈但浮而無熱象者宜用拙擬清解湯加麻黃一二錢或用仲景大青龍湯若當暑熱之日其脈象浮而且洪者用拙擬涼解湯或寒解湯若有汗者用拙擬和解湯或酌加生石膏一為濕溫其證多得之溽暑陰雨連旬濕氣隨呼吸之氣傳入上焦窒塞胸中大氣因致營衛之氣不相貫通其肌表有似外感拘束而非外感也其舌苔白而滑膩微帶灰色當用解肌利便之藥俾濕氣由汗與小便而出如拙擬宣解湯是也仲景之豬苓湯去阿膠加連翹亦可用至濕熱蓄久陽明府實有治以白虎湯加蒼朮者其方亦佳而愚則用白虎湯以滑石易知母又或不用粳米而以生薏米代之至於冬不藏精春必病溫內經雖有明文其證即寓於風溫春溫之中蓋內虛之人易受外感而陰虛蘊熱之人尤易受溫病故無論風溫春溫之兼陰虛者當其發表清解降下之時皆宜佐以滋陰之品若生山藥生地黃玄參阿膠生雞子黃之類均可酌用或宜兼用補氣之品若白虎湯之加人參竹葉石膏湯之用人參誠以人參與涼潤之藥並用不但補氣實大能滋陰也上所論溫病乃別其大綱及其初得治法至其證之詳悉與治法之隨證變通皆備於後之方案中至於疫病乃天地之癘氣流行傳染與溫病迥異方中薄荷葉宜用其嫩緑者至其梗宜用於理氣藥中若以之發汗則力減半矣若其色不緑而蒼則其力尤減若果嫩緑之葉方中用三錢即可薄荷氣味近於冰片最善透竅其力內至臟腑筋骨外至腠理皮毛皆能透達故能治溫病中之筋骨作疼者若謂其氣質清輕但能發皮膚之汗則淺之乎視薄荷矣蟬蛻去足者去其前之兩大足也此足甚剛硬有開破之力若用之退目翳消瘡瘍帶此足更佳若用之發汗則宜去之蓋不欲其於發表中寓開破之力也蟬蛻性微涼味淡原非辛散之品而能發汗者因其以皮達皮也此乃發汗中之妙藥有身弱不任發表者用之最佳且溫病恆有兼癮疹者蟬蛻尤善托癮疹外出也石膏性微寒神農本草經原有明文雖系石藥實為平和之品且其質甚重六錢不過一大撮耳其涼力不過與知母三錢等而其清火之力則倍之因其涼而能散也嘗觀後世治溫之方至陽明府實之時始敢用石膏五六錢豈能知石膏者哉然必須生用方妥煅者用至一兩即足僨事又此方所主之證或兼背微惡寒乃熱鬱於中不能外達之徵非真惡寒也白虎湯證中亦恆有如此者用石膏透達其熱則不惡寒矣或問外感中於太陽則惡寒中於陽明則不惡寒而發熱時至春夏氣候溫熱故外感之來不與寒水相感召而與燥金相感召直從身前陽明經絡襲入而為溫病後世論溫病者多是此説而傷寒論溫病提綱冠之以太陽病者何也答曰溫病初得亦多在太陽特其轉陽明甚速耳曾治一人年二十餘當仲夏夜寢因夜涼蓋單衾凍醒發懶仍如此睡去須臾又凍醒晨起微覺惡寒至巳時已覺表裡大熱兼喘促脈洪長而浮投以清解湯方中生石膏改用兩半又加牛蒡子炒搗三錢服後得汗而愈由斯觀之其初非中於太陽乎然不專在太陽也人之所以覺涼者由於衣衾之薄其氣候究非寒涼故其中於人不專在太陽而兼在陽明且當其時人多蘊內熱是以轉陽明甚速也然此所論者風溫耳若至冬受春發或夏發之溫恆有與太陽無涉者故傷寒論溫病提綱中特別之曰風溫之為病明其異於冬傷於寒春必病溫之溫病也又杏仁與牛蒡子皆能降肺定喘而杏仁性溫牛蒡子性涼傷寒喘證皆用杏仁而溫病不宜用溫藥故以牛蒡子代之附録直隸鹽山孫來函一九二五年春一人來津學木工因身體單薄又兼天熱得溫病請為診視脈浮數而滑舌苔白厚時時昏睡為開清解湯生石膏用一兩為其脈數又加玄參五錢一劑病愈斯年仲春俞之三位女兒皆出瘟疹生為診視皆投以清解湯加連翹生地滑石而愈同時之患此證者勢多危險惟生投以此方皆能隨手奏效涼解湯治溫病表裡俱覺發熱脈洪而兼浮者薄荷葉三錢蟬蛻二錢去足土生石膏一兩搗細甘草一錢五分春溫之證多有一發而表裡俱熱者至暑溫尤甚已詳論之於前矣而風溫證兩三日間亦多見有此脈證者此湯皆能治之得汗即愈西人治外感習用阿斯匹林法用阿斯匹林一瓦和乳糖可代以白蔗糖服之得汗即愈愚屢次試之其發汗之力甚猛外感可汗解者用之發汗可愈若此涼解湯與前清解湯皆可以此藥代之以其涼而能散也若後之寒解湯即不可以此藥代之蓋其發汗之力有餘而清熱之力仍有不足也寒解湯治周身壯熱心中熱而且渴舌上苔白欲黃其脈洪滑或頭猶覺疼周身猶有拘束之意者生石膏一兩搗細知母八錢連翹一錢五分蟬蛻一錢五分去足土或問此湯為發表之劑而重用石膏知母微用連翹蟬蛻何以能得汗答曰用此方者特恐其診脈不真審證不確耳果如方下所注脈證服之覆杯可汗勿庸慮此方之不效也蓋脈洪滑而渴陽明府熱已實原是白虎湯證特因頭或微疼外表猶似拘束是猶有一分太陽流連未去故方中重用石膏知母以清胃府之熱而復少用連翹蟬蛻之善達表者引胃中化而欲散之熱仍還太陽作汗而解斯乃調劑陰陽聽其自汗非強發其汗也況石膏性涼神農本草經謂其微寒即涼也味微辛有實熱者單服之即能汗乎曾治一少年孟夏長途勞役得溫病醫治半月不效後愚診視其兩目清白竟無所見兩手循衣摸床亂動不休讝語不省人事其大便從前滑瀉此時雖不滑瀉每日仍溏便一兩次脈浮數右寸之浮尤甚兩尺按之即無因此證目清白無見者腎陰將竭也手循衣摸床者肝風已動也病勢之危已至極點幸喜脈浮為病還太陽右寸浮尤甚為將汗之勢其所以將汗而不汗者人身之有汗如天地之有雨天地陰陽和而後雨人身亦陰陽和而後汗此證尺脈甚弱陽升而陰不能應汗何由作當用大潤之劑峻補真陰濟陰以應其陽必能自汗遂用熟地玄參阿膠枸杞之類約重六七兩煎湯一大碗徐徐溫飲下一日連進二劑即日大汗而愈審是則發汗原無定法當視其陰陽所虛之處而調補之或因其病機而利導之皆能出汗非必發汗之藥始能汗也按寒溫之證原忌用黏膩滋陰甘寒清火以其能留邪也而用以為發汗之助則轉能逐邪外出是藥在人用耳一人年四十餘為風寒所束不得汗胸中煩熱又兼喘促醫者治以蘇子降氣湯兼散風清火之品數劑病益進診其脈洪滑而浮投以寒解湯須臾上半身即出汗又須臾覺藥力下行至下焦及腿亦皆出汗病若失一人年三十許得溫證延醫治不效遷延十餘日愚診視之脈雖洪而有力仍兼浮象問其頭疼乎曰然渴欲飲涼水乎曰有時亦飲涼水然不至燥渴耳知其為日雖多而陽明之熱猶未甚實太陽之表猶未盡罷也投以寒解湯須臾汗出而愈一人年三十餘於冬令感冒風寒周身惡寒無汗胸間煩躁原是大青龍湯證醫者投以麻黃湯服後汗無分毫而煩躁益甚幾至瘋狂診其脈洪滑異常兩寸皆浮而右寸尤甚投以寒解湯覆杯之頃汗出如洗而愈審是則寒解湯不但宜於溫病傷寒現此脈者投之亦必效也一叟年七旬素有勞疾薄受外感即發喘逆投以小青龍湯去麻黃加杏仁生石膏輒愈上元節後因外感甚重舊病復發五六日間熱入陽明之府脈象弦長浮數按之有力而無洪滑之象此外感兼內傷之脈投以寒解湯加潞參三錢一劑汗出而喘愈再診其脈餘熱猶熾繼投以白虎加人參以山藥代粳米湯一大劑分三次溫飲下盡劑而愈一妊婦傷寒兩三日脈洪滑異常精神昏憒間作讝語舌苔白而甚厚為開寒解湯方有一醫者在座問方中之意何居愚曰欲汗解耳曰此方能汗解乎愚曰此方遇此證服之自能出汗若泛作汗解之藥服之不能汗也飲下須臾汗出而愈一婦人年二十餘得溫病咽喉作疼舌強直幾不能言心中熱而且渴頻頻飲水脈竟沉細異常肌膚亦不發熱遂舍脈從證投以寒解湯得微汗病稍見愈明晨又復如故舌之強直更甚知藥原對證而力微不能勝病也遂仍投以寒解湯將石膏加倍煎湯兩盅分二次溫飲下又得微汗病遂愈按傷寒脈若沉細多系陰證溫病脈若沉細則多系陽證蓋溫病多受於冬至春而發其病機自內向外有時病機鬱而不能外達其脈或即現沉細之象誤認為涼必至誤事又此證寒解湯既對證見愈矣而明晨舌之強直更甚乃將方中生石膏倍作二兩分兩次前後服下其病即愈由是觀之凡治寒溫之熱者皆宜煎一大劑分數次服下效古人一劑三服之法也門人高曾治一媼年近七旬於春初得傷寒證三四日間煩熱異常又兼白痢晝夜滯下無度其脈洪滑兼浮高投以寒解湯加生杭芍三錢一劑微汗而熱解痢亦遂愈又吳又可曰里證下後脈浮而微數身微熱神思或不爽此邪熱浮於肌表里無壅滯也雖無汗宜白虎湯邪可從汗而解若下後脈空虛而數按之豁然如無者宜白虎加人參湯覆杯則汗解按白虎湯與白虎加人參湯皆非解表之藥而用之得當雖在下後猶可須臾得汗況在未下之前乎不但此也即承氣湯亦可為汗解之藥亦視乎用之何如耳又洪吉人曰余嘗治熱病八九日用柴葛解之芩連清之硝黃下之俱不得汗昏憒擾亂撮空摸床危在頃刻以大劑地黃湯必系減去桂附者重加人參麥冬進之不一時通身大汗淋漓惡證悉退神思頓清按此條與愚用補陰之藥發汗相似所異者又加人參以助其氣分也上所論者皆發汗之理果能匯通參觀發汗之理無餘蘊矣附録直隸鹽山李來函天津得溫病先服他醫清解之藥數劑無效弟診其脈象沉浮皆有力表裡壯熱無汗投以寒解湯原方遍身得汗而愈山斯知方中重用生石膏知母以清熱少加連翹蟬蛻以引熱透表外出制方之妙遠勝於銀翹散桑菊飲諸方矣且由此知石膏生用誠為妙藥從治愈此證之後凡遇寒溫實熱諸證莫不遵書中方論重用生石膏治之其熱實脈虛者亦莫不遵書中方論用白虎加人參湯或用白虎加人參以生山藥代粳米湯皆能隨手奏效直隸鹽山孫來函斯年初冬適郭姓之女得傷寒證三四日間陽明熱勢甚劇面赤氣粗六脈洪數時作譫語為開寒解湯因胸中覺悶加栝蔞仁一兩一劑病愈石膏阿斯匹林湯治同前證生石膏二兩軋細阿斯匹林一瓦上藥二味先用白蔗糖沖水送服阿斯匹林再將石膏煎湯一大碗待周身正出汗時乘熱將石膏湯飲下三分之二以助阿斯匹林發表之力逮至汗出之後過兩三點鐘猶覺有餘熱者可仍將所餘石膏湯溫飲下若藥服完熱猶未盡者可但用生石膏煎湯或少加粳米煎湯徐徐溫飲之以熱全退淨為度不用再服阿斯匹林也又此湯不但可以代寒解湯並可以代涼解湯若以代涼解湯時石膏宜減半附録江蘇平臺王來函小兒秋夏之交陡起大熱失常神呆閉目不食家慈見而駭甚吾因胸有成竹定見遂曰此無憂即用書中石膏阿斯匹林湯照原方服法服後即神清熱退第二日午際又熱遂放膽再用原方因其痰多而咳為加清半夏牛蒡子服之全愈和解湯治溫病表裡俱熱時有汗出舌苔白脈浮滑者連翹五錢蟬蛻二錢去足土生石膏六錢搗細生杭芍五錢甘草一錢若脈浮滑而兼有洪象者生石膏當用一兩宣解湯治感冒久在太陽致熱蓄膀胱小便赤澀或因小便祕而大便滑瀉兼治濕溫初得憎寒壯熱舌苔灰色滑膩者滑石一兩甘草二錢連翹三錢蟬蛻三錢去足土生杭芍四錢若滑瀉者甘草須加倍一叟年六十五得風溫證六七日間周身悉腫腎囊腫大似西瓜屢次服藥無效旬日之外求為診視脈洪滑微浮心中熱渴小便澀熱痰涎上泛微兼喘息舌苔白厚投以此湯加生石膏一兩周身微汗小便通利腫消其半猶覺熱渴遂將方中生石膏加倍服後又得微汗腫遂盡消諸病皆愈按此乃風溫之熱由太陽經入於膀胱之府阻塞水道而陽明胃府亦將實也由是觀之彼謂溫病入手經不入足經者何其謬哉滋陰宣解湯治溫病太陽未解漸入陽明其人胃陰素虧陽明府證未實已燥渴多飲飲水過多不能運化遂成滑瀉而燥渴益甚或喘或自汗或小便祕溫疹中多有類此證者尤屬危險之候用此湯亦宜其方即宣解湯加生山藥一兩甘草改用三錢此乃胃府與膀胱同熱又兼虛熱之證也滑石性近石膏能清胃府之熱淡滲利竅能清膀胱之熱同甘草生天一之水又能清陰虛之熱一藥而三善備故以之為君而重用山藥之大滋真陰大固元氣者以為之佐使且山藥生用則汁漿稠黏同甘草之甘緩者能逗留滑石於胃中使之由胃輸脾由脾達肺水精四布循三焦而下通膀胱則煩熱除小便利而滑瀉止矣又兼用連翹蟬蛻之善達表者以解未罷之太陽使膀胱蓄熱不為外感所束則熱更易於消散且蟬之性飲而不食有小便無大便故其蛻又能利小便而止大便也愚自臨證以來遇此等證不知凡幾醫者率多束手而投以此湯無不愈者若用於溫疹兼此證者尤為妥善以連翹蟬蛻實又表散溫疹之妙藥也一媼年近七旬素患漫腫為調治月餘腫雖就愈而身體未復忽於季春得溫病上焦煩熱病家自剖鮮地骨皮煮汁飲之稍愈又飲數次遂滑瀉不止而煩熱益甚其脈浮滑而數重診無力病家因病者年高又素有疾病加以上焦煩熱下焦滑瀉惴惴惟恐不愈而愚毅然以為可治投以滋陰宣解湯一劑瀉止煩熱亦覺輕繼用拙擬白虎加人參以山藥代粳米湯煎汁一大碗一次只溫飲一大口防其再滑瀉也盡劑而愈一室女感冒風熱遍身癮疹煩渴滑瀉又兼喘促其脈浮數無力愚躊躇再四亦投以滋陰宣解湯兩劑諸病皆愈按服滋陰宣解湯皆不能出大汗且不宜出大汗為其陰分虛也間有不出汗者病亦可愈滋陰清燥湯治同前證外表已解其人或不滑瀉或兼喘息或兼咳嗽頻吐痰涎確有外感實熱而脈象甚虛數者若前證服滋陰宣解湯後猶有餘熱者亦可繼服此湯其方即滋陰宣解湯去連翹蟬蛻一婦人受妊五月偶得傷寒三四日間胎忽滑下上焦燥渴喘而且呻痰涎壅盛頻頻咳吐延醫服藥病未去而轉添滑瀉晝夜十餘次醫者辭不治且謂危在旦夕其家人惶恐迎愚診視其脈似洪滑重診指下豁然兩尺尤甚本擬治以滋陰清燥湯為小産才四五日不敢遽用寒涼遂先用生山藥二兩酸石榴一個連皮搗爛同煎汁一大碗分三次溫飲下滑瀉見愈他病如故再診其脈洪滑之力較實因思此證雖虛確有外感實熱若不先解其實熱他病何以得愈時屆晚三點鐘病人自言每日此時潮熱又言精神困倦已極晝夜苦不得睡遂於斯日復投以滋陰清燥湯方中生山藥重用兩半煎汁一大碗徐徐溫飲下一次只飲藥一口誠以産後脈象又虛不欲寒涼侵下焦也斯夜遂得安睡渴與滑瀉皆愈喘與咳亦愈其半又將山藥滑石各減五錢加龍骨牡蠣各八錢一劑而愈一室女傷寒過兩旬矣而瘦弱支離精神昏憒過午發熱咳而且喘醫者辭不治診其脈數至七至微弱欲無因思此證若系久病至此不可為矣然究系暴虛之證生機之根柢當無損勉強投以滋陰清燥湯將滑石減半又加玄參熟地黃各一兩野臺參五錢煎湯一大碗徐徐溫飲下飲完煎滓重飲俾藥力晝夜相繼兩日之間連服三劑滑石漸減至二錢其病竟愈按此證始終不去滑石者恐當傷寒之餘仍有餘邪未淨又恐補藥留邪故用滑石引之下行使有出路也又凡煎藥若大劑必需多煎湯數杯徐徐服之救險證宜如此而救險證之陰分虧損者尤宜如此也汲之母年近七旬身體羸弱穀食不能消化惟飲牛乳或間飲米湯少許已二年臥床不能起坐矣於戊午季秋受溫病時愚初至奉天自錦州邀愚診視脈甚細數按之微覺有力發熱咳嗽吐痰稠黏精神昏憒氣息奄奄投以滋陰清燥湯減滑石之半加玄參五錢一劑病愈強半又煎渣取清湯一茶盅調入生雞子黃一枚服之全愈奉天一孺子年四歲得溫病邪猶在表醫者不知為之清解遽投以苦寒之劑服後滑瀉四五日不止上焦燥熱閉目而喘精神昏憒延為診治病雖危險其脈尚有根柢知可挽回俾用滋陰清燥湯原方煎汁一大茶杯為其幼小俾徐徐溫飲下盡劑而愈然下久亡陰余有虛熱繼用生山藥玄參各一兩以清之兩劑熱盡除大抵醫者遇此等證清其燥熱則滑瀉愈甚補其滑瀉其燥熱亦必愈甚惟此方用山藥以止滑瀉而山藥實能滋陰退熱滑石以清燥熱而滑石實能利水止瀉二藥之功用相得益彰又佐以芍藥之滋陰血利小便甘草之燮陰陽和中宮亦為清熱止瀉之要品彙集成方所以效驗異常愚用此方救人多矣即勢至垂危投之亦能奏效奉天劉年二十五六於季冬得傷寒經醫者誤治大便滑瀉無度而上焦煩熱精神昏憒時作譫語脈象洪數重按無力遂重用生山藥兩半滑石一兩生杭芍六錢甘草三錢一劑瀉止上焦煩熱不退仍作譫語爰用玄參沙參諸涼潤之藥清之仍復滑瀉再投以前方一劑瀉又止而上焦之煩熱益甚精神亦益昏憒毫無知覺此時其家人畢至皆以為不可復治診其脈雖不實仍有根柢至數雖數不過六至知猶可治遂慨切謂其家人曰果信服余藥此病尚可為也其家人似領悟為疏方用大劑白虎加人參湯更以生山藥一兩代粳米大生地一兩代知母煎湯一大碗囑其藥須熱飲一次止飲一口限以六句鍾內服完盡劑而愈津市錢姓小兒四歲灼熱滑瀉重用滋陰清燥湯治愈附録奉天鐵嶺楊來函治李姓婦人膨脹證先經他醫用蒼朮檳榔厚朴枳實香附紫蔻之類辛燥開破初服覺輕七八劑後病轉增劇煩渴泄瀉又更他醫投以紫朴琥珀丸煩渴益甚一日夜泄瀉十五六次再診時醫者辭不治又延醫數人皆諉為不治後乃一息奄奄舁至床上兩次待時而已其姻家有知生者強生往視其脈如水上浮麻不分至數按之即無惟兩尺猶似有根言語不真倣佛可辨自言心中大渴少飲水即疼不可忍蓋不食者已三日矣先投以滋陰清燥湯為脈象虛甚且氣息有將脫之意又加野臺參淨萸肉一劑諸病皆愈可以進食遂俾用一味薯蕷粥送服生雞內金細末及西藥百布聖取其既可作藥又可作飯也又即前方加減日服一劑旬日全愈滋陰固下湯治前證服藥後外感之火已消而渴與瀉仍未全愈或因服開破之藥傷其氣分致滑瀉不止其人或兼喘逆或兼咳嗽或自汗或心中怔忡者皆宜急服此湯生山藥兩半懷熟地兩半野臺參八錢滑石五錢生杭芍五錢甘草二錢酸石榴一個連皮搗爛上藥七味用水五盅先煎酸石榴十餘沸去滓再入諸藥煎湯兩盅分二次溫飲下若無酸石榴可用牡蠣煅研一兩代之汗多者加山萸肉去淨核六錢寒溫諸證最忌誤用破氣之藥若心下或胸脅疼痛加乳香沒藥楝子丹參諸藥腹疼者加芍藥皆可止疼若因表不解束其鬱熱作疼者解表清熱其疼自止若誤服檳榔青皮鬱金枳殼諸破氣之品損其胸中大氣則風寒乘虛內陷變成結胸者多矣即使傳經已深而腸胃未至大實可降下者則開破與寒涼並用亦易使大便滑瀉致變證百出愚屢見此等醫者誤人心甚惻怛故與服破氣藥而結胸者制蕩胸湯以救其誤服破氣藥而滑瀉者制此湯以救其誤究之誤之輕者可救誤之重者實難挽回於垂危之際也猶龍湯治胸中素蘊實熱又受外感內熱為外感所束不能發泄時覺煩躁或喘或胸脅疼其脈洪滑而長者連翹一兩生石膏六錢搗細蟬蛻二錢去足土牛蒡子二錢炒搗喘者倍牛蒡子胸中疼者加丹參沒藥各三錢脅下疼者加柴胡川楝子各三錢此方所主之證即傷寒論大青龍湯所主之證也然大青龍湯宜於傷寒此則宜於溫病至傷寒之病其胸中煩躁過甚者亦可用之以代大青龍故曰猶龍也一婦年三十餘胸疼連脅心中發熱服開胸理氣清火之藥不效後愚診視其脈浮洪而長知其上焦先有鬱熱又為風寒所束則風寒與鬱熱相搏而作疼也治以此湯加沒藥川楝子各四錢一劑得汗而愈一叟年過七旬素有勞病因冬令傷寒勞病復發喘而且咳兩三日間痰涎壅盛上焦煩熱診其脈洪長浮數投以此湯加玄參潞參各四錢一劑汗出而愈門人劉曾治一人年四十外感痰喘甚劇四五日間脈象洪滑舌苔白而微黃劉投以此湯方中石膏用一兩連翹用三錢一劑周身得汗外感之熱已退而喘未全愈再診其脈平和如常微嫌無力遂用拙擬從龍湯去蘇子加潞參三錢一劑全愈愚聞之喜曰外感痰喘小青龍湯所主之證也拙擬猶龍湯原以代大青龍湯今並可代小青龍湯此愚之不及料也將方中藥味輕重略為加減即能另建奇功以斯知方之運用在人慧心者自能變通也按連翹原非發汗之藥即諸家本草亦未有謂其能發汗者惟其人蘊有內熱用至一兩必然出汗且其發汗之力緩而長為其力之緩也不至為汪洋之大汗為其力之長也晚睡時服之可使通夜微覺解肌且能舒肝氣之郁瀉肺氣之實若但目為瘡家要藥猶未識連翹者也用連翹發汗必色青者方有力蓋此物嫩則青老則黃凡物之嫩者多具生髮之氣故凡發汗所用之連翹必須青連翹二十五治傷寒溫病同用方仙露湯治寒溫陽明證表裡俱熱心中熱嗜涼水而不至燥渴脈象洪滑而不至甚實舌苔白厚或白而微黃或有時背微惡寒者生石膏三兩搗細玄參一兩連翹三錢粳米五錢上四味用水五盅煎至米熟其湯即成約可得清汁三盅先溫服一盅若服完一劑病猶在者可仍煎一劑服之如前使藥力晝夜相繼以病愈為度然每次臨服藥必詳細問詢病人若腹中微覺涼或欲大便者即停藥勿服候兩三點鐘若仍發熱未大便者可少少與服之若已大便即非溏瀉而熱猶在者亦可少少與服傷寒論白虎湯為陽明府病之藥而兼治陽明經病此湯為陽明經病之藥而兼治陽明府病為其所主者責重於經故於白虎湯方中以玄參之甘寒神農本草經言苦寒細嚼之實甘而微苦古今藥或有不同易知母之苦寒又去甘草少加連翹欲其輕清之性善走經絡以解陽明在經之熱也方中粳米不可誤用糯米俗名漿米粳米清和甘緩能逗留金石之藥於胃中使之由胃輸脾由脾達肺藥力四布經絡貫通糯米質黏性熱大能固閉藥力留中不散若錯用之即能誤事一叟年七十有一因感冒風寒頭疼異常徹夜不寢其脈洪大有力表裡俱發熱喜食涼物大便三日未行舌有白苔甚厚知系傷寒之熱已入陽明之府因頭疼甚劇且舌苔猶白疑猶可汗解治以拙擬寒解湯加薄荷葉一錢頭疼如故亦未出汗脈益洪實恍悟曰此非外感表證之頭疼乃陽明經府之熱相併上逆而沖頭部也為制此湯分三次溫飲下頭疼愈強半夜間能安睡大便亦通復診之脈象餘火猶熾遂用仲景竹葉石膏湯生石膏仍用三兩煎汁一大碗分三次溫飲下盡劑而愈按竹葉石膏湯原寒溫大熱退後滌餘熱復真陰之方故其方不列於六經而附載於六經之後其所以能退餘熱者不恃能用石膏而恃石膏與參並用蓋寒溫餘熱在大熱鑠涸之餘其中必兼有虛熱石膏得人參能使寒溫後之真陰頓復而餘熱自消此仲景制方之妙也又麥冬甘寒黏滯雖能為滋陰之佐使實能留邪不散致成勞嗽而惟與石膏半夏並用則無忌誠以石膏能散邪半夏能化滯也或疑炙甘草湯亦名復脈湯中亦有麥冬卻無石膏半夏然有桂枝生薑之辛溫宣通者以駕馭之故亦不至留邪彼惟知以甘寒退寒溫之餘熱者安能援以為口實哉溫病中有當日得之即宜服仙露湯者一童子年十六暑日力田於烈日之中午飯後陡覺發熱無汗煩渴引飲診其脈洪而長知其暑而兼溫也投以此湯未盡劑而愈按此證初得而胃府之熱已實彼謂溫病入手經不入足經者何夢夢也上焦煩熱太甚者原非輕劑所能療而投以重劑又恐藥過病所而病轉不愈惟用重劑徐徐飲下乃為合法曾治一人年四十餘素吸鴉片於仲冬得傷寒兩三日間煩躁無汗原是大青龍湯證因誤服桂枝湯煩躁益甚迎愚診視其脈關前洪滑兩尺無力為開仙露湯因其尺弱囑其徐徐飲下一次只飲藥一口防其寒涼侵下焦也病家忽愚所囑竟頓飲之遂致滑瀉數次多帶冷沫上焦益覺煩躁鼻如煙燻面如火炙其關前脈大於前一倍又數至七至知其已成戴陽之證急用人參一兩煎好兌童便半茶蠱將藥碗置涼水盆中候冷頓飲之又急用玄參生地知母各一兩煎湯一大碗候用自服參後屢診其脈過半點鐘脈象漸漸收斂至數似又加數遂急將候用之藥燉熱徐徐飲下一次飲藥一口閲兩點鐘盡劑周身微汗而愈此因病家不聽所囑致有如此之失幸而救愈然亦險矣審是則凡藥宜作數次服者慎勿頓服也蓋愚自臨證以來無論內傷外感凡遇險證皆煎一大劑分多次服下此以小心行其放膽乃萬全之策非孤注之一擲也傷寒論陽明篇中白虎湯後繼以承氣湯以攻下腸中燥結而又詳載不可攻下諸證誠以承氣力猛倘或審證不確即足誤事愚治寒溫三十餘年得一避難就易之法凡遇陽明應下證亦先投以大劑白虎湯一兩劑大便往往得通病亦即愈即間有服白虎湯數劑大便猶不通者而實火既消津液自生腸中不致乾燥大便自易降下用玄明粉三錢加蜂蜜或柿霜兩許開水沖調服下大便即通若仍有餘火未盡而大便不通者單用生大黃末一錢若涼水調服生大黃末一錢可抵煮服者一兩蜜水調服通其大便亦可且通大便於服白虎湯後更無下後不解之虞蓋下證略具而脈近虛數者遽以承氣下之原多有下後不解者以其真陰虧元氣虛也惟先服白虎湯或先服白虎加人參湯去其實火即以復其真陰培其元氣而後微用降藥通之下後又何至不解乎此亦愚百用不至一失之法也間有用白虎湯潤下大便病仍不解用大黃降之而後解者以其腸中有匿藏之結糞也曾治一媼年七十餘季冬得傷寒證七八日間延愚診視其脈洪長有力表裡俱熱煩渴異常大便自病後未行投以白虎加人參湯二劑大便遂通一日降下三次病稍見愈而脈仍洪長細審病情當有結糞未下遂單用大黃三錢煮數沸服之下結糞四五枚病遂見愈仍非脈淨身涼又用拙擬白虎加人參以山藥代粳米湯服未盡劑而愈然此乃百中之一二也臨證者不可因此生平僅遇之證遂執為成法輕視白虎而重視承氣也重用石膏以退火之後大便間有不通者即可少用通利之藥通之此固愚常用之法而隨證制宜又不可拘執成見曾治一少年傷寒已過旬日陽明火實大便燥結投一大劑白虎湯一日連進二劑共用生石膏六兩至晚九點鐘火似見退而精神恍惚大便亦未通行再診其脈變為弦象夫弦主火衰亦主氣虛知此證清解已過而其大便仍不通者因其元氣虧損不能運行白虎湯涼潤之力也遂單用人參五錢煎湯俾服之須臾大便即通病亦遂愈蓋治此證的方原是白虎加人參湯因臨證時審脈不確但投以白虎湯遂致病有變更幸迷途未遠猶得急用人參繼所服白虎湯後以成功誠以日間所服白虎湯盡在腹中得人參以助之始能運化是人參與白虎湯前後分用之亦無異於一時同用之也益嘆南陽制方之神妙誠有令人不可思議者也吳又可謂如人方肉食而病適來以致停積在胃用承氣下之惟是臭水稀糞而已於承氣湯中單加人參一味雖三四十日停積之物於是方下蓋承氣借人參之力鼓舞胃氣宿物始動也又可此論亦即愚用人參於白虎湯後以通大便之理也附録湖北天門縣崔來函丁卯仲夏何某身染溫病他醫以香薷飲藿香正氣散治之不效迎僕診視遵用清解湯一劑而愈時因溫病盛行以書中清解湯涼解湯寒解湯仙露湯從龍湯餾水石膏飲有嘔者兼用代赭石本此數方變通而用救愈三千餘人共用生石膏一千餘斤並未僨事石膏粳米湯治溫病初得其脈浮而有力身體壯熱並治一切感冒初得身不惡寒而心中發熱者若其熱已入陽明之腑亦可用代白虎湯生石膏二兩軋細生粳米二兩半上二味用水三大碗煎至米爛熟約可得清汁兩大腕乘熱儘量飲之使周身皆汗出病無不愈者若陽明腑熱已實不必乘熱頓飲之徐徐溫飲下以消其熱可也或問外感初得即中有蘊熱陽明胃腑不至燥實何至速用生石膏二兩答曰此方妙在將石膏同粳米煎湯乘熱飲之俾石膏寒涼之性隨熱湯發散之力化為汗液盡達於外也西人謂胃本無化水之能亦無出水之路而壯實之人飲水滿胃須臾水氣旁達胃中即空蓋胃中原多微絲血管能引水氣以入回血管由回血管過肝入心以運行於周身由肺升出為氣由皮膚滲出為汗余透腎至膀胱為溺石膏煎湯毫無氣味毫無汁漿直與清水無異且又乘熱飲之則敷布愈速不待其寒性發作即被胃中微絲血管吸去化為汗為氣而其餘為溺則表裡之熱亦隨之俱化此寒因熱用不使傷胃之法也且與粳米同煮其沖和之氣能助胃氣之發達則發汗自易其稠潤之汁又能逗留石膏不使其由胃下趨致寒涼有礙下焦不但此也清水煎開後變涼甚速以其中無汁漿不能留熱也此方粳米多至二兩半湯成之後必然汁漿甚稠飲至胃中又善留蓄熱力以為作汗之助也是以人之欲發汗者飲熱茶不如啜熱粥也初擬此方時惟用以治溫病實驗既久知傷寒兩三日後身不惡寒而發熱者用之亦效丙辰正月上旬愚自廣平移居德州自邯鄲上火車自南而北復自北而南一晝夜繞行千餘里車窗多破風寒徹骨至德州同行病者五六人皆身熱無汗遂用生石膏粳米各十餘兩飯甑煮爛熟俾病者儘量飲其熱湯皆周身得汗而愈一時稱快瀋陽朱姓婦年五旬於戊午季秋得溫病甚劇時愚初至奉天求為診治見其以冰囊作枕復懸冰囊貼面之上側蓋從前求東人調治如此治法東人之所為也合目昏昏似睡大聲呼之毫無知覺其脈洪大無倫按之甚實愚謂其夫曰此病陽明腑熱已至極點外治以冰熱愈內陷然此病尚可為非重用生石膏不可其夫韙愚言遂用生石膏細末四兩粳米八錢煎取清汁四茶杯徐徐溫灌下約歷十點鐘將藥服盡豁然頓醒後又用知母花粉玄參白芍諸藥少加連翹以清其餘熱服兩劑全愈附録江蘇崇明縣蔡來函季秋敝處張氏之女得瘟病甚劇服藥無效醫言不治病家以為無望其母求人強僕往視見其神昏如睡高呼不覺脈甚洪實用先生所擬之石膏粳米湯生石膏用三兩粳米用五錢見者莫不驚訝誹笑且有一老醫揚言於人曰蔡某年僅二十看書不過年餘竟大膽若此石膏重用三兩縱煅透用之亦不可況生者乎此藥下咽人即死矣有人聞此言急來相告僕曰此方若用煅石膏無須三兩即一兩亦斷送人命而有餘若用生者即再多數兩亦無礙況僅三兩乎遂急催病家購藥親自監視煎取清湯一大碗徐徐溫灌下病人霍然頓醒其家人驚喜異常直以為死後重生矣繼而熱瘧流行經僕重用生石膏治愈者不勝計鎮逆白虎湯治傷寒溫病邪傳胃腑燥渴身熱白虎證俱其人胃氣上逆心下滿悶者生石膏三兩搗細知母兩半清半夏八錢竹茹粉六錢用水五盅煎汁三盅先溫服一盅病已愈者停後服若未全愈者過兩點鐘再溫服一盅傷寒論白虎湯治陽明腑熱之聖藥也蓋外邪熾盛勢若燎原胃中津液立就枯涸故用石膏之辛寒以祛外感之邪知母之涼潤以滋內耗之陰特是石膏質重雖煎作湯性亦下墜知母味苦苦降與重墜相併下行之力速胃腑之熱或難盡消且恐其直趨下焦而為泄瀉也故又借粳米之濃汁甘草之甘味緩其下趨之勢以待胃中微絲血管徐徐吸去由肺升出為氣由皮膚滲出為汗余入膀胱為溺而內蘊之熱邪隨之俱清此仲景制方之妙也然病有兼證即用藥難拘成方猶是白虎湯證也因其人胃氣上逆心下脹滿粳米甘草不可復用而以半夏竹茹代之取二藥之降逆以參贊石膏知母成功也一婦人年三十餘得溫證始則嘔吐五六日間心下滿悶熱而且渴脈洪滑有力舌苔黃厚聞其未病之先曾有鬱怒未伸因得斯證俗名夾惱傷寒然時當春杪一得即不惡寒乃溫病非傷寒也為疏此方有一醫者在座疑而問曰此證因胃氣上逆作脹滿始將白虎湯方另為更定何以方中不用開通氣分之藥若承氣湯之用厚朴枳實而惟用半夏竹茹乎答曰白虎湯用意與承氣迥異蓋承氣湯乃導邪下行之藥白虎湯乃托邪外出之藥故服白虎湯後多有得汗而解者間有服後未即得汗而大熱既消其飲食之時恆得微汗餘熱亦由此盡解若因氣逆脹滿恣用破氣之藥傷其氣分不能托邪外出將邪陷愈深脹滿轉不能消或更增劇試觀傷寒論多有因誤下傷其氣分成結胸成心下痞硬證不可不知也再試觀諸瀉心不輕用破氣之品卻有半夏瀉心湯又仲景治傷寒解後氣逆欲嘔有竹葉石膏湯半夏與石膏並用治婦人乳中虛煩亂嘔逆有竹皮大丸竹茹與石膏並用是半夏竹茹善降逆氣可知也今師二方之意用之以易白虎湯中之甘草粳米降逆氣而不傷正氣服後仍可托邪外出由汗而解而脹滿之證亦即消解無餘此方愚用之屢矣未有不隨手奏效者醫者聞言省悟聽愚用藥服後病人自覺脹滿之處如以手推排下行病亦遂愈白虎加人參以山藥代粳米湯治寒溫實熱已入陽明之府燥渴嗜飲涼水脈象細數者生石膏三兩搗細知母一兩人參六錢生山藥六錢粉甘草三錢上五味用水五盅煎取清汁三盅先溫服一盅病愈者停後服若未全愈者過兩點鐘再服一盅至其服法詳細處與仙露湯同傷寒法白虎湯用於汗吐下後當加人參究之脈虛者即宜加之不必在汗吐下後也愚自臨證以來遇陽明熱熾而其人素有內傷或元氣素弱其脈或虛數或細微者皆投以白虎加人參湯實驗既久知以生山藥代粳米則其方愈穩妥見效亦愈速蓋粳米不過調和胃氣而山藥兼能固攝下焦元氣使元氣素虛者不至因服石膏知母而作滑瀉且山藥多含有蛋白之汁最善滋陰白虎湯得此既祛實火又清虛熱內傷外感須臾同愈愚用此方救人多矣略列數案於下以資參考一叟年近六旬素羸弱勞嗽得傷寒證三日昏憒不知人診其脈甚虛數而肌膚烙手確有實熱知其脈虛證實邪火橫恣元氣又不能支持故傳經猶未深入而即昏憒若斯也躊躇再四乃放膽投以此湯將藥煎成乘熱徐徐灌之一次只灌下兩茶匙閲三點鐘灌藥兩盅豁然頓醒再盡其余而病愈矣一叟年六旬素亦羸弱多病得傷寒證綿延十餘日舌苔黃厚而干心中熱渴時覺煩躁其不煩躁之時即昏昏似睡呼之眼微開精神之衰憊可知脈象細數按之無力投以涼潤之劑因其脈虛又加野臺參佐之大便忽滑瀉日下數次因思此證略用清火之藥即滑瀉者必其下焦之氣化不固先用藥固其下焦再清其上焦中焦未晚也遂用熟地黃二兩酸石榴一個連皮搗爛同煎湯一大碗分三次溫飲下大便遂固間日投以此方將山藥改用一兩以生地黃代知母煎湯成徐徐溫飲下一次只飲藥一大口閲八點鐘始盡劑病愈強半翌日又按原方如法煎服病又愈強半第三日又按其方服之盡劑而愈按熟地黃原非治寒溫之藥而病至極危時不妨用之以救一時之急故仲景治脈結代有炙甘草湯亦用乾地黃即今生地結代亦險脈也如無酸石榴時可用龍骨煅搗牡蠣煅搗各五錢代之一叟年六旬余素吸鴉片羸弱多病於孟冬感冒風寒其脈微弱而浮愚用生黃耆數錢同表散之藥治之得汗而愈間日因有緊務事冒寒出門汗後重感比前較劇病臥旅邸不能旋里因延彼處醫者診治時身熱飲水病在陽明之府醫者因其脈微弱轉進溫補病益進更延他醫以為上有浮熱下有實寒用附子吳茱萸加黃連治之服後齒齦盡腫且甚疼痛時覺煩躁頻頻飲水不能解渴不得已復來迎愚至診其脈細而數按之略實遂投以此湯加玄參六錢以散其浮遊之熱一劑牙疼即愈煩躁與渴亦見輕翌日用原方去玄參將藥煎成調入生雞子黃三枚作三次溫飲下大便得通而愈一人年二十資稟素弱偶覺氣分不舒醫者用三稜延胡等藥破之自覺短氣遂停藥不敢服隔兩日忽發喘逆筋惕肉動精神恍惚脈數至六至浮分搖搖按之若無肌膚甚熱上半身時出熱汗自言心為熱迫甚覺怔忡其舌上微有白苔中心似黃統觀此病情狀雖陡發於一日其受外感已非一日蓋其氣分不舒時即受外感之時特其初不自覺耳為其怔忡太甚不暇取藥急用生雞子黃四枚溫開水調和再將其碗置開水盆中候溫服之喘遂止怔忡亦見愈繼投以此湯煎汁一大碗仍調入生雞子黃三枚徐徐溫飲下自晚十點鐘至早七點鐘盡劑而病若失因其從前服藥傷氣俾用玄參一兩潞參五錢連服數劑以善其後一童子年十七於孟夏得溫證八九日間呼吸迫促頻頻咳吐痰血相雜其咳吐之時疼連胸脅上焦微嫌發悶診其脈確有實熱而數至七至搖搖無根蓋其資稟素弱又兼讀書勞心其受外感又甚劇故脈象若是之危險也為其胸脅疼悶兼吐血遂減方中人參之半加竹茹三七搗細沖服各二錢用三七者不但治吐血實又兼治胸脅之疼也一劑血即不吐諸病亦見愈又服一劑全愈一農家孺子年十一因麥秋農家忙甚雖幼童亦作勞田間力薄不堪重勞遂得溫病手足擾動不能安臥譫語不休所言者皆勞力之事晝夜目不能瞑脈象雖實卻非洪滑擬投以此湯又慮小兒少陽之體外邪方熾不宜遽用人參遂用生石膏兩半蟬蛻一錢煎服後諸病如故復來詢方且言其苦於服藥昨所服者嘔吐將半愚曰單用生石膏二兩煎取清汁徐徐溫飲之即可不吐乃如言服之病仍不愈再為診視脈微熱退譫語益甚精神昏昏不省人事急用野臺參兩半生石膏二兩煎汁一大碗分數次溫飲下身熱脈起目遂得瞑手足稍安仍作譫語又於原渣加生石膏麥冬各一兩煎汁二盅分兩次溫飲下降大便一次其色甚黑病遂愈按此證若早用人參何至病勢幾至莫救幸即能省悟猶能竭力挽回然亦危而後安矣愚願世之用白虎湯者宜常存一加人參之想也又按此案與前案觀之凡用白虎湯而宜加人參者不必其脈現虛弱之象也凡諗知其人勞心過度或勞力過度或在老年或有宿疾或熱已入陽明之府脈象雖實而無洪滑之象或脈有實熱而至數甚數者用白虎湯時皆宜酌加人參寒溫證表裡皆虛汗出淋漓陽明胃腑仍有實熱者用此湯時宜加龍骨牡蠣一童子年十六於季冬得傷寒證因醫者用發表藥太過周身時時出汗仍表裡大熱心中怔忡精神恍惚脈象洪數按之無力遂用此湯加龍骨牡蠣皆不煅各一兩煎汁一大碗分數次溫飲下盡劑而愈仲景治傷寒脈結代者用炙甘草湯誠佳方也愚治寒溫若其外感之熱不盛遇此等脈即遵仲景之法若其脈雖結代而外感之火甚實者亦用白虎加人參以山藥代粳米湯曾治一叟年六旬余於孟冬得傷寒證五六日間延愚診視其脈洪滑按之亦似有力表裡俱覺發熱間作呻吟又兼喘逆然不甚劇投以白虎湯一劑大熱稍減再診其脈或七八動一止或十餘動一止兩手皆然而重按無力遂於原方中加人參八錢兼師炙甘草湯中用乾地黃之意以生地代知母煎汁兩盅分二次溫飲下脈即調勻且較前有力而熱仍如故從前方中生石膏二兩遂加倍為四兩煎汁一大碗俾徐徐溫飲下盡劑而愈按治此證時愚習用白虎湯而猶未習用白虎湯加參也自此以後凡年過六旬之人即脈甚洪實用白虎湯時亦必少加人參二三錢結代之脈雖並論究之結脈輕於代脈故結脈間有宜開通者曾治一叟年六十餘大便下血醫治三十餘日病益進日下血十餘次且多血塊精神昏憒延為診視脈洪實異常至數不數惟右部有止時其止無定數乃結脈也其舌苔純黑知系溫病大實之證從前醫者但知治其便血不知治其溫病可異也投以白虎加人參以山藥代粳米湯將石膏改用四兩煎湯三盅分三次溫飲下每次送服旱三七細末一錢如此日服一劑兩日血止大便仍滑瀉脈象之洪實減半而其結益甚且腹中覺脹詢其病因知得諸惱怒之後遂改用萊蔔子六錢而佐以白芍滑石花粉茅根甘草諸藥一劑脹消脈之至數調勻仍稍有洪實之象滑瀉亦減再投以滋陰清燥湯一劑瀉止脈亦平和寒溫之證最忌舌乾至舌苔薄而干或干而且縮者尤為險證而究其原因卻非一致有因真陰虧損者有因氣虛不上潮者有因氣虛更下陷者皆可治以白虎加人參以山藥代粳米湯蓋人參之性大能補氣元氣旺而上升自無下陷之虞而與石膏同用又大能治外感中之真陰虧損況又有山藥知母以濡潤之乎若脈象虛數者又宜多用人參減石膏一兩再加玄參生地滋陰之品煎汁三四茶盅徐徐溫飲下一次只飲一大口防其寒涼下侵致大便滑瀉又欲其藥力息息上達助元氣以生津液飲完一劑再煎一劑使藥力晝夜相繼數日舌潤火退其病自愈一人年二十餘素勞力太過即覺氣分下陷一歲之間為治愈三次至秋杪感冒時氣胸中煩熱滿悶燥渴引飲滑瀉不止微兼喘促舌上無苔其色鮮紅兼有砂粒延醫調治投以半補半破之劑意欲止其滑瀉兼治其滿悶也服藥二劑滑瀉不止後愚為診視其脈似有實熱重按無力遂先用拙擬加味天水散止其滑瀉方中生山藥用兩半滑石用一兩一劑瀉止繼服滋陰清火之劑數劑喘促亦愈火亦見退唯舌乾連喉幾不能言頻頻飲水不少濡潤胸中仍覺滿悶愚恍悟曰此乃外感時氣挾舊病復發故其脈象雖熱按之不實其舌乾如斯者津液因氣分下陷而不上潮也其胸中滿悶者氣分下陷胸中必覺短氣病人不善言病情故漫言滿悶也此時大便不行已五日遂投以白虎加人參以山藥代粳米湯一劑病愈十之七八而舌之干亦減半又服一劑大便得通病覺全愈舌上仍無津液又用潞參一兩玄參兩半日服一劑三日後舌上津液滋潤矣一童子年十三於孟冬得傷寒證七八日間喘息鼻煽動精神昏憒時作譫語所言者皆勞力之事其脈微細而數按之無力欲視其舌干縮不能外伸啓齒探視舌皮有瘢點作黑色似苔非苔頻飲涼水毫無濡潤之意愚曰此病必得之勞力之餘胸中大氣下陷故津液不能上潮氣陷不能托火外出故脈道瘀塞不然何以脈象若是恣飲涼水而不滑瀉乎遂治以白虎加人參以山藥代粳米湯煎汁一大碗徐徐溫飲下一晝夜間連進二劑其病遂愈按脈虛數而舌乾者大便雖多日不行斷無可下之理即舌苔黃而且黑亦不可下惟按上所載治法使其大便徐徐自通方為穩善若大便通後而火猶熾舌仍乾者可用潞參一兩玄參二兩煮汁徐徐飲之以舌潤火退為度若或因服藥失宜大便通後遂滑瀉其虛火上逆舌仍乾者可用拙擬滋陰固下湯去滑石加沙參數錢若其為日既久外感之火全消而舌乾神昏或呼吸之間常若氣不舒而時作太息者此大氣因服藥下陷病雖愈而不能自復也宜單用人參兩許煎湯服之或少加柴胡亦可此證有案在升陷湯下宜參觀若微有餘熱可加玄參佐之寒溫下後不解醫者至此恆多束手不知傷寒論原有治此證的方即白虎加人參湯也其一百六十八節云傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之愚生平治寒溫未有下後不解者於仙露湯後曾詳論之然恆有經他醫下後不解更延愚為診治者其在下後多日大便未行脈象不虛弱者即按傷寒論原方若在甫下之後或脈更兼虛弱即以山藥代粳米或更以生地代知母莫不隨手奏效蓋甫下之後大便不實驟用寒涼易至滑瀉而山藥收澀地黃黏潤以之代粳米知母實有固下之力而於脈之兼虛弱者則尤宜也況二藥皆能滋真陰下後不解多系陰分素虛之人陰分充足自能勝外感之餘熱也寒溫之證過十餘日大熱已退或轉現出種種危象有宜單治以人參不必加人參於白虎湯中者王宇泰曰余每治傷寒溫熱等證為庸醫妄汗誤下已成壞證危在旦夕者以人參二兩童子小便煎之水浸冰冷飲之立效又張致和曾治一傷寒壞證勢近垂危手足俱冷氣息將斷用人參一兩附子一錢於石銚內煎至一碗新汲水浸之冰冷一服而盡少頃病人汗出鼻梁尖上涓涓如水蓋鼻梁應脾若鼻端有汗者可救以土在人身之中周遍故也又愚曾治一溫證已過兩旬周身皆涼氣息奄奄確知其因誤治胸中大氣下陷遂用人參一兩柴胡二錢作湯灌之兩劑全愈此證詳案在拙擬升陷湯下可參觀白虎湯加人參又以山藥代粳米既能補助氣分托邪外出更能生津止渴滋陰退熱洵為完善之方間有真陰太虛又必重用滋陰之藥以輔翼之始能成功者一媼年過七旬於孟夏得溫證五六日間身熱燥渴精神昏憒舌似無苔而舌皮數處作黑色干而且縮脈細數按之無力當此高年審證論脈似在不治而愚生平臨證明明見不可治之證亦必苦心研究而設法治之此誠熱腸所迫不能自已然亦往往多有能救者躊躇再四為疏兩方一方即白虎加人參以山藥代粳米湯一方用熟地黃二兩生山藥枸杞各一兩真阿膠不炒五錢煎湯後調入生雞子黃四枚二方各煎汁一大碗徐徐輪流溫服閲十點鐘盡劑而愈自言從前服藥皆不知覺此時則猶如夢醒視其舌上猶乾黑然不縮矣其脈至數仍數似有餘熱又用玄參二兩潞參一兩煎湯一大碗徐徐溫服一日一劑兩日大便得通再視其舌津液滿布黑皮有脫去者矣隔數日其夫年與相等亦受溫病四五日間煩熱燥渴遣人於八十里外致冰一擔日夜食之煩渴如故復迎愚診治其脈洪滑而長重按有力舌苔白厚中心微黃知其年雖高而火甚實也遂投以白虎加人參以山藥代粳米湯將方中石膏改用四兩連進兩劑而熱渴俱愈其家人疑而問曰此證從前日食冰若干熱渴分毫不退今方中用生石膏數兩連進兩劑而熱渴俱愈是石膏之性涼於冰遠矣愚曰非也石膏原不甚涼然儘量食冰不愈而重用生石膏即愈者因石膏生用能使寒溫之熱有出路也西人不善治寒溫故遇寒溫實熱證最喜用冰然多有不愈者至石膏生用性能發汗其熱可由汗解即使服後無汗亦可宣通內蘊之熱由腠理毛孔息息達出人自不覺耳按此證與前證年歲同受病之時亦同而一則輔以熟地枸杞之類以滋真陰一則重加生石膏以清大熱此乃隨病脈之虛實活潑加減所以投之輒效也憶五年前族家姊年七旬有三忽得癱瘓證迎愚診視既至見有醫者在座用藥一劑其方系散風補氣理痰之品甚為穩善愚亦未另立方翌日脈變洪長知其已成傷寒證先時愚外祖家近族有病者訂於斯日迎愚其車適至愚將行謂醫者曰此證乃癱瘓基礎預伏於內今因傷寒而發乃兩病偕來之證然癱瘓病緩傷寒病急此證陽明實熱已現於脈非投以白虎加人參湯不可君須放膽用之斷無差謬後醫者終畏石膏寒涼又疑癱瘓證不可輕用涼藥遲延二日病勢垂危復急迎愚及至則已夜半矣診其脈洪而且數力能搏指喘息甚促舌強直幾不能言幸喜藥坊即在本村急取白虎加人參湯一劑方中生石膏用三兩煎湯兩盅分二次溫飲下病稍愈又單取生石膏四兩煮汁一大碗亦徐徐飲下至正午盡劑而愈後癱瘓證調治不愈他醫竟歸咎於愚謂從前用過若干石膏所以不能調治籲年過七旬而癱瘓者愈者幾人獨不思愚用石膏之時乃挽回已盡之人命也且金匱治熱癱癇有風引湯原石膏與寒水石並用彼謗愚者生平蓋未見金匱也嘗治一少年素羸弱多病於初夏得溫證表裡俱熱延醫調治不愈適愚自他處治病歸經過其處因與其父素稔入視之其脈數近六至雖非洪滑鼓指而確有實熱舌苔微黃雖不甚干毫無津液有煎就藥一劑未服仍系發表之劑乃當日延醫所疏方其醫則已去矣愚因謂其父曰此病外感實熱已入陽明之府其脈象不洪滑者元氣素虛故也陽明府熱之證斷無發表之理況其脈數液短兼有真陰虛損之象尤忌發汗乎其父似有會悟求愚另為疏方本擬用白虎加人參湯又思用人參即須多用石膏其父素小心過度又恐其生疑不敢服遂但為開白虎湯方中生石膏用二兩囑其煎汁兩茶盅分二次溫飲下服後若餘火不淨仍宜再服清火之藥言畢愚即旋里後聞其服藥後病亦遂愈遲十餘日大便又燥結兩腿微腫將再迎愚診治而其父友人有自謂知醫者言其腿腫系多服生石膏之過而孰知系服石膏猶少之過哉病家竟誤聽其言改延他醫投以大劑承氣湯服後其人即不語矣遷延數日而亡夫自謂知醫者不過欲炫己之長而妄指他人之短豈知其言之一出即足誤人性命哉至産後之證忌用寒涼而果系産後溫證心中燥熱舌苔黃厚脈象洪實亦宜投以白虎加人參以山藥代粳米湯而更以玄參代知母則尤妥善蓋愚於産後溫證之輕者其熱雖入陽明之府脈象不甚洪實恆重用玄參一兩或至二兩輒能應手奏效若系劇者必白虎加人參以山藥代粳米湯而更以玄參代知母方能有效誠以石膏玄參神農本草經皆明載其治産乳故於産後溫病之輕者可單用玄參至溫病之劇者不妨石膏玄參並用也然用石膏必須佐以人參因其時當産後其熱雖實而體則虛也不用知母者神農本草經未載其治産乳不敢師心自用漫以涼藥治産後也友人吳深通醫學其侄亦知醫有戚家延之治産後病臨行吳囑之曰果系産後溫熱陽明胃府大實非用衷中參西録中白虎加人參以山藥代粳米湯更以玄參代知母不可及至診之果系産後溫證病脈皆甚實遵所囑開方取藥而藥坊皆不肯與謂産後斷無用生石膏之理病家因此生疑辭歸病家又延醫治數日病勢垂危復求為診治攜藥而往如法服之一劑而愈附録滄縣董來函趙患溫病醫者投以桂枝湯覺熱渴氣促又與柴胡湯熱尤甚且增喘嗽頻吐痰涎不得臥者六七日醫者謂病甚重不能為矣舉家聞之惶恐無措伊弟延為診治既至見病人喘促肩息頭汗自出表裡皆熱舌苔深灰縮不能言急診其脈浮數有力重按甚空因思此證陽明熱極陰分將竭實為誤服桂枝柴胡之壞證急投以白虎加人參以山藥代粳米湯更以玄參代知母連服兩劑渴愈喘止脈不浮數仍然有力舌伸能言而痰嗽不甚見輕繼投以從龍湯去蘇子加人參四錢天冬八錢服七劑全愈又一趙姓婦年二十餘産後八九日忽得溫病因誤用熱藥發汗致熱渴喘促舌苔乾黑循衣摸床呼索涼水病家不敢與脈弦數有力一息七至急投以白虎加人參以山藥代粳米湯為系産後更以玄參代知母方中生石膏重用至四兩又加生地白芍各數錢煎湯一大碗分四次溫飲下盡劑而愈當時有知醫者在座疑而問曰産後忌用寒涼何以如此放膽重用生石膏且知母玄參皆系寒涼之品何以必用玄參易知母答曰此理俱在衷中參西録中遂於行篋中出書示知醫者細觀移時始喟然歎服又外祖家表妹因産後病溫服補藥二十餘劑致大熱大渴大汗屢索涼水醫者禁勿與飲急欲投井及生視之舌黑唇焦目睛直視譫語發狂診其脈細數有力問其小便赤澀大便紫黑黏滯不甚通利蓋以産後血虛又得溫病兼為補藥所誤以致外邪無由而出內熱如焚陰血轉瞬告罄急投以白虎加人參湯仍用山藥玄參代粳米知母服後一夜安穩黎明旋又反復熱渴又如從前細思産後血室空虛邪熱乘虛而入故大便紫黑宜調以桃仁承氣湯以下其瘀血邪熱當隨之俱下因小便赤澀膀胱蓄熱又加滑石四錢甘草錢半乃開藥房者系其本族謂此藥斷不可服病家疑甚復延前醫相質前醫謂此病餘連治三次投以溫補藥轉劇昨服白虎加人參湯既稍見輕想服承氣湯亦無妨也病家聞之始敢煎服因方中大黃重用六錢俾煎湯一盅半分三次溫飲下逾三點鐘降下大便如膠漆者二次鮮紅色者一次小便亦清利脈淨身涼而愈又趙之子年十九歲偶得溫病醫者下之太早大便轉不通者十八日熱渴喘滿舌苔乾黑牙齦出血目盲譫語腹脹如鼓臍突出二寸屢治不效忽大便自利完穀不化隨食隨即瀉出診其脈盡伏身冷厥逆氣息將無乍臨茫然不知所措細詢從前病狀及所服之藥始悟為陽極似陰熱深厥亦深也然須用藥將其滑瀉止住不復熱邪旁流而後能治其熱厥遂急用野臺參三錢大熟地生山藥滑石各六錢煎服後瀉止脈出洪長滑數右部尤甚繼擬以大劑白虎加人參湯生石膏重用至八兩竟身熱厥回一夜甚安至明晨病又如故試按其腹中有堅塊重按眉皺似疼且其腹脹臍突若此知其內有燥糞甚多遂改用大黃一兩芒硝六錢赭石蔞仁各八錢煎湯一大盅分兩次溫飲下下燥糞二十七枚而愈奉天鐵嶺楊來函本村張氏婦得溫病繼而小産猶不以為意越四五日其病大發遍請醫生均謂瘟病小産又兼邪熱太甚無方可治其夫造門求為診治生至其家見病人目不識人神氣恍惚渴嗜飲水大便滑瀉脈數近八至且微細無力舌苔邊黃中黑縮不能伸為其燥熱又兼滑瀉先投以滋陰清燥湯一劑瀉止熱稍見愈繼投以大劑白虎加人參以山藥代粳米湯為其産後以玄參代知母為其舌縮脈數陰分大虧又加枸杞生地煎湯一大碗調入生雞子黃三枚分數次徐徐溫飲下精神清爽舌能伸出連服三劑全愈寧嗽定喘飲治傷寒溫病陽明大熱已退其人或素虛或在老年至此益形怯弱或喘或嗽或痰涎壅盛氣息似甚不足者生懷山藥兩半甘蔗自然汁一兩酸石榴自然汁六錢生雞子黃四個先將山藥煎取清湯一大碗再將餘三味調入碗中分三次溫飲下約兩點鐘服一次若藥已涼再服時須將藥碗置開水中溫之然不可過熱恐雞子黃熟服之即無效一周姓叟年近七旬素有勞疾且又有鴉片嗜好於季秋患溫病陽明府熱熾盛脈象數而不實喘而兼嗽吐痰稠黏投以白虎加人參湯以生山藥代粳米一劑大熱已退而喘嗽仍不愈且氣息微弱似不接續其家屬惶恐以為難愈且言如此光景似難再進藥愚曰勿須用藥尋常服食之物即可治愈矣為開此方病家視之果系尋常食物知雖不對證亦無妨礙遂如法服之二劑全愈蕩胸湯治寒溫結胸其證胸膈痰飲與外感之邪互相凝結上塞咽喉下滯胃口呼吸不利滿悶短氣飲水不能下行或轉吐出兼治疫證結胸蔞仁二兩新炒者搗生赭石二兩研細蘇子六錢炒搗芒硝四錢沖服用水四盅煎取清汁兩盅先溫服一盅結開大便通行停後服若其胸中結猶未開過兩點鐘再溫服一盅若胸中之結已開而大便猶未通下且不覺轉矢氣者仍可溫服半盅傷寒下早成結胸至溫病未經下者亦可成結胸至疫病自口鼻傳入遇素有痰飲者其疹癘之氣與上焦痰飲互相膠漆亦成結胸傷寒論陷胸湯丸三方皆可隨證之輕重高下借用特是大陷胸湯丸中皆有甘遂世俗醫者恆望而生畏至小陷胸湯性雖平和又有吳又可瘟疫忌用黃連之説存於胸中遂亦不肯輕用及遇此等證而漫用開痰破氣利濕之品若橘紅萊蔔蒼朮白芥茯苓厚朴諸藥彙集成方以為較陷胸諸湯丸穩而且病家服之以為藥性和平坦然無疑不知破其氣而氣愈下陷利其濕而痰愈稠黏如此用藥真令人長太息者也愚不得已將治結胸諸成方變通匯萃之於大陷胸湯中取用芒硝於小陷胸湯中取用蔞實又於治心下痞硬之旋覆代赭石湯中取用赭石而復加蘇子以為下行之嚮導可以代大陷胸湯丸少服之亦可代小陷胸湯非欲與傷寒論諸方爭勝也亦略以便流俗之用云爾一媼年六十餘當孟夏晨飯之際忽聞鄉鄰有鬥者出視之見強者凌弱太甚心甚不平又兼飯後有汗受風遂得溫證表裡俱熱胃口杜塞腹中疼痛飲水須臾仍吐出七八日間大便不通其脈細數按之略實自言心中燥渴飲水又不能受從前服藥止吐其藥亦皆吐出若果能令飲水不吐病猶可望愈愚曰易耳為開此湯加生石膏二兩野臺參五錢煎湯一大碗分三次溫飲下晚間服藥翌晨大便得通而愈當大便未通時曾俾用山萸肉去淨核二兩煎湯以備下後心中怔忡及虛脫及大便通後微覺怔忡服之即安一室女得溫病兩三日間痰涎鬱塞胸膈滿悶異常頻頻咳吐黏若膠漆且有喘促之意飲水停滯胃口間或吐出其脈浮滑問之微覺頭疼知其表證猶未罷也遂師河間雙解散之意於蕩胸湯中加連翹蟬蛻各三錢服後微汗大便得通而愈一味萊蔔子湯治同前證萊蔔子生者一兩熟者一兩共搗碎煎湯一大茶杯頓服之奉天許年二十餘得溫病三四日覺中脘鬱結飲食至其處不下行仍上逆吐出來院求為診治其脈沉滑而實舌苔白而微黃表裡俱覺發熱然不甚劇自言素多痰飲受外感益甚因知其中脘之鬱結確係外感之邪與痰飲相凝滯也先投以蕩胸湯兩點鐘後仍復吐出為擬此方一劑結開可受飲食繼投以清火理痰之品兩劑全愈按此證若服蕩胸湯將方中赭石細末留出數錢開水送下再服湯藥亦可不吐其結亦必能開非萊蔔子湯之力勝於蕩胸湯也而試之偶效尤必載此方者為藥性較蕩胸湯尤平易臨證者與病家皆可放膽用之而無疑也若此方不效者亦可改用蕩胸湯先將赭石細末送下數錢之法鎮逆承氣湯治寒溫陽明府實大便燥結當用承氣下之而嘔吐不能受藥者芒硝六錢赭石二兩研細生石膏二兩搗細潞黨參五錢上藥四味用水四盅先煎後三味湯將成再加芒硝煎一兩沸取清汁二盅先溫服一盅過三點鐘若腹中不覺轉動欲大便者再溫服餘一盅一鄰婦年二十餘得溫病已過十日上焦燥熱嘔吐大便燥結自病後未行延醫數次服藥皆吐出適愚自他處歸診其脈關前甚洪實一息五至余其脈上盛於下一倍所以作嘔吐其至數數者吐久傷津液也為擬此湯一劑熱退嘔止大便得通而愈或問此證胃腑熱實大腸燥結方中何以復用黨參答曰此證多有嘔吐甚劇並水漿不能存者又有初病即嘔吐十數日不止者其胃氣與胃中津液必因嘔吐而大有傷損故用黨參補助胃中元氣且與涼潤之石膏並用大能滋胃中津液俾胃中氣足液生自能運轉藥力下至魄門以通大便也愚用此方救人多矣果遇此等證放膽投之無不效者一人年四十許二便不通嘔吐甚劇不受飲食倩人詢方疑係外感之熱所致問其心中發熱否言來時未嘗言及遂為約略疏方以赭石二兩以止其嘔吐生杭芍一兩以通小便芒硝三錢以通大便隔日其人復來言服後嘔吐即止二便亦通此時心中發熱且渴如故既曰如故是其從前原有熱渴之病陽明之腑證已實特其初次遣人未嘗詳言也投以大劑白虎加人參湯一劑而愈按此證亦鎮逆承氣湯證因其證兩次始述明遂致將方中藥品前後兩次分用之其病亦即前後兩次而愈矣二十六治瘟疫瘟疹方青盂湯治瘟疫表裡俱熱頭面腫疼其腫或連項及胸亦治陽毒發斑疹荷葉一個用周遭邊浮水者良鮮者尤佳生石膏一兩搗細真羚羊角二錢另煎兌服知母六錢蟬蛻三錢去足土殭蠶二錢金線重樓二錢切片粉甘草錢半荷葉稟初陽上升之氣為諸藥之舟楫能載清火解毒之藥上至頭面且其氣清郁更能解毒逐穢施於疫毒諸證尤宜也至於葉宜取其浮水者以貼水而生得水面輕氣最多故善發表如浮萍之生於水面而善發汗也金線重樓一名蚤休一名紫河車草味甘而淡其解毒之功可仿甘草然甘草性溫此藥性涼以解一切熱毒尤勝於甘草故名蚤休言若中一切蠱毒或蠍螫蛇咬或瘡瘍用之而皆可早早止住古蚤與早原相通也古諺贊蚤休曰七葉一枝花深山是我家癰疽遇著我一似手捻拿蓋此物七葉對生莖腰狀如蓮花一朵自葉中心出莖至巔開花一朵形扁而黃花上有黃絲下垂故又名金線重樓重樓者其葉與花似各作一層也其名紫河車草者蓋紫河為初生之地點其處蕃多可採之盈車俗名為草河車誤矣其形狀皮色皆如乾薑若皮不黃而微帶紫色者其味必微辣而不甘含毒性即不可用若無佳者方中不用此味亦可羚羊角與犀角皆性涼而解毒然犀稟水土之精氣而生為其稟土之精故能入胃以消胃腑之實熱為其稟水之精故又能以水勝火兼入心中以消心臟本體之熱力而疫邪之未深入者轉因服犀角後心氣虛冷不能捍禦外邪致疫邪之恣橫竟犯君主之宮此至緊要之關係醫者不可不知羚羊角善清肝膽之火兼清胃腑之熱其角中天生木胎性本條達清涼之中大具發表之力與石膏之辛涼荷葉連翹之清輕升浮者並用大能透發溫疫斑疹之毒火鬱熱而頭面腫處之毒火鬱熱亦莫不透發消除也曾治一六歲孺子出疹三四日間風火內迫喘促異常單投以羚羊角三錢須臾喘止其疹自此亦愈夫疹之毒熱最宜表散清解乃至用他藥表散清解無功勢已垂危而單投以一味羚羊角即能挽回其最能清解而兼能表散可知也且其能避蠱毒神農本草經原有明文疫病發斑皆挾有毒癘之氣也殭蠶乃蠶將脫皮時因受風不能脫下而僵之蠶因其病風而僵故能為表散藥之嚮導而兼具表散之力是以痘疹不出者殭蠶最能表出之不但此也殭蠶僵而不腐凡人有腫疼之處恐其變為腐爛殭蠶又能治之此氣化相感之妙也疫與寒溫不同寒溫者感時序之正氣因其人衛生之道於時序之冷暖失宜遂感其氣而為病其病者偶有一二人而不相傳染疫者感歲運之戾氣因其歲運失和中含毒氣人觸之即病內經刺法論所謂無問大小病狀相似者是也其病者挨戶挨村若搖役然故名曰疫且又互相傳染也內經本病論有五疫之名後世約分為寒疫溫疫治溫疫世習用東垣普濟消毒飲治寒疫世習用巢谷世聖散子然溫疫多而寒疫少拙擬之清盂湯實專為治溫疫設也一婦人年四十許得大頭瘟證頭面腫大疼痛兩目腫不能開上焦煩熱心中怔忡彼家誤為瘡毒竟延瘍醫治療醫者自出藥末敷頭面疼稍愈求其出方治煩熱怔忡彼言專習外科不管心中之病時愚應他家延請適至其村求為診治其脈洪滑有力關前益甚投以清盂湯將方中石膏改用二兩煎汁兩茶盅分二次溫飲下盡劑而愈一人年二十餘得溫疫三四日間頭面悉腫其腫處皮膚內含黃水破後且潰爛身上間有斑點聞人言此證名大頭瘟其潰爛之狀又似瓜瓤瘟最不易治懼甚求為診視其脈洪滑而長舌苔白而微黃問其心中惟覺煩熱嗜食涼物遂曉之曰此證不難治頭面之腫爛周身之斑點無非熱毒入胃而隨胃氣外現之象能放膽服生石膏可保全愈遂投以青盂湯方中石膏改用三兩知母改用八錢煎汁一大碗分數次溫飲下一劑病愈強半翌日於方中減去荷葉蟬蛻又服一劑全愈按發斑之證異於疹者以其發處不高以手拂之與膚平也其證有陽毒陰毒之分陽毒發斑系陽明毒熱傷血所致陰毒發斑或為寒疫之毒或因汗吐下後中氣虛乏或因過服涼藥遂成陰證寒伏於下逼其無根之火上獨熏肺而發斑其色淡紅隱隱見於肌表與陽證發斑色紫赤者不同愚生平所治發斑皆系陽證至陰證實未之見其證之甚少可知然正不可因陰證者甚少而陰陽之際不詳辨也今採古人陽毒陰毒發斑治驗之案數條於下以備參觀庶幾胸有定見臨證時不至誤治也呂滄洲云一人傷寒十餘日身熱而靜兩手脈盡伏醫者以為壞證弗與藥余診之三部脈舉按皆無舌苔滑兩顴赤如火語言不亂因告之曰此子必大發赤斑周身如錦紋夫血脈之波瀾也今血為邪熱所搏掉而為斑外現於皮膚呼吸之氣無形可倚猶溝渠之水雖有風不能成波瀾也斑消則脈出矣及揭其衾而赤斑爛然與白虎加人參湯化其斑脈乃復常按發斑至於無脈其證可謂險矣即遇有識者細診病情以為可治亦必謂毒火鬱熱盤踞經絡之間以阻塞脈道之路耳而滄洲獨斷為發斑則傷血血傷則脈不見是誠滄洲之創論然其言固信而有徵也憶己亥春嘗治一少年吐血證其人大口吐血數日不止脈若有若無用藥止其血後脈因火退轉分毫不見愚放膽用藥調補之竟得無恙此證詳案在寒降湯下夫吐血過多可至無脈以徵滄洲血傷無脈之説確乎可信此陽毒發斑也許叔微治一人內寒外熱而發斑六脈沉細肩背胸脅斑出數點隨出隨隱旋更發出語言狂亂非譫語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數服後得大汗而愈此陰毒發斑也吳仁齋治一人傷寒七八日因服涼藥太過遂變身冷手足厥逆通身黑斑惟心頭溫暖乃伏火也診其六脈沉細昏沉不知人事亦不能言語狀似尸厥遂用人參三白湯加熟附子半枚乾薑二錢水煎服下待一時許斑色漸紅手足漸暖而蘇醒後復有餘熱不清此伏火後作也以黃連解毒湯竹葉石膏湯調之而愈此陰毒發斑中有伏陽也虞天民曰有內傷證亦出斑疹但微見紅此胃氣極虛一身之火遊行於外當補益氣血則中有主而氣不外遊榮有養而血不外散此證尤當慎辨洪吉人解之曰按此證與陽毒發斑不同亦與陰毒發斑不同其方當用補中益氣湯加歸芍之類瘟毒之病有所謂羊毛瘟者亦名羊毛疹其證亦系瘟疫而心中兼有撩亂之證若視其前後對心處有小痤俗名疙瘩以針鼻點之其頂陷而不起其中即有白毛當以針挑出之若恐挑之不淨可用發麵饃饃去皮雜以頭髮少蘸香油周身搓擦再審其證之虛實涼熱投以治疫病之藥即愈此證古書不載而今人患此證者甚多其白毛即周身之汗毛大抵因有汗受風閉其毛孔而汗毛不能外出因不外出所以作白色若用黃酒和蕎麥麵擦之更好護心至寶丹治瘟疫自肺傳心其人無故自笑精神恍惚言語錯亂生石膏一兩搗細人參二錢犀角二錢羚羊角二錢硃砂三分研細牛黃一分研細將藥前四味共煎湯一茶盅送服硃砂牛黃末此證屬至危之候非尋常藥餌所能療治故方中多用珍異之品借其寶氣以解入心之熱毒也瘟疫之毒未入心者最忌用犀角而既入心之後犀角又為必須之藥瘟疫之毒隨呼吸之氣傳入原可入肺心與肺同居膈上且左心房之血脈管與右心房之回血管又皆與肺循環相通其相傳似甚易而此證不常有者因有包絡護於心上代心受邪由包絡下傳三焦為手厥陰少陽臟腑之相傳此心所以不易受邪也愚臨證二十餘年僅遇一媼患此證為擬此方服之而愈清疹湯治小兒出疹表裡俱熱或煩躁引飲或喉疼聲啞或喘逆咳嗽生石膏一兩搗細知母六錢羚羊角二錢金線重樓錢半切片薄菏葉二錢青連翹二錢蟬蛻錢半去足土殭蠶二錢用水煎取清湯一盅半分二次溫飲下以服後得微汗為佳若一次得微汗者余藥仍可再服若服一次即得大汗者余藥當停服此藥分量系治七八歲以上者若七八歲以下者可隨其年之大小斟酌少用或將藥減半或用三分之一皆可喉疼聲啞者可將石膏加重五錢合前得兩半若疹出不利者用鮮葦根活水中者更佳一大握去節水煎沸用其水煎藥疹證多在小兒想小兒臟腑間原有此毒又外感時令之毒氣而發則一發表裡俱熱若溫病初得之劇者其陽明經府之間皆為熱毒之所瀰漫故治此證始則發表繼則清解其有實熱者皆宜用石膏至喉疼聲啞者尤為熱毒上衝石膏更宜放膽多用惟大便滑瀉者石膏知母皆不宜用可去此二藥加滑石一兩甘草三錢蓋即滑瀉亦非涼證因燥渴飲水過多脾胃不能運化故也故加滑石以利其小便甘草以和其脾胃以緩水飲下趨之勢若其滑瀉之甚者可用拙擬滋陰宣解湯既可止瀉又可表疹外出也然此證最忌滑瀉恐其毒因滑瀉內陷即不能外出若服以上方而滑瀉不止可用生山藥兩許軋細煮作粥再將熟雞子黃兩三枚捏碎調粥中服之其滑瀉必止瀉止後再徐徐以涼藥清補之奉天友人朱之子年五歲於庚申立夏後周身壯熱出疹甚稠密脈甚洪數舌苔白厚知其疹而兼瘟也欲以涼藥清解之因其素有心下作疼之病出疹後貪食鮮果前一日猶覺疼又不敢投以重劑遂勉用生石膏玄參各六錢薄荷葉蟬蛻各一錢連翹二錢晚間服藥至翌日午後視之其熱益甚喉疼氣息甚粗鼻翅煽動且自鼻中出血少許有煩躁不安之意愚不得已重用生石膏三兩玄參麥冬帶心各四錢仍少佐以薄荷葉連翹諸藥俾煎湯二茶盅分三次溫飲下至翌日視之則諸證皆輕減矣然餘熱猶熾而大便雖下一次仍系燥糞詢其心猶發熱脈仍有力遂於涼解藥中仍用生石膏一兩連服兩劑壯熱始退繼用涼潤清解之劑調之全愈按此證初次投以生石膏玄參各六錢其熱不但不退而轉見增加則石膏之性原和平確非大涼可知也至其證現種種危象而放膽投以生石膏三兩又立能挽回則石膏對於有外感實熱諸證直勝金丹可知此證因心下素有疼病故石膏玄參初止用六錢若稍涉遊移並石膏玄參亦不敢用再認定疹毒宜托之外出而多用發表之品則翌日現證之危險必更加劇即後投以大劑涼藥亦不易挽回也目睹耳聞知孺子罹瘟疹之毒為俗醫藥誤者甚多故於記此案時而再四詳為申明瘟疫之證雖宜重用寒涼然須謹防其泄瀉若泄瀉則氣機內陷即無力托毒外出矣是以愚用大劑寒涼治此等證時必分三四次徐徐溫服下俾其藥力長在上焦及行至下焦其寒涼之性已為內熱所化自無泄瀉之弊而始終又須以表散之藥輔之若薄荷連翹蟬蛻殭蠶之類則火消毒淨疹愈之後亦斷無他患矣至若升麻羌活之藥概不敢用友人劉精通醫學曾治一孺子出疹剛見點即回醫者用一切藥皆不能表出毒氣內攻勢甚危急衆皆束手劉投以傷寒論麻杏甘石湯一劑疹皆發出自此遂愈夫麻杏甘石湯為汗後下後汗出而喘無大熱者之方劉用以治疹竟能挽回人命於頃刻可為善用古方者矣用此方者當視其熱度之高低熱度高者石膏用一兩麻黃用一錢熱度低者石膏用一兩麻黃用二錢二十七治瘧疾方加味小柴胡湯治久瘧不愈脈象弦而無力柴胡三錢黃芩二錢知母三錢潞參三錢鱉甲三錢醋炙清半夏二錢常山錢半酒炒草果一錢甘草一錢酒麴三錢生薑三錢大棗兩枚捭開瘧初起者減潞參鱉甲熱甚者加生石膏五六錢或至一兩寒甚者再加草果五分或至一錢神麯皆發不好故方中用酒麴瘧邪不專在少陽而實以少陽為主故其六脈恆露弦象其先寒者少陽之邪外與太陽並也其後熱者少陽之邪內與陽明並也故方中用柴胡以升少陽之邪草果生薑以祛太陽之寒黃芩知母以清陽明之熱又瘧之成也多挾痰挾食故用半夏常山以豁痰酒麴以消食也用人參因其瘧久氣虛扶其正即所以逐邪外出用鱉甲者因瘧久則脅下結有痞積方書名瘧母實由肝脾脹大消其痞積然後能斷瘧根株用甘草大棗者所以化常山之猛烈而服之不至瞑眩也或問葉天士醫案其治瘧之方多不用柴胡其門人又有根傳之説謂不宜用柴胡治瘧若誤用之實足僨事其説果可信乎答曰葉氏當日聲價甚高瘧原小疾初起之時鮮有延之診治者逮至瘧久而虛證歧出恆有瘧邪反輕而他病轉重但將其病之重者治愈而瘧亦可隨愈此乃臨證通變之法非治瘧之正法也至於病在厥陰亦有先寒後熱出汗少愈形狀類瘧之證此係肝氣虛極將脫若誤認為瘧用柴胡升之凶危立見此當重用山萸肉以斂而補之是以神農本草經山茱萸亦主寒熱也葉氏門人所謂誤用柴胡足僨事者大抵指此類耳或問葉氏治瘧遇其人陰虛燥熱者恆以青蒿代柴胡後之論者皆贊其用藥得化裁通變之妙不知青蒿果可以代柴胡乎答曰瘧邪伏於脅下兩板油中乃足少陽經之大都會柴胡之力能入其中升提瘧邪透膈上出而青蒿無斯力也若遇陰虛者或熱入於血分者不妨多用滋陰涼血之藥佐之若遇燥熱者或熱盛於氣分者不妨多用清燥散火之藥佐之曾治一人瘧間日一發熱時若燔即不發瘧之日亦覺心中發熱舌燥口乾脈象弦長凡瘧脈皆弦重按甚實知其陽明火盛也投以大劑白虎湯加柴胡三錢服後頓覺心中清爽翌晨瘧即未發又煎前劑之半加生薑三錢服之而愈又嘗治一人得溫病熱入陽明之府舌苔黃厚脈象洪長又間日一作寒熱此溫而兼瘧也然其人素有鴉片嗜好病雖實而身體素虛投以拙擬白虎加人參以麥冬代知母山藥代粳米湯亦少加柴胡兩劑而愈西人治瘧恆用金雞納霜於未發瘧之日午間晚間各服半瓦白糖水送下至翌晨又如此服一次其瘧即愈方書謂冬冷多溫病夏熱多瘧疾此言冬日過冷人身有伏寒至春隨春陽化熱即多成溫病夏日過熱人身有伏暑至秋為薄寒所激發即多生瘧疾也丁卯季夏暑熱異常京津一帶因熱而死者甚多至秋果多瘧疾服西藥金雞納霜亦可愈而愈後恆屢次反復姻家王姓少年寄居津門服金雞納霜愈瘧三次後又反復連服前藥數次竟毫無效驗診其脈左右皆弦長有力夫弦為瘧脈其長而有力者顯繫有伏暑之熱也為開白虎湯方重用生石膏二兩又加柴胡何首烏各二錢一劑而瘧愈恐未除根即原方又服一劑從此而病不反復矣此方用白虎湯以解伏暑而又加柴胡何首烏者凡外感之證其脈有弦象者必兼有少陽之病宜用柴胡清之而外邪久在少陽其經必虛又宜用何首烏補之二藥並用一扶正一逐邪也少陽與陽明並治是以伏暑愈而瘧亦隨愈也二十八治氣血鬱滯肢體疼痛方升降湯治肝鬱脾弱胸脅脹滿不能飲食宜與論肝病治法參看野臺參二錢生黃耆二錢白朮二錢廣陳皮二錢川厚朴二錢生雞內金二錢搗細知母三錢生杭芍三錢桂枝尖一錢川芎一錢生薑二錢世俗醫者動曰平肝故遇肝鬱之證多用開破肝氣之藥至遇木盛侮土以致不能飲食者更謂伐肝即可扶脾不知人之元氣根基於腎而萌芽於肝凡物之萌芽皆嫩脆易於傷損肝既為元氣萌芽之臟而開破之若是獨不慮損傷元氣之萌芽乎內經曰厥陰肝經不治求之陽明胃經金匱曰見肝之病當先實脾故此方惟少用桂枝川芎以舒肝氣其餘諸藥無非升脾降胃培養中土俾中宮氣化敦厚以聽肝氣之自理實竊師內經求之陽明與金匱當先實脾之奧旨耳按見肝之病當先實脾二句從來解者謂肝病當傳脾實之所以防其相傳如此解法固是而實不知實脾即所以理肝也兼此二義始能盡此二句之妙一媼年近六旬資稟素弱又兼家務勞心遂致心中怔忡肝氣鬱結胸腹脹滿不能飲食舌有黑苔大便燥結十數日一行廣延醫者為治半載無效而羸弱支離病勢轉增後愚診視脈細如絲微有弦意幸至數如常知猶可治遂投以升降湯為舌黑便結加鮮地骨皮一兩數劑後舌黑與便結漸愈而地骨皮亦漸減至十劑病愈強半共服百劑病愈而體轉健康培脾舒肝湯治因肝氣不舒木鬱剋土致脾胃之氣不能升降胸中滿悶常常短氣於術三錢生黃耆三錢陳皮二錢川厚朴二錢桂枝尖錢半柴胡錢半生麥冬二錢生杭芍四錢生薑二錢脾主升清所以運津液上達胃主降濁所以運糟粕下行白朮黃耆為補脾胃之正藥同桂枝柴胡能助脾氣之升同陳皮厚朴能助胃氣之降清升濁降滿悶自去無事專理肝氣而肝氣自理況桂枝柴胡與麥芽又皆為舒肝之妙品乎用芍藥者恐肝氣上升膽火亦隨之上升且以解黃耆桂枝之熱也用生薑者取其辛散溫通能渾融肝脾之氣化於無間也從來方書中麥芽皆是炒熟用之惟陳修園謂麥芽生用能升發肝氣可謂特識蓋人之元氣根基於腎萌芽於肝培養於脾積貯於胸中為大氣以斡旋全身麥茅為谷之萌芽與肝同氣相求故能入肝經以條達肝氣此自然之理無庸試驗而可信其必然者也然必生煮汁飲之則氣善升發而後能遂其條達之用也附録直隸青縣張來函族侄婦年二十餘素性謹言情志抑鬱因氣分不舒致四肢痙攣顫動呼吸短促胸中脹悶約一晝夜先延針科醫治云是雞爪風為刺囟門及十指尖稍愈旋即復作如故其脈左部弦細右部似有似無一分鐘數至百至其兩肩抬動氣逆作喘詢知其素不健壯廉於飲食蓋肝屬木而主筋肝鬱不舒則筋攣肝鬱恆侮其所勝故脾土受傷而食少遂為開培脾舒肝湯為有逆氣上干又加生赭石細末五錢囑服二劑痙攣即愈氣息亦平遂去赭石照原方又服數劑以善其後金鈴瀉肝湯治脅下掀疼川楝子五錢搗生明乳香四錢生明沒藥四錢三稜三錢莪朮三錢甘草一錢劉河間有金鈴子散即楝子之核與玄胡索等分為末服之以治心腹脅下作疼其病因由於熱者甚效誠以金鈴子能引心包之火及肝膽所寄之相火下行又佐以玄胡索以開通氣血故其疼自止也而愚用其方效者固多而間有不效者後擬得此方莫不隨手奏效蓋金鈴子佐以玄胡索雖能開氣分之郁而實不能化氣所謂化氣者無事開破能使氣之郁者融化於無形方中之乳香沒藥是也去玄胡索加三稜莪朮者因玄胡索性過猛烈且其開破之力多趨下焦不如三稜莪朮性較和平且善於理肝也用甘草者所以防金鈴子有小毒也此方不但治脅疼甚效凡心腹作疼而非寒涼者用之皆甚效驗附録直隸鹽山李來函仲冬劉兄病左脅掀疼諸治無效詢方於弟授以活絡效靈丹方服之不應因延為診視脈象他部皆微弱惟左關沉而有力治以金鈴瀉肝湯加當歸數錢服一劑翌日降下若干緑色黏滯之物遂豁然而愈蓋此湯原注明治脅下掀疼由此知兄所擬方各有主治方病相投莫不神效也活絡效靈丹治氣血凝滯痃癖癥瘕心腹疼痛腿疼臂疼內外瘡瘍一切臟腑積聚經絡湮淤當歸五錢丹參五錢生明乳香五錢生明沒藥五錢上藥四味作湯服若為散一劑分作四次服溫酒送下腿疼加牛膝臂疼加連翹婦女瘀血腹疼加生桃仁帶皮尖作散服炒用生五靈脂瘡紅腫屬陽者加金銀花知母連翹白硬屬陰者加肉桂鹿角膠若恐其偽可代以鹿角霜瘡破後生肌不速者加生黃耆知母但加黃耆恐失於熱甘草臟腑內癰加三七研細沖服牛蒡子一人年三十許當臍忽結癥瘕自下漸長而上其初長時稍軟數日後即硬如石旬日長至心口向愚詢方自言凌晨冒寒得於途間時心中有驚恐憂慮遂覺其氣結而不散按此病因甚奇然不外氣血凝滯為制此方於流通氣血之中大具融化氣血之力連服十劑全消以後用此方治內外瘡瘍心腹四肢疼痛凡病之由於氣血凝滯者恆多奇效高年近五旬資稟素羸弱一日訪友鄰村飲酒談宴徹夜不眠時當季冬復清晨冒寒步行旋里行至中途覺兩腿痠麻且出汗不能行步因坐涼地歇息至家遂覺腿痛用熱磚尉之疼益甚其人素知醫遂自服發汗之藥數劑病又增劇因服藥過熱吐血數口大便燥結延愚診視見其仰臥屈膝令兩人各以手托其兩腿忽歌忽哭疼楚之態萬狀脈弦細至數微數因思此證熱磚尉而益疼者逼寒內陷也服發汗藥而益疼者因所服之藥散肌肉之寒不能散筋骨之寒且過汗必傷氣血血氣傷愈不能勝病也遂用活絡效靈丹加京鹿角膠四錢另燉兌服明天麻二錢煎湯飲下左腿遂愈而右腿疼如故遂復用原方以虎骨膠易鹿角膠右腿亦出涼氣如左而愈一少婦左脅起一瘡其形長約五寸上半在乳下半在肋皮色不變按之甚硬而微熱於他處延醫詢方調治兩月不效且漸大於從前後愚診視閲其所服諸方有遵林屋山人治白疽方治者有按乳癰治者愚曉病家曰此證硬而色白者陰也按之微熱者陰中有陽也統觀所服諸方有治純陰陽之方無治半陰半陽之方勿怪其歷試皆不效也用活絡效靈丹俾作湯服之數劑見輕三十劑後消無芥蒂一婦人年五十許腦後發一對口瘡詢方於愚時初擬出活絡效靈丹方即書而豫之連服十劑全愈一婦人年五十餘項後筋縮作疼頭向後仰不能平視腰背強直下連膝後及足跟大筋皆疼並牽周身皆有疼意廣延醫者診治所用之藥不外散風和血潤筋通絡之品兩載無效病轉增劇臥不能起起不能坐飲食懶進後愚診視其脈數而有力微有弦意知其為宗筋受病治以活絡效靈丹加生薏米八錢知母玄參白芍各三錢連服三十劑而愈蓋筋屬於肝獨宗筋屬胃此證因胃腑素有燥熱致津液短少不能榮養宗筋夫宗筋為筋之主故宗筋拘攣而周身牽引作疼也薏米性味沖和善能清補脾胃即能榮養宗筋又加知母玄參以生津滋液活絡效靈丹以活血舒筋因其脈微弦恐其木盛侮土故又加芍藥以和肝即以扶脾胃也薏米主筋急拘攣神農本草經原有明文活絡效靈丹中加薏米即能隨手奏效益嘆神農本草經之精當為不可及活絡效靈丹治心腹疼痛無論因涼因熱氣鬱血鬱皆效同里有一少年臍下疼甚劇醫者投以溫藥益甚晝夜號呼不止又延他醫以藥下之稍輕然仍晝夜呻吟繼又服藥數劑亦不見效適愚自津門旋里診其脈兩尺洪實詢其得病之由言夜晚將寢覺飢因食冷餅一塊眠起遂疼曉之曰此雖由於食涼物然其疼非涼疼乃下焦先有蘊熱又為涼物所迫其熱愈結而不散也投以活絡效靈丹加龍膽草川楝子各四錢一劑而愈或問此證醫者曾用藥下之何以其下焦之鬱熱不隨之俱下答曰熱在大腸者其熱可隨降藥俱下然又必所用之下藥為鹹寒之品若承氣湯是也今其熱原鬱於奇經衝任之中與大腸無關衝任主血而活絡效靈丹諸藥品皆善入血分通經絡故能引龍膽楝子直入衝任而消解其鬱熱況其從前所服之下藥原非鹹寒之品是以從前不效而投以此藥則隨手奏效也附録直隸青縣張來函族兄年三十餘素強壯無病壬戌中秋因在田間掘壑勞苦過甚自覺氣力不支即在壑中吃煙休息少緩須臾又復力作至晚歸家時途中步行覺兩腿痠木不仁及至夜間兩腿抽疼甚劇適生在裡其弟扣門求為往治診其脈遲滯而細號呼不已氣逆不順身冷小溲不利遂用活絡效靈丹方加白芍三錢桂枝尖二錢生薑三片一劑腿疼大減小便即利身冷亦退再劑霍然全愈又天津王媼年五十七歲右膝蓋部發炎紅熱腫疼食減不眠其嗣延為診視至其家聞病者呼號不止口稱救命其右脈洪數有力心悸頭眩舌苔白而膩大便三日未行小便赤熱此足徵濕熱下注豫以活絡效靈丹加生石膏六錢知母懷牛膝生薏米冬四錢甘草梢一錢囑服一劑次日自能來寓其疼減腫消夜已成寐尚云右臂痠疼又即原方加青連翹金銀花油松節各二錢服之全愈活絡祛寒湯治經絡受寒四肢發搐婦女多有此證生黃耆五錢當歸四錢丹參四錢桂枝尖二錢生杭芍三錢生明乳香四錢生明沒藥四錢生薑三錢寒甚者加乾薑三錢證寒在經絡不在臟腑經絡多行於肌肉之間故用黃耆之溫補肌肉者為君俾其形體壯旺自能勝邪又佐以溫經絡通經絡諸藥品不但能祛寒且能散風此所謂血活風自去也風寒既去血脈活潑其搐焉有不止者乎健運湯治腿疼臂疼因氣虛者亦治腰疼生黃耆六錢野臺參三錢當歸三錢寸麥冬三錢帶心知母三錢生明乳香三錢生明沒藥三錢莪朮一錢三稜一錢此方減麥冬知母三分之一合數劑為一劑軋細鍊蜜為丸名健運丸治同前證從來治腿疼臂疼者多責之風寒濕痹或血瘀氣滯痰涎凝滯不知人身之氣化壯旺流行而周身痹者瘀者滯者不治自愈即偶有不愈治之亦易為功也愚臨證體驗以來知元氣素盛之人得此病者極少故凡遇腿疼臂疼歷久調治不愈者補其元氣以流通之數載沉疴亦可隨手奏效也振中湯治腿疼腰疼飲食減少者於白朮六錢炒當歸身二錢陳皮二錢厚朴錢半生明乳香錢半生明沒藥錢半此方重用白朮以健補脾胃脾胃健則氣化自能旁達且白朮主風寒濕痹神農本草經原有明文又輔以通活氣血之藥不惟風寒濕痹開而氣血之痹而作疼者亦自開也一室女腿疼幾不能步治以拙擬健運湯而愈次年舊病復發又兼腰疼再服前方不效診其脈右關甚濡弱詢其飲食減少為制此湯數劑飲食加多二十劑後腰疼腿疼皆愈一媼年近七旬陡然腿疼不能行動夜間疼不能寐其家人迎愚調治謂脈象有力當是火鬱作疼及診其脈大而且弦問其心中亦無熱意愚曰此脈非有火之象其大也乃脾胃過虛真氣外泄也其弦也乃肝膽失和木盛侮土也治以振中湯加人參白芍山萸肉去淨核各數錢補脾胃之虛即以抑肝膽之盛數劑而愈曲直湯治肝虛腿疼左部脈微弱者萸肉一兩去淨核知母六錢生明乳香三錢生明沒藥三錢當歸三錢丹參三錢服藥數劑後左脈仍不起者可加續斷三錢或更加生黃耆三錢以助氣分亦可覺涼者可減知母脾虛可令人腿疼前方已詳其理深於醫學者大抵皆能知之至肝虛可令人腿疼方書罕言即深於醫學者亦恆不知曾治一人年三十許當大怒之後漸覺腿疼日甚一日兩月後臥床不能轉側醫者因其得之惱怒之餘皆用舒肝理氣之藥病轉加劇後愚診視其左脈甚微弱自言凡疼甚之處皆熱因恍悟內經謂過怒則傷肝所謂傷肝者乃傷肝經之氣血非必郁肝經之氣血也氣血傷則虛弱隨之故其脈象如斯也其所以腿疼且覺熱者因肝主疏泄中藏相火相火生於命門寄於肝膽肝虛不能疏泄相火即不能逍遙流行於周身以致鬱於經絡之間與氣血凝滯而作熱作疼所以熱劇之處疼亦劇也為制此湯以萸肉補肝以知母瀉熱更以當歸乳香諸流通血氣之藥佐之連服十劑熱愈疼止步履如常安東友人劉年五十許其左臂常覺發熱且有痠軟之意醫者屢次投以涼劑發熱如故轉覺脾胃消化力減少後愚診之右脈和平如常左脈微弱較差於右脈一倍詢其心中不覺涼熱知其肝木之氣虛弱不能條暢敷榮其中所寄之相火鬱於左臂之經絡而作熱也遂治以曲直湯加生黃耆八錢佐萸肉以壯旺肝氣赤芍藥三錢佐當歸丹參諸藥以流通經絡服兩劑左脈即見起又服十劑全愈奉天王年四十餘兩脅下連腿作疼其疼劇之時有如錐刺且尿道艱澀滴瀝不能成溜每小便一次須多半點鐘其脈亦右部如常左部微弱亦投以曲直湯加生黃耆八錢續斷三錢一劑其疼減半小便亦覺順利再診之左脈較前有力又按原方略為加減連服二十餘劑脅與腿之疼皆愈小便亦通利如常蓋兩脅為肝之部位肝氣壯旺上達自不下鬱而作疼至其小便亦通利者因腎為二便之關肝氣既旺自能為腎行氣也古方書有肝行腎之氣之語二十九治女科方玉燭湯治婦女寒熱往來或先寒後熱汗出熱解或月事不調經水短少生黃耆五錢生地黃六錢玄參四錢知母四錢當歸三錢香附三錢醋炒柴胡一錢五分甘草一錢五分汗多者以茵陳易柴胡再加萸肉數錢熱多者加生杭芍數錢寒多者加生薑數錢婦女多寒熱往來之證而方書論者不一説有謂陽分虛則頭午寒陰分虛則過午熱者夫午前陽盛午後陽衰而陰又浸盛當其盛時虛者可以暫實何以其時所現之病狀轉與時成反比例也有謂病在少陽則寒熱往來猶少陽外感之邪與太陽並則寒與陽明並則熱者而內傷之病原無外邪又何者與太陽陽明並作寒熱也有謂肝虛則乍熱乍寒者斯説也愚曾驗過遵神農本草經山茱萸主寒熱之旨單重用山萸肉去淨核二兩煎湯服之立愈驗案在來復湯下然此乃肝木虛極內風將動之候又不可以蓋尋常寒熱也蓋人身之氣化原與時序之氣化息息相通一日之午前猶一歲之有春夏而人身之陽氣即感之發動以敷布於周身婦女性多憂思以致臟腑經絡多有鬱結閉塞之處阻遏陽氣不能外達或轉因發動而內陷或發動不遂其發動排擠經絡愈加閉塞於是周身之寒作矣逮陽氣蓄極終當憤發而其憤發之機與抑遏之力相激相蕩於臟腑經絡之間熱又由茲而生此前午之寒所以變後午之熱也黃耆為氣分之主藥能補氣更能升氣輔以柴胡之軒舉香附之宣通陽氣之抑遏者皆暢發矣然血隨氣行氣鬱則血必瘀故寒熱往來者其月事恆多不調經血恆多虛損用當歸以調之地黃以補之知母元參與甘草甘苦化陰以助之則經血得其養矣況地黃知母諸涼藥與黃耆溫熱之性相濟又為燮理陰陽調和寒熱之妙品乎至方書有所謂日晡發熱者日晡者申時也足少陰腎經主令之候也其人或腎經陰虛至此而腎經之火乘時而動亦可治以此湯將黃耆減半地黃改用一兩有經閉結為癥瘕阻塞氣化作寒熱者可用後理沖湯有胸中大氣下陷作寒熱者其人常覺呼吸短氣宜用拙擬升陷湯方後治驗之案可以參觀附方西人鐵鏽雞納丸治婦女經血不調身體羸弱咳喘或時作寒熱甚效方用鐵鏽沒藥忌火各一錢金雞納霜花椒各五分共為細末煉蜜為丸六十粒每服三粒至五粒鐵鏽乃鐵與養氣化合而成人身之血得養氣而赤鐵鏽中含養氣而又色赤似血且嗅之兼有血腥之氣故能榮養血分流通經脈且人之血中實有鐵鏽以鐵鏽補血更有以鐵補鐵之妙也金雞納霜有治瘧之功用此方中亦用之者為其善治貧血且又能入手足少陽之經以調和寒熱也又佐以花椒者恐金雞納霜之性偏於寒涼而以辛熱濟之使歸於和平也東亞人有中將湯以調婦女經脈恆有效驗門人高曾開其方相寄藥品下未有分量愚為酌定其分量用之甚有功效今將其方開列於下以備選用延胡索醋炒三錢當歸六錢官桂二錢甘草二錢丁香二錢山楂核醋炒三錢鬱金醋炒二錢沙參四錢續斷酒炒三錢肉蔻赤石脂炒三錢去石脂不用苦參三錢懷牛膝三錢共十二味軋作粗渣分三劑每用一劑開水浸蓋碗中約半點鐘將其湯飲下如此浸服二次至第三次用水煎服日用一劑數劑經脈自調此方中涼熱補破澀滑之藥皆有愚所酌分量俾其力亦適相當故凡婦女經脈不調證皆可服之而以治白帶證尤效理沖湯治婦女經閉不行或産後惡露不盡結為癥瘕以致陰虛作熱陽虛作冷食少勞嗽虛證沓來服此湯十餘劑後虛證自退三十劑後瘀血可盡消亦治室女月閉血枯並治男子勞瘵一切臟腑癥瘕積聚氣鬱脾弱滿悶痞脹不能飲食生黃耆三錢黨參二錢於術二錢生山藥五錢天花粉四錢知母四錢三稜三錢莪朮三錢生雞內金三錢黃者用水三盅煎至將成加好醋少許滾數沸服服之覺悶者減去於術覺氣弱者減三稜莪朮各一錢瀉者以白芍代知母於術改用四錢熱者加生地天冬各數錢涼者知母花粉各減半或皆不用涼甚者加肉桂搗細沖服烏附子各二錢瘀血堅甚者加生水蛭不用炙二錢若其人堅壯無他病惟用以消癥瘕積聚者宜去山藥室女與婦人未産育者若用此方三稜莪朮宜斟酌少用減知母之半加生地黃數錢以濡血分之枯若其人血分雖瘀而未見癥瘕或月信猶未閉者雖在已産育之婦人亦少用三稜莪朮若病人身體羸弱脈象虛數者去三稜莪朮將雞內金改用四錢因此藥能化瘀血又不傷氣分也逮氣血漸壯瘀血未盡消者再用三稜莪朮未晚若男子勞瘵三稜莪朮亦宜少用或用雞內金代之亦可初擬此方時原專治産後瘀血成癥瘕後以治室女月閉血枯亦效又間用以治男子勞瘵亦效驗大有開胃進食扶羸起衰之功內經有四烏鰂魚骨一茹蘆丸原是男女並治為調血補虛之良方此方竊師內經之意也從來醫者調氣行血習用香附而不習用三稜莪朮蓋以其能破癥瘕遂疑其過於猛烈而不知能破癥瘕者三稜莪朮之良能非二藥之性烈於香附也愚精心考驗多年凡習用之藥皆確知其性情能力若論耗散氣血香附猶甚於三稜莪朮若論消磨癥瘕十倍香附亦不及三稜莪朮也且此方中用三稜莪朮以消沖中瘀血而即用參耆諸藥以保護氣血則瘀血去而氣血不至傷損且參耆能補氣得三稜莪朮以流通之則補而不滯而元氣愈旺元氣既旺愈能鼓舞三稜莪朮之力以消癥瘕此其所以效也人之臟腑一氣貫通若營壘連絡互為犄角一處受攻則他處可為之救應故用藥攻病宜確審病根結聚之處用對證之藥一二味專攻其處即其處氣血偶有傷損他臟腑氣血猶可為之輸將貫注亦猶相連營壘之相救應也又加補藥以為之佐使是以邪去正氣無傷損世俗醫者不知此理見有專確攻病之方若拙擬理沖湯者初不審方中用意何如但見方中有三稜莪朮即望而生畏不敢試用自流俗觀之亦似慎重及觀其臨證調方漫不知病根結於何處惟是混開混破恆集若香附木香陳皮砂仁枳殼厚朴延胡靈脂諸藥或十餘味或數十味為一方服之令人臟腑之氣皆亂常有病本可治服此等藥數十劑而竟至不治者更或見有浮火虛熱而加芩梔蔞實之屬則開破與寒涼並用雖脾胃堅壯者亦斷不能久服此其貽害尤甚也一婦人年三十餘癥瘕起於少腹漸長而上其當年長者稍軟隔年即硬如石七年之間上至心口旁塞兩肋飲食減少時覺昏憒劇時昏睡一晝夜不飲不食屢次服藥竟分毫無效後愚為診視脈雖虛弱至數不數許為治愈授以此方病人自揣其病斷無可治之理竟置不服次年病益進昏睡四日不醒愚用藥救醒之遂懇切告之曰去歲若用愚方病愈已久何至危困若斯然此病尚可為甚勿再遲延也仍為開前方病人喜信愚言連服三十餘劑磊塊皆消惟最初所結之病根大如核桃之巨者尚在又加生水蛭不宜炙一錢服數劑全愈一婦人年二十餘癥瘕結於上脘其大如橘按之甚硬時時上攻作疼妨礙飲食醫者皆以為不可消後愚診視治以此湯連服四十餘劑消無芥蒂一媼年六旬氣弱而且郁心腹滿悶不能飲食一日所進穀食不過兩許如此已月餘矣愚診視之其脈甚微細猶喜至數調勻知其可治遂用此湯將三稜莪朮各減一錢連服數劑即能進飲食又服數劑病遂全愈奉天孫姓婦年四十許自幼時有癥瘕結於下脘歷二十餘年癥瘕之積竟至滿腹常常作疼心中怔忡不能飲食求為診治因思此證久而且劇非輕劑所能療幸脈有根柢猶可調治遂投以理沖湯加水蛭三錢恐開破之力太過參耆又各加一錢又加天冬三錢以解參耆之熱數劑後遂能進食服至四十餘劑下瘀積若干癥瘕消有強半因有事還籍藥遂停止閲一載腹中之積又將復舊復來院求為診治仍照前方加減俾其補破涼熱之間與病體適宜仍服四十餘劑積下數塊又繼服三十餘劑瘀積大下其中或片或塊且有膜甚厚若胞形此時身體覺弱而腹中甚松暢恐瘀猶未淨又調以補正活血之藥以善其後王妻來院求為治癥瘕自言瘀積十九年矣滿腹皆系硬塊亦治以理沖湯為其平素氣虛將方中參耆加重三稜莪朮減半服數劑飲食增加將三稜莪朮漸增至原定分量又服數劑氣力較壯又加水蛭二錢樗雞俗名紅娘十枚又服二十餘劑屆行經之期隨經下紫黑血塊若干病愈其半又繼服三十劑屆經期瘀血遂大下滿腹積塊皆消又俾服生新化瘀之藥以善其後一少年因治吐血服藥失宜痃癖結於少腹在女子為癥瘕在男子為痃癖大如錦瓜按之甚堅硬其上相連有如瓜蔓一條斜衝心口飲食減少形體羸弱其脈微細稍數治以此湯服十餘劑痃癖全消附録廣西柳州賓來函一婦人十七歲自二七出嫁未見行經先因腹脅作疼求為診治投以活絡效靈丹立愈繼欲調其月事投以理沖湯三劑月經亦通三日未止猶恐瘀血未化改用王清任少腹逐瘀湯亦三劑其人從此月事調順身體強壯矣理沖丸治同前證水蛭一兩不用炙生黃耆一兩半生三稜五錢生莪朮五錢當歸六錢知母六錢生桃仁六錢帶皮尖上藥七味共為細末煉蜜為丸桐子大開水送服二錢早晚各一次仲景抵當湯大黃蟅蟲丸百勞丸皆用水蛭而後世畏其性猛鮮有用者是未知水蛭之性也神農本草經曰水蛭氣味鹹平無毒主逐惡血瘀血月閉破癥瘕積聚無子利水道徐靈胎注云凡人身瘀血方阻尚有生氣者易治阻之久則生氣全消而難治蓋血既離經與正氣全不相屬投之輕藥則拒而不納藥過峻又轉能傷未敗之血故治之極難水蛭最善食人之血而性又遲緩善入遲緩則生血不傷善入則堅積易破借其力以消既久之滯自有利而無害也觀神農本草經之文與徐氏之注則水蛭功用之妙為何如哉特是徐氏所謂遲緩善入者人多不解其理蓋水蛭行於水中原甚遲緩其在生血之中猶水中也故生血不傷也著人肌肉即緊貼善入其遇堅積之處猶肌肉也故堅積易消也方中桃仁不去皮尖者以其皮赤能入血分尖乃生髮之機又善通氣分楊玉衡寒溫條辨曾有斯説愚疑其有毒未敢遽信遂將帶皮生桃仁嚼服一錢心中安然以後始敢連皮尖用之至於不炒用而生用者凡果中之仁皆含生髮之氣原可借之以流通既敗之血也神農本草經百種録注曰桃得三月春和之氣以生而花鮮明似血故凡血瘀血枯之疾不能調和暢達者此能入於其中而和之散之然其生血之功少而去瘀之功多者蓋桃核本非血類實不能有所補益若癥瘕皆已敗之血非生氣不能流通桃之生氣在於仁而味苦又能開泄故能逐舊而不傷新也夫既借其生氣以流通氣血不宜炒用可知也若入丸劑蒸熟用之亦可附方祕傳治女子干病方用紅蛹螺榆樹內紅蟲大如蠶二個樗樹此樹如椿而味臭俗名臭椿莢二個人指甲全的壯年男子發三根用樹莢夾𤟤螺指甲以發纏之將發麵饅頭如大橘者一個開一孔去中瓤俾可容藥納藥其中仍將外皮原開下者杜孔上木炭火煨存性為細末用黃酒半斤燉開兌童便半茶盅送服忌腥冷驚恐惱怒此方用過數次皆驗瘀血開時必吐衄又兼下血不必驚恐移時自愈以治經水一次未來者尤效安沖湯治婦女經水行時多而且久過期不止或不時漏下白朮六錢炒生黃耆六錢生龍骨六錢搗細生牡蠣六錢搗細大生地六錢生杭芍三錢海螵蛸四錢搗細茜草三錢川續斷四錢友人劉其長子婦經水行時多而且久淋漓八九日始斷數日又復如故醫治月餘初稍見輕繼又不愈延愚診視觀所服方即此安沖湯去茜草螵蛸遂仍將二藥加入一劑即愈又服一劑永不反復劉疑而問曰茜草螵蛸治此證如此效驗前醫何為去之答曰彼但知茜草螵蛸能通經血而未見內經用此二藥雀卵為丸鮑魚湯送下治傷肝之病時時前後血也故於經血過多之證即不敢用不知二藥大能固澀下焦為治崩之主藥也一婦人年三十餘夫妻反目惱怒之餘經行不止且又甚多醫者用十灰散加減連服四劑不效後愚診視其右脈弱而且濡詢其飲食多寡言分毫不敢多食多即泄瀉遂投以此湯去黃耆將白朮改用一兩一劑血止而瀉亦愈又服一劑以善其後一婦人年二十餘小産後數日惡露已盡至七八日忽又下血延醫服藥二十餘日不止診其脈洪滑有力心中熱而且渴疑其夾雜外感詢之身不覺熱又疑其血熱妄行遂將方中生地改用一兩又加知母一兩服後血不止而熱渴亦如故因思此證實兼外感無疑遂改用白虎加人參湯以山藥代粳米方中石膏重用生者三兩煎湯兩盅分兩次溫飲下外感之火遂消血亦見止仍與安沖湯一劑遂全愈又服數劑以善其後附録直隸青縣張來函王氏婦年十九歲因殤子過痛肝氣不暢經水行時多而且久或不時漏下前服逍遙歸脾等藥皆無效診其脈左關尺及右尺皆浮弦一息五至強口乾不思食腰疼無力乃血虧而有熱也遵將女科方安沖湯去耆術加麥冬霍石斛香附米俾服之二劑血止六劑後食量增加口乾腰疼皆愈繼將湯劑製作丸藥徐徐服之月事亦從此調矣直隸鹽山孫來函一九二四年七月友人張之母因籌辦娶兒媳事勞心過度小便下血不止其血之來瀝瀝有聲請為診視舉止不定氣息微弱右脈弦細左脈弦硬為開安沖湯服後稍愈翌日晨起忽然昏迷其家人甚恐又請診視其脈尚和平知其昏迷系黃耆升補之力稍過遂仍用原方加赭石八錢一劑而愈家族嬸有下血證醫治十餘年時愈時發終未除根一九二六年六月病又作請為診視治以傅青主女科治老婦血崩方遵師訓加生地黃一兩一服即愈七月病又反復治以安沖湯方以其心中覺涼加乾薑二錢一劑病又愈斯年初秋李姓之女年十七歲下血不止面唇皆白六脈細數治以安沖湯重用山萸肉三劑而愈固沖湯治婦女血崩白朮一兩炒生黃耆六錢龍骨八錢煅搗細牡蠣八錢煅搗細萸肉八錢去淨核生杭芍四錢海螵蛸四錢搗細茜草三錢棕邊炭二錢五倍子五分軋細藥汁送服脈象熱者加大生地一兩涼者加烏附子二錢大怒之後因肝氣衝激血崩者加柴胡二錢若服兩劑不愈去棕邊炭加真阿膠五錢另燉同服服藥覺熱者宜酌加生地從前之方龍骨牡蠣皆生用其理已詳於理沖丸下此方獨用煅者因煅之則收澀之力較大欲借之以收一時之功也一婦人年三十餘陡然下血兩日不止及愚診視已昏憒不語周身皆涼其脈微弱而遲知其氣血將脫而元陽亦脫也遂急用此湯去白芍加野臺參八錢烏附子三錢一劑血止周身皆熱精神亦復仍將白芍加入再服一劑以善其後子曾治一婦人年四十許驟得下血證甚劇半日之間即氣息奄奄不省人事其脈右寸關微見如水上浮麻不分至數左部脈皆不見急用生黃耆一兩大火煎數沸灌之六部脈皆出然微細異常血仍不止觀其形狀呼氣不能外出又時有欲大便之意知其為大氣下陷也遂為開固沖湯方將方中黃耆改用一兩早十一點鐘將藥服下至晚三點鐘即愈如平時後子在京又治一血崩證先用固沖湯不效加柴胡二錢一劑即愈足見柴胡升提之力可為治崩要藥或問血崩之證多有因其人暴怒肝氣鬱結不能上達而轉下衝腎關致經血隨之下注者故其病俗亦名之曰氣衝茲方中多用澀補之品獨不慮於肝氣鬱者有妨礙乎答曰此證雖有因暴怒氣衝而得者然當其血大下之後血脫而氣亦隨之下脫則肝氣之郁者轉可因之而開且病急則治其標此證誠至危急之病也若其證初得且不甚劇又實系肝氣下衝者亦可用升肝理氣之藥為主而以收補下元之藥輔之也附方傅青主女科有治老婦血崩方試之甚效其方用生黃耆一兩當歸一兩酒洗桑葉十四片三七末三錢藥汁送下水煎服二劑血止四劑不再發若覺熱者用此方宜加生地兩許又諸城友人王傳一治血崩祕方用青萊蔔生搗取汁加白糖數匙微火燉溫陸續飲至三大盅必愈又西藥中有麥角原黴麥上所生之小角其性最善收攝血管能治一切失血之證而對於下血者用之尤效角之最大者長近寸許以一枚和乳糖無乳糖可代以白蔗糖研細可作兩次服愚常用之與止血之藥並服恆有捷效附治女子血崩有兩種草藥一種為宿根之草一根恆生數莖高不盈尺葉似地膚微寬厚則加倍其色緑而微帶蒼色孟夏開小白花結實如杜梨色如其葉老而微黃多生於宅畔路旁板硬之地俗呼為𭷦牛蛋又名臭科子然實未有臭味初不知其可入藥也戊辰孟夏愚有事回籍有南關王氏婦患血崩服藥不效有人教用此草連根實銼碎煮湯飲之其病頓愈後愚回津言及此方門生李謂此方余素知之若加黑豆一小握用水酒各半煎湯則更效矣一種為當年種生之草棵高尺余葉圓而有尖色深緑季夏開小白花五出黃蕊結實大如五味狀若小茄嫩則緑熟則紅老則紫黑中含甜漿可食俗名野茄子有山之處呼為山茄子奉省醫者多采此草陰乾備用若遇血崩時將其梗葉實共切碎煎湯服之立愈在津曾與友人張言及此草張謂此即本草綱目之龍葵一名天茄子一名老鴉睛草者是也而愚查本草綱目龍葵言治吐血不止未嘗言治血崩然治吐血之藥恆兼能治下血若三七茜草諸藥是明徵也以遍地皆有之草而能治如此重病洵堪珍哉附録直隸青縣張來函族姊適徐姓年三十餘有妊流産已旬日矣忽然下血甚多頭暈腹脹脈小無力知為衝脈滑脫之徵證豫以固沖湯加柴胡錢半歸身二錢服藥三劑即止俾繼服坤順至寶丹以善其後直隸鹽山李來函天津趙妻年四十餘歲行經過期不止諸治不效延弟診視見兩部之脈皆微細無力為開固沖湯原方豫之服數劑即全收功因思如此年歲血分又如此受傷諒從此斷生育矣不意年餘又産一子安然無恙蓋因固沖湯止血兼有補血之功也又天津張妻年二十四歲因小産後血不止者綿延月餘屢經醫治無效診其脈象微細而數為開固沖湯方因其脈數加生地一兩服藥後病雖見輕而不見大功反復思索莫得其故細詢其藥價過賤忽憶人言此地藥房所鬻黃耆有真有假今此方無顯著之功效或其黃耆過劣也改用口黃耆連服兩劑全愈由斯知藥物必須地道真正方效也溫沖湯治婦人血海虛寒不育生山藥八錢當歸身四錢烏附子二錢肉桂二錢去粗皮後入補骨脂三錢炒搗小茴香二錢炒核桃仁二錢紫石英八錢煅研真鹿角膠二錢另燉同服若恐其偽可代以鹿角霜三錢人之血海其名曰沖在血室之兩旁與血室相通上隸於胃陽明經下連於腎少陰經有任脈以為之擔任督脈為之督攝帶脈為之約束陽維陰維陽蹺陰蹺為之擁護共為奇經八脈此八脈與血室男女皆有在男子則沖與血室為化精之所在女子則沖與血室實為受胎之處內經上古通天論所謂太衝脈盛月事以時下故有子者是也是以女子不育多責之衝脈郁者理之虛者補之風襲者祛之濕勝者滲之氣化不固者固攝之陰陽偏勝者調劑之衝脈無病未有不生育者而愚臨證實驗以來凡其人素無他病而竟不育者大抵因相火虛衰以致沖不溫暖者居多因為制溫沖湯一方其人若平素畏坐涼處畏食涼物經脈調和而艱於生育者即與以此湯服之或十劑或數十劑遂能生育者多矣一婦人自二十出嫁至三十未育子女其夫商治於愚因細詢其性質稟賦言生平最畏寒涼熱時亦不敢食瓜果至經脈則大致調和偶或後期兩三日知其下焦虛寒因思神農本草經謂紫石英氣味甘溫治女子風寒在子宮絶孕十年無子遂為擬此湯方中重用紫石英六錢取其性溫質重能引諸藥直達於沖中而溫暖之服藥三十餘劑而畏涼之病除後數月遂孕連生子女益信神農本草經所謂治十年無子者誠不誤也清帶湯治婦女赤白帶下生山藥一兩生龍骨六錢搗細生牡蠣六錢搗細海螵蛸四錢去淨甲搗茜草三錢單赤帶加白芍苦參各二錢單白帶加鹿角霜白朮各三錢帶下為衝任之證而名謂帶者蓋以奇經帶脈原主約束諸脈衝任有滑脫之疾責在帶脈不能約束故名為帶也然其病非僅滑脫也若滯下然滑脫之中實兼有瘀滯其所瘀滯者不外氣血而實有因寒因熱之不同此方用龍骨牡蠣以固脫用茜草海螵蛸以化滯更用生山藥以滋真陰固元氣至臨證時遇有因寒者加溫熱之藥因熱者加寒涼之藥此方中意也而愚擬此方則又別有會心也嘗考神農本草經龍骨善開癥瘕牡蠣善消癙瘻是二藥為收澀之品而兼具開通之力也烏鰂魚骨即海螵蛸茹蘆即茜草是二藥為開通之品而實具收澀之力也四藥彙集成方其能開通者兼能收澀能收澀者兼能開通相助為理相得益彰一婦人年二十餘患白帶甚劇醫治年餘不愈後愚診視脈甚微弱自言下焦涼甚遂用此方加乾薑六錢鹿角霜三錢連服十劑全愈又一媼年六旬患赤白帶下而赤帶多於白帶亦醫治年餘不愈診其脈甚洪滑自言心熱頭昏時覺眩暈已半載未起床矣遂用此方加白芍六錢數劑白帶不見而赤帶如故心熱頭眩暈亦如故又加苦參龍膽草白頭翁各數錢連服七八劑赤帶亦愈而諸疾亦遂全愈自擬此方以來用治帶下愈者不可勝數而獨載此兩則者誠以二證病因寒熱懸殊且年少者用此方反加大熱之藥年老者用此方反加苦寒之藥欲臨證者當知審證用藥不可拘於年歲之老少也按白頭翁不但治因熱之帶證甚效也剖取其鮮根以治血淋溺血與大便下血之因熱而得者甚效誠良藥也是以仲景治厥陰熱痢有白頭翁湯也帶證若服此湯未能除根者可用此湯送服祕真丹一錢帶下似滯下之説愚向持此論後觀西法亦謂大腸病則流白痢子宮病則流白帶其理相同法用兒茶白礬石榴皮沒石子等水洗之若此證之劇者兼用其外治之法亦可又其內治白帶法用沒石子一兩搗爛水一斤半煎至一斤每溫服一兩日三次或研細作粉每服五分日二次亦可又可單以之熬水洗之或用注射器注射之按沒石子味苦而澀苦則能開澀則能斂一藥而具此兩長原與拙擬清帶湯之意相合且其收斂之力最勝凡下焦滑脫之疾或大便滑瀉或小便不禁或男子遺精或女子崩漏用之皆效驗今之醫者多忽不知用惜哉又東人中將湯治白帶亦甚效玉燭湯下載有其方可採用若以治赤帶方中官桂丁香宜斟酌少用苦參宜多用赤白二帶赤者多熱白者多涼而辨其涼熱又不可盡在赤白也宜細詢其自覺或涼或熱參以脈之或遲或數有力無力則涼熱可辨矣治法宜用收澀之品而以化瘀通滯之藥佐之清帶湯證偏熱者加生杭芍生地黃熱甚者加苦參黃柏或兼用防腐之藥若金銀花旱三七鴉膽子仁皆可酌用證偏涼者加白朮鹿角膠涼甚者加乾薑桂附小茴香近閲杭州醫報載有俗傳治白帶便方用緑豆芽連頭根三斤洗淨加水兩大碗煎透去渣加生薑汁三兩黃蔗糖四兩慢火收膏每晨開水沖服約十二日服一料服至兩料必愈按此方用之數次頗有效驗加味麥門冬湯治婦女倒經干寸冬五錢帶心野臺參四錢清半夏三錢生山藥四錢以代粳米生杭芍三錢丹參三錢甘草二錢生桃仁二錢帶皮尖搗大棗三枚捭開婦女倒經之證陳修園女科要旨借用金匱麥門冬湯可謂特識然其方原治火逆上氣咽喉不利今用以治倒經必略為加減而後乃與病證吻合也或問金匱麥門冬湯所主之病與婦人倒經之病迥別何以能借用之而有效驗答曰沖為血海居少腹之兩旁其脈上隸陽明下連少陰少陰腎虛其氣化不能閉藏以收攝沖氣則沖氣易於上干陽明胃虛其氣化不能下行以鎮安沖氣則沖氣亦易於上干沖中之氣既上干沖中之血自隨之上逆此倒經所由來也麥門冬湯於大補中氣以生津液藥中用半夏一味以降胃安沖且以山藥代粳米以補腎斂沖於是沖中之氣安其故宅沖中之血自不上逆而循其故道矣特是經脈所以上行者固多因沖氣之上干實亦下行之路有所壅塞觀其每至下行之期而後上行可知也故又加芍藥丹參桃仁以開其下行之路使至期下行毫無滯礙是以其方非為治倒經而設而略為加減即以治倒經甚效愈以嘆經方之函蓋無窮也用此方治倒經大抵皆效而間有不效者以其兼他證也曾治一室女倒經年餘不愈其脈象微弱投以此湯服藥後甚覺短氣再診其脈微弱益甚自言素有短氣之病今則益加重耳恍悟其胸中大氣必然下陷故不任半夏之降也遂改用拙擬升陷湯連服十劑短氣愈而倒經之病亦愈一少婦倒經半載不愈診其脈微弱而遲兩寸不起呼吸自覺短氣知其亦胸中大氣下陷亦投以升陷湯連服數劑短氣即愈身體較前強壯即停藥不服其月經水即順逾十月舉男矣或問倒經之證既由於沖氣胃氣上逆大氣下陷者其氣化升降之機正與之反對何亦病倒經乎答曰此理甚微奧人之大氣原能斡旋全身為諸氣之綱領故大氣常充滿於胸中自能運轉胃氣使之下降鎮攝沖氣使不上衝大氣一陷綱領不振諸氣之條貫多紊亂此乃自然之理也是知沖氣胃氣之逆非必由於大氣下陷而大氣下陷者實可致沖胃氣逆也致病之因既不同用藥者豈可膠柱鼓瑟哉壽胎丸治滑胎菟絲子四兩炒燉桑寄生二兩川續斷二兩真阿膠二兩上藥將前三味軋細水化阿膠和為丸一分重干足一分每服二十丸開水送下日再服氣虛者加人參二兩大氣陷者加生黃耆三兩食少者加炒白朮二兩涼者加炒補骨脂二兩熱者加生地二兩胎在母腹若果善吸其母之氣化自無下墜之虞且男女生育皆賴腎臟作強菟絲大能補腎腎旺自能蔭胎也寄生能養血強筋骨大能使胎氣強壯故神農本草經載其能安胎續斷亦補腎之藥阿膠系驢皮所熬最善伏藏血脈滋陰補腎故神農本草經亦載其能安胎也至若氣虛者加人參以補氣大氣陷者加黃耆以升補大氣飲食減少者加白朮以健補脾胃涼者加補骨脂以助腎中之陽補骨脂善保胎修園曾詳論之熱者加生地黃以滋腎中之陰臨時斟酌適宜用之無不效者此方乃思患預防之法非救急之法若胎氣已動或至下血者又另有急救之方曾治一少婦其初次有妊五六月而墜後又有妊六七月間忽胎動下血急投以生黃耆生地黃各二兩白朮山萸肉去淨核龍骨煅搗牡蠣煅搗各一兩煎湯一大碗頓服之胎氣遂安將藥減半又服一劑後舉一男強壯無恙流産為婦人恆有之病而方書所載保胎之方未有用之必效者誠以保胎所用之藥當注重於胎以變化胎之性情氣質使之善吸其母之氣化以自養自無流産之虞若但補助妊婦使其氣血壯旺固攝以為母強自能蔭子此又非熟籌完全也是以愚臨證考驗以來見有屢次流産者其人恆身體強壯分毫無病而身體軟弱者恐生育多則身體愈弱欲其流産而偏不流産於以知或流産或不流産不盡關於妊婦身體之強弱實兼視所受之胎善吸取其母之氣化否也由斯而論愚於千百味藥中得一最善治流産之藥乃菟絲子是也壽胎丸重用菟絲子為主藥而以續斷寄生阿膠諸藥輔之凡受妊之婦於兩月之後徐服一料必無流産之弊此乃於最易流産者屢次用之皆效至陳修園謂宜用大補大溫之劑使子宮常得暖氣則胎自日長而有成彼蓋因其夫人服白朮黃芩連墜胎五次後服四物湯加鹿角膠補骨脂續斷而胎安遂疑涼藥能墜胎篤信熱藥能安胎不知黃芩之所以能墜胎者非以其涼也神農本草經謂黃芩下血閉豈有善下血閉之藥而能保胎者乎蓋漢唐以前名醫用藥皆謹遵神農本草經所以可為經方用其方者鮮有流弊逮至宋元以還諸家恆師心自智其用藥或至顯背神農本草經是以醫如丹溪猶粗忽如此竟用黃芩為保胎之藥俾用其方者不惟無益而反有所損此所以為近代之名醫也所可異者修園固篤信神農本草經者也何於用白朮黃芩之墜胎不知黃芩之能開血閉而但謂其性涼不利於胎乎究之胎得其養全在溫度適宜過涼之藥固不可以保胎即藥過於熱亦非所以保胎也惟修園生平用藥喜熱惡涼是以立論稍有所偏耳安胃飲治惡阻清半夏一兩溫水淘洗兩次毫無礬味然後入煎淨青黛三錢赤石脂一兩用作飯小鍋煎取清汁一大碗調入蜂蜜二兩徐徐溫飲下一次只飲一口半日服盡若服後吐仍未止或其大便燥結者去石脂加生赭石軋細一兩若嫌青黛微有藥味者亦可但用半夏赭石或問神農本草經謂赭石能墜胎此方治惡阻而有時以赭石易石脂獨不慮其有墜胎之弊乎答曰惡阻之劇者飲水一口亦吐出其氣化津液不能下達恆至大便燥結旬余不通其甚者或結於幽門胃下口欄門大小腸相接處致上下關格不通滿腹作疼此有關性命之證也夫病既危急非大力之藥不能挽回況赭石之性原非開破其鎮墜之力不過能下有形滯物若胎至六七個月服之或有妨礙至惡阻之時不過兩三個月胎體未成惟是經血凝滯赭石毫無破血之性是以服之無妨且嘔吐者其沖氣胃氣皆上逆借赭石鎮逆之力以折其上逆之機氣化乃適得其平內經所謂有故無殞亦無殞也愚治惡阻之證遇有上脘固結旬日之間勺飲不能下行無論水與藥入口須臾即吐出群醫束手諉謂不治而愚放膽重用生赭石數兩煎湯一大碗徐徐溫飲下吐止結開便通而胎亦無傷拙擬參赭鎮氣湯及赭石解下載有詳案可考也大順湯治産難不可早服必胎衣破後小兒頭至産門者然後服之野黨參一兩當歸一兩生赭石二兩軋細用衛足花子炒爆一錢作引或丈菊花瓣一錢作引皆可無二物作引亦可或疑赭石乃金石之藥不可放膽重用不知赭石性至和平雖重墜下行而不傷氣血況有黨參一兩以補氣當歸一兩以生血且以參歸之微溫以濟赭石之微涼溫涼調和愈覺穩妥也矧産難者非氣血虛弱即氣血壅滯不能下行人參當歸雖能補助氣血而性皆微兼升浮得赭石之重墜則力能下行自能與赭石相助為理以成催生開交骨之功也至於當歸之滑潤原為利産良藥與赭石同用其滑潤之力亦愈增也族侄婦臨盆兩日不産用一切催生藥胎氣轉覺上逆為制此湯一劑即産下一婦人臨産交骨不開困頓三日勢甚危急亦投以此湯一劑而産自擬得此方以來救人多矣放膽用之皆可隨手奏效附衛足花即葵花其子即冬葵子緣此花若春日早種當年即可結子而用以催生則季夏種之經冬至明年結子者尤效故名曰冬葵子今藥坊所鬻者皆以丈菊子為冬葵子殊屬差誤蓋古之所謂葵與俗所謂向日葵者原非一種古所謂葵即衛足花俗呼為守足花者是也因此花先生叢葉自葉中心出莖莖之下邊盡被叢葉衛護故曰衛足莖高近一丈花多紅色與木槿相似葉大如木芙蓉此為宿根植物季夏下種至次年孟夏始開花結實大如錢作扁形其中子如榆莢為其經冬依然發生故其結之子名為冬葵子須於鮮嫩之時採取則多含蛋白質故能有益於人聖惠方謂採其子陰乾是當鮮嫩之時採而陰乾之也若過老則在科上自干而無事陰乾矣又有一種二三月下種至六月開花其下無叢生之葉不能衛足而其莖葉花皆與葵無異其治療之功效亦大致相同即藥品中之蜀葵本草綱目謂花之白者治痎瘧是衛足葵與蜀葵皆治瘧也至於俗所謂向日葵者各種本草皆未載惟群芳譜載之本名丈菊一名西番葵一名迎陽葵且謂其性能墮胎然用其墮胎之力以催生則誠有效驗是以大順湯用其花瓣作引也向日葵莖長丈許干粗如竹葉大如苘花大如盤盂單瓣黃色其花心成窠如蜂房逮中心結子成熟而周遭花瓣不凋枯其子人恆炒食之知其無毒且知其性滑曾單用以治淋甚效後與鴉膽子同用鴉膽子去皮四十粒用丈菊子一兩炒搗煎湯送下治花柳毒淋亦甚效然不知其能治瘧也近閲紹興醫藥學報載盧述葵能醫瘧一節則丈菊誠可列於藥品矣丈菊花英催生之力實勝於子曾見有單用丈菊花英催生服之即效者惜人多不知耳至於用衛足子催生當分老嫩兩種鮮嫩衛足子須用數兩搗爛煮汁服若用老者當用兩許微火炒裂其甲煎湯飲之和血熄風湯治産後受風發搐當歸一兩生黃耆六錢真阿膠四錢不炒防風三錢荊芥三錢川芎三錢生杭芍二錢紅花一錢生桃仁錢半帶皮尖搗此方雖治産後受風而實以補助氣血為主蓋補正氣即所以逐邪氣而血活者風又自去也血活風自去方書成語若産時下血過多或發汗過多以致發搐者此方仍不可用為其猶有發表之藥也當滋陰養血以榮其筋熄其內風其搐自止若血虛而氣亦虛者又當以補氣之藥輔之而補氣之藥以黃耆為最因黃耆不但補氣實兼能治大風也神農本草經謂黃耆主大風一婦人産後七八日發搐服發汗之藥數劑不效詢方於愚因思其屢次發汗不效似不宜再發其汗以傷其津液遂單用阿膠一兩水融化服之而愈一婦人産後十餘日周身汗出不止且發搐治以山萸肉去淨核生山藥各一兩煎服兩劑汗止而搐亦愈東海漁家婦産後三日身冷無汗發搐甚劇時愚遊海濱其家人造寓求方其地隔藥房甚遠而海濱多産麻黃可以採取遂俾取麻黃一握同魚鰾膠一具煎湯一大碗乘熱飲之得汗而愈用魚鰾膠者亦防其下血過多因陰虛而發搐且以其物為漁家所固有也一婦人産後發汗過多覆被三層皆濕透因致心中怔忡精神恍惚時覺身飄飄上至屋頂此虛極將脫而神魂飛越也延愚診視見其汗出猶不止六脈皆虛浮按之即無急用生山藥淨萸肉各一兩生杭芍四錢煎服汗止精神亦定翌日藥力歇又病而反復時愚已旋里病家復持方來詢為添龍骨牡蠣皆不用煅各八錢且囑其服藥數劑其病必愈孰意藥坊中竟謂方中藥性過涼産後斷不宜用且言此證系産後風彼有治産後風成方屢試屢驗慫恿病家用之病家竟誤用其方汗出不止而脫夫其證原屬過汗所致而再以治産後風發表之藥何異鴆毒斯可為發汗不審虛實者之炯戒矣傅青主女科曰産後氣血暴虛百骸少血濡養忽然口緊牙緊手足筋脈拘搐類中風癇痙雖虛火泛上有痰皆當以末治之勿執偏門而用治風消痰方以重虛産婦也當用生化湯加參耆以益其氣又曰産後婦人惡寒噁心身體顫動發熱作渴人以為産後傷寒也誰知其氣血兩虛正不敵邪而然乎大抵人之氣不虛則邪斷難入産婦失血過多其氣必大虛氣虛則皮毛無衛邪原易入不必戶外之風來襲體也即一舉一動風可乘虛而入然産後之風易入亦易出凡有外感之邪俱不必祛風況産後之惡寒者寒由內生也發熱者熱由內弱也身顫者顫由氣虛也治其內寒外寒自散治其內弱外熱自解壯其元氣而身顫自除也按傅氏之論甚超特其雖有外感不必祛風二句不無可議夫産後果有外感原當治以外感之藥惟宜兼用補氣生血之藥以輔翼之耳若其風熱已入陽明之府表裡俱熱脈象洪實者雖生石膏亦可用故金匱有竹皮大丸治婦人乳中虛煩亂嘔逆方中原有石膏神農本草經石膏治産乳原有明文特不宜與知母並用又宜仿白虎加人參湯之意重用人參以大補元氣更以玄參代知母始能托邪外出則石膏之寒涼得人參之溫補能逗留胃中以化燥熱不至直趨下焦而與産婦有礙也石膏解下曾詳論之附方醫林改錯治産後風有黃耆桃紅湯方用生黃耆半斤帶皮尖生桃仁三錢搗碎紅花二錢水煎服按産後風項背反張者此方最效附方俗傳治産後風方當歸五錢麻黃紅花白朮各三錢大黃川芎肉桂紫菀各二錢煎服按此方效驗異常即至牙關緊閉不能用藥者將齒拗開灌之亦多愈者人多畏其有大黃而不敢用不知西人治産後風亦多用破血之藥蓋以産後有瘀血者多此證用大黃以破之所謂血活風自去也況猶有麻桂之辛熱歸術之補益以調燮之乎滋陰清胃湯治産後溫病陽明府實表裡俱熱者玄參兩半當歸三錢生杭芍四錢甘草錢半茅根二錢上藥五味煎湯兩盅分二次溫服一次即愈者停後服産後忌用寒涼而溫熱入陽明府後又必用寒涼方解因此醫者恆多束手不知石膏玄參神農本草經皆明載治産乳是以熱入陽明之重者可用白虎加人參以山藥代粳米湯更以玄參代知母其稍輕者治以此湯皆可隨手奏效愚用此兩方救人多矣臨證者當篤信神農本草經不可畏石膏玄參之寒涼也況石膏玄參神農本草經原皆謂其微寒並非甚寒涼之藥也滋乳湯治少乳其乳少由於氣血虛或經絡瘀者服之皆有效驗生黃耆一兩當歸五錢知母四錢玄參四錢穿山甲二錢炒搗六路通大者三枚搗王不留行四錢炒用絲瓜瓤作引無者不用亦可若用豬前蹄兩個煮湯用以煎藥更佳消乳湯治結乳腫疼或成乳癰新起者一服即消若已作膿服之亦可消腫止疼俾其速潰並治一切紅腫瘡瘍知母八錢連翹四錢金銀花三錢穿山甲二錢炒搗栝蔞五錢切絲丹參四錢生明乳香四錢生明沒藥四錢在德州時有張姓婦患乳癰腫疼甚劇投以此湯兩劑而愈然猶微有疼時慫恿其再服一兩劑以消其芥蒂以為已愈不以為意隔旬日又復腫疼復求為治療愚曰此次服藥不能盡消必須出膿少許因其舊有芥蒂未除至今已潰膿也後果服藥不甚見效遂入西醫院中治療旬日後其瘡外破一口醫者用刀闊之以期便於敷藥又旬日內潰益甚滿乳又破七八個口醫者又欲盡闊之使通病人懼不敢治強出院還家復求治於愚見其各口中皆膿乳並流外邊實不能敷藥然內服湯藥助其肌肉速生自能排膿外出許以十日可為治愈遂將內託生肌散作湯藥服之每日用藥一劑煎服二次果十日全愈附方表侄劉從愚學醫曾得一治結乳腫疼兼治乳癰方用生白礬明雄黃松蘿茶各一錢半共研細分作三劑日服一劑黃酒送下再多飲酒數杯更佳此方用之屢次見效真奇方也若無松蘿茶可代以好茶葉升肝舒郁湯治婦女陰挺亦治肝氣虛弱鬱結不舒生黃耆六錢當歸三錢知母三錢柴胡一錢五分生明乳香三錢生明沒藥三錢川芎一錢五分肝主筋肝脈絡陰器肝又為腎行氣陰挺自陰中挺出形狀類筋之所結病之原因為肝氣鬱而下陷無疑也故方中黃耆與柴胡芎藭並用補肝即以舒肝而肝氣之陷者可升當歸與乳香沒藥並用養肝即以調肝而肝氣之郁者可化又恐黃耆性熱與肝中所寄之相火不宜故又加知母之涼潤者以解其熱也一婦人年三十餘患此證用陳氏女科要旨治陰挺方治之不效因憶傅青主女科有治陰挺之方其證得之産後因平時過怒傷肝産時又努力太過自産門下墜一片似筋非筋似肉非肉用升補肝氣之藥其證可愈遂師其意為制此湯服之數劑即見消十劑全愈一室女年十五因胸中大氣下陷二便常覺下墜而小便尤甚乃誤認為小便不通努力強便陰中忽墜下一物其形如桃微露其尖牽引腰際下墜作疼夜間尤甚劇時號呼不止投以理郁升陷湯將升麻加倍二劑疼止十劑後其物全消蓋理郁升陷湯原與升肝舒郁湯相似也資生通脈湯治室女月閉血枯飲食減少灼熱咳嗽白朮三錢炒生懷山藥一兩生雞內金二錢黃色的龍眼肉六錢山萸肉四錢去淨核枸杞果四錢玄參三錢生杭芍三錢桃仁二錢紅花錢半甘草二錢灼熱不退者加生地黃六錢或至一兩咳嗽者加川貝母三錢米殼二錢嗽止去之泄瀉者去玄參加熟地黃一兩雲苓片二錢或更酌將白朮加重服後瀉仍不止者可於服藥之外用生懷山藥細末煮粥攙入捻碎熟雞子黃數枚用作點心日服兩次瀉止後停服大便乾燥者加當歸阿膠各數錢小便不利者加生車前子三錢裝袋地膚子二錢或將芍藥善治陰虛小便不利加重肝氣鬱者加生麥芽三錢川芎莪朮各一錢汗多者將萸肉改用六錢再加生龍骨生牡蠣各六錢內經謂二陽之病發心脾有不得隱曲在女子為不月夫二陽者陽明胃腑也胃腑有病不能消化飲食推其病之所發在於心脾又推其心脾病之所發在於有不得隱曲凡不能自如者皆為不得隱曲蓋心主神脾主思人有不得隱曲其神思鬱結胃腑必減少酸汁化食賴酸汁歡喜則酸汁生者多憂思則酸汁生者少不能消化飲食以生血液所以在女子為不月也夫女子不月既由於胃腑有病不能消化飲食治之者自當調其脾胃使之多進飲食以為生血之根本故方中用白朮以健胃之陽使之瞤動有力飲食之消亦仗胃有瞤動山藥龍眼肉以滋胃之陰俾其酸汁多生雞內金原含有酸汁且能運化諸補藥之力使之補而不滯血虛者必多灼熱故用玄參芍藥以退熱又血虛者其肝腎必虛故用萸肉枸杞以補其肝腎甘草為補脾胃之正藥與方中萸肉並用更有酸甘化陰之妙桃仁紅花為破血之要品方中少用之非取其破血欲借之以活血脈通經絡也至方後附載因證加減諸藥不過粗陳梗概至於證之變更多端尤貴臨證者因時制宜耳滄州曹姓女年十六歲天癸猶未至飲食減少身體羸瘦漸覺灼熱其脈五至細而無力治以資生通脈湯服至五劑灼熱已退飲食加多遂將方中玄參芍藥各減一錢又加當歸懷牛膝各三錢服至十劑身體較前胖壯脈象亦大有起色又於方中加樗雞俗名紅娘蟲十枚服至七八劑天癸遂至遂減去樗雞再服數劑以善其後奉天馬氏女自十四歲月事已通至十五歲秋際因食瓜果過多泄瀉月餘方愈從此月事遂閉延醫診治至十六歲季夏病浸增劇因求為診治其身形瘦弱異常氣息微喘干嗽無痰過午潮熱夜間尤甚飲食減少大便泄瀉其脈數近六至微細無力俾先用生懷山藥細末八錢水調煮作粥又將熟雞子黃四枚捻碎攙粥中再煮一兩沸空心時服服後須臾又服西藥百布聖二瓦以助其消化每日如此兩次用作點心服至四日其瀉已止又服數日諸病亦稍見輕遂投以資生通脈湯去玄參加生地黃五錢川貝三錢連服十餘劑灼熱減十分之八飲食加多喘嗽亦漸愈遂將生地黃換作熟地黃又加懷牛膝五錢服至十劑自覺身體爽健諸病皆無惟月事猶未見又於方中加蟅蟲即土鱉蟲背多橫紋者真背光滑者非是五枚樗雞十枚服至四劑月事已通遂去蟅蟲樗雞俾再服數劑以善其後馬姓女十七歲自十六歲秋際因患右目生內障服藥不愈憂思過度以致月閉自臘月服藥直至次年孟秋月底不愈求為診治其人體質瘦弱五心煩熱過午兩顴色紅灼熱益甚心中滿悶飲食少許即停滯不下夜不能寐脈搏五至弦細無力為其飲食停滯夜不能寐投以資生通脈湯加生赭石研細四錢熟棗仁三錢服至四劑飲食加多夜已能寐灼熱稍退遂去棗仁減赭石一錢又加地黃五錢丹皮三錢服約十劑灼熱大減又去丹皮將龍眼肉改用八錢再加懷牛膝五錢連服十餘劑身體浸壯健因其月事猶未通下又加蟅蟲五枚樗雞十枚服至五劑月事已通然下者不多遂去樗雞地黃加當歸五錢俾服數劑以善其後三十治眼科方蒲公英湯治眼疾腫疼或胬肉遮睛或赤脈絡目或目睛脹疼或目疼連腦或羞明多淚一切虛火實熱之證鮮蒲公英四兩根葉莖花皆用花開殘者去之如無鮮者可用乾者二兩代之上一味煎湯兩大碗溫服一碗餘一碗乘熱熏洗按目疼連腦者宜用鮮蒲公英二兩加懷牛膝一兩煎湯飲之此方得之於言其母嘗患眼疾疼痛異常經延醫調治數月不愈有高姓媼告以此方一次即愈愚自得此方後屢試皆效夫蒲公英遍地皆有仲春生苗季春開花色正黃至初冬其花猶有開者狀類小菊其葉似大薊田家採取生啖以當菜蔬其功長於治瘡能消散癰疔毒火然不知其能治眼疾也使人皆知其治眼疾如此神效天下無瞽目之人矣古服食方有還少丹蒲公英連根帶葉取一斤洗淨勿令見天日晾乾用斗子解鹽即神農本草經大鹽曬於鬥之中者出山西解池一兩香附子五錢二味為細末入蒲公英水內淹一宿分為十二團用皮紙三四層裹扎定用六一泥即蚯蚓泥如法固濟灶內焙乾乃以武火煅通紅為度冷定取出去泥為末早晚擦牙漱之吐咽任便久久方效年未及八十者服之鬚髮反黑齒落更生年少服之至老不衰由是觀之其清補腎經之功可知且其味苦又能清心經之熱所以治眼疾甚效者或以斯歟磨翳水治目翳遮睛生爐甘石一兩蓬砂八錢膽礬二錢薄荷葉三錢蟬蛻三錢帶全足去翅土上藥五味將前三味藥臼搗細再將薄荷蟬蛻煎水一大盅用其水和所搗藥末入藥鉢內研至極細將浮水者隨水飛出連水別貯一器待片時將浮頭清水仍入鉢中和所餘藥渣研細仍隨水飛出如此不計次數以飛淨為度若飛過者還不甚細可再研再飛以極細為度制好連水貯瓶中勿令透氣用時將瓶中水藥調勻點眼上日五六次若目翳甚厚已成肉螺者加真藏硇砂二分另研調和藥水中此方效力全在甘石生用然生用則質甚硬又恐與眼不宜故必如此研細水飛然後可以之點眼磨翳散治目睛脹疼或微生雲翳或赤脈絡目或目眥潰爛或偶因有火視物不真生爐甘石三錢蓬砂二錢黃連一錢人指甲五分鍋焙脆無翳者不用上藥先將黃連搗碎泡碗內冷時兩三日熱時一日將泡黃連水過羅約得清水半茶盅再將餘三味搗細和黃連水入藥鉢中研之如研前藥之法以極細為度研好連水帶藥用大盤盛之白日置陰處晾之夜則露之若冬日微曬亦可若有風塵時蓋以薄紙俟干貯瓶中勿透氣用時涼水調和點眼上日三四次若有目翳人乳調和點之若目翳大而厚者不可用黃連水研藥宜用蟬蛻帶全足去翅土一錢煎水研之蓋微茫之翳得清火之藥即退若其翳已遮晴治以黃連成冰翳而不能消矣明目蓬硝水治眼疾暴發紅腫疼痛或眥多胬肉或漸生雲翳及因有火而眼即發乾昏花者蓬砂五錢芒硝三錢硝中若不明亮用水化開澄去其中泥土上藥和涼水多半盅研至融化用點眼上一日約點三十次若陳目病一日點十餘次冬日須將藥碗置熱水中候溫點之清腦黃連膏治眼疾由熱者黃連二錢為細末香油調如薄糊常常以鼻聞之日約二三十次勿論左右眼患證應須兩鼻孔皆聞目系神經連於腦腦部因熱生炎病及神經必生眼疾彼服藥無捷效者因所用之藥不能直達腦部故也愚悟得此理借鼻竅為捷徑以直達於腦凡眼目紅腫之疾及一切目疾之因熱者莫不隨手奏效益瞳丸治目瞳散大昏耗或覺視物乏力萸肉二兩去淨核野臺參六錢柏子仁一兩炒玄參一兩菟絲子一兩炒羊肝一具切片焙乾上藥共為細末煉蜜為丸桐子大每服三錢開水送下日兩次一婦人年三旬瞳子散大視物不真不能針黹屢次服藥無效其脈大而無力為制此丸服兩月全愈羊肝豬膽丸治同前證因有熱而益甚者羊肝一具切片曬乾冬日可用慢火焙乾上一味軋細用豬膽汁和為丸桐子大硃砂為衣每服二錢開水送下日再服按此方若用熊膽為丸更佳內地鮮熊膽不易得至乾者又難辨其真偽不如徑用豬膽汁為穩妥也附方護眉神應散治一切眼疾無論氣蒙火蒙肉螺雲翳或瞳人反背未過十年者皆見效方用爐甘石一兩煅透童便淬七次珍珠二顆大如緑豆以上者納通草中煅之珠爆即速取出血琥珀三分真梅片二分半兩錢五銖錢俗名馬鐙錢開元錢各一個皆煅紅醋淬七次共為細末乳調塗眉上日二三次一室女病目年餘醫治無效漸生雲翳愚為出方服之見輕停藥仍然反復後得此方如法制好塗數次即見輕未盡劑而愈妙哉按此方若加薄荷冰二分更效瞳人反背之證最為難治以其系目系神經病也蓋目系神經若一邊縱一邊縮目之光線必斜視物即不真若縱縮之距離甚大其瞳人即可反背治此證者當以養其目系神經為主此方多用金石珍貴之品其中含有寶氣凡物之含有寶氣者皆善能養人筋肉使筋肉不腐爛目系神經即腦氣筋之連於目者以此藥塗眉上中有冰片之善通竅透膜者能引藥氣直達腦部以養目系神經目系神經之病者自愈而瞳人反背及一切眼疾亦自愈矣附方治暴發眼便方其眼疾初得腫疼者用生薑三四錢食鹽一大撮同搗爛薄布包住蘸新汲井泉水擦上下眼皮屢蘸屢擦以擦至眼皮極熱為度擦完用溫水將眼皮洗淨輕者一次即愈重者一日擦兩次亦可愈然擦時須緊閉其目勿令藥汁入眼中附案晉書盛彥母氏失明躬自侍養母食必自哺之母病既久至於婢使數見捶鞭婢憤恨伺彥暫行取蠐螬炙飴之母食以為美然疑是異物密藏以示彥彥見之抱母慟哭絶而復蘇母目豁然從此遂愈按蠐螬生糞土中形狀如蠶俗名地蠶遍處皆有神農本草經謂主目中淫膚青翳白膜其善治目翳可知內障宜油炙服之外障宜取其汁滴目中三十一治咽喉方咀華清喉丹治咽喉腫疼大生地黃一兩切片蓬砂錢半研細將生地黃一片裹蓬砂少許徐徐嚼細咽之半日許宜將藥服完生地黃之性能滋陰清火無論虛熱實熱服之皆宜蓬砂能潤肺清熱化痰消腫止疼二藥並用功力甚大而又必細細嚼服者因其病在上煎湯頓服恐其力下趨而病轉不愈且細細嚼咽則藥之津液常清潤患處也此方愚用之屢矣隨手奏效者不勝紀矣咽喉之證有熱有涼有外感有內傷白喉忌表抉微一書此時盛行於世其所載之方與所載宜用宜忌之藥皆屬穩善惟其持論與方中所用之藥有自相矛盾處諄諄言忌表矣而其養陰清肺湯用薄荷二錢半豈非表藥乎至於他方中所用之葛根連翹亦發表之品也蓋白喉之證原亦溫病之類人之外膚肺主之人之內膚三焦主之蓋此證心肺先有蘊熱外感之邪又襲三焦而內逼心肺則心肺之熱遂與邪氣上並而現證於喉既有外邪原宜發表因有內熱實大忌用辛熱之藥發表惟薄荷連翹諸藥辛涼宣通復與大隊涼潤之藥並用既能散邪尤能清熱所以服之輒效也若其內熱熾盛外感原甚輕者其養陰清肺湯亦可用特其薄荷宜斟酌少用不必定用二錢半也至謂其喉間腫甚者加煅石膏四錢微有可議夫石膏之性生則散煅則斂熾盛之火散之則消斂之則實此又不可不知也況石膏生用原不甚涼故神農本草經謂微寒又何必如此之小心乎今將其養陰清肺湯詳録於下以備採用附方養陰清肺湯大生地一兩寸麥冬六錢生白芍四錢薄荷二錢半玄參八錢丹皮四錢貝母四錢生甘草二錢喉間腫甚者加生石膏原用煅石膏四錢大便燥結者加清寧丸二錢玄明粉二錢胸下脹悶加神麯焦山楂各二錢小便短赤者加木通澤瀉各一錢知母二錢燥渴者加天冬馬兜鈴各三錢面赤身熱或舌苔黃色者加金銀花四錢連翹二錢白喉之證間有服白喉忌表抉微諸方不效而反加劇者曾治一貴州人孫年二十得白喉證屢經醫治不外白喉忌表抉微諸方加減病日增重醫者諉謂不治後愚為診視其脈細弱而數黏涎甚多須臾滿口即得吐出知系脾腎兩虛腎虛氣化不攝則陰火上逆痰水上泛而脾土虛損又不能制之若脾土不虛不但能制痰水上泛並能制陰火上逆故其咽喉腫疼黏涎若是之多也投以六味地黃湯加於術又少加蘇子連服十劑全愈咽喉之證熱者居多然亦兼有寒者不可不知王洪緒曰咽喉之間素分毫無病頃刻之間或疼或悶此係虛寒陰火之證用肉桂炮薑甘草各五分置碗內浸以滾水仍將碗置於滾水中飲藥一口徐徐咽下立愈或用烏附之片塗以鮮蜜火炙透至黑取一片口含咽津至片不甜時再換一片亦立愈按王氏之説咽喉陡然疼悶者皆系因寒然亦有因熱者或其人素有蘊熱陡然為外感所束或勞碌過度或暴怒過度皆能使咽喉驟覺疼悶斯在臨證者於其人之身體性情動作之際細心考驗再參以脈象之虛實涼熱自無差謬若仍恐審證不確察其病因似寒而尤恐病因是熱可用蜜炙附子片試含一片以細驗其病之進退亦可趙晴初曰雞蛋能去喉中之風余治一幼童喉風證與清輕甘涼法稍加辛藥時止時發後有人教服雞蛋頂上針一孔每日生吞一枚不及十枚病愈不復發友人齊曰平陽何患喉疼醫者治以苦寒之藥愈治愈甚漸至舌硬後有人教用棉子油煎生雞蛋煎至外熟里仍微生日服二枚未十日遂大愈咽喉腫疼證有外治異功散方甚效其方用斑蝥一錢真血竭制乳香制沒藥上麝香全蠍大玄參上梅片各分半將斑蝥去翅足糯米拌炒以米色微黃為度去糯米用諸藥共研細瓶收貯勿令透氣遇有咽喉腫疼證將藥捏作小塊如黃豆粒大置在小膏藥上左腫貼右右腫貼左若左右俱腫均貼在結喉項間高骨旁邊軟處閲五六時即揭去膏藥有水泡用銀針挑破拭淨毒水能消腫止疼真救急之良方也三十二治牙疳方古方馬乳飲治青腿牙疳用青白馬乳早午晚隨擠隨服甚效如無青白馬雜色馬亦可若馬乳自他處取來可將碗置於開水盆中溫之此方出於醫宗金鑑其原注云此證自古方書罕載其名僅傳於雍正年間陶起麟謂凡病腿腫色青者其上必發牙疳凡病牙疳腐血者其下必發青腿二者相因而至推其病原皆因上為陽火炎熾下為陰寒閉郁以至陰陽上下不交各自為寒為熱凝結而生此證也相近內地亦間有之邊外雖亦有而不甚多惟內地人初居邊外得此證者十居七八蓋內地之人本不耐邊外嚴寒更不免坐臥濕地故寒濕之痰生於下致腿青腫其病形如雲片色似茄黑肉體頑硬所以步履艱難也又緣邊外缺少五穀多食牛羊等肉其熱與濕合蒸瘀於胃中毒火上熏致生牙疳牙齦浮腫出血若穿腮破唇腐爛色黑即為危候惟相傳有服馬乳之法用之頗有效驗云云按此證愚未見過友人毛曾遇此證治愈其方愚猶記其大概爰列於下以備採用金銀花五錢連翹三錢菊花三錢明乳香四錢明沒藥四錢懷牛膝五錢山楂片三錢真鹿角膠四錢搗為細末分兩次用頭煎二煎湯藥送服按此方若服之出汗即可見愈然方中連翹菊花發汗之力甚微恐服之不能出汗當於服藥之後再服西藥阿斯匹林一瓦則無不出汗矣至汗後服第二劑時宜將菊花減半牙疳散煅甘石二錢鏡面硃砂二分牛黃五釐珍珠五釐煅共研細日敷三次牙疳敷藤黃法己巳春閲滬上幸福醫學報載有章之言有誤用藤黃治愈走馬牙疳之事甚為奇異茲特録其原文於下以供醫界之研究丁卯三月余偕友數人偶至仁溏觀優有潘氏子年四歲患走馬牙疳起才三日牙齦腐化門牙已脫數枚下唇已潰穿其勢甚劇問尚有可救之理否詢其由則在發麻之後實為邪熱入胃毒火猖狂一發難遏證情危險告以只有白馬乳涼飲並不時洗之塗以人中白內服大劑白虎湯或有可救但勢已穿唇效否不敢必耳因書生石膏生知母生打寒水石象貝等為方與之其時同遊者有老醫倪因謂之曰牛黃研末外摻腐爛之處亦或可治遂彼此各散後數日則此兒竟已痊愈但下唇缺不能完因詢其用何物療治乃得速效若斯則曰用倪説急購藤黃屑而摻之果然一摻腐勢即定血水不流漸以結靨落痂只三日耳內服石膏等一方亦僅三服此兒獲愈因其無識誤聽牛黃為藤黃然以此一誤而竟治愈極重之危證開藥學中從古未有之實驗胡可以不志也嘗考李氏本草綱目蔓草中曾載藤黃而功用甚略至趙恕軒本草綱目拾遺言之甚詳雖曰有毒而可為內服之品且引粵志謂其性最寒可治眼疾味酸澀治癰腫止血化毒斂金瘡能除蟲同麻油白蠟熬膏敷金瘡湯火等傷止疼收口其效如神而其束瘡消毒之用又甚多可知此藥竟是外科中絶妙良藥而世多不知用者誤於李氏海藥本草有毒之兩字而張石頑更以能治蛀齒點之即落而附會為毒損骨傷腎於是畏之甚於蛇蠍實不知石頑不可信今之畫家常以入口雖曰與花青並用可解其毒余以為亦理想之談耳既曰性寒毒於何有然後知能愈牙疳正是寒涼作用且其味酸澀止血止疼收口除蟲皆其能治牙疳之切實發明也按走馬牙疳之原因有內傷外感之殊得於由內傷者輕而緩由外感者重而急此幼童得於麻疹之後其胃中蘊有瘟毒上攻是以三日之間即腐爛如此幸內服石膏寒水石外敷藤黃內外夾攻皆中要肯是以其毒易消結痂亦在三日內也若當牙疳初起之時但能用藥消其內蘊之毒熱即外不敷藥亦可治愈曾治天津於氏幼童年六七歲身出麻疹旬日之外熱不退牙齦微見腐爛其家人懼甚恐成走馬牙疳延愚診視脈象有力而微弦知毒熱雖實因病久者氣分有傷也問其大便三日未行遂投以大劑白虎加人參湯方中生石膏用三兩野黨參用四錢又加連翹數錢以托疹毒外出煎湯三茶盅俾分三次溫飲下又用羚羊角一錢煎水一大茶盅分數次當茶飲之盡劑熱退而病愈牙齦腐爛之處亦遂自愈三十三治瘡科方消瘰丸治瘰癧牡蠣十兩煅生黃耆四兩三稜二兩莪朮二兩朱血竭一兩生明乳香一兩生明沒藥一兩龍膽草二兩玄參三兩浙貝母二兩上藥十味共為細末蜜丸桐子大每服三錢用海帶五錢洗淨切絲煎湯送下日再服瘰癧之證多在少年婦女日久不愈可令信水不調甚或有因之成勞瘵者其證系肝膽之火上升與痰涎凝結而成初起多在少陽部位或項側或缺盆久則漸入陽明部位一顆壘然高起者為瘰數顆歷歷不斷者為癧身體強壯者甚易調治此方重用牡蠣海帶以消痰軟堅為治瘰癧之主藥恐脾胃弱者久服有礙故用黃耆三稜莪朮以開胃健脾三藥並用能開胃健脾十全育真湯下曾詳言之使脾胃強壯自能運化藥力以達病所且此證之根在於肝膽而三稜莪朮善理肝膽之郁此證之成堅如鐵石三稜莪朮善開至堅之結又佐以血竭乳香沒藥以通氣活血使氣血毫無滯礙瘰癧自易消散也而猶恐少陽之火熾盛加膽草直入肝膽以瀉之玄參貝母清肅肺金以鎮之且貝母之性善於療鬱結利痰涎兼主惡瘡玄參之性名醫別録謂其散頸下核開寶本草謂其主鼠瘻二藥皆善消瘰癧可知血竭色赤味辣色赤故入血分味辣故入氣分其通氣活血之效實較乳香沒藥為尤捷諸家本草未嘗言其辣且有言其但入血分者皆未細心實驗也然此藥偽者甚多必未研時微帶紫黑若血乾之色研之紅如雞血且以置熱水中則溶化須臾復凝結水底成塊者乃為真血竭曾治一少年項側起一瘰癧其大如茄上連耳下至缺盆求醫治療言服藥百劑亦不能保其必愈而其人家貧傭力為人藝田不惟無錢買如許多藥即服之亦不暇然其人甚強壯飲食甚多俾於一日三餐之時先用飯湯送服煅牡蠣細末七八錢一月之間消無芥蒂又治一婦人在缺盆起一瘰癧大如小橘其人亦甚強壯無他病俾煮海帶湯日日飲之半月之間用海帶二斤而愈若身體素虛弱者即煮牡蠣海帶但飲其湯脾胃已暗受其傷蓋其鹹寒之性與脾胃不宜也族侄女患此證治數年不愈為制此方服盡一料而愈消瘰膏消瘰癧生半夏一兩生山甲三錢生甘遂一錢生馬錢子四錢剪碎皂角三錢朱血竭二錢上藥前五味用香油煎枯去渣加黃丹收膏火候到時將血竭研細攙膏中熔化和勻隨瘡大小攤作膏藥臨用時每藥一帖加麝香少許友人之女年五歲項間起瘰癧數個年幼不能服藥為制此藥貼之全愈凡膏藥中用黃丹必以火炒過然後以之熬膏其膠黏之力始大而麝香不早加入膏藥中者以麝香忌火也化腐生肌散治瘰癧已潰爛者用此藥擦之他瘡破後者亦可用之爐甘石六錢煅乳香三錢沒藥三錢明雄黃二錢蓬砂三錢硇砂二分冰片三分共研細收貯瓶中勿令透氣日擦患處三四次用此藥長肉將平時收口不速者可加珍珠一分煅研細攙入其煅法詳護眉神應散後內託生肌散治瘰癧瘡瘍破後氣血虧損不能化膿生肌或其瘡數年不愈外邊瘡口甚小裡邊潰爛甚大且有串至他處不能敷藥者生黃耆四兩甘草二兩生明乳香一兩半生明沒藥一兩半生杭芍二兩天花粉三兩丹參一兩半上七味共為細末開水送服三錢日三次若將散劑變作湯劑須先將花粉改用四兩八錢一劑分作八次煎服較散劑生肌尤速從來治外科者於瘡瘍破後不能化膿生肌者不用八珍即用十全大補不知此等藥若遇陽分素虛之人服之猶可若非陽分素虛或兼有虛熱者連服數劑有不滿悶煩熱飲食頓減者乎夫人之後天賴水穀以生氣血賴氣血以生肌肉此自然之理也而治瘡瘍者欲使肌肉速生先令飲食頓減斯猶欲樹之茂而先戕其根也雖瘡家陰證亦可用辛熱之品然林屋山人陽和湯為治陰證第一妙方而重用熟地一兩以大滋真陰則熱藥自無偏勝之患故用其方者連服數十劑而無弊也如此方重用黃耆補氣分以生肌肉有丹參以開通之則補而不滯有花粉芍藥以涼潤之則補而不熱又有乳香沒藥甘草化腐解毒贊助黃耆以成生肌之功況甘草與芍藥並用甘苦化合味同人參能雙補氣血則生肌之功愈速也至變散劑為湯劑花粉必加重者誠以黃耆煎之則熱力增花粉煎之則涼力減故必加重而其涼熱之力始能平均相濟也至黃耆必用生者因生用則補中有宣通之力若炙之則一於溫補固於瘡家不宜也一人年二十餘因抬物用力過度腰疼半年不愈忽於疼處發出一瘡在脊梁之旁微似紅腫狀若覆盂大徑七寸瘍醫以為腰疼半年始現此瘡其根蒂必深而難治且其內外發熱飲食懶進舌苔黃厚脈象滑數知其證兼外感實熱投以白虎加人參湯熱退能食數日又復虛汗淋漓晝夜不止遂用龍骨牡蠣皆不用煅生杭芍生山藥各一兩為方兩劑汗止繼治以清火消腫解毒之藥若拙擬消乳湯去栝蔞加金線重樓三七沖服之類更加鹿角霜錢許以引經惟消乳湯以知母為君重八錢茲則所用不過五六錢外用五倍子三七枯礬金線重樓白芨為末以束其根乳香沒藥雄黃金線重樓三七為末以敷其頂皆用醋調之旬日瘡消三分之二其頂甚軟遂以烏金膏以雄黃炒巴豆仁至黑色研細名烏金膏調香油敷其軟處二日瘡破出稠膿若干將此內託生肌散改作湯劑投之外敷拙擬化腐生肌散七八日間瘡口長平結痂而愈徐靈胎治瘡最重圍藥以圍藥束住瘡根不使毒勢散漫又能阻隔周身之熱力不貫注於瘡則瘡必易愈愚治此瘡所用束根之藥實師徐氏之意也洗髓丹治楊梅瘡毒蔓延周身或上至頂或下至足或深入骨髓無論陳新輕劇服之皆有奇效三四日間瘡痂即脫落淨輕粉二錢炒至光色減去三分之二研細蓋此藥炒之則烈性少緩若炒之過度又恐無力火候宜中用其大片即淨輕粉淨紅粉一錢研細須多帶紫黑片者用之方有效驗露蜂房如拳大者一個大者可用一半小者可用兩個炮至半黑半黃色研細炮時須用物按之著鍋核桃十個去皮搗碎炮至半黑半黃色研細紙包數層壓去其油蓋油多即不好為丸用上諸藥用熟棗肉為丸黃豆粒大曬乾分三次服之服時須清晨空心開水送下至午後方可飲食忌腥半月服後口含柳棍有痰涎即吐出愈多吐愈好睡時將柳棍橫含兩端各系一繩兩繩之端結於腦後防睡著掉落又須將柳棍勤換即將藥服完仍須如此必待不吐痰涎時方可不含柳棍其藥日服一次若噁心太甚者可間日一服制此藥時須自經手將輕粉紅粉稱極準其稱當以庫稱為定法輕粉須稱準後再炒此方人多有疑其服之斷生育者非也輕粉雖烈煅之則烈性頓減紅粉雖性近輕粉而止用一錢且分作三日服之又有棗肉之甘緩以解毒核桃仁多用至十枚峻補腎經以防患配合得宜服之自有益無害輕粉系水銀同礬石升煉而成紅粉亦系水銀同礬石硝石諸藥升煉而成其質本重墜故能深入其成於升煉故能飛揚是以內浹骨髓中通臟腑外達皮膚善控周身之毒涎借徑於陽明經絡自齒齦上齦屬足陽明下齦屬手陽明而出也蜂房能引人身之毒涎透出口齒且有以毒攻毒之妙用為輕粉紅粉之佐使毒涎之出者愈多即內毒之消者愈速矣核桃仁潤而多脂性能補骨益髓可知且又善解疥癬之毒其能解他瘡之毒亦可知加於此藥之中補正兼以逐邪毒之深入骨髓者亦不難消除矣至於丸以棗肉取其甘緩之性能緩二粉之猛悍又能補助腸胃使不為毒藥所傷也服藥之後其牙齦必腫間有爛者因毒涎皆從此出故也然內毒既清外證不治自愈或用甘草蓬砂金銀花熬水漱之亦可蜂房有三種有黃色大蜂其房上下恆作數層其毒甚大不宜用曾見有以之煎水漱牙疼者其牙齦遂皆潰爛脫牙十餘枚有黃色小蜂其房甚小房孔僅如緑豆雖無大毒而力微又不堪用惟其蜂黃而兼紅大近寸許恆在人家屋中壘房俗呼為馬蜂其房入藥最宜然其房在樹上者甚少若無在樹上之露蜂房在屋中者亦可用特稍宜加重耳馬姓年四十餘先染淋毒後變為梅毒求為診治其毒周身不現形迹惟覺腦際沉昏頗甚心中時或煩躁骨節多有疼痛之處所甚異者其眉稜眼稍及手指之節多生軟骨西人亦謂系梅毒所凝結也愚對此證不敢謂其必治愈猶幸身體不甚羸弱遂將洗髓丹一劑俾分四次服完歇息旬日再服一劑將其分量減三分之一歇息旬日又服一劑較二次所服之分量又減三分之一皆四日服完其病遞次消除凡軟骨將消者必先發起然後徐徐消腫化為無有共計四浹辰諸病皆愈又治一郝姓小孩因食乳傳染咽喉潰爛至不能進食肛門亦甚潰爛其腸胃之潰爛可知其父來院細言其病狀問還有救否答曰果信用余方仍能救遂與以洗髓丹六粒俾研細水調服三次全愈又奉天一幼童有遺傳性梅毒年六歲不能行遍身起瘡若小癤愈而復發在大連東人醫院住近一年不愈後來院求治其身體羸弱飲食甚少先用藥理其脾胃俾能飲食漸加以解毒之藥若金銀花連翹天花粉諸品身體漸壯瘡所發者亦漸少然毒之根蒂仍未除也遂將洗髓丹五分許研細將製成丸藥復研末者因孺子不能服丸藥也開水調服三日服一次仍每日服湯藥一劑後將洗髓丹服至十次瘡已不發繼又服湯藥月餘兼用滋陰補腎之品每劑中有核桃仁三個取其能健骨也食酸齼齒者嚼核桃仁立愈是能健骨之明徵從此遂能步履行動如常童矣觀此二案則洗髓丹奇異之功效誠可於解梅毒藥中首屈一指且凡解梅毒藥無論或注射或服藥愈後又恆肢體作疼以其能清血中之毒不能清骨中之毒是以愈後其骨節猶疼也因其骨中猶含有毒性恆遲至日久而復發或遲至十餘年而復發者若再投以此丹則骨疼立愈且以後永不反復此又愚屢經試驗而確知其然者也二藥物石膏解石膏之質原為硫養輕鈣化合而成其性涼而能散有透表解肌之力為清陽明胃腑實熱之聖藥無論內傷外感用之皆效即他臟腑有實熱者用之亦效神農本草經原謂其微寒其寒涼之力遠遜於黃連龍膽草知母黃柏等藥而其退熱之功效則遠過於諸藥神農本草經謂其微寒則性非大寒可知且謂其宜於産乳其性尤純良可知蓋言其性不甚寒涼可用於産後也乃後世注神農本草經者不知産乳之乳字原作生字解而竟謂石膏能治婦人無乳支離殊甚要知産後無外感之熱石膏原不可用若確有外感實熱他涼藥或在所忌而獨不忌石膏以石膏之性非大寒乃微寒也是以漢季張仲景所著金匱中有竹皮大丸治婦人乳中虛煩亂嘔逆中有石膏夫乳中者生子之時也其煩亂嘔逆必有外感之實熱也此實通神農本草經石膏主産乳之義以立方也石膏醫者多誤認為大寒而煅用之則宣散之性變為收斂點豆腐者必煅用取其能收斂也以治外感有實熱者竟將其痰火斂住凝結不散用至一兩即足傷人是變金丹為鴆毒也逮至誤用煅石膏僨事流俗之見不知其咎在煅不在石膏轉謂石膏煅用之其猛烈猶足傷人而不煅者更可知矣於是一倡百和遂視用石膏為畏途即有放膽用者亦不過七八錢而止夫石膏之質甚重七八錢不過一大撮耳以微寒之藥欲用一大撮撲滅寒溫燎原之熱又何能有大效是以愚用生石膏以治外感實熱輕證亦必至兩許若實熱熾盛又恆重用至四五兩或七八兩或單用或與他藥同用必煎湯三四茶杯分四五次徐徐溫飲下熱退不必盡劑如此多煎徐服者欲以免病家之疑懼且欲其藥力常在上焦中焦而寒涼不至下侵致滑瀉也蓋石膏生用以治外感實熱斷無傷人之理且放膽用之亦斷無不退熱之理惟熱實脈虛者其人必實熱兼有虛熱仿白虎加人參湯之義以人參佐石膏亦必能退熱蓋諸藥之退熱以寒勝熱也而石膏之退熱逐熱外出也是以將石膏煎服之後能使內蘊之熱息息自毛孔透出且因其含有硫養輕原具發表之性以之煮湯又直如清水服後其寒涼之力俱隨發表之力外出而毫無汁漿留中以傷脾胃是以遇寒溫之大熱勢若燎原而放膽投以大劑白虎湯莫不隨手奏效其邪實正虛者投以白虎加人參湯亦能奏效蓋石膏之所以善治寒溫者原恃其原質中之硫養輕也若煅之其硫養輕皆飛去所餘之鈣經煅即變質若誤服之能將人外感之痰火及周身之血脈皆為凝結錮閉是以見有服煅石膏數錢脈變結代浸至言語不遂肢體痿廢者有服煅石膏數錢其證變結胸滿悶異常永不開通者有服煅石膏數錢其周身肌肉似分界限且又突起者蓋自有石膏煅不傷胃之語醫者輕信其説以誤人性命者實不勝計矣故凡用生石膏者宜買其整塊明亮者自監視軋細凡石質之藥不軋細則煎不透方的若購自藥房中難辨其煅與不煅逮將藥煎成石膏凝結藥壺之底傾之不出者必系煅石膏其藥湯即斷不可服且嘗歷觀方書前哲之用石膏有一證而用至十四斤者見筆花醫鏡有一證而用至數十斤者見吳鞠通醫案有産後亦重用石膏者見徐靈胎醫案然須用白虎加人參湯以玄參代知母生山藥代粳米然所用者皆生石膏也附案子七歲時感冒風寒四五日間身大熱舌苔黃而帶黑孺子苦服藥強與之即嘔吐不止遂單用生石膏兩許煎取清湯分三次溫飲下病稍愈又煎生石膏二兩亦徐徐溫飲下病又見愈又煎生石膏三兩徐徐飲下如前病遂全愈夫以七歲孺子約一晝夜間共用生石膏六兩病愈後飲食有加毫無寒中之弊則石膏果大寒乎抑微寒乎此係愚初次重用石膏也故第一次只用一兩且分三次服下猶未確知石膏之性也世之不敢重用石膏者何妨若愚之試驗加多以盡石膏之能力乎同邑友人趙之妻年近六旬得溫病脈數而洪實舌苔黃而干聞藥氣即嘔吐俾單用生石膏細末六兩以作飯小鍋不用藥甑恐有藥味復嘔吐煎取清湯一大碗恐其嘔吐一次只溫飲一口藥下咽後覺煩躁異常病家疑藥不對證愚曰非也病重藥輕故也飲至三次遂不煩躁閲四點鐘盡劑而愈同邑友人毛之三子年三十二歲素有痰飲得傷寒證服藥調治而愈後因飲食過度而復服藥又愈後數日又因飲食過度而復醫治無效四五日間延愚診視其脈洪長有力而舌苔淡白亦不燥渴食梨一口即覺涼甚食石榴子一粒心亦覺涼愚舍證從脈為開大劑白虎湯方因其素有痰飲加清半夏數錢其表兄高在座邑中之宿醫也疑而問曰此證心中不渴不熱而畏食寒涼如此以余視之雖清解藥亦不宜用子何所據而用生石膏數兩乎答曰此脈之洪實原是陽明實熱之證其不覺渴與熱者因其素有痰飲濕勝故也其畏食寒涼者因胃中痰飲與外感之熱互相膠漆致胃府轉從其化與涼為敵也毛素曉醫學信用愚言兩日夜間服藥十餘次共用生石膏斤余脈始和平愚遂旋里隔兩日復來相迎言病人反復甚劇形狀異常有危在頃刻之慮因思此證治愈甚的何至如此反復既至相隔三里強見其痰涎壅盛連連咳吐不竭精神恍惚言語錯亂身體顫動診其脈平和無病惟右關胃氣稍弱愚恍然會悟急謂其家人曰此證萬無閃失前因飲食過度而復此次又因戒飲食過度而復也其家人果謂有鑑前失數日之間所與飲食甚少愚曰此無須用藥飽食即可愈矣其家人慮其病狀若此不能進食愚曰無庸如此多慮果系由餓而得之病見飲食必然思食其家人依愚言時已屆晚八句鍾至黎明進食三次每次撙節與之其病遂愈友人毛妻年近七旬於正月中旬傷寒無汗原是麻黃湯證因誤服桂枝湯汗未得出上焦陡覺煩熱噁心聞藥氣即嘔吐但飲石膏所煮清水及白開水亦嘔吐惟晝夜吞小冰塊可以不吐兩日之間吞冰若干而煩熱不減其脈關前洪滑異常俾用鮮梨片蘸生石膏細末嚼咽之遂受藥不吐服盡二兩而病愈一人患梅毒在東人醫院治療二十餘日頭面腫大下體潰爛周身壯熱譫語不省人事東人謂毒已走丹不可治其友人孫邀愚往東人院中為診視疑其證夾雜溫病遂用生石膏細末半斤煮水一大瓶偽作葡萄酒攜之至其院中託言探友蓋不欲東人知為療治也及入視病人其頭面腫而且紅診其脈洪而實知系夾雜溫病無疑囑將石膏水徐徐溫服翌日又往視其頭面紅腫見退脈之洪實亦減半而較前加數仍然昏憒譫語分毫不省人事所飲石膏之水尚餘一半俾自購潞黨參五錢煎湯兌所餘之石膏水飲之翌日又往視之則人事大清脈亦和平病人遂決意出彼院來院中調治後十餘日其梅毒亦愈此證用潞黨參者取其性平不熱也一人年五十周身發冷兩腿疼痛醫者投以溫補之藥其冷益甚欲作寒戰診其脈甚沉伏重按有力其舌苔黃厚小便赤澀當時仲春知其春溫之熱鬱於陽明而未發故現此假象也欲用白虎湯加連翹治之病人聞之駭然愚曰但預購生石膏四兩逮熱難忍時煎湯飲之可乎病者曰恐無其時耳愚曰若取鮮白茅根煎湯飲之則冷變為熱且變為大熱矣病者仍不確信然欲試其驗否遂剖取鮮白茅根去淨皮細銼一大碗煮數沸取其湯當茶飲之有頃熱發若難忍須臾再診其脈則洪大無倫矣愚將所預購之四兩生石膏煎湯分三次溫飲下其熱遂消石膏之性又善清瘟疹之熱參閲清疹湯後附案又善清頭面之熱參閲青盂湯後附案又善清咽喉之熱參閲詳論咽喉證治法所載治滄州友人董一案外感痰喘宜投以金匱小青龍加石膏湯若其外感之熱已入陽明之府而小青龍中之麻桂薑辛諸藥實不宜用曾治劉年八歲孟秋患溫病醫治十餘日病益加劇表裡大熱喘息迫促脈象洪數重按有力知猶可治問其大便兩日未行投以大劑白虎湯重用生石膏二兩半用生山藥一兩以代方中粳米且為其喘息迫促肺中伏邪又加薄荷葉一錢半以清之俾煎湯兩茶盅作兩次溫飲下一劑病愈強半又服一劑全愈從來産後之證最忌寒涼而果系産後溫病心中燥熱舌苔黃厚脈象洪實寒涼亦在所不忌然所用寒涼之藥須審慎斟酌不可漫然相投也愚治産後溫證之輕者其熱雖入陽明之府而脈象不甚洪實恆重用玄參一兩或至二兩輒能應手奏效若系劇者必用白虎加人參湯方能退熱然用時須以生山藥代粳米玄參代知母方為穩妥醫方篇中白虎加人參以山藥代粳米湯下附有驗案可參觀蓋以石膏玄參神農本草經皆明言其治産乳至知母條下則未嘗言之不敢師心自用也友人毛曾治一少婦産後十餘日周身大熱無汗心中熱而且渴延醫調治病勢轉增甚屬危急毛診其脈甚洪實舌苔黃而欲黑撮空摸床內風已動治以生石膏三兩玄參一兩野臺參五錢甘草二錢為服藥多嘔取竹皮大丸之義加竹茹二錢煎湯一大碗徐徐溫飲下盡劑而愈觀此案則外感之熱直如燎原雖在産後豈能從容治療乎孫思邈曰智欲圓而行欲方膽欲大而心欲小世俗醫者遇此等證但知心小而不知膽大豈病人危急之狀漠不關於心乎在女子有因外感之熱內迫致下血不止者亦可重用白虎加人參湯治之鄰村李氏婦産後數日惡露已盡至七八日忽又下血延醫服藥二十餘日不止其脈洪滑有力心中熱而且渴疑其夾雜外感詢之身不覺熱舌上無苔色似微白又疑其血熱妄行投以涼血兼止血之藥血不止而熱渴亦如故因思此證實夾雜外感無疑遂改用白虎加人參湯方中生石膏重用三兩更以生山藥代粳米煎湯三盅分三次溫飲下熱渴遂愈血亦見止又改用涼血兼止血之藥而愈痢證身熱不休服一切清火之藥而熱仍不休者方書多諉為不治夫治果對證其熱焉有不休之理此乃因痢證夾雜外感其外感之熱邪隨痢深陷瀰漫於下焦經絡之間永無出路以致痢為熱邪所助日甚一日而永無愈期夫病有兼證即治之宜有兼方也斯非重用生石膏更助以人參以清外感之熱不可通變白虎加人參湯後載有治王驗案可參閲表兄張之妻高氏年五十餘素多疾病於季夏晨起偶下白痢至暮十餘次秉燭後忽然渾身大熱不省人事循衣摸床呼之不應其脈洪而無力肌膚之熱烙手知其系氣分熱痢又兼受暑多病之身不能支持故精神昏憒如是也急用生石膏三兩野黨參四錢煎湯一大碗徐徐溫飲下至夜半盡劑而醒痢亦遂愈詰朝煎渣再服其病脫然上所載痢證醫案皆兼外感之熱者也故皆重用生石膏治之非概以其方治痢證也拙著衷中參西録中治痢共有七方皆隨證變通用之確有把握前案所用之方乃七方之一也愚用此方治人多矣脈證的確用之自無差忒也瘧疾雖在少陽而陽明兼有實熱者亦宜重用生石膏曾治鄰村李年四十許瘧疾間日一發熱時若燔即不發之日亦覺表裡俱熱舌燥口乾脈象弦長重按甚實此少陽邪盛陽明熱盛瘧而兼溫之脈也投以大劑白虎湯加柴胡三錢服後頓覺清爽翌晨瘧即未發又煎服前劑之半加生薑三錢溫瘧從此皆愈至脈象雖不至甚實而按之有力常覺發熱懶食者愚皆於治瘧劑中加生石膏兩許以清之亦莫不隨手奏效也石膏之性又善治腦漏方書治腦漏之證恆用辛夷蒼耳然此證病因有因腦為風襲者又因肝移熱於腦者若因腦為風襲而得其初得之時或可用此辛溫之品散之若久而化熱此辛溫之藥即不宜用至為肝移熱於腦則辛溫之藥尤所必戒也近治奉天郭得此證半載不愈鼻中時流濁涕其氣腥臭心熱神昏恆覺眩暈其脈左右皆弦而有力其大便恆乾燥知其肝移熱於腦其胃亦移熱於腦矣恐其病因原系風襲先與西藥阿斯匹林瓦許以發其汗頭目即覺清爽繼為疏方用生石膏兩半龍膽草生杭芍玄參知母花粉各四錢連翹金銀花甘草各二錢薄荷葉一錢連服十劑石膏皆用兩半他藥則少有加減其病遂脫然全愈奉天一人得此證七八日其脈浮而有力知其因風束生熱也亦先用阿斯匹林瓦許汗之汗後其鼻中濁涕即減亦投以前方連服三劑全愈神農本草經謂石膏能治腹痛誠有效驗曾治奉天劉腹疼三年不愈其脈洪長有力右部尤甚舌心紅而無皮時覺頭疼眩暈大便乾燥小便黃澀此乃伏氣化熱阻塞奇經之經絡故作疼也為疏方生石膏兩半知母花粉玄參生杭芍川楝子各五錢乳香沒藥各四錢甘草二錢一劑疼愈強半即原方略為加減又服數劑全愈愚弱冠有本村劉氏少年因腹疼臥病月餘晝夜號呼勢極危險延醫數人皆束手無策聞愚歸求為診視其脈洪長有力蓋從前之疼猶不至如斯為屢次為熱藥所誤故疼益加劇耳亦投以前方惟生石膏重用二兩一劑病大輕減後又加鮮茅根數錢連服兩劑全愈蓋此等證大抵皆由外感伏邪竄入奇經久而生熱其熱無由宣散遂鬱而作疼醫者為其腹疼不敢投以涼藥甚或以熱治熱是以益治益劇然證之涼熱脈自有分即病人細心體驗亦必自覺臨證者盡心詢問考究自能得其實際也石膏之性又最宜與西藥阿斯匹林並用蓋石膏清熱之力雖大而發表之力稍輕阿斯匹林味酸性涼最善達表使內郁之熱由表解散與石膏相助為理實有相得益彰之妙也如外感之熱已入陽明胃腑其人頭疼舌苔猶白者是仍帶表證愚恆用阿斯匹林一瓦白蔗糖化水送服以汗之逮其汗出遍體之時復用生石膏兩許煎湯乘熱飲之宜當汗正出時飲之在表之熱解在裡之熱亦隨汗而解矣若其頭已不疼舌苔微黃似無表證矣而脈象猶浮雖洪滑而按之不實者仍可用阿斯匹林汗之然宜先用生石膏七八錢或兩許煮湯服之俾熱勢少衰然後投以阿斯匹林則汗既易出汗後病亦易解也若其熱未隨汗全解仍可徐飲以生石膏湯清其餘熱不但此也若斑疹之毒鬱而未發其人表裡俱熱大便不滑瀉者可用生石膏五六錢煎湯沖服阿斯匹林半瓦許俾服後微似有汗內毒透徹斑疹可全然托出若出後壯熱不退胃腑燥實大便燥結者又可多用生石膏至二三兩許煎湯一大碗約有三四茶杯沖阿斯匹林一瓦或一瓦強一次溫飲數羹匙初飲略促其期逮熱見退或大便通下尤宜徐徐少飲以壯熱全消仍不至滑瀉為度如此斟酌適宜斑疹無難愈之證矣石膏與阿斯匹林或前後互用或一時並用通變化裁存乎其人果能息息與病機相赴功效豈有窮哉用阿斯匹林治關節腫疼之挾有外感實熱者又必與石膏並用方能立見奇效奉天趙之侄年六歲腦後生瘡漫腫作疼繼而頭面皆腫若赤遊丹毒繼而作抽掣日甚一日浸至周身僵直目不能合亦不能瞬氣息若斷若續呻吟全無其家人以為無藥可治待時而已閲兩晝夜形狀如故試灌以勺水似猶知下咽因轉念或猶可治而彼處醫者咸皆從前延請而屢次服藥無效者也來院求為診治其脈洪數而實肌膚髮熱知其夾雜溫病陽明腑證已實勢雖垂危猶可挽回遂用生石膏細末四兩以蒸汽水煎湯兩茶杯徐徐溫灌之周十二時劑盡脈見和緩微能作聲又用阿斯匹林瓦半仍以汽水所煎石膏湯分五次送下限一日夜服完服至末二次皆周身微見汗其精神稍明瞭肢體能微動從先七八日不食且不大便至此可少進茶湯大便亦通下矣繼用生山藥細末煮作稀粥調以白蔗糖送服阿斯匹林三分之一瓦日兩次若見有熱即間飲汽水所煮石膏湯又以蜜調黃連末少加薄荷冰敷其頭面腫處生肌散敷其瘡口破處如此調養數日病勢減退可以能言其左邊手足仍不能動試略為屈伸則疼不能忍細驗之關節處皆微腫按之覺疼知其關節之間因外感之熱而生炎也遂又用鮮茅根煎濃湯無鮮茅根可代以鮮蘆根調以白蔗糖送服阿斯匹林半瓦日兩次俾服藥後周身微似有汗亦間有不出汗之時令其關節中之炎熱徐徐隨發表之藥透出又佐以健補脾胃之藥俾其多進飲食如此旬余左手足皆能運動關節能屈伸以後飲食復常停藥勿服靜養半月行動如常矣此證共用生石膏三斤阿斯匹林三十瓦始能完全治愈愚用阿斯匹林治熱性關節腫疼者多矣為此證最險故詳記之丁仲祜西藥實驗談載東人用阿斯匹林治愈關節急性僂麻質斯即熱性關節腫疼之案甚夥而其證之險皆遠遜於此證若遇此證不能重用生石膏尚有何藥能與阿斯匹林並用以挽回此極險之證乎彼欲廢棄中藥者尚其詳觀此案也上所録諸案其為證不同然皆兼有外感實熱者也乃有其人純系內傷臟腑失和而前哲具有特識亦有重用石膏者徐靈胎曰嘉興朱宗臣以陽盛陰虧之體又兼痰凝氣逆醫者以溫補治之胸膈痞塞而陽道痿群醫謂脾腎兩虧將恐無治就余于山中余視其體豐而氣旺陽升而陰不降諸竅皆閉笑謂之曰此為肝腎雙實證先用清潤之藥加石膏以降其逆氣後以消痰開胃之藥滌其中宮更以滋腎強陰之藥鎮其元氣陽事即通五月後妾即懷孕得一女又一年復得一男觀此石膏治外感兼治內傷功用何其弘哉窮極石膏之功用恆有令人獲意外之效者曾治奉天馬姓叟年近六旬患痔瘡三十餘年不愈後因傷寒證熱入陽明之府投以大劑白虎湯數劑其病遂愈痔瘡竟由此除根奉天呂姓幼童年五六歲每年患眼疾六七次皆治於東人醫院東人謂此關於稟賦不能除根後患瘟疹毒熱甚恣投以托毒清火之品每劑中用生石膏兩半病愈後其眼疾亦從此不再反復友人張曾治京都閻姓叟年近七旬素有勞疾發則喘而且嗽於冬日感冒風寒上焦煩熱勞疾大作痰涎膠滯喘促異常其脈關前洪滑按之有力張治以生石膏二兩以清時氣之熱因其勞疾加沉香五錢以引氣歸腎且以痰涎太盛石膏能潤痰之燥不能行痰之滯故又借其辛溫之性以為石膏之反佐也一日連服二劑於第二劑加清竹瀝二錢病若失勞疾亦從此除根永不反復夫勞疾至年近七旬本屬不治之證而事出無心竟以重用石膏治愈之石膏之功用何其神哉愚因聞此案心有會悟擬得治肺勞黃耆膏方其中亦用生石膏服者頗有功效寒溫陽明府病原宜治以白虎湯醫者畏不敢用恆以甘寒之藥清之遇病之輕者亦可治愈而恆至稽留餘熱甘寒藥滯泥故能閉塞外感熱邪變生他證逮至病久不愈其脈之有力者仍可用白虎湯治之其脈之有力而不甚實者可用白虎加人參湯治之曾治奉天一學徒年十四五得勞熱喘嗽證初原甚輕醫治數月病勢浸增醫者諉謂不治遂來院求為診視其人羸弱已甚而脈象有力數近六至疑其有外感伏熱詢之果數月之前曾患溫病經醫治愈乃知其決系外感留邪問其心中時覺發熱大便乾燥小便黃澀遂投以白虎加人參湯去粳米加生懷山藥一兩連服數劑病若失見者訝為奇異不知此乃治其外感非治其內傷而能若是之速效也內經謂冬傷於寒春必病溫是言伏氣為病也乃有伏氣伏於膈膜之下內經所謂橫連膜原也逼近胃口久而化熱不外發為溫病轉上透膈膜熏蒸肺臟致成肺病者若其脈有力亦宜重用生石膏治之曾治奉天趙某年四十許始則發熱懶食繼則咳嗽吐痰腥臭醫治三月浸至不能起床脈象滑實右脈尤甚伏邪之熱亦如寒溫之脈多右盛於左舌有黃苔大便數日一行知系伏氣為病投以大劑白虎湯以生山藥代粳米又加利痰解毒之品三劑後病愈強半又即其方加減服至十餘劑全愈有伏氣下陷於奇經諸脈中久而化熱其熱亦不能外發為溫有時隨奇經之脈上升者在女子又有熱入血室而子宮潰爛者爰録兩案於下以證之安東尉年二十餘時覺有熱起自下焦上衝腦部其腦部為熱沖激頭巔有似腫脹時作眩暈心中亦時發熱大便乾燥小便黃澀經醫調治年餘無效求其處醫士李寄函來問治法其開來病案如此曰其脈象洪實飲食照常身體亦不軟弱知其伏有外感熱邪因其身體不弱俾日用生石膏細末四兩煮水當茶飲之若覺涼時即停服後二十餘日其人忽來奉言遵示服石膏六七斤上衝之熱見輕而大便微溏因停藥不服診其脈仍然有力問其心中仍然發熱大便自停藥後即不溏矣為開白虎加人參湯方中生石膏重用三兩以生懷山藥代粳米連服六七劑上衝之熱大減因出院還家囑其至家按原方服五六劑病當除根矣南皮張妻年三十餘十年前恆覺少腹切疼英女醫謂系子宮炎證用藥數次無效繼乃謂此病如欲除根須用手術剖割將生炎之處其腐爛者去淨然後敷藥能愈病人懼而辭之後至奉又延東女醫治療用坐藥兼內服藥數年稍愈至壬戌夏令病浸增劇時時疼痛間下膿血癸亥正初延愚診治其脈弦而有力尺脈尤甚自言疼處覺熱以涼手尉之稍愈上焦亦時覺煩躁恍悟此證當系曾受外感熱入血室醫者不知治以小柴胡湯加石膏外感雖解而血室之熱未清或伏氣下陷入於血室阻塞氣化久而生熱以致子宮生炎浸至潰爛膿血下注為疏方用金銀花乳香沒藥甘草以解其毒天花粉知母玄參以清其熱復本小柴胡湯之義少加柴胡提其下陷之熱上出諸藥煎湯送服三七細末二錢以化腐生新連服三劑病似稍輕其熱仍不少退因思此證原系外感稽留之熱非石膏不能解也遂於原方中加生石膏一兩後漸加至二兩連服數劑熱退強半疼亦大減遂去石膏服數劑漸將涼藥減少復少加健胃之品共服藥三十劑全愈後在天津治馮氏婦此證亦用此方中有柴胡即覺膿血不下行後減去柴胡為之治愈神農本草經謂石膏治金瘡是外用以止其血也愚嘗用煅石膏細末敷金瘡出血者甚效蓋多年壁上石灰善止金瘡出血石膏經煅與石灰相近益見煅石膏之不可內服也石膏生用之功效不但能治病且善於治瘡且善於解毒奉天趙之父年過六旬在臍旁生癰大徑三寸五六日間煩躁異常自覺屋隘莫容其脈左關弦硬右關洪實知系伏氣之熱與瘡毒俱發也問其大便數日未行投以大劑白虎湯加金銀花連翹龍膽草煎湯一大碗徐徐溫飲下連服三劑煩躁與瘡皆愈又在籍時本村張氏女因家庭勃溪怒吞砒石未移時作嘔吐其兄疑其偷食毒物詭言無他惟服皂礬少許耳其兄聞其言急來詢解救之方愚曰皂礬原系硫氧與鐵化合分毫無毒嘔吐數次即愈斷無閃失但恐未必是皂礬耳須再切問之其兄去後遲約三點鐘復來言此時腹中絞疼危急萬分始實言所吞者是砒石非皂礬也急令買生石膏細末二兩用涼水送下乃村中無藥鋪遂至做豆腐家買得生石膏軋細末涼水送下腹疼頓止猶覺腹中燒熱再用生石膏細末半斤煮湯兩大碗徐徐飲之盡劑而愈後又遇吞火柴中毒者治以生石膏亦愈然以其毒緩但煎湯飲之無用送服其細末也附録直隸鹽山孫來函一九二四年八月友人張之女發熱甚劇來詢方為開生石膏一兩半煎湯飲之其熱仍不稍退又來詢方答以多煎石膏水飲之必能見愈張購石膏數兩煮湯若干渴則飲之數日而愈直隸鹽山李來函丁卯中秋曾治天津傅姓少年患溫證胃熱氣逆無論飲食藥物下咽即吐出延醫治療皆因此束手弟忽憶衷中參西録石膏解載治毛姓媼醫案曾用此方以止嘔吐即以清胃府之大熱遂仿而用之食梨一顆蘸生石膏細末七錢余其吐頓止可以進食然心中猶覺熱再投以白虎加人參湯一劑全愈江蘇崇明縣刁來函近治一伏溫病壯熱煩渴脈來洪實兼數大解十日未行欲透其邪則津液已衰恐有汗脫之虞欲通其便則並無承氣確徵細思此證乃陽明熱久真陰鑠耗遵先生重用生石膏之訓即用生石膏二兩合增液湯加鮮金叉石斛香青蒿各三錢病家疑忌見者皆以為藥性過寒涼余憤然曰擇醫宜慎任醫宜專既不信余藥請余何為病家不得已購藥一劑俾煎湯兩盅作兩次服下而熱勢益熾病家疑藥不對證余曰此非藥不對證乃藥輕不勝病耳遂俾將兩劑並作一劑煎湯一大碗徐徐溫飲下移時汗出便通病若失人參解附人參形狀考人參之種類不一古所用之人參方書皆謂出於上黨即今之黨參是也考神農本草經載人參味甘未嘗言苦今黨參味甘遼人參則甘而微苦古之人參其為今之黨參無疑也特是黨參之性雖不如遼人參之熱而其性實溫而不涼乃因神農本草經謂其微寒後世之篤信神農本草經者亦多以人參之性果然微寒即釋古方之用人參者亦本微寒之意以為詮解其用意可謂尊經矣然古之篤信神農本草經而尊奉之者莫如陶弘景觀其所著名醫別録以補神農本草經所未備謂人參能療腸胃中冷已不遵神農本草經以人參為微寒可知因此疑年湮代遠古經字句或有差訛吾人生今之世當實事求是與古為新今試即黨參實驗之若與玄參等分並用可使藥性無涼熱即此可以測其熱力矣此即臺黨參而言若潞黨參其熱稍差然遼東亦有此參與遼人參之種類迥別為其形狀性味與黨參無異故藥行名之為東黨參其功效亦與黨參同至於遼人參其補力熱力皆倍於黨參而其性大約與黨參相似東人謂過服之可使腦有充血之病其性補而上升可知方書謂人參不但補氣若以補血藥輔之亦善補血愚則謂若輔以涼潤之藥即能氣血雙補蓋平其熱性不使耗陰氣盛自能生血也至神農本草經謂其主補五臟安精神定魂魄止驚悸除邪氣明目開心益智無非因氣血充足臟腑官骸各得其養自有種種諸效也附人參形狀考人參無論野山移山種秧其色鮮時皆白曬乾則紅浸以白冰糖水曬乾則微紅若浸之數次雖曬於亦白矣野山之參其蘆頭生苗之處亦名露土長而細極長者可至二寸細若韭莛且多齟齬有蘆頭短者則稍粗至秧參之蘆頭長不過七八分其粗則過於箸矣人參之鮮者皆有粗皮制時用線七八條作一縷為弓弦用此弦如拉鋸狀來回將其粗皮磨去其皮色始光潤至皮上之橫紋以細密而深者為佳野山之參一寸有二十餘紋秧參則一寸不過十餘紋且其紋形破裂有似刀劃野山參之紋則分毫無破裂然無論野參秧參其紋皆系生成非人力所能為也人參之須以堅硬者為貴蓋野參生於堅硬土中且多歷歲月其須自然堅硬若秧參則人工種植土松年淺故其須甚軟也至於野參之性溫和秧參之性燥熱人所共知究其所以然之故非僅在歷年之淺深也因種秧參者多撒砒石末於畦中以防蟲蟻之損傷參得砒石之氣故甚燥熱是以愚於治寒溫方中當用參者從不敢投以秧參恆以野黨參代之亦能立起沉疴至於西洋參多系用秧參偽制此愚在奉目睹用者亦當審慎也山西黨參種植者多野生者甚少凡野生者其橫紋亦如遼人參種植者則無橫紋或蘆頭下有橫紋僅數道且種者皮潤肉肥野者皮粗肉鬆橫斷之中心有紋作菊花形其蘆頭以粗大者為貴名曰獅頭黨參為其歷年久遠屢次自蘆頭髮生故作此形其參生於五臺山者名臺黨參色白而微黃生於潞州太行紫團山者名潞黨參亦名紫團參色微赤而細以二參較之臺黨參力稍大潞黨參則性平不熱以治氣虛有熱者甚宜然潞黨參野生者甚少多系人種植者至遼東所出之黨參為其形若黨參故俗名東黨參狀若臺黨參皆系野生其功用與山西之野臺黨參相近附案邑中高某年四十許於季春得溫病屢經醫者調治大熱已退精神益憊醫者諉為不治病家亦以為氣息奄奄待時而已乃遲旬日而病狀如故始轉念或可挽回迎愚診視其兩目清白無火竟昏憒不省人事舌乾如磋卻無舌苔問之亦不能言撫其周身皆涼其五六呼吸之頃必長出氣一口其脈左右皆微弱至數稍遲知其胸中大氣因服開破降下藥太過而下陷也蓋大氣不達於腦中則神昏大氣不潮於舌本則舌乾神昏舌乾故問之不能言也其周身皆涼者大氣陷後不能宣布營衛也其五六呼吸之頃必長出氣者大氣陷後胸中必覺短氣故太息以舒其氣也遂用野臺參一兩柴胡二錢煎湯灌之一劑見輕兩劑全愈外甥王年二十時臥病數月不愈精神昏憒肢體痠懶微似短氣屢次延醫服藥莫審病因用藥亦無效驗一日忽然不能喘息張口呼氣外出而氣不上達其氣蓄極下迫肛門突出約二十呼吸之頃氣息方通一晝夜間如是者八九次診其脈關前微弱不起知其胸中大氣下陷不能司肺臟呼吸之樞機也遂投以人參一兩柴胡三錢知母二錢一劑而呼吸順又將柴胡改用二錢知母改用四錢再服數劑宿病亦愈愚治大氣下陷多重用生黃耆取其補氣兼能升氣也而此案與前案皆重用參者因一當外感之餘津液鑠耗人參兼能滋津液一當久病之餘元氣虧損人參兼能固元氣也吐血過多者古方恆治以獨參湯謂血脫者先益其氣也然吐血以後多虛熱上升投以獨參湯恐轉助其虛熱致血證仍然反復愚遇此等證亦恆用人參而以鎮墜涼潤之藥輔之保元寒降湯一案可參閲人參之性用之得宜又善利小便濟陰湯後一案可參閲西洋參解西洋參味甘微苦性涼能補助氣分兼能補益血分為其性涼而補凡欲用人參而不受人參之溫補者皆可以此代之惟白虎加人參湯中之人參仍宜用黨參而不可代以西洋參以其不若黨參具有升發之力能助石膏逐邪外出也且神農本草經謂人參味甘未嘗言苦適與黨參之味相符是以古之人參即今之黨參若西洋參與高麗參其味皆甘而兼苦故用於古方不宜也西洋參産於法蘭西國外帶粗皮則色黃去粗皮則色白無論或黃或白以多有橫紋者為真愚用此參皆用黃皮多橫紋者因偽造者能造白皮西洋參不能造黃皮西洋參也黃耆解黃耆性溫味微甘能補氣兼能升氣善治胸中大氣即宗氣為肺葉闟闢之原動力下陷神農本草經謂主大風者以其與發表藥同用能祛外風與養陰清熱藥同用更能熄內風也謂主癰疽久敗瘡者以其補益之力能生肌肉其潰膿自排出也表虛自汗者可用之以固外表氣虛小便不利而腫脹者可用之以利小便婦女氣虛下陷而崩帶者可用之以固崩帶為其補氣之功最優故推為補藥之長而名之曰耆也附案滄州董氏女年二十餘胸脅滿悶心中怔忡動則自汗其脈沉遲微弱右部尤甚為其脈遲疑是心肺陽虛詢之不覺寒涼知其為胸中大氣下陷也其家適有預購黃耆一包俾用一兩煎湯服之其族兄在座其人頗知醫學疑藥不對證愚曰勿多疑倘有差錯余職其咎服後果諸病皆愈其族兄疑而問曰神農本草經黃耆原主大風有透表之力生用則透表之力益大與自汗證不宜其性升而能補有膨脹之力與滿悶證不宜今單用生黃耆兩許而兩證皆愈並心中怔忡亦愈其義何居答曰黃耆誠有透表之力氣虛不能逐邪外出者用於發表藥中即能得汗若其陽強陰虛者誤用之則大汗如雨不可遏抑惟胸中大氣下陷致外衛之氣無所統攝而自汗者投以黃耆則其效如神至於證兼滿悶而亦用之者確知其為大氣下陷呼吸不利而作悶非氣鬱而作悶也至於心與肺同懸胸中皆大氣之所包舉大氣升則心有所依故怔忡自止也繼加桔梗二錢知母三錢又服兩劑以善其後一婦人産後四五日大汗淋漓數日不止形勢危急氣息奄奄其脈微弱欲無問其短氣乎心中怔忡且發熱乎病人不能言而頷之知其大氣下陷不能吸攝衛氣而産後陰分暴虛又不能維繫陽分故其汗若斯之脫出也遂用生黃耆六錢玄參一兩淨萸肉生杭芍各五錢桔梗二錢一劑汗減至三劑諸病皆愈從前五六日未大便至此大便亦通下邑王氏女年二十餘心中寒涼飲食減少延醫服藥年餘無效且益羸瘦後愚診視其左脈微弱不起斷為肝虛證其父知醫疑而問曰向延醫診治皆言脾胃虛弱相火衰損故所用之方皆健脾養胃補助相火曾未有言及肝虛者先生獨言肝虛但因左脈之微弱乎抑別有所見而云然乎答曰肝臟之位置雖居於右而其氣化實先行於左試問病人其左半身必覺有不及右半身處是其明徵也詢之果覺坐時左半身下墜臥時不敢向左側其父方信愚言求為疏方遂用生黃耆八錢柴胡川芎各一錢乾薑三錢煎湯飲下須臾左側即可安臥又服數劑諸病皆愈惟素有帶證尚未除又於原方加牡蠣數錢服數劑帶證亦愈其父復疑而問曰黃耆為補肺脾之藥今先生用以補肝竟能隨手奏效其義何居答曰肝屬木而應春令其氣溫而性喜條達黃耆之性溫而上升以之補肝原有同氣相求之妙用愚自臨證以來凡遇肝氣虛弱不能條達用一切補肝之藥皆不效重用黃耆為主而少佐以理氣之品服之覆杯即見效驗彼謂肝虛無補法者原非見道之言也神農本草經謂黃耆主大風者誠有其效參閲論肢體痿廢之原因及治法中傅妻治案神農本草經謂黃耆主久敗瘡亦有奇效奉天張年三十餘因受時氣之毒醫者不善為之清解轉引毒下行自臍下皆腫繼又潰爛睪丸露出少腹出孔五處小便時五孔皆出尿為疏方生黃耆花粉各一兩乳香沒藥銀花甘草各三錢煎湯連服二十餘劑潰爛之處皆生肌排膿出外結疤而愈始終亦未用外敷生肌之藥黃耆之性又善利小便參閲曲直湯下王姓治案黃耆不但能補氣用之得當又能滋陰本村張媼年近五旬身熱勞嗽脈數至八至先用六味地黃丸加減煎湯服不效繼用左歸飲加減亦不效躊躇再四忽有會悟改用生黃耆六錢知母八錢煎湯服數劑見輕又加丹參當歸各三錢連服十劑全愈蓋虛勞者多損腎黃耆能大補肺氣以益腎水之上源使氣旺自能生水而知母又大能滋肺中津液俾陰陽不至偏勝而生水之功益普也至數劑後又加丹參當歸者因血痹虛勞金匱合為一門治虛勞者當防其血有痹而不行之處故加丹參當歸以流行之也黃耆之性又善治肢體痿廢然須細審其脈之強弱其脈之甚弱而痿廢者西人所謂腦貧血證也蓋人之肢體運動雖腦髓神經司之而其所以能司肢體運動者實賴上注之血以涵養之其脈弱者胸中大氣虛損不能助血上升以養其腦髓神經遂致腦髓神經失其所司內經所謂上氣不足腦為之不滿也拙擬有加味補血湯干頽湯方中皆重用黃耆凡脈弱無力而痿廢者多服皆能奏效若其脈強有力而痿廢者西人所謂腦充血證又因上升之血過多排擠其腦髓神經俾失所司內經所謂血菀同郁於上為薄厥也如此等證初起最忌黃耆誤用之即凶危立見逮至用鎮墜收斂之品若拙擬之鎮肝熄風湯建瓴湯治之其脈柔和而其痿廢仍不愈者亦可少用黃耆助活血之品以通經絡若服藥後其脈又見有力又必須仍輔以鎮墜之品若拙擬之起痿湯黃耆與赭石蟅蟲諸藥並用也黃耆升補之力尤善治流産崩帶西傅家莊王妻初次受妊五月滑下二次受妊至六七月時覺下墜見血求為治療急投以生黃耆生地黃各二兩白朮淨萸肉煅龍骨煅牡蠣各一兩煎湯一大碗頓服之胎氣遂安又將藥減半再服一劑以善其後至期舉一男強壯無恙瀋陽朱黎明時來院扣門言其妻因行經下血不止精神昏憒氣息若無急往診視六脈不全倣佛微動急用生黃耆野臺參淨萸肉各一兩煅龍骨煅牡蠣各八錢煎湯灌下血止強半精神見覆過數點鐘將藥劑減半又加生懷山藥一兩煎服全愈邑劉氏婦年二十餘身體羸弱心中常覺寒涼下白帶甚劇屢治不效脈甚細弱左部尤甚投以生黃耆生牡蠣各八錢乾薑白朮當歸各四錢甘草二錢數劑全愈蓋此證因肝氣太虛肝中所寄之相火亦虛因而氣化下陷濕寒下注而為白帶故重用黃耆以補肝氣乾薑以助相火白朮扶土以勝濕牡蠣收澀以固下更加以當歸之溫滑與黃耆並用則氣血雙補且不至有收澀太過之弊在下者因而竭之甘草之甘緩與乾薑並用則熱力綿長又不至有過熱僭上之患所以服之有捷效也按爐心有氫氣人腹中亦有氫氣黃者能引氫氣上達於肺與吸入之氧氣相合而化水又能鼓胃中津液上行又能統攝下焦氣化不使小便頻數故能治消渴玉液湯滋膵飲皆治消渴之方原皆重用黃耆黃耆入湯劑生用即是熟用不必先以蜜炙若丸散劑中宜熟用者蜜炙可也若用治瘡瘍雖作丸散亦不宜炙用王洪緒外科證治全生集曾詳言之至於生用發汗熟用止汗之説尤為荒唐蓋因氣分虛陷而出汗者服之即可止汗因陽強陰虛而出汗者服之轉大汗汪洋若氣虛不能逐邪外出者與發表藥同服亦能出汗是知其止汗與發汗不在生熟亦視用之者何如耳附録柳河仲來函庚午季秋偶覺心中發涼服熱藥數劑無效遷延旬日陡覺涼氣上衝腦際頓失知覺移時始蘇日三四發屢次延醫診治不愈乃病不犯時心猶清白遂細閲衷中參西録忽見夫子治坐則左邊下墜睡時不敢向左側之醫案斷為肝虛且謂黃耆與肝木有同氣相求之妙用遂重用生黃耆治愈乃恍悟吾睡時亦不能左側知病源實為肝虛其若斯之涼者肝中所寄之相火衰也爰用生箭耆二兩廣條桂五錢因小便稍有不利又加椒目五錢煎服一劑病大見愈遂即原方連服數劑全愈山萸肉解山萸肉味酸性溫大能收斂元氣振作精神固澀滑脫因得木氣最厚收澀之中兼具條暢之性故又通利九竅流通血脈治肝虛自汗肝虛脅疼腰疼肝虛內風萌動且斂正氣而不斂邪氣與他酸斂之藥不同是以神農本草經謂其逐寒濕痹也其核與肉之性相反用時務須將核去淨近閲醫報有言核味澀性亦主收斂服之恆使小便不利椎破嘗之果有有澀味者其説或可信山茱萸得木氣最厚酸收之中大具開通之力以木性喜條達故也神農本草經謂主寒濕痹諸家本草多謂其能通利九竅其性不但補肝而兼能利通氣血可知若但視為收澀之品則淺之乎視山茱萸矣附案一人年四十餘外感痰喘愚為治愈但脈浮力微按之即無愚曰脈象無根當服峻補之劑以防意外之變病家謂病人從來不受補藥服之則發狂疾峻補之藥實不敢用愚曰既畏補藥如是備用亦可病家依愚言遲半日忽發喘逆又似無氣以息汗出遍體四肢逆冷身軀後挺危在頃刻急用淨萸肉四兩爆火煎一沸即飲下汗與喘皆微止又添水再煎數沸飲下病又見愈復添水將原渣煎透飲下遂汗止喘定四肢之厥逆亦回鄰村李年二十餘素傷煙色偶感風寒醫者用表散藥數劑治愈間日忽遍身冷汗心怔忡異常自言氣息將斷急求為調治診其脈浮弱無根左右皆然愚曰此證雖危易治得萸肉數兩可保無虞急取淨萸肉四兩人參五錢先用萸肉二兩煎數沸急服之心定汗止氣亦接續又將人參切作小塊用所餘萸肉煎濃湯送下病若失一人年四十八大汗淋漓數日不止衾褥皆濕勢近垂危詢方於愚俾用淨萸肉二兩煎湯飲之汗遂止翌晨迎愚診視其脈沉遲細弱而右部之沉細尤甚雖無大汗遍體猶濕疑其胸中大氣下陷詢之果覺胸中氣不上升有類巨石相壓乃恍悟前次之大汗淋漓實系大氣陷後衛氣無所統攝而外泄也遂用生黃耆一兩萸肉知母各三錢一劑胸次豁然汗亦盡止又服數劑以善其後奉天友人田妻年五十餘素有心疼證屢服理氣活血之藥未能除根一日反復甚劇服藥數劑病未輕減田見既濟湯後載有張所治心疼醫案心有會悟遂用其方加沒藥五靈脂各數錢連服數劑全愈至此二年未嘗反復由是觀之萸肉誠得木氣最厚故味雖酸斂而性仍條暢凡肝氣因虛不能條暢而作疼者服之皆可奏效也山萸肉之性又善治內部血管或肺絡破裂以致咳血吐血久不愈者補絡補管湯下載有醫案宜參觀山萸肉之性又善熄內風族家嫂産後十餘日周身汗出不止且四肢發搐此因汗出過多而內風動也急用淨萸肉生山藥各二兩俾煎湯服之兩劑愈至外感之邪不淨而出汗者亦可重用山萸肉以斂之邑張之子年十八九因傷寒服表藥太過汗出不止心中怔忡脈洪數不實大便數日未行為疏方用淨萸肉生山藥生石膏各一兩知母生龍骨生牡蠣各六錢甘草二錢煎服兩劑全愈門生萬曾治一壯年男子因屢經惱怒之餘腹中常常作疼他醫用通氣活血消食祛寒之藥皆不效診其脈左關微弱知系怒久傷肝肝虛不能疏泄也遂用淨萸肉二兩佐以當歸丹參柏子仁各數錢連服數劑腹疼遂愈後凡遇此等證投以此方皆效山茱萸之核原不可入藥以其能令人小便不利也而僻處藥坊所賣山茱萸往往核與肉參半甚或核多於肉即方中注明去淨核亦多不為去誤人甚矣斯編重用山茱萸治險證之處甚多凡用時愚必自加檢點或説給病家檢點務要將核去淨而其分量還足然後不至誤事又山萸肉之功用長於救脫而所以能固脫者因其味之甚酸然間有嘗之微有酸味者此等萸肉實不堪用用以治險證者必須嘗其味極酸者然後用之方能立建奇效白朮解白朮性溫而燥氣香不竄味苦微甘微辛善健脾胃消痰水止泄瀉治脾虛作脹脾濕作渴脾弱四肢運動無力甚或作疼與涼潤藥同用又善補肺與升散藥同用又善調肝與鎮安藥同用又善養心與滋陰藥同用又善補腎為後天資生之要藥故能於肺肝腎心四臟皆能有所補益也附案一婦人年三十許泄瀉半載百藥不效脈象濡弱右關尤甚知其脾胃虛也俾用生白朮軋細焙熟再用熟棗肉六兩和為小餅爐上炙乾當點心服之細細嚼咽未盡劑而愈一婦人因行經下血不止服藥旬余無效勢極危殆診其脈象浮緩按之即無問其飲食不消大便滑瀉知其脾胃虛甚中焦之氣化不能健運統攝下焦之氣化因之不固也遂於治下血藥中加白朮一兩生雞內金一兩服一劑血即止又服數劑以善其後一人年二十二喘逆甚劇脈數至七至投以滋陰兼納氣降氣之劑不效後於方中加白朮數錢將藥煎出其喘促亦至極點不能服藥將藥重溫三次始強服下一劑喘即見輕連服數劑全愈後屢用其方以治喘證之劇者多有效驗一少年咽喉常常發乾飲水連連不能解渴診其脈微弱遲濡當系脾胃濕寒不能健運以致氣化不升也投以四君子湯加乾薑桂枝尖方中白朮重用兩許一劑其渴即止赭石解赭石色赤性微涼能生血兼能涼血而其質重墜又善鎮逆氣降痰涎止嘔吐通燥結用之得當能建奇效其原質為鐵養化合而成其結體雖堅而層層如鐵鏽鐵鏽亦鐵養化合生研服之不傷腸胃即服其稍粗之末亦與腸胃無損且生服則養氣純全大能養血故神農本草經謂其治赤沃漏下日華諸家本草謂其治月經不止也若煅用之即無斯效煅之復以醋淬之尤非所宜且性甚和平雖降逆氣而不傷正氣通燥結而毫無開破原無需乎煅也其形為薄片迭迭而成一面點點作凸形一面點點作凹形者方堪入藥赭石為鐵養化合性同鐵鏽原不宜煅徐靈胎謂若煅之復用醋淬即能傷肺此書諸方中有赭石者皆宜將生赭石軋細用之附案鄰村遲某年四十許當上脘處發瘡大如核桃破後調治三年不愈瘡口大如錢自內潰爛循脅漸至背後每日自背後排擠至瘡口流出膿水若干求治於愚自言患此瘡後三年未嘗安枕強臥片時即覺有氣起自下焦上逆衝心愚曰此即子瘡之病根也俾用生芡實一兩煮濃汁送服生赭石細末五錢遂可安臥又服數次徹夜穩睡蓋氣上逆者乃沖氣之上衝用赭石以鎮之芡實以斂之沖氣自安其宅也繼用活絡效靈丹加生黃耆生赭石各三錢煎服日進一劑半月全愈鄰村毛姓少年於傷寒病瘥後忽痰涎上壅杜塞咽喉幾不能息其父知醫用手大指點其天突穴宜指甲貼喉指端著穴向下用力勿向內用力息微通急迎愚調治遂用香油二兩燉熱調麝香一分灌之旋灌旋即流出痰涎若干繼用生赭石一兩人參六錢蘇子四錢煎湯徐徐飲下痰涎頓開周姓婦年三十許連連嘔吐五六日間勺水不存大便亦不通行自覺下脘之處疼而且結凡藥之有味者入口即吐其無味者須臾亦復吐出醫者辭不治後愚診視其脈有滑象上盛下虛疑其有妊詢之月信不見者五十日矣然結證不開危在目前內經謂有故無殞亦無殞也遂單用赭石二兩煎湯飲下覺藥至結處不能下行復返而吐出繼用赭石四兩又重羅出細末兩許將餘三兩煎湯調細末服下其結遂開大便亦通自此安然無恙至期方産或問赭石名醫別録謂其墜胎今治妊婦竟用赭石如此之多即幸而奏效豈非行險之道乎答曰愚生平治病必熟籌其完全而後為疏方初不敢為孤注之一擲也赭石質重其鎮墜之力原能下有形滯物若胎至六七個月時服之或有妨礙至受妊之初因惡阻而成結證此時其胞室之中不過血液凝結赭石毫無破血之弊且有治赤沃與下血不止之效重用之亦何妨乎況此證五六日間勺飲不能下行其氣機之上逆氣化之壅滯已至極點以赭石以降逆開壅不過調臟腑之氣化使之適得其平又何至有他虞乎廣平縣呂妻年二十餘因惡阻嘔吐甚劇九日之間飲水或少存食物則盡吐出延為診視脈象有力舌有黃苔詢其心中發熱知系夾雜外感遂先用生石膏兩半煎湯一茶杯防其嘔吐徐徐溫飲下熱稍退繼用生赭石二兩煎湯一大茶杯分兩次溫飲下覺行至下脘作疼不復下行轉而上逆吐出知其下脘所結甚堅原非輕劑所能通亦用生赭石細末四兩從中再羅出極細末一兩將餘三兩煎湯送服其極細末其結遂開從此飲食順利及期而産一室女中秋節後感冒風寒三四日間胸膈滿悶不受飲食飲水一口亦吐出劇時恆以手自撓其胸脈象滑實右部尤甚遂單用生赭石細末兩半俾煎湯溫飲下頓飯頃仍吐出蓋其胃口皆為痰涎壅滯藥不勝病下行不通復轉而吐出也遂更用赭石四兩煎湯一大碗分三次陸續溫飲下胸次遂通飲水不吐翌日脈象洪長其舌苔從先微黃忽變黑色又重用白虎湯連進兩大劑每劑用生石膏四兩分數次溫飲下大便得通而愈曲年三十餘得瘟病兩三日噁心嘔吐五日之間飲食不能下咽來院求為診治其脈浮弦數近六至重按無力口苦心熱舌苔微黃因思其脈象浮弦者陽明與少陽合病也二經之病機相併上衝故作嘔吐也心熱口苦者內熱已實也其脈無力而數者無穀氣相助又為內熱所迫也因思但用生赭石煮水飲之既無臭味且有涼鎮之力或可不吐遂用生赭石二兩煎水兩茶杯分二次溫飲下飲完仍復吐出病人甚覺惶恐加以久不飲食形狀若莫可支持愚曰無恐再用藥末數錢必能立止嘔吐遂單用生赭石細末五錢開水送服覺噁心立止須臾胸次通暢進薄粥一杯下行順利從此飲食不復嘔吐而心中猶發熱舌根腫脹言語不利又用生石膏一兩丹參乳香沒藥連翹各三錢連服兩劑全愈癸亥秋李之族姊周身灼熱脈象洪實心中煩躁怔忡飲食下咽即嘔吐屢次所服之藥亦皆嘔吐不受視其舌苔黃厚大便數日未行知其外感之熱已入陽明之府又挾胃氣上逆沖氣上衝也為疏方用生赭石細末八錢生石膏細末兩半蔞仁一兩玄參天冬各六錢甘草二錢將後五味煎湯一大茶杯先用開水送服赭石細末繼將湯藥服下遂受藥不吐再服一劑全愈一婦人年近五旬得溫病七八日表里俱熱舌苔甚薄作黑色狀類舌斑此乃外感兼內虧之證醫者用降藥兩次下之遂發喘逆令其子兩手按其心口即可不喘須臾又喘又令以手緊緊按住喘又少停診其脈尺部無根寸部搖搖此將脫之候也時當仲夏俾用生雞子黃四枚調新汲井泉水服之喘稍定可容取藥遂用赭石細末二錢同生雞子黃二枚溫水調和服之喘遂愈脈亦安定繼服參赭鎮氣湯以善其後友人毛曾治一婦人胸次鬱結飲食至胃不能下行時作嘔吐毛用赭石細末六錢濃煎人參湯送下須臾腹中如爆竹之聲胸次胃中俱覺通豁至此飲食如常友人高曾治一人上焦滿悶艱於飲食胸中覺有物窒塞醫者用大黃蔞實陷胸之品十餘劑轉覺胸中積滿上至咽喉飲水一口即溢出高用赭石二兩人參六錢為方煎服頓覺窒塞之物降至下焦又加當歸肉蓯蓉再服一劑降下瘀滯之物若干病若失友人李曾治一人寒痰壅滯胃中嘔吐不受飲食大便旬日未行用人參八錢乾薑六錢赭石一兩一劑嘔吐即止又加當歸五錢大便得通而愈門人高曾治一叟年七十餘得厄逆證兼小便不通劇時覺杜塞咽喉息不能通兩目上翻身軀後挺更醫數人治不效高診其脈浮而無力遂用赭石臺參生山藥生芡實牛蒡子為方投之厄逆頓愈又加竹茹服一劑小便亦通利歷觀以上諸治驗案赭石誠為救顛扶危之大藥也乃如此良藥今人罕用間有用者不過二三錢藥不勝病用與不用同也且愚放膽用至數兩者非鹵莽也誠以臨證既久凡藥之性情能力及宜輕宜重之際研究數十年心中皆有定見而後敢如此放膽百用不至一失且赭石所以能鎮逆氣能下有形瘀滯者以其饒有重墜之力於氣分實分毫無損況氣虛者又佐以人參尤為萬全之策也參赭並用不但能納氣歸原也設於逆氣上干填塞胸臆或兼嘔吐其證之上盛下虛者皆可參赭並用以治之內經謂陽明厥逆喘咳身熱善驚衄嘔血黃坤載衍內經之旨謂血之失於便溺者太陰之不升也亡於吐衄者陽明之不降也是語深明內經者也蓋陽明胃氣以息息下降為順時或不降則必壅滯轉而上逆上逆之極血即隨之上升而吐衄作矣治吐衄之證當以降胃為主而降胃之藥實以赭石為最效然胃之所以不降有因熱者宜降之以赭石而以蔞仁白芍諸藥佐之其熱而兼虛者可兼佐以人參有因涼者宜降以赭石而以乾薑白芍諸藥佐之因涼猶用白芍者防乾薑之熱侵肝膽也然吐衄之證由於胃氣涼而不降者甚少其涼而兼虛者可兼佐以白朮有因下焦虛損沖氣不攝上衝胃氣不降者宜降以赭石而以生山藥生芡實諸藥佐之有因胃氣不降致胃中血管破裂其證久不愈者宜降以赭石而以龍骨牡蠣三七諸藥佐之無論吐衄之證種種病因不同疏方皆以赭石為主而隨證制宜佐以相當之藥品吐衄未有不愈者奉天張年近四旬陡然鼻中衄血甚劇脈象關前洪滑兩尺不任重按知繫上盛下虛之證自言頭目恆不清爽每睡醒舌乾無津大便甚燥數日一行為疏方赭石生地黃生山藥各一兩當歸白芍生龍骨生牡蠣懷牛膝各五錢煎湯送服旱三七細末二錢凡用生地治吐衄者皆宜佐以三七血止後不至淤血留於經絡一劑血頓止後將生地減去四錢加熟地枸杞各五錢連服數劑脈亦平和傷寒下早成結胸瘟疫未下亦可成結胸所謂結胸者乃外感之邪與胸中痰涎互相凝結滯塞氣道幾難呼吸也仲景有大陷胸湯丸原為治此證良方然因二方中皆有甘遂醫者不敢輕用病家亦不敢輕服一切利氣理痰之藥又皆無效故恆至束手無策向愚治此等證俾用新炒蔞仁四兩搗碎煮湯服之恆能奏效後擬得一方用赭石蔞仁各二兩蘇子六錢方名蕩胸湯用之代大陷胸湯丸屢試皆能奏效若其結在胃口心下滿悶按之作疼者系小陷胸湯證又可將方中分量減半以代小陷胸湯其功效較小陷胸湯尤捷自擬此方以來救人多矣至寒溫之證已傳陽明之府卻無大熱惟上焦痰涎壅滯下焦大便不通者亦可投以此方分量亦宜斟酌少用上清其痰下通其便誠一舉兩得之方也至寒溫之證不至結胸及心下滿悶惟逆氣挾胃熱上衝不能飲食並不能受藥者宜赭石與清熱之藥並用曾治奉天安之妻年四十餘臨産雙生異常勞頓噁心嘔吐數日不能飲食服藥亦恆嘔吐精神昏憒形勢垂危群醫辭不治延愚診視其脈洪實面有火舌苔黃厚知系産後溫病其嘔吐若是者陽明府熱已實胃氣因熱而上逆也遂俾用玄參兩半赭石一兩同煎服一劑即熱退嘔止可以受食繼用玄參白芍連翹以清其餘熱病遂全愈至放膽用玄參而無所顧忌者以玄參原宜於産乳神農本草經有明文也下有實寒上有浮熱之證欲用溫熱之藥以祛其寒上焦恆格拒不受惟佐以赭石使之速於下行直達病所上焦之浮熱轉能因之下降曾治鄰村劉某因房事後恣食生冷忽然少腹抽疼腎囊緊縮大便不通上焦兼有煩熱醫者投以大黃附子細辛湯上焦煩熱益甚兩脅疼脹便結囊縮腹疼如故病家甚覺惶恐求為診視其脈弦而沉兩尺之沉尤甚先用醋炒蔥白尉其臍及臍下腹中作響大有開通之意囊縮腹疼亦見愈便仍未通遂用赭石二兩烏附子五錢當歸蘇子各一兩煎湯飲下即覺藥力下行過兩句鍾俾煎渣飲之有頃降下結糞若干諸病皆愈膈食之證千古難治之證也傷寒論有旋覆代赭石湯原治傷寒發汗若吐若下解後心下痞硬噫氣不除者周揚俊喻嘉言皆謂治膈證甚效然神農本草經謂旋覆花味鹹若真好旋覆花實咸而兼有辛味敝邑武帝臺汙所産旋覆花咸而辛今藥坊間所鬻旋覆花皆甚苦實不堪用是以愚治膈證恆用其方去旋覆花將赭石加重其沖氣上衝過甚兼大便甚乾結者赭石恆用至兩許再加當歸柿霜天冬諸藥以潤燥生津且更臨時制宜隨證加減治愈者不勝録蓋此證因胃氣衰弱不能撑懸賁門下焦沖氣又挾痰涎上衝以杜塞之是以不受飲食故用人參以壯胃氣氣壯自能撑懸賁門使之寬展赭石以降沖氣沖降自挾痰涎下行不慮杜塞此方之所以效也若藥房間偶有咸而且辛之旋覆花亦可斟酌加入然加旋覆花又須少減赭石也此證有因賁門腫脹內有瘀血致賁門窄小者宜於方中加蘇木蟅蟲俗名土鱉各二錢頭疼之證西人所謂腦氣筋病也然恆可重用赭石治愈近在奉天曾治何姓女年二十餘歲每日至巳頭疼異常左邊尤甚過午則愈先經東人治之投以麻醉腦筋之品不效後求為診視其左脈浮弦有力者系少陽之火挾心經之熱乘陽旺之時而上升以衝突腦部也為疏方赭石龍骨牡蠣龜板萸肉白芍各六錢龍膽草二錢藥料皆用生者煎服一劑病愈強半又服兩劑全愈隔數日又治鞠姓婦頭疼亦如前狀仍投以此方兩劑全愈癲狂之證亦西人所謂腦氣筋病也而其腦氣筋之所以病者因心與腦相通之道路心有四支血脈管通腦為痰火所充塞也愚恆重用赭石二兩佐以大黃朴硝半夏鬱金其痰火甚實者間或加甘遂二錢為末送服輒能隨手奏效誠以赭石重墜之力能引痰火下行俾心腦相通之路毫無滯礙則腦中元神心中識神自能相助為理而不至有神明瞀亂之時也在奉天曾治一人年近三旬癲狂失心屢經中西醫治療四載分毫無效來院求為診治其脈象沉實遂投以上所擬方每劑加甘遂二錢五分間兩日一服凡藥中有甘遂不可連服其不服湯藥之二日仍用赭石朴硝細末各五錢分兩次服下如此旬余而愈癇瘋之證千古難治之證也西人用麻醉腦筋之品日服數次恆可強制不發然亦間有發時且服之纍年不能除根而此等藥常服又有昏精神減食量之弊庚申歲在奉天因診治此等證研究數方合用之連治數人皆愈一方用赭石六錢於朮酒麴用神麯則無效且宜生用半夏龍膽草生明沒藥各三錢此係湯劑一方用真黑鉛四兩鐵鍋內熔化再加硫黃細末二兩撒於鉛上硫黃皆著急用鐵鏟拌炒之鉛經硫黃燒煉皆成紅色因拌炒結成砂子取出涼冷碾軋成餅者系未化透之鉛去之余者再用乳鉢研極細末攙硃砂細末與等分再少加蒸熟麥面以僅可作丸為度水和作丸半分重乾透足半分一方用西藥臭剝臭素安母紐謨各二錢抱水過魯拉爾一錢共研細攙蒸熟麥面四錢水和為丸桐子大上藥早晚各服西藥十四瓦午時服鉛硫硃砂丸十二丸日服藥三次皆煎湯劑送下湯藥一劑可煎三次以遞送三次所服丸藥如此服藥月餘癇風可以除根內經云諸風掉眩皆屬於肝肝經風火挾痰上衝遂致腦氣筋頓失其所司周身抽掣知覺全無赭石含有鐵質既善平肝而其降逆之力又能協同黑鉛硃砂以墜痰鎮驚此其所以效也而必兼用西藥者因臭剝臭素諸藥皆能強制腦筋以治病之標俾目前不至反復而後得徐以健脾利痰祛風清火之藥以剷除其病根也人之廉於飲食者宜補以健脾之藥而純用健補脾臟之品恆多礙於胃氣之降致生脹滿是以補脾者宜以降胃之藥佐之而降胃之品又恆與氣分虛弱者不宜惟赭石性善降胃而分毫不傷氣分且補藥性多溫易生浮熱赭石性原不涼而能引熱下行所以諸家本草多言其性涼是以愚習用赭石不但以之降胃也凡遇有虛熱之證或其人因熱痰嗽或其人因熱怔忡但問其大便不滑瀉者方中加以赭石則奏效必速也內中風之證忽然昏倒不省人事內經所謂血之與氣並走於上之大厥也亦即史記扁鵲傳所謂上有絶陽之絡下有破陰之紐之尸厥也此其風非外來誠以肝火暴動與氣血相併上衝腦部西人剖驗此證謂腦部皆有死血或兼積水惟用藥鎮斂肝火寧熄內風將其上衝之氣血引還其證猶可挽回此金匱風引湯所以用龍骨牡蠣也然龍骨牡蠣雖能斂火熄風而其性皆澀欠下達之力惟佐以赭石則下達之力速上逆之氣血即可隨之而下曾治奉天杜忽然頭目眩暈口眼歪斜舌強直不能發言脈象弦長有力左右皆然視其舌苔白厚微黃且大便數日不行知其證兼內外中風也俾先用阿斯匹林瓦半白糖水送下以發其汗再用赭石生龍骨生牡蠣蔞仁各一兩生石膏兩半菊花連翹各二錢煎湯趁其正出汗時服之一劑病愈強半大便亦通又按其方加減連服數劑全愈鄰村韓姓媼年六旬於外感病愈後忽然胸膈連心下突脹腹臍塌陷頭暈項強妄言妄見狀若瘋狂其脈兩尺不見關前搖搖無根數至六至此下焦虛憊沖氣不攝挾肝膽浮熱上干腦部亂其神明也遂用赭石龍骨牡蠣山藥地黃皆用生者各一兩野臺參淨萸肉各八錢煎服一劑而愈又少為加減再服一劑以善其後鄰村劉年三十許因有惱怒忽然昏倒不省人事牙關緊閉唇齒之間有痰涎隨呼氣外吐六脈閉塞若無急用作嚏之藥吹鼻中須臾得嚏其牙關遂開繼用香油兩餘燉溫調麝香末一分灌下半句鍾時稍醒悟能作呻吟其脈亦出至數五至余而兩尺弱甚不堪重按知其腎陰虧損故肝膽之火易上衝也遂用赭石熟地生山藥各一兩龍骨牡蠣淨萸肉各六錢煎服後豁然頓愈繼投以理肝補腎之藥數劑以善其後按此等證當痰火氣血上壅之時若人參地黃山藥諸藥似不宜用而確審其繫上盛下虛若扁鵲傳所云云者重用赭石以輔之則其補益之力直趨下焦而上盛下虛之危機旋轉甚速莫不隨手奏效也附録直隸青縣張來函族嫂年三十餘歲身體甚弱於季春忽患頭疼右邊疼尤劇以致上下眼瞼皆疼口中時溢涎沫唾吐滿地經血兩月未見舌苔黏膩左脈弦硬而浮右脈沉滑知系氣血兩虛內有蘊熱挾肝膽之火上衝頭目且有熱痰杜塞中焦也為疏方用赭石解下所載治何姓女之方加減生赭石細末六錢淨山萸肉五錢野臺參生杭芍生龜板當歸身各三錢一劑左邊疼頓減而右邊之疼如故遂用前方加丹皮二錢赭石改用八錢服後不但頭疼悉愈且口內涎沫亦無惟月經仍未見又改用赭石至一兩加川芎二錢服下翌日月事亦通夫赭石向在藥物中為罕用之品而此方用之以治頭疼以治痰涎杜塞以治月事不見皆能隨手奏效實赭石之力居多山藥解山藥色白入肺味甘歸脾液濃益腎能滋潤血脈固攝氣化寧嗽定喘強志育神性平可以常服多服宜用生者煮汁飲之不可炒用以其含蛋白質甚多炒之則其蛋白質焦枯服之無效若作丸散可軋細蒸熟用之醫方篇一味薯蕷飲後附有用山藥治愈之驗案數則可參觀附案法庫萬之母自三十餘歲時即患痰喘咳嗽歷三十年百藥不效且年愈高病亦愈進至一九二一年春又添發燒咽乾頭汗出食不下等證延醫診視云是痰盛有火與人參清肺湯加生地丹皮等味非特無效反發熱如火更添泄瀉有不可終日之勢後忽見衷中參西録一味薯蕷飲遂用生懷山藥四兩加玄參三錢煎湯一大碗分數次徐徐溫服一劑即見效至三劑病愈強半遂改用生懷山藥細末一兩煮作粥服之日兩次間用開胃藥旬余而安宿病亦大見輕大約久服宿病亦可除根又萬妻大便泄瀉數年不愈亦服山藥粥而愈按山藥之功效一味薯蕷飲後曾詳言之至治泄瀉必變飲為粥者誠以山藥汁本稠黏若更以之作粥則稠黏之力愈增大有留戀腸胃之功也憶二十年前歲試津門偶患泄瀉飲食下咽覺與胃腑不和須臾腸中作響遂即作瀉濃煎甘草湯調赤石脂細末服之不效乃用白粳米慢火煮爛熟作粥儘量食之頓覺脾胃舒和腹中亦不作響泄瀉遂愈是知無論何物作粥皆能留戀腸胃而山藥性本收澀故煮粥食之其效更捷也且大便溏瀉者多因小便不利山藥能滋補腎經使腎陰足而小便自利大便自無溏瀉之患地黃解鮮地黃性寒微苦微甘最善清熱涼血化瘀血生新血治血熱妄行吐血衄血二便因熱下血其中含有鐵質故曬之蒸之則黑其生血涼血之力亦賴所含之鐵質也乾地黃即藥房中生地黃經日曬乾性涼而不寒生血脈益精髓聰明耳目治骨蒸勞熱腎虛生熱熟地黃用鮮地黃和酒屢次蒸曬而成其性微溫甘而不苦為滋陰補腎主藥治陰虛發熱陰虛不納氣作喘勞瘵咳嗽腎虛不能漉水小便短少積成水腫以及各臟腑陰分虛損者熟地黃皆能補之附案鄰村李媼年七旬勞喘甚劇十年未嘗臥寢俾每日用熟地煎湯當茶飲之數日即安臥其家人反懼甚以為如此改常恐非吉兆而不知其病之愈也侯之子五歲因服涼瀉之藥太過致成慢驚胃寒吐瀉常常瘛瘲精神昏憒目睛上泛有危在頃刻之象為處方用熟地黃二兩生山藥一兩乾薑附子肉桂各二錢淨萸肉野臺參各三錢煎湯一杯半徐徐溫飲下吐瀉瘛瘲皆止精神亦振似有煩躁之意遂去乾薑加生杭芍四錢再服一劑全愈一童子年十四五傷寒已過旬日大便滑瀉不止心中怔忡異常似有不能支持之狀脈至七至按之不實醫者辭不治投以熟地生山藥生杭芍各一兩滑石八錢甘草五錢煎湯一大碗徐徐溫飲下亦盡劑而愈統觀以上諸案馮氏謂地黃大補腎中元氣之説非盡無憑蓋陰者陽之守血者氣之配地黃大能滋陰養血大劑服之使陰血充足人身元陽之氣自不至上脫下陷也用熟地治寒溫恆為醫家所訾然遇其人真陰太虧不能支持外感之熱者於治寒溫藥中放膽加熟地以滋真陰恆能挽回人命於頃刻曾治一室女資稟素羸弱得溫病五六日痰喘甚劇治以金匱小青龍湯加石膏一劑喘頓止時屆晚八點鐘一夜安穩至寅時喘復作不若從前之劇而精神恍惚心中怔忡再診其脈如水上浮麻不分至數按之即無此將脫之候也取藥不暇幸有預購山藥兩許急煎服之病少愈此際已疏方取藥方系熟地四兩生山藥一兩野臺參五錢而近處藥房無野臺參並他參亦鬻盡再至他處又恐誤事遂單煎熟地山藥飲之病愈強半一日之內按其方連進三劑病遂全愈按此證原當用拙擬來復湯其方重用山萸肉以收脫而當時愚在少年其方猶未擬出亦不知重用萸肉而自晨至暮共服熟地十二兩竟能救此垂危之證熟地之功用誠偉哉又此證初次失處在服小青龍湯後未用補藥愚經此證後凡遇當用小青龍湯而脈稍弱者服後即以補藥繼之或加人參於湯中恐其性熱可將所加之石膏加重張氏八陳趙氏醫貫馮氏錦囊皆喜重用熟地雖外感證亦喜用之其立言誠有偏處然當日必用之屢次見效而後筆之於書張氏書中載有治一老年傷寒戰而不汗翌日屆其時猶有將汗之意急與一大劑八味地黃湯以助其汗服後遂得大汗閲數時周身皆涼氣息甚微汗猶不止精神昏昏復與原湯一劑汗止而精神亦復夫用其藥發汗即用其藥止汗運用之妙頗見慧心又趙氏書中謂六味地黃湯能退寒溫之實熱致貽後世口實然其言亦非盡不驗憶昔乙酉丙戌數年間之寒溫病熱入陽明府後凡於清解藥中能重用熟地以滋陰者其病皆愈此乃一時氣運使然不可筆之於書以為定法也又馮氏所著本草謂熟地能大補腎中元氣此亦確論凡下焦虛損大便滑瀉服他藥不效者單服熟地即可止瀉然須日用四五兩煎濃湯服之亦不作悶熟地少用則作悶多用轉不悶少用則無效至陳修園則一概抹倒直視熟地為不可用豈能知熟地哉寒溫傳裡之後其人下焦虛憊太甚者外邪恆直趨下焦作泄瀉亦非重用熟地不能愈癸巳秋一女年三十許得溫病十餘日勢至垂危將舁於外同坐賈謂愚知醫主家延為診視其證晝夜泄瀉昏不知人呼之不應其脈數至七至按之即無遂用熟地黃二兩生山藥生杭芍各一兩甘草三錢煎湯一大碗趁溫徐徐灌之盡劑而愈甘草解附甘草反鰱魚之質疑甘草性微溫其味至甘能解一切毒性甘者主和故有調和脾胃之功甘者主緩故雖補脾胃而實非峻補炙用則補力較大是以方書謂脹滿證忌之若軋末生服轉能通利二便消脹除滿若治瘡瘍亦宜生用或用生者煎服亦可仲景有甘草瀉心湯用連苓半夏以瀉心下之痞即用甘草以保護心主不為諸藥所傷損也至白虎湯用之是借其甘緩之性以緩寒藥之侵下通脈湯四逆湯用之是借其甘緩之性以緩熱藥之僭上與芍藥同用能育陰緩中止疼仲景有甘草芍藥湯與乾薑同用能逗留其熱力使之綿長仲景有甘草乾薑湯與半夏細辛諸藥同用能解其辛而且麻之味使歸和平惟與大戟芫花甘遂海藻相反余藥則皆相宜也古方治肺癰初起有單用粉甘草四兩煮湯飲之者恆有效驗愚師其意對於肺結核之初期咳嗽吐痰微帶腥臭者恆用生粉甘草為細末每服錢半用金銀花三錢煎湯送下日服三次屢屢獲效若肺病已久或兼吐膿血可用粉甘草細末三錢浙貝母三七細末各錢半共調和為一日之量亦用金銀花煎湯送下若覺熱者可再加玄參數錢煎湯送服皮黃者名粉甘草性平不溫用於解毒清火劑中尤良愚擬治霍亂兩方一為急救回生丹一為衛生防疫寶丹二方中皆重用甘草則甘草之功用可想也然亦多賴將甘草軋細生用未經蜜炙水煮耳誠以暴病傳染皆挾有毒氣流行生用則其解毒之力較大且甘草熟用則補生用則補中仍有流通之力故於霍亂相宜也至於生用能流通之説可以事實徵之附案開原王姓幼童脾胃虛弱飲食不能消化恆吐出且小便不利周身漫腫腹脹大用生甘草細末與西藥百布聖各等分每服一錢日三次數日吐止便通腫脹皆消鐵嶺友人魏其地多甘草魏日以甘草置茶壺中當茶葉沖水飲之旬日其大小便皆較勤遂不敢飲後與愚覿面為述其事且問甘草原有補性何以通利二便答曰甘草熟用則補生用則通以之置茶壺中雖沖以開水其性未熟仍與生用相近故能通也門生李言曾有一孺子患腹疼用暖臍膏貼之後其貼處潰爛醫者謂多飲甘草水可愈復因飲甘草水過多小便不利身腫腹脹再延他醫治之服藥無效其地近火車站火車恆裝卸甘草其姊攜之拾甘草嚼之日以為常其腫脹竟由此而消觀此則知甘草生用熟用其性竟若是懸殊用甘草者可不於生熟之間加之意乎附甘草反鰱魚之質疑近閲遁園醫案長沙蕭琢如著載鰱魚反甘草之事謂當遜清末葉醫士顏篤實人也一日告余曾在某邑為人治病見一奇案令人不解有一農家人口頗衆冬月塘涸取魚煮食以供午餐丁壯食魚且盡即散而赴工婦女童稚數人復取魚烹治佐食及晚有一婦初覺飽悶不適臥床歇息衆未介意次日呼之不起審視則已僵矣舉家驚訝莫明其故再四考查自進午餐後並未更進他種食物亦無纖芥事故乃取前日烹魚之釜細察視之除魚汁骨肉外惟存甘草一條約四五寸許究問所來據其家婦女云小孩啼哭每以甘草與食釜中所存必系小兒所遺落者又檢所烹之魚皆系鰱魚並非毒物且甘草亦並無反鰱魚之説矧同食者若干人何獨一人偏受其災頃刻鄰里咸集又久之其母家亦至家人據實以告衆一少年大言於衆曰甘草鰱魚同食斃命千古無此奇事豈得以謊言搪塞果爾則再用此二物同煮與我食之言已即促同來者照辦並親自手擎二物置釜中烹熟取盤箸陳列席間旁人疑阻者輒怒斥之即席大啖並笑旁觀者愚暗膽怯屆晚間固無甚痛苦亦無若何表示至次晨則僵臥不起矣由斯其母家嫌疑解釋按鰱魚為常食之物甘草又為藥中常用之品苟此二物相反疏方用甘草時即當戒其勿食鰱魚硃砂解硃砂味微甘性涼為汞五硫一化合而成性涼體重故能養精神安魂魄鎮驚悸熄肝風為其色赤入心能清心熱使不耗血故能治心虛怔忡及不眠能消除毒菌故能治暴病傳染霍亂吐瀉能入腎導引腎氣上達於心則陰陽調和水火既濟目得水火之精氣以養其瞳子故能明目外用之又能敷瘡瘍疥癩諸毒鄒潤安曰凡藥所以致生氣於病中化病氣為生氣也凡用藥取其稟賦之偏以救人陰陽之偏勝也是故藥物之性未有不偏者徐洄溪曰藥之用或取其氣或取其味或取其色或取其形或取其質或取其性情或取其所生之時或取其所成之地愚謂丹砂則取其質與氣與色為用者也質之剛是陽內含汞則陰氣之寒是陰色純赤則陽故其義為陽抱陰陰承陽稟自先天不假作為人之有生以前兩精相搏即有神神依於精乃有氣有氣而後有生有生而後知識具以成其魂鑑別昭以成其魄故凡精氣失其所養則魂魄遂不安欲養之安之則舍陰陽緊相抱持密相承接之丹砂又奚取乎然謂主身體五臟百病養精神安魂魄益氣明目何也夫固以氣寒非溫煦生生之具故僅能於身體五臟百病中養精神安魂魄益氣明目耳若身體五臟百病中其不必養精神安魂魄益氣明目者則不必用丹砂也血脈不通者水中之火不繼續也煩滿消渴者火中之水失滋澤也中惡腹痛陰陽不相保抱邪得乘間以入毒氣疥瘻諸瘡陽不畜陰而反灼陰得惟藥之陽抱陰陰涵陽者治之斯陽不為陰賊陰不為陽纍諸疾均可已矣按此為鄒氏釋神農本草經之文可謂精細入微矣附案壬寅秋月霍亂流行友人毛之侄受此證至垂危衣冠既畢舁之床上毛見其仍有微息遂研硃砂錢許和童便灌之其病由此竟愈一女子得霍亂至垂危醫者辭不治時愚充教員於其處求為診治亦用藥無效適有搖鈴賣藥者言能治此證亦單重用硃砂錢許治之而愈愚從此知硃砂善化霍亂之毒菌至己未在奉天擬得急救回生丹衛生防疫寶丹兩方皆重用硃砂治愈斯歲之患霍亂者不勝紀傳之他省亦救人甚夥可徵硃砂之功效神奇矣然須用天産硃砂方效若人工所造硃砂色紫成大塊作錠形者為人工所造硃砂止可作顏料用不堪入藥鴉膽子解鴉膽子俗名鴨蛋子即苦參所結之子味極苦性涼為涼血解毒之要藥善治熱性赤痢赤痢間有涼者二便因熱下血最能清血分之熱及腸中之熱防腐生肌誠有奇效愚生平用此藥治愈至險之赤痢不勝紀用時去皮每服二十五粒極多至五十粒白糖水送下鴨蛋子味甚苦服時若嚼破即不能下咽若去皮時破者亦不宜服恐服後若下行不速或作惡心嘔吐故方書用此藥恆以龍眼肉包之一顆龍眼肉包七數以七七之數為劑然病重身強者猶可多服常以八八之粒為劑然亦不必甚拘鴨蛋子連皮搗細醋調敷疔毒甚效立能止疼其仁搗如泥可以點痣拙擬毒淋湯又嘗重用之以治花柳毒淋其化瘀解毒之力如此治痢所以有奇效也龍骨解龍骨味淡微辛性平質最黏澀具有翕收之力以舌舐之即吸舌不脫有翕收之力可知故能收斂元氣鎮安精神固澀滑脫凡心中怔忡多汗淋漓吐血衄血二便下血遺精白濁大便滑瀉小便不禁女子崩帶皆能治之其性又善利痰治肺中痰飲咳嗽咳逆上氣其味微辛收斂之中仍有開通之力故神農本草經謂其主瀉利膿血女子漏下而又主癥瘕堅結也龍齒與龍骨性相近而又饒鎮降之力故神農本草經謂主小兒大人驚癇癲疾狂走心下結氣不能喘息也愚於忽然中風肢體不遂之證其脈甚弦硬者知系肝火肝風內動恆用龍骨同牡蠣加於所服藥中以斂戢之至脈象柔和其病自愈拙擬鎮肝熄風湯建瓴湯皆重用龍骨方後皆有驗案可參觀龍骨若生用之凡心中怔忡虛汗淋漓經脈滑脫神魂浮蕩諸疾皆因元陽不能固攝重用龍骨借其所含之元陰以翕收此欲渙之元陽則功效立見若煅用之其元陰之氣因煅傷損縱其質本黏澀煅後其黏澀增加而其翕收之力則頓失矣用龍骨者用其黏澀誠不如用其吸收也明乎此理則龍骨之不宜煅益明矣王洪緒外科證治全生集謂用龍骨者宜懸之井中經宿而後用之是可謂深知龍骨之性而善於用之者矣愚用龍骨約皆生用惟治女子血崩或將流産至極危時恆用煅者取其澀力稍勝以收一時之功也陳修園曰痰水也隨火而上升龍骨能引逆上之火泛濫之水下歸其宅若與牡蠣同用為治痰之神品今人止知其性澀以收脫何其淺也牡蠣解牡蠣味鹹而澀性微涼能軟堅化痰善消瘰癧止厄逆固精氣治女子崩帶神農本草經謂其主溫瘧者因溫瘧但在足少陽故不與太陽相併為寒但與陽明相併為熱牡蠣能入其經而祛其外來之邪主驚恚怒氣者因驚則由於膽怒則由於肝牡蠣鹹寒屬水以水滋木則肝膽自得其養且其性善收斂有保合之力則膽得其助而驚恐自除其質類金石有鎮安之力則肝得其平而恚怒自息矣至於筋原屬肝肝不病而筋之或拘或緩者自愈故神農本草經又謂其除拘緩也牡蠣所消之瘰癧即神農本草經所謂癙瘻而其所以能消癙瘻者非因其咸能軟堅也蓋牡蠣之原質為炭酸鈣化合而成其中含有沃度亦名海典沃度者善消瘤贅瘰癧之藥也醫方篇消瘰丸下附有驗案可參觀龍骨牡蠣若專取其收澀可以煅用若用以滋陰用以斂火或取其收斂兼取其開通者二藥皆斂而能開皆不可煅若作丸散亦可煅用因煅之則其質稍軟與脾胃相宜也然宜存性不可過煅若入湯劑仍以不煅為佳今用者一概煅之殊非所宜石決明解石決明味微咸性微涼為涼肝鎮肝之要藥肝開竅於目是以其性善明目研細水飛作敷藥能除目外障作丸散內服熊消目內障消內障丸散優於湯劑為其能涼肝兼能鎮肝故善治腦中充血作疼作眩暈因此證多系肝氣肝火挾血上衝也是以愚治腦充血證恆重用之至兩許其性又善利小便通五淋蓋肝主疏泄為腎行氣用決明以涼之鎮之俾肝氣肝火不妄動自能下行腎氣不失疏泄之常則小便之難者自利五淋之澀者自通矣此物乃鰒甲也狀如蛤單片附石而生其邊有孔如豌豆七孔九孔者佳宜生研作粉用之不宜煆用玄參解玄參色黑味甘微苦性涼多液原為清補腎經之藥中心空而色白此其本色藥房多以黑豆皮水染之則不見其白矣故又能入肺以清肺家燥熱解毒消火最宜於肺病結核肺熱咳嗽神農本草經謂其治産乳余疾因其性涼而不寒又善滋陰且兼有補性凡名參者皆含有補性故産後血虛生熱及産後寒溫諸證熱入陽明者用之最宜愚生平治産後外感實熱其重者用白虎加人參湯以玄參代方中知母其輕者用拙擬滋陰清胃湯亦可治愈誠以産後忌用涼藥而既有外感實熱又不得不以涼藥清之惟石膏與玄參神農本草經皆明載治産乳故敢放膽用之然用石膏又必加人參以輔之又不敢與知母並用至滋陰清胃湯中重用玄參亦必以四物湯中歸芍輔之此所謂小心放膽並行不悖也神農本草經又謂玄參能明目誠以肝開竅於目玄參能益水以滋肝木故能明目且目之所以能視者在瞳子中神水充足神水固腎之精華外現者也以玄參與柏實枸杞並用以治肝腎虛而生熱視物不了了者恆有捷效也又外感大熱已退其人真陰虧損舌乾無津胃液消耗口苦懶食者愚恆用玄參兩許加潞黨參二三錢連服數劑自愈當歸解當歸味甘微辛氣香液濃性溫為生血活血之主藥而又能宣通氣分使氣血各有所歸故名當歸其力能升因其氣厚而溫能降因其味厚而辛內潤臟腑因其液濃而甘外達肌表因其味辛而溫能潤肺金之燥故神農本草經謂其主咳逆上氣能緩肝木之急故金匱當歸芍藥散治婦人腹中諸疼痛能補益脾血使人肌膚華澤生新兼能化瘀故能治周身麻痹肢體疼痛瘡瘍腫疼活血兼能止血故能治吐血衄血須用醋炒取其能降也二便下血須用酒炒取其能升也潤大便兼能利小便舉凡血虛血枯陰分虧損之證皆宜用之惟虛勞多汗大便滑瀉者皆禁用當歸之性雖溫而血虛有熱者亦可用之因其能生血即能滋陰能滋陰即能退熱也其表散之力雖微而頗善祛風因風著人體恆致血痹血活痹開而風自去也至於女子産後受風發搐尤宜重用當歸因産後之發搐半由於受風半由於血虛血虛不能榮筋當歸既能活血以祛風又能生血以補虛是以愚治此等證恆重用當歸一兩少加散風之品以佐之即能隨手奏效附案一少婦身體羸弱月信一次少於一次浸至只來少許詢問治法時愚初習醫未敢疏方俾每日單用當歸八錢煮汁飲之至期所來經水遂如常由此可知當歸生血之效也一人年四十餘得溺血證自用當歸一兩酒煮飲之而愈後病又反復再用原方不效求為診治愚俾單用去皮鴉膽子五十粒冰糖化水送下而愈後其病又反復再服鴉膽子方兩次無效仍用酒煮當歸飲之而愈夫人猶其人證猶其證從前治愈之方後用之有效有不效者或因血證之前後涼熱不同也然即此亦可知當歸之能止下血矣芍藥解芍藥味苦微酸性涼多液單煮之其汁甚濃善滋陰養血退熱除煩能收斂上焦浮越之熱下行自小便瀉出為陰虛有熱小便不利者之要藥為其味酸故能入肝以生肝血為其味苦故能入膽而益膽汁為其味酸而兼苦且又性涼又善瀉肝膽之熱以除痢疾後重痢後重者皆因肝膽之火下迫療目疾腫疼肝開竅於目與當歸地黃同用則生新血與桃仁紅花同用則消瘀血與甘草同用則調和氣血善治腹疼與竹茹同用則善止吐衄與附子同用則翕收元陽下歸宅窟惟力近和緩必重用之始能建功芍藥原有白赤二種以白者為良故方書多用白芍至於化瘀血赤者較優故治瘡瘍者多用之為其能化毒熱之瘀血不使潰膿也白芍出於南方杭州産者最佳其色白而微紅其皮則紅色又微重為其色紅白相兼故調和氣血之力獨優赤芍出於北方關東三省各山皆有肉紅皮赤其質甚粗若野草之根故張隱菴陳修園皆疑其非芍藥花根愚向亦疑之至奉後因得目睹疑團方釋特其花葉皆小且花皆單瓣其花或粉紅或紫色然無論何色其根之色皆相同附案一童子年十五六歲於季春得溫病經醫調治八九日間大熱已退而心猶發熱怔忡莫支小便不利大便滑瀉脈象虛數仍似外邪未淨為疏方用生杭芍二兩炙甘草一兩半煎湯一大碗徐徐溫飲下盡劑而愈夫神農本草經謂芍藥益氣元素謂其止瀉利即此案觀之洵不誤也然必以炙草輔之其功效乃益顯按此證原宜用拙擬滋陰清燥湯原有芍藥六錢甘草三錢又加生懷山藥滑石各一兩而當時其方猶未擬出但投以芍藥甘草幸亦隨手奏效二方之中其甘草一生用一炙用者因一則少用之以為輔佐品藉以調和藥之性味是以生用一則多用之至兩半借其補益之力以止滑瀉是以炙用且傷寒論原有芍藥甘草湯為育陰之妙品方中芍藥甘草各四兩其甘草亦系炙用也鄰村周年二十餘得溫病醫者用藥清解之旬日其熱不退診其脈左大於右者一倍按之且有力夫寒溫之熱傳入陽明其脈皆右大於左以陽明之脈在右也即傳入少陽厥陰其脈亦右大於左因既挾有外感實熱縱兼他經仍以陽明為主也此證獨左大於右乃溫病之變證遂投以小劑白虎湯方中生石膏止用五錢重加生杭芍兩半煎湯兩茶杯頓飲之須臾小便一次甚多病若失鄰村霍氏婦周身漫腫腹脹小便不利醫者治以五皮飲不效其脈數而有力心中常覺發熱知其陰分虧損陽分又偏盛也為疏方用生杭芍兩半玄參滑石地膚子甘草各三錢煎服一劑即見效驗後即方略為加減連服數劑全愈奉天陳某年四十餘自正月中旬覺心中發熱懶食延至暮春其熱益甚常常腹疼時或泄瀉其脈右部弦硬異常按之甚實舌苔微黃知系外感伏邪因春萌動傳入胃府久而化熱而肝木復乘時令之旺以侮克胃土是以腹疼且泄瀉也其脈象不為洪實而現弦硬之象者因胃土受侮亦從肝木之化也為疏方用生杭芍生懷山藥滑石玄參各一兩甘草連翹各三錢煎服一劑熱與腹疼皆愈強半可以進食自服藥後大便猶下兩次診其脈象已近和平遂將方中芍藥滑石玄參各減半又服一劑全愈陳姓婦年二十餘於季春得溫病四五日間延為診治其證表裡俱熱脈象左右皆洪實腹中時時切疼大便日下兩三次舌苔厚而微黃知外感邪熱已入陽明之府而肝膽乘時令木氣之旺又挾實熱以侮克中土故腹疼而又大便勤也亦投以前方加鮮茅根三錢一劑腹疼便瀉即止又服一劑全愈觀此二案傷寒論諸方腹痛皆加芍藥不待疏解而自明也至於茅根入藥必須鮮者方效若無鮮者可不用一婦人年三十許因陰虛小便不利積成水腫甚劇大便亦旬日不通一老醫投以八正散不效友人高為出方用生白芍六兩煎湯兩大碗再用生阿膠二兩融化其中俾病人儘量飲之老醫甚為駭疑高力主服之盡劑而二便皆通腫亦頓消後老醫與愚睹面為述其事且問此等藥何以能治此等病答曰此必陰虛不能化陽以致二便閉塞白芍善利小便阿膠能滑大便二藥並用又大能滋補真陰使陰分充足以化其下焦偏盛之陽則二便自能利也子治一水腫證其人年六旬二便皆不通利心中滿悶時或煩躁知其陰虛積有內熱又兼氣分不舒也投以生白芍三兩橘紅柴胡各三錢一劑二便皆通繼服滋陰理氣少加利小便之藥全愈芎藭解芎藭味辛微苦微甘氣香竄性溫溫竄相併其力上升下降外達內透無所不至故諸家本草多謂其能走泄真氣然無論何藥皆有益有弊亦視用之何如耳其特長在能引人身清輕之氣上至於腦治腦為風襲頭疼腦為浮熱上衝頭疼腦部充血頭疼其溫竄之力又能通活氣血治周身拘攣女子月閉無子雖系走竄之品為其味微甘且含有津液用之佐使得宜亦能生血四物湯中用芎藭所以行地黃之滯也所以治清陽下陷時作寒熱也若其人陰虛火升頭上時汗出者芎藭即不宜用附案友人郭妻産後頭疼或與一方當歸芎藭各一兩煎服即愈此蓋産後血虛兼受風也愚生平用芎藭治頭疼不過二三錢一人年三十餘頭疼數年服藥或愈仍然反復其脈弦而有力左關尤甚知其肝血虧損肝火熾盛也投以熟地柏實各一兩生龍骨生牡蠣龍膽草生杭芍枸杞各四錢甘草芎藭各二錢一劑疼止又服數劑永不反復又治一人因腦為風襲頭疼用川芎菊花各三錢煎湯服之立愈大黃解大黃味苦氣香性涼能入血分破一切瘀血為其氣香故兼入氣分少用之亦能調氣治氣鬱作疼其力沉而不浮以攻決為用下一切癥瘕積聚能開心下熱痰以愈瘋狂降腸胃熱實以通燥結其香竄透竅之力又兼利小便大黃之色服後入小便其利小便可知性雖趨下而又善清在上之熱故目疼齒疼用之皆為要藥又善解瘡瘍熱毒以治疔毒尤為特效之藥疔毒甚劇他藥不效者當重用大黃以通其大便自愈其性能降胃熱並能引胃氣下行故善止吐衄仲景治吐血衄血有瀉心湯大黃與黃連黃芩並用神農本草經謂其能推陳致新因有黃良之名仲景治血痹虛勞有大黃蟅蟲丸有百勞丸方中皆用大黃是真能深悟推陳致新之旨者也金匱瀉心湯誠為治吐血衄血良方惟脈象有實熱者宜之若脈象微似有熱者愚恆用大黃三錢煎湯送服赤石脂細末四五錢若脈象分毫無熱且心中不覺熱者愚恆用大黃細末肉桂細末各六七分用開水送服即愈凡氣味俱厚之藥皆忌久煎而大黃尤甚且其質經水泡即軟煎一兩沸藥力皆出與他藥同煎宜後人若單用之開水浸服即可若軋作散服之一錢之力可抵煎湯者四錢大黃之力雖猛然有病則病當之恆有多用不妨者是以治癲狂其脈實者可用至二兩治疔毒之毒熱甚盛者亦可用至兩許蓋用藥以勝病為準不如此則不能勝病不得不放膽多用也附案愚在籍時曾至鄰縣治病其地有楊氏少婦得奇疾赤身臥帳中其背腫熱若有一縷著身即覺熱不能忍百藥無效後有乘船自南來赴北闈鄉試者精通醫術延為診視言系陽毒俾用大黃十斤煎湯十碗放量飲之數日飲盡竟霍然全愈為其事至奇故附記之朴硝硝石解附朴硝煉玄明粉法朴硝味鹹微苦性寒稟天地寒水之氣以結晶水能勝火寒能勝熱為心火熾盛有實熱者之要藥療心熱生痰精神迷亂五心潮熱煩躁不眠且咸能軟堅其性又善消故能通大便燥結化一切瘀滯鹹入血分故又善消瘀血治妊婦胎殤未下外用化水點眼或煎湯熏洗能明目消翳愈目疾紅腫神農本草經謂煉服可以養生所謂煉者如法制為玄明粉則其性尤良也然今時之玄明粉鮮有如法煉製者凡藥房中所鬻之玄明粉多系風化朴硝其性與朴硝無異附案一少年女子得瘋疾癲狂甚劇屢次用藥皆未能灌下後為設方單用朴硝當鹽加於菜蔬中服之病人不知月餘全愈法庫門生萬治一少女瘋狂強灌以藥竟將藥碗咬破仍未灌下萬素閲衷中參西録知此方遂用朴硝和鮮萊蔔作湯令病人食之數日全愈奉天劉年四十餘得結證飲食行至下脘復轉而吐出無論服何藥亦如茲且其處時時切疼上下不通者已旬日矣俾用朴硝六兩與鮮萊蔔片同煮至萊蔔爛熟撈出又添生片再煮換至六七次約用萊蔔七八斤將朴硝鹹味借萊蔔提之將盡余濃汁四茶杯每次溫飲一杯兩點鐘一次飲至三次其結已開大便通下其女時息痢疾俾飲其餘痢疾亦愈奉天于姓婦年近五旬因心熱生痰痰火瘀滯煩躁不眠五心潮熱其脈象洪實遂用朴硝和炒熟麥面煉蜜為丸三錢重每丸中約有朴硝一錢早晚各服一丸半月全愈蓋人多思慮則心熱氣結其津液亦恆隨氣結於心下經心火灼煉而為熱痰朴硝咸且寒原為心經對宮之藥其咸也屬水力能勝火而又寒能勝熱且其性善消又能開結故以治心熱有痰者最宜至於必同麥面為丸者以麥為心谷心臟有病以朴硝瀉之即以麥面補之補破相濟為用則藥性歸於和平而後可久服也硝石即焰硝俗名火硝味辛微咸性與朴硝相近其寒涼之力遜於朴硝而消化之力勝於朴硝若與皂礬同用善治內傷黃疸消膽中結石膀胱中結石即石淋及鉤蟲病鉤蟲及膽石病皆能令人成黃疸醫論篇中有論黃疸有內傷外感及內傷外感之兼證並詳治法載有審定金匱硝石礬石散方可參觀附朴硝煉玄明粉法用朴硝煉玄明粉原用萊蔔然此法今人不講久矣至藥房所鬻者乃風化硝非玄明粉也今並載其法以備參觀其法於冬至後用潔淨朴硝十斤白萊蔔五斤切片同入鍋中用水一斗五升煮至萊蔔爛熟將萊蔔撈出用竹篩一個鋪綿紙二層架托於新缸之上將硝水濾過在庭露三日其硝凝於缸邊將余水傾出曬乾將硝取出用砂鍋熬於爐上融化後攪以銅鏟熬至將凝用剷剷出再裝以瓷罐未滿者寸許蓋以瓦片用釘三個釘地作鼎足形釘頭高二寸罐置其上用磚在罐周遭砌作爐形多留風眼爐磚離罐三寸將木炭火置於爐中罐四圍上下都被炭火壅培以煆至硝紅為度次日取出再用綿紙鋪於淨室地上將硝碾細用絹羅篩於紙上厚一分將戶牖皆遮蔽勿透風三日後取出其硝潔白如粉輕虛成片其性最能降火化痰清利臟腑怪證服之可蠲狂躁用之即愈搜除百病安斂心神大人服二三錢小兒服五分至一錢用白湯或蔥湯融化空心服之服藥之日不宜食他物惟飲稀粥服二三次後自然精神爽健臟腑調和津液頓生百病如失惟久病泄瀉者服之不宜厚朴解厚朴味苦辛性溫治胃氣上逆噁心嘔噦胃氣鬱結脹滿疼痛為溫中下氣之要藥為其性溫味又兼辛其力不但下行又能上升外達故神農本草經謂其主中風傷寒頭痛金匱厚朴麻黃湯用治咳而脈浮與橘夏並用善除濕滿與薑術並用善開寒痰凝結與硝黃並用善通大便燥結與烏藥並用善治小便因寒白濁味之辛者屬金又能入肺以治外感咳逆且金能制木又能入肝平肝木之橫恣以愈脅下掀疼其色紫而含有油質故兼入血分甄權謂其破宿血古方治月閉亦有單用之者諸家多謂其誤服能脫元氣獨葉香岩謂多用則破氣少用則通陽誠為確當之論附案一少婦因服寒涼開胃之藥太過致胃陽傷損飲食不化寒痰瘀於上焦常常短氣治以苓桂朮甘湯加乾薑四錢厚朴二錢囑其服後若不覺溫暖可徐徐將乾薑加重後數月見其家人言乾薑加至一兩二錢厚朴加至八錢病始脫然問何以並將厚朴加重謂初但將乾薑加重則服之覺悶後將厚朴漸加重至八錢始服之不覺悶而寒痰亦從此開豁矣由是觀之元素謂寒脹之病於大熱藥中兼用厚朴為結者散之之神藥誠不誤也愚二十餘歲時於仲秋之月每至申酉時腹中作脹後於將作脹時但嚼服厚朴六七分許如此兩日脹遂不作服厚朴辛以散之溫以通之且能升降其氣化是以愈耳愚治沖氣上衝並挾痰涎上逆之證皆重用龍骨牡蠣半夏赭石諸藥以降之鎮之斂之而必少用厚朴以宣通之則沖氣痰涎下降而中氣仍然升降自若無滯礙麻黃解麻黃味微苦性溫為發汗之主藥於全身之臟腑經絡莫不透達而又以逐發太陽風寒為其主治之大綱故神農本草經謂其主中風傷寒頭痛諸證又謂其主咳逆上氣者以其善搜肺風兼能瀉肺定喘也謂其破癥瘕積聚者以其能透出皮膚毛孔之外又能深入積痰凝血之中而消堅化瘀之藥可偕之以奏效也且其性善利小便不但走太陽之經兼能入太陽之府更能由太陽而及於少陰是以傷寒少陰病用之並能治瘡疽白硬陰毒結而不消太陽為周身之外廓外廓者皮毛也肺亦主之風寒襲人不但入太陽必兼入手太陰肺經恆有咳嗽微喘之證麻黃兼入手太陰為逐寒搜風之要藥是以能發太陽之汗者不僅麻黃而傷寒論治太陽傷寒無汗獨用麻黃湯者治足經而兼顧手經也凡利小便之藥其中空者多兼能發汗木通萹蓄之類是也發汗之藥其中空者多兼能利小便麻黃柴胡之類是也傷寒太陽經病恆兼入太陽之腑膀胱致留連多日不解麻黃治在經之邪而在腑之邪亦兼能治之蓋在經之邪由汗而解而在腑之邪亦可由小便而解彼後世用他藥以代麻黃者於此義蓋未之審也受風水腫之證金匱治以越婢湯其方以麻黃為主取其能祛風兼能利小便也愚平素臨證用其方服藥後果能得汗其小便即頓能利下而腫亦遂消特是其方因麻黃與石膏並用石膏之力原足以監製麻黃恆有服之不得汗者今變通其方於服越婢湯之前先用白糖水送服西藥阿斯匹林一瓦半必能出汗趁其正出汗時將越婢湯服下其汗出必益多小便亦遂通下東人博士用麻黃十瓦煎成水一百瓦為一日之量分三次服下治慢性腎炎小便不利及腎臟萎縮小便不利用之有效有不效以其證之涼熱虛實不同不知用他藥佐之以盡麻黃之長也試觀金匱水氣門越婢湯麻黃輔以石膏因其脈浮有熱也脈浮故繫有風實亦有熱麻黃附子湯輔以附子因其脈沉而寒也通變化裁息息與病機相符是真善用麻黃者矣古方中有麻黃皆先將麻黃煮數沸吹去浮沫然後納他藥蓋以其所浮之沫發性過烈去之所以使其性歸和平也麻黃帶節發汗之力稍弱去節則發汗之力較強今時用者大抵皆不去節至其根則純系止汗之品本是一物而其根莖之性若是迥殊非經細心實驗何以知之陸九芝謂麻黃用數分即可發汗此以治南方之人則可非所論於北方也蓋南方氣暖其人肌膚薄弱汗最易出故南方有麻黃不過錢之語北方若至塞外氣候寒冷其人之肌膚強厚若更為出外勞碌不避風霜之人又當嚴寒之候恆用七八錢始能汗者夫用藥之道貴因時因地因人活潑斟酌以勝病為主不可拘於成見也柴胡解柴胡味微苦性平稟少陽生髮之氣為足少陽主藥而兼治足厥陰肝氣不舒暢者此能舒之膽火甚熾盛者此能散之至外感在少陽者又能助其樞轉以透膈升出之故神農本草經謂其主寒熱寒熱者少陽外感之邪也又謂其主心腹腸胃中結氣飲食積聚誠以五行之理木能疏土為柴胡善達少陽之木氣則少陽之氣自能疏通胃土之郁而其結氣飲食積聚自消化也神農本草經柴胡主寒熱山茱萸亦主寒熱柴胡所主之寒熱為少陽外感之邪若傷寒瘧疾是也故宜用柴胡和解之山萸肉所主之寒熱為厥陰內傷之寒熱若肝臟虛極忽寒忽熱汗出欲脫是也故宜用山萸肉補斂之二證之寒熱雖同而其病因判若天淵臨證者當細審之用藥慎勿誤投也柴胡非發汗之藥而多用之亦能出汗小柴胡湯多用之至八兩按今時分量計之且三分之古方一煎三服故可三分一劑可得八錢小柴胡湯中如此多用柴胡者欲借柴胡之力升提少陽之邪以透膈上出也然多用之又恐其旁行發汗則上升之力不專小柴胡湯之去渣重煎所以減其發汗之力也或疑小柴胡湯既非發汗之藥何以傷寒論百四十九節服柴胡湯後有汗出而解之語不知此節文義原為誤下之後服小柴胡湯者説法夫小柴胡湯系和解之劑原非發汗之劑特以誤下之後脅下所聚外感之邪兼散漫於手少陽三焦因少陽為遊部手足少陽原相貫徹也此時仍投以小柴胡和解之則邪之散漫於三焦者遂可由手少陽外達之經絡作汗而解而其留於脅下者亦與之同氣相求借徑於手少陽而汗解故於發熱汗出上特加一卻字言非發其汗而卻由汗解也然足少陽之由汗解原非正路乃其服小柴胡湯後脅下之邪欲上升透膈因下後氣虛不能助之透過而其邪之散漫於手少陽者且又以同類相招遂於蓄極之時而開旁通之路此際幾有正氣不能勝邪氣之勢故必先蒸蒸而振大有邪正相爭之象而後發熱汗出而解此即所謂戰而後汗也觀下後服柴胡湯者其出汗若是之難則足少陽之病由汗解原非正路益可知也是以愚生平臨證於壯實之人用小柴胡湯時恆減去人參而於經醫誤下之後者若用小柴胡湯必用人參以助其戰勝之力用柴胡以治少陽外感之邪不必其寒熱往來也但知其人純系外感而有噁心欲吐之現象是即病在少陽欲借少陽樞轉之機透膈上達也治以小柴胡可隨手奏效此病機欲上者因而越之也又有其人不見寒熱往來亦並不喜嘔惟頻頻多吐黏涎斯亦可斷為少陽病而與以小柴胡湯蓋少陽之去路為太陰濕土因包脾之脂膜原與板油相近而板油亦脂膜又有同類相招之義此少陽欲傳太陰而太陰濕土之氣經少陽之火鑠煉遂凝為黏涎頻頻吐出投以小柴胡湯可斷其入太陰之路俾由少陽而解矣又柴胡為瘧疾之主藥而小心過甚者謂其人若或陰虛燥熱可以青蒿代之不知瘧邪伏於脅下兩板油中乃足少陽經之大都會柴胡能入其中升提瘧邪透膈上出而青蒿無斯力也若遇陰虛者或熱入於血分者不妨多用滋陰涼血之藥佐之若遇燥熱者或熱盛於氣分者不妨多用潤燥清火之藥佐之是以愚治瘧疾有重用生地熟地治愈者有重用生石膏知母治愈者其氣分虛者又有重用參耆治愈者然方中無不用柴胡也附案一人年過四旬脅下掀疼大便七八日未行醫者投以大承氣湯大便未通而脅下之疼轉甚其脈弦而有力知系肝氣膽火恣盛也投以拙擬金鈴瀉肝湯加柴胡龍膽草各四錢服後須臾大便通下脅疼頓愈審是則神農本草經謂柴胡主腸胃中飲食積聚推陳致新者誠非虛語也且不但能通大便也方書通小便亦多有用之者愚試之亦頗效驗蓋小便之下通必由手少陽三焦三焦之氣化能升而後能降柴胡不但升足少陽實兼能升手少陽也桂枝解桂枝味辛微甘性溫力善宣通能升大氣即胸之宗氣降逆氣如沖氣肝氣上衝之類散邪氣如外感風寒之類仲景苓桂朮甘湯用之治短氣是取其能升也桂枝加桂湯用之治奔豚是取其能降也麻黃桂枝大小青龍諸湯用之治外感是取其能散也而神農本草經論牡桂即桂枝開端先言其主咳逆上氣似又以能降逆氣為桂枝之特長諸家本草鮮有言其能降逆氣者是用桂枝而棄其所長也小青龍湯原桂枝麻黃並用至喘者去麻黃加杏仁而不去桂枝誠以神農本草經原謂桂枝主吐吸吐吸即喘去桂枝則不能定喘矣乃醫者皆知麻黃瀉肺定喘而鮮知桂枝降氣定喘是不讀神農本草經之過也桂枝善抑肝木之盛使不橫恣又善理肝木之郁使之條達也為其味甘故又善和脾胃能使脾氣之陷者上升胃氣之逆者下降脾胃調和則留飲自除積食自化其宣通之力又能導引三焦下通膀胱以利小便小便因熱不利者禁用然亦有用涼藥利小便而少加之作嚮導者惟上焦有熱及恆患血證者忌用桂枝非發汗之品亦非止汗之品其宣通表散之力旋轉於表裡之間能和營衛暖肌肉活血脈俾風寒自解麻痹自開因其味辛而且甘辛者能散甘者能補其功用在於半散半補之間也故服桂枝湯欲得汗者必啜熱粥其不能發汗可知若陽強陰虛者誤服之則汗即脫出其不能止汗可知按傷寒論用桂枝皆注明去皮非去枝上之皮也古人用桂枝惟取當年新生嫩枝折視之內外如一皮骨不分若見有皮骨可以辨者去之不用故曰去皮陳修園之侄鳴岐曾詳論之徐靈胎謂受風有熱者誤用桂枝則吐血是誠確當之論憶曾治一媼年六旬春初感冒風寒投以發表之劑中有桂枝數錢服後即愈其家人為其方靈貼之壁上至孟夏復受感冒自用其方取藥服之遂致吐血經醫治療始愈蓋前所受者寒風後所受者熱風故一則宜用桂枝一則忌用桂枝彼用桂枝湯以治溫病者可不戒哉特是徐氏既知桂枝誤用可致吐血而其洄溪醫案中載治一婦人外感痰喘證其人素有血證時發時止發則微嗽據此數語斷之其血證當為咳血因痰喘甚劇病急治標投以小青龍湯而愈用小青龍湯治外感痰喘定例原去麻黃加杏仁而此證則當去桂枝留麻黃且仿金匱用小青龍湯之法再加生石膏方為穩安蓋麻黃桂枝皆能定喘而桂枝動血分麻黃不動血分是以宜去桂枝留麻黃再借石膏涼鎮之力以預防血分之妄動乃為萬全之策而當日徐氏用此方未言加減豈略而未言乎抑用其原方乎若用其原方病雖治愈亦幾等孤注之一擲矣三七解三七味苦微甘性平諸家多言性溫然單服其末數錢未有覺溫者善化瘀血又善止血妄行為吐衄要藥病愈後不至瘀血留於經絡證變虛勞凡用藥強止其血者恆至血瘀經絡成血痹虛勞兼治二便下血女子血崩痢疾下血鮮紅宜與鴉膽子並用久不愈腸中腐爛浸成潰瘍所下之痢色紫腥臭雜以脂膜此乃腸爛欲穿三七能化腐生新是以治之為其善化瘀血故又善治女子癥瘕月事不通化瘀血而不傷新血允為理血妙品外用善治金瘡以其末敷傷口立能血止疼愈若跌打損傷內連臟腑經絡作疼痛者外敷內服奏效尤捷瘡瘍初起腫疼者敷之可消當與大黃末等分醋調敷本草備要所謂近出一種葉似菊艾而徑厚有歧尖莖有赤稜夏秋開花花蕊如金絲盤紐可愛而氣不香根小如牛蒡味甘極易繁衍云是三七治金瘡折傷血病甚效者是劉寄奴非三七也三七之性既善化血又善止血人多疑之然有確實可徵之處如破傷流血者用三七末擦之則其血立止是能止血也其破處已流出之血著三七皆化為黃水是能化血附案本邑高姓童子年十四五歲吐血甚劇醫治旬日無效勢甚危急倉猝遣人詢方俾單用三七末一兩分三次服下當日服完其血立止本莊黃氏婦年過四旬因行經下血不止彼時愚甫弱冠為近在比鄰延為診視投以尋常治血崩之藥不效病勢浸至垂危後延鄰村宿醫高投以傅青主女科中治老婦血崩方一劑而愈其方系黃耆當歸各一兩桑葉十四片煎湯送服三七細末三錢後愚用此方治少年女子血崩亦效惟心中覺熱或脈象有熱者宜加生地黃一兩奉天王姓少年素患吐血經醫調治已兩月不吐矣而心中發悶發熱時覺疼痛廉於飲食知系吐血時醫者用藥強止其血致留瘀血為恙也為疏方用滋陰養血健胃利氣之品煎湯送服三七細末二錢至二煎仍送服二錢四劑後又復吐血色多黑紫然吐後則悶熱疼痛皆減知為吉兆仍與前方數劑後又吐血一次其病從此竟愈此足徵三七化瘀之功也乙丑孟夏末旬愚寢室窗上糊紗一方以透空氣夜則以窗簾障之一日寢時甚熱未下窗簾愚睡正當窗醒時覺涼風撲面襲入右腮因睡時向左側也至午後右腮腫疼知因風襲急服西藥阿斯匹林汗之乃汗出已透而腫疼依然遲至翌晨病又加劇手按其處連牙床亦腫甚且覺心中發熱於斯連服清火散風活血消腫之藥數劑心中熱退而腫疼仍不少減手撫之肌膚甚熱遂用醋調大黃細末屢敷其上初似覺輕遲半日仍無效轉覺其處畏涼因以熱水沃巾尉之又見輕乃屢尉之繼又無效因思未受風之先頭面原覺發熱遽為涼風所襲則涼熱之氣凝結不散因其中涼熱皆有所以乍涼之與熱相宜則覺輕乍熱之與涼相宜亦覺輕也然氣凝則血滯腫疼久不愈必將化膿遂用山甲皂刺乳香沒藥粉草連翹諸藥迎而治之服兩劑仍分毫無效浸至其疼徹骨夜不能眠躊躇再四恍悟三七外敷善止金瘡作疼以其善化瘀血也若內服之亦當使瘀血之聚者速化而止疼遂急取三七細末二錢服之約數分鐘其疼已見輕逾一句鍾即疼愈強半矣當日又服兩次至翌晨已不覺疼腫亦見消繼又服兩日每日三次其腫消無芥蒂丙寅季春表侄劉右腿環跳穴處腫起一塊大如掌按之微硬皮色不變繼則漸覺腫處骨疼日益加重及愚診視時已三閲月矣愚因思其處正當骨縫其覺骨中作疼者必其骨縫中有瘀血也俾日用三七細末三錢分作兩次服下至三日骨已不疼又服數日其外皮色漸紅而欲腐又數日瘡頂自潰流出膿水若干遂改用生黃耆天花粉各六錢當歸甘草各三錢乳香沒藥各一錢連服十餘劑其瘡自內生肌排膿外出結痂而愈按此瘡若不用三七托骨中之毒外出其骨疼不已瘡毒內陷或成附骨疽為不治之證今因用三七不但能托骨中之毒外出並能化瘡中之毒使速潰膿若早服三七並可不潰膿而自消三七之治瘡何若斯之神效哉因恍悟愚之右腮腫疼時其腫疼原連於骨若不服三七將毒托出必成骨槽風證無疑也由此知凡瘡之毒在於骨者皆可用三七托之外出也天津胡氏婦信水六月未通心中發熱脹悶治以通經之藥數劑通下少許自言少腹仍有發硬一塊未消其家適有三七若干俾為末日服四五錢許分數次服下約服盡三兩經水大下其發硬之塊亦消矣審斯則凡人腹中有堅硬之血積或婦人産後惡露未盡結為癥瘕者皆可用三七徐消之也天津劉偶患大便下血甚劇西醫注射以止血藥針其血立止而血止之後月餘不能起床身體痠軟飲食減少其脈芤而無力重按甚澀因謂病家曰西人所注射者流動麥角膏也其收縮血管之力甚大故注射之後其血頓止然止後宜急服化瘀血之藥則不歸經之血始不至凝結於經絡之間為恙今但知止血而不知化血積之日久必成勞瘵不僅痠軟減食已也然此時尚不難治下其瘀血即愈矣俾日用三七細末三錢空心時分兩次服下服至三次後自大便下瘀血若干色紫黑從此每大便時必有瘀血隨下至第五日所下漸少至第七日即不見瘀血矣於斯停藥不服旬日之間身體復初由斯觀之是三七一味即可代金匱之下瘀血湯且較下瘀血湯更穩妥也附録山東沂水劉來函仲夏楊姓女年七歲患疳疾兼大便下血身形羸弱不思飲食甚為危險前所服中西治疳積之藥若干均無效來寓求治後學檢視腹部其回血管現露色青微紫腹脹且疼兩顴發赤潮熱有汗目睛白處有赤絲口乾不渴六脈沉數肌膚甲錯毛髮焦枯審證辨脈知系瘀血為恙也躊躇再四忽憶及向閲衷中參西録見先生論用三七之特殊功能歷數諸多奇效不但善於止血且更善化瘀血遂俾用三七研為精粉每服七分朝夕空心時各服一次服至五日而大便下血愈又服數日疳疾亦愈用三七一味治愈中西諸醫不能治之大病藥性之妙用真令人不可思議矣滑石解滑石色白味淡質滑而軟性涼而散神農本草經謂其主身熱者以其微有解肌之力也謂其主癃閉者以其饒有淡滲之力也且滑者善通竅絡故又主女子乳難滑而能散故又主胃中積聚因熱小便不利者滑石最為要藥若寒溫外感諸證上焦燥熱下焦滑瀉無度最為危險之候可用滑石與生山藥各兩許煎湯服之則上能清熱下能止瀉莫不隨手奏效有附案載於滋陰清燥湯下可參觀外感大熱已退而陰虧脈數不能自復者可於大滋真陰藥中若熟地黃生山藥枸杞之類少加滑石則外感餘熱不至為滋補之藥逗留仍可從小便瀉出則其病必易愈若與甘草為末滑石六錢甘草一錢名六一散亦名天水散服之善治受暑及熱痢若與赭石為末服之善治因熱吐血衄血若其人蘊有濕熱周身漫腫心腹膨脹小便不利者可用滑石與土狗研為散服之小便通利腫脹自消至內傷陰虛作熱宜用六味地黃湯以滋陰者亦可少加滑石以代苓澤則退熱較速蓋滑石雖為石類而其質甚軟無論湯劑丸散皆與脾胃相宜故可加於六味湯中以代苓澤其滲濕之力原可如苓澤行熟地之滯泥而其性涼於苓澤故又善佐滋陰之品以退熱也天水散為河間治暑之聖藥最宜於南方暑證因南方暑多挾濕滑石能清熱兼能利濕又少加甘草以和中補氣暑能傷氣是以用之最宜若北方暑證不必兼濕甚或有兼燥再當變通其方滑石生石膏各半與甘草配製方為適宜牛膝解牛膝味甘微酸性微溫原為補益之品而善引氣血下注是以用藥欲其下行者恆以之為引經故善治腎虛腰疼腿疼或膝疼不能屈伸或腿痿不能任地兼治女子月閉血枯催生下胎又善治淋疼通利小便此皆其力善下行之效也然名醫別録又謂其除腦中痛時珍又謂其治口瘡齒痛者何也蓋此等證皆因其氣血隨火熱上升所致重用牛膝引其氣血下行並能引其浮越之火下行是以能愈也愚因悟得此理用以治腦充血證伍以赭石龍骨牡蠣諸重墜收斂之品莫不隨手奏效治愈者不勝紀矣為其性專下注凡下焦氣化不固一切滑脫諸證皆忌之此藥懷産者佳川産者有紫白兩種色紫者佳附案在遼寧時曾治一女子月信期年未見方中重用牛膝一兩後復來診言服藥三劑月信猶未見然從前曾有腦中作疼病今服此藥腦中清爽異常分毫不覺疼矣愚聞此言乃知其腦中所以作疼者血之上升者多也今因服藥而不疼想其血已隨牛膝之引而下行遂於方中加蟅蟲五枚連服數劑月信果通友人袁素知醫時當季春牙疼久不愈屢次服藥無效其脈兩寸甚實俾用懷牛膝生赭石各一兩煎服後疼愈強半又為加生地黃一兩又服兩劑遂霍然全愈遠志解遠志味酸微辛性平其酸也能闟其辛也能闢故其性善理肺能使肺葉之闟闢純任自然而肺中之呼吸於以調痰涎於以化即咳嗽於以止矣若以甘草輔之誠為養肺要藥至其酸斂之力入肝能斂戢肝火入腎能固澀滑脫入胃又能助生酸汁使人多進飲食和平純粹之品夫固無所不宜也若用水煎取濃汁去渣重煎令其汁濃若薄糊以敷腫疼瘡瘍及乳癰甚效若恐其日久發酵每一兩可加蓬砂二錢溶化其中愚初次細嚼遠志嘗之覺其味酸而實兼有礬味西人謂其含有林檎酸而林檎酸中固無礬也後乃因用此藥若末服至二錢可作嘔吐乃知其中確含有礬味因悟礬能利痰其所以能利痰者亦以其含有礬味也礬能解毒本草綱目謂其解天雄附子烏頭毒且並能除瘡瘍腫疼者亦以其兼有礬味也是以愚用此藥入湯劑時未嘗過二錢恐多用之亦可作嘔吐也龍膽草解龍膽草味苦微酸性寒色黃屬土為胃家正藥其苦也能降胃氣堅胃質其酸也能補益胃中酸汁消化飲食凡胃熱氣逆胃汁短少不能食者服之可以開胃進食西人渾以健胃藥稱之似欠精細為其微酸屬木故又能入膽肝滋肝血益膽汁降肝膽之熱使不上炎舉凡目疾吐血衄血二便下血驚癇眩暈因肝膽有熱而致病者皆能愈之其瀉肝膽實熱之力數倍於芍藥而以斂戢肝膽虛熱固不如芍藥也半夏解半夏味辛性溫有毒凡味辛之至者皆稟秋金收降之性故力能下達為降胃安沖之主藥為其能降胃安沖所以能止嘔吐能引肺中胃中濕痰下行納氣定喘能治胃氣厥逆吐血衄血內經謂陽明厥逆衄嘔血陽明厥逆即胃氣厥逆也惟藥房因其有毒皆用白礬水煮之相制太過毫無辛味轉多礬味令人嘔吐即藥房所鬻之清半夏中亦有礬以之利濕痰猶可若以止嘔吐及吐血衄血殊為非宜愚治此等證必用微溫之水淘洗數次然後用之然屢次淘之則力減故須將分量加重也愚因藥房半夏制皆失宜每於仲春季秋之時用生半夏數斤浸以熱湯日換一次至旬日將半夏剖為兩瓣再入鍋中多添涼水煮一沸速連湯取出盛盆中候水涼淨曬乾備用每用一兩煎湯兩茶盅調入淨蜂蜜二兩徐徐咽之無論嘔吐如何之劇未有不止者蓋古人用半夏原湯泡七次即用初未有用白礬制之者也附案鄰村王姓童子年十二三歲忽晨起半身不能動轉其家貧無錢購藥贈以自制半夏俾為末每服錢半用生薑煎湯送下日兩次約服二十餘日其病竟愈蓋以自制半夏辛味猶存不但能利痰實有開風寒濕痹之力也東洋日英國軍醫屢屢吐絶食者久矣其弟與美醫氏協力治療之嘔吐卒不止乞診於余當時已認患者為不起之人但求餘一決其死生而已美醫氏等遂將患者之證狀及治療之經過一一告余余遂向兩氏曰余有一策試姑行之遂辭歸檢查漢法醫書制小半夏加茯苓湯貯瓶令其服用一二服後奇效忽顯數日竟回覆原有之康健至今半夏浸劑遂為一種之鎮嘔劑先行於醫科大學次及於各病院與醫家按此證若用大半夏湯加赭石尤效因吐久則傷津傷氣方中人參能生津補氣加赭石以助之力又專於下行也若有熱者可再加天冬佐之若無自制半夏可用藥房清半夏兩許淘淨礬味入煎栝蔞解栝蔞味甘性涼能開胸間及胃口熱痰故仲景治結胸有小陷胸湯栝蔞與連夏並用治胸痹有栝蔞薤白等方栝蔞與薤酒桂朴諸藥並用若與山甲同用善治乳癰栝蔞兩個山甲二錢煎服若與赭石同用善止吐衄栝蔞能降胃氣胃火故治吐衄若但用其皮最能清肺斂肺寧嗽定喘須用新鮮者方效若但用其瓤用溫水將瓤泡開揀出仁余煎一沸連渣服之最善滋陰潤燥滑痰生津若但用其仁須用新炒熟者搗碎煎服其開胸降胃之力較大且善通小便附案鄰村高子年十三歲於數日之間痰涎鬱於胸中煩悶異常劇時氣不上達呼吸即停目翻身挺有危在頃刻之狀連次用藥分毫無效敢乞往為診視施以良方時愚有急務未辦欲遲數點鐘再去彼謂此病已至極點若稍遲延恐無及矣於是遂與急往診視其脈關前浮滑舌苔色白肌膚有熱知其為溫病結胸俾用栝蔞仁四兩炒熟新炒者其氣香而能通搗碎煎湯兩茶盅分兩次溫飲下其病頓愈隔數日其鄰高姓童子亦得斯證俾用新炒蔞仁三兩蘇子五錢煎服亦一劑而愈蓋傷寒下早成結胸溫病未經下亦可成結胸有謂栝蔞力弱故小陷胸湯中必須伍以黃連半夏始能建功者不知栝蔞力雖稍弱重用之則轉弱為強是以重用至四兩即能隨手奏效挽回人命於頃刻也天花粉解天花粉栝蔞根也色白而亮者佳味苦微酸性涼而潤清火生津為止渴要藥傷寒論小柴胡湯渴者去半夏加栝蔞根古方書治消渴亦多用之為其能生津止渴故能潤肺化肺中燥痰寧肺止嗽治肺病結核又善通行經絡解一切瘡家熱毒疔癰初起者與連翹山甲並用即消瘡瘍已潰者與黃耆甘草皆須用生者並用更能生肌排膿即潰爛至深旁串他處不能敷藥者亦可自內生長肌肉徐徐將膿排出有案附載黃耆解下可參觀大凡藤蔓之根皆能通行經絡而花粉又性涼解毒是以有種種功效也乾薑解乾薑味辛性熱為補助上焦中焦陽分之要藥為其味至辛且具有宣通之力與厚朴同用治寒飲杜塞胃脘飲食不化與桂枝同用治寒飲積於胸中呼吸短氣與黃耆同用治寒飲漬於肺中肺痿咳嗽與五味子同用治感寒肺氣不降喘逆迫促與赭石同用治因寒胃氣不降吐血衄血與白朮同用治脾寒不能統血二便下血或脾胃虛寒常作泄瀉與甘草同用能調其辛辣之味使不刺戟而其溫補之力轉能悠長神農本草經謂其逐風濕痹指風濕痹之偏於寒者而言也而金匱治熱癱癇亦用乾薑風引湯中與石膏寒水石並用者是也此乃取其至辛之味以開氣血之凝滯也有謂炮黑則性熱能助相火者不知炮之則味苦熱力即減且其氣輕浮轉不能下達徐靈胎曰凡味厚之藥主守氣厚之藥主散乾薑氣味俱厚故散而能守夫散不全散守不全守則旋轉於經絡臟腑之間驅寒除濕和血通氣所必然矣故性雖猛峻不妨服食附案鄰村高某年四十餘小便下血久不愈其脈微細而遲身體虛弱惡寒飲食減少知其脾胃虛寒中氣下陷黃坤載所謂血之亡於便溺者太陰不升也為疏方乾薑於術各四錢生山藥熟地各六錢烏附子炙甘草各三錢煎服一劑血見少連服十餘劑全愈生薑解將鮮薑種於地中秋後剖出去皮曬乾為乾薑將薑上所生之芽種於地中秋後剖出其當年所生之薑為生薑是以乾薑為母薑生薑為子薑乾薑老而生薑嫩也為生薑系嫩薑其味之辛性之溫皆亞於乾薑而所具生髮之氣則優於乾薑故能透表發汗與大棗同用善和營衛蓋借大棗之甘緩不使透表為汗惟旋轉於營衛之間而營衛遂因之調和也其辛散之力善開痰理氣止嘔吐逐除一切外感不正之氣若但用其皮其溫性稍減又善通利小便能解半夏毒及菌菌諸物毒食料中少少加之可為健胃進食之品瘡家食之致生惡肉不可不知附子烏頭天雄解附子味辛性大熱為補助元陽之主藥其力能升能降能內達能外散凡凝寒錮冷之結於臟腑著於筋骨痹於經絡血脈者皆能開之通之而溫通之中又大具收斂之力故治汗多亡陽汗多有亡陽亡陰之殊亡陽者身涼亡陰者身熱臨證時當審辨涼亡陽者宜附子與萸肉人參並用熱亡陰者宜生地與萸肉人參並用腸冷泄瀉下焦陽虛陰走精寒自遺論者謂善補命門相火而服之能使心脈跳動加速是於君相二火皆能大有補益也種附子於地其當年旁生者為附子其原種之附子則成烏頭矣烏頭之熱力減於附子而宣通之力較優故金匱治歷節風有烏頭湯治心痛徹背背痛徹心有烏頭赤石脂丸治寒疝有烏頭煎烏頭桂枝湯等方若種後不旁生附子惟原種之本長大若蒜之獨頭無瓣者名謂天雄為其力不旁溢故其溫補力更大而獨能稱雄也今藥房中所鬻之烏附子其片大而且圓者即是天雄而其黑色較尋常附子稍重蓋因其力大而色亦稍變也附子烏頭天雄皆反半夏附案一少婦上焦滿悶煩躁不能飲食繞臍板硬月信兩月未見其脈左右皆弦細仲景謂雙弦者寒偏弦者飲脈象如此其為上有寒飲下有寒積無疑其煩躁者腹中寒氣充溢迫其元陽浮越也投以理飲湯去桂枝加附子三錢方中芍藥改用五錢一劑滿悶煩躁皆見愈又服一劑能進飲食且覺腹中涼甚遂去芍藥將附子改用五錢後來又將乾薑減半附子加至八錢服逾十劑大便日行四五次所下者多白色冷積湯藥仍日進一劑如此五日冷積瀉盡大便自止再診其脈見有滑象尺部較甚疑其有妊俾停藥勿服後至期果生子夫附子原有殞胎之説此證服附子如此之多而胎固安然無恙誠所謂有故無殞亦無殞也肉桂解肉桂味辛而甘氣香而竄性大熱純陽為其為樹身近下之皮故性能下達暖丹田壯元陽補相火其色紫赤又善補助君火溫通血脈治周身血脈因寒而痹故治關節腰肢疼痛及瘡家白疽木得桂則枯且又味辛屬金故善平肝木治肝氣橫恣多怒若肝有熱者可以龍膽草芍藥諸藥佐之神農本草經謂其為諸藥之先聘通使蓋因其香竄之氣內而臟腑筋骨外而經絡腠理倏忽之間莫不周遍故諸藥不能透達之處有肉桂引之則莫不透達也按附子肉桂皆氣味辛熱能補助元陽然至元陽將絶或浮越脫陷之時則宜用附子而不宜用肉桂誠以附子但味厚肉桂則氣味俱厚補益之中實兼有走散之力非救危抉顛之大藥觀仲景傷寒論少陰諸方用附子而不用肉桂可知也肉桂氣味俱厚最忌久煎而坊間又多搗為細末數沸之後藥力即減況煎至數十沸乎至於石膏氣味俱淡且系石質非搗細煎之則藥力不出而坊間又多不為搗細是以愚用石膏必搗為細末然後煎之若用肉桂但去其粗皮而以整塊入煎至藥之類肉桂類石膏者可以肉桂石膏為例矣肉桂味辣而兼甜以甜勝於辣者為佳辣勝於甜者次之然約皆從生旺樹上取下之皮故均含有油性皆可入藥至其薄厚不必計也若其味不但不甚甜且不甚辣又兼甚乾枯者是系枯樹之皮不可用也知母解知母味苦性寒液濃而滑其色在黃白之間故能入胃以清外感之熱伍以石膏可名白虎二藥再加甘草粳米和之名白虎湯治傷寒溫病熱入陽明入肺以潤肺金之燥而肺為腎之上源伍以黃柏兼能滋腎二藥少加肉桂嚮導名滋腎丸治陰虛不能化陽小便不利為其寒而多液故能壯水以制火治骨蒸勞熱目病胬肉遮掩白睛為其液寒而滑有流通之性故能消瘡瘍熱毒腫疼神農本草經謂主消渴者以其滋陰壯水而渴自止也謂其主肢體浮腫者以其寒滑能通利水道而腫自消也謂其益氣者以其能除食氣之壯火而氣自得其益也知母原不甚寒亦不甚苦嘗以之與黃耆等分並用即分毫不覺涼熱其性非大寒可知又以知母一兩加甘草二錢煮飲之即甘勝於苦其味非大苦可知寒苦皆非甚大而又多液是以能滋陰也有謂知母但能退熱不能滋陰者猶淺之乎視知母也是以愚治熱實脈數之證必用知母若用黃耆補氣之方恐其有熱不受者亦恆輔以知母惟有液滑能通大便其人大便不實者忌之天門冬解天冬味甘微辛性涼津液濃厚滑潤其色黃兼白能入肺以清燥熱故善利痰寧嗽入胃以消實熱故善生津止渴津濃液滑之性能通利二便流通血脈暢達經絡雖為滋陰之品實兼能補益氣分神農本草經謂天冬主暴風濕偏痹強骨髓二語經後世注解其理終未透徹愚嘗嚼服天門冬毫無渣滓盡化津液且覺兼有人參氣味蓋其津濃液滑之中原含有生生之氣其氣挾其濃滑之津液以流行於周身而痹之偏於半身者可除周身之骨得其濡養而骨髓可健且入藥者為天冬之根乃天冬之在內者也其外生之蔓多有逆刺若無逆刺者其皮又必澀而戟手天冬之物原外剛內柔也而以之作藥則為柔中含剛是以痹遇其柔中之剛則不期開而自開骨得其柔中之剛不惟健骨且能健髓也至名醫別録謂其保定肺氣益氣力冷而能補諸語實亦有以見及此也附録湖北天門縣崔來函向染咳嗽百藥不效後每服松脂一錢涼茶送服不但咳嗽全愈精神比前更強逮讀衷中參西録藥物解知天冬含有人參性味外剛內柔汁漿濃潤遂改服天冬二錢日兩次今已三年覺神清氣爽氣力倍增遠行不倦皮膚髮潤面上瘢痕全消麥門冬解麥冬味甘性涼氣微香津液濃厚色兼黃白能入胃以養胃液開胃進食更能入脾以助脾散精於肺定喘寧嗽即引肺氣清肅下行統調水道以歸膀胱蓋因其性涼液濃氣香而升降濡潤之中兼具開通之力故有種種諸效也用者不宜去心黃連解黃連味大苦性寒而燥為苦為火之味燥為火之性故善入心以清熱心中之熱清則上焦之熱皆清故善治腦膜生炎腦部充血時作眩暈目疾腫疼胬肉遮睛目生雲翳者忌用及半身以上赤遊丹毒其色純黃能入脾胃以除實熱使之進食西人以黃連為健胃藥蓋胃有熱則噁心懶食西人身體強壯且多肉食胃有積熱故宜黃連清之更由胃及腸治腸澼下利膿血為其性涼而燥故治濕熱鬱於心下作痞滿仲景小陷胸湯諸瀉心湯皆用之女子陰中因濕熱生炎潰爛徐靈胎曰苦屬火性宜熱此常理也黃連至苦而反至寒則得火之味與水之性故能除水火相亂之病水火相亂者濕熱是也是故熱氣目痛眥傷淚出目不明乃濕熱在上者腸澼腹痛下利乃濕熱在中者婦人陰中腫痛乃濕熱在下者悉能除之矣凡藥能去濕者必增熱能除熱者必不能去濕惟黃連能以苦燥濕以寒除熱一舉而兩得焉黃連治目之功不必皆內服也愚治目睛脹疼者俾用黃連淬水乘熱屢用棉花瓤蘸擦眼上至咽中覺苦乃止則脹疼立見輕又治目疾紅腫作疼者將黃連細末調以芝麻油頻頻聞於鼻中亦能立見效驗黃芩解黃芩味苦性涼中空最善清肺經氣分之熱由脾而下通三焦達於膀胱以利小便又善入脾胃清熱由胃而下及於腸以治腸澼下利膿血又善入肝膽清熱治少陽寒熱往來大小柴胡湯皆用之兼能調氣無論何臟腑其氣鬱而作熱者皆能宣通之又善清軀殼之熱凡熱之伏藏於經絡散漫於腠理者皆能消除之治肺病肝膽病軀殼病宜用枯芩即中空之芩治腸胃病宜用條芩即嫩時中不空者亦名子芩究之皆為黃芩其功用原無甚差池也李瀕湖曰有人素多酒欲病少腹絞痛不可忍小便如淋諸藥不效偶用黃芩木通甘草三味煎服遂止按黃芩治少腹絞痛名醫別録原明載之由此見古人審藥之精非後人所能及也然必因熱氣所迫致少腹絞痛者始可用非可概以之治腹痛也又須知太陰腹痛無熱證必少陽腹痛始有熱證名醫別録明標之曰少腹絞痛是尤其立言精細處瀕湖又曰餘年二十時因感冒咳嗽既久且犯戒遂病骨蒸發熱膚如火燎每日吐痰碗許暑月煩渴寢食俱廢六脈浮洪遍服柴胡麥冬荊瀝諸藥月餘益劇皆以為必死矣先君偶思李東垣治肺熱如火燎煩躁引飲而晝盛者氣分熱也宜一味黃芩湯以瀉肺經氣分之火遂按方用片芩一兩水二盅煎一盅頓服次日身熱盡退而痰嗽皆愈藥中肯棨如鼓應桴醫中之妙有如此哉觀瀕湖二段云云其善清氣分之熱可為黃芩獨具之良能矣白茅根解白茅恨味甘性涼中空有節最善透發臟腑鬱熱托痘疹之毒外出又善利小便淋澀作疼因熱小便短少腹脹身腫又能入肺清熱以寧嗽定喘為其味甘且鮮者嚼之多液故能入胃滋陰以生津止渴並治肺胃有熱咳血吐血衄血小便下血然必用鮮者其效方著春前秋後剖用之味甘至生苗盛茂時味即不甘用之亦有效驗遠勝乾者茅針即茅芽初發猶未出土形如巨針者其性與茅根同而稍有破血之力凡瘡潰膿未破者將茅針煮服其瘡即破用一針破一孔兩針破兩孔附案一人年近五旬受溫疹之毒傳染痧疹遍身表裡壯熱心中煩躁不安證實脈虛六部不起屢服清解之藥無效其清解之藥稍重大便即溏俾用鮮茅根六兩煮湯一大碗頓服之病愈強半又服一次全愈一西醫得溫病頭疼壯熱心中煩躁自服西藥退熱之品服後熱見退旋又反復其脈似有力惟在浮分中分俾用鮮茅根四兩滑石一兩煎三四沸取湯服之周身得微汗一劑而諸病皆愈一婦人年近四旬因陰虛發熱漸覺小便不利積成水腫服一切通利小便之藥皆無效其脈數近六至重按似有力問其心中常覺煩躁知其陰虛作熱又兼有實熱以致小便不利而成水腫也俾用鮮茅根半斤煎湯兩大碗以之當茶徐徐溫飲之使藥力晝夜相繼連服五日熱退便利腫遂盡消葦莖蘆根解葦與蘆原系一物其生於水邊乾地小者為蘆生於水深之處大者為葦蘆因生於乾地其色暗緑近黑故字從盧盧即黑色葦因生於水中其形長大有偉然之意故字從韋千金葦莖湯薏苡仁瓜瓣即甜瓜瓣各半升桃仁五十枚葦莖切二升水二斗煮取五升去渣納前藥三味煮取二升服一升當有所見吐膿血釋者謂葦用莖不用根者而愚則以為不然根居於水底是以其性涼而善升患大頭瘟者愚常用之為引經要藥無葦根者可代以荷葉是其上升之力可至腦部而況於肺乎且其性涼能清肺熱中空能理肺氣而又味甘多液更善滋陰養肺則用根實勝於用莖明矣今藥房所鬻者名為蘆根實即葦根也其善發痘疹者以其有振發之性也其善利小便者以其體中空且生水中自能行水也其善止吐血衄血者以其性涼能治血熱妄行且血亦水屬血中明水居多其性能引水下行自善引血下行也其性頗近茅根凡當用茅根而無鮮者皆可以鮮蘆根代之也鮮小薊根解鮮小薊根味微辛氣微腥性涼而潤為其氣腥與血同臭且又性涼濡潤故善入血分最清血分之熱凡咳血吐血衄血二便下血之因熱者服者莫不立愈又善治肺病結核無論何期用之皆宜即單用亦可奏效並治一切瘡瘍腫疼花柳毒淋下血澀疼蓋其性不但能涼血止血兼能活血解毒是以有以上種種諸效也其涼潤之性又善滋陰養血治血虛發熱至女子血崩赤帶其因熱者用之亦效按小薊各處皆有俗名刺爾菜小薊原名刺薊又名青青菜山東俗名萋萋菜奉天俗名槍刀菜因其多刺如槍刀也其葉長二寸許寬不足一寸葉邊多刺葉上微有絨毛其葉皆在莖上其莖紫色高尺許莖端開紫花花瓣如絨絲其大如錢作圓形狀若小絨球其花葉皆與紅花相似嫩時可作羹其根與莖葉皆可用而根之性尤良剖取鮮者搗爛取其自然汁衝開水服之若以入煎劑不可久煎宜保存其新鮮之性約煎四五沸即取湯飲之又其莖中生蟲即結成疙疸狀如小棗其涼血之力尤勝若取其鮮者十餘枚搗爛開水沖服以治吐血衄血之因熱者尤效今藥房中有以此為大薊者殊屬差誤用時宜取其生農田之間嫩而白者附案一少年素染花柳毒服藥治愈惟頻頻咳嗽服一切理嗽藥皆不效經西醫驗其血謂仍有毒其毒侵肺是以作嗽詢方於愚俾用鮮小薊根兩許煮湯服之服過兩旬其嗽遂愈一少年每年吐血反復三四次數年不愈診其脈血熱火盛俾日用鮮小薊根二兩煮湯數盅當茶飲之連飲二十餘日其病從此除根大麥芽解附麥苗善治黃疸大麥芽性平味微酸含有稀鹽酸是以善消能入脾胃消化一切飲食積聚為補助脾胃藥之輔佐品補脾胃以參朮耆為主而以此輔之若與參朮耆並用能運化其補益之力不至作脹滿為其性善消化兼能通利二便雖為脾胃之藥而實善舒肝氣舒肝宜生用炒用之則無效夫肝主疏泄為腎行氣為其力能舒肝善助肝木疏泄以行腎氣故又善於催生至婦人之乳汁為血所化因其善於消化微兼破血之性故又善回乳無子吃乳欲回乳者用大麥芽二兩炒為末每服五錢白湯下入丸散劑可炒用入湯劑皆宜生用附案一婦人年三十餘氣分素弱一日忽覺有氣結於上脘不能上達亦不下降俾單用生麥芽一兩煎湯飲之頓覺氣息通順一婦人年近四旬脅下常常作疼飲食入胃常停滯不下行服藥數年不愈此肝不升胃不降也為疏方用生麥芽四錢以升肝生雞內金二錢以降胃又加生懷山藥一兩以培養臟腑之氣化防其因升之降之而有所傷損連服十餘劑病遂全愈附麥苗善治黃疸內子王氏生平不能服藥即分毫無味之藥亦不能服於乙丑季秋得黃疸症為開好服之藥數味煎湯強令服之下咽即嘔吐大作將藥盡行吐出友人張某謂可用鮮麥苗煎湯服之遂採鮮麥苗一握又為之加滑石五錢服後病即輕減又服一劑全愈蓋以麥苗之性能疏通肝膽兼能清肝膽之熱猶能消膽管之炎導膽汁歸小腸也因悟得此理後凡遇黃疸症必加生麥芽數錢於藥中亦奏效頗著然藥鋪中麥芽皆乾者若能得鮮麥芽且長至寸余用之當更佳或當有麥苗時於服藥之外以麥苗煎湯當茶飲之亦可茵陳解茵陳者青蒿之嫩苗也秋日青蒿結子落地發生貼地大如錢至冬霜雪滿地萌芽無恙甫經立春即勃然生長宜於正月中旬採之其氣微香其味微辛微苦秉少陽最初之氣是以涼而能散神農本草經謂其善治黃疸仲景治疸證亦多用之為其稟少陽初生之氣是以善清肝膽之熱兼理肝膽之郁熱消郁開膽汁入小腸之路毫無阻隔也名醫別録謂其利小便除頭熱亦清肝膽之功效也其性頗近柴胡實較柴胡之力柔和凡欲提出少陽之邪而其人身弱陰虛不任柴胡之升散者皆可以茵陳代之附案一人因境多拂逆常動肝氣肝火致腦部充血作疼治以鎮肝涼肝之藥服後周身大熱汗出如洗恍悟肝為將軍之官中寄相火用藥強制之是激動其所寄之相火而起反動力也即原方為加茵陳二錢服後即安然矣一少年常患頭疼診其脈肝膽火盛治以茵陳川芎菊花各二錢一劑疼即止又即原方為加龍膽草二錢服兩劑覺頭部輕爽異常又減去川芎連服四劑病遂除根萊蔔子解附胡萊蔔英能解砒石毒萊蔔子生用味微辛性平炒用氣香性溫其力能升能降生用則升多於降炒用則降多於升取其升氣化痰宜用生者取其降氣消食宜用炒者究之無論或生或炒皆能順氣開鬱消脹除滿此乃化氣之品非破氣之品而醫者多謂其能破氣不宜多服久服殊非確當之論蓋凡理氣之藥單服久服未有不傷氣者而萊蔔子炒熟為末每飯後移時服錢許藉以消食順氣轉不傷氣因其能多進飲食氣分自得其養也若用以除滿開鬱而以參耆術諸藥佐之雖多服久服亦何至傷氣分乎附案一人年五旬當極忿怒之餘腹中連脅下突然脹起服諸理氣開氣之藥皆不效俾用生萊蔔子一兩柴胡川芎生麥芽各三錢煎湯兩盅分三次溫服下盡劑而愈一人年二十五六素多痰飲受外感三四日間覺痰涎凝結於上脘阻隔飲食不能下行須臾仍復吐出俾用萊蔔子一兩生熟各半搗碎煮湯一大盅送服生赭石細末三錢遲點半鐘再將其渣重煎湯一大盅仍送服生赭石細末三錢其上脘頓覺開通可進飲食又為開辛涼清解之劑連服兩劑全愈附胡萊蔔英能解砒石毒邑東境褚姓因夫妻反目其妻怒吞砒石其夫出門未歸夜間砒毒發作覺心中熱渴異常其鍋中有泡干胡萊蔔英之水若干猶微溫遂儘量飲之熱渴頓止逮其夫歸猶未知也隔旬其夫之妹在婆家亦吞砒石急遣人來送信其夫倉猝將往視之其妻謂將干胡萊蔔英攜一筐去開水浸透多飲其水必愈萬無一失其夫問何以知之其妻始明言前事其夫果亦用此方將其妹救愈然所用者是秋末所曬之干胡萊蔔英在房頂迭次經霜其能解砒毒或亦借嚴霜之力歟至鮮胡萊蔔英亦能解砒毒否則猶未知也枸杞子地骨皮解枸杞子味甘多液性微涼為滋補肝腎最良之藥故其性善明目退虛熱壯筋骨除腰疼久服有益此皆滋補肝腎之功也乃因古有隔家千里勿食枸杞之諺遂疑其能助陽道性或偏於溫熱而愚則謂其性決不熱且確有退熱之功效此從細心體驗而得原非憑空擬議也愚自五旬後臟腑間陽分偏盛每夜眠時無論冬夏床頭置涼水一壺每醒一次覺心中發熱即飲涼水數口至明則壺中水已所餘無幾惟臨睡時嚼服枸杞子一兩涼水即可少飲一半且晨起後覺心中格外鎮靜精神格外充足即此以論枸杞則枸杞為滋補良藥性未必涼而確有退熱之功效不可斷言乎或問枸杞為善滋陰故能退虛熱今先生因睡醒而覺熱則此熱果虛熱乎抑實熱乎答曰餘生平胖壯陰分不虧此非虛熱明矣然白晝不覺熱即夜間徹夜不睡亦不覺熱惟睡初醒時覺心中發熱是熱生於睡中也其不同於泛泛之實熱又明矣此乃因睡時心腎自然交感而生熱乃先天元陽壯旺之現象惟枸杞能補益元陰與先天元陽相濟是以有此功效若謂其僅能退虛熱猶淺之乎視枸杞矣附方金髓煎枸杞子逐日擇紅熟者以無灰酒浸之蠟紙封固勿令泄氣兩月足取入砂盆中研爛濾取汁同原浸之酒入銀鍋內慢火熬之不住箸攪恐黏住不勻候成餳淨瓶密貯每早溫酒服二大匙夜臥再服百日身輕氣壯地骨皮即枸杞根上之皮也其根下行直達黃泉稟地之陰氣最厚是以性涼長於退熱為其力優於下行有收斂之力是以治有汗骨蒸能止吐血衄血更能下清腎熱通利二便並治二便因熱下血且其收斂下行之力能使上焦浮遊之熱因之清肅而肺為熱傷作嗽者服之可愈是以諸家本草多謂其能治嗽也惟肺有風邪作嗽者忌用以其性能斂也海螵蛸茜草解烏鰂骨即海螵蛸蘆茹即茜草詳閲諸家本草載此二藥之主治皆謂其能治崩帶是與內經用二藥之義相合也又皆謂其能消癥瘕是又與內經用二藥之義相反也本草所載二藥之性如此自相矛盾令後世醫者並疑內經之方而不敢輕用則良方几埋沒矣而愚對於此二藥其能治崩帶洵有確實徵驗其能消癥瘕與否則又不敢遽斷也內經有四烏鰂骨一蘆茹丸治傷肝之病時時前後血方用烏鰂骨四蘆茹一丸以雀卵如小豆大每服五丸鮑魚湯送下海螵蛸為烏賊魚骨其魚常口中吐墨水為之黑故能補益腎經而助其閉藏之用友人孫妻經水行時多而且久孫用微火將海螵蛸煨至半黑半黃為末用鹿角膠化水送服一次即愈其性之收澀可知茜草一名地血可以染絳內經名茹蘆即茹蘆根也附案憶在籍時曾治滄州董姓婦人患血崩甚劇其脈象虛而無力遂重用黃耆白朮輔以龍骨牡蠣萸肉諸收澀之品服後病稍見愈遂即原方加海螵蛸四錢茜草二錢服後其病頓愈而分毫不見血矣愚於斯深知二藥止血之能力遂擬得安沖湯固沖湯二方於方中皆用此二藥本邑一少婦纍年多病身形羸弱繼又下白帶甚劇屢經醫治不效診其脈遲弱無力自覺下焦涼甚治以清帶湯為加乾薑六錢鹿角膠三錢炙甘草三錢連服十劑全愈統以上經驗觀之則海螵蛸茜草之治帶下不又確有把握哉至其能消癥瘕與否因未嘗單重用之實猶欠此經驗而不敢遽定也罌粟殼解罌粟殼即罌粟花所結之子外包之殼也其所結之子形如罌中有子如粟可作粥甚香美炒之則香故名其外皮為罌粟殼藥房間省文曰米殼其味微酸性平其嫩時皮出白漿可制鴉片以其猶含鴉片之餘氣故其性能斂肺澀腸固腎治久嗽久痢遺精脫肛女子崩帶嗽痢初起及咳嗽兼外感者忌用罌粟殼治久嗽久痢誠有效驗如虛勞咳嗽證但用山藥地黃枸杞玄參諸藥以滋陰養肺其嗽不止者加罌粟殼二三錢則其嗽可立見輕減或又少佐以通利之品若牛蒡射干諸藥尤為穩妥至於久痢其腸中或有腐爛若用三七鴉膽子化其腐爛而其痢仍不止者當將罌粟殼數錢與山藥芍藥諸藥並用連服數劑其痢可全愈竹茹解竹茹味淡性微涼善開胃郁降胃中上逆之氣使之下行胃氣息息下行為順故能治嘔吐止吐血衄血皆降胃之功金匱治婦人乳中虛煩亂嘔逆有竹皮大丸竹皮即竹茹也為其為竹之皮且涼而能降故又能清肺利痰宣通三焦水道下通膀胱為通利小便之要藥與葉同功而其力尤勝於葉又善清腸中之熱除下痢後重腹疼為其涼而宣通損傷瘀血腫疼者服之可消腫愈疼融化瘀血醋煮口漱可止齒齦出血須用嫩竹外邊青皮裡層者力減附案族家嬸母年四旬足大指隱白穴處忽然破裂出血且色紫甚多外科家以為疔毒屢次服藥不效時愚甫習醫診其脈洪滑有力知系血熱妄行遂用生地黃兩半碎竹茹六錢煎湯服之一劑血止又服數劑脈亦平和蓋生地黃涼血之力雖能止血然恐止後血瘀經絡致生他病輔以竹茹宣通消瘀且其性亦能涼血止血是以有益而無弊也友人劉之女得溫病邀愚往視其證表裡俱熱胃口滿悶時欲嘔吐舌苔白而微黃脈象洪滑重按未實問其大便昨行一次微燥一醫者欲投以調胃承氣湯疏方尚未取藥愚曰此證用承氣湯尚早遂另為疏方用生石膏一兩碎竹茹六錢青連翹四錢煎湯服後周身微汗滿悶立減亦不復欲嘔吐從前小便短少自此小便如常其病頓愈沙參解沙參味淡微甘性涼色白質松中空故能入肺清熱滋陰補益肺氣兼能宣通肺郁故神農本草經謂其主血積肺氣平而血之上逆者自消也人之魂藏於肝魄藏於肺沙參能清補肺臟以定魄更能使肺金之氣化清肅下行鎮戢肝木以安魂魂魄安定驚恐自化故神農本草經又謂主驚氣也徐靈胎曰肺主氣故肺家之藥氣勝者為多但氣勝之品必偏於燥而能滋肺者又膩滯而不清虛惟沙參為肺家氣分中理血藥色白體輕疏通而不燥潤澤而不滯血阻於肺者非此不能清也沙參以體質輕鬆中心空者為佳然必生於沙磧之上土性松活始能如此渤海之濱沙磧綿亙純系蚌殼細末毫無土質其上所長沙參粗如拇指中空大於藕孔其味且甘於他處沙參因其處若三四尺深即出甜水是以所長之沙參其味獨甘鮮嚼服之大能解渴故以治消渴尤良其葉光澤如鏡七月抽莖開白花純稟金氣肺熱作嗽者用之甚效洵良藥也附案近族曾孫女自動失乳身形羸弱自六七歲時恆發咳嗽後至十一二歲嗽浸增劇概服治嗽藥不效愚俾用生懷山藥細末熬粥調以白糖令適口送服生雞內金細末二三分或西藥百布聖二瓦當點心服之年餘未間斷勞嗽雖見愈而終不能除根診其脈肺胃似皆有熱遂俾用北沙參軋為細末每服二錢日兩次服至旬余咳嗽全愈然恐其沙參久服或失於涼改用沙參三兩甘草二兩共軋細亦每服二錢以善其後連翹解連翹味淡微苦性涼具升浮宣散之力流通氣血治十二經血凝氣聚為瘡家要藥能透表解肌清熱逐風又為治風熱要藥且性能托毒外出又為發表疹癮要藥為其性涼而升浮故又善治頭目之疾凡頭疼目疼齒疼鼻淵或流濁涕成腦漏證皆能主之為其味淡能利小便故又善治淋證溺管生炎仲景方中所用之連招乃連翹之根即神農本草經之連根也其性與連翹相近其發表之力不及連翹而其利水之力則勝於連翹故仲景麻黃連軺赤小豆湯用之以治瘀熱在裡身將發黃取其能導引濕熱下行也連翹諸家皆未言其發汗而以治外感風熱用至一兩必能出汗且其發汗之力甚柔和又甚綿長曾治一少年風溫初得俾單用連翹一兩煎湯服徹夜微汗翌晨病若失連翹善理肝氣既能舒肝氣之郁又能平肝氣之盛曾治一媼年過七旬其手連臂腫疼數年不愈其脈弦而有力遂於清熱消腫藥中每劑加連翹四錢旬日腫消疼愈其家人謂媼從前最易憤怒自服此藥後不但病愈而憤怒全無何藥若是之靈妙也由是觀之連翹可為理肝氣要藥矣川楝子解川楝子大如栗者是川楝子他處楝子小而味苦去核名金鈴子味微酸微苦性涼酸者入肝苦者善降能引肝膽之熱下行自小便出故治肝氣橫恣膽火熾盛致脅下掀疼並治胃脘氣鬱作疼木能疏土也其性雖涼治疝氣者恆以之為嚮導藥因其下行之力能引諸藥至患處也至他處之苦楝子因其味苦有小毒除蟲者恆用之薄荷解薄荷味辛氣清郁香竄性平少用則涼多用則熱如以鮮薄荷汁外擦皮膚少用殊覺清涼多用即覺灼熱其力能內透筋骨外達肌表宣通臟腑貫串經絡服之能透發涼汗為溫病宜汗解者之要藥若少用之亦善調和內傷治肝氣膽火鬱結作疼或肝風內動忽然癇痙瘛瘲頭疼目疼鼻淵鼻塞齒疼咽喉腫疼肢體拘攣作疼一切風火鬱熱之疾皆能治之痢疾初起挾有外感者亦宜用之散外感之邪即以清腸中之熱則其痢易愈又善消毒菌薄荷冰善消霍亂毒菌薄荷亦善消毒菌可知逐除惡氣一切霍亂痧證亦為要藥為其味辛而涼又善表疹癮愈皮膚瘙癢為兒科常用之品溫病發汗用薄荷猶傷寒發汗用麻黃也麻黃服後出熱汗熱汗能解寒是以宜於傷寒薄荷服後出涼汗涼汗能清溫是以宜於溫病若以麻黃髮溫病之汗薄荷發傷寒之汗大抵皆不能出汗即出汗亦必不能愈病也薄荷古原名苛以之作蔬不以之作藥神農本草經名醫別録皆未載之至唐時始列於藥品是以傷寒論諸方未有用薄荷者然細審傷寒論之方確有方中當用薄荷因當時猶未列入藥品即當用薄荷之方不得不轉用他藥者試取傷寒之方論之如麻杏甘石湯中之麻黃宜用薄荷代之蓋麻杏甘石湯原治汗出而喘無大熱既云無大熱其仍有熱可知有熱而猶用麻黃者取其瀉肺定喘也然麻黃能瀉肺定喘薄荷亦能瀉肺定喘薄荷之辛能抑肺氣之盛又善搜肺風用麻黃以熱治熱何如用薄荷以涼治熱乎又如凡有葛根諸湯中之葛根亦可以薄荷代之蓋葛根原所以發表陽明在經之熱葛根之涼不如薄荷而其發表之力又遠不如薄荷則用葛根又何如用薄荷乎斯非背古訓也古人當藥物未備之時所制之方原有不能盡善盡美之處無他時勢限之也吾人當藥物既備之時而不能隨時化裁與古為新是仍未會古人制方之意也醫界之研究傷寒者尚其深思愚言哉茯苓茯神解茯苓氣味俱淡性平善理脾胃因脾胃屬土土之味原淡土味淡之理徐靈胎曾詳論之是以內經謂淡氣歸胃而慎柔五書上述內經之旨亦謂味淡能養脾陰蓋其性能化胃中痰飲為水液引之輸於脾而達於肺復下循三焦水道以歸膀胱為滲濕利痰之主藥然其性純良瀉中有補雖為滲利之品實能培土生金有益於脾胃及肺且以其得松根有餘之氣伏藏地中不外透生苗故又善斂心氣之浮越以安魂定魄兼能瀉心下之水飲以除驚悸又為心經要藥且其伏藏之性又能斂抑外越之水氣轉而下注不使作汗透出兼為止汗之要藥也其抱根而生者為茯神養心之力較勝於茯苓茯苓若入煎劑其切作塊者終日煎之不透必須切薄片或搗為末方能煎透附録友人竹曰嵊縣吳氏一家以種苓為業春間吳氏之媳病蓋産後月餘壯熱口渴不引飲汗出不止心悸不寐延余往治病人面現紅色脈有滑象急用甘草麥冬竹葉柏子仁浮小麥大棗煎飲不效繼用酸棗仁湯減川芎加浮小麥大棗亦不效又用歸脾湯加龍骨牡蠣萸肉則仍然如故當此之時余束手無策忽一人進而言曰何不用補藥以緩之余思此無稽之談所云補藥者心無見識也姑漫應之時已屆晚寢之時至次日早起其翁奔告曰豫媳之病昨夜用補藥醫痊矣余將信將疑不識補藥究系何物乃翁持渣來見鉢中有茯苓四五兩噫茯苓焉胡為云補藥哉余半晌不能言危坐思之凡病有一線生機皆可醫治茯苓固治心悸之要藥亦治汗出之主藥仲景治傷寒汗出而渴者五苓散不渴者茯苓甘草湯傷寒厥而心下悸者宜先治水當服茯苓甘草湯可知心悸者汗出過多心液內涸腎水上救入心則悸余藥不能治水故用茯苓以鎮之是證心悸不寐其不寐由心悸而來即心悸亦從汗出而來其壯熱口渴不引飲脈滑皆有水氣之象今幸遇種苓家否則汗出不止終當亡陽水氣凌心必當滅火是誰之過歟余引咎而退觀竹此論不惜暴一己之失以為醫界説法其疏解經文之處能將仲景用茯苓之深意彰彰表出固其析理之精亦見其居心之厚也湖北天門縣崔來函云一九三年李姓婦頭目眩暈心中怔忡嘔吐涎沫有時覺氣上衝昏憒不省人事他醫治以安神之藥無效繼又延醫十餘人皆服藥無效危險已至極點生診其脈浮而無力視其形狀無可下藥恍悟衷中參西録茯苓解中所論重用茯苓之法當可挽回此證遂俾單用茯苓一兩煎湯服之服後甫五分鐘病即輕減旋即煎渣再服益神清氣爽連服數劑病即全愈後每遇類此證者投此方皆可奏效木通解木通味苦性涼為藤蔓之梗其全體玲瓏通徹故能貫串經絡通利九竅能瀉上焦之熱曲曲引之下行自水道達出為利小便清淋濁之要藥其貫串經絡之力又能治周身拘攣肢體痹疼活血消腫催生通乳多用亦能發汗愚平素不喜用苦藥木通諸家未嘗言苦而其味實甚苦因慮人嫌其苦口難服故於木通未嘗獨用重用以資研究近因遇一肢體關節腫疼證投以清熱利濕活血之品更以西藥阿斯匹林佐之治愈適法庫門生萬來奉因向彼述之萬曰醫宗金鑑治三痹行痹痛痹著痹有木通湯方學生以治痛痹極有效驗且服後必然出汗曾用數次皆一劑而愈愚曰我亦見其方但未嘗試用故不知如此神效既效驗如此當急録出以公諸醫界爰列其方於下木通湯用木通一味不見水者其整者皆未見水搗碎用二兩以長流水二碗煎一碗熱服取微汗不愈再服以愈為度若其痛上下左右流走相移者加羌活防風以祛風邪其痛涼甚者有汗加附子無汗加麻黃以去寒邪其痛重著難移者加防己以勝濕邪其所應加之藥不可過三錢弱者俱減半服蒲黃解蒲黃味淡微甘微辛性涼善治氣血不和心腹疼痛遊風腫疼顛仆血悶用生蒲黃半兩煎湯灌下即醒痔瘡出血水送服一錢日三次女子月閉腹痛産後瘀血腹疼為其有活血化瘀之力故有種種諸效若炒熟用之不宜炒黑又善治吐血咳血衄血二便下血女子血崩帶下外用治舌脹腫疼甚或出血一切瘡瘍腫疼蜜調敷之皆宜用生者皆有捷效為其生於水中且又味淡故又善利小便鄒潤安曰金匱用蒲灰散利小便治厥而為皮水解者或以為香蒲或以為蒲席燒灰然香蒲但能清上熱不云能利水敗蒲席名醫別録主筋溢惡瘡亦非利水之物蒲黃神農本草經主利小便且本事方芝隱方皆述其治舌脹神驗豫亦曾治多人毫絲不爽不正合治水之腫於皮乎夫皮水為膚腠間病不應有厥厥者下焦病也膀胱與腎為表裡膀胱以水氣歸皮致小便不利氣阻而成寒熱則腎亦承其弊為之陰壅而陽不得達遂成厥焉病本在外非可用溫又屬皮水無從發散計惟解心腹膀胱之寒熱使小便得利又何厥逆之有以是知其為蒲黃無疑也曰蒲灰者蒲黃之質固有似於灰也蒲黃誠為妙藥失笑散用蒲黃五靈脂等分生研每用五錢水酒各半加醋少許煎數沸連渣服之能愈産後腹疼於頃刻之間人多因蒲黃之質甚軟且氣味俱淡疑其無甚力量而忽視之是皆未見鄒氏之論故不能研究神農本草經主治之文也三稜莪朮解三稜氣味俱淡微有辛意莪朮味微苦氣微香亦微有辛意性皆微溫為化瘀血之要藥以治男子痃癖女子癥瘕月閉不通性非猛烈而建功甚速其行氣之力又能治心腹疼痛脅下脹疼一切血凝氣滯之證若與參朮耆諸藥並用大能開胃進食調血和血若細核二藥之區別化血之力三稜優於莪朮理氣之力莪朮優於三稜藥物恆有獨具良能不能從氣味中窺測者如三稜莪朮性近和平而以治女子瘀血雖堅如鐵石亦能徐徐消除而猛烈開破之品轉不能建此奇功此三稜莪朮獨具之良能也而耳食者流恆以其能消堅開瘀轉疑為猛烈之品而不敢輕用幾何不埋沒良藥哉三稜莪朮若治陡然腹脅疼痛由於氣血凝滯者可但用三稜莪朮不必以補藥佐之若治瘀血積久過堅硬者原非數劑所能愈必以補藥佐之方能久服無弊或用黃耆六錢三稜莪朮各三錢或減黃耆三錢加野臺參三錢其補破之力皆可相敵不但氣血不受傷損瘀血之化亦較速蓋人之氣血壯旺愈能駕馭藥力以勝病也乳香沒藥解乳香氣香竄味淡故善透竅以理氣沒藥氣則淡薄味則辛而微酸故善化瘀以理血其性皆微溫二藥並用為宣通臟腑流通經絡之要藥故凡心胃脅腹肢體關節諸疼痛皆能治之又善治女子行經腹疼産後瘀血作疼月事不以時下其通氣活血之力又善治風寒濕痹周身麻木四肢不遂及一切瘡瘍腫疼或其瘡硬不疼外用為粉以敷瘡瘍能解毒消腫生肌止疼雖為開通之品不至耗傷氣血誠良藥也乳香沒藥不但流通經絡之氣血諸凡臟腑中有氣血凝滯二藥皆能流通之醫者但知其善入經絡用之以消瘡瘍或外敷瘡瘍而不知用之以調臟腑之氣血斯豈知乳香沒藥者哉乳香沒藥最宜生用若炒用之則其流通之力頓減至用於丸散中者生軋作粗渣入鍋內隔紙烘至半熔候冷軋之即成細末此乳香沒藥去油之法常山解常山性涼味微苦善消脾中之痰為治瘧疾要藥瘧疾皆系脾中多痰凡久瘧脅下有硬塊名瘧母者皆系脾脹兼有痰也少服則痰可徐消若多服即可將脾中之痰吐出為其多服即作嘔吐故諸家本草皆謂其有毒醫者用之治瘧亦因此不敢多用遂至有效有不效若欲用之必效當效古人一劑三服之法用常山五六錢煎湯一大盅分五六次徐徐溫飲下即可不作嘔吐瘧疾亦有八九可愈附案一九一七年時當仲夏愚因勞碌過度兼受暑遂至病瘧乃於不發瘧之日清晨用常山八錢煎湯一大碗徐徐溫飲之一次止飲一大口飲至日夕而劑盡心中分毫未覺難受而瘧亦遂愈後遂變湯劑為丸劑將常山軋細過羅水泛為丸桐子大每服八分一日之間自晨至暮服五次共服藥四錢瘧亦可愈若病發時熱甚劇者可用生石膏一兩煎湯初兩次服藥時可用此湯送服西人謂病瘧者有瘧蟲西藥金雞納霜善除瘧蟲故善治瘧常山想亦善除瘧蟲之藥品歟山楂解山楂味至酸微甘性平皮赤肉紅黃故善入血分為化瘀血之要藥能除痃癖癥瘕女子月閉産後瘀血作疼俗名兒枕疼為其味酸而微甘能補助胃中酸汁故能消化飲食積聚以治肉積尤效其化瘀之力更能蠲除腸中瘀滯下痢膿血且兼入氣分以開氣鬱痰結療心腹疼痛若以甘藥佐之甘草蔗糖之類酸甘相合有甲己化土之義化瘀血而不傷新血開鬱氣而不傷正氣其性尤和平也女子至期月信不來用山楂兩許煎湯沖化紅蔗糖七八錢服之即通此方屢試屢效若月信數月不通者多服幾次亦通下痢疾初得者用山楂一兩紅白蔗糖各五錢好毛尖茶葉錢半將山楂煎湯沖糖與茶葉在蓋碗中浸片時飲之即愈附本草綱目山楂後載有兩方一方治腸風下血若用涼藥熱藥補脾藥俱不效者獨用干山楂為末艾葉煎湯調下應手即愈一方治痘疹乾黑危困者用山楂為末紫草煎酒調服一錢按此二方皆有效驗故附載之石榴解石榴有酸甜二種以酸者為石榴之正味故入藥必須酸者其性微涼能斂戢肝火保合肺氣為治氣虛不攝肺勞喘嗽之要藥又為治肝虛風動相火浮越之要藥若連皮搗爛煮湯飲之又善治大便滑瀉小便不禁久痢不止女子崩帶以其皮中之液最澀故有種種諸效也附案門生高之父曾向愚問治泄瀉方語以酸石榴連皮搗爛煮服甚效後歲值壬寅霍亂盛行有甫受其病泄瀉者彼與以服酸石榴方泄瀉止而病亦遂愈蓋霍亂之上吐下瀉原系肝木挾外感之毒克伐脾胃乃當其病勢猶未橫恣急以酸石榴斂戢肝木使不至助邪為虐致吐瀉不已則元氣不漓自可以抗禦毒菌況酸石榴之味至酸原有消除毒菌之力乎凡味之至酸者皆善消古方治霍亂多用木瓜取其酸能斂肝也酸石榴之酸遠勝木瓜是以有效也鄰村張氏婦年過四旬素息肺勞喘嗽夜不安枕者已數年矣無論服何藥皆無效驗一晚偶食酸石榴覺夜間喘嗽稍輕從此每晚服之其喘嗽日輕一連服過三月竟脫然無纍矣龍眼肉解龍眼肉味甘氣香性平液濃而潤為心脾要藥能滋生心血凡藥之色赤液濃而甘者皆能生血兼能保合心氣甘而且香者皆能助氣能滋補脾血味甘歸脾兼能強健脾胃氣香能醒脾故能治思慮過度心脾兩傷脾主思過思則傷脾或心虛怔忡寢不成寐或脾虛泄瀉或脾虛不能統血致二便下血為其味甘能培補脾土即能有益肺金土生金故又治肺虛勞嗽痰中帶血食之甘香適口以治小兒尤佳附案一少年心中怔忡夜不能寐其脈弦硬微數知其心脾血液短也俾購龍眼肉飯甑蒸熟隨便當點心食之至斤余病遂除根一六七歲童子大便下血數月不愈服藥亦無效亦俾蒸熟龍眼肉服之約日服兩許服旬日全愈柏子仁解柏子仁味微甘微辛氣香性平多含油質能補助心氣治心虛驚悸怔仲能涵濡肝木治肝氣橫恣脅疼滋潤腎水治腎虧虛熱上浮雖含油質甚多而性不濕膩且氣香味甘實能有益脾胃神農本草經謂其除風濕痹胃之氣化壯旺由中四達而痹者自開也其味甘而兼辛又得秋金肅降之氣能入肺寧嗽定喘導引肺氣下行統言之和平純粹之品於五臟皆有補益故神農本草經謂安五臟也宜去淨皮炒香用之不宜去油神農本草經謂柏實能安五臟而實於肝臟尤宜也曾治鄰村毛姓少年其肝臟素有傷損左關脈獨微弱一日忽脅下作疼俾單用柏子仁一兩煎湯服之立愈觀此則柏子仁善於理肝可知矣大棗解大棗味甘微辛性溫其津液濃厚滑潤最能滋養血脈潤澤肌肉強健脾胃固腸止瀉調和百藥能緩猛藥健悍之性使不傷脾胃是以十棗湯葶藶大棗湯諸方用之若與生薑並用為調和營衛之妙品是以桂枝湯柴胡湯諸方用之內經謂其能安中者因其味至甘能守中也又謂其能通九竅者因其津液滑潤且微有辛味故兼有通利之能也謂其補少氣少津液者為其味甘能益氣其津液濃厚滑潤又能補人身津液之不足也雖為尋常食品用之得當能建奇功周伯度曰生薑味辛色黃由陽明入衛大棗味甘色赤由太陰入營其能入營由於甘中有辛惟其甘守之力多得生薑乃不至過守生薑辛通之力多得大棗乃不至過通二藥並用所以為和營衛主劑神農本草經名之為大棗者別於酸棗仁之小棗也凡棗之酸者皆小甘者皆大而大棗又非一種約以生食不脆干食肉多味極甘者為入藥之品若用為服食之物而日日食之者宜先用水將棗煮兩三沸遲一點鐘將棗撈出此時嘗其煮棗之水甚苦故先宜將苦水煮出再用飯甑上蒸熟則其味甘美其性和平可以多服久服不至生熱附案邑中友人趙身體素羸弱年屆五旬飲食減少日益消瘦詢方於愚俾日食熟大棗數十枚當點心用之後年余覿面貌較前豐腴若干自言自聞方後即日服大棗至今未嘗間斷飲食增於從前三分之一是以身形較前強壯也表叔高年過五旬胃陽不足又兼肝氣鬱結因之飲食減少時覺滿悶服藥半載毫無效驗適愚遠遊還里覿面談及俾用大棗六斤生薑一斤切片同在飯甑蒸熟臼內搗如泥加桂枝尖細末三兩炒熟麥面斤半和勻捏成小餅爐上炙乾隨意當點心服之盡劑而愈胡桃解胡桃亦名核桃味微甘氣香性溫多含油質將油榨出須臾即變黑色為滋補肝腎強健筋骨之要藥故善治腰疼腿疼一切筋骨疼痛為其能補腎故能固齒牙烏鬚髮治虛勞喘嗽氣不歸元下焦虛寒小便頻數女子崩帶諸證其性又能消堅開瘀治心腹疼痛砂淋石淋杜塞作疼腎敗不能漉水小便不利或誤吞銅物多食亦能消化試與銅錢同嚼其錢即碎能化銅可知又善消瘡疽及皮膚疥癬頭上白禿又能治瘡毒深入骨髓軟弱不能步履附案一幼童五齡猶不能行身多瘡瘍治愈復發知其父素有梅毒此係遺傳性病在骨髓也為疏方每劑中用胡桃仁八錢佐以金銀花白鮮皮土茯苓川貝母玄參甘草諸藥如此方少有加減服藥二十餘劑其瘡皆愈從此漸亦能行步矣附古方治虛寒喘嗽腰腿痠痛用胡桃仁二十兩爛研補骨脂十兩酒蒸為末密調如飴每晨酒服一大匙不能飲者熱水調服汪訒庵謂補骨脂屬火入心包命門能補相火以通君火暖丹田壯元陽胡桃屬木能通命門利三焦溫肺潤腸補養氣血有木火相生之妙愚常用之以治下焦虛寒之證誠有奇效上方加杜仲一斤生薑炒蒜四兩同為丸名青娥丸治腎虛腰疼而此方不但治腎虛腰疼也以治虛寒腿疼亦極效驗曾治一媼年過六旬腿疼年餘不愈其脈兩尺沉細俾日服青娥丸月餘全愈若虛寒之甚者可於方中加生硫黃三兩五味子解五味子性溫五味俱備酸咸居多其酸也能斂肺故神農本草經謂主咳逆上氣其咸也能滋腎故神農本草經謂其強陰益男子精其酸收之力又能固攝下焦氣化治五更泄瀉夢遺失精及消渴小便頻數或飲一溲一或飲一溲二其至酸之味又善入肝肝開竅於目故五味子能斂瞳子散大然其酸收之力甚大若咳逆上氣挾有外感者須與辛散之藥同用若乾薑生薑麻黃細辛諸藥方能服後不至留邪凡入煎劑宜搗碎以其仁之味辛與皮之酸味相濟自不至酸斂過甚服之作脹滿也鄒潤安曰傷寒論中凡遇咳者總加五味子乾薑義甚深奧經云脾氣散精上歸於肺是故咳雖肺病而其源實主於脾惟脾家所散上歸之精不清則肺家通調水道之令不肅後人治咳但知潤肺消痰不知潤肺則肺愈不清消痰則轉能傷脾而痰之留於肺者究莫消也乾薑溫脾肺是治咳之來路來路清則咳之源絶矣五味使肺氣下歸於腎是治咳之去路去路清則氣肅降矣合兩藥而言則為一開一闔當開而闔是為關門逐盜當闔而開則恐津液消亡故小青龍湯及小柴胡湯真武湯四逆散之兼咳者皆用之不嫌其表裡無別也萆薢解萆薢味淡性溫為其味淡而溫故能直趨膀胱溫補下焦氣化治小兒夜睡遺尿或大人小便頻數致大便乾燥其溫補之性兼能澀精祕氣患淋證者禁用醒脾升陷湯後曾詳論之萆薢為治失溺要藥不可用之治淋名醫別録謂萆薢治陰萎失溺老人五緩蓋失溺之證實因膀胱之括約筋少約束之力此係筋緩之病實為五緩之一萆薢善治五緩所以治之拙擬醒脾升陷湯中曾重用萆薢以治小便頻數不禁屢次奏效是萆薢為治失溺之要藥可知矣乃萆薢分清飲竟用之以治膏淋何其背謬若是愚在籍時鄰村有病淋者醫者投以萆薢分清飲兩劑其人小便滴瀝不通再服各種利小便藥皆無效後延愚診治已至十日精神昏憒毫無知覺脈數近十至按之即無因謂其家人曰據此脈論即小便通下亦恐不救其家人懇求甚切遂投以大滋真陰之劑以利水之藥佐之灌下移時小便即通床褥皆濕再診其脈微細欲無愚急辭歸後聞其人當日即亡近又在津治一淋證服藥十劑已愈隔兩月病又反復時值愚回籍遂延他醫治療方中亦重用萆薢服兩劑小便亦滴瀝不通服利小便藥亦無效遂屢用西法引溺管兼服利小便之藥治近一旬小便少通滴瀝每小便一次必須兩小時繼又服滋陰利水之藥十劑始全愈雞內金解雞內金雞之脾胃也其中原含有稀鹽酸故其味酸而性微溫中有瓷石銅鐵皆能消化其善化瘀積可知內經謂諸濕腫滿皆屬於脾蓋脾中多回血管原為通徹玲瓏之體是以居於中焦以升降氣化若有瘀積氣化不能升降是以易致脹滿用雞內金為臟器療法若再與白朮等分並用為消化瘀積之要藥更為健補脾胃之妙品脾胃健壯益能運化藥力以消積也且為雞內金含有稀鹽酸不但能消脾胃之積無論臟腑何處有積雞內金皆能消之是以男子痃癖女之癥瘕久久服之皆能治愈又凡虛勞之證其經絡多瘀滯加雞內金於滋補藥中以化其經絡之瘀滯而病始可愈至以治室女月信一次未見者尤為要藥蓋以其能助歸芍以通經又能助健補脾胃之藥多進飲食以生血也女子乾血勞之證最為難治之證也是以愈者恆少惟善用雞內金者則治之多能奏效愚向為婦女治病其廉於飲食者恆白朮與雞內金並用乃有兩次遇有此藥者一月間月信來三次恍悟此過用雞內金之弊也蓋雞內金善化瘀血即能催月信速於下行也然月信通者服之或至過通而月信之不通者服之即不難下通況內經謂中焦受氣取汁變化而赤是為血血之來源原在脾胃能多消飲食雞內金與白朮並用原能健脾胃以消飲食也況脾為後天資生之本居中央以灌溉四旁此證之多發勞嗽者脾虛肺亦虛也多兼灼熱者脾虛而腎亦虛也再加山藥地黃枸杞諸藥以補肺滋腎有雞內金以運化之自能變其濃厚之汁漿為精液以灌注於肺腎也逮至服藥日久臟腑諸病皆愈身體已漸復原而月信仍不至者不妨再加蟅蟲水蛭諸藥如嫌諸藥之猛悍若桃仁紅花亦可以替代然又須多用補正之藥品以駕馭之始能有益而無害也愚向曾本此意擬一方名資生通脈湯後列用其方治愈之案數則可參觀也內經謂女子二七天癸至所謂二七者十四歲也然必足年足月十四歲是則室女月信之通當在年十五矣若是年至十五月信不通即當預為之防宜用整條生懷山藥軋細過羅每用一兩或八錢煮作茶湯調以蔗糖令適口以之送服生雞內金細末五分許當點心用之日兩次久則月信自然通下此因山藥善養血雞內金善通血也若至因月信不通飲食減少漸覺灼熱者亦可治以此方雞內金末宜多用至一錢服茶湯後再嚼服天冬二三錢至於病又加重身體虛弱勞嗽宜用拙擬資生通脈湯此方之後載有數案且用此方各有加減若服資生通脈湯病雖見愈月信仍不至者可參觀所附案中加減諸方上所論諸方之外愚有新擬之方凡服資生通脈湯病見愈而月信不見者可用生懷山藥四兩煮濃汁送眼生雞內金細末三錢所餘山藥之渣仍可水煮數次當茶飲之久之月信必至蓋雞內金生用為通月信最要之藥而多用又恐稍損氣分故又多用山藥至四兩以培氣分也附案瀋陽龔年三十歲胃脘有硬物杜塞已數年矣飲食減少不能下行來院求為診治其脈象沉而微弦右部尤甚為疏方用雞內金一兩生酒麴五錢服數劑硬物全消奉天史年近四旬為腹有積聚久治不愈來院求為診治其積在左脅下大徑三寸按之甚硬時或作疼厄逆氣短飲食減少脈象沉弦此乃肝積肥氣之類俾用生雞內金三兩柴胡一兩共為末每服一錢半日服三次旬余全愈奉天秦年三十餘胃中滿悶不能飲食自覺賁門有物窒礙屢經醫治分毫無效脈象沉牢為疏方雞內金六錢白朮赭石各五錢乳香沒藥丹參各四錢生桃仁二錢連服八劑全愈奉天宋氏女年十九歲自十七歲時胃有瘀滯作疼調治無效浸至不能飲食脈象沉而無力右部尤甚為疏方雞內金一兩生酒麴黨參各五錢三稜莪朮知母各三錢樗雞俗名紅娘子十五個服至八劑大小二便皆下血胃中豁然其疼遂愈鹽山李氏婦年三旬胃脘舊有停積數年不愈漸大如拳甚硬不能飲食左脈弦細右脈沉濡為疏方雞內金八錢生箭耆六錢三稜莪朮乳香沒藥各三錢當歸知母各四錢連服二十餘劑積全消友人毛治一孺子自兩三歲時腹即脹大至五六歲益加劇面目黃瘦飲食減少俗所謂大肚痞也毛見拙擬期頤餅方後載若減去芡實可治小兒疳積痞脹大人癥瘕積聚遂用其方方系生雞內金細末三兩白麵半斤白沙糖不拘多少和作極薄小餅烙至焦熟俾作點心服之月餘全愈穿山甲解穿山甲味淡性平氣腥而竄其走竄之性無微不至故能宣通臟腑貫徹經絡透達關竅凡血凝血聚為病皆能開之以治疔癰放膽用之立見功效並能治癥瘕積聚周身麻痹二便閉塞心腹疼痛若但知其長於治瘡而忘其他長猶淺之乎視山甲也疔癰初起未成膿者愚恆用山甲皂刺各四錢花粉知母各六錢乳香沒藥各三錢全蜈蚣三條服之立消以治橫痃魚口便毒之類亦極效驗其已有膿而紅腫者服之紅腫即消膿亦易出至癥瘕積聚疼痛麻痹二便閉塞諸證用藥治不效者皆可加山甲作嚮導友人黃謂身上若有血箭證或金傷出血不止者敷以山甲末立止屢次用之皆效蛤粉炒透用惟以之熬膏藥用生者蜈蚣解蜈蚣味微辛性微溫走竄之力最速內而臟腑外而經絡凡氣血凝聚之處皆能開之性有微毒而轉善解毒凡一切瘡瘍諸毒皆能消之其性尤善搜風內治肝風萌動癲癇眩暈抽掣瘛瘲小兒臍風外治經絡中風口眼歪斜手足麻木為其性能制蛇故又治蛇症及蛇咬中毒外敷治瘡甲俗名雞眼為末敷之以生南星末醋調敷四周用時宜帶頭足去之則力減且其性原無大毒故不妨全用也附案奉天陳之幼子年五歲周身壯熱四肢拘攣有抽掣之狀渴嗜飲水大便乾燥知系外感之熱引動其肝經風火上衝腦部致腦氣筋妄行失其主宰之常也投以白虎湯方中生石膏用一兩又加薄荷葉一錢鉤藤鉤二錢全蜈蚣二條煎湯一盅分兩次溫飲下一劑而抽掣止拘攣舒遂去蜈蚣又服一劑熱亦退淨奉天那姓幼子生月餘周身壯熱抽掣兩日之間不食乳不啼哭奄奄一息待時而已來院求治知與前證倣佛為其系嬰孩擬用前方將白虎湯減半為其抽掣甚劇薄荷葉鉤藤鉤蜈蚣其數仍舊又加全蠍三個煎藥一盅不分次數徐徐溫灌之歷十二小時藥灌已而抽掣愈食乳知啼哭矣翌日又為疏散風清熱鎮肝之藥一劑全愈隔兩日其同族又有三歲幼童其病狀與陳姓子相似即治以陳姓子所服藥一劑而愈奉天吳姓男孩生逾百日周身壯熱時作抽掣然不甚劇投以白虎湯生石膏用六錢又加薄荷葉一錢蜈蚣一條煎湯分三次灌下盡劑而愈此四證皆在暮春上旬相隔數日之間亦一時外感之氣化有以使之然也一人年三十餘陡然口眼歪斜受病之邊目不能瞬用全蜈蚣二條為末以防風五錢煎湯送服三劑全愈有病噎膈者服藥無效偶思飲酒飲盡一壺而病愈後視壺中有大蜈蚣一條恍悟其病愈之由不在酒實在酒中有蜈蚣也蓋噎膈之證多因血瘀上脘為有形之阻隔西人名胃癌謂其處凸起如山石之有岩也蜈蚣善於開瘀是以能愈觀於此則治噎膈者蜈蚣當為急需之品矣為其事甚奇故附記於此水蛭解水蛭味鹹色黑氣腐性平為其味成故善入血分為其原為噬血之物故善破血為其氣腐其氣味與瘀血相感召不與新血相感召故但破瘀血而不傷新血且其色黑下趨又善破衝任中之瘀蓋其破瘀血者乃此物之良能非其性之猛烈也神農本草經謂主婦人無子因無子者多系衝任瘀血瘀血去自能有子也特是其味鹹為水味色黑為水色氣腐為水氣純系水之精華生成故最宜生用甚忌火炙凡破血之藥多傷氣分惟水蛭味鹹專入血分於氣分絲毫無損且服後腹不覺疼並不覺開破而瘀血默消於無形真良藥也愚治婦女月閉癥瘕之證其脈不虛弱者恆但用水蛭軋細開水送服一錢日兩次雖數年瘀血堅結一月可以盡消水蛭虻蟲皆為破瘀血之品然愚嘗單用以實驗之虻蟲無效而水蛭有效以常理論之凡食血之物皆能破血然虻蟲之食血以嘴水蛭之食血以身其身與他物緊貼即能吮他物之血故其破瘀血之功獨優近世方書多謂水蛭必須炙透方可用不然則在人腹中能生殖若干水蛭害人誠屬無稽之談曾治一婦人經血調和竟不産育細詢之少腹有癥瘕一塊遂單用水蛭一兩香油炙透為末每服五分日兩次服完無效後改用生者如前服法一兩猶未服完癥瘕盡消逾年即生男矣惟氣血虧損者宜用補助氣血之藥佐之或問同一水蛭也炙用與生用其功效何如此懸殊答曰此物生於水中而色黑水色味鹹水味氣腐水氣原得水之精氣而生炙之則傷水之精氣故用之無效水族之性如龍骨牡蠣龜板大抵皆然故王洪緒外科證治全生集謂用龍骨者宜懸於井中經宿而後用之其忌火可知而在水蛭為尤甚特是水蛭不炙為末甚難若軋之不細曬乾再軋或紙包置爐臺上令乾亦可此須親自檢點若委之藥坊至軋不細時必須火焙矣西人治火熱腫疼用活水蛭數條置患處復以玻璃杯使吮人毒血亦良法也蠍子解蠍子色青味鹹本無鹹味因皆醃以鹽水故咸性微溫善入肝經搜風發汗治痙癇抽掣中風口眼歪斜或周身麻痹其性雖毒轉善解毒消除一切瘡瘍為蜈蚣之伍藥其力相得益彰也此物所含之毒水即硫酸也其入藥種種之效力亦多賴此中其毒螫者敷以西藥重曹或鹼皆可解之因此二者皆能制酸也附案本村劉氏女頷下起時毒甚腫硬撫之微熱時愚甫弱冠醫學原未深造投藥兩劑無甚效驗後或授一方用壁上全蠍七個焙焦為末分兩次用黃酒送下服此方三日其瘡消無芥蒂蓋牆上所得之蠍子未經鹽水浸醃其力渾全故奏效尤捷也鄰莊張馬村一壯年中風半身麻木無論服何藥發汗其半身分毫無汗後得一方用藥房中蠍子二兩鹽炒軋細調紅糖水中頓服之其半身即出汗麻木遂愈然未免藥力太過非壯實之人不可輕用蟬蛻解蟬蛻無氣味性微涼能發汗善解外感風熱為溫病初得之要藥又善托隱疹外出有皮以達皮之力故又為治隱疹要藥與蛇蛻並用善治周身癩癬瘙癢若為末單服又善治瘡中生蛆連服數次其蛆自化為其不飲食而時有小便故又善利小便為其為蟬之蛻故又能脫目翳也蟬亦止小兒夜啼又善醫音啞憶一九三六年秋余友姚偶為外感所襲音啞月餘余為擬方用淨蟬蛻去足土二錢滑石一兩麥冬四錢胖大海五個桑葉薄荷葉各二錢囑其用水壺泡之代茶飲一日音響二日音清三日全愈以後又用此方治愈多人屢試屢驗受業孫謹識羚羊角解羚羊角性近於平不過微涼最能清大熱兼能解熱中之大毒且既善清裡又善透表能引臟腑間之熱毒達於肌膚而外出疹之未出或已出而速回者皆可以此表之為托表麻疹之妙藥即表之不出而毒氣內陷者服之亦可內消又善入肝經以治肝火熾盛至生眼疾及患吐衄者之妙藥所最異者性善退熱卻不甚涼雖過用之不致令人寒胃作泄瀉與他涼藥不同此乃具有特殊之良能非可以尋常藥餌之涼熱相權衡也或單用之或雜他藥中用均有顯效今特將所用羚羊角治愈之病十餘則詳録於下以徵明之附案壬寅之歲季春夜半表弟劉之子年六歲於數日間出疹因其苦於服藥強與之即作嘔吐所以未求診視今夜忽大喘不止有危在頃刻之勢不知還可救否遂與同往視之見其不但喘息迫促且精神恍惚肢體騷擾不安脈象搖搖而動按之無根其疹出第三日即靨微有紫痕知其毒火內攻肝風已動也因思熄風清火且托毒外出惟羚羊角一味能兼擅其長且色味俱無煎湯直如清水孺子亦不苦服遂急取羚羊角三錢煎湯視其服下過十餘分鐘即安然矣奉天王之孫女年五六歲患眼疾先經東醫治數日不愈延為診視其兩目胬肉長滿遮掩目睛分毫不露且疼痛異常號泣不止遂單用羚羊角二錢俾急煎湯服之時已屆晚九點鐘至夜半已安然睡去翌晨胬肉已退其半又煎渣服之全愈蓋肝開竅於目羚羊角性原屬木與肝有同氣相求之妙故善入肝經以瀉其邪熱且善伏肝膽中寄生之相火為眼疾有熱者無上妙藥奉天韓姓媼年六十餘臂上生疔毒外科不善治療致令毒火內攻熱痰上壅填塞胸臆昏不知人有東醫數人為治移時不愈氣息益微延為診視知系痰厥急用蓬砂五錢煮至融化灌下三分之二須臾嘔出痰涎若干豁然頓醒而患處仍腫疼其疔生於左臂且左脈較右脈洪緊知系肝火熾盛發為腫毒也遂投以清火解毒之劑又單將羚羊角二錢煎湯兌服一劑而愈奉天王之幼女年五歲因出疹倒靨過急毒火內郁已過旬日猶大熱不止其形體病久似弱而脈象確有實熱且其大便乾燥小便黃赤知非輕劑所能治愈將為疏方為開羚羊角二錢生石膏二兩煎湯一大盅俾徐徐飲下連服兩劑全愈奉天劉之幼女年四歲於孟夏時胸腹之間出白痧若干旋即不見周身壯熱精神昏憒且又泄瀉此至危之候也為疏方生懷山藥滑石各八錢連翹生杭芍各三錢蟬蛻甘草各二錢羚羊角一錢另煎兌服煎湯一大盅和羚羊角所煎之湯共盅半分三次溫服下其白痧復出精神頓爽瀉亦遂止繼又用解毒清火之品調之全愈奉天馬之幼子年四歲因出疹靨急來院求為診治其狀閉目喘促精神昏昏呼之不應周身壯熱大便數日未行斷為疹毒內攻其神明所以若斯昏沉非羚羊角生石膏並用不可遂為疏方生石膏一兩玄參花粉各六錢連翹金銀花各三錢甘草二錢煎湯一大盅又用羚羊角二錢煎湯半盅混合三次溫服下盡劑而愈奉天陳姓女年六七歲疹後旬余灼熱不退屢服西藥不效後愚視之脈象數而有力知其疹毒之餘熱未清也俾單用羚羊角一錢煎湯飲之其熱頓愈天津俞之幼子年四歲出疹三日似靨非靨周身壯熱渴嗜飲水其精神似有恍惚不穩之意其脈象有力搖搖而動恐其因熱發痙為開清熱托毒之方加羚羊角一錢以防其發痙購藥至未及煎而痙發且甚劇遂將羚羊角與諸藥同時各煎取湯混合連連灌下其痙即愈又將其方去羚羊角再煎服一劑全愈滄州張來院詢方言其家有周歲小兒出疹延醫調治數日其疹倒靨皆黑斑有危在旦夕之勢不知尚可救否細詢之知毒熱內陷為開羚羊角一錢及玄參花粉連翹各數錢俾將羚羊角另煎湯半茶盅與餘三味所煎之湯兌服一劑而愈滄州趙幼子年五歲因感受溫病發痙昏昏似睡呼之不應舉家懼甚恐不能救其脈甚有力肌膚髮熱因曉之曰此證因溫病之氣循督脈上行傷其腦部是以發痙昏昏若睡即西人所謂腦脊髓炎也病狀雖危易治也遂單用羚羊角二錢煎湯一盅連次灌下發痙遂愈而精神亦明瞭矣繼用生石膏玄參各一兩薄荷葉連翹各一錢煎湯一大盅分數次溫飲下一劑而脈靜身涼矣蓋痙之發由於督脈因督脈上統腦髓神經也督脈實為腦髓神經之根本羚羊之角乃其督脈所生是以善清督脈與神經之熱也滄州劉之幼子甫周歲發生扁桃體炎喉證不能食乳劇時有礙呼吸目睛上泛急用羚羊角一錢煎湯多半杯灌下須臾呼吸通順食乳如常滄州李氏婦年二十餘因在西醫院割瘰癧住其院中得傷寒證甚劇西醫不能治延往診視其喘息迫促脈數近七至確有外感實熱而重診無力因其割瘰癧已至三次屢次聞麻藥大傷氣分故也其心中覺熱甚難支其脅下疼甚急用羚羊角二錢煎一大盅調入生雞子黃三枚服下心熱與脅疼頓止繼投以大劑白虎加人參湯每劑煎湯一大碗仍調入生雞子黃三枚分數次溫服下連服二劑全愈內子王氏生平有病不能服藥聞藥氣即思嘔吐偶患大便下血甚劇時愚自奉還籍彼自留奉因粗識藥性且知羚羊角毫無藥味自用羚羊角一錢煎湯服之立愈友人毛善治吐衄聞名其治吐衄之方多用羚羊角曾詢其立方之義謂吐衄之證多因沖氣上衝胃氣上逆血即隨之妄行其所以沖胃沖逆者又多為肝火肝氣之激發用羚羊角以平肝火肝氣其沖氣不上衝胃氣不上逆血自不妄行而歸經矣愚深韙斯論遇吐衄證仿用之果效驗異常所可慮者羚羊角雖為挽回險證之良藥然其價昂貴愚因臨證細心品驗遇當用羚羊角之證原可以他藥三種並用代之其藥力不亞羚羊角且有時勝於羚羊角則鮮茅根生石膏與西藥阿斯匹林並用是也今爰將此三藥並用之分量酌定於下且為定一方名以便於記憶甘露清毒飲鮮茅根六兩去淨皮切碎生石膏兩半搗細阿斯匹林半瓦將前二味煎湯一大碗分三次送服阿斯匹林兩點鐘服一次若初次服藥後遍身出汗後兩次阿斯匹林宜少服若分毫無汗又宜稍多服以服後微似有汗者方佳至石膏之分量亦宜因證加減若大便不實者宜少用若瀉者石膏可不用待其瀉止便實仍有餘熱者石膏仍可再用壬申正月中旬子兩臂及胸間肉皮微發紅咽喉微疼疑將出疹又強被友人挽去為治小兒發疹將病治愈歸家途中又受感冒遂覺周身發冷心中發熱愚適自津還籍俾用生石膏細末一兩煎湯送服阿斯匹林一瓦周身得汗發冷遂愈心中之熱亦輕皮膚則較前益紅遲半日又微覺發冷心中之熱更增劇遂又用生石膏細末二兩煎湯送服阿斯匹林半瓦服後微解肌病又見愈遲半日仍反復如故且一日之間下大便兩次知其方不可再用時地凍未解遣人用開凍利器剖取鮮茅根六兩煎湯一大碗分三次服每次送服阿斯匹林三分之一瓦服後未見汗而周身出疹若干病愈十分之八九喉已不疼隔兩日覺所餘之熱又漸增重且覺頭目昏沉又剖取鮮茅根八兩此時因其熱增大便已實又加生石膏兩半共煎湯一大碗仍分三次送服阿斯匹林如前上半身又發出白泡若干病遂全愈觀此可知此三藥並用之妙誠可代羚羊角矣後返津時值瘟疹流行治以此方皆隨手奏效附録唐山趙來函小女一年有餘於季夏忽大便兩三次帶有黏滯至夜發熱日閉目昏睡翌晨手足筋惕肉瞤後學斷其肝風已動因憶先生論羚羊角最善清肝膽之火且歷數其奇異之功效真令人不可思議為急購羚羊角尖一錢上午九點煎服至十一點周身得微汗灼熱即退為其藥甚珍貴又將其渣煎服三次筋惕亦愈繼服滋陰清燥湯一劑瀉痢均愈血餘炭解血餘者發也不煆則其質不化故必煆為炭然後入藥其性能化瘀血生新血有似三七故善治吐血衄血而常服之又可治勞瘵因勞瘵之人其血必虛而且瘀故金匱謂之血痹虛勞人之發原人心血所生服之能自還原化有以人補人之妙則血可不虛而其化瘀之力又善治血痹是以久久服之自能奏效其性又能利小便金匱利小便之方有膏發煎以人之小便半從血管滲出血餘能化瘀血生新血使血管流通故有斯效其化瘀生新之力又善治大便下血腥臭腸中腐爛及女子月信閉塞不以時至制血餘炭法用壯年剃下之發鹼水洗淨再用清水淘去鹼味曬乾用鐵鍋炮至髮質皆化為膏晾冷軋細過羅其髮質未盡化者可再炮之指甲解指甲一名筋退乃筋之餘也剪碎炮焦研細用之其味微咸具有開破之性瘡瘍將破未破者敷之可速破內服能催生下胎衣鼻嗅之能止衄血點眼上能消目翳愚自制有磨翳藥水目翳厚者可加指甲末與諸藥同研以點目翳屢次奏效三醫論六經總論傷寒治法以六經分篇然手足各有六經實則十二經也手足之經既有十二而傷寒論但分為六經者何也按內經之論十二經也凡言某經而不明言其為手經足經者皆系足經至言手經則必明言其為手某經蓋人之足經長手經短足經大手經小足經原可以統手經但言足經而手經亦恆寓其中矣傷寒論之以六經分篇此遵內經定例寓手經於足經中也彼解傷寒論者謂其所言之六經皆系足經是猶未明仲景著傷寒之深意也經者氣血流通之處也人之臟腑與某經相通即為某經之府其流通之氣血原由府發出而外感之內侵遂多以府為歸宿今將手足十二經及手足十二經之府詳列於下手足雖有十二經其名則分為六經因手足經之名原相同也其經有陰有陽其陽經分太陽陽明少陽其陰經分太陰少陰厥陰其陰陽之經原互相表裡太陽與少陰為表裡陽明與太陰為表裡少陽與厥陰為表裡凡互為表裡者因其陰陽之經並行其陽行於表陰行於里也至於經之分屬於府者足太陽經之府在膀胱足少陰經之府在腎足陽明經之府在胃足太陰經之府在脾足少陽經之府在膽足厥陰經之府在肝此足之三陰三陽經與府也手之太陽經其府在小腸手之少陰經其府在心手之陽明經其府在大腸手之太陰經其府在肺手之少陽經其府在三焦手之厥陰經其府在心胞此手之三陰三陽經與府也陽經為陰經之表而太陽經又為表中之表其經之大都會在背而實則為周身之外廓周身之營血衛氣皆賴其衛護保合且具有充分之熱力為營衛御外感之內侵是以內經名之為巨陽推原其熱力之由來不外君相二火君火生於心之血脈與肺相循環而散熱於胸中大氣一名宗氣以外通於營衛此如日麗中天有陽光下濟之熱也是以其經名為太陽相火生於腎中命門腎原屬水中藏相火其水火蒸熱之氣由膀胱連三焦之脂膜以透達於身之外表此猶地心水火之氣地中心有水火之氣應春令上透地面以生熱也為其熱力發於水中故太陽之經又名太陽寒水之經也為太陽經之熱力生於君相二火是以其經不但以膀胱為府而亦以胸中為府觀傷寒論陷胸諸湯丸及瀉心諸湯皆列於太陽篇中可知也至於人病傷寒其六經相傳之次第詳於內經素問熱論篇謂人之傷於寒也則為病熱一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肌肉其脈俠同夾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌咽喉故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰之脈循陰器而絡於肝故煩滿而囊縮經絡受病入於府者故可下而已此內經論六經相傳之次第也至傷寒論六經之次序皆以內經為法而未明言其日傳一經至愚生平臨證之實驗見有傷寒至旬日病猶在太陽之府者至他經相傳之日期亦無一定蓋內經言其常而病情之變化恆有出於常例之外者至傳至某經即現某經之病狀此又不盡然推原其所以然之故且加以生平臨證之實驗知傳至某經即現某經之病狀者多系因其經先有內傷也若無內傷則傳至某經恆有不即現某經之病時此在臨證者細心體察耳至於六經之命名手足皆同然有因手經發源之府而命名者有因足經發源之府而命名者如太陽經名為太陽寒水之經此原因足太陽之府命名而手太陽亦名太陽寒水之經者是以足經而連帶其手經也他如陽明經名為陽明燥金之經是因手陽明之府命名手陽明府大腸屬金其互為表裡之肺亦屬金而足陽明經亦名陽明燥金之經者是以手經而連帶其足經也少陽經名為少陽相火之經此因足少陽之府命名膽中寄有相火而手少陽經亦名為少陽相火之經者是以足經而連帶其手經也太陰經名為太陰濕土之經此因足太陰之府命名脾為濕土而手太陰經亦名太陰濕土之經者是以足經而連帶其手經也少陰經名為少陰君火之經此因手少陰之府命名心為君火而足少陰經亦名少陰君火之經者是以手經而連帶其足經也厥陰經名為厥陰風木之經此因足厥陰之府命名肝屬木而主風而手厥陰經亦名厥陰風木之經者是以足經而連帶其手經也此手足十二經可併為六經之義也太陽病桂枝湯證病名傷寒而太陽篇之開端實中風傷寒風溫並列蓋寒氣多隨風至是中風者傷寒之誘起也無論中風傷寒入陽明後皆化為溫是溫病者傷寒之歸宿也惟其初得之時中風傷寒溫病當分三種治法耳為中風為傷寒之誘起是以太陽篇開始之第一方為桂枝湯其方原為治中風而設也傷寒論原文太陽病發熱汗出惡風脈緩者緩脈與遲脈不同脈搏以一息四至為準脈遲者不足四至若緩脈則至數不改似有懶動之意名為中風傷寒論原文太陽中風陽浮而陰弱脈法關前為陽關後為陰其浮脈見於關前弱脈見於關後浮者著手即得弱者不任重按陽浮者熱自發陰弱者汗自出嗇嗇惡寒單弱不勝寒之意淅淅惡風為風所傷恆畏風聲之意翕翕發熱其熱蘊而不散之意鼻鳴乾嘔者桂枝湯主之桂枝湯方桂枝三兩去皮芍藥三兩炙甘草二兩生薑三兩大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服須臾啜熱稀粥一升余以助藥力溫復令一時許遍體漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥愈也停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物人之營衛皆在太陽部位衛主皮毛皮毛之內有白膜一層名為腠理腠理之內遍布微絲血管即營也其人若衛氣充盛可為周身之外圍即受風不能深入此受風不可名為中風其人恆多汗閉不出逮其衛氣流通其風自去原可不藥而愈也至桂枝湯所主之證乃衛氣虛弱不能護衛其營分外感之風直透衛而入營其營為風邪所傷又乏衛之保護是以易於出汗其發熱者因營分中之微絲血管原有自心傳來之熱而有風以擾之則更激發其熱也其惡風者因衛虛無御風之力而病之起點又由於風也推原其衛氣不能衛護之故實由於胸中大氣之虛損靈樞五味篇曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之摶而不行者積於胸中命曰氣海由斯觀之營衛原與胸中大氣息息相通而大氣實為營衛內部之大都會愚臨證實驗以來見有大氣虛者其營衛即不能護衛於外而汗出淋漓夫大氣原賴水穀之氣時時培養觀服桂枝湯者當啜熱粥以助藥力此不惟助其速於出汗實兼欲助胸中大氣以固營衛之本源也或問桂枝湯提綱中原謂陰弱者汗自出未嘗言陽弱者汗自出也夫關後為陰主血關前為陽主氣桂枝湯證其弱脈惟見於關後至關前之脈則見有浮象未見其弱而先生竟謂桂枝湯證之出汗實由於胸中大氣之弱不顯與提綱中之言相背乎答曰凡受風之脈多見於關前提綱中所謂陽浮者其關前之脈因受風而浮也所謂陰弱者知其未病之先其脈原弱至病後而仍不改其弱也由斯而論其未病之先不但關後之脈弱即關前之脈亦弱既病之後其關前脈之弱者轉為浮脈所掩而不見其弱耳然其脈雖浮必不任重按是浮中仍有弱也特古人立言尚簡未嘗細細明言耳是以愚用桂枝湯時恆加黃耆以補其胸中大氣加薄荷以助其速於出汗不至若方後所云恆服藥多次始汗也又宜加天花粉助芍藥以退熱但用芍藥退熱之力恆不足即以防黃耆服後能助熱也黃耆天花粉等分並用其涼熱之力相敵若兼用之助芍藥清熱分量又宜多用若遇乾嘔過甚者又宜加半夏以治其嘔惟此時藥房所鬻之半夏多制以礬雖清半夏亦有礬若用以止嘔必須用微溫之水淘淨礬味用之方效愚治桂枝湯證又有屢用屢效之便方較用桂枝湯殊為省事方用生懷山藥細末兩半或一兩涼水調和煮成稀粥一碗加白糖令適口以之送服西藥阿斯匹林一瓦得汗即愈桂枝湯證之出汗不過間有出汗之時非時時皆出汗也故必用藥再發其汗始能將外感之風邪逐出然風邪去後又慮其自汗之病不愈故方中山藥與阿斯匹林並用一發汗一止汗也至於發汗與止汗之藥並用而藥力兩不相妨者此中原有深義蓋藥性之入人臟腑其流行之遲速原迥異阿斯匹林之性其發汗最速而山藥止汗之力則奏效稍遲是以二藥雖一時並用而其藥力之行則一先一後分毫不相妨礙也太陽病麻黃湯證傷寒論原治傷寒之書而首論中風者因中風亦可名為傷寒也難經曰傷寒有五有中風有傷寒有濕溫有熱病有溫病然究與真傷寒不同蓋中風病輕傷寒病重為其重也而治之者必須用大有力之藥始能勝任所謂大有力者即傷寒論中之麻黃湯是也今試論麻黃湯證及麻黃湯制方之義並詳論用麻黃湯時通變化裁之法傷寒論原文太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒又原文太陽病頭疼發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之脈象陰陽俱緊實為傷寒之確徵然緊脈之狀最難形容惟深明其病理自不難想象而得脈生於心心一動而外輸其血周身之脈即一動動則如波浪之有起伏以理言之凡脈之力大者其起伏之勢自應愈大至緊脈其跳動若有力而轉若無所起伏究其所以然之故實因太陽為外衛之陽因為寒所襲逼之內陷與脈相併則脈得太陽蘊蓄之熱原當起伏有力以成反應之勢而寒氣緊縮之力又復逼壓其脈道使不能起伏是以指下診之似甚有力而竟直穿而過且因其不得起伏蓄極而有左右彈之勢此緊脈真象也至麻黃湯證全體作疼痛者以筋骨不禁寒氣之緊縮也鐵條經嚴寒則縮短寒氣緊縮之力可知其發熱者身中之元陽為寒氣閉塞不能宣散而增熱也其無汗惡風者汗為寒閉內蘊之熱原欲借汗透出是以惡風也其作喘者因手太陰肺經與衛共主皮毛寒氣由皮毛入肺閉其肺中氣管是以不納氣而作喘然深究其作喘之由猶不但此也人之胸中亦太陽之部位也其中間所積大氣原與外表之衛氣息息相通然大氣即宗氣靈樞謂宗氣積於胸中出於喉嚨以貫心脈而行呼吸夫大氣既能以貫心脈是營血之中亦大氣所流通也傷寒之證其營衛皆為外寒所束則大氣內郁必膨脹而上逆沖肺此又喘之所由來也麻黃湯方麻黃三兩桂枝三兩去皮甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去渣溫服八合一升十合復取微似汗不須啜粥余如桂枝法將息麻黃髮汗力甚猛烈先煮之去其浮沫因其沫中含有發表之猛力去之所以緩麻黃髮表之性也麻黃不但善於發汗且善利小便外感之在太陽者間有由經入府而留連不去者凡太陽病多日不解者皆是由經入府以麻黃髮其汗則外感之在經者可解以麻黃利其小便則外感之由經入府者亦可分消也且麻黃又兼入手太陰能瀉肺定喘俾外感之由皮毛竄入肺者肺主皮毛亦清肅無遺是以發太陽之汗者不但麻黃而仲景定此方時獨取麻黃也桂枝味辛性溫亦具有發表之力而其所發表者惟在肌肉之間故善托肌肉中之寒外出且神農本草經謂其主上氣咳逆吐吸吸氣甫入即吐出是桂枝不但能佐麻黃髮表兼能佐麻黃入肺定喘也杏仁味苦性溫神農本草經亦謂其主咳逆上氣是亦能佐麻黃定喘可知而其苦降之性又善通小便能佐麻黃以除太陽病之留連於府者故又加之以為佐使也至於甘草之甘緩能緩麻黃髮汗之猛烈兼能解杏仁之小毒即以填補甘草屬土能填補出汗後之汗腺空虛也藥止四味面面俱到且又互相協助此誠非聖手莫辦也附用麻黃湯之變通法人之稟賦隨天地之氣化為轉移古今之氣化或有不同則今人與古人之稟賦其強弱厚薄偏陰偏陽之際不無差池是以古方用於今日正不妨因時制宜而為之變通加減也麻黃湯原用解其外寒服後遍體汗出惡寒既愈有其病從此遂愈者間有從此仍不愈後浸發熱而轉為陽明證者其故何也愚初為人診病時亦未解其故後乃知服麻黃湯汗出後其營衛內陷之熱若還表隨汗消散則其病即愈若其熱不復還表而內陷益深其熱必將日增此即太陽轉陽明之病也悟得此理後再用麻黃湯時必加知母數錢以解其內陷之熱主治傷寒無汗服後未有不愈者矣醫方篇中有麻黃加知母湯可參觀大青龍湯治傷寒無汗煩躁是胸中先有內熱無所發泄遂鬱而作煩躁故於解表藥中加石膏以清內熱然麻黃與石膏並用間有不汗之時若用麻黃加知母湯將知母重加數錢其寒潤之性入肺中化合而為汗隨麻黃以達於外而煩躁自除矣上所論者麻黃湯原宜加知母矣而間有不宜加者此又不得不斟酌也間有其人陽分虛者又當於麻黃湯中加補氣之藥以助之出汗一人年近四旬身體素羸弱於季冬得傷寒證醫者投以麻黃湯汗無分毫求為診治其脈似緊而不任重按遂於麻黃湯中加生黃耆天花粉各五錢一劑得汗而愈一人亦年近四旬初得外感經醫甫治愈即出門作事又重受外感內外俱覺寒涼頭疼氣息微喘周身微形寒戰診其脈六部皆無重按亦不見愚不禁駭然問其心中除覺寒涼外別無所苦知猶可治不至有意外之慮遂於麻黃湯原方中為加生黃耆一兩服藥後六脈皆出周身得微汗病遂愈一人年過三旬身形素羸弱又喜吸鴉片於冬令得傷寒證因粗通醫學自服麻黃湯分毫無汗求為診視脈甚微細無緊象遂即所用原方為加生黃耆五錢服後得汗而愈此二證皆用麻黃湯是不宜加知母宜加黃耆者也嘗治一少年於季冬得傷寒證其人陰分素虧脈近六至且甚弦細身冷惡寒舌苔淡白延醫診視醫者謂脈數而弱傷寒雖在初得恐不可用麻黃強發其汗此時愚應其近鄰之聘因邀愚至其家與所延之醫相商愚曰麻黃髮汗之力雖猛然少用則無妨再輔以補正之品自能穩妥奏功矣遂為疏方麻黃錢半桂枝尖一錢杏仁甘草各錢半又為加生懷山藥北沙參各六錢囑其煎湯服後若至兩點鐘不出汗宜服西藥阿斯匹林二分許以助其出汗後果如此服之周身得汗而愈矣曾治鄰村李姓少年得傷寒證已過旬日表證未罷時或惡寒頭猶微疼舌苔猶白心中微覺發熱小便色黃脈象浮弦重按似有力此熱入太陽之腑膀胱也投以麻黃湯為加知母八錢滑石六錢服後一汗而愈此證雖在太陽之表與腑實已連陽明矣故方中重用知母以清陽明之熱而仍用麻黃解其表俾其餘熱之未盡清者仍可由汗而消散此所以一汗而愈也至於傷寒論中載有其病重還太陽者仍宜以麻黃湯治之而愚遇此證若用麻黃湯時亦必重加知母也麻黃湯證有兼咽喉疼者宜將方中桂枝減半加天花粉六錢射干三錢若其咽喉疼而且腫者麻黃亦宜減半去桂枝再加生蒲黃三錢以消其腫然如此加減涼藥重而表藥輕若服後過點半鐘不出汗時亦服西藥阿斯匹林瓦許以助其汗若服後汗仍不出時宜阿斯匹林接續再服以汗出為目的若能遍體皆微見汗則咽喉之疼腫皆愈矣麻黃湯證若遇其人素有肺勞病者宜於原方中加生懷山藥天門冬各八錢麻黃湯證若遇其人素有吐血病者雖時已愈仍宜去桂枝以防風二錢代之吐血之證最忌桂枝再加生杭芍三錢按古之一兩約折為今之三錢且將一次所煎之湯分作三劑則一劑之中當有麻黃三錢然又宜因時因地因人細為斟酌不必定以三錢為準也如溫和之時汗易出少用麻黃即能出汗嚴寒之時汗難出必多用麻黃始能出汗此因時也又如大江以南之人其地氣候溫暖人之生於其地者其肌膚淺薄麻黃至一錢即可出汗故南方所出醫書有用麻黃不過一錢之語至黃河南北用麻黃約可以三錢為率至東三省人因生長於嚴寒之地其肌膚頗強厚須於三錢之外再將麻黃加重始能得汗此因地也至於地無論南北時無論寒燠凡其人之勞碌於風塵與長居屋中者其肌膚之厚薄強弱原自不同即其汗之易出不易出或宜多用麻黃或宜少用麻黃原不一致此因人也用古人之方者豈可膠柱鼓瑟哉太陽與陽明合病麻黃湯證傷寒論原文太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之太陽與陽明合病是太陽表證未罷而又兼陽明之熱也其喘者風寒由皮毛襲肺也其胸滿者胸中大氣因營衛閉塞不能宣通而生䐜脹也其言不可下者因陽明仍連太陽下之則成結胸且其胸本發滿成結胸尤易矧其陽明之熱僅在於經亦斷無可下之理故諄諄以不可下示戒也仍治以麻黃湯是開其太陽而使陽明初生之熱隨汗而解也證兼陽明而仍用麻黃湯主治在古人稟賦敦厚淡泊寡欲服之可以有效今人則稟賦薄弱嗜好日多強半陰虧若遇此等證時宜以薄荷代方中桂枝若其熱稍劇而大便實者又宜酌加生石膏宜生用不可煅用理詳白虎湯下數錢方能有效太陽溫病麻杏甘石湯證至於溫病在上古時原與中風傷寒統名之為傷寒是以秦越人難經有傷寒有五之説至仲景著傷寒論知溫病初得之治法原與中風傷寒皆不同故於太陽篇首即明分為三項而於溫病復詳細論之此仲景之醫學較上古有進步之處也傷寒論原文太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡息必鼾語言難出論溫病之開端亦冠以太陽病三字者因溫病亦必自太陽此是足太陽非手太陽彼謂溫病入手經不入足經者果何所據也入也然其化熱最速不過數小時即侵入陽明是以不覺惡寒轉發熱而渴也治之者不知其為溫病而誤以熱藥發之竟至汗出不解而轉增其灼熱則即此不受熱藥之發表可確定其名為風溫矣其脈陰陽俱浮者象風之飄揚也自汗出者熱隨浮脈外透也身重者身體經熱痠軟也多眠睡者精神經熱昏沉也語言難出者上焦有熱而舌腫脹也風溫之外又有濕溫病與伏氣化熱溫病而提綱中止論風溫者因濕溫及伏氣化熱之溫其病之起點亦恆為風所激發故皆可以風溫統之也提綱中論風溫之病狀詳矣而提綱之後未列治法後世以為憾事及反復詳細推之乃知傷寒論中原有治溫病之方特因全書散佚後經叔和編輯而錯簡在後耳嘗觀傷寒論第六十二節云發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草生石膏湯今取此節與溫病提綱對觀則此節之所謂發汗後即提綱之所謂若發汗也此節之所謂喘即提綱之所謂息必鼾也由口息而喘者由鼻息即鼾矣此節之所謂無大熱即提綱之所謂身灼熱也蓋其灼熱猶在外表心中仍無大熱也將此節之文與溫病提綱一一比較皆若合符節夫中風傷寒溫病特立三大提綱已並列於篇首至其後則於治中風治傷寒之方首仍加提綱以彼例此確知此節之文原為溫病之方另加提綱無疑即麻杏甘石湯為治溫病之方無疑也蓋當仲景時人之治溫病者猶混溫病於中風傷寒之中於病初得時未細審其發熱不惡寒而以溫熱之藥發之是以汗後不解或見其發熱不惡寒誤認為病已傳裡而竟以藥下之是以百六十三節又有下後不可更行桂枝湯云云所稍異者一在汗後一在下後仲景恐人見其汗出再誤認為桂枝證故切戒其不可更行桂枝湯而宜治以麻杏甘石湯蓋傷寒定例凡各經病證誤服他藥後其原病猶在者仍可投以正治之原方是以百零三節云凡柴胡湯病證而下之若柴胡證不罷者復與小柴胡湯以此例彼知麻杏甘石湯為救溫病誤治之方實即治溫病初得之主方而欲用此方於今日須將古方之分量稍有變通麻黃杏仁甘草石膏湯原方麻黃四兩去節杏仁五十個去皮尖甘草二兩石膏八兩碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去渣溫服一升方中之義用麻黃協杏仁以定喘伍以石膏以退熱熱退其汗自止也復加甘草者取其甘緩之性能調和麻黃石膏使其涼熱之力溶和無間以相助成功是以奏效甚捷也此方原治溫病之汗出無大熱者若其證非汗出且熱稍重者用此方時原宜因證為之變通是以愚用此方時石膏之分量恆為麻黃之十倍或麻黃一錢石膏一兩或麻黃錢半石膏兩半遇有不出汗者恐麻黃少用不致汗服藥後可服西藥阿斯匹林瓦許以助其汗若遇熱重者石膏又可多用曾治白喉證及爛喉痧證爛喉痧證必兼溫病白喉證亦多微兼外感麻黃用一錢石膏恆重至二兩喉證最忌麻黃而能多用石膏以輔弼之則不惟不忌轉能借麻黃之力立見奇功也至於肺病之起點恆有因感受風溫其風邪稽留肺中化熱鑠肺有時肺中作癢即連連喘嗽者亦宜投以此湯清其久蘊之風邪連服數劑其肺中不作癢嗽喘自能減輕再徐治以潤肺清火利痰之劑而肺病可除矣蓋此麻杏甘石湯之用處甚廣凡新受外感作喘嗽及頭疼齒疼兩腮腫疼其病因由於外感風熱者皆可用之惟方中藥品之分量宜因證變通耳附記林年近五旬因受風溫雖經醫治愈而肺中餘熱未清致肺陰鑠耗釀成肺病屢經醫治無效其脈一息五至浮沉皆有力自言喉連肺際若覺癢則咳嗽頓發劇時連嗽數十聲周身汗出必吐出若干稠痰其嗽始止問其心中常覺發熱大便燥甚四五日一行因悟其肺際作癢即頓發咳嗽者必其從前病時風邪由皮毛襲入肺中者至今猶未盡除也因其肺中風熱相助為虐宜以麻黃祛其風石膏清其熱遂為開麻杏甘石湯方麻黃用錢半生石膏用兩半杏仁三錢甘草二錢煎服一劑咳嗽頓愈診其脈仍有力又為開善後之方用生山藥一兩北沙參天花粉天冬各五錢川貝射干蘇子甘草各二錢囑其多服數劑肺病可從此除根後閲旬日林又求診視言先生去後余服所開善後方肺癢咳嗽仍然反復遂仍服第一次方至今已連服十劑心中熱已退仍分毫不覺藥涼肺癢咳嗽皆愈且飲食增加大便亦不甚乾燥聞其所言誠出愚意料之外也再診其脈已不數仍似有力遂將方中麻黃改用一錢石膏改用一兩杏仁改用二錢又加生懷山藥六錢俾煎湯接續服之若服之稍覺涼時即速停止後連服七八劑似稍覺涼遂停服肺病從此竟愈按治肺勞投以麻黃杏仁甘草石膏湯且用至二十餘劑竟將肺勞治愈未免令閲者生疑然此中固有精細之理由在也蓋肺病之所以難愈者為治之者但治其目前所現之證而不深究其病因也如此證原以外感受風成肺勞且其肺中作癢猶有風邪存留肺中且為日既久則為錮閉難出之風邪非麻黃不能開發其錮閉之深惟其性偏於熱於肺中蘊有實熱者不宜而重用生石膏以輔弼之既可解麻黃之熱更可清肺中久蘊之熱以治肺熱有風勞嗽者原為正治之方故服之立時見功至於此藥必久服始能拔除病根且久服麻黃石膏而無流弊者此中又有理由在蓋深入久錮之風邪非屢次發之不能透而伍以多量之石膏以為之反佐俾麻黃之力惟旋轉於肺臟之中不至直達於表而為汗此麻黃久服無弊之原因也至石膏性雖寒涼然其質重氣輕煎入湯劑毫無汁漿無汁漿即是無質其輕而且涼之氣盡隨麻黃髮表之力外出不復留中而傷脾胃此石膏久服無弊之原因也所遇之證非如此治法不愈用藥即不得不如此也太陽病大青龍湯證附脈微弱汗出惡風及筋惕肉瞤治法有太陽中風之脈兼見太陽傷寒之脈者大青龍湯所主之證是也傷寒論原文太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁大青龍湯主之若脈微弱汗出惡風者不可服服則厥逆筋惕肉瞤此為逆也大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁五十個去皮尖生薑三兩切大棗十二枚擘石膏如雞子大碎如雞子大當有今之三兩上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也此大青龍湯所主之證原系胸中先有蘊熱又為風寒錮其外表致其胸中之蘊熱有蓄極外越之勢而其錮閉之風寒而猶恐芍藥苦降酸斂之性似於發汗不宜而代以石膏且多用之以厚其力其辛散涼潤之性既能助麻桂達表又善化胸中蘊蓄之熱為汗隨麻桂透表而出也為有云騰致雨之象是以名為大青龍也至於脈微弱汗出惡風者原系胸中大氣虛損不能固攝衛氣即使有熱亦是虛陽外浮若誤投以大青龍湯人必至虛者益虛其人之元陽因氣分虛極而欲脫遂致肝風萌動而筋惕肉瞤也夫大青龍湯既不可用遇此證者自當另有治法擬用生黃耆生杭芍各五錢麻黃錢半煎湯一次服下此用麻黃以逐其外感黃耆以補其氣虛芍藥以清其虛熱也為方中有黃耆以補助氣分故麻黃仍可少用也若其人已誤服大青龍湯而大汗亡陽筋惕肉瞤者宜去方中麻黃加淨萸肉一兩傷寒論原文傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之細思此節之文知所言之證原系溫病而節首冠以傷寒二字者因中風溫病在本書之定例均可名為傷寒也凡外感之脈多浮以其多兼中風也前節言傷寒脈浮緊是所中者為凜冽之寒風是中風兼傷寒也後節言傷寒脈浮緩知所中者非凜冽之寒風當為柔和之溫風既中柔和之溫風則即成風溫矣是以病為傷寒必胸中煩躁而後可用石膏至溫病其胸中不煩躁亦恆可用石膏且其身不疼但重傷寒第六節溫病提綱中原明言身重此明徵也況其證乍有輕時若在傷寒必不復重用石膏惟溫病雖有輕時亦可重用石膏又傷寒初得有少陰證若溫病則始終無少陰證少陰證有寒有熱此言無少陰證指少陰之寒證而言少陰寒證斷不可用大青龍湯至少陰熱證原為伏氣化熱竄入少陰雖在初得亦可治以大青龍湯此又不可不知此尤不為傷寒而為溫病之明徵也由此觀之是此節原為治溫病者説法欲其急清燥熱以存真陰為先務也至愚用此方治溫病時恆以薄荷代方中桂枝尤為穩妥凡發汗所用之藥其或涼或熱貴與病適宜其初得病寒者宜用熱藥發其汗初得病熱者宜用涼藥發其汗如大青龍湯證若投以麻黃湯則以熱濟熱恆不能出汗即或出汗其病不惟不解轉益增煩躁惟於麻桂湯中去芍藥重加石膏多於麻桂數倍其涼潤輕散之性與胸中之煩躁化合自能作汗矧有麻黃之善透表者以助之故服後覆杯之頃即可周身得汗也曾治一人冬日得傷寒證胸中異常煩躁醫者不識為大青龍湯證竟投以麻黃湯服後分毫無汗胸中煩躁益甚自覺屋隘莫能容診其脈洪滑而浮治以大青龍湯為加天花粉八錢服後五分鐘周身汗出如洗病若失或問服桂枝湯者宜微似有汗不可令如水流漓病必不除服麻黃湯者復取微似汗知亦不可令汗如水流漓也今於大青龍湯中加花粉服湯後竟汗出如洗而病若失者何也答曰善哉問也此中原有妙理非此問莫能發之凡傷寒溫病皆忌傷其陰分桂枝湯證與麻黃湯證禁過發汗者恐傷其陰分也至大青龍湯證其胸中蘊有燥熱得重量之石膏則化合而為汗其燥熱愈深者化合之汗愈多非儘量透發於外其燥熱即不能徹底清肅是以此等汗不出則已出則如時雨沛然莫可遏抑蓋麻黃桂枝等湯皆用藥以祛病得微汗則藥力即能勝病是以無事過汗以傷陰分至大青龍湯乃合麻桂為一方又去芍藥之酸收益以石膏之辛涼其與胸中所蘊之燥熱化合猶如冶紅之鐵沃之以水其熱氣自然蓬勃四達此乃調燮其陰陽聽其自汗此中精微之理與服桂枝麻黃兩湯不可過汗者迥不侔也或問大青龍湯證當病之初得何以胸中即蘊此大熱答曰此傷寒中伏氣化熱證也溫病中有伏氣化熱傷寒中亦有伏氣化熱因從前所受外寒甚輕不能遽病惟伏藏於三焦脂膜之中阻塞升降之氣化久而化熱後又因薄受外感之激動其熱陡發竄入胸中空曠之府不汗出而煩躁夫胸中原為太陽之府為其猶在太陽是以其熱雖甚而仍可汗解也太陽病小青龍湯證傷寒論原文傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之水散為氣氣可復凝為水心下不曰停水而曰有水氣此乃飲水所化之留飲形雖似水而有黏滯之性又與外感互相膠漆是以有以下種種諸病也乾嘔者水氣黏滯於胃口也發熱者水氣變為寒飲迫心肺之陽外越也咳者水氣浸入肺中也渴者水氣不能化津液上潮也利者水氣溜入大腸作瀉也噎者水氣變為寒痰梗塞咽喉也小便不利少腹滿者水氣凝結膨脹於下焦也喘者肺中分支細管皆為水氣所瀰漫也小青龍湯原方麻黃三兩去節桂枝三兩去皮芍藥三兩五味子半升乾薑三兩切甘草三兩炙細辛三兩半夏半升湯洗上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升若微利者去麻黃加蕘花如雞子大熬炒也令赤色若渴者去半夏加栝蔞根三兩若噎者去麻黃加附子一枚炮若小便不利少腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁半升按蕘花近時無用者醫宗金鑑注謂系芫花之類攻水之力甚峻用五分可令人下數十次當以茯苓代之又噎字注疏家多以厄逆解之字典中原有此講法然觀其去麻黃加附子似按寒痰凝結梗塞咽喉解法方與所加之藥相宜後世所用小青龍湯分量麻黃二錢桂枝尖二錢芍藥三錢五味子錢半乾薑一錢甘草錢半細辛一錢半夏二錢煎一盅作一次服小青龍湯所兼主諸病喘居其末而後世治外感痰喘者實以小青龍湯為主方是小青龍湯為外感中治痰飲之劑實為理肺之劑也肺主呼吸其呼吸之機關在於肺葉之闟闢其闟闢之機自如喘病自愈是以陳修園謂小青龍湯當以五味乾薑細辛為主藥蓋五味子以司肺之闟乾薑以司肺之闢細辛以發動其闟闢活潑之機故小青龍湯中諸藥皆可加減獨此三味不可加減按陳氏此論甚當至其謂細辛能發動闟闢活潑之靈機此中原有妙理蓋細辛人皆知為足少陰之藥故傷寒少陰證多用之然其性實能引足少陰與手少陰相交是以少陰傷寒心腎不交而煩躁者宜用之又能引諸藥之力上達於腦是以陰寒頭疼者必用之且其含有龍腦氣味能透發神經使之靈活自能發動肺葉闟闢之機使靈活也鄒潤安謂凡風氣寒氣依於精血津液便溺涕唾以為患者並能曳而出之使相離而不相附審斯則小青龍湯中之用細辛亦所以除水氣中之風寒也仲景之方用五味即用乾薑誠以外感之證皆忌五味而兼痰嗽者尤忌之以其酸斂之力甚大能將外感之邪錮閉肺中永成勞嗽惟濟之以乾薑至辛之味則無礙誠以五行之理辛能勝酸內經有明文也徐氏本草百種注中論之甚詳而愚近時臨證品驗則另有心得蓋五味之皮雖酸其仁則含有辛味以仁之辛濟皮之酸自不至因過酸生弊是以愚治勞嗽恆將五味搗碎入煎少佐以射干牛蒡諸藥即能奏效不必定佐以乾薑也特是醫家治外感痰喘喜用麻黃而以小青龍湯治外感之喘轉去麻黃加杏仁恆令用者生疑近見有彰明登諸醫報而議其非者以為既減去麻黃將恃何者以治外感之喘乎不知神農本草經謂桂枝主上氣咳逆吐吸是桂枝原能降氣定喘也誠以喘雖由於外感亦恆兼因元氣虛損不能固攝麻黃雖能定喘其得力處在於瀉肺恐於元氣素虛者不宜是以不取麻黃之瀉肺但取桂枝之降肺更加杏仁能降肺兼能利痰祛邪之品以為之輔佐是以能穩重建功也愚初為人診病時亦不知用也猶憶歲在乙酉鄰村李三十餘得外感痰喘證求為診治其人體豐素有痰飲偶因感冒風寒遂致喘促不休表裡俱無大熱而精神不振略一合目即昏昏如睡胸膈又似滿悶不能飲食舌苔白膩其脈滑而濡至數如常投以散風清火利痰之劑數次無效繼延他醫數人診治皆無效遷延日久勢漸危險復商治於愚愚諗一老醫皮年近八旬隱居渤海之濱為之介紹延至診視畢曰此易治小青龍湯證也遂開小青龍湯原方加杏仁三錢仍用麻黃一錢一劑喘定繼用苓桂朮甘湯加天冬厚朴服兩劑全愈愚從此知小青龍湯之神妙自咎看書未到遂廣閲傷寒論諸家注疏至喻嘉言尚論篇論小青龍湯處不覺狂喜起舞因嘆曰使愚早見此名論何至不知用小青龍湯也從此以後凡遇外感喘證可治以小青龍湯者莫不投以小青龍湯而臨證細心品驗知外感痰喘之挾熱者其肺必脹當仿金匱用小青龍湯之加石膏且必重加生石膏方效逮至癸巳李又患外感痰喘復求愚為診治其證脈大略如前而較前熱盛投以小青龍湯去麻黃加杏仁三錢為其有熱又加生石膏一兩服後其喘立止藥力歇後而喘仍如故連服兩劑皆然此時皮姓老醫已沒無人可以質正愚方竭力籌思將為變通其方其嶽家滄州為送醫至愚即告退後經醫數人皆延自遠方服藥月餘竟至不起愚因反復研究此證非不可治特用藥未能吻合是以服藥終不見效徐靈胎謂龍骨之性斂正氣而不斂邪氣故傷寒論方中仲景於邪氣未盡者亦用之外感喘證服小青龍湯愈而仍反復者正氣之不斂也遂預擬一方用龍骨牡蠣皆不煅各一兩以斂正氣蘇子清半夏各五錢以降氣利痰名之曰從龍湯謂可用於小青龍湯之後平均小青龍湯之藥性當以熱論而外感痰喘之證又有熱者十之八九是以愚用小青龍湯三十餘年未嘗一次不加生石膏即所遇之證分毫不覺熱亦必加生石膏五六錢使藥性之涼熱歸於平均若遇證之覺熱或脈象有熱者則必加生石膏兩許或一兩強若因其脈虛用人參於湯中者即其脈分毫無熱亦必加生石膏兩許以輔之始能受人參溫補之力至其證之或兼煩躁或表裡壯熱者又宜加生石膏至兩半或至二兩方能奏效蓋如此多用石膏不惟治外感之熱且以解方中藥性之熱也為有石膏以監製麻黃若遇脈之實者仍宜用麻黃一錢試舉一案以徵明之堂姊丈褚體豐氣虛素多痰飲薄受外感即大喘不止醫治無效旬日喘始愈偶與愚言及若甚恐懼愚曰此甚易治顧用藥何如耳金匱小青龍加石膏湯為治外感痰喘之神方輔以拙擬從龍湯則其功愈顯若後再喘時先服小青龍湯加石膏若一劑喘定繼服從龍湯一兩劑其喘必不反復若一劑喘未定小青龍加石膏湯可服至兩三劑若猶未全愈繼服從龍湯一兩劑必能全愈若服小青龍加石膏湯喘止旋又反復再服不效者繼服從龍湯一兩劑必效遂録兩方贈之褚甚欣喜如獲異珍後用小青龍湯時畏石膏不敢多加雖效實無捷效偶因外感較重喘劇連服小青龍兩劑每劑加生石膏三錢喘不止而轉增煩躁急迎為診視其脈浮沉皆有力遂即原方加生石膏一兩煎湯服後其喘立止煩躁亦愈繼又服從龍湯兩劑以善其後按小青龍湯以驅邪為主從龍湯以斂正為主至斂正之藥惟重用龍骨牡蠣以其但斂正氣而不斂邪氣也觀傷寒論中仲景用龍骨牡蠣之方可知又加半夏牛蒡以利痰蘇子以降氣芍藥清熱兼利小便以為餘邪之出路故先服小青龍湯病減去十之八九即可急服從龍湯以收十全之功也寒溫中皆有痰喘之證其劇者甚為危險醫者自出私智治之皆不能效惟治以小青龍湯或治以小青龍加石膏湯則可隨手奏效然寒溫之證兼喘者甚多而有有痰無痰與虛實輕重之分又不必定用小青龍湯也今即愚所經驗者縷析條分臚列於下以備治外感作喘者之採用一氣逆迫促喘且呻或兼肩息者宜小青龍湯減麻黃之半加杏仁熱者加生石膏二喘狀如前而脈象無力者宜小青龍湯去麻黃加杏仁再加人參生石膏若其脈虛而兼數者宜再加知母三喘不至呻亦不肩息唯吸難呼易苦上氣其脈虛而無力或兼數者宜拙擬滋陰清燥湯四喘不甚劇呼吸無聲其脈實而至數不數者宜小青龍湯原方加生石膏若脈數者宜減麻黃之半加生石膏知母五喘不甚劇脈洪滑而浮舌苔白厚胸中煩熱者宜拙擬寒解湯服後自然汗出其喘即愈六喘不甚劇脈象滑實舌苔白厚或微兼黃者宜白虎湯少加薄荷葉七喘而發熱脈象洪滑而實舌苔白或兼黃者宜白虎湯加栝蔞仁八喘而發熱其脈象確有實熱至數兼數重按無力者宜白虎加人參再加川貝蘇子若虛甚者宜以生山藥代粳米九喘而結胸者宜酌其輕重用傷寒論中諸陷胸湯丸或拙擬蕩胸湯以開其結其喘自愈十喘而煩躁胸中滿悶不至結胸者宜越婢加半夏湯再加栝蔞仁若在暑熱之時宜以薄荷葉代方中麻黃至於麻黃湯證恆兼有微喘者服麻黃湯原方即愈業醫者大抵皆知似無庸愚之贅言然服藥後喘雖能愈不能必其不傳陽明惟於方中加知母數錢則喘愈而病亦必愈若遇脈象虛者用小青龍湯及從龍湯時皆宜加參又宜酌加天冬以調解參性之熱然如此佐以人參天冬仍有不足恃之時曾治一人年近六旬痰喘甚劇脈則浮弱不堪重按其心中則頗覺煩躁投以小青龍湯去麻黃加杏仁又加生石膏一兩野臺參四錢天冬六錢俾煎湯一次服下然仍恐其脈虛不能勝藥預購生杭萸肉藥房中之山萸肉多用酒拌蒸熟令色黑其酸斂之性大減殊非所宜三兩以備不時之需乃將藥煎服後氣息頓平閲三點鐘忽肢體顫動遍身出汗又似作喘實則無氣以息心怔忡莫支診其脈如水上浮麻莫辨至數急將所備之萸肉急火煎數沸服下汗止精神稍定又添水煮透取濃湯一大盅服下脈遂復常怔忡喘息皆愈繼於從龍湯中加萸肉一兩野臺參三錢天冬六錢煎服兩劑痰喘不再反復按此證為元氣將脫有危在頃刻之勢重用山萸肉即可隨手奏效者因人之臟腑惟肝主疏泄人之元氣將脫者恆因肝臟疏泄太過重用萸肉以收斂之則其疏泄之機關可使之頓停即元氣可以不脫此愚從臨證實驗而得知山萸肉救脫之力十倍於參耆也因屢次重用之以挽回人命於頃刻之間因名之為回生山茱萸湯其人若素有肺病常咳血者用小青龍湯時又當另有加減宜去桂枝留麻黃又宜於加杏仁石膏之外再酌加天冬數錢蓋咳血及吐衄之證最忌桂枝而不甚忌麻黃以桂枝能助血分之熱也憶歲在癸卯近族舅母劉媼年過五旬曾於初春感受風寒愚為診視疏方中有桂枝服後一汗而愈因其方服之有效恐其或失黏於壁上以俟再用至暮春又感受風溫遂取其方自購藥服之服後遂至吐血治以涼血降胃之藥連服數劑始愈太陽病旋覆花代赭石湯證心下停有水氣可作乾嘔咳喘然水氣仍屬無形不至於痞硬也乃至傷寒或因汗吐下傷其中焦正氣致沖氣肝氣皆因中氣虛損而上干迫搏於心下作痞硬且其外呼之氣必噫而後出者則非小青龍湯所能治矣而必須治以旋覆花代赭石湯傷寒論原文傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之旋覆代赫石湯方旋覆花三兩人參二兩生薑五兩切代赭石一兩大棗十二枚擘甘草三兩炙半夏半升洗上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服人之胃氣其最重之責任在傳送飲食故以息息下行為順乃此證因汗吐下傷其胃氣則胃氣不能下行或更轉而上逆下焦之衝脈為奇經八脈之一原上隸陽明因胃氣上逆遂至引動沖氣上衝更助胃氣上逆且平時肝氣原能助胃消食至此亦隨之上逆團結於心下痞而且硬阻塞呼吸之氣不能上達以致噫氣不除噫氣者強呼其氣外出之聲也此中原有痰涎與氣相凝滯故用旋覆花之逐痰水除脅滿者降胃兼以平肝又輔以赭石半夏降胃即以鎮沖更伍以人參甘草大棗生薑以補助胃氣之虛與平肝降胃鎮沖之品相助為理奏功自易易也赭石最善平肝降胃鎮沖在此方中當得健將而只用一兩折為今之三錢三分之則一劑中只有一錢如此輕用必不能見效是以愚用此方時輕用則六錢重用則一兩蓋如此多用不但取其能助旋覆半夏以平肝降胃鎮沖也且能助人參以輔助正氣蓋人參雖善補氣而實則性兼升浮惟借赭石之重墜以化其升浮則人參補益之力下行可至湧泉非然者但知用人參以補氣而其升浮之性轉能補助逆氣而分毫不能補助正氣是用之不如不用也是以愚從屢次經驗以來知此方中之赭石即少用亦當為人參之三倍也旋覆花神農本草經謂其味鹹主結氣脅下滿驚悸除水為其味鹹有似朴硝故有軟堅下行之功是以有以上種種之功效敝邑鹽山武帝臺汙所産旋覆花其味鹹而且辛用以平肝降胃開痰利氣誠有殊效王姓童子十二三歲於晨起忽左半身手足不遂知其為痰瘀經絡致氣血不能流通也時蓄有自制半夏若干及所採武帝臺旋覆花若干先與以自制半夏俾為末徐徐服之服盡六兩病愈弱半繼與以武帝臺旋覆花俾其每用二錢半煎湯服之日兩次旬日全愈蓋因其味鹹而兼辛則其利痰開瘀之力當益大是以用之有捷效也夫咸而兼辛之旋覆花原為罕有之佳品至其味微咸而不甚苦者藥房中容或有之用之亦可奏效若並此種旋覆花亦無之用此方時宜將方中旋覆花減半多加赭石數錢如此變通其方亦權可奏效也或問人之呼吸惟在肺中旋覆代赭石湯證其痞硬在於心下何以妨礙呼吸至噫氣不除乎答曰肺者發動呼吸之機關也至呼吸氣之所及非僅在於肺也是以肺管有分支下連於心再下則透膈連於肝再下則由肝連於包腎之脂膜以通於胞室胞室男女皆有是以女子妊子其臍帶連於胞室而竟能母呼子亦呼母吸子亦吸斯非氣能下達之明徵乎由斯知心下痞硬所阻之氣雖為呼吸之氣實自肺管分支下達之氣也太陽病大陷胸湯證又有痰氣之凝結不在心下而在胸中者其凝結之痰氣填滿於胸膈至窒塞其肺中之呼吸幾至停止者此為結胸之險證原非尋常藥餌所能療治傷寒論原文太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之脈浮熱猶在表原當用辛涼之藥發汗以解其表乃誤認為熱已入里而以藥下之其胸中大氣因下而虛則外表之風熱即乘虛而入與上焦痰水互相凝結於胸膺之間以填塞其空曠之府是以成結胸之證不但覺胸中滿悶異常即肺中呼吸亦覺大有滯礙其提綱中既言其脈數則為熱而又言數則為虛者蓋人陰分不虛者總有外感之熱其脈未必即數今其熱猶在表脈之至數已數故又因其脈數而斷其為虛也至於因結胸而脈變為遲者非因下後熱變為涼也蓋人之臟腑中有實在瘀積阻塞氣化之流通者其脈恆現遲象是以大承氣湯證其脈亦遲也膈內拒痛者胸中大氣與痰水凝結之氣互相撑脹而作痛按之則其痛益甚是以拒按也胃中空虛客氣動膈者因下後胃氣傷損氣化不能息息下行胃氣所以傳送飲食故以息息下行為順而與胃相連之衝脈衝脈之上源與胃相連其氣遂易於上干至鼓動膈膜而轉排擠呼吸之氣使不得上升是以短氣也煩躁者因表熱內陷於胸中擾亂其心君之火故煩躁也懊憹者上干之氣欲透膈而外越故懊憹也大陷胸湯方大黃六兩去皮芒硝一升甘遂一錢匕為末上三味以水六升先煮大黃取二升去渣納芒硝煮一兩沸納甘遂末溫服一升得快利止後服所謂一錢匕者俾匕首作扁方形將藥末積滿其上重可至一錢耳結胸之證雖填塞於胸中異常滿悶然純為外感之風熱內陷與胸中素蓄之水飲結成縱有客氣上干至於動膈然仍阻於膈而未能上達是以若枳實厚朴一切開氣之藥皆無須用惟重用大黃芒硝以開痰而清熱又慮大黃芒硝之力雖猛或難奏效於頃刻故又少佐以甘遂其性以攻決為用異常迅速與大黃芒硝化合為方立能清肅其空曠之府使毫無障礙制此方者乃霹靂手段也甘遂之性神農本草經原謂其有毒憶愚初學醫時曾遍嘗諸藥以求其實際一日清晨嚼服生甘遂一錢閲一點鐘未覺瞑眩忽作水瀉連連下行近十次至巳時吃飯如常飯後又瀉數次所吃之飯皆瀉出由此悟得利痰之藥當推甘遂為第一後以治痰迷心竅之瘋狂恆恃之成功其極量可至一錢強然非其脈大實不敢輕投為其性至猛烈是以大陷胸湯中所用之甘遂折為今之分量一次所服者只一分五釐而能導引大黃芒硝直透結胸病之中堅俾大黃芒硝得施其藥力於瞬息之頃此乃以之為嚮導少用即可成功原無須乎多也甘遂之性原宜作丸散若入湯劑下咽即吐出是以大陷胸湯方必將藥煎成而後納甘遂之末於其中也甘遂之性初服之恆可不作嘔吐如連日服即易作嘔吐若此方服初次病未盡除而需再服者宜加生赭石細末二錢用此湯藥送服即可不作嘔吐用大陷胸湯治結胸原有捷效後世治結胸證敢用此方者實百中無二三一畏方中甘遂有毒一疑提綱論脈處原明言數則為虛恐不堪此猛烈之劑夫人之畏其方不敢用者愚實難以相強然其方固可通變也傷寒論大陷胸湯之前原有大陷胸丸方系大黃半斤葶藶半升熬杏仁半升去皮尖熬黑芒硝半升上四味搗篩二味次納杏仁芒硝研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之此方所主之證與大陷胸湯同因其兼有頸強如柔痙狀故於大陷胸湯中加葶藶杏仁和以白蜜連渣煮服因其病上連頸欲藥力緩緩下行也今欲於大陷胸湯中減去甘遂可將大陷胸丸中之葶藶及前治噫氣不除方中之赭石各用數錢加於大陷胸湯中則甘遂不用亦可奏效夫赭石饒有重墜之力前已論之至葶藶則味苦善降性近甘遂而無毒藥力之猛烈亦遠遜於甘遂其苦降之性能排逐溢於肺中之痰水使之迅速下行故可與赭石共用以代甘遂也至大陷胸湯如此加減用者若猶畏其力猛愚又有自擬之方以代之即醫方篇之蕩胸湯是也此蕩胸湯方不但無甘遂並無大黃用以代大陷胸湯莫不隨手奏效故敢筆之於書以公諸醫界也太陽病小陷胸湯證附白散方傷寒論大陷胸湯後又有小陷胸湯以治結胸之輕者蓋其證既輕治之之方亦宜輕矣傷寒論原文小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之按心下之處注疏家有謂在膈上者有謂在膈下者以理推之實以膈上為對蓋膈上為太陽部位膈下則非太陽部位且小結胸之前百三十九節謂太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之觀此大陷胸湯所主之病亦有從下之文則知心上仍屬胸中無疑義也小陷胸湯方黃連一兩半夏半升湯洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去渣納諸藥煮取二升去渣分溫三服此證乃心君之火熾盛鑠耗心下水飲結為熱痰脈現滑象是以知為熱痰若但有痰而不熱當現為濡象矣而表陽又隨風內陷與之互相膠漆停滯於心下為痞滿以杜塞心下經絡俾不流通是以按之作痛也為其病因由於心火熾盛故用黃連以寧熄心火兼以解火熱之團結又佐以半夏開痰兼能降氣栝蔞滌痰兼以清熱其藥力雖遠遜於大陷胸湯而以分消心下之痞塞自能勝任有餘也然用此方者須將栝蔞細切連其仁皆切碎方能將藥力煎出此證若但痰飲痞結於心下而脈無滑熱之象者可治以拙擬蕩胸湯惟其藥劑宜斟酌減輕耳小結胸之外又有寒實結胸與小結胸之因於熱者迥然各異其治法自當另商傷寒論謂宜治以三物小陷胸湯又謂白散亦可服三物小陷胸湯傷寒論中未載注疏家或疑即小陷胸湯謂系從治之法不知所謂從治者如純以熱治涼恐其格拒不受而於純熱之中少用些些涼藥為之作引也若純以涼治涼是猶冰上積冰其凝結不益堅乎由斯知治寒實結胸小陷胸湯斷不可服而白散可用也爰録其方於下白散方桔梗三分巴豆一分去皮心熬黑研如脂貝母三分上三味為散納巴豆更於臼中杵之以白飲和服強人半錢匕羸者減半病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯按方中幾分之分當讀為去聲原無分量多少如方中桔梗貝母各三分巴豆一分即桔梗貝母之分量皆比巴豆之分量多兩倍而巴豆僅得桔梗及貝母之分量三分之一也巴豆味辛性熱以攻下為用善開冷積是以寒實結胸當以此為主藥而佐以桔梗貝母者因枯梗不但能載諸藥之力上行且善開通肺中諸氣管使呼吸通暢也至貝母為治嗽要藥而實善開胸膺之間痰氣鬱結至巴豆必炒黑而後用者因巴豆性至猛烈炒至色黑可減其猛烈之性然猶不敢多用所謂半錢匕者乃三藥共和之分量折為今之分量為一分五釐其中巴豆之分量僅二釐強身形羸弱者又宜少用可謂慎之又慎也白散方中桔梗貝母其分量之多少無甚關係至巴豆為方中主藥所用僅二釐強縱是藥力猛烈亦難奏效此蓋其分量傳寫有誤也愚曾遇有寒實結胸但用巴豆治愈一案爰詳細録出以徵明之一人年近三旬胸中素多痰飲平時呼吸其喉間恆有痰聲時當孟春上旬冒寒外出受涼太過急急還家即臥床上歇息移時呼之吃飯不應視之有似昏睡呼吸之間痰聲漉漉手搖之使醒張目不能言自以手摩胸際呼吸大有窒礙延醫治之以為痰厥概治以痰厥諸方皆無效及愚視之撫其四肢冰冷其脈沉細欲無因曉其家人曰此寒實結胸證非用傷寒論白散不可遂急購巴豆去皮及心炒黑搗爛紙裹數層壓去其油藥房中名為巴豆霜恐藥房制不如法故自制之稱準一分五釐開水送下移時胸中有開通之聲呼吸頓形順利可作哼聲進米湯半碗翌晨又服一劑大便通下病大輕減脈象已起四肢已溫可以發言至言從前精神昏憒似無知覺此時覺胸中似滿悶遂又為開乾薑桂枝尖人參厚朴諸藥為一方俾多服數劑以善其後如畏巴豆之猛烈不敢輕用愚又有變通之法試再舉一案以明之一婦人年近四旬素患寒飲平素喜服乾薑桂枝等藥時當嚴冬因在冷屋察點屋中傢俱為時甚久忽昏僕於地舁諸床上自猶能言謂適才覺涼氣上衝遂至昏僕今則覺呼吸十分努力氣息始通當速用藥救我言際忽又昏憒氣息幾斷時愚正在其村為他家治病急求為診視其脈微細若無不足四至詢知其素日稟賦及此次得病之由知其為寒實結胸無疑取藥無及急用胡椒辛熱之品能開寒結三錢搗碎煎兩三沸徐徐灌下頓覺呼吸順利不再昏厥遂又為疏方乾薑生懷山藥各六錢白朮當歸各四錢桂枝尖半夏甘草各三錢厚朴陳皮各二錢煎服兩劑病愈十之八九又即原方略為加減俾多服數劑以善其後太陽病大黃黃連瀉心湯證諸陷胸湯丸及白散之外又有瀉心湯數方雖曰瀉心實亦治胸中之病蓋陷胸諸方所治者胸中有形之痰水為病諸瀉心湯所治之病胸中無形之氣化為病也傷寒論原文心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去渣分溫再服人之上焦如霧上焦者膈上也所謂如霧者心陽能蒸騰上焦之濕氣作雲霧而化水緣三焦脂膜以下達於膀胱也乃今因外感之邪氣深陷胸中與心火蒸騰之氣摶結於心下而作痞故用黃連以瀉心火用大黃以除內陷之外邪則心下之痞者開自能還其上焦如霧之常矣至於大黃黃連不用湯煮而俱以麻沸湯漬之者是但取其清輕之氣以治上不欲取其重濁之汁以攻下也太陽病附子瀉心湯證附自擬變通方心下痞病有宜並涼熱之藥為一方而後能治愈者傷寒論附子瀉心湯所主之病是也試再詳論之傷寒論原文心下痞而復惡寒汗出者附子瀉心湯主之附子瀉心湯方大黃二兩黃連黃芩各一兩附子一枚炮去皮破別煮取汁上四味切前三味以麻沸湯二升漬之須臾絞去滓納附子汁分溫再服附子瀉心湯所主之病其心下之痞與大黃黃連瀉心湯所主之病同因其復惡寒且汗出知其外衛之陽不能固攝且知其陽分虛弱不能抗禦外寒也夫太陽之根底在於下焦水府故於前方中加附子以補助水府之元陽且以大黃黃連治上但漬以麻沸湯取其清輕之氣易於上行也以附子治下則煎取濃湯欲其重濁之汁易於下降也是以如此寒熱殊異之藥渾和為劑而服下熱不妨寒寒不妨熱分途施治同時奏功此不但用藥之妙具其精心即制方之妙亦幾令人不可思議也附子瀉心湯之方雖妙然為其大寒大熱並用醫者恆不敢輕試而愚對於此方原有變通之法似較平易易用其方無他即用黃耆以代附子也蓋太陽之府原有二一在膀胱一在胸中而胸中所積之大氣實與太陽外表之衛氣有息息密切之關係氣原屬陽胸中大氣一虛不但外衛之氣虛不能固攝其外衛之陽亦遂因之衰微而不能禦寒是以汗出而且惡寒也用黃耆以補助其胸中大氣則外衛之氣固而汗可不出即外衛之陽亦因之壯旺而不畏寒矣蓋用附子者所以補助太陽下焦之府用黃耆者所以補助太陽上焦之府二府之氣化原互相流通也爰審定其方於下以備採用大黃三錢黃連二錢生箭耆三錢前二味用麻沸湯漬取清湯多半盅後一味煮取濃湯少半盅渾和作一次溫服或問凡人臟腑有瘀恆忌服補藥因補之則所瘀者益錮閉也今此證既心下瘀而作痞何以復用黃耆以易附子乎答曰凡用藥開瘀將藥服下必其臟腑之氣化能運行其破藥之力始能奏效若但知重用破藥以破瘀恆有將其氣分破傷而瘀轉不開者是以人之有瘀者固忌服補氣之藥而補氣之藥若與開破之藥同用則補氣之藥轉能助開破之藥俾所瘀者速消太陽病炙甘草湯證陷胸瀉心諸方大抵皆治外感之實證乃有其證雖屬外感而其人內虧實甚者則傷寒論中炙甘草湯所主之證是也傷寒論原文傷寒脈結代心動悸炙甘草湯主之脈之跳動偶有止時其止無定數者為結言其脈結而不行是以中止也止有定數者曰代言其脈至此即少一跳動必需他脈代之也二脈雖皆為特別病脈然實有輕重之分蓋結脈止無定數不過其脈偶阻於氣血凝滯之處而有時一止是以為病猶輕至代脈則止有定數是臟腑中有一臟之氣內虧不能外達於脈之部位是以為病甚重也其心動悸者正其結代脈之所由來也炙甘草湯方甘草四兩炙生薑三兩切桂枝三兩去皮人參二兩生地黃一斤阿膠二兩麥門冬半升麻子仁半升大棗三十枚擘上九味以清酒七升水八升先煮八味取三升去滓納膠煬化消盡溫服一升日三服一名復脈湯炙甘草湯之用意甚深而注疏家則謂方中多用富有汁漿之藥為其心血虧少是以心中動悸以致脈象結代故重用富有汁漿之藥以滋補心血為此方中之宗旨不知如此以論此方則淺之乎視此方矣試觀方中諸藥惟生地黃即乾地黃重用一斤地黃原補腎藥也惟當時無熟地黃多用又恐其失於寒涼故煮之以酒七升水八升且酒水共十五升而煮之減去十二升是酒性原熱而又復久煮欲變生地黃之涼性為溫性者欲其溫補腎臟也蓋脈之跳動在心而脈之所以跳動有力者實賴腎氣上升與心氣相濟是以傷寒少陰病因腎為病傷遏抑腎中氣化不能上與心交無論其病為涼為熱而脈皆微弱無力是明徵也由斯觀之是炙甘草湯之用意原以補助腎中之氣化俾其壯旺上升與心中之氣化相濟救為要著也至其滋補心血則猶方中兼治之副作用也猶此方中所緩圖者也方中人參原能助心脈跳動實為方中要藥而只用二兩折為今之六錢再三分之一劑中只有人參二錢此恐分量有誤擬加倍為四錢則奏效當速也然人參必用黨參而不用遼參蓋遼參有熱性也脈象結代而兼有陽明實熱者但治以炙甘草湯恐難奏功宜借用白虎加人參湯以炙甘草湯中生地黃代方中知母生懷山藥代方中粳米曾治一叟年近六旬得傷寒證四五日間表裡大熱其脈象洪而不實現有代象舌苔白而微黃大便數日未行為疏方用生石膏三兩大生地一兩野臺參四錢生懷山藥六錢甘草三錢煎湯三盅分三次溫飲下將三次服完脈已不代熱退強半大便猶未通下遂即原方減去石膏五錢加天冬八錢仍如從前煎服病遂全愈炙甘草湯雖結代之脈並治然因結輕代重故其制方之時注重於代純用補藥至結脈恆有不宜純用補藥宜少加開通之藥始與病相宜者近曾在津治一錢姓壯年得傷寒證三四日間延為診視其脈象洪滑甚實或七八動一止或十餘動一止其止皆在左部詢其得病之由知系未病之前曾怒動肝火繼又出門感寒遂得斯病因此知其左脈之結乃肝氣之不舒也為疏方仍白虎加人參湯加減生石膏細末四兩知母八錢以生山藥代粳米用六錢野臺參四錢甘草三錢外加生萊蔔子四錢搗碎煎湯三盅分三次溫服下結脈雖除而脈象仍有餘熱遂即原方將石膏減去一兩人參萊蔔子各減一錢仍如前煎服其大便從前四日未通將藥三次服完後大便通下病遂全愈此次所用之方中不以生地黃代知母者因地黃之性與萊蔔子不相宜也愚治寒溫證不輕用降下之品其人雖熱入陽明之府若無大便燥硬欲下不下之實徵亦恆投以大劑白虎湯清其熱熱清大便恆自通下是以愚日日臨證白虎湯實為常用之品承氣湯恆終歲不一用也一叟年過六旬大便下血醫治三十餘日病益進日下血十餘次且多血塊精神昏憒延為診視其脈洪實異常至數不數惟右部有止時其止無定數乃結脈也其舌苔純黑知系外感大實之證從前醫者但知治其便血不知治其外感實熱可異也投以白虎加人參湯方中生石膏重用四兩為其下血日久又用生山藥一兩以代方中粳米取其能滋陰補腎兼能固元氣也煎湯三盅分三次溫服下每次送服廣三七細末一錢如此日服一劑兩日血止大便猶日行數次脈象之洪實大減而其結益甚且腹中覺脹詢其病因知得於惱怒之後遂改用生萊蔔子五錢而佐以白芍滑石天花粉甘草諸藥外用鮮白茅根切碎四兩煮三四沸取其湯以代水煎藥服一劑脹消脈之至數調勻毫無結象而仍然有力大便滑瀉已減半再投以拙擬滋陰清燥湯方系生懷山藥滑石各一兩生杭芍六錢甘草三錢一劑瀉止脈亦和平觀上所録二案知結脈現象未必皆屬內虧恆有因氣分不舒理其氣即可愈者又有脈非結代而若現雀啄之象者此亦氣分有所阻隔也曾治一少婦素日多病於孟春中旬得傷寒四五日表里俱壯熱其舌苔白而中心微黃毫無津液脈搏近六至重按有力或十餘動之後或二十餘動之後恆現有雀啄之象有如雀之啄粟恆連二三啄也其呼吸外出之時恆似有所齟齬而不能暢舒細問病因知其平日司家中出入帳目其姑察帳甚嚴未病之先因帳有差誤曾被責斥由此知其氣息不順及脈象之雀啄其原因皆由此也問其大便自病後未行遂仍治以前案錢姓方將生石膏減去一兩為其津液虧損為加天花粉八錢亦煎湯三盅分三次溫服下脈象已近和平至數調勻如常呼吸亦順惟大便猶未通下改用滋陰潤燥清火之品服兩劑大便通下全愈太陽病桃核承氣湯證以上所論傷寒太陽篇諸方雖不一致大抵皆治太陽在經之病者也至治太陽在府之病其方原無多而治太陽府病之至劇者則桃核承氣湯是也試再進而詳論之傷寒論原文太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解其外外解已但少腹急結者乃可攻之宜桃核承氣湯桃核承氣湯方桃仁五十個去皮尖桂枝二兩去皮大黃四兩去皮芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓納芒硝更上火微沸下火先食溫服五合日三服當微利此證乃外感之熱循三焦脂膜下降結於膀胱膀胱上與胞室之脂膜相連其熱上蒸以致胞室亦蘊有實熱血蓄而不行且其熱由任脈上竄擾亂神明是以其人如狂也然病機之變化無窮若其胞室之血蓄極而自下其熱即可隨血而下是以其病可愈若其血蓄不能自下且有欲下不下之勢此非攻之使下不可惟其外表未解或因下後而外感之熱復內陷故又宜先解其外表而後可攻下也大黃味苦氣香性涼原能開氣破血為攻下之品然無專入血分之藥以引之則其破血之力仍不專方中用桃仁者取其能引大黃之力專入血分以破血也徐靈胎云桃花得三月春和之氣以生而花色鮮明似血故凡血鬱血結之疾不能自調和暢達者桃仁能入其中而和之散之然其生血之功少而去瘀之功多者何也蓋桃核本非血類故不能有所補益若瘀血皆已敗之血非生氣不能流通桃之生氣在於仁而味苦又能開泄故能逐舊而不傷新也至方中又用桂枝者亦因其善引諸藥入血分且能引諸藥上行以清上焦血分之熱則神明自安而如狂者可愈也特是用桃核承氣湯時又須細加斟酌其人若素日少腹恆覺䐜脹至此因外感之激發而䐜脹益甚者當防其素有瘀血若誤用桃核承氣湯下之則所下者必紫色成塊之血其人血下之後十中難救一二若臨證至不得已必須用桃核承氣湯時須將此事説明以免病家之誤會也熱結膀胱之證不必皆纍及胞室蓄血也人有病在太陽旬余不解午前稍輕午後則肢體痠懶頭目昏沉身似灼熱轉畏寒涼舌苔純白小便赤澀者此但熱結膀胱而胞室未嘗蓄血也此當治以經府雙解之劑宜用鮮白茅根銼細二兩滑石一兩共煮五六沸取清湯一大盅送服西藥阿斯匹林瓦許周身得汗小便必然通利而太陽之表裡俱清矣太陽陽明合病桂枝加葛根湯證傷寒之傳經自太陽而陽明然二經之病恆互相連帶不能劃然分為兩界也是以太陽之病有兼陽明者此乃太陽入陽明之漸也桂枝加葛根湯所主之病是也傷寒論原文太陽病項背強𠘧𠘧音殳反汗出惡風者桂枝加葛根湯主之桂枝加葛根湯方桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘葛根四兩上六味以水七升納諸藥煮取三升去滓溫服一升不須啜粥余如桂枝法將息及禁忌太陽主皮毛陽明主肌肉人身之筋絡於肌肉之中為其熱在肌肉筋被熱鑠有拘攣之意有似短羽之鳥伸頸難於飛舉之狀故以𠘧𠘧者狀之也至葛根性善醒酒葛花尤良古有葛花醒酲湯其涼而能散可知且其能鼓胃中津液上潮以止消渴若用以治陽明之病是借陽明府中之氣化以逐陽明在經之邪也是以其奏效自易易也太陽陽明合病葛根湯證桂枝加葛根湯是治太陽兼陽明之有汗者至太陽兼陽明之無汗者傷寒論又另有治法其方即葛根湯傷寒論原文太陽病項背強𠘧𠘧無汗惡風者葛根湯主之葛根湯方葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑三兩切大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煎取三升去渣溫服一升復取微似汗不須啜粥余如桂枝湯法將息及禁忌陳古愚曰桂枝加葛根湯與此湯俱治太陽經腧之病太陽之經腧在背經云邪入於腧腰脊乃強師於二方皆云治項背𠘧𠘧𠘧𠘧者小鳥羽短欲飛不能飛而伸頸之象也但前方治汗出是邪從肌腠而入腧故主桂枝此方治無汗是邪從膚表而入腧故主麻黃然邪既入腧肌腠亦病方中取桂枝湯全方加葛根麻黃亦肌表兩解之治與桂枝二麻黃一湯同意而用卻不同微乎微乎陽明病葛根黃連黃芩湯證上所論二方皆治太陽與陽明合病之方也乃有其病原屬太陽誤治之後而又純屬陽明者葛根黃芩黃連湯所主之病是也傷寒論原文太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之葛根黃連黃芩湯方葛根半斤甘草二兩炙黃芩三兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去渣分溫再服促脈與結代之脈皆不同注疏諸家多謂脈動速時一止者曰促夫促脈雖多見於速脈之中而實非止也譬如人之行路行行且止少停一步復行是結代也又譬如人之奔馳急急速走路中偶遇不平足下恆因有所齟齬改其步武而仍然奔馳不止此促脈也是以促脈多見於速脈中也凡此等脈多因外感之熱內陷促其脈之跳動加速致脈管有所擁擠偶現此象名之為促若有人催促之使然也故方中重用芩連化其下陷之熱而即用葛根之清輕透表者引其化而欲散之熱盡達於外則表裡俱清矣且喘為肺病汗為心液下陷之熱既促脈之跳動改其常度復迫心肺之陽外越喘而且汗由斯知方中芩連不但取其能清外感內陷之熱並善清心肺之熱而汗喘自愈也況黃連性能厚腸又為治下利之要藥乎若服藥後又有餘熱利不止者宜治以拙擬滋陰宣解湯陸九芝曰溫熱之與傷寒所異者傷寒惡寒溫熱不惡寒耳惡寒為太陽主證不惡寒為陽明主證仲景於此分之最嚴惡寒而無汗用麻黃惡寒而有汗用桂枝不惡寒而有汗且惡熱者用葛根陽明之葛根即太陽之桂枝也所以達表也葛根黃連黃芩湯中之芩連即桂枝湯中之芍藥也所以安里也桂枝協麻黃治惡寒之傷寒葛根協芩連治不惡寒之溫熱其方為傷寒溫熱之分途任後人審其病之為寒為熱而分用之尤重在芩連之苦不獨可降可瀉且合苦以堅之之義堅毛竅可以止汗堅腸胃可以止利所以葛根黃芩黃連湯又有下利不止之治一方而表裡兼清此則藥借病用本不專為下利設也乃後人視此方若舍下利一證外更無他用者何也用此方為陽明溫熱發表之藥可為特識然葛根發表力甚微若遇證之無汗者當加薄荷葉三錢始能透表出汗試觀葛根湯治項背強𠘧𠘧無汗惡風者必佐以麻桂可知也當仲景時薄荷尚未入藥前曾論之究之清輕解肌之品最宜於陽明經病之發表且於溫病初得者不僅薄荷若連翹蟬蛻其性皆與薄荷相近而當仲景時於連翹止知用其根即連軺赤小豆湯中之連軺以利小便而猶不知用連翹以發表至於古人用蟬但知用蚱蟬是連其全身用之而不知用其退有皮以達皮之妙也蓋連翹若單用一兩能於十二小時中使周身不斷微汗若止用二三錢於有薄荷劑中亦可使薄荷發汗之力綿長至蟬蛻若單用三錢煎服分毫不覺有發表之力即可周身得微汗且與連翹又皆為清表溫疹之妙品以輔佐薄荷奏功故因論薄荷而連類及之附録後世用葛根黃芩黃連湯分量葛根四錢甘草一兩炙黃芩一錢五分黃連一錢五分不下利者去黃連加知母三錢無汗者加薄荷葉蟬蛻各錢半陽明病白虎湯證上所論有葛根諸方皆治陽明在經之病者也至陽明在府之病又當另議治法其治之主要自當以白虎湯為稱首也傷寒論原文傷寒脈浮滑此表有熱里有寒白虎湯主之此節載太陽篇此脈象浮而且滑夫滑則為熱入里矣乃滑而兼浮是其熱未盡入里半在陽明之府半在陽明之經也在經為表在府為里故曰表有熱里有寒內經謂熱病者皆傷寒之類也又謂人之傷於寒也則為病熱此所謂里有寒者蓋謂傷寒之熱邪已入里也陳氏之解原如斯愚則亦以為然至他注疏家有謂此寒熱二字宜上下互易當作外有寒里有熱者然其脈象既現浮滑其外表斷不至惡寒也有謂此寒字當系痰之誤因痰寒二音相近且脈滑亦為有痰之徵也然在寒溫其脈有滑象原主陽明之熱已實且足徵病者氣血素充治亦易愈若因其脈滑而以為有痰則白虎湯豈為治痰之劑乎傷寒論原文三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之此節載陽明篇證為三陽合病乃陽明外連太陽內連少陽也由此知三陽會合以陽明為中間三陽之病會合即以陽明之病為中堅也是以其主病之方仍為白虎湯勢若帥師以攻敵以全力搗其中堅而其餘者自瓦解傷寒論原文傷寒脈滑而厥者里有熱也白虎湯主之此節載厥陰篇脈滑者陽明之熱傳入厥陰也其脈滑而四肢厥逆者因肝主疏泄此證乃陽明傳來之熱鬱於肝中致肝失其所司而不能疏泄是以熱深厥亦深也治以白虎湯熱消而厥自回矣或問傷寒傳經之次第原自陽明而少陽三傳而後至厥陰今言陽明之熱傳入厥陰將勿與經旨有背謬乎答曰白虎湯原為治陽明實熱之正藥其證非陽明之實熱者仲景必不用白虎湯此蓋因陽明在經之熱不傳於府若入府則不他傳矣而傳於少陽由少陽而為腑臟之相傳如由太陽傳少陰即腑臟相傳傷寒論少陰篇麻黃附子細辛湯所主之病是也則肝中傳入陽明實熱矣究之此等證其左右兩關必皆現有實熱之象蓋此陽明在經之熱雖由少陽以入厥陰必仍有餘熱入於陽明之府俾其府亦蘊有實熱故可放膽投以白虎湯而於胃府無損也白虎湯方知母六兩石膏一斤打碎甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服方中重用石膏為主藥取其辛涼之性質重氣輕不但長於清熱且善排擠內蘊之熱息息自毛孔達出也用知母者取其涼潤滋陰之性既可佐石膏以退熱更可防陽明熱久者之耗真陰也用甘草者取其甘緩之性能逗留石膏之寒涼不至下趨也用粳米者取其汁漿濃郁能調石膏金石之藥使之與胃相宜也藥止四味而若此相助為理俾猛悍之劑歸於和平任人放膽用之以挽回人命於垂危之際真無尚之良方也何猶多畏之如虎而不敢輕用哉白虎湯方三見於傷寒論一在太陽篇治脈浮滑一在陽明篇治三陽合病自汗出者一在厥陰篇治脈滑而厥注家於陽明條下謂苟非自汗恐表邪抑塞亦不敢鹵莽而輕用白虎湯自此説出醫者遇白虎湯證恆因其不自汗出即不敢用此誤人不淺也蓋寒溫之證邪愈深入則愈險當其由表入里陽明之府漸實急投以大劑白虎湯皆可保完全無虞設當用而不用由胃實以至腸實而必須降下者已不敢保其完全無虞也況自汗出之文惟陽明篇有之而太陽篇但言脈浮滑厥陰篇但言脈滑而厥皆未言自汗出也由是知其脈但見滑象無論其滑而兼浮滑而兼厥皆可投以白虎湯經義昭然何醫者不知尊經而拘於注家之謬説也白虎湯所主之病分載於太陽陽明厥陰篇中惟陽明所載未言其脈象何如似令人有未愜意之處然即太陽篇之脈浮而滑及厥陰篇之脈滑而厥推之其脈當為洪滑無疑此當用白虎湯之正脈也故治傷寒者臨證時若見其脈象洪滑知其陽明之府熱已實放膽投以白虎湯必無差謬其人將藥服後或出涼汗而愈或不出汗其熱亦可暗消於無形若其脈為浮滑知其病猶連表於方中加薄荷葉一錢或加連翹蟬蛻各一錢服後須臾即可由汗解而愈其脈為滑而厥也知系厥陰肝氣不舒可用白茅根煮湯以之煎藥服後須臾厥回其病亦遂愈此愚生平經驗所得故敢確實言之以補古書所未備也近世用白虎湯者恆恪守吳氏四禁所謂四禁者即其所著溫病條辨白虎湯後所列禁用白虎湯之四條也然其四條之中顯有與經旨相反之兩條若必奉之為金科玉律則此救顛扶危挽回人命之良方幾將置之無用之地吳鞠通原文白虎本為達熱出表若其人脈浮弦而細者不可與也脈沉者不可與也不渴者不可與也汗不出者不可與也常須識此勿令誤也按前兩條之不可與原當禁用白虎湯矣至其第三條謂不渴者不可與也夫用白虎湯之定例渴者加人參其不渴者即服白虎湯原方無事加參可知矣吳氏以為不渴者不可與顯與經旨相背矣且果遵吳氏之言其人若渴即可與以白虎湯而亦無事加參矣不又顯與渴者加人參之經旨相背乎至其第四條謂汗不出者不可與也夫白虎湯三見於傷寒論惟陽明篇中所主之三陽合病有汗其太陽篇所主之病及厥陰篇所主之病皆未見有汗也仲聖當日未見有汗即用白虎湯而吳氏則於未見有汗者禁用白虎湯此不又顯與經旨相背乎且石膏原具有發表之性其汗不出者不正可藉以發其汗乎且即吳氏所定之例必其人有汗且兼渴者始可用白虎湯然陽明實熱之證渴而兼汗出者十人之中不過一二人是不幾將白虎湯置之無用之地乎夫吳氏為清季名醫而對於白虎湯竟誤設禁忌若此彼蓋未知石膏之性也及至所著醫案曾治何姓叟手足拘攣因誤服熱藥所致每劑中用生石膏八兩服近五十日始愈計用生石膏二十餘斤又治趙姓中焦留飲上泛作喘每劑藥中皆重用生石膏有一劑藥中用六兩八兩者有一劑中用十二兩者有一劑中用至一斤者共服生石膏近百斤其病始愈以觀其溫病條辨中所定白虎湯之分量生石膏止用一兩猶煎湯三杯分三次溫飲下者豈不天壤懸殊哉蓋吳氏先著溫病條辨後著吳氏醫案當其著溫病條辨時因未知石膏之性故其用白虎湯慎重若此至其著吳氏醫案時是已知石膏之性也故其能放膽重用石膏若此學問與年俱進故不失其為名醫也人之所以重視白虎湯而不敢輕用者實皆未明石膏之性也夫自古論藥之書當以神農本草經為稱首其次則為名醫別録神農本草經創於開天闢地之聖神洵堪為論藥性之正宗至名醫別録則成於前五代之陶弘景乃取自漢以後及五代以前名醫論藥之處而集為成書以為神農本草經之輔翼弘景曾以朱書本經墨書別録為一書今即神農本草經及名醫別録之文而細為研究之神農本草經石膏原文氣味辛微寒無毒主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡按後世本草未有不以石膏為大寒者獨神農本草經以為微寒可為萬古定論為其微寒是以白虎湯中用至一斤至吳氏醫案治痰飲上泛作喘服石膏近百斤而脾胃不傷也其言主中風者夫中風必用發表之藥石膏既主之則性善發表可知至其主寒熱驚喘口乾舌焦無事詮解至其能治心下逆氣腹中堅痛人或疑之而臨證細心品驗自可見諸事實也曾治一人患春溫陽明府熱已實心下脹滿異常投以生石膏二兩竹茹碎末五錢煎服後頓覺藥有推蕩之力脹滿與溫病皆愈又嘗治一人少腹腫疼甚劇屢經醫治無效診其脈沉洪有力投以生石膏三兩旱三七二錢研細沖服生蒲黃三錢煎服兩劑全愈此證即西人所謂盲腸炎也西人恆視之為危險難治之病而放膽重用生石膏即可隨手奏效至謂其除邪鬼者謂能治寒溫實熱證之妄言妄見也治産乳者此乳字當作生字解注疏家多以乳字作乳汁解者非是謂婦人當生産之後偶患寒溫實熱亦不妨用石膏即金匱謂婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之者是也竹皮大丸中有石膏治金瘡者人若為刀斧所傷摻以生石膏細末立能止血且能消腫愈疼也名醫別録石膏原文石膏除時氣頭疼身熱三焦大熱腸胃中結氣解肌發汗止消渴煩逆腹脹暴氣咽痛亦可作浴湯按解肌者其力能達表使肌膚松暢而內蘊之熱息息自毛孔透出也其解肌兼能發汗者言解肌之後其內蘊之熱又可化汗而出也特是後世之論石膏者對於神農本草經之微寒既皆改為大寒而對於名醫別録之解肌發汗則尤不相信即如近世所出之本草若鄒潤安之本經疏證周伯度之本草思辨録均可為卓卓名著而對於名醫別録謂石膏能解肌發汗亦有微詞愚浮沉醫界者五十餘年嘗精細體驗白虎湯之用法若陽明之實熱一半在經一半在府或其熱雖入府而猶連於經服白虎湯後大抵皆能出汗斯乃石膏之涼與陽明之熱化合而為汗以達於表也若猶慮其或不出汗則少加連翹蟬蛻諸藥以為之引導服後覆杯之頃其汗即出且汗出後其病即愈而不復有外感之熱存留矣若其陽明之熱已盡入府服白虎湯後大抵出汗者少不出汗者多其出汗者熱可由汗而解其不出汗者其熱亦可內消蓋石膏質重氣輕其質重也可以逐熱下行其氣輕也可以逐熱上出俾胃府之氣化升降皆湛然清肅外感之熱自無存留之地矣石膏之發汗原發身有實熱之汗非能發新受之風寒也曾治一人年近三旬於春初得溫病醫者以溫藥發其汗汗出而病益加劇診其脈洪滑而浮投以大劑白虎湯為加連翹蟬蛻各錢半服後遍體得涼汗而愈然愈後泄瀉數次後過旬日又重受外感其脈與前次相符乃因前次服白虎湯後作泄瀉遂改用天花粉玄參各八錢薄荷葉甘草各二錢連翹三錢服後亦汗出遍體而其病分毫不減因此次所出之汗乃熱汗非涼汗也不得已遂仍用前方為防其泄瀉以生懷山藥八錢代方中粳米服後仍遍體出涼汗而愈由此案觀之則石膏之妙用有真令人不可思議者矣重用石膏以發汗非僅愚一人之實驗也邑中友人劉肺熱勞喘熱令尤甚時當季夏病犯甚劇因嘗見愚重用生石膏治病自用生石膏四兩煎湯一大碗頓飲下周身得涼汗勞喘驟見輕隔一日又將石膏如前煎飲病又見輕如此隔日一飲石膏湯飲後必然出汗其病亦隨之遞減飲過六次而百藥難愈之痼疾竟霍然矣後劉與愚相遇因問石膏如此涼藥何以能令人發汗愚曰石膏性善發汗名醫別録載有明文臟腑蘊有實熱之人服之恆易作汗也此證因有伏氣化熱久留肺中不去以致肺受其傷屢次飲石膏湯以逐之則久留之熱不能留遂盡隨汗出而消解無餘矣用石膏以治肺病及勞熱古人早有經驗之方因後世未知石膏之性即見古人之方亦不敢信是以後世無用者其方曾載於王燾外臺祕要今特詳録於下以備醫界之採取外臺祕要原文治骨蒸勞熱久嗽用石膏紋如朿針者一斤粉甘草一兩研細如面日以水調三四服言其無毒有大益乃養命上藥不可忽其賤而疑其寒名醫別録言陸州楊士丞女病骨蒸內熱外寒衆醫不能瘥處州吳醫用此方而體遂涼按書中所載楊氏女亦伏氣化熱病凡伏氣化熱之病原當治以白虎湯脈有數象者白虎加人參湯醫者不知如此治法是以久不瘥吳醫治以石膏甘草粉實為白虎湯之變通用法乃有其證非如此變通用之而不能愈者必服石膏面始能愈此愚治伏氣化熱臨證之實驗爰録一案於下以明用古方者原宜因證變通也一人年近四旬身形素強壯時當暮春忽覺心中發熱初未介意後漸至大小便皆不利屢次延醫服藥病轉加劇腹中脹滿發熱益甚小便猶可通滴瀝而大便則旬余未通矣且又覺其熱上逆無論所服何藥下咽即吐出因此醫皆束手無策後延愚為診視其脈弦長有力重按甚實左右皆然視其舌苔厚而已黃且多芒刺知為伏氣化熱因謂病者曰欲此病愈非治以大劑白虎湯不可病者謂我未受外感何為服白虎湯答曰此伏氣化熱證也蓋因冬日或春初感受微寒未能即病所受之寒伏藏於三焦脂膜之中阻塞升降之氣化久而生熱至春令已深而其所伏之氣更隨春陽而化熱於斯二熱相併而臟腑即不勝其灼熱矣此原與外感深入陽明者治法相同是以宜治以白虎湯也病者聞愚言而頷之遂為開白虎湯方方中生石膏用三兩為其嘔吐為加生赭石細末一兩為其小便不利為加滑石六錢至大便旬余不通而不加通大便之藥者因赭石與石膏並用最善通熱結之大便也俾煎湯一大碗徐徐溫飲下服後將藥吐出一半小便稍通大便未通下翌日即原方將石膏改用五兩赭石改用兩半且仿白虎加人參湯之義又加野臺參三錢復煎湯徐徐溫飲下仍吐藥一半大便仍未通下於是變湯為散用生石膏細末一兩赭石細末四錢和勻為一日之量鮮白茅根四兩煎湯分三次將藥末送服服後分毫未吐下燥糞數枚小便則甚暢利矣翌日更仿白虎加人參湯之義又改用野黨參五錢煎湯送服從前藥末又下燥糞數枚後或每日如此服藥歇息一日不服藥約計共服生石膏細末斤許下燥糞近百枚病始霍然全愈其人愈後飲食增加脾胃分毫無傷則石膏之功用及石膏之良善可知矣愚用石膏治大便之因熱燥結者實多次矣或單用石膏細末或少佐以赭石細末莫不隨手奏效為此次所用石膏末最多故特志之陽明病白虎加人參湯證白虎湯之外又有白虎加人參湯以輔白虎湯之所不逮其方五見於傷寒論今試約略録其數節以為研究之資料傷寒論原文服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之白虎加人參湯方知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服服桂枝湯原取微似有汗若汗出如水流漓病必不解此謂服桂枝湯而致大汗出是汗出如水流漓也因汗出過多大傷津液是以大煩大渴脈洪大異常以白虎湯解其熱加人參以復其津液而病可愈矣傷寒論原文傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之所謂若吐若下者實因治失其宜誤吐誤下是以吐下後而病不愈也且誤吐則傷其津液誤下則傷其氣分津液傷損可令人作渴氣分傷損不能助津液上潮更可作渴是以欲飲水數升也白虎湯中加人參不但能生津液且能補助氣分以助津液上潮是以能立建奇功也傷寒論原文傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之凡服白虎湯之脈皆當有滑象脈滑者中有熱也此節之脈象但浮雖曰發熱不過其熱在表其不可與以白虎湯之實際實在於此乃因節中有無汗及表不解之文而後世之治傷寒者或謂汗不出者不可用白虎湯或謂表不解者不可用白虎湯至引此節之文以為徵據而不能連上數句匯通讀之以重誤古人獨不思太陽篇中白虎湯證其脈浮滑浮非連於表乎又不思白虎湯證三見於傷寒論惟陽明篇白虎湯證明言汗出而太陽篇與厥陰篇之所載者皆未言有汗乎至於其人欲飲水數升且無寒束之表證是其外感之熱皆入於裡灼耗津液令人大渴是亦宜急救以白虎加人參湯而無可遲疑也白虎加人參湯所主之證或渴或煩或舌乾固由內陷之熱邪所傷實亦由其人真陰虧損也人參補氣之藥非滋陰之藥而加於白虎湯中實能於邪火熾盛之時立復真陰此中蓋有化合之妙也曾治一人患傷寒熱入陽明之府脈象有力而兼硬時作譫語按此等脈原宜投以白虎加人參湯而愚時當少年醫學未能深造竟與以大劑白虎湯俾分數次溫飲下翌日視之熱已見退而脈搏轉數譫語更甚乃恍然悟會改投以白虎加人參湯煎一大劑分三次徐徐溫飲下盡劑而愈蓋白虎湯證其脈宜見滑象脈有硬象即非滑矣此中原有陰虧之象是以宜治以白虎加人參湯而不可但治以白虎湯也自治愈此案之後凡遇其人脈數或弦硬或年過五旬或在勞心勞力之餘或其人身形素羸弱即非在汗吐下後渴而心煩者當用白虎湯時皆宜加人參此立腳於不敗之地戰則必勝之師也同邑友人李曾治一陽明府實證其脈雖有力而數逾六至李先投以白虎湯不效繼因其脈數加玄參沙參以滋其陰分仍不效詢方於愚答曰此白虎加人參湯證也李謂此證非在汗吐下後且又不渴不煩何為用白虎加人參湯愚曰用古人之方當即古人立方之意而推廣變通之凡白虎湯所主之證其渴與煩者多因陰分虛損而脈象數者獨非陰分虛損乎李聞愚言而心中會悟改投以白虎加人參湯一劑而愈推廣白虎加人參湯之用法不必其人身體虛弱或有所傷損也憶愚年三旬時曾病伏氣化熱五心煩熱頭目昏沉舌苔白厚欲黃且多芒刺大便乾燥每日用生石膏數兩煮水飲之連飲數日熱象不退因思或藥輕不能勝病乃於頭午用生石膏五兩煮水飲下過午又用生石膏五兩煮水飲下一日之間共服生石膏十兩而心中分毫不覺涼大便亦未通下躊躇再四精思其理恍悟此必伏氣之所入甚深原當補助正氣俾吾身之正氣壯旺自能逐邪外出也於斯欲仿白虎加人參湯之義因無確實把握猶不敢遽用大劑就已所預存之藥用生石膏二兩野臺參二錢甘草錢半適有所軋生懷山藥粗渣又加少許煎湯兩蠱分三次溫飲下飲完晚間即覺清爽一夜安睡至黎明時少腹微疼連瀉三次自覺伏氣之熱全消再自視舌苔已退去一半而芒刺全無矣夫以常理揆之加人參於白虎湯中必謂能減石膏之涼力而此次之實驗乃知人參反能助石膏之涼力其理果安在乎蓋石膏煎湯其涼散之力皆息息由毛孔透達於外若與人參並用則其涼散之力與人參補益之力互相化合能旋轉於臟腑之間以搜剔深入之外邪使之淨盡無遺此所以白虎加人參湯清熱之力遠勝於白虎湯也愚生平治寒溫實熱用白虎加人參湯時恆多於用白虎湯時而又恆因證制宜即原方少有通變凡遇脈過六至者恆用生懷山藥一兩以代方中粳米蓋以山藥含蛋白質甚多大能滋陰補腎而其濃郁之汁漿又能代粳米調胃也若遇陽明之熱既實而其人又兼下痢者恆用生杭芍一兩以代方中知母因芍藥善清肝熱以除痢疾之裡急後重而其涼潤滋陰之性又近於知母也若婦人産後患寒溫實熱者亦以山藥代粳米又必以玄參八錢以代方中知母因山藥既可補産後之腎虛而玄參主産乳余疾神農本草經原有明文也神農本草經中石膏玄參皆主産乳知母未言治産乳不敢師心自用輕以苦寒之藥施於産後也且玄參原非苦寒之品實驗之原甘而微苦神農本草經謂其味苦者當系後世傳寫之誤是以雖在産後可放膽用之無礙也愚治寒溫之證於陽明腸實大便燥結者恆投以大劑白虎湯或白虎加人參湯往往大便得通而愈且無下後不解之虞間有服藥之後大便未即通下者而少投以降下之品或用玄明粉二三錢和蜜沖服其大便即可通下蓋因服白虎湯及服白虎加人參湯後壯熱已消燥結已潤自易通下也有外感之實熱日久不退致其人氣血兩虧危險迫於目前急救以白虎加人參湯其病只愈一半必繼服他種補益之藥始能全愈者今試詳述一案以徵明之一幼女年九歲於季春上旬感受溫病醫者以熱藥發之服後分毫無汗轉覺表裡大熱蓋已成白虎湯證也醫者不知按方施治遷延二十餘日身體尫羸危險之朕兆歧出其目睛上竄幾至不見筋惕肉瞤周身顫動時作噯聲間有喘時精神昏憒毫無知覺其肌膚甚熱啓其齒見舌縮而干苔薄微黃其脈數逾六至左部弦細而浮不任重按右部亦弦細而重診似有力大便旬日未行此久經外感之熱灼耗致氣血兩虛肝風內動真陰失守元氣將脫之候也宜急治以白虎加人參湯再輔以滋陰固氣之品庶可救愈特慮病狀若此湯藥不能下咽耳其家人謂偶與以勺水或米湯猶知下咽想灌以藥亦如下咽也於斯遂為疏方處方生石膏細末二兩野臺參三錢生懷山藥六錢生懷地黃一兩生淨萸肉一兩甘草二錢共煎湯兩大盅分三次溫飲下此方即白虎加人參湯以生地黃代知母生山藥代粳米而又加山萸肉也此方若不加萸肉為愚常用之方以治寒溫證當用白虎加人參湯而體弱陰虧者今重加山萸肉一兩者誠以人當元氣不固之時恆因肝臟之疏泄而上脫此證目睛之上竄乃顯露之朕兆當屬於肝重用萸肉以收斂肝臟之疏泄元氣即可不脫且喻嘉言謂上脫之證若但知重用人參轉令人氣高不返重用萸肉為之輔弼自無斯弊可穩重建功將藥三次服完目睛即不上竄身體安穩噯聲已止氣息已勻精神較前明瞭而仍不能言大便猶未通下肌膚猶熱脈數已減不若從前之浮弦右部重診仍似有力遂即原方略為加減俾再服之第二方生石膏細末兩半野臺參三錢生懷地黃一兩生淨萸肉六錢天冬六錢甘草二錢煎湯兩盅分兩次溫飲下每飲一次調入生雞子黃一枚目睛已不上竄而猶用萸肉者誠以此證先有噯氣之病是其氣難於上達也凡氣之難於上達者須防其大便通後氣或下脫故用萸肉以預防之至於雞子黃化學家謂其含有副腎髓質即善滋真陰生用之又善潤大便是以加之此藥日服一劑服兩日熱已全退精神之明瞭似將復原而仍不能言大便仍未通下間有努力欲便之狀診其脈熱象已靜且微弱擬用灌腸法通其大便先用野臺參三錢萸肉天冬各四錢煎湯服下然後用灌腸法以通其大便安然通下仍不能言細診其脈微弱益甚右部關前之脈幾至不見乃恍悟其所以不能言者胸中大氣下陷也升補其胸中大氣使之上達於舌本必能言矣第三方生箭耆三錢野臺參三錢生懷山藥一兩大甘枸杞一兩北沙參一兩天冬六錢寸冬帶心六錢升麻一錢桔梗錢半共煎湯一盅半分兩次溫服下此方連服兩劑遂能言語因方中重用滋陰之藥以培養其精神而精神亦復常矣陽明病三承氣湯證白虎湯及白虎加人參湯兩方皆治足陽明有實熱者也至熱入手陽明之府致大便因熱燥結其燥結愈甚者蘊蓄之熱必愈深此非開其燥結其熱固不能消也若斯則攻下之劑若承氣湯諸方在所必需矣傷寒論原文陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外來未也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下首句為陽明病脈遲此見陽明病脈遲為當下之第一明徵也而愚初度此句之義以為凡傷寒陽明之當下者若其脈數下後恆至不解此言脈遲未必遲於常脈特表明其脈不數無慮其下後不解耳逮至閲歷既久乃知陽明病當下之脈原有遲者然其脈非為遲緩之象竟若蓄極而通有遲而突出之象蓋其脈之遲因腸中有阻塞也其遲而轉能突出者因陽明火盛脈原有力有阻其脈之力而使之遲者正所以激其脈之力而使有跳躍之勢也如此以解脈遲則脈遲之當下之理自明也然愚臨證實驗以來知陽明病既當下其脈遲者固可下即其脈不遲而亦不數者亦可下惟脈數及六至則不可下即強下之病必不解或病更加劇而愚對於此等證原有變通之下法即白虎加人參湯將石膏不煎入湯中而以所煎之湯將石膏送服者是也愚因屢次用此方奏效遂名之為白虎承氣湯爰詳録之於下以備醫界採用生石膏八錢搗細大潞黨參三錢知母八錢甘草二錢粳米二錢藥共五味將後四味煎湯一盅半分兩次將生石膏細末用溫藥湯送下服初次藥後遲兩點鐘若腹中不見行動再服第二次若腹中已見行動再遲點半鐘大便已下者停後服若仍未下者再將第二次藥服下至若其脈雖數而洪滑有力者用此方時亦可不加黨參愚從前遇寒溫證之當下而脈象數者恆投以大劑白虎湯或白虎加人參湯其大便亦可通下然生石膏必須用至四五兩煎一大碗分數次溫服大便始可通下間有服數劑後大便仍不通下者其人亦恆脈淨身涼少用玄明粉二三錢和蜜沖服大便即可通下然終不若白虎承氣湯用之較便也生石膏若服其研細之末其退熱之力一錢可抵煎湯者半兩若以之通其大便一錢可抵煎湯者一兩是以方中只用生石膏八錢而又慎重用之必分兩次服下也寒溫陽明病其熱甚盛者投以大劑白虎湯其熱稍退翌日恆病仍如故如此反復數次病家遂疑藥不對證而轉延他醫因致病不起者多矣愚後擬得此方凡遇投以白虎湯見效旋又反復者再為治時即用石膏為末送服其湯劑中用五六兩者送服其末不過一兩至多至兩半其熱即可全消矣大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上微火一兩沸分溫再服得下余勿服大承氣湯方所以通腸中因熱之燥結也故以大黃之性善攻下且善瀉熱者為主藥然藥力之行必恃臟腑之氣化以斡旋之故佐以朴實以流通腸中鬱塞之氣化則大黃之攻下自易為力矣用芒硝者取其性寒味鹹善清熱又善軟堅且兼有攻下之力則堅結之燥糞不難化為溏糞而通下矣方中之用意如此藥味無多實能面面精到而愚對於此方不無可疑之點則在其藥味分量之輕重也神農本草經謂大黃能推陳致新是以有黃良之名在陽明蘊有實熱大便燥結者原宜多用至厚朴不過為大黃之輔佐品竟重用至半斤較大黃之分量為加倍若按一兩為今之三錢折算復分兩次服之則一次所服之藥當有厚朴一兩二錢夫厚朴氣溫味辛若多用之能損人真氣為人所共知而其性又能橫行達表發出人之熱汗憶愚少時曾治一陽明實熱大便燥結證方中用大黃三錢服後大便未通下改延他醫方中重用厚朴一兩服後片時出熱汗遍體似喘非喘氣弱不足以息未逾半日而亡矣此誠可為前車之鑑也是以愚謂此方之分量必有差誤愚疑此方厚朴之分量當亦如小承氣湯為大黃分量之半其原本或為厚朴之分量半大黃大抵由此半字而誤為半斤也再者本節原文以陽明病脈遲五字開端所謂脈遲者言其脈象雖熱而至數不加數也非謂其遲於平脈此乃病者身體素壯陰分尤充足之脈病候至用大承氣湯時果能有如此脈象投以大承氣湯原方亦可隨手奏效而今之大承氣湯證如此脈象者實不多見也此乃半關天時半關人事實為古今不同之點即厚朴之分量原本如是醫者亦當隨時制宜為之通變化裁方可為善師仲景之人非然者其脈或不遲而數但用硝黃降之猶恐降後不解因陰虛不能勝其燥熱也況更重用厚朴以益其燥熱乎又或其脈縱不數而熱實脈虛但用硝黃降之猶恐降後下脫因其氣分原虧不堪硝黃之推蕩也況敢重用厚朴同枳實以破其氣乎昔葉香岩用藥催生曾加梧桐葉一片作引有效之者轉為香岩所笑或問其故香岩謂余用梧桐葉一片時其日為立秋取梧桐一葉落也非其時將用梧桐葉何為由斯知名醫之治病莫不因時制宜原非膠柱鼓瑟也是以愚用承氣湯時大黃芒硝恆皆用至七八錢厚朴枳實不過用二錢或仿調胃承氣湯之義皆減去不用外加生赭石細末五六錢其攻下之力不減大承氣原方而較諸原方用之實為穩妥也至其脈象數者及脈象雖熱而重按無力者又恆先投以大劑白虎加人參湯煎湯一大碗分數次溫飲下以化胃中燥熱而由胃及腸即可潤其燥結往往有服未終劑大便即通下者且下後又無虞其不解更無慮其下脫也其間有大便未即通下者可用玄明粉三錢或西藥留苦四錢調以蜂蜜開水沖服或外治用豬膽汁導法或用食鹽若用熬火硝所出之鹽更佳融水灌腸皆可通下至通下之後亦無不愈者小承氣湯方大黃四兩酒洗厚朴二兩炙去皮枳實三枚大者炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之大承氣湯所主之病大腸中有燥糞是以用芒硝軟堅以化其燥糞小承氣湯所主之病為腹大滿不通是其病在於小腸而上連於胃是以但用大黃朴實以開通其小腸小腸開通下行大便不必通下即通下亦不至多而胃中之食可下輸於小腸是以胃氣得和也此大小承氣湯用法之分別也而二承氣湯之外又有調胃承氣湯更可連類論及之調胃承氣湯方大黃四兩去皮清酒浸甘草二兩炙芒硝半升上二味㕮咀以水三升煮取一升去滓納芒硝再上火微煮令沸少少溫服之大黃雖為攻下之品原善清血分之熱心中發煩實為血分有熱也大黃浸以清酒可引其苦寒之性上行以清心之熱而煩可除矣證無大便燥結而仍用芒硝者內經謂熱淫於內治以鹹寒芒硝味鹹性寒實為心家對宮之藥心屬火咸屬水故為心家對宮之藥其善清心熱原有專長故無大便燥結證而亦加之也用甘草者所以緩藥力之下行且又善調胃也不用朴實者因無大便燥結及腹滿之證也承氣湯雖有三方而小承氣及調胃承氣實自大承氣變化而出傷寒論所載三承氣主治之證不勝録然果洞悉三方之各有用意及三方藥力輕重各有區別且所主之病雖有上中下之分而究之治上可及於中治中可及於下分治之中仍有連帶關係自能凡遇宜用承氣湯證斟酌其宜輕宜重分別施治而無差謬矣至於愚用承氣湯之經過又恆變化多端不拘拘於三承氣湯中之藥味也今試舉數案以徵明之大承氣湯所主之證原宜脈遲其有脈不遲而洪實有力者亦不妨用惟其脈不遲而轉數若因大便燥結而遽投以大承氣湯其脈之無力者恆因大便通後而虛脫其脈之有力者下後縱不至虛脫其病亦必不能愈所謂降後不解也凡遇此等脈必設法將其脈數治愈然後再通其大便曾治一叟年近六旬因外感之熱過甚致大便旬日未通其脈數逾六至心中煩熱延醫數人皆不敢用降下之劑然除降下外又別無治法愚診其脈象雖數重按甚實遂先投以大劑白虎加人參湯每劑分三次溫服下連服兩劑壯熱全消脈已不數大便猶未通下繼用淨芒硝細末三錢蜂蜜一兩開水沖服大便通下病遂愈曾治一少年因外感實熱致大便燥結旬余未下其脈亦數逾六至且不任重按亦投以白虎加人參湯以生地黃代方中知母生山藥代方中粳米煎湯一大碗俾分多次徐徐溫飲下初服一劑脈數見緩遂即原方略為減輕俾再煎服擬後服至脈象復常再為通其大便孰意次劑服完而大便自通下矣且大使通下後外感之實熱亦消解無餘矣此直以白虎加人參湯代承氣湯也自治愈此病之後凡遇有證之可下而可緩下者恆以白虎湯代承氣或以白虎加人參湯代承氣其涼潤下達之力恆可使大便徐化其燥結無事用承氣而自然通下且下後又無不解之虞也治一少婦於大怒之餘感冒傷寒熱傳陽明大便燥結醫者兩次投以大承氣皆吐出診其脈弦長有力蓋脈現弦長無論見於何部皆主肝火熾盛此不受藥之所以然也遂於大承氣湯中將朴實減輕朴實各用錢半加生杭芍生赭石各一兩臨服藥時又恐藥湯入口即吐出先用白開水送服生赭石細末三錢繼將藥服下閲三點鐘大便通下而病即愈矣又治一人素傷煙色平日大便七八日一行今因受外感實熱十六七日大便猶未通下心中煩熱腹中脹滿用洗腸法下燥糞少許而脹滿煩熱如舊醫者謂其氣虛脈弱不敢投降下之藥及愚診之知其脈雖弱而火則甚實遂用調胃承氣湯加野臺參四錢生赭石天門冬各八錢共煎湯一大碗分三次徐徐溫飲下飲至兩次腹中作響覺有開通之意三次遂不敢服遲兩點鐘大便通下內熱全消霍然愈矣有服承氣湯後大便之燥結不下繼服些許他藥而燥結始下者試再舉兩案以明之邑中名醫劉愚初學醫時家中常延之一日見先生治一傷寒熱入陽明大便燥結證從前醫者投以大承氣湯兩劑不下繼延先生治之單用威靈仙三錢煎湯服後大便通下病亦遂愈愚疑而問曰威靈仙雖能通利二便以較硝黃攻下之力實遠不如乃從前服大承氣湯兩劑大便不下何先生只用威靈仙三錢而大便即下乎答曰其中原有妙理乃前後所用之藥相藉以成功也蓋其從前所服之大承氣湯兩劑猶在腹中因其臟腑之氣化偶滯藥力亦隨之停頓借威靈仙走竄之力以觸發之則硝黃力之停頓者可陡呈其開通攻決之本性是以大便遂通下也是威靈仙之於硝黃猶如槍炮家導火之線也愚聞如此妙論頓覺心地開通大有會悟後有仿此醫案之時亦隨手奏效因並録之於此由此知醫學雖貴自悟亦必啓發之有自也鄰村霍當怒動肝火之餘感受傷寒七八日間腹中脹滿大便燥結醫者投以大承氣湯大便未通下肋下轉覺疼不可支其脈左部沉弦有力知系肝經氣鬱火盛急用柴胡三錢生麥芽一兩煎湯服後至半點鐘肋下已不覺疼又遲一點余鍾大便即通下大便下後腹即不脹而病脫然全愈矣此案實仿前案之義亦前後藥力相藉以通大便也蓋腎為二便之關肝行腎之氣肝又主疏泄大便之通與不通實於肝有關係也調其肝鬱即可以通行大便此中原有至理至於調肝用柴胡而又必佐以生麥芽者因麥芽生用亦善調肝者也且柴胡之調肝在於升提生麥芽之調肝在於宣通若因肝不舒但用柴胡以升提之恐初服下時肋下之疼將益劇惟柴胡之升提與麥芽之宣通相濟以成調肝氣之功則肝氣之郁者自開遏者自舒而徐還其疏泄之常矣且柴胡之性不但善調肝氣也神農本草經謂柴胡主心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新三復神農本草經之文是柴胡不但善於調肝兼能消脹滿通大便矣然柴胡非降下之藥也其於大便之當通者能助硝黃以通之若遇脾胃之氣下溜大便泄瀉者伍以耆術轉能升舉脾胃之氣以止泄瀉柴胡誠妙藥也哉善於用柴胡者自能深悟此中之妙理也至於妊婦外感熱實大便燥結者承氣湯亦不妨用內經所謂有故無殞亦無殞也然此中須有斟酌以上所列方中諸藥芒硝斷不可用至赭石則三月以前可用三月以後不可用其餘雖皆可用然究宜先以白虎湯或白虎加人參湯代承氣即不能完全治愈後再用承氣時亦易奏效也曾治一婦人妊過五月得傷寒證八九日間脈象洪實心中熱而煩躁大便自病後未行其臍上似有結糞按之微疼因其內熱過甚先用白虎加人參湯清之連服兩劑內熱頗見輕減而臍上似益高腫不按亦疼知非服降下之藥不可也然從前服白虎加人參湯兩劑知其大便雖結不至甚燥治以降下之輕劑當可奏效為疏方用大黃野臺參各三錢真阿膠不炒另燉兌服天冬各五錢煎湯服下即覺臍上開通過一點鐘疼處即不疼矣又遲點半鐘下結糞十餘枚後代溏糞遂覺霍然全愈後其胎氣亦無所損屆期舉子矣至方中之義大黃能下結糞有人參以駕馭之則不至於傷胎又輔以阿膠取其既善保胎又善潤腸則大便之燥者可以不燥矣用天冬者取其涼潤微辛之性細嚼之實有辛味最能下行以潤燥開瘀兼以解人參之熱也陽明病茵陳蒿湯證陽明原屬燥金其為病也多燥熱白虎承氣諸方皆所以解陽明之燥熱也然燥熱者陽明恆有之正病而有時間見濕熱為病此陽明之變病也其變病果為何病陽明篇中諸發黃之證是也試再進而詳論之傷寒論原文陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之陽明病發熱汗出者熱外越而濕亦隨之外越即不能發黃若其熱不外越而內蘊又兼其人小便不利且飲水過多其濕與熱必至化合而生黃是以周身必發黃也主以茵陳蒿湯者以茵陳蒿湯善除濕熱也茵陳蒿湯方茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗先煮茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁色正赤一宿腹減黃從小便去也茵陳性寒味苦具有生髮之氣寒能勝熱苦能勝濕其生髮之氣能逐內蘊之濕熱外出故可為濕熱身黃之主藥佐以梔子大黃者因二藥亦皆味苦性寒也且梔子能屈曲引心火下行以利小便大黃之色能直透小便凡服大黃者其小便即為大黃之色是大黃能利小便之明徵故少用之亦善利小便至茵陳雖具有升發之性名醫別録亦謂其能下利小便三藥並用又能引內蘊之熱自小便瀉出是以服之能隨手奏效也傷寒論原文傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之身黃如橘而腹滿小便不利此因濕熱成病可知故亦治以茵陳蒿湯也陽明病梔子柏皮湯證傷寒論原文傷寒身黃髮熱梔子柏皮湯主之此節示人但見其身黃髮熱即無腹滿小便不利諸證亦直可以濕熱成病斷之也梔子柏皮湯方梔子十五個擘甘草一兩炙黃柏二兩上三味以水四升煮取一升半去滓分溫再服此方之用意欲以分消上中下之熱也是以方中梔子善清上焦之熱黃柏善清下焦之熱加甘草與三藥並用又能引之至中焦以清中焦之熱也且梔子黃柏皆過於苦寒調以甘草之甘俾其苦寒之性味少變而不至有傷於胃也陽明病麻黃連軺赤小豆湯證傷寒論原文傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之麻黃連軺赤小豆湯方麻黃二兩去節赤小豆一升連軺二兩杏仁四十個去皮尖大棗十二枚生梓白皮一升生薑二兩切甘草二兩炙上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡按連軺非連翹乃連翹根也其性涼能瀉熱兼善利濕後世改用連翹則性不同矣赤小豆即作飯之小豆形如緑豆而色赤者非南來之紅豆也梓白皮藥房無鬻者有梓樹處自加之可也陳修園云若無梓白皮可以茵陳代之身發黃與黃疸不同黃疸為膽汁妄行於血中仲景書中雖未明言而喻嘉言寓意草於錢小魯案中曾發明之彼時西人謂膽汁溢於血中之説猶未入中國也至身發黃之病猝成於一兩日間其非膽汁溢於血分可知矣茵陳為治熱結黃疸之要藥神農本草經載有明文仲景治身發黃亦用之者誠以二證之成皆由於濕熱其濕熱由漸而成則為黃疸其濕熱因外感所束倉猝而成則為身發黃是以皆可以茵陳蒿治之也身發黃之證不必皆濕熱也陽明篇七十六節云傷寒發汗已身目為黃所以然者寒濕在裡不解故也以為不可下也於寒濕中求之王和安曰黃為油熱色油中含液而包脈孕血液虛血燥則熱甚為陽黃身黃髮熱之梔子柏皮證也油濕血熱相等而交蒸為小便不利身黃如橘之茵陳蒿證也油寒膜濕鬱血為熱則寒濕甚而為陰黃即茵陳五苓證也病有熱而治從寒濕玩以為二句語氣之活自可想見蓋以為不可下明見有可下之熱黃也在於寒濕中求之言治法求之寒濕明見黃證不純為寒濕也凡一證二因者治從其甚可於二語見之上王氏之論甚精細而愚於此節之文則又別有會悟試引從前治愈之兩案以明之曾治一人受感冒惡寒無汗周身發黃以麻黃湯發之汗出而黃不退細診其脈左部弦而無力右部濡而無力知其肝膽之陽不振而脾胃又虛寒也蓋脾胃屬土土色本黃脾胃有病現其本色是以其病濕熱也可現明亮之黃色其病濕寒也亦可現黯淡之黃色觀此所現之黃色雖似黯淡而不甚黯淡者因有膽汁妄行在其中也此蓋因肝膽陽分不振其中氣化不能宣通膽汁達於小腸化食以致膽管閉塞膽汁遂蓄極妄行溢於血分而透黃色其為黃色之根源各異竟相併以呈其象是以其發黃似黯淡而非黯淡也審病既確遂為擬分治左右之方以治之生箭耆六錢桂枝尖二錢乾薑三錢厚朴錢半陳皮錢半茵陳二錢上藥六味共煎湯一大盅溫服方中之義用黃耆以助肝膽之陽氣佐以桂枝之辛溫更有開通之力也用乾薑以除脾胃之濕寒輔以厚朴能使其熱力下達更輔以陳皮能使其熱力旁行其熱力能布濩充周脾胃之寒濕自除也用茵陳者為其具有升發之性實能開啓膽管之閉塞且其性能利濕更與薑桂同用雖云苦寒而亦不覺其苦寒也況肝膽中寄有相火肝膽雖涼相火之寄者仍在相火原為龍雷之火不可純投以辛熱之劑以觸發之少加茵陳實兼有熱因寒用之義也又治一人時當仲秋寒熱往來周身發黃心中煩熱腹中又似覺寒涼飲食不甚消化其脈左部弦硬右部沉濡心甚疑之問其得病之由答云不知因細問其平素之飲食起居乃知因屋宇窄隘六七月間皆在外露宿且其地多潮濕夜間霧露尤多乃恍悟此因臟腑久受潮濕脾胃屬土土為太陰濕鬱久則生寒是以飲食不能消化肝膽屬木木為少陽濕鬱久則生熱又兼有所寄之相火為之熏蒸以致膽管腫脹閉塞是以膽汁妄行溢於血中而身黃也舌上微有白苔知其薄受外感侵入三焦三焦原為手少陽與足少陽併為遊部一氣貫通是以亦可作寒熱原當以柴胡和解之其寒熱自已茵陳性近柴胡同為少陽之藥因其身發黃遂用茵陳三錢以代柴胡又加連翹薄荷葉生薑各三錢甘草二錢煎湯服後周身得汗足少陽不宜發汗手少陽宜發汗寒熱往來愈而發黃如故於斯就其左右之脈寒熱迥殊者再擬一方治之茵陳三錢梔子三錢乾薑三錢白朮三錢炒厚朴二錢焰硝五分研細上六味將前五味煎湯一大盅乘熱納硝末融化服之方中之義用梔子茵陳以清肝膽之熱用乾薑白朮厚朴以除脾胃之寒藥性之涼熱迥然不同而匯為一方自能分途施治也用焰硝者因膽管之閉塞恆有膽石阻隔不能輸其膽汁於小腸焰硝之性善消即使膽管果有膽石服之亦不難消融也陽明病豬苓湯證發黃之證多成於濕熱諸治發黃之方皆治濕熱之方也乃有本陽明病其人蘊有濕熱而不發黃者自當另議治法而陽明篇中亦曾載其治方矣傷寒論原文若脈浮發熱渴欲飲水小便不利者豬苓湯主之此節所謂脈浮者乃病入陽明而猶連太陽之府也蓋太陽之病在經脈浮在府亦脈浮此因太陽之府蘊有實熱以致小便不利而熱之入於陽明者不能由太陽之府分消其熱下行轉上逆而纍及於肺是以渴欲飲水也治以豬苓湯是仍欲由太陽之府分消其熱也豬苓湯方豬苓去皮茯苓阿膠滑石澤瀉各一兩上五味以水四升先煮四味取二升去滓納下阿膠煬消溫服七合日三服豬苓茯苓皆為滲淡之品而豬苓生於楓下得楓根陰柔之氣以其性善化陽以治因熱小便不利者尤宜故用之為主藥用澤瀉者因其能化水氣上升以止渴而後下降以利小便也用滑石者其性可代石膏以清陽明之實熱又能引其熱自小便出也用阿膠者因太陽之府原與少陰相連恐諸利水之藥或有損於少陰故加阿膠大滋真陰之品以助少陰之氣化也陽明病四逆湯證總計陽明篇中之病證大抵燥而且熱也其有不燥而轉濕者此陽明之變證也於治發黃諸方曾發明之矣更有不熱而反寒者此亦陽明之變證也夫病既寒矣必須治以熱劑方為對證之藥是則溫熱之劑又宜講求矣傷寒論原文脈浮而遲表熱裡寒下利清穀者四逆湯主之外感之著人恆視人體之稟賦為轉移有如時氣之流行受病者或同室同時而其病之偏涼偏熱或迥有不同蓋人之臟腑素有積熱者外感觸動之則其熱益甚其素有積寒者外感觸動之則其寒亦益甚也明乎此則可與論四逆湯矣四逆湯方甘草二兩炙乾薑兩半附子一枚生用去皮破八片上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩乾薑為溫暖脾胃之主藥伍以甘草能化其猛烈之性使之和平更能留其溫暖之力使之常久也然脾胃之溫暖恆賴相火之壯旺附子色黑入腎其非常之熱力實能補助腎中之相火以厚脾胃溫暖之本源也方名四逆者誠以脾主四肢脾胃虛寒者其四肢常覺逆冷服此藥後而四肢之厥逆可回也方中附子注明生用非剖取即用也因附子之毒甚大種附子者將附子剖出先以鹽水浸透至藥房中又幾經泡製然後能用是知方中所謂附子生用者特未用火炮熟耳少陽病提綱及汗吐下三禁陽明之熱已入府者不他傳矣若猶在經而未入於府者仍可傳於少陽而少陽確實之部位又須詳為辨析也夫太陽主外陽明主裡而介於太陽陽明之間者少陽也少陽外與太陽相併則寒內與陽明相併則熱是以少陽有病而寒熱往來也由此而論則傳經之次第當由太陽而少陽由少陽而陽明而內經竟謂一日巨陽即太陽受之二日陽明受之三日少陽受之者何也蓋他手足同名之經各有界限獨少陽主膜人身之膜無不相通膜有連於太陽者皮膚下腠理之白膜也膜有連於陽明者肥肉瘦肉間之膜也此為手少陽經以三焦為府者也三焦亦是膜發源於命門下焦為包腎絡腸之膜中焦為包脾連胃之膜上焦為心下膈膜及心肺一系相連之膜又兩脅之下皆板油包其外者亦膜也此為足少陽之膜以膽為府者也由此知介於太陽陽明之間者手少陽也傳經在陽明之後者足少陽也太陽傳陽明原自手少陽經過而傷寒論未言及者以其重足經不重手經也總之手足少陽之膜原相聯絡即手足少陽之氣化原相貫通是以內經謂少陽為遊部遊部者謂其中氣化自手經至足經自足經至手經遊行無定也更由此知所謂與太陽相併者為手少陽腠理之膜也與陽明相併者為足少陽板油之膜也以其相近故能相併也能明乎此即可與論少陽篇之病矣傷寒論原文少陽之為病口苦咽乾目眩也傷寒論原文少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒論原文傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和煩而悸此節所言之證乃少陽病之偏於熱者也弦細固為少陽之脈觀提綱中諄諄以胃和胃不和為重要之點想自陽明傳少陽時其外感之熱仍有一半入府而非盡傳於少陽脈雖弦細重按必然甚實此原當為少陽陽明合病也愚遇此等證脈時恆將柴胡湯方中藥味減半惟人參與甘草不減外加生石膏一兩知母五錢此為白虎加人參湯與小柴胡湯各用一半則少陽之病可解其胃中之熱亦可盡清而不至有胃不和之虞矣此節合上節為少陽病汗吐下三禁凡治少陽病者當切記之少陽病小柴胡湯證傷寒論原文傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之此節載太陽篇小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩炙半夏半升洗生薑三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服用小柴胡湯加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫復取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩附録後世用小柴胡湯分量柴胡八錢黃芩三錢人參三錢甘草三錢清半夏四錢生薑三錢切大棗四枚擘小柴胡證喜嘔者不必作嘔吐也但常常有欲嘔之意即為喜嘔是以愚治傷寒遇有覺噁心而微寒熱往來者即投以小柴胡湯一劑而愈此傷寒論所謂傷寒中風有柴胡證但見一證便是不必悉具也方中重用柴胡正所以助少陽之樞轉以引邪外出也猶恐其樞轉之力或弱故又助以人參以厚其上升之力則少陽之邪直能隨少陽之氣透膈上出矣用半夏者因其生當夏半能通陰陽和表裡且以病本喜嘔而又升以柴胡助以人參少陽雖能上升恐胃氣亦因之上逆則欲嘔之證仍難愈用半夏協同甘草薑棗降胃兼以和胃也用黃芩者以其形原中空故善清軀殼之熱且亦以解人參之偏熱也小柴胡湯證原忌發汗其去滓重煎者原所以減柴胡發表之力欲其但上升而不外達也乃太陽篇一百零三節服小柴胡湯後竟有發熱汗出之文讀傷寒論者恆至此而生疑注疏家亦未見有詳申其義者今試録其原文細研究之傷寒論原文凡柴胡湯證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解服小柴胡湯以引少陽之邪透膈上出而無事出汗原為小柴胡湯證治法之正規然藥力之上升透膈頗難必賴其人之正氣無傷藥借正氣以運行之而後可以奏效至誤下者足少陽之邪多散漫於手少陽三焦脂膜之中仍投以小柴胡湯其散漫於手少陽者遂可借其和解宣通之力達於太陽而汗解矣其留於脅下板油中者因誤降傷氣無力上達亦遂借徑於手少陽而隨之汗解故於汗出上特加一卻字言非發其汗而卻由汗解此乃因誤下之後而使然以明小柴胡湯原非發汗之藥也其汗時必發熱蒸蒸而振者有戰而後汗意也蓋少陽之病由汗解原非正路而其留於脅下之邪作汗解尤難乃至服小柴胡湯後本欲上透膈膜因下後氣虛不能由上透出而其散漫於手少陽者且又以同類相招遂於蓄極之時而開旁通之路此際幾有正氣不能勝邪氣之勢故汗之先必發熱而振動此小柴胡湯方中所以有人參之助也是以愚用此方時於氣分壯實者恆不用人參而於誤服降藥後及氣虛者則必用人參也人身之膜原無處不相聯絡女子之胞室亦膜也其質原兩膜相合中為夾室男女皆有男以化精女以通經故女子之胞室亦曰血室當其經水初過之時適有外感之傳經者乘虛襲入致現少陽證病狀亦宜治以小柴胡湯傷寒論中亦曾詳論之矣傷寒論原文婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之傷寒之病既自陽明傳少陽矣間有遵少陽之法治之其證復轉陽明者此雖僅見之證亦宜詳考治法傷寒論原文服柴胡湯已渴者屬陽明以法治之喻嘉言曰風寒之邪從陽明而傳少陽起先不渴里證未具及服小柴胡湯已重加口渴則邪還陽明而當調胃以存津液矣然不曰攻下而曰以法治之意味無窮蓋少陽之寒熱往來間有渴證倘少陽未罷而恣言攻下不自犯少陽之禁乎故見少陽重轉陽明之證但云以法治之其法維何即發汗利小便已胃中躁煩實大便難之説也若未利其小便則有豬苓五苓之法若津液熱熾又有人參白虎之法仲景圓機活潑人存政舉未易言矣少陽證不必皆傳自陽明也其人若膽中素有積熱偶受外感即可口苦心煩寒熱往來於柴胡湯中加生石膏滑石生杭芍各六錢從小便中分消其熱服後即愈若其左關甚有力者生石膏可用至一兩小柴胡湯證宜加石膏者甚多不但此證也自無轉陽明之虞也小柴胡湯本為平和之劑而當時醫界恆畏用之忌柴胡之升提也即名醫若葉天士亦恆於當用柴胡之處避而不用或以青蒿代之誠以古今之人稟賦實有不同古人稟質醇厚不忌藥之升提今人體質多上盛下虛上焦因多有浮熱見有服柴胡而頭疼目眩者見有服柴胡而齒齦出血者其人若素患吐血及腦充血證者尤所忌服至愚用小柴胡湯時恆將原方為之變通今試舉治驗之數案以明之同莊張少愚八歲一方之良醫也其初習醫時曾病少陽傷寒寒熱往來頭疼發熱心中煩而喜嘔脈象弦細重按有力愚為疏方調治用柴胡四錢黃芩人參甘草半夏各三錢大棗四枚生薑三大片生石膏一兩俾煎湯一大盅服之張疑而問曰此方乃小柴胡湯外加生石膏也按原方中分量柴胡半斤以一兩折為今之三錢計之當為二兩四錢復三分之當為今之八錢今方中他藥皆用其原分量獨柴胡減半且又煎成一盅服之不復去滓重煎其故何也弟初習醫未明醫理願兄明以教我也答曰用古人之方原宜因證因時為之變通非可膠柱鼓瑟也此因古今氣化略有不同即人之稟賦遂略有差池是以愚用小柴胡湯時其分量與藥味恆有所加減夫柴胡之性不但升提實原兼有發表之力古法去滓重煎者所以減其發表之力也今於方中加生石膏一兩以化其發表之力即不去滓重煎自無發表之虞且因未經重煎其升提之力亦分毫無損是以止用一半其力即能透膈上出也放心服之自無差謬張果信用愚言煎服一劑諸病皆愈鄰村劉姓婦人得傷寒少陽證寒熱往來無定時心中發熱嘔吐痰涎連連不竭脈象沉弦為開小柴胡湯原方亦柴胡減半用四錢加生石膏一兩雲苓片四錢有知醫者在座疑而問曰少陽經之證未見有連連吐黏涎不竭者今先生用小柴胡湯又加石膏茯苓將勿不但為少陽經病或又兼他經之病乎答曰君之問誠然也此乃少陽病而連太陰也少陽之去路原為太陰之經太陰在腹為濕土之氣若與少陽相併則濕熱化合即可多生黏涎故於小柴胡湯中加石膏茯苓以清少陽之熱即以利太陰之濕也知醫者聞之甚為歎服遂將此方煎服兩劑全愈在遼寧曾治一婦人寒熱往來熱重寒輕夜間恆作讝語其脈沉弦有力因憶傷寒論謂婦人熱入血室證晝日明瞭暮則讝語遂細詢之因知其初受外感三四日月信忽來至月信斷後遂變斯證據所云云知確為熱入血室是以其脈沉弦有力也遂為開小柴胡原方將柴胡減半外加生黃耆二錢川芎錢半以升舉其邪之下陷更為加生石膏兩半以清其下陷之熱將小柴胡如此變通用之外感之邪雖深陷實不難逐之使去矣將藥煎服一劑病愈強半又服一劑全愈按熱入血室之證其熱之甚者又宜重用石膏二三兩以清其熱血室之中不使此外感之熱稍有存留始無他虞愚曾治有血室潰爛膿血者數人而究其由來大抵皆得諸外感之餘其為熱入血室之遺恙可知矣蓋當其得病之初醫者縱知治以小柴胡湯其遇熱之劇者不知重用石膏以清血室之熱遂致釀成危險之證此誠醫者之咎也醫者有治熱入血室之證者尚其深思愚言哉少陽病大柴胡湯證柴胡湯證有但服小柴胡不能治愈必治以大柴胡湯始能治愈者此病欲借少陽之樞轉外出而阻於陽明之闔故宜於小柴胡湯中兼用開降陽明之品也傷寒論原文太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈大柴胡湯方柴胡半斤黃芩三兩芍藥三兩半夏半升洗生薑五兩切枳實四兩炙大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩傷寒論大柴胡湯少陽兼陽明之方也陽明胃府有熱少陽之邪又復挾之上升是以嘔不止心下急鬱郁微煩欲用小柴胡湯提出少陽之邪使之透膈上出恐其補胃助熱而減去人參更加大黃以降其熱步伍分明出奇致勝此所以為百戰百勝之師也乃後世畏大黃之猛遂易以枳實逮用其方不效不得不仍加大黃而竟忘去枳實此大柴胡一方或有大黃或無大黃之所由來也此何以知之因此方所主之病宜用大黃不宜用枳實而知之蓋方中以柴胡為主藥原欲升提少陽之邪透膈上出又恐力弱不能直達故小柴胡湯中以人參助之今因證兼陽明故不敢復用人參以助熱而更加大黃以引陽明之熱下行此陽明與少陽並治也然方名大柴胡原以治少陽為主而方中既無人參之助若復大黃枳實並用既破其血又破其氣縱方中有柴胡猶能治其未罷之柴胡證乎蓋大黃雖為攻下之品然偏於血分仍於氣分無甚傷損即與柴胡無甚齟齬至枳實能損人胸中最高之氣其不宜與柴胡並用明矣愚想此方當日原但加大黃後世用其方者畏大黃之猛烈遂易以枳實逮用其方不效不得不仍加大黃而竟忘去枳實此為大柴胡或有大黃或無大黃以致用其方者恆莫知所從也以後凡我同人有用此方者當以加大黃去枳實為定方矣究之古今之氣化不同人身之強弱因之各異大柴胡湯用於今日不惟枳實不可用即大黃亦不可輕用試舉兩案以明之邑諸生劉其女適邑中某氏家庭之間多不適意於季秋感冒風寒延其近處醫者治不愈劉邀愚往診病近一旬寒熱往來其胸中滿悶煩躁皆甚劇時作嘔吐脈象弦長有力愚語劉曰此大柴胡湯證也從前醫者不知此證治法是以不愈劉亦以愚言為然遂為疏方用柴胡四錢黃芩芍藥半夏各三錢生石膏兩半碎竹茹四錢生薑四片大棗四枚俾煎服劉疑而問曰大柴胡湯原有大黃枳實今減去之加石膏竹茹將勿藥力薄弱難奏效乎答曰藥之所以能愈病者在對證與否不在其力之強弱也宜放膽服之若有不效余職其咎病人素信愚聞知方中有石膏亦願急服遂如方煎服一劑須臾覺藥有推蕩之力胸次頓形開朗煩躁嘔吐皆愈劉疑而問曰余疑藥力薄弱不能奏效而不意其奏效更捷此其理將安在耶答曰凡人得少陽之病其未病之先肝膽恆有不舒木病侮土脾胃亦恆先受其擾逮其陽明在經之邪半入於府半傳於少陽於斯陽明與少陽合病其熱之入於府中者原有膨脹之力復有肝膽以擾之其膨脹之熱益逆行上干而凌心此所以煩躁與脹滿並劇也小柴胡湯去人參原可舒其肝膽肝膽既舒自不復擾及脾胃又重用石膏以清入府之熱俾其不復膨脹上干則煩躁與滿悶自除也況又加竹茹之開胃止嘔者以輔翼之此所以奏效甚捷也又治一人年逾弱冠稟賦素羸弱偶於初夏因受感冒病於旅邸求他醫治療將近一旬病猶未愈後愚診視其父正為病人煎藥視其方乃系發表之劑及為診視則白虎湯證也囑其所煎之藥千萬莫服其父求為疏方因思病者稟賦素弱且又在勞心之餘若用白虎湯原宜加人參然其父雖信愚而其人實小心過度若加人參石膏必須多用或因此不敢徑服況病者未嘗汗下且又不渴想但用白虎湯不加人參亦可奏效遂為開白虎湯原方酌用生石膏二兩其父猶嫌其多愚曰此因君平素小心特少用耳非多也又因脈有數象外加生地黃一兩以滋其陰分囑其煎湯兩盅分兩次溫飲下且囑其若服後熱未盡退其大便不滑瀉者可即原方仍服一劑逮愚旋里後其藥止服一劑熱退十之八九雖有餘熱未清不敢再服遲旬日大便燥結不下兩腿微腫擬再迎愚診視適有其友人某稍知醫學謂其腿腫係為前次重用生石膏二兩所傷其父信友人之言遂改延他醫見其大便燥結投以降下之劑方中重用大黃八錢將藥服下其人即不能語矣其父見病勢垂危急遣人迎愚未及診視而亡矣夫此證之所以便結腿腫者因其餘熱未清藥即停止也乃調養既失之於前又誤藥之於後竟至一誤再誤而不及挽救使其當時不聽其友之盲論仍迎愚為診治或再投以白虎湯或投以白虎加人參湯將石膏加重用之其大便即可因服涼潤之藥而通下大便既通小便自利腿之腫者不治自愈矣就此案觀之則知大柴胡湯中用大黃誠不如用石膏也重用白虎湯即可代承氣曾於前節論承氣湯時詳言之蓋愚當成童時醫者多篤信吳又可用大劑承氣湯以治陽明府實之證莫不隨手奏效及愚業醫時從前之篤信吳又可者竟恆多僨事此相隔不過十餘年耳況漢季至今千餘年哉蓋愚在醫界頗以善治寒溫知名然對於白虎湯或白虎加人參湯旬日之間必用數次而對於承氣湯恆終歲未嘗一用也少陽篇三陽合病之治法少陽篇有三陽並病之證提綱中詳其病狀而未列治法此或有所遺失歟抑待後人遇此證自為擬方歟愚不揣固陋本欲擬一方以補之猶恐所擬者未必有效今試即其所載病狀以研究其病情再印徵以生平所治之驗案或於三陽合病之治法可得其倣佛歟傷寒論原文三陽合病脈浮大上關上但欲眠睡目合則汗陶華氏謂此節所言之病當治以小柴胡加葛根芍藥而愚對於此證有治驗之案二則又不拘拘於小柴胡湯中加葛根芍藥也試詳録二案於下以質諸醫界一人年過三旬於初春患傷寒證經醫調治不愈七八日間延為診視頭疼周身發熱噁心欲吐心中時或煩躁頭即有汗而身上無汗左右脈象皆弦右脈尤弦而有力重按甚實關前且甚浮即此脈論其左右皆弦者少陽也右脈重按甚實者陽明也關前之脈浮甚者太陽也此為三陽合病無疑其既有少陽病而無寒熱往來者緣與太陽陽明相併無所為往無所為來也遂為疏方生石膏玄參各一兩連翹三錢茵陳甘草各二錢俾共煎湯一大盅頓服之將藥服後俄頃汗出遍體近一點鐘其汗始竭從此諸病皆愈其兄頗通醫學疑而問曰此次所服藥中分毫無發表之品而服後竟由汗解而愈者何也答曰出汗之道在調劑其陰陽聽其自汗非可強發其汗也若強發其汗則汗後恆不能愈且轉至增劇者多矣如此證之三陽相併其病機本欲借徑於手太陰之絡而外達於皮毛是以右脈之關前獨浮也乃因其重按有力知其陽明之積熱猶團結不散故用石膏玄參之涼潤者調劑其燥熱涼熱化合自能作汗又少加連翹茵陳可代柴胡以宣通之遂得盡隨病機之外越者達於皮毛而為汗解矣此其病之所以愈也又治一人年近三旬因長途勞役感冒甚重匆匆歸家臥床不起經醫診治半月病益加劇及愚視之見其精神昏憒讝語不休肢體有時惕動不安其兩目直視似無所見其周身微熱而間有發潮熱之時心中如何詢之不能自言其大便每日下行皆系溏糞其脈左右皆弦細而浮數逾六至重按即無根據此證之肢體惕動兩目直視且間發潮熱者少陽也精神昏憒讝語不休者陽明也其脈弦而甚浮者乃自少陽還太陽也是以謂之三陽合病也傷寒論少陽篇所謂三陽合病然傷寒論中所言者是三陽合病之實證而此症乃三陽合病之虛證且為極虛之證凡三陽合病以病已還表原當由汗而解此病雖虛亦當由汗而解也特以脈數無根真陰大虧陽升而陰不能應是以不能化合而為汗耳治此證者當先置外感於不問而以滋培其真陰為主連服數劑俾陰分充足自能與陽氣化合而為汗汗出而病即愈矣若但知病須汗解當其脈數無根之時即用藥強發其汗無論其汗不易出也即服後將汗發出其人幾何不虛脫也愚遂為開生地黃熟地黃生山藥大枸杞各一兩玄參沙參淨萸肉各五錢煎湯一大碗分兩次溫飲下此藥一日夜間連進兩劑翌晨再診其脈不足六至精神亦見明瞭自服藥後大便未行遂於原方中去萸肉加青連翹二錢服後周身得汗病若失太陰病提綱及意義病由少陽而愈者借少陽之樞轉而外出也乃有治不如法其病不能借少陽之樞轉外出而轉由腔上之膜息息透入腹中是由少陽而傳太陰也夫病既傳於太陰其病情必然變易自當另議治法是則太陰經發現之病狀與其治法又當進而研究矣傷寒論原文太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸中結硬脾為太陰之府其處重重油脂包裹即太陰之經也蓋論其部位似在中焦之內惟其處油脂獨厚於他處是太陰之經雖與三焦相連而實不與三焦相混也且難經謂脾有散膏半斤即西人所謂甜肉汁原系胰子團結而成方書謂系脾之副臟其分泌善助小腸化食實亦太陰經之區域也為其經居於腹之中間是以腹滿為太陰經之的病其吐食自利者此經病而纍及於府脾病不能運化飲食是以吐利交作也其腹痛者因病在太陰中焦鬱滿而氣化不通也下之必胸中結硬者因下後脾氣下陷不能散精以達於肺內經謂脾氣散精以達於肺遂致鬱於胸中而為結硬也此節提綱甚詳而未言治法及下節匯通觀之可自得其治法矣傷寒論原文太陰中風四肢煩疼陽微陰澀而長者為欲愈唐容川曰此節言太陰中風脈若陽大而陰滑則邪盛內陷矣今陽不大而微陰澀而又見長者乃知微澀是邪不盛不是正氣虛長是正氣足不嫌其微澀故為欲愈也一人年甫弱冠當仲春之時因伏氣化熱竄入太陰腹中脹滿心中煩躁兩手腫疼其脈大而濡兩尺重按頗實因思腹中者太陰之部位也腹中脹滿乃太陰受病也太陰之府為脾脾主四肢因伏氣化熱竄入太陰是以兩手腫疼也其兩足無恙者因竄入太陰者原系熱邪熱之性喜上行是以手病而足不病也為其所受者熱邪是以覺煩躁也因憶傷寒論太陰篇有謂太陰中風四肢煩疼陽微陰澀而長者為欲愈今此證所現之脈正與欲愈之脈相反是不得不細商治法也為疏方用生萊蔔子生雞內金各三錢以開其脹滿滑石生杭芍各六錢以清其煩躁青連翹生蒲黃各四錢以愈其兩手腫疼按方煎服兩劑諸病皆愈誠以太陰之病原屬濕熱其濕熱之鬱蒸於上者服此湯後得微汗而解其濕熱之陷溺於下者服此湯後亦可由小便分利而解矣若執此案之方以治前節所言之病於方中加法半夏三錢則在上之吐可止再加生山藥八錢下焦之利亦可愈至方中之連翹蒲黃不但能治手腫疼即腹中作痛服之亦能奏效將方中藥味略為增加以治前節之病亦可隨手治愈也太陰病桂枝湯證太陰之病有時可由汗解者然必須病機有外越之勢原非強發其汗也傷寒論原文太陰病脈浮者可發汗宜桂枝湯脈浮者乃太陰之病機外越原可因其勢而導之故可服桂枝湯以發其汗也若其脈之浮而有力者宜將桂枝減半用錢半加連翹三錢蓋凡脈有浮熱之象者過用桂枝恆有失血之虞而連翹之性涼而宣散凡遇脈象之浮而有力者恆得之即可出汗故減桂枝之半而加之以發汗也恐其汗不出者服藥後亦可啜粥若間有太陰腹滿之本病者可加生萊蔔子三錢蓋萊蔔子生用其辛辣之味不但可以消脹滿又可助連翹發汗也太陰病宜四逆輩諸寒證太陰自少陽傳來原無寒證乃有其臟本素有寒積經外感傳入而觸發之致太陰外感之證不顯而惟顯其內蓄之寒涼以為病者是則不當治外感惟宜治內傷矣傷寒淪原文自利不渴者屬太陰以其臟有寒故也當溫之宜四逆輩陳修園曰自利者不因下而利也凡利則津液下注多見口渴惟太陰濕土之為病不渴至於下利者當溫之而渾言四逆輩所包括之方原甚廣王和安謂溫其中兼溫其下宜四逆但溫其中宜理中吳茱萸寒結宜大建中湯濕宜真武湯渴者宜五苓散不渴而滑宜赤石脂禹餘糧湯而愚則謂甘草乾薑湯乾薑附子湯茯苓四逆湯諸方皆可因證選用也太陰病壞證桂枝加芍藥湯及桂枝加大黃湯證太陰之證不必皆由少陽傳來也又間有自太陽傳來者然自少陽傳來為傳經次第之正傳自太陽傳來則為誤治之壞證矣傷寒論原文本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之太陽病誤下之後外感之邪固可乘虛而入太陰究之脾土驟為降下所傷肝木即乘虛而侮脾土腹中之滿而且痛實由肝脾之相齟齬也桂枝原為平肝和脾氣香能醒脾辛溫之性又善開脾瘀之聖藥而輔以芍藥甘草薑棗又皆為柔肝扶脾之品是桂枝湯一方若免去啜粥即可為治太陰病之正藥也至於本太陽證因誤下病陷太陰腹滿時痛而獨將方中芍藥加倍者因芍藥善治腹痛也試觀仲景用小柴胡湯腹痛者去黃芩加芍藥通脈四逆湯腹痛者去蔥加芍藥此明徵也若與甘草等分同用為甘草芍藥湯原為仲景復陰之方愚嘗用之以治外感雜證驟然腹痛須審其腹痛非涼者莫不隨手奏效惟其所用之分量芍藥倍於甘草是為適宜蓋二藥同用原有化合之妙此中精微固不易窺測也且二藥如此並用大有開通之力則不惟能治腹痛且能除腹滿也惟此方中芍藥加倍為六兩甘草仍為二兩似嫌甘草之力薄弱服後或難速效擬將甘草亦加重為三兩應無藥性偏重之弊歟桂枝加芍藥湯方桂枝三兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘上五味以水七升煮取三升去滓分溫三服桂枝加大黃湯方即前方加大黃二兩少陰病提綱及意義中焦脂膜團聚之處脾居其中斯為太陰前已言之而下焦脂膜團聚之處腎居其中故名少陰少陰之府在腎少陰之經即團聚之脂膜也為其與中焦團聚之處相連是以外感之傳遞可由太陰而傳入少陰也傷寒論原文少陰之為病脈微細但欲寐也少陰之病有涼有熱説者謂若自太陰傳來是陽明少陽之邪順序傳入少陰則為熱證若外感之邪直中真陰則為寒證者而愚臨證實驗以來知少陰病之涼者原非直中乃自太陽傳來為表裡之相傳亦為腑臟之相傳膀胱因太陽之府相連之脂膜原與包腎之脂膜相通也其間有直中者或因少陰驟虛之時飲食寒涼而得此不過百中之一二其治法原當另商也至少陰病之熱者非必自傳經而來多由伏氣化熱入少陰也所謂伏氣者因其素受外寒甚輕不能即病其所受之寒氣伏於三焦脂膜之中阻塞氣化之升降而化熱氣化因阻塞而生熱伏氣即可與之相合而化熱恆因少陰之虛損伏氣即乘虛而竄入少陰此乃少陰之熱病初得即宜用涼藥者也至無論其病之或涼或熱而脈皆微細者誠以脈之跳動發於心而脈之所以跳動有力者又關於腎心腎者水火之根源也心腎之氣相濟則身中之氣化自然壯旺心腎之氣若相離身中之氣化遽形衰憊少陰有病者其腎氣為外邪遏抑不能上升以濟心是以無論病之為涼為熱其脈象皆微細無力也其但欲寐者因心腎之氣不交身中之氣化衰憊精神必然倦懶是以常常閉目以靜自休息又因腎氣不能上達以吸引心陽下潛是以雖閉目休息不能成寐而為但欲寐之狀也傷寒論原文少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也張拱端曰少陽為陽樞少陰為陰樞少陰欲吐不吐者以少陰有水復有火水火之氣循環上下不利故欲吐不吐也少陽喜嘔者以內外之氣由焦膜中行焦膜不利則氣難於出入是以逆於胃而為嘔嘔則氣少暢故喜嘔此少陰欲吐少陽喜嘔之所以然也又太陰少陰俱有自利證少陰自利而渴從少陰本熱之化也太陰自利不渴從太陰本濕之化也若治少陰上焦口渴之實熱不顧及下焦下利之虛寒則下利不止矣故凡對於水火分病則當用寒熱之藥分治之對於水火合病無妨用寒熱之藥合治之本論用方有純於寒有純於熱復有寒熱並用者即此理也本節未列治法張氏謂上有實熱下有虛寒宜用寒熱之藥函問師答曰宜用生地一兩生杭芍五錢附子二錢乾薑二錢細辛一錢計五味不宜用石膏高注傷寒論原文少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰之中有水有火腎左右兩枚水也腎繫命門所生之相火少陰中之火也外寒自太陽透入少陰與少陰中之水氣相併以阻遏其元陽是以脈現緊象緊者寒也乃陰盛陽衰逼陽不得宣布之象也逮陽氣蓄之既久至七八日又重值太陽陽明主氣之候命門之火因蓄極而暴發遂迫陰寒自下利外出脈之緊者亦暴微蓋脈緊原陽為陰迫致現弦而有力之象至暴微是由緊而變為和緩未必甚微與緊相較則見其微矣且其手足反溫此為元陽已回之兆無疑治少陰中之寒病者原以保護其元陽為主此時或有心煩之病實因相火暴發偶有浮越於上者此益足徵元陽之來復也是以知其必愈也陳修園曰此言少陰得陽熱之氣而解也余自行醫以來每遇將死之證必以大藥救之忽而發煩下利病家怨而更醫醫家亦詆前醫之誤以搔不著疼癢之藥居功余反因熱腸受謗甚矣名醫之不可為也愚年少時初閲傷寒論淺注至此疑修園之言似近自為掩飾逮醫學研究既久又加以臨證實驗乃知修園之言誠不誣也後又見常德張拱端所著傷寒論會參亦謂修園之言誠然且謂余治一人服藥後下利苦煩又喜哈哈似癲非癲數時病愈亦與此節煩利自愈一例也而愚則謂若遇少陰陰寒險證欲用藥以回其陽時不妨預告病家陽回之後恆現下利心煩之象自能免病家之生疑也子按數年前余在裡處曾治一少陰寒證服藥後下利發煩而愈一九三三年臘月在津又治閻少陰寒證服茴香乾薑等藥久不愈乃詢方於余俾單服生硫黃如棗大食前服每日三次至五六日忽下利日二三次駭而問余余曰此寒結得硫黃之熱而開傷寒論所謂雖煩下利必自愈者是也後數日利果止其病亦愈傷寒論原文少陰病下利若利自止惡寒而蜷臥手足溫者可治張拱端曰以上三節俱少陰陰寒之病前兩節手足溫第三節自煩欲去衣被均為陽回之候均為自愈可治之證可見治少陰傷寒以陽為主不特陰證見陽脈者生即陰病見陽證亦為易愈論中惡寒而蜷之蜷字足供陰寒在內之考察何也大凡陰寒之病俱有屈曲身體之形其屈曲之理實關係於督任二脈蓋以督統諸陽行於背脊任統諸陰行於胸腹陰寒在內屈曲身體者伸背之陽以抑陰也陽熱在內直腰張胸者伸腹之陰以濟陽也如天氣熱人必張胸天氣寒人必拘急觀其伸陽以自救則蜷之屬於陰寒其理可得矣故陽盛則作痙陰盛則蜷臥理所必然也至於自煩欲去衣被是陰得陽化故為可治張氏論督任相助之理以釋本節中之蜷臥頗為精細而愚於張氏所論之外則更別有會心也推坎離相濟陰陽互根之理人之心腎相交即能生熱心腎相交能補助元陽故能生熱而心腎之相交每在呼氣外出之時也蓋當呼氣外出之時其心必然下降其腎必然上升此可默自體驗此際之一升一降而心腎交矣是乃呼吸間自然之利益以為人身熱力之補助也試觀睡時恆畏冷以人睡著則呼吸慢熱力即頓形不足是明徵也人之畏冷身蜷臥者是其心腎欲相交以生熱也此中有無思無慮自然而然之天機至於病熱其身恆後挺是心腎欲相遠防其相交以助熱也傷寒論原文少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯陳修園謂宜灸太溪二穴張拱端謂亦可灸復溜二穴而愚則謂若先灸太溪二穴脈仍不應可再灸復溜二穴灸時宜兩腿一時同灸太溪二穴在足內踝後五分跟骨上動脈中復溜二穴在內踝上二寸大骨後側陷中此與太溪同為少陰生脈之源少陰病麻黃附子細辛湯證傷寒論原文少陰病始得之反發熱脈沉者麻黃附子細辛湯主之此外感之寒涼由太陽直透少陰乃太陽與少陰合病也為少陰與太陽合病是以少陰已為寒涼所傷而外表縱有發熱之時然此非外表之壯熱乃惡寒中之發熱耳是以其脈不浮而沉蓋少陰之脈微細微細原近於沉也故用附子以解裡寒用麻黃以解外寒而復佐以辛溫香竄之細辛既能助附子以解裡寒更能助麻黃以解外寒俾其自太陽透入之寒仍由太陽作汗而解此麻黃附子細辛湯之妙用也麻黃附子細辛湯方麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日三服方中細辛二兩折為今之六錢復三分之一劑中仍有二錢而後世對於細辛有服不過錢之説張隱菴曾明辨其非二錢非不可用而欲免病家之疑用一錢亦可奏效蓋凡宜發汗之病其脈皆浮此獨脈沉而欲發其汗故宜用細辛輔之至謂用一錢亦可奏效者因細辛之性原甚猛烈一錢亦不為少矣此方若少陰病初得之但惡寒不發熱者亦可用曾治一少年時當夏季午間恣食西瓜因夜間失眠遂於食余當窗酣睡值東風驟至天氣忽變寒涼因而凍醒其未醒之先又復夢中遺精醒後遂覺周身寒涼抖戰腹中隱隱作疼須臾覺疼浸加劇急迎為診治其脈微細若無為疏方用麻黃二錢烏附子三錢細辛一錢熟地黃一兩生山藥淨萸肉各五錢乾薑三錢公丁香十粒共煎湯服之服後溫復周身得微汗抖戰與腹疼皆愈此於麻黃附子細辛湯外而復加藥數味者為其少陰暴虛腹中疼痛也李夏日得少陰傷寒用麻黃附子細辛湯加生山藥大熟地二味治愈少陰病黃連阿膠湯證傷寒論原文少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之二三日以上即一日也合一二三日而渾言之即初得也細繹其文是初得即為少陰病非自他經傳來也其病既非自他經來而初得即有熱象者此前所謂伏氣化熱而竄入少陰者也蓋凡伏氣化熱之後恆因薄受外感而猝然發動至其竄入之處又恆因其臟腑素有虛損伏氣即乘虛而入由斯而論則此節之所謂少陰病乃少陰病中之腎虛兼熱者也夫大易之象坎上離下為既濟坎為腎而在上者此言腎當上濟以鎮心也離為心而在下者此言心當下濟以暖腎也至腎素虛者其真陰之氣不能上濟以鎮心心火原有搖搖欲動之機是以少陰之病初得腎氣為伏氣所阻欲上升以濟心尤難故他病之現象猶未呈露而心中已不勝熱象之煩擾而不能安臥矣是以當治以黃連阿膠湯也黃連阿膠湯黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三味取二升去滓納膠煬盡小冷納雞子黃攪令相得溫取七合甘三服黃連味苦入心性涼解熱故重用之以解心中發煩輔以黃芩恐心中之熱擾及於肺也又肺為腎之上源清肺亦所以清腎也芍藥味兼苦酸其苦也善降其酸也善收能收降浮越之陽使之下歸其宅而性涼又能滋陰兼能利便故善滋補腎陰更能引腎中外感之熱自小便出也阿膠其性善滋陰又善潛伏能直入腎中以生腎水雞子黃中含有副腎髓質之分泌素推以同氣相求之理更能直入腎中以益腎水腎水充足自能勝熱逐邪以上鎮心火之妄動而心中發煩自愈矣或問提綱明言心中煩而不能臥夫心與腎共為少陰使其心之本體熱而生煩其人亦恆不能安臥此雖為手少陰亦可名為少陰病也何先生獨推本於腎由腎病而纍及於心乎答曰凡曰少陰病者必脈象微細開端提綱中已明言之矣若謂其病發於心因心本體過熱而發煩則其脈必現浮洪之象今其心雖有熱而脈象仍然微細若脈非微細而有變更者本節提綱中必言明此定例也則知其病之源不在於心而在於腎可知其心中發煩不得臥實因腎病而纍及於心更可知也此節所言之病原系少陰病初得無大熱者故治以黃連阿膠湯已足清其熱也若其為日既久而熱浸加增或其腎經素有蘊熱因有伏氣之熱激發之則其熱益甚以致心腎皆熱其壯熱充實於上下又非此湯所能勝任矣愚遇此等證則恆用白虎加人參湯以玄參代知母山藥代粳米又加鮮茅根生雞子黃莫不隨手奏效用之救人多矣因名之為坎離互根湯詳録其方之分量及煎法於下生石膏三兩細末玄參一兩生懷山藥八錢甘草三錢野臺參四錢鮮白茅根六兩洗淨切碎生雞子黃三枚上共六味先將茅根煎三四沸去滓納余藥五味煎湯三盅分三次溫服每服一次調入雞子黃一枚方中之意石膏人參並用不但能解少陰之實熱並能於邪熱熾盛之時立復真陰輔以茅根更能助腎氣上升與心火相濟也至於玄參性涼多液其質輕鬆原善清浮遊之熱而心之煩躁可除其色黑入腎又能協同雞子黃以滋腎補陰俾少陰之氣化壯旺自能逐邪外出也或問外感之伏氣恆受於冬日至春日陽升隨春日之陽而化熱是以溫病多有成於伏氣化熱者至傷寒約皆在於冬日何亦有伏氣化熱者乎答曰伏氣化熱原有兩種化法伏氣冬日受之伏於三焦脂膜之中遲至春日隨春日之陽生而化熱此伏氣化熱之常也乃有伏氣受於冬日其所伏之處阻塞腹內升降之氣化其氣化因阻塞而生熱伏氣亦可隨之化熱此伏氣化熱之變也逮其化熱之後或又微受外感而觸發之其觸發之後又恆因某經素有虛損乘虛而竄入其經此所以傷寒病中亦有伏氣化熱者也少陰病當灸及附子湯證傷寒論原文少陰病得之一二日口中和其背惡寒者當灸之附子湯主之陳修園曰此宜灸鬲關二穴以救太陽之寒再灸關元一穴以助元陽之氣元陽存於何處蓋人身有兩氣海內經謂膈上為氣海此後天之氣海所藏者宗氣也即胸中大氣哲學家以臍下為氣海此先天之氣海所藏者祖氣即元氣也人身之元陽以元氣為體質元氣即以元陽為主宰誠以其能斡旋全身則為元氣能溫暖全身則為元陽此元陽本於先天原為先天之君火以命門之相火為之輔佐者也此與以心火為君火以肝中所寄之少陽相火為相火者有先天后天之分至下焦氣海之形質原為脂膜及胰子團結而中空醫林改錯所謂形如倒提雞冠花者是也人生結胎之始先生此物由此而下生督脈上生任脈以生全身故其處最為重要之處實人生性命之根也有謂人之元氣元陽藏貯於胞室者不知胞室若在女子其中生瘡潰爛原可割而去之若果為藏元氣元陽之處豈敢為之割去乎傷寒論原文少陰病身體痛手足寒骨節痛脈沉者附子湯主之附子湯方附子二枚炮去皮破八片茯苓二兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服少陰病桃花湯證傷寒論原文少陰病下利便膿血者桃花湯主之傷寒論原文少陰病二三日至四五日腹痛小便不利下膿血者桃花湯主之少陰之病寒者居多故少陰篇之方亦多用熱藥此二節之文未嘗言寒亦未嘗言熱然桃花湯之藥則純系熱藥無疑也乃釋此二節者疑下利膿血與小便不利必皆屬熱遂強解桃花湯中藥性謂石脂性涼而重用一斤乾薑雖熱而只用一兩合用之仍當以涼論者然試取石脂一兩六錢乾薑一錢煎服或涼或熱必能自覺藥性豈可重誤乎有謂此證乃大腸因熱腐爛致成潰瘍故下膿血神農本草經謂石脂能消腫去瘀故重用一斤以治潰瘍復少用乾薑之辛烈以消潰瘍中之毒菌然愚聞之毒菌生於熱者惟涼藥可以消之黃連苦參之類是也生於涼者惟熱藥可以消之乾薑川椒之類是也桃花湯所主之下膿血果系熱毒何以不用黃連苦參佐石脂而以乾薑佐石脂乎雖乾薑只用一兩亦可折為今之三錢雖分三次服下而病未愈者約必當日服盡夫一日之間服乾薑三錢其熱力不為小矣而以施之熱痢下膿血者有不加劇者乎蓋下利膿血原有寒證即小便不利亦有寒者注疏諸家疑便膿血及小便不利皆為熱證之發現遂不得不於方中藥品強為之解斯非其智有不逮實因臨證未多耳遼寧何年三十許因初夏在外地多受潮濕下痢膿血相雜屢治不愈後所下者漸變紫色有似爛炙雜以脂膜腹中切痛醫者謂此因腸中腐敗故所下如此若不能急為治愈則腸將斷矣何聞之懼甚遂乘火車急還遼寧長途辛苦至家病益劇下痢無度而一日止食稀粥少許求為診治其脈微弱而沉左三部幾不見問其心中自覺飲食不能消化且覺上有浮熱諸般飲食皆懶下咽下痢一晝夜二十餘次每欲痢時先覺腹中墜而且疼細審病因確係寒痢無疑其所下者如爛炙雜以脂膜者是其腸中之膜誠然腐敗隨痢而下也西人謂此證為腸潰瘍乃赤痢之壞證最為危險所用之藥有水銀基製品而用於此證實有不宜即愚平素所遇腸潰瘍證亦恆治以金銀花旱三七鴨膽子諸藥對於此證亦不宜蓋腸潰瘍證多屬於熱而此證獨屬於寒此誠腸潰瘍證之僅見者也遂俾用生硫黃細末摻熟面少許為小丸又重用生山藥熟地黃龍眼肉煎濃湯送服連服十餘劑共服生硫黃二兩半日服藥一劑頭煎次煎約各送服生硫黃八分許其痢始愈此證脈微弱而沉少陰之脈也下者如爛炙兼脂膜較下膿血為尤甚矣使其初得下膿血時投以桃花湯不即隨手可愈乎乃至病危已至極點非桃花湯所能勝任故仍本桃花湯之義以硫黃代乾薑上焦有浮熱者忌乾薑不忌硫黃用生山藥熟地黃龍眼肉以代石脂病入陰虛石脂能固下不能滋陰山藥諸藥能固下兼能滋陰如此變通仍不失桃花湯之本義是以多服十餘劑亦能奏效也至此節之下節下利不止下膿血又添腹痛小便不利證亦桃花湯主之蓋小便不利因寒者亦恆有之故投以桃花湯亦能愈也奉天石忽然小便不通入西醫院治療西醫治以引溺管小便通出有頃小便復存蓄若干西醫又納以橡皮管使久在其中有溺即通出乃初雖稍利繼則小便仍不能出遂來院求為診治其脈弦遲細弱自言下焦疼甚且涼甚知其小便因涼而凝滯也為擬方用人參椒目懷牛膝各五錢附子肉桂當歸各三錢乾薑小茴香威靈仙甘草沒藥各二錢連服三劑腹疼及便閉皆愈遂停湯藥俾日用生硫黃細末錢許分兩次服下以善其後方中之義人參靈仙並用可治氣虛小便不利椒目桂附乾薑並用可治因寒小便不利又佐以當歸牛膝茴香沒藥甘草諸藥或潤而滑之或引而下之或馨香以通竅或溫通以開瘀或和中以止疼衆藥相濟為功所以奏效甚速也觀此小便不利及傷寒論少陰症桃花湯後所附下利膿血治驗之案皆為寒證非熱證也明矣桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服石脂原為土質其性微溫故善溫養脾胃為其具有土質頗有黏澀之力故又善治腸澼下膿血又因其生於兩石相併之夾縫原為山脈行氣之處其質雖黏澀實兼能流通氣血之瘀滯故方中重用之以為主藥至於一半煎湯一半末服者因凡治下利之藥丸散優於湯劑且其性和平雖重用一斤猶恐不能勝病故又用一半篩其細末納湯藥中服之也且服其末又善護腸中之膜不至為膿血凝滯所傷損也用乾薑者因此證其氣血因寒而瘀是以化為膿血乾薑之熱既善祛寒乾薑之辛又善開瘀也用粳米者以其能和脾胃兼能利小便亦可為治下利不止者之輔佐品也少陰病吳茱萸湯證傷寒論原文少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之柯韻伯曰少陰病吐利煩躁四逆者死四逆者四肢厥冷兼臂脛而言也此雲手足是指掌而言四肢之陽猶在也吳茱萸湯吳茱萸一升湯洗七遍人參三兩切生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服吳茱萸湯之實用乃肝胃同治之劑也至於此證煩躁欲死非必因肝邪盛極實因寒邪阻塞而心腎不交也蓋人心腎之氣果分毫不交其人即危不旋踵至於煩躁欲死其心腎幾分毫不交矣夫心腎之所以相交者實賴脾胃之氣上下通行是以少陰他方中皆用乾薑而吳茱萸湯中則重用生薑至六兩取其溫通之性能升能降生薑善發汗是其能升善止嘔吐是其能降以開脾胃凝滯之寒邪使脾胃之氣上下通行則心腎自能隨脾胃氣化之升降而息息相通矣少陰病苦酒湯證傷寒論原文少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之苦酒湯半夏洗破如棗核十四枚雞子一枚去黃內上苦酒著雞子殼中上兩味納半夏著苦酒中以雞子殼著刀環中安火上令三沸去滓少少含咽之不瘥更作三劑按苦酒即醋也又方中棗核當作棗仁不然破半夏如棗核大十四枚即雞子空殼亦不能容況雞子殼中猶有雞子清與苦酒乎古用半夏皆用生者湯洗七次即用此方中半夏宜用生半夏先破之後用湯洗始能洗出毒涎唐容川曰此節所言生瘡即今之喉癰喉蛾腫塞不得出聲今有用刀針破之者有用巴豆燒焦烙之者皆是攻破之使不壅塞也仲景用生半夏正是破之也余親見治重舌敷生半夏立即消破即知咽喉腫閉亦能消而破之矣且半夏為降痰要藥凡喉腫則痰塞此仲景用半夏之妙正是破之又能去痰與後世刀針巴豆等方較見精密況兼蛋清之潤苦酒之瀉真妙法也少陰病白通湯證及白通加豬膽汁湯證傷寒論原文少陰病下利白通湯主之白通湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服下利固系少陰有寒然實與脾胃及心臟有關故方中用附子以暖腎用乾薑以暖脾胃用蔥白以通心腎之氣即引心君之火下濟天道下濟而光明以消腎中之寒也傷寒論原文少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生白通加豬膽汁湯方蔥白四莖乾薑一兩附子一枚生用去皮破八片人尿五合豬膽汁一合以上三味以水三升煮取一升去滓納膽汁人尿和令相得分溫再服若無膽亦可用此節較前節所言之病為又重矣而於白通湯中加人尿豬膽汁即可挽回者此中原有精微之理在也人尿原含有臟腑自然之生氣愚友毛之侄病霍亂六脈皆閉兩目已瞑氣息已無舁諸床上毛以手掩其口鼻覺倣佛仍有呼吸灌水少許似猶知下咽乃急用現接之童便和硃砂細末數分灌之須臾頓醒則人尿之功效可知矣至於豬膽汁以人之生理推之原少陽相火之所寄生故其味甚苦此與命門相火原有先後天之分當此元陽衰微命門相火將絶之時而以後天助其先天西人所謂臟器療法也且人尿與豬膽汁之性皆涼加於熱藥之中以為引導則寒涼凝聚之處自無格拒此又從治之法也其脈暴出者提綱中以為不治以其將脫之脈象已現也而愚臨證數十年於屢次實驗中得一救脫之聖藥其功效遠過於參耆而自古至今未有發明其善治脫者其藥非他即山萸肉一味大劑煎服也蓋無論上脫下脫陰脫陽脫奄奄一息危在目前者急用生淨萸肉藥房中恆有將酒浸萸肉蒸熟者用之無效三兩急火煎濃汁一大碗連連溫飲之其脫即止脫回之後再用萸肉二兩生懷山藥一兩真野臺參五錢煎湯一大碗復徐徐溫飲之暴脫之證約皆可救愈想此節所謂脈暴出者用之亦可愈也少陰病真武湯證傷寒論原文少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之真武湯方茯苓三兩芍藥三兩生薑三兩切白朮二兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利者去芍藥加乾薑二兩若嘔者去附子加生薑足前成半斤羅東逸曰夫人一身制水者脾主水者腎也腎為胃關聚水而從其類倘腎中無陽則脾之樞機雖運而腎之關門不開水即欲行以無主制故泛溢妄行而有是證也用附子之辛溫壯腎之元陽則水有所主矣白朮之溫燥建立中土則水有所制矣生薑之辛散佐附子以補陽於補水中寓散水之意茯苓之滲淡佐白朮以建土於制水中寓利水之道焉而尤重在芍藥之苦降其旨甚微蓋人身陽根於陰若徒以辛熱補陽不少佐以苦降之品恐真陽飛越矣芍藥為春花之殿交夏而枯用之以極亟收散漫之陽氣而歸根下利減芍藥者以其苦降湧瀉也加乾薑者以其溫中勝寒也水寒傷肺則咳加細辛乾薑者勝水寒也加五味子者收肺氣也小便利者去茯苓恐其過利傷腎也嘔者去附子倍生薑以其病非下焦水停於胃所以不須溫腎以行水只當溫胃以散水且生薑功能止嘔也少陰病通脈四逆湯證傷寒論原文少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之通脈四逆湯甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩上三味以水三升煮取一升二合去滓分溫再服其脈即漸而出者愈非若暴出者之自無而忽有既有而仍無如燈火之回焰也面赤色者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩太陽篇四逆湯中乾薑兩半以治汗多亡陽之證至通脈四逆湯藥味同前惟將乾薑加倍蓋因寒盛脈閉欲借辛熱之力開凝寒以通脈也面赤者加蔥九莖權用粗蔥白切上九寸即可蓋面赤乃陰寒在下逼陽上浮即所謂戴陽證也加蔥以通其上下之氣且多用同於老陽之數則陽可下歸其宅矣而愚遇此等證又恆加芍藥數錢蓋芍藥與附子並用最善收斂浮越之元陽下降也少陰病大承氣湯證傷寒論原文少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此證乃伏氣之熱竄入肝腎二經也蓋以腎主閉藏肝主疏泄腎為二便之關肝又為腎行氣茲因伏氣之熱竄入腎兼竄入肝則肝為熱助疏泄之力太過即為腎行氣之力太過致腎關失其閉藏之用而下利清水且因肝熱而波及於膽致膽汁因熱妄行隨肝氣之疏泄而下純青色之水於斯腎水因疏泄太過而將竭不能上濟以鎮心火且肝木不得水氣之涵濡則在下既過於疏泄在上益肆其橫恣是以心下作痛口中乾燥也此宜急下之瀉以止瀉則腎中之真陰可回自能上濟以愈口中乾燥心下作痛也此節之前有少陰病得之二三日口燥咽乾者急下之宜大承氣湯及後節少陰病六七日腹脹不大便者急下之宜大承氣湯想此二節仲師亦皆言急下若不急下當亦若純下青水者其危險即在目前若仲師者宜其為醫中之聖也按方書有奇恆痢張隱菴謂系三陽並至三陰莫當九竅皆塞陽氣旁溢咽乾喉塞痛並於陰則上下無常薄為腸僻其脈緩小遲澀血溫身熱者死熱見七日者死蓋因陽氣偏盛陰氣受傷是以脈小遲澀此證宜急用大承氣湯瀉陽養陰緩則無效夫奇恆痢病未知所下者奚似而第即其脈象緩小遲澀固與少陰病之脈微細者同也其咽乾喉塞痛並於陰又與此節之心下痛口中乾燥者同也隱菴謂宜急服大承氣湯又與此節之急下之宜大承氣者同也是奇恆痢者不外少陰下利之範圍名之為奇恆痢可也名之為少陰下利亦無不可也傷寒論原文少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之注家謂宜灸百會穴厥陰病提綱及意義傳經之次第由少陰而厥陰厥陰者肝也肝為厥陰之府而肝膈之下垂與包腎之脂膜相連者即厥陰之經也為其經與少陰經之脂膜相連是以由少陰可傳於厥陰厥者逆也又盡也少陰自少陽太陰傳來而覆逆行上傳於肝且經中氣化之相傳至此又復陰盡而陽生也是以名為厥陰也傷寒論原文厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止內經謂厥陰之上風氣主之中見少陽少陽者肝中所寄之少陽相火也為肝中寄有相火因外感之激發而暴動是以消渴相火挾肝氣上衝是以覺氣上撞心心中疼且熱也凡人之肝熱者胃中亦恆有熱胃中有熱能化食肝中有熱又恆欲嘔是以飢而不欲食至於腸中感風木兼少陽之氣化原能生蛔因病後懶食腸中空虛蛔無所養偶食少許蛔聞食味則上來是以吐蛔也至誤下之利不止者因肝受外感正在不能疏泄之時經謂肝主疏泄適有降下之藥為嚮導遂至為腎過於行氣肝行腎之氣而疏泄不已厥陰病烏梅丸證傷寒論原文傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利烏梅丸方烏梅三百枚細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩去皮炮蜀椒四兩炒出汗人參六兩黃柏六兩桂枝六兩去皮上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等厥陰一篇病理深邃最難疏解注家以經文中有陰陽之氣不相順接之語遂以經解經於四肢之厥逆即以陰陽之氣不相順接解之而未有深究其不相順接之故何獨在厥陰一經者蓋肝主疏泄原為風木之臟於時應春實為發生之始肝膈之下垂者又與氣海相連故能宣通先天之元氣以敷布於周身而周身之氣化遂無處不流通也至肝為外感所侵其疏泄之力頓失致臟腑中之氣化不能傳達於外是以內雖蘊有實熱而四肢反逆冷此所謂陰陽之氣不相順接也至於病多嘔吐者亦因其疏泄之力外無所瀉遂至蓄極而上衝胃口此多嘔吐之所以然也又胃為肝沖激不已土為木傷中氣易漓是以間有除中之病除中者脾胃之氣已傷盡而危在目前也至於下利亦未必皆因藏寒其因伏氣化熱竄入肝經遏抑肝氣太過能激動其疏泄之力上衝亦可激動其疏泄之力下注以成下利然所利者必覺熱而不覺涼也試舉一治驗之案以明之遼寧劉寓居天津年近四旬於孟秋得吐瀉證六日之間勺飲不存一晝夜間下利二十餘次病勢危急莫支延為診治其脈象微細重按又似弦長四肢甚涼周身肌膚亦近於涼而心中則甚覺發熱所下利者亦覺發熱斷為系厥陰溫病在傷寒論中即為厥陰傷寒傷寒論開端處曾提出溫病後則渾名之為傷寒惟其嘔吐殊甚無論何藥入口即吐出分毫不能下咽實足令醫者束手耳因問之曰心中既如此發熱亦想冰吃否答曰想甚但家中人駁阻不令食耳愚曰此病已近垂危再如此吐瀉一晝夜即仙丹不能挽回惟用冰膏攙生石膏細末服之可以止吐吐止後瀉亦不難治矣遂立主買冰淇淋若干攙生石膏細末兩許服之服後病見愈可服稀粥少許下利亦見少翌日復為診視四肢已不發涼身亦微溫其脈大於從前心中猶覺發熱有時仍復嘔吐俾再用生石膏細末一兩攙西瓜中服之嘔吐從此遂愈翌日再診其脈熱猶未清心中雖不若從前之大熱猶思食涼物懶於飲食其下利較前已愈強半遂為開白虎加人參湯方中生石膏用二兩野臺參三錢用生杭芍六錢以代知母生山藥六錢以代粳米甘草則多用至四錢又加滑石六錢方中如此加減替代者實欲以之清熱又欲以之止利也俾煎湯兩盅分兩次溫飲下病遂全愈此於厥陰溫病如此治法若在冬令遇厥陰傷寒之有實熱者亦可如此治法蓋厥陰一經於五行屬木其性原溫而有少陽相火寄生其間則溫而熱矣若再有伏氣化熱竄入以激動其相火原可成極熱之病也夫石膏與冰膏西瓜並用似近猛浪然以愚之目見耳聞因嘔吐不止而廢命者多矣況此證又兼下利乎此為救人之熱腸所迫於萬難挽救之中而擬此挽救之奇方實不暇計其方之猛浪也若無冰膏西瓜時或用鮮梨切片蘸生石膏細末服之當亦不難下咽而止嘔吐也厥陰病白虎湯證傷寒論原文傷寒脈滑而厥者里有熱白虎湯主之太陽篇白虎湯證脈浮滑是表裡皆有熱也此節之白虎湯證脈滑而厥是里有熱表有寒也此所謂熱深厥深也愚遇此等證恆先用鮮白茅根半斤切碎煮四五沸取湯一大碗溫飲下厥回身熱然後投以白虎湯可免病家之疑病人亦敢放膽服藥若無鮮茅根時可以藥房中干茅根四兩代之若不用茅根時愚恆治以白虎加人參湯蓋取人參能助人生髮之氣以宣通內熱外出也厥陰病當歸四逆湯及加吳茱萸生薑湯證傷寒論原文手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯沈堯封曰叔和釋脈法細極謂之微即此之脈細欲絶即與脈微相渾不知微者薄也屬陽氣虛細者小也屬陰血虛薄者未必小小者未必薄也蓋榮行脈中陰血虛則實其中者少脈故小衛行脈外陽氣虛則約乎外者怯脈故薄況前人用微字多取薄字意試問微云淡河漢薄乎細乎故少陰論中脈微欲絶用通脈四逆主治回陽之劑也此之脈細欲絶用當歸四逆主治補血之劑也兩脈陰陽各異豈堪混釋當歸四逆湯方當歸三兩桂枝三兩去皮芍藥三兩細辛三兩大棗二十五枚擘甘草二兩炙通草二兩上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯方即前方加吳茱萸二升生薑半斤切以水六升清酒六升和煮取五升去滓分溫五服王和安曰厥陰經氣來自足少陰經宣於手太陰經成循環不息之常度若以血寒自鬱於臟脈象應有弦凝之徵今脈細欲絶可知少陰經氣來源先虛及復本經受臟寒之感則虛寒轉甚細而欲絶也治以當歸四逆湯意在溫肝通郁而必以桂枝白芍疏浚經氣之源細辛通草暢達經氣之流內有凝寒重加吳萸生薑溫經通氣仍加入原方以全其用解此則治經氣之定義可三反矣厥陰病白頭翁湯證傷寒論原文熱利下重者白頭翁湯主之白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升醫宗金鑑注曰三陰俱有下利證自利不渴屬太陰自利渴屬少陰惟厥陰下利屬寒者厥而不渴下利清穀屬熱者消渴下利後重便利膿血此熱利下重乃鬱熱奔逼廣腸魄門重滯難出初痢用此法以寒治熱久痢則宜用烏梅丸隨所利而從治之調其氣使之平也白頭翁湯所主之熱利下重當自少陰傳來不然則為伏氣化熱竄入厥陰其證雖熱而仍非外感大實之熱故白頭翁湯可以勝任乃有病在陽明之時其病一半入府一半由經而傳於少陽即由少陽入厥陰而為腑臟之相傳則在厥陰者既可成厥陰熱利之下重而陽明府中稽留之熱更與之相助而為虐此非但用白頭翁湯所能勝任矣愚遇此等證恆將白頭翁秦皮加於白虎加人參湯中則莫不隨手奏效也曾治一中年婦人於孟春感冒風寒四五日間延為診治其左脈弦而有力右脈洪而有力舌苔白而微黃心中熱而且渴下利膿血相雜裡急後重一晝夜二十餘次即其左右之脈象論之斷為陽明厥陰合併病有一醫者在座疑而問曰凡病涉厥陰手足多厥逆此證則手足甚溫何也答曰此其所以與陽明並病也陽明主肌肉陽明府中有熱是以周身皆熱而四肢之厥逆自不能於周身皆熱時外現也況厥陰之病即非雜以陽明亦未必四肢皆厥逆乎醫者深韙愚言與病家皆求速為疏方遂為立方如下生石膏三兩搗細生杭芍八錢生懷山藥八錢野臺參四兩白頭翁八錢秦皮六錢天花粉八錢甘草三錢上藥八味共煎三盅分三次溫飲下方中之義是合白虎加人參湯與白頭翁湯為一方而又因證加他藥也白虎湯中無知母者方中芍藥可代知母也蓋芍藥既能若知母之退熱滋陰而又善治下利者之後重也無粳米者方中生山藥可代粳米也蓋山藥汁漿濃郁既可代粳米和胃而其溫補之性又能助人參固下也至於白頭翁湯中無黃連黃柏者因與白虎湯並用有石膏之寒涼可省去連柏也又外加天花粉者因其病兼渴天花粉偕同人參最善生津止渴將此藥三次服完諸病皆減三分之二再診其脈仍有實熱未清遂於原方中加滑石五錢利其小便正所以止其大便俾仍如從前煎服於服湯藥之外又用鮮白茅根半斤煎湯當茶病遂全愈不分經之病理中丸證竹葉石膏湯證傷寒病六經分治之外又有不分經之病附載於傷寒分經之後者又宜擇其緊要者詳為詮解而後學治傷寒者自能應變無窮也傷寒論原文大病瘥後喜唾久不了了者胸上有寒當以丸藥溫之宜理中丸理中丸方人參甘草白朮乾薑各三兩上四味搗篩為末蜜丸如雞子黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服附加減法若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲飲水者加朮足前成四兩半腹中疼者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被此病時服涼藥太過傷其胃中之陽致胃陽虛損不能運化脾臟之濕是以痰飲上溢而喜唾久不了了也故方中用人參以回胃中之陽其補益之力且能助胃之瞤動加數自能運化脾中之濕使之下行而又輔以白朮能健脾又能滲濕乾薑以能暖胃又能助相火以生土且又加甘草以調和諸藥使藥力之猛者得甘草之緩而猛力悉化使藥性之熱者得甘草之甘而熱力愈長也至於方後諸多加減又皆各具精義隨諸證之變化而遵其加減諸法用之自能奏效無誤也傷寒論原文傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之竹葉石膏湯方竹葉二把石膏一斤半夏半升洗麥門冬一升人參三兩甘草二兩炙粳米半升上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服前節是病時過用涼藥傷其陽分此節是病時不能急用涼藥以清外感之熱致耗陰分且其大熱雖退仍有餘熱未清是以虛羸少氣氣逆欲吐此乃陰虛不能戀陽之象又兼有外感之餘熱為之助虐也故方中用竹葉石膏以清外感之熱又加人參麥冬協同石膏以滋陰分之虧蓋石膏與人參並用原有化合之妙能於餘熱未清之際立復真陰也用半夏者降逆氣以止吐也用甘草粳米者調和胃氣以緩石藥下侵也自常情觀之傷寒解後之餘熱何必重用石膏以生地玄參天冬麥冬諸藥亦可勝任然而甘寒留邪可默釀癆瘵之基礎此又不可不知也溫病遺方傷寒論中原有溫病渾同於六經分篇之中均名之為傷寒未嘗明指為溫病也況溫病之原因各殊或為風溫或為濕溫或為伏氣成溫或為溫熱受病之因既不同治法即宜隨證各異有謂溫病入手經不入足經者有謂當分上中下三焦施治者皆非確當之論斟酌再四惟仍按傷寒論六經分治乃為近是太陽經有未覺感冒身體忽然痠軟懶於動作頭不疼肌膚不熱似稍畏風舌似無苔而色白脈象微浮至數如常者此乃受風甚輕是以受時不覺也宜用輕清辛涼之劑發之處方薄荷葉三錢連翹三錢大蔥白三寸上藥三味共煎湯七八沸取清湯一大盅溫服下周身得汗即愈薄荷之成分含有薄荷腦辛涼芬芳最善透竅內而臟腑外而皮毛凡有風邪匿藏皆能逐之外出惟其性涼故於感受溫風者最宜惟煮湯服之宜取其輕清之氣不宜過煎過煎即不能發汗是以以之煎湯只宜七八沸若與難煎之藥同煎後入可也連翹為輕清宣散之品其發汗之力不及薄荷然與薄荷同用能使薄荷發汗之力悠長曾治一少年受感冒俾單用連翹一兩煮兩湯服之終宵微汗不竭病遂愈其發汗之力和緩兼悠長可知蔥之形中空其味微辣微甘原微具發表之性以旋轉於營衛之間故最能助發表之藥以調和營衛也有受風較重不但痠軟懶動且覺頭疼周身骨節皆疼肌膚熱不畏風心中亦微覺發熱脈象浮數似有力舌苔白厚宜於前方中去蔥白加天花粉八錢以清熱加菊花二錢以治頭疼惟煎湯時薄荷宜後入有其人預有伏氣化熱潛伏未動後因薄受外感之觸動其伏氣陡然勃發一時表裡俱熱其舌苔白厚中心似干脈象浮而有洪象此其病雖連陽明而仍可由太陽汗解也處方生石膏一兩搗細天花粉一兩薄荷葉錢半連翹錢半上藥四味煎湯一大盅溫服得汗即愈薄荷葉煎時宜後入或問此方重用石膏花粉少用薄荷連翹以為發表之劑特恐石膏花粉監製薄荷連翹太過服後不能作汗耳答曰此方雖為發表之劑實乃調劑陰陽聽其自汗而非強發其汗也蓋此證原為伏氣化熱偶為外感觸動遂欲達於表而外出而重用涼藥與之化合猶如水沃冶紅之鐵其蓬勃四達之熱氣原難遏抑而復少用薄荷連翹為之解其外表之阻隔則腹中所化之熱氣自奪門而出作汗而解矣且此等汗原不可設法為之息止雖如水流漓而斷無亡陰亡陽之虞亦斷無汗後不解之虞此方原與拙擬寒解湯相似二方任用其一果能證脈無誤服後覆杯之頃即可全身得汗間有畏石膏之涼將其藥先服一半者服後亦可得汗後再服其所餘則分毫無汗矣因其熱已化汗而出所餘之熱無多也即此之前後分服或出汗或不出汗可不深悟此藥發汗之理乎況石膏原具有發表之力也有其人身體痠懶且甚覺沉重頭重懶抬足重懶舉或周身肌膚重按移時微似有痕或小便不利其舌苔白而發膩微帶灰色其脈浮而濡至數如常者此濕溫也其人或久居潮濕之地臟腑為濕氣所侵或值陰雨連旬空氣之中含水分過度或因飲食不慎傷其脾胃濕鬱中焦又復感受風邪遂成斯證宜用藥外解其表內利其濕則病愈矣處方薄荷葉三錢連翹三錢小蒼朮三錢黃芩三錢木通二錢上藥五味先將後四味水煎十餘沸再入薄荷煎七八沸取清湯一大盅溫服之若小便不利者於用藥之外用鮮白茅根六兩去皮切碎水煎四五沸取其清湯以之當茶渴則飲之若其人肌膚髮熱心中亦微覺熱者宜去蒼朮加滑石八錢有溫病初得作喘者其肌膚不惡寒而發熱心中亦微覺發熱脈象浮而長者此乃肺中先有痰火又為風邪所襲也宜用傷寒論麻杏甘石湯而更定其分量之輕重更定麻杏甘石湯方生石膏一兩搗細麻黃一錢杏仁二錢去皮甘草錢半上四味共煎湯一大盅不先煎麻黃吹去浮沫者因所用只一錢而又重用生石膏以監製之也溫服若服後過點半鐘汗不出者宜服西藥阿斯匹林一瓦若不出汗仍宜再服以服至出汗為度蓋風邪由皮毛而入仍使之由皮毛而出也有溫病旬日不解其舌苔仍白脈仍浮者此邪入太陽之府也其小便必發黃宜於發表清熱藥中加清膀胱之藥此分解法也今擬二方於下以便用者相熱之輕重而自斟酌用之處方滑石一兩連翹三錢蟬蛻去土足三錢地膚子三錢甘草二錢上藥五味共煎一大盅溫服又方生石膏搗細一兩滑石八錢連翹三錢蟬蛻去土足三錢地膚子三錢甘草二錢上藥六味共煎湯一大盅溫服有溫病至七八日六經已周其脈忽然浮起至數不數且有大意者宜用辛涼之劑助之達表而汗解處方玄參一兩寸麥冬帶心五錢連翹二錢菊花二錢蟬蛻去土足二錢上藥五味共煎湯一大盅溫服用玄參者恐溫病日久傷陰分也有溫病多日六經已周脈象浮數而細關前之浮尤甚其頭目昏沉恆作讝語四肢且有擾動不安之意此乃外感重還太陽欲作汗也其所欲汗而不汗者因陰分太虧不能上濟以應陽也此證若因脈浮而強發其汗必凶危立見宜用大滋真陰之品連服數劑俾脈之數者漸緩脈之細者漸大逮陰氣充長能上升以應其陽則汗自出矣處方生地黃一兩生懷山藥一兩玄參一兩大甘枸杞一兩生淨萸肉六錢柏子仁六錢生棗仁六錢搗碎甘草三錢上藥八味水煎一大碗候五分鐘調入生雞子黃二枚徐徐溫飲之飲完一劑再煎一劑使晝夜藥力相繼不斷三劑之後當能自汗若至其時汗仍不出者其脈不似從前之數細可仍煎此藥送服西藥阿斯匹林一瓦其汗即出矣或問山萸肉原具酸斂之性先生所定來復湯嘗重用之以治汗出不止此方原欲病者服之易於出汗何方中亦用之乎答曰此中理甚精微當詳細言之萸肉為養肝熄風之要藥此證四肢之騷擾不安其肝風固已動也此方中用萸肉之本意也若慮用之有妨於出汗是猶未知萸肉之性蓋萸肉之味至酸原得木氣最全是以酸斂之中大具條暢之性神農本草經謂其逐寒濕痹是明徵也為其味酸斂也故遇元氣不能固攝者用之原可止汗為其性條暢也遇肝虛不能疏泄者用之又善出汗如此以用萸肉是皆得之臨證實驗之餘非但憑諸理想而云然也若果服藥數劑後其脈漸有起色四肢不復擾動即去萸肉亦無妨其開始服藥時萸肉則斷不能去也有未病之先心中常常發熱後為外感觸發則其熱益甚五心煩躁頭目昏沉其舌苔白厚且生芒刺其口中似有辣味其脈浮數有力者此伏氣化熱已入心包而又為外感束其外表則內蘊之熱益甚是以舌有芒刺且覺發辣也宜用涼潤清散之劑內清外解遍體得透汗則愈矣處方鮮地黃一兩玄參一兩天花粉一兩知母五錢寸麥冬帶心五錢西藥阿斯匹林兩瓦上藥先煎前五味取清湯兩大盅先溫服一大盅送服阿斯匹林一瓦若服一次後汗未出熱亦未消者可再溫服一盅送服阿斯匹林一瓦若汗已出熱未盡消者藥湯可如前服法阿斯匹林宜斟酌少服傷寒風溫始終皆宜汗解説傷寒初得宜用熱藥發其汗麻黃桂枝諸湯是也風溫初得宜用涼藥發其汗薄荷連翹蟬蛻諸藥是也至傳經已深陽明熱實無論傷寒風溫皆宜治以白虎湯而愚用白虎湯時恆加薄荷少許或連翹蟬蛻少許往往服後即可得汗即但用白虎湯亦恆有服後即汗者因方中石膏原有解肌發表之力故其方不但治陽明府病兼能治陽明經病況又少加辛涼之品引之以由經達表其得汗自易易也拙擬寒解湯後載有醫案可參閲該方原治寒溫證周身壯熱心中熱而且渴舌苔白而欲黃其脈洪滑或兼浮或頭猶覺疼或周身猶有拘束之意者果如方下所注證脈服之覆杯可汗勿庸慮其不效也蓋脈象洪滑陽明府熱已實原是白虎湯證至洪滑兼浮舌苔猶白是仍有些些表證未罷故方中重用石膏知母以清胃府之熱復少用連翹蟬蛻之善達表者引胃中化而欲散之熱仍還於表作汗而解斯乃調劑陰陽聽其自汗非強發其汗也至其人氣體弱者可用補氣之藥助之出汗寒解湯加潞黨參即可寒解湯下載有治一叟年七旬素有勞疾薄受外感即發喘逆一案可參閲若陰分虛損者可用滋陰之藥助之出汗若熟地玄參生山藥枸杞之類大潤之劑峻補真陰濟陰以應其陽設病有還表之機必汗出而愈至其人陽分陰分俱虛又宜並補其陰陽以助之出汗張景嶽曾治一叟得傷寒證戰而不汗於其翌日發戰之時投以大劑八味地黃湯須臾戰而得汗繼因汗多亡陽身冷汗猶不止仍投以原湯汗止病亦遂愈用其藥發汗即用其藥止汗是能運用古方入於化境者也至少陽證為寒熱往來其證介於表裡之間宜和解不宜發汗矣然愚對於此證其熱盛於寒者多因證兼陽明恆於小柴胡湯中加玄參八錢以潤陽明之燥熱其陽明之燥熱化而欲散自能還於太陽而作汗少陽之邪亦可隨汗而解其寒盛於熱者或因誤服降下藥虛其氣分或因其氣分本素虛雖服小柴胡湯不能提其邪透膈上出又恆於小柴胡湯中加薄荷葉二錢由足少陽引入手少陽借徑於遊部手足少陽合為遊部作汗而解此即傷寒論所謂柴胡證具而以他藥下之柴胡證仍在者復與小柴胡湯必蒸蒸而振卻發熱汗出而解也然助以薄荷則出汗較易即由汗解不必蒸蒸而振致有戰汗之狀也至於當用承氣之證卻非可發汗之證矣然愚臨證經驗以來恆有投以三承氣湯大便猶未降下而即得汗者蓋因胃府之實熱既為承氣衝開其病機自外越也若降之前未嘗得汗既降之後亦必於飲食之時屢次些些得汗始能脈淨身涼若降後分毫無汗其熱必不能盡消又宜投以竹葉石膏湯或白虎加人參湯將其餘熱消解將盡其人亦必些些汗出也此所謂傷寒風溫始終皆宜汗解也論冬傷於寒春必病溫及冬不藏精春必病溫治法嘗讀內經有冬傷於寒春必病溫之語此中原有深義非淺學者所易窺測也乃篤信西説者據病菌潛伏各有定期之説謂病菌傳於人身未有至一月而始發動者況數月乎因此一倡百和遂謂內經皆荒渺之談分毫不足憑信不知毒氣之傳染有菌而冬令嚴寒之氣為寒水司天之正氣特其氣嚴寒過甚或人之居處衣服欠暖或冒霜雪而出外營生即不能御此氣耳是以寒氣之中人也其重者即時成病即冬令之傷寒也其輕者微受寒侵不能即病由皮膚內侵潛伏於三焦脂膜之中阻塞氣化之升降流通即能暗生內熱逮至內熱積而益深又兼春回陽生觸發其熱或更薄受外感以激發其熱是以其熱自內暴發而成溫病即後世方書所謂伏氣成溫也至於治之之法有清一代名醫多有謂此證不宜發汗者然仍宜即脈證之現象而詳為區別若其脈象雖有實熱而仍在浮分且頭疼舌苔猶白者仍當投以汗解之劑然宜以辛涼發汗若薄荷葉連翹蟬蛻諸藥且更以清熱之藥佐之若拙擬之清解湯涼解湯寒解湯三方斟酌病之輕重皆可選用也此乃先有伏氣又薄受外感之溫病也若其病初得即表裡壯熱脈象洪實其舌苔或白而欲黃者宜投以白虎湯再加宣散之品若連翹茅根諸藥如此治法非取汗解然恆服藥後竟自汗而解即或服藥後不見汗其病亦解因大隊寒涼之品與清輕宣散之品相併自能排逐內蘊之熱息息自腠理達於皮毛以透出也此乃伏氣暴發自內達外之溫病春夏之交多有之蓋此等證皆以先有伏氣至春深萌動欲發而又或因暴怒或因勞心勞力過度或因作苦於烈日之中或因酣眠於暖室內是以一發表裡即壯熱治之者只可宣散清解而不宜發汗也此冬傷於寒春必病溫之大略治法也內經又謂冬不藏精春必病溫此二語不但為西醫所指摘即中醫對此節經文亦恆有疑意謂冬不藏精之人若因腎虛而寒入腎中當即成少陰傷寒為直中真陰之劇證何能遲至春令而始成溫病不知此二句經文原有兩解其所成之溫病亦有兩種至其治法又皆與尋常治法不同今試析言之並詳其治法冬不藏精之人其所患之溫病有因猝然感冒而成者大凡病溫之人多系內有蘊熱至春陽萌動之時又薄受外感拘束其熱即陡發而成溫冬不藏精之人必有陰虛所生之熱積於臟腑而其為外感所拘束而發動與內蘊實熱者同也其發動之後脈象多數息多微喘舌上微有白苔津液短少後或干黃或舌苔漸黑狀如斑點為舌苔甚薄若有若無故見舌皮變黑或頻飲水不能解渴或時入陰分益加潮熱此證初得其舌苔白時亦可汗解然須以大滋真陰之藥輔之愚治此證恆用連翹薄荷葉各三錢玄參生地黃各一兩煎湯服之得汗即愈若服藥後汗欲出仍不能出可用白糖水送服西藥阿斯匹林二分許其汗即出或單將玄參生地黃煎湯送服阿斯匹林一瓦亦能得汗若至熱已傳裡舌苔欲黃或至黃而兼黑脈象數而有力然按之弦硬非若陽明有實熱者之洪滑此陰虛熱實之象宜治以白虎加人參湯更以生地黃代知母生山藥代粳米煎一大劑取湯一大碗分多次溫飲下拙著傷寒溫病同用方後載有此方附載治愈之案若干可參觀也又有因伏氣所化之熱先伏藏於三焦脂膜之中逮至感春陽萌動而觸發其發動之後恆因冬不藏精者其腎臟虛損伏氣乘虛而竄入少陰其為病狀精神短少喜偃臥昏昏似睡舌皮乾毫無苔小便短赤其熱鬱於中而肌膚卻無甚熱其在冬令為少陰傷寒即少陰證初得宜治以黃連阿膠湯者也在春令即為少陰溫病而愚治此證恆用白虎加人參湯以生地黃代知母生懷山藥代粳米更先用鮮白茅根三兩煎湯以之代水煎藥將藥煎一大劑取湯一大碗分三次溫飲下每飲一次調人生雞子黃一枚初飲一次後其脈當見大或變為洪大飲至三次後其脈又復和平而病即愈矣此即冬不藏精春必病溫者之大略治法也上所論各種溫病治法原非憑空擬議也實臨證屢用有效而後敢公諸醫界同人也有溫病初得即表裡大熱宜治以白虎湯或白虎加人參湯者其證發現恆在長夏或在秋夏之交而愚生平所遇此等證大抵在烈日之中或田間作苦或長途勞役此傷寒論所謂暍病也亦可謂之暑溫也其脈洪滑有力者宜用白虎湯若脈雖洪大而按之不實者宜用白虎加人參湯又皆宜煎一大劑分數次溫飲下皆可隨手奏效伏氣化熱成溫病者大抵因復略有感冒而後其所化之熱可陡然成溫表裡俱覺壯熱不然者雖伏氣所化之熱深入陽明之府而無外感束其表究不能激發其肌肉之熱是以治之者恆不知其為伏氣化熱放膽投以治溫病之重劑是以其熱遂永留胃府致生他病今試舉一案以明之天津劉於壬申正月上旬覺心中時時發熱而周身又甚畏冷時愚回籍因延他醫診治服藥二十餘劑病轉增劇二便皆閉再服他藥亦皆吐出少進飲食亦恆吐出此際愚適來津診其脈弦長有力然在沉分知其有伏氣化熱其熱不能外達於表是以心中熱而外畏冷此亦熱深厥深之象也俾先用鮮茅根半斤切碎水煮三四沸視茅根皆沉水底其湯即成取清湯三杯分三次服每服一次將土狗三個搗為末生赭石三錢亦為細末以茅根湯送下若服過兩次未吐至三次赭石可以不用及將藥服後嘔吐即止小便繼亦通下再診其脈變為洪長有力其心中仍覺發熱外表則不畏冷矣其大便到此已半月未通下遂俾用大潞參五錢煎湯送服生石膏細末一兩翌晨大便下燥糞數枚黑而且硬再診其脈力稍緩知心中猶覺發熱又俾用潞黨參四錢煎湯送服生石膏細末八錢翌晨又下燥糞二十餘枚仍未見溏糞其心中不甚覺熱脈象仍似有力又俾用潞黨參三錢煎湯送服生石膏細末六錢又下燥糞十餘枚後則繼為溏糞病亦從此全愈矣蓋凡伏氣化熱竄入胃府非重用石膏不解傷寒論白虎湯原為治此證之的方也然用白虎湯之例汗吐下後皆加人參以其虛也而此證病已數旬且頻嘔吐其元氣之虛可知故以人參煎湯送石膏此亦仿白虎加人參湯之義也至石膏必為末送服者以其涼而重墜之性善通大便且較水煮但飲其清湯者其退熱之力又增數倍也是以凡伏氣化熱其積久所生之病有成肺病者有成喉病者有生眼疾者有患齒疼者有病下痢者有病腹疼者即盲腸炎其種種病因若皆由於伏氣化熱恆有用一切涼藥其病皆不能愈而投以白虎湯或投以白虎加人參湯再因證加減輔以各病當用之藥未有不隨手奏效者此治伏氣化熱之大略也至於拙著全書中所載伏氣化熱之病甚多其治法亦各稍有不同皆可參觀溫病之治法詳於傷寒論解傷寒溫病之治法始異而終同至其病之所受則皆在於足經而兼及於手經乃今之論寒溫者恆謂傷寒入足經不入手經溫病入手經不入足經夫人之手足十二經原相貫通謂傷寒入足經不入手經者固為差謬至謂溫病入手經不入足經者尤屬荒唐何以言之傷寒論之開始也其第一節渾言太陽之為病此太陽實總括中風傷寒溫病在內故其下將太陽病平分為三項其第二節論太陽中風第三節論太陽傷寒四節五節亦論傷寒當歸納於第三節中第六節論太陽溫病故每節之首皆冠以太陽病三字此太陽為手太陽乎抑為足太陽乎此固無容置辨者也由斯知中風傷寒溫病皆可以傷寒統之難經謂傷寒有五中風溫病皆在其中而其病之初得皆在足太陽經又可渾以太陽病統之也蓋所謂太陽之為病者若在中風傷寒其頭痛項強惡寒三證可以並見若在溫病但微惡寒即可為太陽病此所謂證不必具但見一證即可定為某經病也然惡寒須臾即變為熱耳曾治一人於季春夜眠之時因衾薄凍醒遂覺周身惡寒至前午十句鐘表里皆覺大熱脈象浮洪投以拙擬涼解湯一汗而愈又嘗治一人於初夏晨出被雨遂覺頭疼周身惡寒至下午一句鍾即變為大熱渴嗜飲水脈象洪滑投以拙擬寒解湯亦一汗而愈至如此涼藥而所以能發汗者為其內蘊之燥熱與涼潤之藥化合自然能發汗又少用達表之品以為之引導故其得汗甚速汗後熱亦盡消也此二則皆溫病也以其初得猶須臾惡寒故仍可以太陽病統之即其化熱之後病兼陽明然亦必先入足陽明逮至由胃及腸大便燥結而後傳入手陽明安得謂溫病入手經不入足經乎由斯知傷寒論一書原以中風傷寒溫病平分三項特於太陽首篇詳悉言之以示人以入手之正路至後論治法之處則三項中一切諸證皆可渾統於六經但言某經所現之某種病宜治以某方不復別其為中風傷寒溫病此乃納繁於簡之法亦即提綱摯領之法也所尤當知者諸節中偶明言中風者是確指中風而言若明言為傷寒者又恆統中風溫病而言以傷寒二字為三項之總稱其或為中風或為傷寒或為溫病恆於論脈之處有所區別也至於六經分編之中其方之宜於溫病者不勝舉今將其顯然可見者約略陳之於下一為麻杏甘石湯其方原治汗出而喘無大熱者以治溫病不必有汗與喘之兼證也但其外表未解內有蘊熱者即可用然用時須斟酌其熱之輕重熱之輕者麻黃宜用錢半生石膏宜用六錢若熱之重者麻黃宜用一錢生石膏宜用一兩至愚用此方時又恆以薄荷葉代麻黃薄荷葉代麻黃時其分量宜加倍服後得微汗其病即愈蓋薄荷葉原為溫病解表最良之藥而當仲師時猶未列於藥品故當日不用也一為大青龍湯傷寒論中用大青龍湯者有二節一為第三十七節其節明言太陽中風脈浮緊夫傷寒論首節論太陽之脈曰浮原統中風傷寒而言至第二節則言脈緩者為中風是其脈為浮中之緩也第三節則言脈陰陽俱緊者為傷寒是其脈為浮中之緊也今既明言中風其脈不為浮緩而為浮緊是中風病中現有傷寒之脈其所中者當為凜冽之寒風而於溫病無涉也一為第三十八節細審本節之文知其確係溫病何以言之以脈浮緩身不疼但重無少陰證也蓋此節開端雖明言傷寒仍是以傷寒二字為中風傷寒溫病之總稱是以傷寒初得脈浮緊溫病初得脈浮緩傷寒初得身多疼溫病初得身恆不疼而但重傷寒論第六節溫病提綱中原明言身重傷寒初得恆有少陰證溫病則始終無少陰證少陰證有寒有熱此指少陰之寒證言為無少陰寒證所以敢用大青龍湯若少陰熱證溫病中恆有之正不妨用大青龍湯矣此數者皆為溫病之明徵也況其病乍有輕時若在傷寒必不復重用生石膏惟系溫病則仍可重用生石膏如雞子大約有今之四兩因溫病當以清燥熱救真陰為急務也至愚用此方時又恆以連翹代桂枝雖桂枝連翹均能逐肌肉之外感而一則性熱一則性涼溫病宜涼不宜熱故用桂枝不如用連翹而當日仲師不用者亦因其未列入藥品也傷寒論方中所用之連軺是連翹根能利水不能發汗況大青龍湯中桂枝之分量僅為麻黃三分之一仲師原因其性熱不欲多用也一為小青龍湯其方外能解表內能滌飲以治外感痰喘誠有奇效中風傷寒溫病皆可用然宜酌加生石膏以調麻桂薑辛之熱方效是以傷寒論小青龍湯無加石膏之例而金匱有小青龍加石膏湯所以補傷寒論之未備也至愚用此湯時遇挾有實熱者又恆加生石膏至一兩強也一為小柴胡湯其方中風傷寒病皆可用而溫病中小柴胡湯證多兼嘔吐黏涎此少陽之火與太陰之濕化合而成也少陽傳經之去路為太陰宜於方中酌加生石膏數錢或兩許以清少陽之火其黏涎自能化水從小便中出夫柴胡既能引邪上出石膏更能逐熱下降如此上下分消故服藥後無事汗解即霍然全愈也以上所述諸方大抵宜於溫病初得者也至溫病傳經已深若清燥熱之白虎湯白虎加人參湯通腸結之大小承氣湯開胸結之大小陷胸湯治下利之白頭翁湯黃芩湯治發黃之茵陳梔子柏皮等湯及一切涼潤清火育陰安神之劑皆可用於溫病者又無庸愚之贅語也至於伏氣之成溫者若內經所謂冬傷於寒春必病溫冬不藏精春必病溫之類傷寒論中非無其證特其證現於某經即與某經之本病無所區別仲師未嘗顯為指示在後世原難明辨且其治法與各經之本病無異亦無須乎明辨也惟其病在少陰則辨之甚易何者因少陰之病寒熱迥分兩途其寒者為少陰傷寒之本病其熱者大抵為伏氣化熱之溫病也若謂系傷寒入少陰久而化熱何以少陰病兩三日即有宜用黃連阿膠湯大承氣湯者蓋伏氣皆伏於三焦脂膜之中與手足諸經皆有貫通之路其當春陽化熱而萌動恆視臟腑虛弱之處以為趨向所謂邪之所湊其氣必虛也其人或因冬不藏精少陰之臟必虛而伏氣之化熱者即乘虛而入遏抑其腎氣不能上升與心氣相接續致心臟跳動無力遂現少陰微細之脈故其脈愈微細而所蘊之燥熱愈甚用黃連以清少陰之熱阿膠雞子黃以增少陰之液即以助少陰腎氣之上達俾其陰陽之氣相接續脈象必驟有起色而內陷之邪熱亦隨之外透矣至愚遇此等證時又恆師仲師之意而為之變通單用鮮白茅根四兩銼碎慢火煎兩三沸視茅根皆沉水底其湯即成去渣取清湯一大碗頓服下其脈之微細者必遽變為洪大有力之象再用大劑白虎加人參湯煎湯三茶杯分三次溫飲下每服一次調入生雞子黃一枚其病必脫然全愈用古不必泥古仲師有知亦當不吾嗔也論傷寒溫病神昏譫語之原因及治法傷寒溫病皆有譫語神昏之證論者責之陽明胃實然又當詳辨其脈象之虛實熱度之高下時日之淺深非可概以陽明胃實論也其脈象果洪而有力按之甚實者可按陽明胃實治之蓋胃腑之熱上蒸則腦中之元神心中之識神皆受其纍是以神昏譫語不省人事或更大便燥結不但胃實且又腸實阻塞腎氣不能上交於心則亢陽無制心神恍惚亦多譫妄或精神不支昏憒似睡若斯者可投以大劑白虎湯遵傷寒論一煎三服之法煎湯三盅分三次溫飲下其大便燥結之甚者可酌用大小承氣湯若大便燥結不甚者但投以大劑白虎湯大便即可通下其神昏譫語自愈也有脈象確有實熱其人神昏譫語似可用白虎湯矣而其脈或兼弦兼數或重按仍不甚實者宜治以白虎加人參湯曾治一農家童子勞力過度因得溫病脈象弦而有力數近六至譫語不休所言皆勞力之事本擬治以白虎加人參湯因時當仲夏且又童年少陽之體遂先與以白虎湯服後脈搏力減而譫語益甚幸其大便猶未通下急改用白虎加人參湯將方中人參加倍煎湯三茶杯分三次溫飲下盡劑而愈蓋脈象弦數真陰必然虧損白虎加人參湯能於邪熱熾盛之中滋其真陰即以退其邪熱蓋當邪熱正熾時但用玄參沙參生地諸藥不能滋陰因其不能勝邪熱陰分即無由滋長也惟治以白虎加人參湯則滋陰退熱一舉兩得且能起下焦真陰與上焦亢甚之陽相濟是以投之有捷效也其證若在汗吐下後脈雖洪實用白虎湯時亦宜加人參曾治一人溫病之熱傳入陽明脈象洪實有力譫語昏瞀投以大劑白虎湯熱退強半脈力亦減而其至數轉數一息六至譫語更甚細詢其病之經過言數日前因有梅毒服降藥兩次遂急改用白虎加人參湯亦倍用人參此兩案中用白虎加人參湯皆將人參倍加者因從前誤用白虎湯也若開首即用白虎加人參湯則人參無事加倍矣煎湯三杯分三次溫飲下亦盡劑而愈有伏氣為病因腎虛竄入少陰遏抑腎氣不能上升與心相濟致心脈跳動無力燥熱鬱中不能外透閉目昏昏似睡間作譫語此在冬為少陰傷寒之熱證在春為少陰溫病宜治以大劑白虎加人參湯用鮮白茅根煮水以之煎藥取湯三盅分數次飲下自愈有患寒溫者周身壯熱脈象洪實神昏不語逮用涼藥清之熱退脈近和平而仍然神昏或譫語者必兼有腦髓神經病當繼用治腦髓神經之藥曾治一學校學生溫病熱入陽明脈象甚實神昏不語臥床並不知轉側用白虎湯清之服兩劑後熱退十之七八脈象之洪實亦減去強半自知轉側而精神仍不明瞭當系溫病之熱上蒸致其腦膜生炎而纍及神經也遂改用小劑白虎加人參湯又加羚羊角二錢另煎兌服一劑而愈又治一幼童得溫病三日熱不甚劇脈似有力亦非洪實而精神竟昏昏似睡不能言語此亦溫病兼腦膜炎也因其溫病甚輕俾但用羚羊角錢半煎湯服之其病霍然頓愈有寒溫之病傳經已遍將欲作汗其下焦陰分虛損不能與上焦之陽分相濟以化汗而神昏譫語者曾治一壯年仲夏長途勞役因受溫病已過旬日精神昏憒譫語不省人事且兩手亂動不休其脈弦而浮一息近六至不任循按兩尺尤甚投以大滋真陰之品若玄參生地黃生山藥甘枸杞天門冬之類共為一大劑煎服一日連進二劑當日得汗而愈有寒溫之病服開破降下之藥太過傷其胸中大氣逮其大熱已退而仍然神昏或譫語者曾治一壯年得溫病延醫服藥二十餘日外感之熱盡退精神轉益昏沉及愚視之周身皆涼奄奄一息呼之不應舌乾如磋毫無舌苔其脈象微弱而遲不足四至五六呼吸之頃必長出氣一次此必因服開降之藥太過傷其胸中大氣也蓋胸中大氣因受傷下陷不能達於腦中則神昏不能上潮於舌本則舌乾其周身皆涼者大氣因受傷不能宣布於營衛也其五六呼吸之頃必長出氣一次者因大氣傷後不能暢舒故太息以舒其氣也遂用野臺參一兩柴胡一錢煎湯灌之連服兩劑全愈又治一少年於初春得傷寒先經他醫治愈後因飲食過度病又反復投以白虎湯治愈隔三日陡然反復甚劇精神恍惚肢體顫動口中喃喃皆不成語診其脈右部寸關皆無力而關脈尤不任循按愚曰此非病又反復必因前次之過食病復而此次又戒飲食過度也飽食即可愈矣其家人果謂有鑑前失數日所與飲食甚少然其精神昏憒若斯恐其不能飲食愚曰果系因餓而成之病與之食必然能食然仍須撙節與之多食幾次可也其家人果依愚言十小時中連與飲食三次病若失蓋人胸中大氣原借水穀之氣以為培養病後氣虛又乏水穀之氣以培養之是以胸中大氣虛損而現種種病狀也然前案因服開降之藥傷其大氣故以補氣兼升氣之藥治之後案因水穀之氣缺乏虛其大氣故以飲食治之斯在臨證者精心體驗息息與病機相符耳有溫而兼疹其毒熱內攻瞀亂其神明者曾治一少年溫病熱入陽明連次用涼藥清之大熱已退強半而心神騷擾不安合目恆作譫語其脈有餘熱似兼緊象因其脈象熱而兼緊疑其伏有疹毒未出遂投以小劑白虎湯送服羚羊角細末一錢西藥阿斯匹林二分表出痧粒滿身而愈又治一幼女患溫疹其疹出次日即靨精神昏昏似睡時有驚悸脈象數而有力投以白虎湯加羚羊角錢半另煎兌服用鮮蘆根三兩煮水以之煎藥取湯兩茶盅分三次溫飲下其疹得出病亦遂愈有其人素多痰飲其寒溫之熱熾盛與痰飲互相膠漆以亂其神明者栝蔞解下附有治驗之案可參觀有溫疫傳染之邪由口鼻傳入自肺傳心其人恆無故自笑精神恍惚言語錯亂妄言妄見者曾治一媼患此證脈象有力關前搖搖而動投以拙擬護心至寶丹一劑而愈以上所謂寒溫諸證其精神昏憒譫語之原因及治法大略已備至於變通化裁相機制宜又在臨證者之精心研究也論吳又可達原飲不可以治溫病北方醫者治溫病恆用吳又可達原飲此大謬也吳氏謂崇禎辛巳疫氣流行山東浙江南北兩道感者尤多遂著瘟疫論一書首載達原飲為治瘟疫初得之方原非治溫病之方也疫者天地戾氣其中含有毒菌遍境傳染若役使然故名為疫因疫多病熱故名為瘟疫病寒者名為寒疫瘟即溫也是以方中以逐不正之氣為主至於溫病乃感時序之溫氣或素感外寒伏於膜原久而化熱乘時發動其中原無毒菌不相傳染治之者惟務清解其熱病即可愈若於此鑑別未精本系溫病而誤投以達原飲其方中檳榔開破之力既能引溫氣內陷而厚朴草果之辛溫開散大能耗陰助熱尤非病溫者所宜病溫者多陰虛尤忌耗陰之藥雖有知母芍藥黃芩各一錢其涼力甚輕是以用此方治溫病者未有見其能愈者也且不惟不能愈更有於初病時服之即陡然變成危險之證者此非愚之憑空擬議誠有所見而云然也愚初習醫時曾見一媼年過六旬因傷心過度積有勞疾於仲春得溫病醫者投以達原飲將方中草果改用一錢謂得汗則愈乃服後汗未出而病似加重醫者遂將草果加倍謂服後必然得汗果服後頭面汗出如洗喘息大作須臾即脫或疑此證之僨事當在服達原飲將草果加重若按其原方分量草果只用五分即連服數劑亦應不至汗脫也答曰草果性甚猛烈即五分亦不為少愚嘗治脾虛泄瀉服藥不效因思四神丸治五更瀉甚效中有肉果本草謂其能健脾澀腸遂用健補脾胃之藥煎湯送服肉果末五分須臾覺心中不穩六脈皆無遲半點鐘其脈始見恍悟病人身體虛弱不勝肉果辛散之力也草果與肉果性原相近而其辛散之力更烈於肉果雖方中止用五分而與檳榔厚朴並用其猛烈之力固非小矣由斯觀之達原飲可輕用哉論革脈之形狀及治法革脈最為病脈中之險脈而人多忽之以其不知革脈之真象即知之亦多不知治法也其形狀如按鼓革外雖硬而中空即弦脈之大而有力者因其脈與弦脈相近是以其脈雖大而不洪無起伏故不洪雖有力而不滑中空故不滑即此以揣摩此脈其真象可得矣其主病為陰陽離絶上下不相維繫脈至如此病將變革此又革脈之所以命名有危在頃刻之勢丁卯在津治愈革脈之證數次惟有一媼八旬有六治之未愈此乃年歲所關也今特將其脈之最險者詳録一則於下以為治斯證者之嚆矢外孫王年五十身體素羸弱於仲夏得溫病心中熱而煩躁忽起忽臥無一息之停其脈大而且硬微兼洪象其舌苔薄而微黑其黑處若斑點知其內傷與外感並重也其大便四日未行腹中脹滿按之且有硬處其家人言腹中滿硬系宿病已逾半載為有此病所以身形益羸弱因思宿病宜從緩治當以清其溫熱為急務為疏方用白虎加人參湯方中石膏用生者兩半人參用野臺參五錢又以生山藥八錢代方中粳米煎湯兩盅分三次溫飲下一劑外感之熱已退強半煩躁略減仍然起臥不安而可睡片時脈之洪象已無而大硬如故其大便尤未通下腹中脹益甚遂用生赭石細末生懷山藥各一兩野臺參六錢知母玄參各五錢生雞內金錢半煎湯服後大便通下遲兩點鐘腹中作響覺瘀積已開連下三次皆系陳積其證陡變脈之大與硬較前幾加兩倍周身脈管皆大動幾有破裂之勢其心中之煩躁精神之騷擾起臥之頻頻不安實有不可言語形容者其家人環視懼甚愚毅然許為治愈遂急開淨萸肉生龍骨各兩半熟地黃生山藥各一兩野臺參白朮各六錢炙甘草三錢煎湯一大碗分兩次溫飲下其狀況稍安脈亦見斂當日按方又進一劑可以安臥須臾其脈漸若瘀積未下時其腹亦見軟惟心中時或發熱繼將原方去白朮加生地黃八錢日服一劑三劑後脈象已近平和而大便數日未行且自覺陳積未淨遂將萸肉龍骨各減五錢加生赭石六錢當歸三錢又下瘀積若干其脈又見大遂去赭石當歸連服十餘劑全愈論腦充血之原因及治法腦充血病之説倡自西人而淺見者流恆譏中醫不知此病其人蓋生平未見內經者也嘗讀內經至調經論有謂血之與氣並走於上則為大厥厥則暴死氣反則生不反則死云云非即西人所謂腦充血之證乎所有異者西人但言充血內經則謂血之與氣並走於上蓋血必隨氣上升此為一定之理而西人論病皆得之剖解之餘是以但見血充腦中而不知輔以理想以深究病源故但名為腦充血也至內經所謂氣反則生不反則死者蓋謂此證幸有轉機其氣上行之極復反而下行腦中所充之血應亦隨之下行故其人可生若其氣上行不反升而愈升血亦隨之充而愈充腦中血管可至破裂所以其人死也又內經厥論篇謂巨陽之厥則腫首頭重不能行發為眴眩也僕陽明之厥面赤而熱妄言妄見少陽之厥則暴聾頰腫而熱諸現象皆腦充血證也推之秦越人治虢太子尸厥謂上有絶陽之絡下有破陰之紐者亦腦充血證也特是古人立言簡括恆但詳究病源而不細論治法然既洞悉致病之由即自擬治法不難也愚生平所治此證甚多其治愈者大抵皆腦充血之輕者不至血管破裂也今略舉數案於下以備治斯證者之參考在奉天曾治一人年近五旬因處境不順兼勞碌漸覺頭疼日浸加劇服藥無效遂入西人醫院治旬日頭疼不減轉添目疼又越數日兩目生翳視物不明來院求為診治其脈左部洪長有力自言腦疼徹目目疼徹腦且時覺眩暈難堪之情莫可名狀脈證合參知系肝膽之火挾氣血上衝腦部腦中血管因受沖激而膨脹故作疼目系連腦腦中血管膨脹不已故目疼生翳且眩暈也因曉之曰此腦充血證也深考此證之原因腦疼為目疼之根而肝膽之火挾氣血上衝又為腦疼之根欲治此證當清火平肝引血下行頭疼愈而目疼生翳及眩暈自不難調治矣遂為疏方用懷牛膝一兩生杭芍生尤骨生牡蠣生赭石各六錢玄參川楝子各四錢龍膽草三錢甘草二錢磨取鐵鏽濃水煎藥服一劑覺頭目之疼頓減眩暈已無即方略為加減又服兩劑頭疼目疼全愈視物亦較真其目翳原系外障須兼外治之法為制磨翳藥水一瓶日點眼上五六次徐徐將翳盡消在滄州治一人六十四歲因事心甚懊憹於旬日前即覺頭疼不以為意一日晨起忽僕於地狀若昏厥移時蘇醒左手足遂不能動且覺頭疼甚劇醫者投以清火通絡之劑兼法王勳臣補陽還五湯之義加生黃耆數錢服後更覺腦中疼如錐刺難忍須臾求為診視其脈左部弦長右部洪長皆重按甚實詢其心中恆覺發熱其家人謂其素性嗜酒近因心中懊憹益以燒酒澆愁飢時恆以酒代飯愚曰此證乃腦充血之劇者其左脈之弦長懊憹所生之熱也右脈之洪長積酒所生之熱也二熱相併挾臟腑氣血上衝腦部腦部中之血管若因其沖激過甚而破裂其人即昏厥不復醒今幸昏厥片時蘇醒其腦中血管當不至破裂或其管中之血隔血管滲出或其血管少有罅隙出血少許而復自止其所出之血著於司知覺之神經則神昏著於司運動之神經則痿廢此證左半身偏枯當系腦中血管所出之血傷其司右邊運動之神經也醫者不知致病之由竟投以治氣虛偏枯之藥而此證此脈豈能受黃耆之升補乎此所以服藥後而頭疼益劇也遂為疏方亦約略如前為其右脈亦洪實因於方中加生石膏一兩亦用鐵鏽水煎藥服兩劑頭疼全愈脈已和平左手足已能自動遂改用當歸赭石生杭芍玄參天冬各五錢生黃耆乳香沒藥各三錢紅花一錢連服數劑即扶杖能行矣方中用紅花者欲以化腦中之瘀血也為此時脈已和平頭已不疼可受黃耆之溫補故方中少用三錢以補助其正氣即藉以助歸芍乳沒以流通血脈更可調玄參天冬之寒涼俾藥性涼熱適均而可多服也上所録二案用藥大略相同而皆以牛膝為主藥者誠以牛膝善引上部之血下行為治腦充血證無上之妙品此愚屢經試驗而知故敢貢諸醫界而用治此證尤以懷牛膝為最佳論腦充血證可預防及其證誤名中風之由附建瓴湯腦充血證即內經之所謂厥證亦即後世之誤稱中風證前論已詳辨之矣而論此證者謂其猝發於一旦似難為之預防不知凡病之來皆預有朕兆至腦充血證其朕兆之發現實較他證為尤顯著且有在數月之前或數年之前而其朕兆即發露者今試將其發現之朕兆詳列於下一其脈必弦硬而長或寸盛尺虛或大於常脈數倍而毫無緩和之意二其頭目時常眩暈或覺腦中昏憒多健忘或常覺疼或耳聾目脹三胃中時覺有氣上衝阻塞飲食不能下行或有氣起自下焦上行作厄逆四心中常覺煩躁不寧或心中時發熱或睡夢中神魂飄蕩五或舌脹言語不利或口眼歪斜或半身似有麻木不遂或行動腳踏不穩時欲眩僕或自覺頭重足輕腳底如蹅棉絮上所列之證偶有一二發現再參以脈象之呈露即可斷為腦充血之朕兆也愚十餘年來治愈此證頗多曾酌定建瓴湯一方服後能使腦中之血如建瓴之水下行腦充血之證自愈爰將其方詳列於下以備醫界採用建瓴湯生懷山藥一兩懷牛膝一兩生赭石八錢軋細生龍骨六錢搗細生牡蠣六錢搗細生懷地黃六錢生杭芍四錢柏子仁四錢磨取鐵鏽濃水以之煎藥方中赭石必一面點點有凸一面點點有凹生軋細用之方效若大便不實者去赭石加建蓮子去心三錢若畏涼者以熟地易生地在津曾治遲之母年七旬有四時覺頭目眩暈腦中作疼心中煩躁恆覺發熱兩臂覺撑脹不舒脈象弦硬而大知係為腦充血之朕兆治以建瓴湯連服數劑諸病皆愈惟脈象雖不若從前之大而仍然弦硬因苦於吃藥遂停服後月餘病驟反復又用建瓴湯加減連服數劑諸病又愈脈象仍未和平又將藥停服後月餘病又反復亦仍用建瓴湯加減連服三十餘劑脈象和平如常遂停藥勿服病亦不再反復矣天津王姓叟年過五旬因頭疼口眼歪斜求治於西人醫院西人以表測其脈言其脈搏之力已達百六十毫米汞柱斷為腦充血證服其藥多日無效繼求治於愚其脈象弦硬而大知其果系腦部充血治以建瓴湯將赭石改用一兩連服十餘劑覺頭部清爽口眼之歪斜亦愈惟脈象仍未復常復至西人醫院以表測脈西醫謂較前低二十餘毫米汞柱然仍非無病之脈也後晤面向愚述之勸其仍須多多服藥必服至脈象平和方可停服彼覺病愈不以介意後四閲月未嘗服藥繼因有事出門勞碌數旬甫歸後又連次勞纍一旦忽眩僕於地而亡觀此二案知用此方以治腦充血者必服至脈象平和毫無弦硬之意而後始可停止也友人朱鉢文未嘗業醫而實精於醫嘗告愚曰腦充血證宜於引血下行藥中加破血之藥以治之愚聞斯言恍有悟會如目疾其疼連腦者多系腦部充血所致至眼科家恆用大黃以瀉其熱其腦與目即不疼此無他服大黃後腦充血之病即愈故也夫大黃非降血兼能破血最有力之藥乎由斯知凡腦充血證其身體脈象壯實者初服建瓴湯一兩劑時可酌加大黃數錢其身形脈象不甚壯實者若桃仁丹參諸藥亦可酌加於建瓴湯中也天津於氏少婦頭疼過劇且心下發悶作疼兼有行經過多症以建瓴湯加減治愈至唐宋以來名此證為中風者亦非無因嘗徵以平素臨症實驗知腦充血證恆因病根已伏於內繼又風束外表內生燥熱遂以激動其病根而猝發於一旦是以愚臨此證見有夾雜外感之熱者恆於建瓴湯中加生石膏一兩或兩三日後見有陽明大熱脈象洪實者又恆治以白虎湯或白虎加人參湯以清外感之熱而後治其腦充血證此愚生平之閲歷所得而非為唐宋以來之醫家諱過也然究之此等證謂其為中風兼腦充血則可若但名為中風仍不可也逮至劉河間出謂此證非外襲之風乃內生之風實因五志過極動火而猝中大法以白虎湯三黃湯沃之所以治實火也以逍遙散疏之所以治鬱火也以通聖散涼膈散雙解之所以治表裡之邪火也以六味湯滋之所以壯水之源以制陽光也以八味丸引之所謂從治之法引火歸原也又用地黃飲子治舌喑不能言足廢不能行此等議論似高於從前誤認腦充血為中風者一籌蓋腦充血證之起點多由於肝氣肝火妄動肝屬木能生風名之為內中風亦頗近理然因未悟內經所謂血之與氣並走於上之旨是以所用之方未能絲絲入扣與病證吻合也至其所載方中有防風柴胡桂附諸品尤為此證之禁藥金匱有風引湯除熱癱癇夫癱既以熱名明其病因熱而得也其證原似腦充血也方用石藥六味多系寒涼之品雖有乾薑桂枝之辛熱而與大黃石膏寒水石滑石並用藥性混合仍以涼論細按之桂枝幹薑究不宜用且諸石性皆下沉大黃性尤下降原能引逆上之血使之下行又有龍骨牡蠣與紫石英同用善斂沖氣與桂枝同用善平肝氣肝沖之氣不上干則血之上充者自能徐徐下降也且其方雖名風引而未嘗用祛風之藥其不以熱癱癇為中風明矣特後世不明方中之意多將其方誤解耳拙擬之建瓴湯重用赭石龍骨牡蠣且有加石膏之時實竊師風引湯之義也風引湯方下之文甚簡似非仲景筆墨故方書多有疑此係後世加入者故方中之藥品不純附録湖北天門崔來函張港一人患腦充血證忽然仆地上氣喘急身如角弓兩目直視全家惶恐衆醫束手殮服已備迎為診治遵建瓴湯原方治之一劑病愈強半後略有加減服數劑脫然全愈按鎮肝熄風湯實由建瓴湯加減而成論腦貧血治法附腦髓空治法腦貧血者其腦中血液不足與腦充血之病正相反也其人常覺頭重目眩精神昏憒或面黃唇白或呼吸短氣或心中怔忡其頭與目或間有作疼之時然不若腦充血者之脹疼似因有收縮之感覺而作疼其劇者亦可猝然昏僕肢體頽廢或偏枯其脈象微弱或至數兼遲西人但謂腦中血少不能榮養腦筋以致腦失其司知覺司運動之機能然此證但用補血之品必不能愈內經則謂上氣不足腦為之不滿此二語實能發明腦貧血之原因並已發明腦貧血之治法蓋血生於心上輸於腦心有四血脈管通腦然血不能自輸於腦也內經之論宗氣也謂宗氣積於胸中以貫心脈而行呼吸由此知胸中宗氣不但為呼吸之中樞而由心輸腦之血脈管亦以之為中樞今合內經兩處之文參之知所謂上氣者即宗氣上升之氣也所謂上氣不足腦為之不滿者即宗氣不能貫心脈以助之上升則腦中氣血皆不足也然血有形而氣無形西人論病皆從實驗而得故言血而不言氣也因此知腦貧血治法固當滋補其血尤當峻補其胸中宗氣以助其血上行持此以論古方則補血湯重用黃耆以補氣少用當歸以補血者可為治腦貧血之的方矣今録其方於下並詳論其隨證宜加之藥品生箭耆一兩當歸三錢呼吸短氣者加柴胡桔梗各二錢不受溫補者加生地玄參各四錢素畏寒涼者加熟地六錢乾薑三錢胸有寒飲者加乾薑三錢廣陳皮二錢內經上氣不足腦為之不滿二語非但據理想象也更可實徵諸囟門未合之小兒靈樞五味篇謂大氣摶於胸中賴穀氣以養之谷不入半日則氣衰一日則氣少大氣即宗氣也觀小兒慢驚風證脾胃虛寒飲食不化其宗氣之衰可知更兼以吐瀉頻頻虛極風動其宗氣不能助血上升以灌注於腦更可知是以小兒得此證者其囟門無不塌陷此非上氣不足頭為不滿之明徵乎王勉能謂小兒慢驚風證其脾胃虛寒氣血不能上朝腦中既有貧血之病又兼寒飲填胸其陰寒之氣上衝腦部激動其腦髓神經故發癇痙實為通論方書謂真陰寒頭疼證半日即足損命究之此證實兼因宗氣虛寒不能助血上升以致腦中貧血乏氣不能禦寒或更因宗氣虛寒之極而下陷呼吸可至頓停故至危險也審斯知欲治此證拙擬回陽升陷湯可為治此證的方矣若細審其無甚劇之實寒者宜將乾薑減半或不用亦可內經論人身有四海而腦為髓海人之色欲過度者其腦髓必空人之腦髓空者其人亦必頭重目眩甚或猝然昏厥知覺運動俱廢因腦髓之質原為神經之本源也其證實較腦貧血尤為緊要治之者宜用峻補腎經之劑加鹿角膠以通督脈並宜清心寡欲按此服藥不輟還精補腦之功自能收效於數旬中也論腦貧血痿廢治法附干頽湯補腦振痿湯肢體痿廢而其病因實由於腦部貧血也按生理之實驗人之全體運動皆腦髓神經司之雖西人之説而洵可確信是以西人對於痿廢之證皆責之於腦部而實有腦部充血與腦部貧血之殊蓋腦髓神經原借血為濡潤者也而所需之血多少尤以適宜為貴彼腦充血者血之注於腦者過多力能排擠其腦髓神經俾失所司至腦貧血者血之注於腦者過少無以養其腦髓神經其腦髓神經亦恆至失其所司至於腦中之所以貧血不可專責諸血也愚嘗讀內經而悟其理矣內經謂上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之眩夫腦不滿者血少也因腦不滿而貧血則耳鳴頭目傾眩即連帶而來其劇者能使肢體痿廢不言可知是西人腦貧血可致痿廢之説原與內經相符也然西醫論痿廢之由知因腦中貧血而內經更推腦中貧血之由知因上氣不足夫上氣者何胸中大氣也亦名宗氣其氣能主宰全身斡旋腦部流通血脈彼腦充血者因肝胃氣逆挾血上衝原於此氣無關至腦貧血者實因胸中大氣虛損不能助血上升也是以欲治此證者當以補氣之藥為主以養血之藥為輔而以通活經絡之藥為使也爰本此義擬方於下干頽湯治肢體痿廢或偏枯脈象極微細無力者生箭耆五兩當歸一兩甘枸杞果一兩淨杭萸肉一兩生滴乳香三錢生明沒藥三錢真鹿角膠六錢搗碎先將黃耆煎十餘沸去渣再將當歸枸杞萸肉乳香沒藥入湯同煎十餘沸去渣入鹿角膠末融化取湯兩大盅分兩次溫飲下方中之義重用黃耆以升補胸中大氣且能助氣上升上達腦中而血液亦即可隨氣上注惟其副作用能外透肌表具有宣散之性去渣重煎則其宣散之性減專於補氣升氣矣當歸為生血之主藥與黃耆並用古名補血湯因氣旺血自易生而黃耆得當歸之濡潤又不至燥熱也萸肉性善補肝枸杞性善補腎肝腎充足元氣必然壯旺元氣者胸中大氣之根也且肝腎充足則自脊上達之督脈必然流通督脈者又腦髓神經之根也且二藥皆汁漿稠潤又善贊助當歸生血也用乳香沒藥者因二藥善開血痹血痹開則痿廢者久瘀之經絡自流通矣甩鹿角膠者誠以腦既貧血其腦髓亦必空虛鹿角其所熬之膠善補腦髓腦髓足則腦中貧血之病自易愈也此方服數十劑後身體漸漸強壯而痿廢仍不愈者可繼服後方補腦振痿湯治肢體痿廢偏枯脈象極微細無力服藥久不愈者生箭耆二兩當歸八錢龍眼肉八錢杭萸肉五錢胡桃肉五錢蟅蟲三枚大者地龍三錢去淨土生乳香三錢生沒藥三錢鹿角膠六錢制馬錢子末三分共藥十一味將前九味煎湯兩盅半去渣將鹿角膠入湯內融化分兩次送服制馬錢子末一分五釐此方於前方之藥獨少枸杞因胡桃肉可代枸杞補腎且有強健筋骨之效也又嘗閲滬濱醫報謂腦中血管及神經之斷者地龍能續之愚則謂必輔以蟅蟲方有此效蓋蚯蚓即地龍善引蟅蟲善接斷之能自接二藥並用能將血管神經之斷者引而接之是以方中又加此二味也加制馬錢子者以其能瞤動神經使靈活也此方與前方若服之覺熱者皆可酌加天花粉天冬各數錢天津於年過四旬自覺呼吸不順胸中滿悶言語動作皆漸覺不利頭目昏沉時作眩暈延醫治療投以開胸理氣之品則四肢遽然痿廢再延他醫改用補劑而仍兼用開氣之品服後痿廢加劇言語竟不能發聲愚診視其脈象沉微右部尤不任循按知其胸中大氣及中焦脾胃之氣皆虛陷也於斯投以拙擬升陷湯加白朮當歸各三錢服兩劑諸病似皆稍愈而脈象仍如舊因將耆朮當歸知母各加倍升麻改用錢半又加黨參天冬各六錢連服三劑口可出聲而仍不能言肢體稍能運動而不能步履脈象較前有起色似堪循按因但將黃耆加重至四兩又加天花粉八錢先用水六大盅將黃耆煎透去渣再入他藥煎取清湯兩大盅分兩次服下又連服三劑勉強可作言語然恆不成句人扶之可以移步遂改用干頽湯惟黃耆仍用四兩服過十劑脈搏又較前有力步履雖仍需人而起臥可自如矣言語亦稍能達意其説不真之句間可執筆寫出從前之頭目昏沉眩暈者至斯亦見輕俾繼服補腦振痿湯囑其若服之順利可多多服之當有脫然全愈之一日也按此證其胸滿悶之時正因其呼吸不順也其呼吸之所以不順因胸中大氣及中焦脾胃之氣皆虛而下陷也醫者竟投以開破之藥是以病遽加重至再延他醫所用之藥補多開少而又加重者因氣分當虛極之時補氣之藥難為功破氣之藥易生弊也愚向治大氣下陷證病人恆自覺滿悶其實非滿悶實短氣也臨證者細細考究庶無差誤論心病治法心者血脈循環之樞機也心房一動則周身之脈一動是以心機亢進脈象即大而有力或脈搏更甚數心臟麻痹脈象即細而無力或脈搏更甚遲是脈不得其平大抵由心機亢進與心臟麻痹而來也於以知心之病雖多端實可分心機亢進心臟麻痹為二大綱今試先論心機亢進之病有因外感之熱熾盛於陽明胃府之中上蒸心臟致心機亢進者其脈象洪而有力或脈搏加數可用大劑白虎湯以清其胃或更兼腸有燥糞大便不通者酌用大小承氣湯以滌其腸則熱由下瀉心機之亢進者自得其平矣有下焦陰分虛損不能與上焦陽分相維繫其心中之君火恆至浮越妄動以致心機亢進者其人常苦眩暈或頭疼目脹耳鳴其脈象上盛下虛或搖搖無根至數加數宜治以加味左歸飲方用大熟地大生地生懷山藥各六錢甘枸杞懷牛膝生龍骨生牡蠣各五錢淨萸肉三錢雲苓片一錢此壯水之源以制浮遊之火心機之亢者自歸於和平矣有心體之陽素旺其胃腑又積有實熱復上升以助之以致心機亢進者其人脈雖有力而脈搏不數五心恆作灼熱宜治以鹹寒之品內經謂熱淫於內治以鹹寒若朴硝太陰玄精石及西藥硫苦皆為對證之藥每服少許日服三次久久自愈蓋心體屬火味之咸者屬水投以鹹寒之品是以寒勝熱水勝火也人之元神藏於腦人之識神發於心識神者思慮之神也人常思慮其心必多熱以人之神明屬陽思慮多者其神之陽常常由心發露遂致心機因熱亢進其人恆多迷惑其脈多現滑實之象因其思慮所生之熱恆與痰涎互相膠漆是以其脈滑而有力也可用大承氣湯厚朴宜少用以清熱降痰再加赭石生赭石兩半軋細同煎甘遂甘遂一錢研細調藥湯中服以助其清熱降痰之力藥性雖近猛烈實能穩建奇功而屢試屢效也有心機亢進之甚者其鼓血上行之力甚大能使腦部之血管至於破裂內經所謂血之與氣並走於上之大厥也亦即西人所謂腦充血之險證也推此證之原因實由肝木之氣過升肺金之氣又失於肅降則金不制木肝木之橫姿遂上干心臟以致心機亢進若更兼沖氣上衝其脈象之弦硬有力更迥異乎尋常矣當此證之初露朕兆時必先腦中作疼或間覺眩暈或微覺半身不利或肢體有麻木之處宜思患預防當治以清肺鎮肝斂沖之劑更重用引血下行之藥輔之連服十餘劑或數十劑其脈象漸變柔和自無意外之患向因此證方書無相當之治法曾擬得建瓴湯一方屢次用之皆效即不能治之於預其人忽然昏倒須臾能自蘇醒者大抵腦中血管未甚破裂急服此湯皆可保其性命連服數劑其頭之疼者可以全愈即腦中血管不復充血其從前少有破裂之處亦可自愈而其肢體之痿廢者亦可徐徐見效此方原用鐵鏽水煎藥若刮取鐵鏽數錢或多至兩許與藥同煎服更佳有非心機亢進而有若心機亢進者怔忡之證是也心之本體原長髮動以運行血脈然無病之人初不覺其動也惟患怔忡者則時覺心中跳動不安蓋人心中之神明原以心中之氣血為憑依有時其氣血過於虛損致神明失其憑依雖心機之動照常原分毫未嘗亢進而神明恆若不任其震撼者此其脈象多微細或脈搏兼數宜用山萸肉酸棗仁懷山藥諸藥品以保合其氣龍眼肉熟地黃柏子仁諸藥以滋養其血更宜用生龍骨牡蠣硃砂研細送服諸藥以鎮安其神明氣分虛甚者可加人參其血分虛而且熱者可加生地黃有因心體腫脹或有瘀滯其心房之門戶變為窄小血之出入致有激蕩之力而心遂因之覺動者此似心機亢進而亦非心機亢進也其脈恆為澀象或更兼遲宜治以拙擬活絡效靈丹加生懷山藥龍眼肉各一兩共煎湯服或用節菖蒲三兩遠志二兩共為細末每服二錢紅糖沖水送下日服三次久當自愈因菖蒲善開心竅遠志善化瘀滯因其含有稀鹽酸且二藥並用實善調補心臟而送以紅糖水者亦所以助其血脈流通也至心臟麻痹之原因亦有多端治法亦因之各異如傷寒溫病之白虎湯證其脈皆洪大有力也若不即時投以白虎湯脈洪大有力之極又可漸變為細小無力此乃由心機亢進而轉為心臟麻痹病候至此極為危險宜急投以大劑白虎加人參湯將方中人參加倍煎湯一大碗分數次溫飲下使藥力相繼不斷一日連服二劑庶可挽回蓋外感之熱傳入陽明其熱實脈虛者原宜治以白虎加人參湯是以傷寒汗吐下後用白虎湯時皆加人參然其脈非由實轉虛也至其脈由實轉虛是其心臟為熱所傷而麻痹已成壞證故用白虎加人參湯時宜將人參加倍助其心脈之跳動即可愈其心臟之麻痹也有心臟本體之陽薄弱更兼胃中積有寒飲溢於膈上凌逼心臟之陽不能用事其心臟漸欲麻痹脈象異常微細脈搏異常遲緩者宜治以拙擬理飲湯連服十餘劑寒飲消除淨盡心臟之陽自復其初脈之微弱遲緩者亦自復其常矣此證間有心中覺熱或周身發熱或耳鳴欲聾之種種反應象須兼看理飲湯後所載治愈諸案臨證診斷自無差誤有心臟為傳染之毒菌充塞以至於麻痹者霍亂證之六脈皆閉者是也治此證者宜治其心臟之麻痹更宜治其心臟之所以麻痹則興奮心臟之藥自當與掃除毒菌之藥並用如拙擬之急救回生丹衛生防疫寶丹是也此二方中用樟腦所升之冰片是興奮心臟以除其麻痹也二方中皆有硃砂薄荷冰是掃除毒菌以治心臟之所以麻痹也是以無論霍亂之因涼因熱投之皆可奏效也急救回生丹藥性微涼以治因熱之霍亂尤效衛生防疫寶丹其性溫無論病因涼熱用之皆有捷效有心中神明不得寧靜有若失其憑依而常驚悸者此其現象若與心臟麻痹相反若投以西藥麻醉之品亦可取效於一時而究其原因實亦由心體虛弱所致惟投以強心之劑乃為根本之治法當細審其脈若數而兼滑者當繫心血虛而兼熱宜用龍眼肉熟地黃諸藥補其虛生地黃玄參諸藥瀉其熱再用生龍骨牡蠣以保合其神明鎮靖其魂魄其驚悸自除矣其脈微弱無力者當繫心氣虛而莫支宜用參朮耆諸藥以補其氣兼用生地黃玄參諸滋陰藥以防其因補生熱更用酸棗仁山萸肉以凝固其神明收斂其氣化其治法與前條脈弱怔忡者大略相同特脈弱怔忡者心機之發動尤能照常而此則發動力微而心之本體又不時顫動猶人之力小任重而身顫也其心臟弱似較怔忡者尤甚矣有其驚悸恆發於夜間每當交睫甫睡之時其心中即驚悸而醒此多因心下停有痰飲心臟屬火痰飲屬水火畏水迫故作驚悸也宜清痰之藥與養心之藥並用方用二陳湯加當歸菖蒲遠志煎湯送服硃砂細末三分有熱者加玄參數錢自能安枕穩睡而無驚悸矣論肺病治法附清金二妙丹清肺三妙丹治肺病便方肺病之因有內傷外感之殊然無論內傷外感大抵皆有發熱之證而後釀成肺病誠以肺為嬌臟且屬金最畏火刑故也有如肺主皮毛外感風邪有時自皮毛襲入肺臟阻塞氣化即暗生內熱而皮毛為風邪所束不能由皮毛排出炭氣則肺中不但生熱而且釀毒肺病即由此起點其初起之時或時時咳嗽吐痰多有水泡或周身多有疼處舌有白苔或時覺心中發熱其脈象恆浮而有力可先用西藥阿斯匹林一瓦白糖沖水送下俾周身得汗繼用玄參天花粉各五錢金銀花川貝母各三錢硼砂八分研細分兩次送服粉甘草細末三錢分兩次送服煎湯服再每日用阿斯匹林一瓦分三次服白糖水送下勿令出汗此三次中或一次微有汗者亦佳如此服數日熱不退者可於湯藥中加生石膏七八錢若不用石膏或用湯藥送服西藥安知歇貌林半瓦亦可若此時不治病浸加劇吐痰色白而黏或帶腥臭此時亦可先用阿斯匹林汗之然恐其身體虛弱不堪發汗宜用生懷山藥一兩或七八錢煮作茶湯送服阿斯匹林半瓦俾服後微似有汗即可仍用前湯藥送服粉甘草細末三七細末各一錢煎渣時再送服二藥如前仍兼用阿斯匹林三分之一瓦白糖沖水送下或生懷山藥細末四五錢煮茶湯送下日兩次其嗽不止者可用山藥所煮茶湯送服川貝細末三錢山藥煮作茶湯其味微酸欲其適口可少調以白糖或柿霜皆可若不欲吃茶湯者可用生山藥片將其分量加倍煮取清湯以代茶湯飲之若當此時不治以後病又加劇時時咳吐膿血此肺病已至三期非尋常藥餌所能療矣必用中藥極貴重之品若徐靈胎所謂用清涼之藥以清其火滋潤之藥以養其血滑降之藥以祛其痰芳香之藥以通其氣更以珠黃之藥解其毒金石之藥填其空兼數法而行之屢試必效又邑中曾精醫術嘗告愚曰治肺癰惟林屋山人外科證治全生集中犀黃丸最效余用之數十年治愈肺癰甚多後愚至奉天遇肺癰咳吐膿血服他藥不愈者俾於服湯藥之外兼服犀黃丸果如曾所言效驗異常清涼華蓋飲後有案可參觀至所服湯藥宜用前方加牛蒡子栝蔞仁各數錢以瀉其膿再送服三七細末二錢以止其血至於犀黃丸配製及服法皆按原書茲不贅有外感伏邪伏膈膜之下久而入胃其熱上熏肺臟以致成肺病者其咳嗽吐痰始則稠黏繼則腥臭其舌苔或白而微黃其心中燥熱頭目昏眩脈象滑實多右勝於左宜用生石膏一兩玄參花粉生懷山藥各六錢知母牛蒡子各三錢煎湯送服甘草三七細末如前再用阿斯匹林三分之一瓦白糖水送服日兩次若其熱不退其大便不滑瀉者石膏可以加重曾治奉天徐姓叟病肺其脈弦長有力迥異尋常每劑藥中用生石膏四兩連服數劑脈始柔和由斯觀之藥以勝病為準其分量輕重不可預為限量也若其脈雖有力而至數數者可於前方中石膏改為兩半知母改為六錢再加潞黨參四錢蓋脈數者其陰分必虛石膏知母諸藥雖能退熱而滋陰仍所非長輔之以參是仿白虎加人參湯之義以滋其真陰不足涼潤之藥得人參則能滋真陰而脈之數者可變為和緩也若已咳嗽吐膿血者亦宜於服湯藥外兼服犀黃丸至於肺病由於內傷亦非一致有因脾胃傷損飲食減少土虛不能生金致成肺病者蓋脾胃虛損之人多因肝木橫恣侮克脾土致胃中飲食不化精液轉多化痰涎溢於膈上黏滯肺葉作咳嗽久則傷肺此定理也且飲食少則虛熱易生肝中所寄之相火因肝木橫恣更挾虛熱而刑肺於斯上焦恆覺煩熱吐痰始則黏滯繼則腥臭脅下時或作疼其脈弦而有力或弦而兼數重按不實方用生懷山藥一兩玄參沙參生杭芍柏子仁炒不去油各四錢金銀花二錢煎湯送服三七細末一錢西藥百布聖二瓦湯藥煎渣時亦如此送服若至咳吐膿血亦宜服此方兼服犀黃丸或因服犀黃丸減去三七亦可至百布聖則不可減去以其大有助脾胃消化之力也然亦不必與湯藥同時服每於飯後遲一句鍾服之更佳有因腎陰虧損而致成肺病者蓋腎與肺為子母之臟子虛必吸母之氣化以自救肺之氣化即暗耗且腎為水臟水虛不能鎮火火必妄動而刑金其人日晚潮熱咳嗽懶食或乾咳無痰或吐痰腥臭或兼喘促其脈細數無力方用生山藥一兩大熟地甘枸杞柏子仁各五錢玄參沙參各四錢金銀花川貝各三錢煎湯送服甘草三七細末如前若咳吐膿血者去熟地加牛蒡子蔞仁各三錢亦宜兼服犀黃丸若服藥後脈之數者不能漸緩亦可兼服阿斯匹林日兩次每次三分之一瓦蓋阿斯匹林之性既善治肺結核尤善退熱無論虛熱實熱其脈象數者服之可使其至數漸緩然實熱服之汗出則熱退故可服至一瓦若虛熱不宜出汗但可解肌服後或無汗或微似有汗方能退熱故一瓦必須分三次服若其人多汗者無論虛熱實熱皆分毫不宜用若其人每日出汗者無論其病因為內傷外感虛熱實熱皆宜於所服湯藥中加生龍骨生牡蠣淨山萸肉各數錢或研服好硃砂五分亦可止汗蓋以汗為心液硃砂能涼心血故能止汗也有其人素患吐血衄血陰血傷損多生內熱或醫者用藥失宜強止其血俾血瘀經絡亦久而生熱以致成肺病者其人必心中發悶發熱或有疼時廉於飲食咳嗽短氣吐痰腥臭其脈弦硬或弦而兼數方用生懷山藥一兩玄參天冬各五錢當歸生杭芍乳香沒藥各三錢遠志甘草生桃仁桃仁無毒宜帶皮生用因其皮紅能活血也然須明辨其果為桃仁不可誤用帶皮杏仁各二錢煎湯送服三七細末錢半煎渣時亦送服錢半蓋三七之性不但善止血且善化瘀血也若咳吐膿血者亦宜於服湯藥之外兼服犀黃丸或問桔梗能引諸藥入肺是以金匱治肺癰有桔梗湯此論肺病諸方何以皆不用桔梗答曰桔梗原提氣上行之藥病肺者多苦咳逆上氣恆與桔梗不相宜故未敢加入方中若其人雖病肺而不咳逆上氣者亦不妨斟酌用之或問方書治肺癰恆於其將成未成之際用皂莢丸或葶藶大棗湯瀉之將肺中之惡濁瀉去而後易於調治二方出自金匱想皆為治肺良方此論中皆未言及豈其方不可採用乎答曰二方之藥性近猛烈今之病肺者多虛弱是以不敢輕用且二方瀉肺治肺實作喘原是正治至瀉去惡濁痰涎以防肺中腐爛原是兼治之證其人果肺實作喘且不虛弱者葶藶大棗湯愚曾用過數次均能隨手奏效皂莢丸實未嘗用因皂莢性熱與肺病之熱者不宜也至欲以瀉濁防腐似不必用此猛烈之品若拙擬方中之硼砂三七及乳香沒藥皆化腐生新之妙品也況硼砂善治痰厥曾治痰厥半日不醒用硼砂四錢水煮化灌下吐出稠痰而愈由斯知硼砂開痰瀉肺之力固不讓皂莢葶藶也所可貴者瀉肺臟之實即以清肺金之熱潤肺金之燥解肺金之毒清熱潤燥解毒皆硼砂所長人但知口中腐爛者漱以硼砂則愈冰硼散善治口瘡而不知其治肺中之腐爛亦猶治口中之腐爛也且拙制有安肺寧嗽丸治肺郁痰火作嗽肺結核作嗽用之數年屢建奇效此丸藥中實亦硼砂之功居多也或問古有單用甘草四兩煎湯治肺癰者今所用治肺病諸方中其有甘草者皆為末送服而不以之入煎者何也答曰甘草最善解毒瀉熱然生用勝於熟用因生用則其性平且具有開通之力熟用則其性溫實多填補之力故其解毒瀉熱之力生勝於熟夫炙之為熟水煮之亦為熟若入湯劑是仍煎熟用矣不若為末服之之為愈也且即為末服又須審辨蓋甘草軋細頗難若軋之不細而用火炮焦再軋則生變為熟矣是以用甘草末者又宜自監視軋之再者愚在奉時曾制有清金二妙丹方用粉甘草細末二兩遠志細末一兩和勻每服錢半治肺病勞嗽甚有效驗肺有熱者可於每二妙丹一兩中加好硃砂細末二錢名為清肺三妙丹以治病肺結核咳嗽不止亦極有效然初服三四次時宜少加阿斯匹林每次約加四分之一瓦或五分之一瓦若汗多可無加也治肺病便方鮮白茅根去皮銼碎一大碗用水兩大碗煎兩沸候半點鐘視其茅根不沉水底再煎至微沸候須臾茅根皆沉水底去渣徐徐當茶溫飲之鮮小薊根二兩銼細煮兩三沸徐徐當茶溫飲之能愈肺病吐膿血者白蓮藕一斤切細絲煮取濃汁一大碗再用柿霜一兩融化其中徐徐溫飲之以上尋常土物用之皆能清減肺病恆有單用一方浹辰之間即能治愈肺病者醫方中有將鮮茅根鮮小薊根鮮藕共切碎煮汁飲之名為三鮮飲以治因熱吐血者甚效而以治肺病亦有效若再調以柿霜更佳拙擬寧嗽定喘飲亦治肺病之妙品也而肺病之咳而兼喘者服之尤宜北沙參細末每日用豆腐漿送服二錢上焦發熱者送服三錢善治肺病及肺勞喘嗽又西藥有橄欖油性善清肺其味香美病肺者可以之代香油或滴七八滴於水中服之亦佳飲食宜淡泊不可過食炮炙厚味及過咸之物宜多食菜蔬若藕鮮筍白菜萊蔔冬瓜果品若西瓜梨桑堪蘋果荸薺甘蔗皆宜不宜桃杏忌煙酒及一切辛辣之物又忌一切變味若糟魚松花蛋滷蝦油醬豆腐臭豆腐之類亦不宜食總論喘證治法俗語云喘無善證誠以喘證無論內傷外感皆為緊要之證也然欲究喘之病因當先明呼吸之樞機何臟司之喉為氣管內通於肺人之所共知也而吸氣之入實不僅入肺並能入心入肝入衝任以及於腎何以言之氣管之正支入肺其分支實下通於心更透膈而下通於肝觀肺心肝一系相連可知由肝而下更與衝任相連以通於腎倘曰不然何以婦人之妊子者母呼而子亦呼母吸而子亦吸乎呼吸之氣若不由氣管分支通於肝下及於衝任與腎何以子之臍帶其根蒂結於衝任之間能以臍承母之呼吸之氣而隨母呼吸乎是知肺者發動呼吸之機關也喘之為病神農本草經名為吐吸因吸入之氣內不能容而速吐出也其不容納之故有由於肺者有由於肝腎者試先以由於肝腎者言之腎主閉藏亦主翕納原所以統攝下焦之氣化兼以翕納呼吸之氣使之息息歸根也有時腎虛不能統攝其氣化致其氣化膨脹於衝任之間轉挾沖氣上衝而為腎行氣之肝木方書謂肝行腎之氣至此不能疏通腎氣下行亦轉隨之上衝是以吸入之氣未受下焦之翕納而轉受下焦之沖激此乃喘之所由來方書所謂腎虛不納氣也當治以滋陰補腎之品而佐以生肝血鎮肝氣及鎮沖降逆之藥方用大懷熟地生懷山藥各一兩生杭芍柏子仁甘枸杞淨萸肉生赭石細末各五錢蘇子甘草各二錢熱多者可加玄參數錢汗多者可加生龍骨生牡蠣各數錢有腎虛不納氣更兼元氣虛甚不能固攝而欲上脫者其喘逆之狀恆較但腎虛者尤甚宜於前方中去芍藥甘草加野臺參五錢萸肉改用一兩赭石改用八錢服一劑喘見輕心中覺熱者可酌加天冬數錢或用拙擬參赭鎮氣湯亦可有因猝然暴怒激動肝氣肝火更挾沖氣上衝胃氣上逆迫擠肺之吸氣不能下行作喘者方用川楝子生杭芍生赭石細末各六錢厚朴清夏乳香沒藥龍膽草桂枝尖蘇子甘草各二錢磨取鐵鏽濃水煎服以上三項作喘之病因由於肝腎者也而其脈象則有區別陰虛不納氣者脈多細數陰虛更兼元氣欲脫者脈多上盛下虛肝火肝氣挾沖氣胃氣上衝者脈多硬弦而長審脈辨證自無差誤也至喘之由於肺者因肺病不能容納吸入之氣其證原有內傷外感之殊試先論肺不納氣之由於內傷者一闟一闢呼吸自然之機關也至問其所以能呼吸者固賴胸中大氣為之斡旋又賴肺葉具有活潑機能以遂其闟闢之用乃有時肺臟受病肺葉之闟闢活潑者變為易闟難闢而成緊縮之性暑熱之時其緊數稍緩猶可不喘一經寒涼則喘立作矣此肺勞之證多發於寒涼之時也宜用生懷山藥軋細每用兩許煮作粥調以蔗白糖送服西藥百布聖七八分蓋肺葉緊縮者以其中津液減少血脈凝滯也有山藥蔗糖以潤之百布聖以化之百布聖為小豬小牛之胃液製成故善化久當自愈其有頑痰過盛者可再用蓬砂細末二分與百布聖同送服若外治灸其肺腧穴亦有效可與內治之方並用若無西藥百布聖處可代以生雞內金細末三分其化痰之力較百布聖尤強有痰積胃中更溢於膈上浸入肺中而作喘者古人恆用葶藶大棗瀉肺湯或十棗湯下之此乃治標之方究非探本窮源之治也拙擬有理痰湯連服十餘劑則此證之標本皆清矣至方中之義原方下論之甚詳茲不贅若其充塞於胸膈胃府之間不為痰而為飲且為寒飲者飲有寒熱熱飲脈滑其人多有神經病寒飲脈弦細概言飲為寒者非是其人或有時喘有時不喘或感受寒涼病即反復者此上焦之陽分虛也宜治以金匱苓桂朮甘湯加乾薑三錢厚朴陳皮各錢半俾其藥之熱力能勝其寒其飲自化而下行從水道出矣又有不但上焦之陽分甚虛並其氣分亦甚虛致寒飲充塞於胸中作喘者其脈不但弦細且甚微弱宜於前方中加生箭耆五錢方中乾薑改用五錢壬戌秋嚴為其友問二十六七年寒飲結胸時發大喘極畏寒涼曾為開去此方方中生箭耆用一兩乾薑用八錢非極虛寒之證不可用此重劑連服十餘劑全愈方中所以重用黃耆者以其能補益胸中大氣俾大氣壯旺自能運化寒飲下行也上所論三則皆內傷喘證之由於肺者也至外感之喘證大抵皆由於肺而其治法實因證而各有所宜人身之外表衛氣主之衛氣本於胸中大氣又因肺主皮毛與肺臟亦有密切之關係有時外表為風寒所束衛氣不能流通周身以致胸中大氣無所輸泄驟生膨脹之力肺懸胸中因受其排擠而作喘又因肺與衛氣關係密切衛氣鬱而肺氣必郁亦可作喘此傷寒論麻黃湯所主之證多有兼喘者也然用麻黃湯時宜加知母數錢汗後方無不解之虞至溫病亦有初得作喘者宜治以薄荷葉牛蒡子各三錢生石膏細末六錢甘草二錢或用麻杏甘石湯方亦可然石膏萬勿煆用而其分量又宜數倍於麻黃石膏可用至一兩麻黃治此證多用不過二錢此二證之喘同而用藥迥異者因傷寒之脈浮緊溫病之脈洪滑也有外感之風寒內侵與胸間之水氣凝滯上迫肺氣作喘者此傷寒論小青龍湯證也當必效金匱之小青龍加石膏法且必加生石膏至兩許用之方效又此方加減定例喘者去麻黃加杏仁而愚用此方治喘時恆加杏仁而仍用麻黃一錢其脈甚虛者又宜加野臺參數錢更定後世所用小青龍湯分量可參觀也又拙擬從龍湯方治服小青龍湯後喘愈而仍反復者用之曾屢次奏效上所論兩則治外感作喘之大略也有其人素有勞疾喘嗽少受外感即發此乃內傷外感相併作喘之證也宜治以拙擬加味越婢加半夏湯因其內傷外感相併作喘故所用之藥亦內傷外感並用特是上所論之喘其病因雖有內傷外感在肝腎在肺之殊約皆不能納氣而為吸氣難即神農本草經所謂吐吸也乃有其喘不覺吸氣難而轉覺呼氣難者其病因由於胸中大氣虛而下陷不能鼓動肺臟以行其呼吸其人不得不努力呼吸以自救其呼吸迫促之形狀有似乎喘而實與不納氣之喘有天淵之分設或辨證不清見其作喘復投以降氣納氣之藥則凶危立見矣然欲辨此證不難也蓋不納氣之喘其劇者必然肩息肩上聳也大氣下陷之喘縱呼吸有聲必不肩息而其肩益下垂即此二證之脈論亦迥不同不納氣作喘者其脈多數或尺弱寸強大氣下陷之喘其脈多遲而無力尺脈或略勝於寸脈察其狀而審其脈辨之固百不失一也其治法當用拙擬升陷湯以升補其胸中大氣其喘自愈有大氣下陷作喘又兼陰虛不納氣作喘者其呼吸皆覺困難益自強為呼吸而呈喘狀其脈象微弱無力或脈搏略數或背發緊而身心微有灼熱宜治以生懷山藥一兩玄參甘枸杞各六錢生箭耆四錢知母桂枝尖各二錢煎湯服方中不用桔梗升柴者恐與陰虛不納氣有礙也上二證之喘同中有異升陷湯後皆有驗案可參觀也有肝氣膽火挾沖胃之氣上衝作喘其上衝之極至排擠胸中大氣下陷其喘又頓止並呼吸全無須臾忽又作喘而如斯循環不已者此乃喘證之至奇者也曾治一少婦因夫妻反目得此證用桂枝尖四錢恐其性熱佐以帶心寸冬三錢煎湯服下即愈因讀神農本草經桂枝能升大氣兼能降逆氣用之果效如影響夫以桂枝一物之微而升陷降逆兩擅其功此誠天之生斯使獨也論胃病噎膈即胃癌治法及反胃治法附變質化瘀丸噎膈之證方書有謂賁門枯乾者有謂沖氣上衝者有謂痰瘀者有謂血瘀者愚向謂此證系中氣衰弱不能撑懸賁門以致賁門縮如藕孔賁門與大小腸一氣貫通視其大便若羊矢其賁門大小腸皆縮小可知痰涎遂易於壅滯因痰涎壅滯沖氣更易於上衝所以不能受食向曾擬參赭培氣湯一方仿仲景旋覆代赭石湯之義重用赭石至八錢以開胃鎮沖即以下通大便此證大便多艱而即用人參以駕馭之俾氣化旺而流通自能撑懸賁門使之寬展又佐以半夏知母當歸天冬諸藥以降胃利痰潤燥生津用之屢見效驗逮用其方既久效者與不效者參半又有初用其方治愈及病又反復再服其方不效者再三躊躇不得其解亦以為千古難治之證原不能必其全愈也後治一叟年近七旬住院月餘已能飲食而終覺不脫然逮其回家年餘仍以舊證病故瀕危時吐出膿血若干乃恍悟從前之不能脫然者系賁門有瘀血腫脹也當時若方中加破血之藥或能全愈蓋愚於瘀血致噎之證素日未有經驗遂至忽不留心後讀吳鞠通楊素園論噎膈亦皆注重瘀血之説似可為從前所治之叟亦有瘀血之確徵而愚於此案或從前原有瘀血或以後變為瘀血心中仍有遊移何者以其隔年餘而後反復也逮辛酉孟夏閲天津盧氏醫學報百零六期謂胃癌由於胃瘀血治此證者兼用古下瘀血之劑屢屢治愈又無再發之厄覺胸中疑團頓解蓋此證無論何因其賁門積有瘀血者十之七八其瘀之重者非當時兼用治瘀血之藥不能愈其瘀之輕者但用開胃降逆之藥瘀血亦可些些消散故病亦可愈而究之瘀血之根蒂未淨是以有再發之厄也古下瘀血之方若抵當湯抵當丸下瘀血湯大黃蟅蟲丸諸方可謂能勝病矣而愚意以為欲治此證必中西之藥並用始覺有把握蓋以上諸方治瘀血雖有效以消瘤贅恐難見效西醫名此證為胃癌所謂癌者因其處起凸若山之有岩也其中果函有瘀血原可用消瘀血之藥消之若非函有瘀血但用消瘀血之藥即不能消除夫人之腸中可生腸菌腸菌即瘤贅也腸中可生瘤贅即胃中亦可生瘤贅而消瘤贅之藥惟西藥沃剝即沃度加𠌃謨最效此其在變質藥中獨占優勝之品也今愚閣中西藥品擬得一方於下以備試用變質化瘀丸旱三七一兩細末桃仁一兩炒熟細末硼砂六錢細末粉甘草四錢細末西藥沃剝十瓦百布聖二十瓦上藥六味調和煉蜜為丸二錢重服時含化細細咽津今擬定治噎膈之法無論其病因何如先服參赭培氣湯兩三劑必然能進飲食若以後愈服愈見效七八劑後可於原方中加桃仁紅花各數錢以服至全愈為度若初服見效繼服則不能遞次見效者可於原方中加三稜二錢蟅蟲錢半再於湯藥之外每日口含化服變質化瘀丸三丸或四丸久久當有效驗若其瘀血已成潰瘍而膿未盡出者又宜投以山甲皂刺乳香沒藥花粉連翹諸藥以消散之此證之脈若見滑象者但服參赭培氣湯必愈而服過五六劑後可用藥湯送服三七細末一錢煎渣服時亦如此逮愈後自無再發之厄矣王孟英謂以新生小鼠新瓦上焙乾研末溫酒沖服治噎膈極有效蓋鼠之性能消癥瘕善通經絡故以治血瘀賁門成噎膈者極效也有一人患噎膈偶思飲酒飲盡一壺而脫然病愈驗其壺中有蜈蚣一條甚巨因知其病愈非由於飲酒實由於飲煮蜈蚣之酒也聞其事者質疑於愚此蓋因蜈蚣善消腫瘍患者必因賁門瘀血成瘡致噎故飲蜈蚣酒而頓愈也欲用此方者可用無灰酒數兩白酒黃酒皆可不宜用燒酒煮全蜈蚣三條飲之總論破瘀血之藥當以水蛭為最然此物忌炙必須生用之方有效乃醫者畏其猛烈炙者猶不敢用則生者無論矣不知水蛭性原和平而具有善化瘀血之良能若服以上諸藥而病不愈者想系瘀血凝結甚固當於服湯藥丸藥之外每用生水蛭細末五分水送服日兩次若不能服藥末者可將湯藥中蟅蟲減去加生水蛭二錢附録唐登醫志原文讀雜志第四期張錫純君論治噎膈闡發玄微於此證治法別開徑面卓見名言實深欽佩及又讀侯西醫反胃論見第三中學第二期雜志中謂病原之最重要者乃幽門之發生胃癌妨礙食物入腸之道路初時胃力尚佳猶能努力排除障礙以輸運食物於腸久而疲勞機能愈弱病勢益進乃成反胃按其引西醫之論反胃言其原因同於噎膈可以治噎膈之法治之固屬通論然即愚生平經驗以來反胃之證原有兩種有因幽門生癌者有因胃中虛寒兼胃氣上逆沖氣上衝者其幽門生癌者治法原可通於噎膈若胃中虛寒兼氣機沖逆者非投以溫補胃府兼降逆鎮沖之藥不可且即以胃中生癌論賁門所生之癌多屬瘀血幽門所生之癌多屬瘤贅瘀血由於血管凝滯瘤贅由於腺管肥大治法亦宜各有注重宜於參赭培氣湯中加生雞內金三錢三稜二錢於變質化瘀丸中加生水蛭細末八錢再將西藥沃剝改作十五瓦蜜為丸桐子大每服三錢日服兩次而後幽門所生之癌若為瘤贅可徐消即為瘀血亦不難消除又治噎膈便方用昆布二兩洗淨鹽小麥二合用水三大盞煎至小麥爛熟去渣每服不拘時飲一小盞仍取昆布不住口含兩三片咽津極效按此方即用西藥沃度加𠌃謨之義也蓋西藥之沃度加𠌃謨原由海草燒灰製出若中藥昆布海藻海帶皆含有沃度加𠌃謨之原質者也其與小麥同煮服者因昆布味鹹性涼久服之恐與脾胃不宜故加小麥以調補脾胃也此方果效則人之幽門因生瘤贅而反胃者用之亦當有效也論胃氣不降治法陽明胃氣以息息下行為順為其息息下行也即時時借其下行之力傳送所化飲食達於小腸以化乳糜更傳送所餘渣滓達於大腸出為大便此乃人身氣化之自然自飛門以至魄門一氣運行而無所窒礙者也乃有時胃氣不下行而轉上逆推其致病之由或因性急多怒肝膽氣逆上干或因腎虛不攝沖中氣逆上衝而胃受肝膽沖氣之排擠其勢不能下行轉隨其排擠之力而上逆逮至上逆習為故常其下行之能力盡失即無他氣排擠之時亦恆因蓄極而自上逆於斯飲食入胃不能傳送下行上則為脹滿下則為便結此必然之勢也而治之者不知其病因在胃府之氣上逆不下降乃投以消脹之藥藥力歇而脹滿依然治以通便之劑今日通而明日如故久之兼證歧出或為嘔噦或為厄為逆或為吐衄或胸膈煩熱或頭目眩暈或痰涎壅滯或喘促咳嗽或驚悸不寐種種現證頭緒紛繁則治之愈難即間有知其致病之由在胃氣逆而不降者而所用降胃之藥若半夏蘇子蔞仁竹茹厚朴枳實諸品亦用之等於不用也而愚數十年經驗以來治此證者不知凡幾知欲治此證非重用赭石不能奏效也蓋赭石對於此證其特長有六其重墜之力能引胃氣下行一也既能引胃氣下行更能引胃氣直達腸中以通大便二也因其饒有重墜之力兼能鎮安沖氣使不上衝三也其原質系鐵養化合含有金氣能制肝木之橫恣使其氣不上干四也為其原質系鐵養化合更能引浮越之相火下行而胸膈煩熱頭目眩暈自除五也其力能降胃通便引火下行而性非寒涼開破分毫不傷氣分因其為鐵養化合轉能有益於血分鐵養化合同於鐵鏽故能補血中之鐵鏽六也是以愚治胃氣逆而不降之證恆但重用赭石即能隨手奏效也丙寅季春愚自滄州移居天津有郭者年近三旬造寓求診自言心中常常滿悶飲食停滯胃中不下間有嘔吐之時大便非服通利之品不行如此者年餘屢次服藥無效至今病未增劇因飲食減少則身體較前羸弱矣診其脈至數如常而六部皆有郁象因曉之曰此胃氣不降之證也易治耳但重用赭石數劑即可見效也為疏方用生赭石細末一兩生懷山藥炒懷山藥各七錢全當歸三錢生雞內金二錢厚朴柴胡各一錢囑之曰此藥煎湯日服一劑服至大便日行一次再來換方時有同縣醫友李在座亦為診其脈疑而問曰凡胃氣不降之病其脈之現象恆弦長有力今此證既系胃氣不降何其六脈皆有郁象而重按轉若無力乎答曰善哉問也此中頗有可研究之價值蓋凡胃氣不降之脈其初得之時大抵皆弦長有力以其病因多系沖氣上衝或更兼肝氣上干沖氣上衝脈則長而有力肝氣上干脈則弦而有力肝沖並見脈則弦長有力也然其初為肝氣衝氣之所迫其胃府之氣不得不變其下行之常而上逆逮其上逆既久因習慣而成自然即無他氣衝之干之亦恆上逆而不能下行夫胃居中焦實為後天氣化之中樞故胃久失其職則人身之氣化必郁亦為胃久失其職則人身之氣化又必虛是以其脈之現象亦鬱而且虛也為其鬱也是以重用赭石以引胃氣下行而佐以厚朴以通陽葉天士謂厚朴多用則破氣少用則通陽雞內金以化積則鬱者可開矣為其虛也是以重用山藥生熟各半取其能健脾兼能滋胃脾濕勝不能健運宜用炒山藥以健之胃液少不能化食宜用生山藥以滋之然後能受開鬱之藥而無所傷損用當歸者取其能生血兼能潤便補虛即以開鬱也用柴胡者因人身之氣化左宜升右宜降但重用鎮降之藥恐有妨於氣化之自然故少加柴胡以宣通之所以還其氣化之常也李聞之深韙愚言後其人連服此藥八劑大便日行一次滿悶大減飲食加多遂將赭石改用六錢柴胡改用五分又加白朮錢半連服十劑全愈閲旬日李遇有此證脈亦相同亦重用赭石治愈論吐血衄血之原因及治法內經厥論篇謂陽明厥逆衄嘔血此陽明指胃腑而言也蓋胃腑以熟腐水穀傳送飲食為職其中氣化原以息息下行為順乃有時不下行而上逆胃中之血亦恆隨之上逆其上逆之極可將胃壁之膜排擠破裂而成嘔血之證或循陽明之經絡上行而成衄血之證是以內經謂陽明厥逆衄嘔血也由此知無論其證之或虛或實或涼或熱治之者皆當以降胃之品為主而降胃之最有力者莫赭石若也故愚治吐衄之證方中皆重用赭石再細審其胃氣不降之所以然而各以相當之藥品輔之茲爰將所用之方詳列於下平胃寒降湯治吐衄證脈象洪滑重按甚實者此因熱而胃氣不降也生赭石一兩軋細栝蔞仁一兩炒搗生杭芍八錢嫩竹茹三錢細末牛蒡子三錢搗碎甘草錢半此拙擬寒降湯而略有加減也服後血仍不止者可加生地黃一兩三七細末三錢分兩次用頭煎二煎之湯送服吐衄之證忌重用涼藥及藥炭強止其血因吐衄之時血不歸經遽止以涼藥及藥炭則經絡瘀塞血止之後轉成血痹虛勞之證是以方中加生地黃一兩即加三七之善止血兼善化瘀血者以輔之也健胃溫降湯治吐衄證脈象虛濡遲弱飲食停滯胃口不能下行此因涼而胃氣不降也生赭石八錢軋細生懷山藥六錢白朮四錢炒乾薑三錢清半夏三錢溫水淘淨礬味生杭芍二錢厚朴錢半此方原名溫降湯茲則於其分量略有加減也方中猶用芍藥者防肝中所寄之相火不受乾薑之溫熱也吐衄之證因涼者極少愚臨證四十餘年僅遇兩童子一因涼致胃氣不降吐血一因涼致胃氣不降衄血皆用溫降湯治愈其詳案皆載原方之後可參觀瀉肝降胃湯治吐衄證左脈弦長有力或肋下脹滿作疼或頻作厄逆此肝膽之氣火上衝胃腑致胃氣不降而吐衄也生赭石八錢搗細生杭芍一兩生石決明六錢搗細栝蔞仁四錢炒搗甘草四錢龍膽草二錢淨青黛二錢此方因病之原因在膽火肝氣上衝故重用芍藥石決明及龍膽青黛諸藥以涼之鎮之至甘草多用至四錢者取其能緩肝之急兼以防諸寒涼之藥傷脾胃也鎮沖降胃湯治吐衄證右脈弦長有力時覺有氣起在下焦上衝胃腑飲食停滯不下或頻作厄逆此沖氣上衝以致胃不降而吐衄也生赭石一兩軋細生懷山藥一兩生龍骨八錢搗細生牡蠣八錢搗細生杭芍三錢甘草二錢廣三七細末二錢分兩次用頭煎二煎之湯送服方中龍骨牡蠣不但取其能斂沖且又能鎮肝因沖氣上衝之由恆與肝氣有關係也滋陰清降湯治吐衄證失血過多陰分虧損不能潛陽而作熱不能納氣而作喘甚或沖氣因虛上干為厄逆眩暈咳嗽心血因不能內榮為怔忡驚悸不寐脈象浮數重按無力者生赭石八錢軋細生懷山藥一兩生地黃八錢生龍骨六錢搗細生牡蠣六錢搗細生杭芍四錢甘草二錢廣三七細末二錢分兩次用頭煎二煎之湯送服此方即清降湯加龍骨牡蠣地黃三七也原方所主之病原與此方無異而加此數味治此病尤有把握此因臨證既多屢次用之皆驗故於原方有所增加也保元清降湯治吐衄證血脫氣亦隨脫言語若不接續動則作喘脈象浮弦重按無力者生赭石一兩軋細野臺參五錢生地黃一兩生懷山藥八錢淨萸肉八錢生龍骨六錢搗細生杭芍四錢廣三七細末三錢分兩次用頭煎二煎之湯送服此方曾載吐衄門而茲則略有加減也保元寒降湯治吐衄證血脫氣亦隨脫喘促咳逆心中煩熱其脈上盛下虛者生赭石一兩軋細野臺參五錢生地黃一兩知母八錢淨萸肉八錢生龍骨六錢搗細生牡蠣六錢搗細生杭芍四錢廣三七細末三錢搗分兩次用頭煎二煎藥湯送服此方亦載於吐衄門中而茲則略有變更也至於醫方所載此二方之原方非不可用宜彼宜此之間細為斟酌可也上所列諸方用之與病因相當大抵皆能奏效然病機之呈露多端病因即隨之各異臨證既久所治愈吐衄之驗案間有不用上列諸方者如拙擬祕紅丹及補絡補管湯等方後各案可互相參觀吐衄證最忌黃耆升柴桔梗諸藥恐其能助氣上升血亦隨之上升也若確知病系宗氣下陷可以放膽用之然必佐以龍骨牡蠣以固血之本源始無血隨氣升之虞也然吐衄證之因宗氣下陷者極少愚臨證四十餘年僅遇趙姓一人再四斟酌投以升陷湯加龍骨牡蠣治愈然此方實不可輕試也近津沽有張姓年過三旬患吐血證醫者方中有柴胡二錢服後遂大吐不止倉猝迎愚診視其脈弦長有力心中發熱知系胃氣因熱不降也所攜藥囊中有生赭石細末約兩餘俾急用水送服強半候約十二分鐘覺心中和平又送服其餘其吐頓止繼用平胃寒降湯調之全愈是知同一吐血證也有時用柴胡而愈有時用柴胡幾至誤人性命審證時豈可不細心哉至於婦女倒經之證每至行經之期其血不下行而上逆作吐衄者宜治以四物湯去川芎加懷牛膝生赭石細末先期連服數劑可愈然其證亦間有因氣陷者臨證時又宜細察曾治一室女吐血及一少婦衄血皆系倒行經證其脈皆微弱無力氣短不足以息少腹時有氣下墜皆治以他止血之藥不效後再三斟酌皆投以升陷湯先期連服數日全愈總之吐衄之證大抵皆因熱而氣逆其因涼氣逆者極少即兼沖氣肝氣衝逆亦皆挾熱若至因氣下陷致吐衄者不過千中之一二耳天津趙年近三旬病吐血經醫治愈而飲食之間若稍食硬物或所食過飽病即反復診其六脈和平重按似有不足知其脾胃消化弱其胃中出血之處所生肌肉猶未復原是以被食物撑擠因傷其處而復出血也斯當健其脾胃補其傷處吐血之病庶可除根為疏方用生山藥赤石脂各八錢煆龍骨煆牡蠣淨萸肉各五錢白朮生明沒藥各三錢天花粉甘草各二錢按此方加減服之旬余病遂除根此方中重用石脂者因治吐衄病凡其大便不實者可用之以代赭石降胃蓋赭石能降胃而兼能通大便赤石脂亦能降胃而轉能固大便且其性善保護腸胃之膜而有生肌之效使胃膜因出血而傷者可速愈也或問方書治吐衄之方甚多今詳論吐衄治法皆系自擬豈治吐衄成方皆無可取乎答曰非也金匱治吐衄有瀉心湯其方以大黃為主直入陽明以降胃氣佐以黃芩以清肺金之熱俾其清肅之氣下行以助陽明之降力黃連以清心火之熱俾其亢陽默化潛伏以保少陰之真液是瀉之適所以補之也凡因熱氣逆吐衄者至極危險之時用之皆可立止血止以後然後細審其病因徐為調補未晚也然因方中重用大黃吐衄者皆不敢輕服則良方竟見埋沒矣不知大黃與黃連並用但能降胃不能通腸雖吐衄至身形極虛服後斷無泄瀉下脫之弊乃素遇吐衄證曾開此方兩次病家皆不敢服遂不得已另擬平胃寒降湯代之此所以委曲以行其救人之術也金匱有柏葉湯方為治因寒氣逆以致吐血者之良方也故其方中用乾薑艾葉以暖胃用馬通汁以降胃然又慮薑艾之辛熱宜於脾胃不宜於肝膽恐服藥之後肝膽所寄之相火妄動故又用柏葉之善於鎮肝且善於涼肝者以輔之此所謂有節制之師先自立於不敗之地而後能克敵致勝也至後世薛立齋謂因寒吐血者宜治以理中湯加當歸但知暖胃不知降胃並不知鎮肝涼肝其方遠遜於柏葉湯矣然此時有喜服西藥恆譏中藥為不潔若雜以馬通汁將益嫌其不潔矣是以愚另擬健胃溫降湯以代之也近時醫者治吐衄喜用濟生犀角地黃湯然其方原治傷寒胃火熱盛以致吐血衄血之方無外感而吐衄者用之未免失於寒涼其血若因寒涼而驟止轉成血痹虛勞之病至愚治寒溫吐衄者亦偶用其方然必以其方煎湯送服三七細末二錢始不至血瘀為恙若其脈左右皆洪實者又宜加羚羊角二錢以瀉肝膽之熱則血始能止至葛可久之十灰散經陳修園為之疏解治吐衄者亦多用之夫以藥炭止血原為吐衄者所甚忌猶幸其雜有大黃炭方下注灰存性即是炭其降胃開瘀之力猶存為差強人意耳其方遇吐衄之輕者或亦能奏效而愚於其方實未嘗一用也至於治吐衄便方有用其吐衄之血煆作炭服者有用發髲即剃下之短髮煅作炭服者此二種炭皆有化瘀生新之力而善止血勝於諸藥之炭但能止血而不能化瘀血以生新血者遠矣方書有謂血脫者當先益其氣宜治以獨參湯然血脫須有分別若其血自二便下脫其脈且微弱無力者獨參湯原可用若血因吐衄而脫者縱脈象微弱亦不宜用夫人身之陰陽原相維繫即人身之氣血相維繫也吐衄血者因陰血虧損維繫無力原有孤陽浮越之虞而復用獨參湯以助其浮越不但其氣易上奔喻嘉言謂氣虛欲脫者但服人參轉令氣高不返血亦將隨之上奔而復吐衄矣是拙擬治吐衄方中凡用參者必重用赭石輔之使其力下達也尋常服食之物亦有善止血者鮮藕汁鮮萊蔔汁是也曾見有吐衄不止者用鮮藕自然汁一大盅溫飲之勿令熟或鮮萊蔔自然汁一大盅溫飲之或二汁並飲之皆可奏效有堂兄年五旬得吐血證延醫治不效脈象滑動按之不實時愚年少不敢輕於疏方遂用鮮藕鮮白茅根各四兩切碎煎湯兩大碗徐徐當茶飲之數日全愈自言未飲此湯時心若虛懸無著既飲之後若以手按心還其本位何其神妙如是哉隔數日又有鄰村劉姓少年患吐血證其脈象有力心中發熱遂用前方又加鮮小薊根四兩如前煮湯飲之亦愈因名前方為二鮮飲後方為三鮮飲至於咳血之證上所録醫案中間或連帶論及實非專為咳血發也因咳血原出於肺其詳細治法皆載於治肺病方中茲不贅論痢證治法附開胃資生丹唐容川曰內經云諸嘔吐酸暴注下迫皆屬於熱下迫與吐酸同言則知其屬於肝熱也仲景於下利後重便膿血者亦詳於厥陰篇中皆以痢屬肝經也蓋痢多發於秋乃肺金不清肝木遏郁肝主疏泄其疏泄之力太過則暴注裡急有不能待之勢然或大腸開通則直瀉下矣乃大腸為肺金之腑金性收澀秋日當令而不使瀉出則滯塞不得快利遂為後重是以治痢者開其肺氣清其肝火則下痢自愈此論甚超妙其推詳痢之原因及治痢之法皆確當愚今特引伸其説復為詳悉言之蓋木雖旺於春而其發榮滋長實在於夏故季夏六月為未月未者木重葉也言木至此旺之極也而肝臟屬木故於六月亦極旺肝木過旺而侮克脾土是以季夏多暴注下瀉之證而痢證甚少因肺金猶未當令其收澀之力甚微也即其時偶有患痢者亦多系濕熱釀成但利濕清熱病即可愈是以六一散為治暑痢之定方而非所論於秋日之痢也逮至已交秋令金氣漸伸木氣漸斂人之臟腑原可安於時序之常不必發生痢證也惟其人先有蘊熱則肝木乘熱恣肆當斂而不斂又於飲食起居之間感受寒涼肺金乘寒涼之氣愈施其肅降收澀之權則金木相犯交迫於腸中而痢作矣是知痢之成也固由於金木相犯而金木之相犯實又因寒火交爭之力以激動之也若唐氏所謂開肺清肝原為正治之法然止可施於病之初起非所論於痢病之已深也且統觀古今治痢之方大抵皆用之於初期則效用之於末期則不效今特將痢證分為數期詳陳其病之情狀及治法於下痢之初得也時時下利膿血後重腸疼而所下膿則甚稠血則甚鮮腹疼亦不甚劇脈之滑實者可用小承氣湯加生杭芍四錢甘草二錢下之蓋方中朴實原可開肺大黃芍藥又善清肝且厚朴溫而黃芍涼更可交平其寒熱以成滌腸蕩滯之功加甘草者取其能調胃兼能緩肝即以緩承氣下降之力也其脈按之不實者可治以拙擬化滯湯若當此期不治或治以前方而仍不愈或遷延數旬或至纍月其腹疼浸劇所下者雖未甚改色而間雜以脂膜其脈或略數或微虛宜治以拙擬燮理湯愚生平用此方治愈之人甚多無論新痢久痢皆可用用上方雖新痢久痢皆可奏效而其腸中大抵未至腐爛也乃有腹中時時切疼後重所下者多如爛炙雜以脂膜是其腸中已腐爛矣當治以拙擬通變白頭翁湯方中之意用白頭翁秦皮芍藥生地榆以清熱三七鴉膽子以化瘀生新治腸中腐爛而又重用生山藥以滋其久耗之津液固其已虛之氣化所以奏效甚捷也愚在奉時有王下痢甚劇曾以此方治愈其詳案載此方之後可考也至素有鴉片嗜好者無論其痢之初得及日久皆宜治以此方用之屢建奇功至地榆方書多炒炭用之而此方生用者因生用性涼善保人之肌膚使不因熱潰爛是以被湯火傷肌膚者用生地榆為末香油調敷立愈痢之熱毒侵入腸中肌膚久至腐爛亦猶湯火傷人肌膚至潰爛也此地榆之所以生用也至白頭翁湯原方原白頭翁秦皮與黃連黃柏並用方中藥品若此純用苦寒者誠以其方本治厥陰熱痢原挾有傷寒實熱今用以治痢久腸中腐爛故不得不為變通也上之痢證又可治以拙擬生化丹為其虛甚加生懷山藥一兩先用白糖水送服三七鴉膽子各一半再將餘四味煎湯服至煎渣服時仍先用白糖水送服所餘之三七鴉膽子再煎服湯藥蓋痢證至此西人謂之腸潰瘍不可但以痢治宜半從瘡治是以用金銀花粉甘草以解瘡家之熱毒三七鴉膽子以化瘀生新而鴉膽子味至苦且有消除之力搗膏能點疣又可除痢證傳染之毒菌用芍藥泄肝火以治痢之本病又恐其痢久傷陰及下焦氣化不固是以又重用生山藥以滋陰液固氣化此所以投之必效也醫方篇本方後載有醫案可參觀當愚初擬此方時猶未見西人腸潰瘍之説及後見西書其所載治法但注重腸潰瘍而不知兼用藥清痢之本源是以不如此方之效也有下痢日久虛熱上蒸飲食減少所下者形如爛炙雜以脂膜又兼腐敗之色腥臭異常腹中時時切疼益甚者此腹中生機將斷其為病尤重矣宜治以前方再加潞黨參天門冬各三錢此用參以助其生機即用天冬以調劑參之熱也有因素傷煙色腎經虛憊復下痢日久腸中欲腐爛其下焦之氣化愈虛脫而不能固攝者宜治以拙擬三寶粥方中之意用三七鴉膽子以治腸中之腐爛用山藥粥以補下焦之虛脫也有下痢或赤或白或赤白參半後重腹疼表裡俱覺發熱服涼藥而熱不退痢亦不愈其脈確有實熱者此等痢證原兼有外感之熱其熱又實在陽明之腑非少陰篇之桃花湯所能愈亦非厥陰篇之白頭翁湯所能愈也惟治以拙擬通變白虎加人參湯則隨手奏效痢證身熱不休服清火藥而熱亦不休者方書多諉為不治然治果對證其熱焉有不休之理此誠因外感之熱邪隨痢深陷永無出路以致痢為熱邪所助日甚一日而永無愈期治以此湯以人參助石膏能使深陷之熱邪徐徐上升外散消解無餘加以芍藥甘草以理後重腹疼生山藥以滋陰固下連服數劑熱退而痢亦遂愈方中之藥原以芍藥代知母生山藥代粳米與白虎加人參湯之原方猶相倣佛故曰通變白虎加人參湯也愚生平用此方治愈此等痢證甚多醫方篇本方後載有數案可參觀也此外感之熱與痢相併最為險證嘗見東人著有赤痢新論大為丁仲祜所推許然其中載有未治愈之案二則一體溫至脈搏至百一十至神識蒙昏言語不清舌腫大幹燥舌苔剝離顯然夾雜外感之實熱可知乃東人不知以清其外感實熱為要務而惟日注射以治痢之血清竟至不救其二發劇熱夜發躁狂之舉動後則時發譫語體溫達此又顯然有外感之大熱也案中未載治法想其治法亦與前同是以亦至不救設此二證若治以拙擬之通變白虎加人參湯若慮病重藥輕可將兩劑並作一劑煎湯四五茶杯分多次徐徐溫飲下病愈不必盡劑其熱焉有不退之理大熱既退痢自隨愈而東人見不及此者因東人盡棄舊日之中學而專尚西學也蓋中西醫學原可相助為理而不宜偏廢吾國果欲醫學之振興固非溝通中西不可也上所論之痢證乃外感之熱已入陽明之腑者也然痢證初得恆有因外感束縛而激動其內傷者臨證者宜細心體察果其有外感束縛也宜先用藥解其外感而後治痢或加解表之藥於治痢藥中或用治痢藥煎湯送服西藥阿斯匹林瓦許亦可解表設若忽不加察則外感之邪隨痢內陷即成通變白虎加人參湯所主之險證何如早治為愈也痢證雖為寒熱凝滯而成而論者多謂白痢偏寒赤痢偏熱然此為痢證之常而又不可概論也今試舉治愈之案以明之同莊張妻年近六旬素多疾病於季夏晨起偶下白痢至暮十餘次秉燭後忽周身大熱昏不知人循衣摸床呼之不應其脈洪而無力肌膚之熱烙手知其痢因傷暑而成且多病之身不禁暑熱之熏蒸所以若是昏沉也急用生石膏三兩野臺參四錢煎湯一大碗俾徐徐溫飲下至夜半盡劑而醒詰朝煎渣再服熱退痢亦遂愈此純系白痢而竟若是之熱也有前後連兩次病痢其前後寒熱不同者為細診其脈前後迥異始能用藥各得其宜無所差誤曾治劉於初秋得痢證甚劇其痢膿血稠黏脈象弦細重診仍然有力治以通變白頭翁湯兩劑全愈隔旬余痢又反復自用原方治之病轉增劇復來院求診其脈弦細兼遲不任循按知其已成寒痢所以不受原方也俾用生懷山藥細末煮粥送服小茴香細末一錢生硫黃細末四分數次全愈又如三寶粥方後治愈盧氏婦一案亦然二案皆隨病機之轉移而互治以涼熱之藥自能隨手奏效故治之者宜於臨證時細心研究息息與病機相符也有痢證上熱下涼所用之藥宜上下分途以涼治上以熱治下者曾治天津張姓媼年近五旬於孟秋患痢兩旬不愈所下者赤痢雜以血水後重腹疼繼則痢少瀉多亦兼瀉血水上焦煩熱噤口不食聞食味即噁心欲嘔頭目眩暈不能起床其脈關前浮弦重診不實兩尺則微弱無根一息五至病人自覺心中怔忡精神恍惚似難支持此乃虛極將脫之兆也遂急用淨萸肉生懷山藥各一兩大熟地龍眼肉白龍骨各五錢生杭芍雲苓片炙甘草各二錢俾煎湯兩盅分兩次溫服下初服一次心神即覺安穩盡劑後少進飲食瀉痢亦少止又即原方加生地黃四錢炙甘草改用三錢煎湯兩盅分兩次溫服下每服一次送服生硫黃細末二分半日服一劑數日全愈至於暑天熱痢宜治以六一散前已言之然南方之暑熱兼濕用六一散誠為至當北方之暑熱恆不兼濕且有兼燥之時若用六一散時原當有所變通愚嘗擬得一方用之甚效方用滑石生石膏各五錢硃砂粉甘草細末各二錢薄荷冰一分共和勻每服二錢開水送下熱甚痢劇者一日可服五六次名之曰加味益元散蓋以六一散加硃砂為益元散茲則又加石膏薄荷冰也按暑熱之痢恆有噤口不食者而治以加味益元散即可振興其食欲若非暑熱之痢而亦不思飲食者宜用硃砂粉甘草細末等分少加薄荷冰每服一錢竹茹煎湯送下即可思食蓋此等證多因肝膽之火挾胃氣上逆其人聞食味即噁心欲嘔所以不能進食用硃砂以降胃鎮肝甘草以和胃緩肝竹茹以平其逆氣薄荷冰以散其鬱熱所以服之即效也因此方屢次奏功遂名之曰開胃資生丹有當暑熱之時其肝膽腸胃先有蘊熱又更奔走作勞於烈日之中陡然下痢多帶鮮血其脈洪大者宜治以大劑白虎湯煎數盅分數次溫飲下每次送服鴉膽子仁三十粒若其脈雖洪大而按之虛者宜治以大劑白虎加人參湯送服鴉膽子仁有痢久清陽下陷者即胸中大氣因痢下陷也其病情常覺下墜腹疼此氣分下陷迫其下焦腹疼或痢或瀉多帶虛氣呼吸短氣或兼有寒熱往來其脈象遲弱者宜治以拙擬升陷湯去知母加生懷山藥六錢白頭翁三錢蓋原方之意原用生箭耆以升補胸中大氣而以柴胡桔梗升麻之善升清陽者以輔之更加知母以調劑黃耆之熱也茲因下焦瀉痢頻頻氣化不固故以白頭翁易知母而更以山藥輔之因知母之性寒而滑白頭翁之性涼而澀其涼也能解黃耆之熱其澀也能固氣化之脫且為治痢要藥伍以山藥又為止瀉之要藥也諸痢之外又有所謂休息痢者其痢大抵皆不甚重而不易除根治愈恆屢次反復雖遷延日久而猶可支持有若阿米巴痢之輕者至纍年纍月不愈而猶可支持也或此等痢即阿米巴痢歟須待後實驗然其所以屢次反復者實因有原蟲伏於大小腸曲折之處是以愈而復發惟用藥除淨其原蟲則不反復矣至除之之法證之近於熱者可用鴉膽子仁以治痢之藥佐之近於涼者可用硫黃末而以治痢之藥佐之再者無論或熱或涼所用藥中皆宜加木賊一錢為其性善平肝又善去腸風止血故後世本草謂其善治休息痢也其脾胃不健壯者又宜兼用健補脾胃之藥以清痢之上源自能祓除病根也痢證又有日下痢頻頻其腸中仍有燥結必去其燥結而痢始愈者此固屬罕見之證而治痢者實不可不知也表弟劉年二十四歲於中秋下痢膿血稠黏一日十五六次腹疼後重甚劇治以化滯湯連服兩劑下痢次數似少減而後重腹疼如舊細診其脈尺部重按甚實疑其腸有結糞投以小承氣湯加生杭芍數錢下燥糞長約四寸後重腹疼頓愈十之八九再與以化滯湯一劑病若失治痢最要藥品其痢之偏熱者當以鴉膽子為最要之藥其痢之偏寒者當以硫黃為最要之藥以此二藥皆有消除痢中原蟲之力也此二種藥上所録方案中已屢言之今再論之鴉膽子一名鴨蛋子其性善涼血止血兼能化瘀生新凡痢之偏於熱者用之皆有捷效而以治下鮮血之痢瀉血水之痢則尤效鴉膽子又善清胃腑之熱凡胃脘有實熱充塞噤口不食者服之即可進食服時須去其硬皮若去皮時其中仁破者即不宜服因破者服後易消其苦味遽出恆令人嘔吐是以治痢成方有用龍眼肉包鴉膽子仁囫圇吞服者藥房中祕方有將鴉膽子仁用益元散為衣名之為菩提丹者是皆防其入胃即化出其苦味也若以西藥房中膠囊盛之吞服雖破者亦可用硫黃原稟火之精氣其挾有雜質者有時有毒若其色純黃即純系硫質分毫無毒為補相火暖下焦之主藥痢證下焦涼者其上焦恆有虛熱硫黃質重其熱力直達下焦而不至助上焦之虛熱且痢之寒者雖宜治以熱藥而仍忌溫補收澀之品至硫黃諸家本草謂其能使大便潤小便長西人謂系輕瀉之品是其性熱而能通故以治寒痢最宜也愚屢次品驗此藥人之因寒作瀉者服之大抵止瀉之時多更有五更瀉證服他藥不效而放膽服硫黃即愈者又間有本系因寒作瀉服硫黃而瀉轉劇者惟與乾薑白朮五味等藥同用則確能治因寒作瀉而無更瀉之弊古方書用硫黃皆系制用然制之則熱力減必須多服有時轉因多服而生燥實不如少服生者之為愈也且擇其純系硫質者用之原分毫無毒亦無須多方制之也至其用量若以治寒痢一次可服二三分極量至五六分而以治他證則不在此例曾治鄰村張氏婦年二十餘胃寒作吐所吐之食分毫不能消化凡食後半日吐出不消化者皆系胃寒醫治半年無效雖投以極熱之藥亦分毫不覺熱脈甚細弱且又沉遲知其胃寒過甚但用草木之品恐難療治俾用生硫黃細末一兩分作十二包先服一包過兩句鐘不覺熱再服一包又為開湯劑乾薑炙甘草各一兩烏附子廣油桂補骨脂於朮各五錢厚朴二錢日煎服一劑其硫黃當日服至八包猶不覺熱然自此即不吐食矣後數日似又反復遂於湯劑中加代赭石細末五錢硫黃仍每日服八包其吐又止連服數日覺微熱俾將硫黃減半湯劑亦減半惟赭石改用三錢又服二十餘日其吐永不反復愚生平用硫黃治病以此證所用之量為最大至於西藥中硫黃三種其初次制者名升華硫黃只外用於瘡瘍不可內服用升華硫黃再製之為精製硫黃用精製硫黃再製之為沉降硫黃此二種硫黃可以內服然欲其熱力充足服之可以補助元陽溫暖下焦究不若擇純質生硫黃服之之為愈也論腸結治法腸結最為緊要之證恆於人性命有關或因常常嘔吐或因多食生冷及硬物或因怒後飽食皆可致腸結其結多在十二指腸及小腸間有結於幽門者其證有腹疼者有嘔吐者尤為難治因投以開結之藥不待藥力施展而即吐出也亦有病本不吐因所服之藥行至結處不能通過轉而上逆吐出者是以治此證者當使服藥不使吐出為第一要著愚於此證吐之劇者八九日間杓飲不存曾用赭石細末五兩從中又羅出極細者一兩將所餘四兩煎湯送服極細者其吐止而結亦遂開若結證在極危急之時此方宜放膽用之雖在孕婦惡阻嘔吐者亦可用之赭石解參赭鎮氣湯後載有數案可參觀有謂孕婦惡阻無論如何嘔吐與性命無關者乃閲歷未到之言也有患此證急欲通下者愚曾用赭石細末三兩芒硝五錢煎湯送服甘遂細末錢半服後兩點半鐘其結即通下矣後有醫者得此方以治月餘之腸結證亦一劑而愈後聞此醫自患腸結亦用此方煎湯先服一半甘遂亦送下一半藥力下行結不能開仍復吐出繼服其餘一半須臾仍然吐出竟至不起由此知用藥一道過於放膽固多失事若過於小心亦多誤事也況甘遂之性無論服多服少初次服之尚可不吐若連次服之雖佐以赭石亦必作吐是以拙擬蕩胸加甘遂湯原用大劑大承氣湯加赭石二兩煎湯送服甘遂細末二錢方下注云若服一劑不愈者須隔三日方可再服此固欲緩服以休養其正氣實亦防其連服致吐也至於赭石可如此多用者以其原質為鐵養化合性甚和平且善補血不傷氣分雖多用於人無損也特是藥房中赭石必火煆醋激然後軋細如此製法則養氣不全不如徑用生者之為愈也況其雖為石類與鐵鏽相近鐵鏽亦鐵養化合即服生赭石細末亦於人腸胃毫無傷損若嫌上方中甘遂之性過猛烈者本書載有硝蔔通結湯方藥性甚穩善惟制此藥時略費手續方後載有治驗兩則後又遇此證多次皆以此方治愈論結胸治法結胸之證有內傷外感之殊內傷結胸大抵系寒飲凝於賁門之間遏抑胃氣不能上達阻隔飲食不能下降當用乾薑八錢赭石兩半川朴甘草各三錢開之其在幼童脾胃陽虛寒飲填胸嘔吐飲食成慢驚此亦皆寒飲結胸證可治以莊在田福幼編逐寒蕩驚湯若用其方寒痰仍不開嘔吐仍不能止者可將方中胡椒倍用二錢若非寒飲結胸或為頑痰結胸或為熱痰結胸者阻塞胸中之氣化不能升降甚或有礙呼吸危在目前欲救其急可用硼砂四錢開水融化服之將其痰吐出其為頑痰者可再用栝蔞仁二兩苦葶藶三錢袋裝煎湯飲之以滌蕩其痰其為熱痰者可於方中加芒硝四錢有胸中大氣下陷兼寒飲結胸者其證尤為難治曾治一趙姓媼案詳回陽升陷湯後可參閲至於外感結胸傷寒與溫病皆有傷寒降早可成結胸溫病即非降早亦可成結胸皆外感之邪內陷與胸中痰飲互相膠漆也無論傷寒溫病其治法皆可從同若傷寒論大陷胸湯及大陷胸丸俱為治外感結胸良方宜斟酌病之輕重淺深分別用之至拙擬之蕩胸湯亦可斟酌加減以代諸陷胸湯丸有內傷結胸與外感結胸相併而成一至險之結胸證者在奉天時曾治郝年四十餘心下痞悶杜塞飲食不能下行延醫治不效繼入東人醫院治一星期仍然無效浸至不能起床吐痰腥臭精神昏憒再延醫診視以為肺病已成又兼胃病不能治療其家人惶恐無措迎愚診治其脈左右皆弦右部則弦而有力其舌苔白厚微黃撫其肌膚髮熱問其心中亦覺熱思食涼物大便不行者已四五日自言心中滿悶異常食物已數日不進吐痰不惟腥臭且又覺涼愚籌思再四知系溫病結胸然其脈不為洪而有力而為弦而有力且所吐之痰臭而且涼者何也蓋因其人素有寒飲其平素之脈必弦其平素吐痰亦必涼平素忽不自覺今因病溫咽喉發熱覺痰涼耳因有溫病之熱與之混合所以脈雖弦而仍然有力其痰雖涼而為溫病之熱熏蒸遂至腥臭也為疏方用蔞仁生赭石細末各一兩玄參知母各八錢蘇子半夏黨參生薑各四錢煎湯沖服西藥留苦四錢一劑胸次豁然可進飲食右脈較前柔和舌苔變白心中猶覺發熱吐痰不臭仍然覺涼遂將原方前四味皆減半加當歸三錢服後大便通下心中益覺通豁惟有時覺有涼痰自下發動逆行上衝周身即出汗遂改用赭石黨參乾薑各四錢半夏白芍各三錢川朴五味甘草各二錢細辛一錢連服數劑寒痰亦消矣此證原寒飲結胸與溫病結胸相併而成而初次方中但注重溫病結胸惟生薑一味為治寒飲結胸之藥因此二病之因一涼一熱原難並治若將方中之生薑改為乾薑則溫病之熱必不退至若生薑之性雖熱而與涼藥並用實又能散熱逮至溫病熱退然後重用乾薑以開其寒飲此權其病勢之緩急先後分治而仍用意周匝不至顧此失彼是以能循序奏效也論霍亂治法霍亂為最險要緊急之證且其證分陰陽陰證宜治以溫藥陽證宜治以涼藥設或辨證不清而涼熱誤投必凶危立見即辨證清矣而用藥涼熱不爽亦未必能救其強半也己未孟秋奉天霍亂盛行吐瀉轉筋甚者脈閉身冷如冰而心中發熱嗜飲涼水愚斷為陽證而擬得急救回生丹一方藥性雖涼然善發汗且善解毒能使內伏之毒熱透表外出而身之涼者可溫脈之閉者可現服此方者大抵皆愈繼又擬得衛生防疫寶丹方於前方之中加辛香溫通之藥兩味俾其藥性涼熱適均日服數十粒可暗消病根於無形若含數粒可省視病人不受傳染時有劉見病者臥街頭吐瀉轉筋病勢垂危而劉適帶有衛生防疫寶丹與以數十粒復至茶館尋開水半盞俾送下須臾吐瀉轉筋皆愈而可起坐矣繼有尚來院購防疫之藥即將衛生防疫寶丹二百包與之其煤礦工人患霍亂者或服八十粒或服一百二十粒皆完全救愈由斯知衛生防疫寶丹之於霍亂既可防之於未然又可制之於既發其功效亦不減急救回生丹也時行伏陰芻言李評語原文辛酉六月三十日余方就診戚家不意長兒現年十二大瀉不止及余回家而吐亦作矣其脈尤緊而遲四末微麻頭疼身熱無汗口渴此伏陰而兼外感也遂投以先生所創之急救回生丹小兒此證雖屬伏陰因有兼證須兼解表且先生謂此丹服之可溫復得汗故與之從此可知無論伏陰霍亂其病初起時可先與此丹令其得汗以減其勢而後再分途治之可也若但系伏陰證先與以先生所制衛生防疫寶丹更妙乃服藥後須臾汗出吐瀉之勢亦稍緩繼與以漂蒼朮三錢枳殼二錢厚朴錢半西砂仁廣陳皮炙甘草蘇葉各一錢薄荷八分加生薑大棗煎湯服之未盡劑而愈按其子兼外感所以身熱口渴若但為伏陰初則吐瀉繼則身冷轉筋目眶塌陷無一不與霍亂相同惟心中不覺發熱且四肢有拘急之象耳斯實倣佛陰證霍亂與傷寒論所載之霍亂相似故其書所載復陽消陰法即系附子理中湯今李於其初得謂可治以急救回生丹且謂若治以衛生防疫寶丹更妙蓋衛生防疫寶丹初服下覺涼繼則終歸於熱因冰片薄荷冰皆性熱用涼也況細辛白芷原屬溫熱之品是以此丹之妙用在上能清在下能溫耳至急救回生丹無辛芷之熱硃砂又加重藥性似偏於涼矣然硃砂原汞硫化合涼中含有熱性況冰片薄荷冰亦加多發汗甚捷服後無論新受之外感久伏之邪氣皆可由汗透出由斯觀之若果系陽證霍亂即放膽投以急救回生丹必能回生若不能斷其為陰為陽即投以衛生防疫寶丹亦無不效也衛生防疫寶丹多服亦可發汗無論霍亂因涼因熱用之皆效並治一切暴病痧證頭疼心煩四肢作疼泄瀉痢疾厄逆治此證尤效若無病者每飯後服二十粒能使飲食速消飯量驟加實為健胃良藥且每日服之尤能預防一切雜證不受傳染霍亂之證有但用上二方不效者其吐瀉已極奄奄一息將脫者是也方書有謂霍亂為脫疫者實指此候此時無論病因為涼為熱皆當急用人參八錢以復其陽生山藥一兩生杭芍六錢以滋其陰山萸肉八錢以斂肝氣之脫此證吐瀉之始肝木助邪侮土吐瀉之極而肝氣轉先脫將肝氣斂住而元氣可固炙甘草三錢以和中氣之漓赭石細末四錢引人參之力下行即以防其嘔吐硃砂童便先用溫熱童便送服硃砂細末五分再煎服前藥以交其心腎此方名急救回陽湯實陰陽俱補也心中覺熱者加天冬六七錢身涼脈不見心中分毫不覺熱者去芍藥加烏附子一錢若心中猶覺熱雖身涼脈閉不可投以熱藥汗多者萸肉可用至兩餘方中人參若用野臺參即按方中分量若用野山參分量宜減半另燉兌服按此方當用於吐瀉既止之後若其勢雖垂危而吐瀉猶未止仍當審其涼熱用前二方以清內毒然後以此方繼之其服藥距離時間約在多半點鐘曾治奉天寇姓媼霍亂吐瀉一日夜及愚診視時吐瀉已止周身皆涼六脈閉塞精神昏憒閉目無聲而呼之仍有知覺且恆蹙其額知霍亂之毒猶擾亂於其心中也問其吐瀉時情狀常覺心中發熱頻頻嗜飲涼水知其確係陽證先與以急救回生丹三分之一和溫開水灌下遲半點鐘視其形狀較安仍身涼無脈俾煎急救回陽湯一劑徐徐灌下且囑其服藥以後且不時少與以溫開水至翌晨復為診視身熱脈出已能言語仍自言心中熱甚遂用玄參二兩潞參一兩煎湯一大碗俾徐徐溫飲下盡劑而愈詳觀此案當知用急救回陽湯之方針矣上所擬治霍亂三方急救回生丹宜於霍亂之偏熱者衛生防疫寶丹宜於霍亂之偏涼者急救回陽湯以救霍亂之將脫者治霍亂之方似已略備然霍亂中間有大涼大熱之證似宜另商治法今更進而申論之傷寒論之論霍亂也主於寒且主於大寒若理中加附子通脈四逆加人參諸方皆治大寒之藥也然其各節中多言惡寒四肢拘急厥冷或吐利汗出或寒多不用水必其病象中現如此形狀且脈象沉細欲無者方可酌用傷寒論中諸方以急回其陽陽回之後間有覺煩熱者又宜急服涼潤滋陰之藥以善其後蓋陽回其心臟跳動有力則脈可復身可熱吐瀉亦可止因其從前吐瀉過劇傷其陰分是以陽回之後恆有覺煩熱者故又宜服涼潤滋陰之藥以善其後也然此等證極少愚經歷霍亂多次所治若此等證者不過四五焉至霍亂之大熱者則恆有之憶昔壬寅孟秋邑中霍亂盛行按涼治者多僨事按熱治者亦愈否參半惟放膽恣飲新汲井泉水者皆愈愚則重用羚羊角治愈此證若干後愚問恣飲井泉水愈者數人皆言彼時雖吐瀉交作脈微身涼而心中則熱而且渴須臾難忍惟恣飲涼水可稍解飲後須臾復吐出又須再飲過半日涼水飲近一大水桶熱渴漸愈而吐瀉亦止矣按此原當飲以冰水或食冰塊而鄉村無冰故以井泉水代之丁卯季夏天氣炎熱非常愚臨睡時偶食西瓜數塊睡至黎明覺心中擾亂噁心連吐三次繼又作瀉急服急救回生丹錢許心中稍安須臾病又如舊且覺心中發熱火氣上騰右腿轉筋而身不涼脈不閉自知純系熱證千金方治霍亂用治中湯即理中湯轉筋者加石膏是霍亂之兼熱者原可重用石膏也遂煎白虎加人參湯一大劑服後病又稍愈須臾仍然反復心中熱渴思食冰遂買冰若干分作小塊吞之閲點半鐘約食冰二斤熱渴吐瀉俱止而病若失矣此雖因食涼物激動伏暑之熱然吐瀉轉筋非霍亂而何也上二案皆證之大熱者也若無井泉水與無冰之處可用鮮梨片或西瓜蘸生石膏細末食之此愚治寒溫之病陽明大熱且嘔不受藥者之方也究之其病發動之時其大涼者仍宜先服衛生防疫寶丹其大熱者仍宜先服急救回生丹因此二藥皆能除毒菌助心臟使心臟不至受毒麻痹病自無危險也申濟人順義縣人曰霍亂有陰陽之辨若於六七月間或棲當樓窗或夜臥露地忽患上吐下瀉兩腿筋抽眼窩青唇黑身涼有汗脈沉伏者此陰證也急以針刺尺澤少澤委中此穴宜深寸許十宣若吐瀉不止刺中脘水分其病立愈若身熱無汗脈沉緊腹疼甚嘔而不得上出脹而不得下瀉此陽證也急用針刺少商委中尺澤腹疼不止刺氣海章門足三里依法灸刺無不愈者按此論辨陰陽之證頗精確其謂陰證腿筋抽者非轉筋也即傷寒論所謂四肢拘急也若轉筋則陰陽之證皆有矣其謂眼窩青唇黑者斯實陰證之明徵其謂身涼脈沉伏者陽證亦間有之然陰證至此時恆惡寒身欲厚復陽證則始終不惡寒即復以單被亦不欲至其謂陰證有汗陽證無汗此論最確又其論陰證未言腹疼論陽證則言腹疼甚蓋陽證邪正相爭仍有抗拒之力其吐不得吐瀉不得瀉者必然腹疼即吐瀉頻頻者亦恆腹疼至陰證則邪太盛正太衰毫無抗拒之力初得或猶有腹疼者至吐瀉數次後即不腹疼矣至其以腹疼吐不能吐瀉不能瀉名為乾霍亂者專屬於陽證尤具有特識所論針刺十餘穴皆為治此證要著即不諳針灸者亦宜單習此十餘穴以備不時之需且臨時果能針藥並用證愈必速總之證無論涼熱凡驗其病原蟲若蝌蚪形而曲其尾者皆霍亂也又天津鮑曰余遇純陰霍亂分毫不覺熱者恆用大塊生薑切成方片密排臍上兩層摶艾絨如棗大灸之其吐瀉轉筋可立止論肝病治法附新擬和肝丸肝為厥陰中見少陽且有相火寄其中故內經名為將軍之官其性至剛也為其性剛當有病時恆侮其所勝以致脾胃受病至有脹滿疼痛泄瀉種種諸證因此方書有平肝之説謂平肝即所以扶脾若遇肝氣橫恣者或可暫用而不可長用因肝應春令為氣化發生之始過平則人身之氣化必有所傷損也有謂肝於五行屬木木性原善條達所以治肝之法當以散為補方書謂肝以斂為瀉以散為補散者即升發條達之也然升散常用實能傷氣耗血且又暗傷腎水以損肝木之根也有謂肝惡燥喜潤燥則肝體板硬而肝火肝氣即妄動潤則肝體柔和而肝火肝氣長寧靜是以方書有以潤藥柔肝之法然潤藥屢用實與脾胃有礙其法亦可暫用而不可長用然則治肝之法將惡乎宜哉內經謂厥陰不治求之陽明金匱謂知肝之病當先實脾先聖後聖其揆如一此誠為治肝者之不二法門也惜自漢唐以還未有發明其理者獨至黃坤載深明其理謂肝氣宜升膽火宜降然非脾氣之上行則肝氣不升非胃氣之下行則膽火不降旨哉此言誠窺內經金匱之精奧矣由斯觀之欲治肝者原當升脾降胃培養中宮俾中宮氣化敦厚以聽肝木之自理即有時少用理肝之藥亦不過為調理脾胃劑中輔佐之品所以然者五行之土原能包括金木水火四行人之脾胃屬土其氣化之敷布亦能包括金木水火諸臟腑所以脾氣上行則肝氣自隨之上升胃氣下行則膽火自隨之下降也又內經論厥陰治法有調其中氣使之和平之語所謂調其中氣者即升脾降胃之謂也所謂使之和平者即升脾降胃而肝氣自和平也至仲景著傷寒論深悟內經之旨其厥陰治法有吳茱萸湯厥陰與少陽臟腑相依乃由厥陰而推之少陽治法有小柴胡湯二方中之人參半夏大棗生薑甘草皆調和脾胃之要藥也且小柴胡湯以柴胡為主藥而神農本草經謂其主腸胃中結氣飲食積聚寒熱邪氣推陳致新三復神農本草經之文則柴胡實亦為陽明胃府之藥而兼治少陽耳欲治肝膽之病者易弗祖內經而師仲景哉獨是肝之為病不但不利於脾舉凡驚癇癲狂眩暈腦充血諸證西人所謂腦氣筋病者皆與肝經有涉蓋人之腦氣筋發源於腎而分派於督脈系淡灰色之細筋肝原主筋肝又為腎行氣故腦氣筋之病實與肝臟有密切之關係也治此等證者當取五行金能制木之理而多用五金之品以鎮之如鐵鏽鉛灰金銀箔赭石赭石鐵養化合亦含有金屬之類而佐以清肝潤肝之品若羚羊角青黛芍藥龍膽草牛膝牛膝味酸入肝善引血火下行為治腦充血之要藥然須重用方見奇效諸藥俾肝經風定火熄而腦氣筋亦自循其常度不至有種種諸病也若目前不能速愈者亦宜調補脾胃之藥佐之而後金屬及寒涼之品可久服無弊且諸證多系挾有痰涎脾胃之升降自若而痰涎自消也有至要之證其病因不盡在肝而急則治標宜先注意於肝者元氣之虛而欲上脫者是也其病狀多大汗不止或少止復汗而有寒熱往來之象或危極至於戴眼不露黑睛或無汗而心中搖搖需人按住或兼喘促此時宜重用斂肝之品使肝不疏泄即能杜塞元氣將脫之路至汗止怔忡喘促諸疾暫愈而後徐圖他治法宜重用山茱萸淨肉至二兩神農本草經山萸肉主治寒熱即指此證斂肝即以補肝而以人參赭石龍骨牡蠣諸藥輔之拙著來復湯後載有本此法挽回垂絶之證數則可參閲也究之肝膽之為用實能與脾胃相助為理因五行之理木能侮土木亦能疏土也曾治有飲食不能消化服健脾暖胃之藥百劑不效診其左關太弱知系肝陽不振投以黃耆其性溫升肝木之性亦溫升有同氣相求之義故為補肝之主藥一兩桂枝尖三錢數劑而愈又治黃疸診其左關特弱重用黃耆煎湯送服金匱黃疸門硝石礬石散而愈若是皆其明徵也且膽汁入於小腸能助小腸消化食物此亦木能疏土之理蓋小腸雖屬火而實與胃腑一體相連故亦可作土論膽汁者原由肝中回血管之血化出而注之於膽實得甲乙木氣之全是以在小腸中能化胃中不能化之食其疏土之效愈捷也又西人謂肝中為回血管會合之處或肝體發大或肝內有熱各管即多凝滯壅脹由斯知疏達肝鬱之藥若柴胡川芎香附生麥芽乳香沒藥皆可選用而又宜佐以活血之品若桃仁紅花樗雞蟅蟲之類且又宜佐以瀉熱之品然不可驟用大涼之藥恐其所瘀之血得涼而凝轉不易消散宜選用連翹茵陳川楝子梔子梔子為末燒酒調敷善治跌打處青紅腫疼能消瘀血可知諸藥涼而能散方為對證肝體木硬宜用柔肝之法至柔肝之藥若當歸芍藥柏子仁玄參枸杞阿膠鱉甲皆可選用而亦宜用活血之品佐之而活血藥中尤以三七之化瘀生新者為最緊要之品宜煎服湯藥之外另服此藥細末日三次每次錢半或至二錢則肝體之木硬者指日可柔也內經謂肝苦急急食甘以緩之所謂苦急者乃氣血忽然相併於肝中致肝臟有急迫難緩之勢因之失其常司當其急迫之時肝體亦或木硬而過其時又能復常故其治法宜重用甘緩之藥以緩其急其病自愈與治肝體長此木硬者有異曾閲山西醫志二十四期有人過服燥熱峻烈之藥驟發痙厥角弓反張口吐血沫喬遵內經之旨但重用甘草一味連煎服數日全愈可謂善讀內經者矣然此證若如此治法仍不愈者或加以涼潤之品若羚羊角白芍或再加鎮重之品若硃砂研細送服鐵鏽皆可也新擬和肝丸治肝體木硬肝氣鬱結肝中血管閉塞及肝木橫恣侮克脾土其現病或脅下脹疼或肢體串疼或飲食減少嘔噦吞酸或噫氣不除或厄逆連連或頭疼目脹眩暈痙癇種種諸證粉甘草五兩細末生杭芍三兩細末青連翹三兩細末廣肉桂兩半去粗皮細末冰片三錢細末薄荷冰四錢細末片硃砂三兩細末上藥七味將前六味和勻水泛為丸梧桐子大晾乾不宜曬用硃砂為衣勿餘剩務令堅實光滑始不走味每於飯後一點鐘服二十粒至三十粒日再服病急劇者宜空心服或於服兩次之後臨睡時又服一次更佳若無病者但以為健胃消食藥則每飯後一點鐘服十粒即可數年來肝之為病頗多而在女子為尤甚醫者習用香附青皮枳殼延胡開氣之品及柴胡川芎升氣之品連連服之恆有肝病未除元氣已弱不能支持後遇良醫亦殊難為之挽救若斯者良可慨也此方用甘草之甘以緩肝芍藥之潤以柔肝連翹以散其氣分之結嘗單用以治肝氣鬱結有殊效冰片薄荷冰以通其血管之閉肉桂以抑肝木之橫恣硃砂以制肝中之相火妄行且合之為丸其味辛香甘美能醒脾健胃使飲食加增又其藥性平和在上能清在下能溫此藥初服下覺涼及行至下焦則又變為溫性故凡一切肝之為病服他藥不愈者徐服此藥自能奏效論黃疸有內傷外感及內傷外感之兼證並詳治法黃疸之證中説謂脾受濕熱西説謂膽汁濫行究之二説原可溝通也黃疸之載於方書者原有內傷外感兩種試先以內傷者言之內傷黃疸身無熱而發黃其來以漸先小便黃繼則眼黃繼則周身皆黃飲食減少大便色白恆多閉塞乃脾土傷濕不必有熱而纍及膽與小腸也蓋人身之氣化由中焦而升降脾土受濕升降不能自如以敷布其氣化而肝膽之氣化遂因之湮瘀黃坤載謂肝膽之升降由於脾胃確有至理膽囊所藏之汁亦因之湮瘀而蓄極妄行不注於小腸以化食轉溢於血中而周身發黃是以仲景治內傷黃疸之方均是膽脾兼顧試觀金匱黃疸門其小柴胡湯顯為治少陽膽經之方無論矣他如治谷疸之茵陳蒿湯治酒疸之梔子黃柏湯一主以茵陳一主以梔子非注重清肝膽之熱俾肝膽消其炎腫而膽汁得由正路以入於小腸乎至於硝石礬石方為治女勞疸之的方實可為治內傷黃疸之總方其方硝石俗名火硝亦名焰硝礬石等分為散大麥粥汁和服方寸匕約重一錢日三服病隨大小便去小便正黃色大便正黑色是也特是方中礬石釋者皆以白礬當之不無遺議考神農本草經礬石一名羽涅爾雅又名涅石徐氏説文釋涅字謂黑土在水中當系染黑之色礬石既名為涅石亦當為染黑色所需之物豈非今之皂礬乎是知皂礬白礬古人皆名為礬石而愚臨症體驗以來知以治黃疸白礬之功效誠不如皂礬蓋黃疸之證中法謂由脾中蘊蓄濕熱西法謂由膽汁溢於血中皂礬退熱燥濕之力不讓白礬故能去脾中濕熱而其色緑且青亦名緑礬又名青礬能兼入膽經借其酸收之味以斂膽汁之妄行且此物化學家原可用硫酸水化鐵而成是知礦中所産之皂礬亦必多含鐵質尤可借金鐵之餘氣以鎮肝膽之本也硝石性寒能解臟腑之實熱味鹹入血分又善解血分之熱且其性善消遇火即燃又多含養氣人身之血得養氣則赤又借硝石之消力以消融血中之渣滓則血之因膽汁而色變者不難復於正矣矧此證大便難者甚多得硝石以軟堅開結濕熱可從大便而解而其鹹寒之性善清水腑之熱即兼能使濕熱自小便解也至用大麥粥送服者取其補助脾胃之土以勝濕而其甘平之性兼能緩硝礬之猛峻猶白虎湯中之用粳米也按原方礬石下注有燒字蓋以礬石酸味太烈製為枯礬則稍和緩而愚實驗以來知徑用生者其效更速臨證者相其身體強弱斟酌適宜可也或曰硝石朴硝性原相近仲景他方皆用朴硝何此方獨用硝石答曰朴硝味鹹硝石則咸而兼辛辛者金之味也就此一方觀之礬石既含有鐵質硝石又具有金味既善理脾中之濕熱又善制膽汁之妄行中西醫學之理皆包括於一方之中所以為醫中之聖也且朴硝降下之力多硝石消融之力多理詳砂淋丸下膽汁之溢於血中者布滿周身難盡降下實深賴硝石之善消融也又朴硝為水之精華結聚其鹹寒之性似與脾濕者不宜硝石遇火則燃兼得水中真陽之氣其味之咸不若朴硝且兼有辛味似能散濕氣之鬱結而不致助脾濕也特是金匱治內傷黃疸雖各有主方而愚臨證經驗以來知治女勞疸之硝石礬石散不但治女勞疸甚效即用以治各種內傷黃疸亦皆可隨手奏效惟用其方時宜隨證制宜而善為變通耳按硝石礬石散原方用硝石礬石等分為散每服方寸匕約重一錢大麥粥送下其用大麥粥者所以調和二石之性使之與胃相宜也至愚用此方時為散藥難服恆用炒熟大麥面或小麥面亦可與二石之末等分和水為丸如五味子大每服二錢隨證擇藥之相宜者數味煎湯送下因藥中已有麥面為丸不必再送以大麥粥其有實熱者可用茵陳梔子煎湯送服有食積者可用生雞內金山楂煎湯送服大便結者可用大黃麻仁煎湯送服小便閉者可用滑石生杭芍煎湯送服噁心嘔吐者可用赭石青黛煎湯送服左脈沉而無力者可用生黃耆生薑煎湯送服右脈沉而無力者可用白朮陳皮煎湯送服其左右之脈沉遲而弦且心中覺涼色黃黯者附子乾薑皆可加入湯藥之中脈浮有外感者可先用甘草煎湯送服西藥阿斯匹林一瓦出汗後再用甘草湯送服丸藥又凡服此丸藥而嫌其味劣者皆可於所服湯藥中加甘草數錢以調之又黃疸之證西人謂恆有膽石阻塞膽囊之口若尿道之有淋石也硝石礬石並用則膽石可消又西人謂小腸中有鉤蟲亦可令人成黃疸硝石礬石並用則鉤蟲可除此所以用此統治內傷黃疸但變通其送服之湯藥皆可隨手奏效也至外感黃疸約皆身有大熱乃寒溫之熱傳入陽明之府其熱旁鑠纍及膽脾或脾中素有積濕熱入於脾與濕合其濕熱蘊而生黃外透肌膚而成疸或膽中所寄之相火素熾熱入於膽與火併其膽管因熱腫閉膽汁旁溢混於血中亦外現成疸是以仲景治外感黃疸有三方皆載於傷寒論陽明篇一為茵陳蒿湯二為梔子柏皮湯三為麻黃連翹赤小豆湯皆膽脾並治也且統觀仲景治內傷外感黃疸之方皆以茵陳蒿為首方誠以茵陳蒿性涼色青能入肝膽既善瀉肝膽之熱又善達肝膽之郁為理肝膽最要之品即為治黃疸最要之品至愚生平治外感黃疸亦即遵用傷寒論三方而於其熱甚者恆於方中加龍膽草數錢又用麻黃連翹赤小豆湯時恆加滑石數錢恐連翹利水之力不足故加滑石以助之若其證為白虎湯或白虎加人參湯證及三承氣湯證而身黃者又恆於白虎承氣中加茵陳蒿數錢其間有但用外感諸方不效者亦可用外感諸方煎湯送服硝石礬石散黃疸之證又有先受外感未即病逮釀成內傷而後發現者歲在乙丑客居滄州自仲秋至孟冬一方多有黃疸證其人身無大熱心中滿悶時或覺熱見飲食則噁心強食之恆作嘔吐或食後不能下行劇者至成結證又間有腹中覺涼食後飲食不能消化者愚共治六十餘人皆隨手奏效其脈左似有熱右多郁象蓋其肝膽熱而脾胃涼也原因為本年季夏陰雨連旬空氣之中所含水分過度人處其中臟腑為濕所傷肝膽屬木稟少陽之性濕鬱久則生熱脾胃屬土稟太陰之性濕鬱久則生寒此自然之理也為木因濕鬱而生熱則膽囊之口腫脹不能輸其汁於小腸以化食轉溢於血分色透肌表而發黃為土因濕鬱而生寒故脾胃火衰不能熟腐水穀運轉下行是以恆作脹滿或成結證為疏方用茵陳梔子連翹各三錢瀉肝膽之熱即以消膽囊之腫脹厚朴陳皮生麥芽各二錢生薑五錢開脾胃之郁即以祛脾胃之寒茯苓片生薏米赤小豆甘草各三錢瀉臟腑之濕更能培土以勝濕且重用甘草即以矯茵陳蒿之劣味也此證聞茵陳之味多噁心嘔吐故用甘草調之服一劑後心中不覺熱者去梔子加生杭芍三錢再服一劑若仍不能食者用乾薑二錢以代生薑若心中不覺熱轉覺涼者初服即不用梔子以乾薑代生薑涼甚者乾薑可用至五六錢嘔吐者加赭石六錢或至一兩服後吐仍不止者可先用開水送服赭石細末四五錢再服湯藥胃脘腸中結而不通者用湯藥送服牽牛炒熟為末三錢通利後即減去如此服至能進飲食即可停藥黃色未退自能徐消此等黃疸乃先有外感內伏釀成內傷當於傷寒論金匱所載之黃疸以外另為一種矣或問醫學具有科學性質原貴證實即議論之間亦貴確有實據仲景治黃疸雖云膽脾並治不過即其所用之藥揣摩而得然嘗考之傷寒論謂傷寒脈浮而緩手足自溫是為系在太陰太陰者身當發黃是但言發黃證由於脾也又嘗考之金匱謂寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行是金匱論黃疸亦責重脾也夫古人立言原多渾括後世注疏宜為詳解當西醫未來之先吾中華方書之祖述仲景者亦有顯然謂黃疸病由於膽汁溢於血中者乎答曰有之明季喻嘉言著寓意草其論錢小魯嗜酒成病謂膽之熱汁滿而溢於外以漸滲於經絡則身目俱黃為酒疸之病云云豈非顯然與西説相同乎夫西人對於此證必剖驗而後知喻氏則未經剖驗而已知非喻氏之智遠出西人之上誠以喻氏最深於金匱傷寒論因熟讀仲景之書觀其方中所用之藥而有所會心也由斯觀之愚謂仲景治黃疸原膽脾並治者固非無稽之談也附録徐云金匱硝石礬石散方原治內傷黃疸張錫純氏之發明功效卓然大著至礬石即皂礬張石頑亦曾於本經達源論及而先生則引神農本草經兼名涅石爾雅又名羽涅即一涅字知其當為皂礬又即其服藥後大便正黑色愈知其當為皂礬可謂具有特識又於臨證之時見其左脈細弱者知系肝陽不能條暢則用黃耆當歸桂枝尖諸藥煎湯送服若見其右脈濡弱者知系脾胃不能健運則用白朮陳皮薏米諸藥煎湯送服不拘拘送以大麥粥此誠善用古方更能通變化裁者也友人史治一婦人病黃病五六年肌膚面目俱黃癸亥秋感受客邪寒熱往來周身浮腫史與柴胡桂枝湯和解之二劑腫消寒熱不作遂配硝石礬石散一劑俾用大麥粥和服數日後復來云此藥入腹似難容受得無有他慮否史令放膽服之倘有差錯吾願領咎又服兩劑其黃盡失史欣然述之於豫豫曰仲聖之方固屬神矣苟非張先生之審定而闡發之則亦沉潛汨沒黯淡無光耳噫古人創方固難而今人用方亦豈易易哉論水臌氣臌治法附表裡分消湯水臌氣臌形原相近內經謂按之窅而不起者風水也愚臨證品驗以來知凡水證以手按其腫處成凹皆不能隨手而起至氣臌以手重按成凹則必隨手而起惟單腹脹病其中水臌氣臌皆有因其所鬱氣與水皆積腹中不能外透肌肉按之亦不成凹似難辨其為水為氣然水臌必然小便短少氣臌必覺肝胃氣滯是明徵也今試進論其治法金匱論水病分風水皮水正水石水謂風水皮水脈浮正水石水脈沉然水病之劇者脈之部位皆腫必重按之成凹其脈方見原難辨其浮沉及觀其治法脈浮者宜發汗恆佐以涼潤之藥脈沉者宜利小便恆佐以溫通之藥是知水腫原分涼熱其涼熱之脈可於有力無力辨之愚治此證對於脈之有力者亦恆先發其汗曾擬有表裡分消湯爰録其方於下表裡分消湯麻黃三錢生石膏滑石各六錢西藥阿斯匹林一瓦將前三味煎湯送服阿斯匹林若服藥一點鐘後不出汗者再服阿斯匹林一瓦若服後仍不出汗還可再服當以汗出為目的麻黃之性不但善於發汗徐靈胎謂能深入積痰凝血之中凡藥力所不到之處此能無微不至是以服之外透肌表內利小便水病可由汗便而解矣惟其性偏於熱似與水病之有熱者不宜故用生石膏以解其熱又其力雖云無微不至究偏於上升故又用滑石引之以下達膀胱即其利水之效愈捷也至用西藥阿斯匹林者因患此證者其肌膚為水錮閉汗原不易發透多用麻黃又恐其性熱耗陰阿斯匹林善發汗又善清熱故可用為麻黃之佐使且其原質存於楊柳皮液中原與中藥並用無礙也若汗已透腫雖見消未能全愈者宜專利其小便而利小便之藥以鮮白茅根湯為最效或與車前並用則尤效憶辛酉臘底有鄰村學生毛年二十得水腫證醫治月餘病益劇頭面周身皆腫腹如抱甕夜不能臥依壁喘息蓋其腹之腫脹異常無容息之地其氣幾不能吸入故作喘也其脈六部細數心中發熱小便不利知其病久陰虛不能化陽致有此證俾命人力剖凍地取鮮茅根每日用鮮茅根六兩銼碎和水三大碗以小鍋煎一沸即移置爐旁仍近爐眼徐徐溫之待半點鐘再煎一沸猶如前置爐旁須臾茅根皆沉水底可得清湯兩大碗為一日之量徐徐當茶溫飲之再用生車前子數兩自炒至微熟三指取一撮細細嚼咽之夜間睡醒時亦如此嚼服一晝夜約盡七八錢如此二日小便已利其腹仍膨脹板硬俾用大蔥白三斤切作絲和醋炒至將熟乘熱裹以布置臍上尉之若涼則仍置鍋中加醋少許炒熱再尉自晚間尉至臨睡時止一夜小便十餘次翌晨按其腹如常人矣蓋茅根如此煎法取其新鮮涼潤之性大能滋陰清熱久煎則無此效陰滋熱清小便自利若遇證之輕者但用徐服車前子法亦可消腫曾用之屢次奏功矣此證雖因病久陰虛究非原來陰虛若其人平素陰虛以致小便不利積成水腫者宜每用熟地黃兩半與茅根同煎服若恐兩沸不能將地黃煎透可先將地黃煮十餘沸再加茅根同煮至車前子仍宜少少嚼服一日可服四五錢至於因涼成水臌者其脈必細微遲弱或心中覺涼或大便泄瀉宜用花椒目六錢炒熟搗爛煎湯送服生硫黃細末五分若服後不覺溫暖可品驗加多以服後移時微覺溫暖為度蓋利小便之藥多涼二藥乃性溫能利小便者也若脾胃虛損不能運化水飲者宜治以健脾降胃之品而以利小便之藥佐之總之水臌之證未有小便通利而成者是以治此證者當以利小便為要務治小便不利可參閲拙擬治癃閉諸方各案有因胞系了戾致小便不通者其證偶因嘔吐咳逆或側臥欠伸仍可通少許俗名為轉胞病孕婦與産後及自高墜下者間有此病拙擬有升麻黃耆湯曾用之治愈數人此升提胞系而使之轉正也華元化有通小便祕方愚知之而未嘗試用後閲杭報見蕭言用其方加升麻一錢曾治愈其令妹二日一夜小便不通及陶姓男子一日夜小便不通皆投之即效方系人參蓮子心車前子王不留行各三錢甘草一錢肉桂三分白果十二枚按方中白果若以治咳嗽可連皮搗爛用之取其皮能斂肺也若以利小便宜去皮搗爛用之取其滑而能降也至於氣臌多系脾有瘀滯所致蓋脾為後天之主居中央以運四旁其中原多回血管以流通氣化若有瘀滯以阻其氣化腹中即生脹滿久則積為氣臌內經所謂諸濕腫滿皆屬脾也拙擬有雞胵湯曾用之屢次奏效方中之意用雞內金以開脾之瘀白朮以助脾之運柴胡陳皮以升降脾氣白芍以利小便防有蓄水生薑以通竅絡兼和營衛也統論藥性原在不涼不熱之間然此證有偏涼者則桂附乾薑可以酌加有偏熱者則芩連梔子可以酌加若其脈證皆實服藥數劑不見愈者可用所煎藥湯送服黑醜頭次所軋細末錢半服後大便通行病即稍愈然須服原方數日日用一次連用恐傷氣分此水臌氣臌治法之大略也醫方篇中載有治水臌氣臌諸方案宜參觀論血臌治法水臌氣臌之外又有所謂血臌者其證較水臌氣臌尤為難治然其證甚稀少醫者或臨證數十年不一遇即或遇之亦止認為水臌氣臌而不知為血臌是以方書鮮有論此證者誠以此證之腫脹形狀與水臌氣臌幾無以辨所可辨者其周身之回血管紫紋外現耳血臌之由多因努力過甚激動氣血或因暴怒動氣血隨氣升以致血不歸經而又未即吐出瀉出遂留於臟腑阻塞經絡周身之氣化因之不通三焦之水飲因之不行所以血臌之證初起多兼水與氣也逮至瘀血漸積漸滿周身之血管皆為瘀血充塞其回血管膚淺易見遂呈紫色且由呈紫色之處而細紋旁達初則兩三處浸至遍身皆是紫紋若於回血管紫色初見時其身體猶可支持者宜先用金匱下瘀血湯加野臺參數錢下之其腹中之瘀血下後可再用藥消其血管中之瘀血而輔以利水理氣之品程功一月庶可奏效若至遍身回血管多現紫色病候至此其身體必羸弱已甚即投以下瘀血湯恐瘀血下後轉不能支持可用拙擬化瘀通經散再酌加三七末服之或用利水理氣之藥煎湯送服久之亦可奏效若腹中瘀血已下而周身之紫紋未消者可用丹參三七末各一錢再用山楂四錢煎湯沖紅糖水送服日兩次久自能消金匱下瘀血湯大黃三兩當為今之九錢桃仁三十個蟅蟲二十枚去足熬炒也上三味末之煉蜜和為四丸以酒一升約四兩強煮一丸取八合頓服之瘀血下如豚肝按此方必先為丸而後作湯服者是不但服藥汁實兼服藥渣也蓋如此服法能使藥之力緩而且大其腹中瘀久之血可一服盡下有用此方者必按此服法方效又杏仁之皮有毒桃仁之皮無毒其皮色紅活血之力尤大此方桃仁似宜帶皮生用然果用帶皮生桃仁時須審辨其確為桃仁勿令其以帶皮之杏仁誤充究之病血臌者其身體猶稍壯實如法服藥原可治愈若至身體羸弱者即能將其瘀治淨而轉有危險此又不可不知臨證時務將此事言明若病家懇求再為治之未晚也論腎弱不能作強治法內經謂腎者作強之官伎巧出焉蓋腎之為用在男子為作強在女子為伎巧然必男子有作強之能而後女子有伎巧之用也是以欲求嗣續者固當調養女子之經血尤宜補益男子之精髓以為作強之根基彼方書所載助腎之藥若海馬獺腎蛤蚧之類雖能助男子一時之作強實皆為傷腎之品原不可以輕試也惟鹿茸方書皆以為補腎之要品然止能補腎中之陽久服之亦能生弊惟用鹿角所熬之膠神農本草經謂之白膠其性陰陽俱補大有益於腎臟是以白膠在神農本草經列為上品而鹿茸止列於中品也曾治一人年近五旬左腿因受寒作疼教以日用鹿角膠三錢含化服之閲兩月復覿面其人言服鹿角膠半月腿已不疼然自服此藥後添有興陽之病因此輟服愚曰此非病也乃腎臟因服此而壯實也觀此則鹿角膠之為用可知矣若其人相火衰甚下焦常覺涼者可與生硫黃並服鹿角膠仍含化服之又每將飯之先服生硫黃末三分品驗漸漸加多以服後移時微覺溫暖為度難經謂命門之處男以藏精女以系胞胞即胞室與腎系同連於命門西人之生理新發明家謂其處為副腎髓質又謂其處為射精之機關是中西之説同也又謂副腎髓質之分泌素名副腎鹼而雞子黃中實含有此物可用以補副腎鹼之缺乏此説愚曾實驗之確乎可信方用生雞子黃兩三枚調開水服之勿令熟熟則無效愚曾擬一強腎之方用建蓮子去心為末焙熟再用豬羊脊髓和為丸桐子大每服二錢日兩次常服大有強腎之效因名其方為強腎瑞蓮丸蓋凡物之有脊者其脊中必有一袋即督脈也其中所藏之液即脊髓亦即西人所謂副腎鹼所以能助腎臟作強且督脈之袋上通於腦凡物之角與腦相連鹿角最大其督脈之強可知是用鹿角膠以補腎與用豬羊脊髓以補腎其理同也腎主骨胡桃仁最能補腎人之食酸齼齒者食胡桃仁即愈因齒牙為骨之餘原腎主之故有斯效此其能補腎之明徵也古方以治腎經虛寒與補骨脂並用謂有木火相生之妙胡桃屬木補骨脂屬火若腎經虛寒泄瀉骨痿腿疼用之皆效真佳方也枸杞亦為強腎之要藥故俗諺有隔家千里勿食枸杞之語然素有夢遺之病者不宜單服久服以其善興陽也惟與山萸肉同服則無斯弊紫稍花之性人皆以為房術之藥而不知其大有溫補下焦之功凡下焦虛寒泄瀉服他藥不愈者恆服紫稍花即能愈其能大補腎中元氣可知久久服之可使全體強壯至服之上焦覺熱者宜少佐以生地黃然宜作丸散不宜入湯劑煎服曾治一人年過四旬身形羸弱脈象細微時患泄瀉房事不能作強俾用紫稍花為末每服二錢半日兩次再隨便嚼服枸杞子五六錢兩月之後其身形遽然強壯泄瀉痿廢皆愈再診其脈亦大有起色且從前覺精神腦力日浸衰減自服此藥後則又覺日浸增加矣論沖氣上衝之病因病狀病脈及治法沖氣上衝之病甚多而醫者識其病者甚少即或能識此病亦多不能洞悉其病因而施以相當之治法沖者奇經八脈之一其脈在胞室之兩旁與任脈相連為腎臟之輔弼氣化相通是以腎虛之人沖氣多不能收斂而有上衝之弊況衝脈之上系原隸陽明胃府因沖氣上衝胃府之氣亦失其息息下行之常胃氣以息息下行為常或亦轉而上逆阻塞飲食不能下行多化痰涎因腹中膨悶噦氣厄逆連連不止甚則兩肋疼脹頭目眩暈其脈則弦硬而長乃肝脈之現象也蓋沖氣上衝之證固由於腎臟之虛亦多由肝氣恣橫素性多怒之人其肝氣之暴發更助沖胃之氣上逆故脈之現象如此治此證者宜以斂沖鎮沖為主而以降胃平肝之藥佐之其脈象數而覺熱者宜再輔以滋陰退熱之品愚生平治愈此證已不勝紀近在滄州連治愈數人爰將治愈之案詳列於下以備參觀滄州安年十八九胸脅滿悶飲食減少時作噦逆腹中漉漉有聲蓋氣衝痰涎作響也大便乾燥脈象弦長有力為疏方用生龍骨牡蠣代赭石各八錢生山藥生芡實各六錢半夏生杭芍各四錢芒硝蘇子各二錢厚朴甘草各錢半一劑後脈即柔和按方略有加減數劑全愈陳修園謂龍骨牡蠣為治痰之神品然泛用之多不見效惟以治此證之痰則效驗非常因此等痰涎原因沖氣上衝而生龍骨牡蠣能鎮斂沖氣自能引導痰涎下行也蓋修園原謂其能導引逆上之火泛濫之水下歸其宅故能治痰夫火逆上水泛濫其中原有沖氣上衝也趙因有沖氣上衝病自言患此病已三年百方調治毫無效驗其病脈情狀大略與前案同惟無痰聲漉漉而尺脈稍弱遂於前方去芒硝加柏子仁枸杞子各五錢連服數劑全愈滄州一叟年七十四歲性浮躁因常常忿怒致沖氣上衝劇時覺有氣自下上衝杜塞咽喉有危在頃刻之勢其脈左右皆弦硬異常為其年高遂於前第二方中加野臺參三錢一劑見輕又服一劑沖氣遂不上衝又服數劑以善其後為治此證多用第二方加減因名為降胃鎮沖湯論火不歸原治法方書謂下焦之火生於命門名為陰分之火又謂之龍雷之火實膚淺之論也下焦之火為先天之元陽生於氣海之元氣蓋就其能撑持全身論則為元氣就其能溫暖全身論則為元陽此氣海之元陽為人生命之本源無論陰分陽分之火皆於此肇基氣海純系脂膜護繞摶結而成其脂膜旁出一條與脊骨自下數第七節相連夾其七節兩旁各有一穴內經謂七節之旁中有小心也而氣海之元陽由此透入脊中因元陽為生命之本故於元陽透脊之處謂之命門由斯觀之命門之實用不過為氣海司管鑰之職下焦之火仍當屬於氣海之元陽論下焦之火上竄不歸原亦氣海元陽之浮越也然其病渾名火不歸原其病因原有數端治法各有所宜爰詳細臚列於下有氣海元氣虛損不能固攝下焦氣化致元陽因之浮越者其脈尺弱寸強浮大無根其為病或頭目眩暈或面紅耳熱或心熱怔忡或氣粗息賁宜治以淨萸肉生山藥各一兩人參玄參代赭石生龍骨生牡蠣各五錢心中發熱者酌加生地黃天冬各數錢補而斂之鎮而安之元陽自歸其宅也方中用赭石者因人參雖饒有溫補之性而力多上行與赭石並用則力專下注且赭石重墜之性又善佐龍骨牡蠣以潛陽也有下焦真陰虛損元陽無所繫戀而浮越者其脈象多弦數或重按無力其證時作灼熱或口苦舌乾或喘嗽連連宜用生山藥熟地黃各一兩玄參生龍骨生牡蠣生龜板甘枸杞各五錢生杭芍三錢生雞內金甘草各錢半此所謂壯水之主以制陽光也若其下焦陰分既虛而陽分亦微有不足者其人上焦常熱下焦間有覺涼之時宜治以金匱崔氏八味丸以生地易熟地原方乾地黃即是藥房中生地更宜將茯苓澤瀉分量減三分之二將丸劑一料分作湯藥八劑服之有氣海元陽大虛其下焦又積有沉寒錮冷逼迫元陽如火之將滅而其焰轉上竄者其脈弦遲細弱或兩寸浮分似有力其為證心中煩躁不安上焦時作灼熱而其下焦轉覺涼甚或常作泄瀉宜用烏附子人參生山藥各五錢淨萸肉胡桃肉各四錢赭石生杭芍懷牛膝各三錢雲苓片甘草各錢半泄瀉者宜去赭石此方書所謂引火歸原之法也方中用芍藥者非以解上焦之熱以其與參附並用大能收斂元陽下歸其宅然引火歸原之法非可概用於火不歸原之證必遇此等證與脈然後可用引火歸原之法又必須將藥晾至微溫然後服之方與上焦之燥熱無礙有因沖氣上衝兼胃氣上逆致氣海元陽隨之浮越者其脈多弦長有力右部尤甚李士材脈訣歌括所謂直上直下也其證覺胸中滿悶煩熱時作厄逆多吐痰涎劇者覺痰火與上衝之氣杜塞咽喉幾不能息宜治以拙擬降胃鎮沖湯方見論沖氣上衝之病因病狀病脈及治法一節俾沖胃之氣下降而諸病自愈矣有因用心過度心中生熱牽動少陽相火即膽肝中所寄之相火上越且外越者其脈寸關皆有力多兼滑象或脈搏略數其為病心中煩躁不安多生疑惑或多忿怒或覺熱起脅下散於周身治用生懷山藥細末六七錢煮作粥晨間送服芒硝三錢晚送服西藥臭剝兩瓦蓋芒硝鹹寒善解心經之熱以開心下熱痰此證心下多有熱痰臭剝性亦鹹寒能解心經之熱又善制相火妄動至送以山藥粥者因鹹寒之藥與脾胃不宜且能耗人津液而山藥則善於養脾胃滋津液用之送服硝剝取其相濟以成功猶金匱之硝石礬石散送以大麥粥也有因心肺脾胃之陽甚虛致寒飲停於中焦且溢於膈上逼迫心肺脾胃之陽上越兼外越者其脈多弦遲細弱六部皆然又間有浮大而軟按之豁然者其現證或目眩耳聾或周身發熱或覺短氣或咳喘或心中發熱思食鮮果而食後轉覺心中脹滿病加劇者宜用拙擬理飲湯服數劑後心中不覺熱轉覺涼者去芍藥或覺氣不足者加生箭耆三錢此證如此治法即方書所謂用溫燥健補脾胃之藥可以制伏相火不知其所伏者非相火實系溫燥之藥能掃除寒飲而心肺脾胃之陽自安其宅也上所列火不歸原之證其病因雖不同而皆系內傷至外感之證亦有火不歸原者傷寒溫病中之戴陽證是也其證之現狀面赤氣粗煩躁不安脈象雖大按之無力又多寸盛尺虛此乃下焦虛寒孤陽上越之危候頗類寒溫中陰極似陽證然陰極似陽乃內外異致戴陽證乃上下異致也宜用傷寒論通脈四逆湯加蔥加人參治之原方原謂面赤者加蔥面赤即戴陽證特是戴陽之證不一使果若少陰脈之沉細或其脈非沉細而按之指下豁然毫無根柢且至數不數者方可用通脈四逆湯方若脈沉細而數或浮大而數者其方即斷不可用曾治王年四十餘身形素虛傷寒四五日間延為診視其脈關前洪滑兩尺無力為開拙擬仙露湯因其尺弱囑其將藥徐徐飲下一次只溫飲一大口防其寒涼侵下焦也病家忽愚所囑竟頓飲之遂致滑瀉數次多帶冷沫上焦益覺煩躁鼻如煙燻面如火炙其關前脈大於從前一倍數至七至知其已成戴陽之證急用野臺參一兩煎湯八分茶盅兌童便半盅須用五歲以下童子便將藥碗置涼水盆中候冷頓飲之又急用知母玄參生地各一兩煎湯一大碗候用自服參後屢診其脈過半點鐘脈象漸漸收斂脈搏似又加數遂急用候服之藥燉極熱徐徐飲下一次只飲藥一口閲兩點鐘盡劑周身微汗而愈按此證上焦原有燥熱因初次涼藥頓服透過病所直達下焦上焦燥熱仍留逮下焦滑瀉元陽上浮益助上焦之熱現種種熱象脈數七至此時不但薑附分毫不敢用即單用人參上焦之燥熱亦必格拒不受故以童便之性下趨者佐之又復將藥候至極涼頓服下逮遲之有傾脈象收斂至數加數是下焦得參溫補之力而元陽收回其上焦因參反激之力而燥熱益增也故又急用大涼大潤之藥乘熱徐徐飲之以清上焦之燥熱而不使其寒涼之性復侵下焦此於萬難用藥之際仍欲用藥息息吻合實亦費盡躊躇矣論腰疼治法方書謂腰者腎之府腰疼則腎將憊矣夫謂腰疼則腎將憊誠為確論至謂腰為腎之府則尚欠研究何者凡人之腰疼皆脊梁處作疼此實督脈主之督脈者即脊梁中之脊髓袋下連命門穴處為人之副腎臟是以不可名為腎之府腎虛者其督脈必虛是以腰疼治斯證者當用補腎之劑而引以入督之品曾擬益督丸一方徐徐服之果系腎虛腰疼服至月餘自愈益督丸杜仲四兩酒浸炮黃菟絲子三兩酒浸蒸熟續斷二兩酒浸蒸熟鹿角膠二兩將前三味為細末水化鹿角膠為丸黃豆粒大每服三錢日兩次服藥後嚼服熟胡桃肉一枚諸家本草皆謂杜仲宜炒斷絲用究之將杜仲炒成炭而絲仍不斷如此製法殊非所宜是以此方中惟用生杜仲炮黃為度胡桃仁原補腎良藥因其含油質過多不宜為丸故於服藥之後單服之若證兼氣虛者可用黃耆人參煎湯送服此丸若證兼血虛者可用熟地當歸煎湯送服此丸有因瘀血腰疼者其人或過於任重或自高墜下或失足閃跌其脊梁之中存有瘀血作疼宜治以活絡效靈丹加蟅蟲三錢煎湯服或用蔥白作引更佳李腰疼數年不愈為之診治其疼劇時心中恆覺滿悶輕時則似疼非疼綿綿不已亦恆數日不疼其脈左部沉弦右部沉牢自言得此病已三年服藥數百劑其疼卒未輕減觀從前所服諸方雖不一致大抵不外補肝腎強筋骨諸藥間有雜以祛風藥者因思內經謂通則不痛而此則痛則不通也且即其脈象之沉弦沉牢心中恆覺滿悶其關節經絡必有瘀而不通之處可知也爰為擬利關節通絡之劑而兼用補正之品以輔助之生懷山藥一兩大甘枸杞八錢當歸四錢丹參四錢生明沒藥四錢生五靈脂四錢穿山甲二錢炒搗桃仁二錢紅花錢半蟅蟲五枚廣三七二錢搗細藥共十一味先將前十味煎湯一大盅送服三七細末一半至煎渣再服時仍送服其餘一半此藥服至三劑腰已不疼心中亦不發悶脈較前緩和不專在沉分遂即原方去山甲加胡桃肉四錢連服十劑自覺身體輕爽再診其脈六部調勻腰疼遂從此除根矣就此證觀之凡其人身形不羸弱而腰疼者大抵系關節經絡不通其人顯然羸弱而腰疼者或肝腎有所虧損而然也在婦女又恆有行經時腰疼者曾治一人年過三旬居恆呼吸覺短氣飲食似畏寒涼當行經時覺腰際下墜作疼其脈象無力至數稍遲知其胸中大氣虛而欲陷是以呼吸氣短至行經時因氣血下注大氣亦隨之下陷是以腰際覺下墜作疼也為疏方用生箭耆一兩桂枝尖當歸生明沒藥各三錢連服七八劑其病遂愈又治一婦人行經腰疼且兼腹疼其脈有澀象知其血分瘀也治以當歸生雞內金各三錢生明沒藥生五靈脂生箭耆天花粉各四錢連服數劑全愈論肢體痿廢之原因及治法附起痿湯養腦利肢湯內經謂五臟有病皆能使人痿至後世方書有謂系中風者言風中於左則左偏枯而痿廢風中於右則右偏枯而痿廢有謂系氣虛者左手足偏枯痿廢其左邊之氣必虛右手足偏枯痿廢其右邊之氣必虛有謂系痰瘀者有謂系血瘀者有謂系風寒濕相併而為痹痹之甚者即令人全體痿廢因痰瘀血瘀及風寒濕痹皆能阻塞經絡也乃自腦髓神經司知覺運動之説倡自西人遂謂人之肢體痿廢皆系腦髓神經有所傷損而以愚生平所經驗者言之則中西之説皆不可廢今試列舉素所經驗者於下以徵明之憶在籍時曾見一豬其兩前腿忽不能動須就其臥處飼之半月後始漸愈又旬余解此豬見其肺上新愈之瘡痕宛然可辨且有將愈未盡愈者即物測人原可比例此即內經所謂因肺熱葉焦發為痿躄者也由斯知五臟有病皆使人痿者誠不誤也在奉天曾治一婦人年近三旬因夏令夜寢當窗為風所襲遂覺半身麻木其麻木之邊肌膚消瘦浸至其一邊手足不遂將成偏枯其脈左部如常右部則微弱無力而麻木之邊適在右此因風襲經絡致其經絡閉塞不相貫通也不早祛其風久將至於痿廢為疏方用生箭耆二兩當歸八錢用當歸者取其血活風自去也羌活知母乳香沒藥各四錢全蠍二錢全蜈蚣三條煎服一劑即見輕又服數劑全愈此中風能成痿廢之明徵也在本邑治一媼年過六旬其素日氣虛呼吸常覺短氣偶因勞力過度忽然四肢痿廢臥不能起呼吸益形短氣其脈兩寸甚微弱兩尺重按仍有根柢知其胸中大氣下陷不能斡旋全身也為疏方用生箭耆一兩當歸知母各六錢升麻柴胡桔梗各錢半乳香沒藥各三錢煎服一劑呼吸即不短氣手足略能屈伸又即原方略為加減連服數劑全愈此氣虛成痿廢之明徵也在本邑治一媼年五旬於仲冬之時忽然昏倒不知人其胸中似有痰涎大礙呼吸診其脈微細欲無且甚遲緩其家人謂其平素常覺心中發涼咳吐黏涎知其胸中素有寒飲又感冬日嚴寒之氣其寒飲愈凝結杜塞也急用胡椒三錢搗碎煎兩三沸取濃汁多半杯灌下呼吸頓形順利繼用乾薑六錢桂枝尖當歸各三錢連服三劑可作呻吟肢體漸能運動而左手足仍不能動繼治以助氣消痰活絡之劑左手足亦漸復舊此痰瘀能成痿廢之明徵也在本邑治一室女素本虛弱醫者用補斂之藥太過月事閉塞兩腿痿廢浸至抑搔不知疼癢其六脈皆有澀象知其經絡皆為瘀血閉塞也為疏方用拙擬活絡效靈丹加懷牛膝五錢紅花錢半蟅蟲五個煎服數劑月事通下兩腿已漸能屈伸有知覺又為加生黃耆知母各三錢服數劑後腿能任地然此等證非倉猝所能全愈俾將湯劑作為丸劑久久服之自能脫然此血瘀能成痿廢之明徵也族兄冬令兩腿作疼其腿上若胡桃大疙瘩若干自言其少時恃身體強壯恆於冬令半冰半水之中捕魚一日正在捕魚之際朔風驟至其寒徹骨遂急還家歇息片時兩腿疼痛不能任地因臥熱炕上復以厚被數日後覺其疼在骨皮膚轉麻木不仁浸至兩腿不能屈伸後經醫調治兼外用熱燒酒粳尉之其疼與木漸愈亦能屈伸惟兩腿皆不能伸直有人教坐椅上腳踏圓木棍來往令木棍旋轉久之腿可伸直如法試演逮至春氣融和兩腿始恢復原狀然至今已三十年每屆嚴寒之時腿仍覺疼必服熱藥數劑始愈至腿上之疙瘩乃當時因凍凝結至今未消者也愚曰此病猶可除根然其寒在骨非草木之品所能奏效必須服礦質之藥因人之骨中多函礦質也俾先用生硫黃細末五分於食前服之日兩次品驗漸漸加多以服後覺心中微溫為度果用此方將腿疼之病除根此風寒濕痹能成痿廢之明徵也至西人謂此證關乎腦髓神經者愚亦確有經驗原其神經之所以受傷大抵因腦部充血所致蓋腦部充血之極可至腦中血管破裂至破裂之甚者管中之血溢出不止其人即昏厥不復蘇醒若其血管不至破裂因被充血排擠隔管壁將血滲出或其血管破裂少許出血不多而自止其所出之血若黏滯於左邊司運動之神經其右邊手足即痿廢若黏滯其右邊司運動之神經其左邊之手足即痿廢因人之神經原左右互相管攝也此證皆臟腑氣血挾熱上衝即內經所謂血之與氣並走於上之大厥也其人必有劇烈之頭疼其心中必覺發熱其脈象必然洪大或弦長有力內經又謂此證氣反則生不反則死蓋氣反則氣下行血亦下行血管之未破裂者不再虞其破裂其偶些些破裂者亦可因氣血之下行而自愈若其氣不反血必隨之上升不已將血管之未破裂者可至破裂其已破裂者更血流如注矣愚因細參內經之旨而悟得醫治此證之方當重用懷牛膝兩許以引腦中之血下行而佐以清火降胃鎮肝之品俾氣與火不復相併上衝數劑之後其劇烈之頭疼必愈脈象亦必和平再治以化瘀之品以化其腦中瘀血而以宣通氣血暢達經絡之藥佐之肢體之痿廢者自能徐徐愈也特是因腦充血而痿廢者本屬危險之證所慮者辨證不清當其初得之時若誤認為氣虛而重用補氣之品若王勳臣之補陽還五湯或誤認為中風而重用發表之品若千金之續命湯皆益助其氣血上行而危不旋踵矣至用藥將其腦充血治愈而其肢體之痿廢或仍不愈亦可少用參耆以助其氣分然必須用鎮肝降胃清熱通絡之藥輔之方能有效因擬兩方於下以備採用起痿湯治因腦部充血以致肢體痿廢逮腦充血治愈脈象和平而肢體仍痿廢者徐服此藥久自能愈生箭耆四錢生赭石六錢軋細懷牛膝六錢天花粉六錢玄參五錢柏子仁四錢生杭芍四錢生明沒藥三錢生明乳香三錢蟅蟲四枚大的制馬錢子末二分共藥十一味將前十味煎湯送服馬錢子末至煎渣再服時亦送服馬錢子末二分養腦利肢湯治同前證或服前方若干劑後肢體已能運動而仍覺無力者野臺參四錢生赭石六錢軋細懷牛膝六錢天花粉六錢玄參五錢生杭芍四錢生明乳香三錢生明沒藥三錢威靈仙一錢蟅蟲四枚大的制馬錢子末二分共藥十一味將前十味煎湯送服馬錢子末至煎渣再服時亦送服馬錢子末二分上所録二方為愚新擬之方而用之頗有效驗恆能隨手建功試舉一案以明之天津賀某得腦充血證左手足驟然痿廢其脈左右皆弦硬而長其腦中疼而且熱心中異常煩躁投以建瓴湯為其腦中疼而且熱更兼煩躁異常加天花粉八錢連服三劑後覺左半身筋骨作疼蓋其左半身從前麻木無知覺至此時始有知覺也其脈之弦硬亦稍愈遂即原方略為加減又服數劑脈象已近和平手足稍能運動從前起臥轉身皆需人此時則無需人矣於斯改用起痿湯服數劑手足之運動漸有力而脈象之弦硬又似稍增且腦中之疼與熱從前服藥已愈至此似又微覺疼熱是不受黃耆之升補也因即原方將黃耆減去又服數劑其左手能持物左足能任地矣頭中亦分毫不覺疼熱再診其脈已和平如常遂又加黃耆將方中花粉改用八錢又加天冬八錢連服六劑可扶杖徐步仍覺乏力繼又為擬養腦利肢湯服數劑後心中又似微熱因將花粉改用八錢又加帶心寸麥冬七錢連服十劑全愈按此證之原因不但腦部充血實又因腦部充血之極而至於溢血逮至充血溢血治愈而痿廢仍不愈者因從前溢出之血留滯腦中未化而周身經絡兼有閉塞處也是以方中多用通氣化血之品又恐久服此等藥或至氣血有損故又少加參耆助之且更用玄參花粉諸藥以解參耆之熱赭石牛膝諸藥以防參耆之升可謂熟籌完全矣然服後猶有覺熱之時其脈象仍有稍變弦硬之時於斯或減參耆或多加涼藥精心酌斟息息與病機相赴是以終能治愈也至於二方中藥品平均之實偏於涼而服之猶覺熱者誠以參耆之性可因補而生熱兼以此證之由來又原因臟腑之熱挾氣血上衝也論四肢疼痛其病因涼熱各異之治法從來人之腿疼者未必臂疼臂疼者未必腿疼至於腿臂一時並疼其致疼之因腿與臂大抵相同矣而愚臨證四十餘年治愈腿臂一時並疼者不勝記獨在奉曾治一媼其腿臂一時並疼而致腿疼臂疼之病因則各異今詳録其病案於下奉天佟姓媼年五十七歲於仲冬漸覺四肢作疼延醫服藥三十餘劑浸至臥床不能轉側晝夜疼痛不休至正月初旬求為診視其脈左右皆浮而有力舌上微有白苔知其兼有外感之熱也西藥阿斯匹林善發外感之汗又善治肢體疼痛俾用一瓦半白糖水送下以發其汗翌日視之自言汗後疼稍愈能自轉側而其脈仍然有力遂投以連翹花粉當歸丹參白芍乳香沒藥諸藥兩臂疼愈強半而腿疼則加劇自言兩腿得熱則疼減若服熱藥其疼當愈於斯又改用當歸牛膝續斷狗脊骨碎補沒藥五加皮諸藥服兩劑後腿疼見愈而臂疼又加劇是一人之身腿畏涼臂畏熱也夫腿既畏涼其疼也必因有凝結之涼臂既畏熱其疼也必因有凝結之熱籌思再三實難疏方細診其脈從前之熱象已無其左關不任重按恍悟其上熱下涼者因肝木稍虛或肝氣兼有鬱滯其肝中所寄之相火不能下達所以兩腿畏涼其火鬱於上焦因肝虛不能敷布所以兩臂畏熱向曾治友人劉左臂常常發熱其肝脈虛而且郁投以補肝兼舒肝之劑而愈以彼例此知旋轉上熱下涼之機關在調補其肝木而已遂又為疏方用淨萸肉一兩當歸白芍各五錢乳香沒藥續斷各四錢連翹甘草各三錢每日煎服一劑又俾於每日用阿斯匹林一瓦分三次服下數日全愈方中重用萸肉者因萸肉得木氣最全酸斂之中大具條暢之性是以善補肝又善舒肝神農本草經謂其逐寒濕痹四肢之作疼亦必有痹而不通之處也況又有當歸白芍乳香沒藥以為之佐使故能奏效甚捷也論治偏枯者不可輕用補陽還五湯今之治偏枯者多主氣虛之説而習用醫林改錯補陽還五湯然此方用之有效有不效更間有服之即僨事者其故何也蓋人之肢體運動原腦髓神經為之中樞而腦髓神經所以能司運動者實賴腦中血管為之濡潤胸中大氣為之斡旋乃有時腦中血管充血過度甚或至於破裂即可纍及腦髓神經而腦髓神經遂失其司運動之常職又或有胸中大氣虛損過甚更或至於下陷不能斡旋腦髓神經而腦髓神經亦恆失其司運動之常職此二者一虛一實同為偏枯之證而其病因實判若天淵設或藥有誤投必至凶危立見是以臨此證者原當細審其脈且細詢其未病之先狀況何如若其脈細弱無力或時覺呼吸短氣病發之後並無心熱頭疼諸證投以補陽還五湯恆見效即不效亦必不至有何弊病若其脈洪大有力或弦硬有力更預有頭疼眩暈之病至病發之時更覺頭疼眩暈益甚或兼覺心中發熱者此必上升之血過多致腦中血管充血過甚隔管壁泌出血液或管壁少有罅漏流出若干血液若其所出之血液黏滯左邊司運動之神經其右半身即偏枯若黏滯右邊司運動之神經其左半身即偏枯此時若投以拙擬建瓴湯一二劑後頭疼眩暈即愈繼續服之更加以化瘀活絡之品肢體亦可漸愈若不知如此治法惟確信王勳臣補陽還五之説於方中重用黃耆其上升之血益多腦中血管必將至破裂不止也可不慎哉如以愚言為不然而前車之鑑固有醫案可徵也邑某君年過六旬患偏枯原不甚劇欲延城中某醫治之不遇適有在津之老醫初歸造門自薦服其藥後即昏不知人遲延半日而卒後其家人持方質愚系仿補陽還五湯重用黃耆八錢知其必系腦部充血過度以致偏枯也不然服此等藥何以僨事哉又嘗治直隸王其口眼略有歪斜左半身微有不利時作頭疼間或眩暈其脈象洪實右部尤甚知其系腦部充血問其心中時覺發熱治以建瓴湯連服二十餘劑全愈王愈後甚喜而轉念忽有所悲因告愚曰五舍弟從前亦患此證醫者投以參耆之劑竟至不起向以為病本不治非用藥有所錯誤今觀先生所用之方乃知前方固大謬也統觀兩案及王之言則治偏枯者不可輕用補陽還五湯不愈昭然哉而當時之遇此證者又或以為中風而以羌活防風諸藥發之亦能助其血益上行其弊與誤用參耆者同也蓋此證雖有因兼受外感而得者然必其外感之熱傳入陽明而後激動病根而猝發是以雖挾有外感亦不可投以發表之藥也論鼻淵治法內經謂膽移熱於腦則辛頞鼻淵頞者鼻通腦之徑路也辛頞則頞中覺刺戟也鼻淵者鼻流濁涕如淵之不竭也蓋病名鼻淵而其病灶實在於頞因頞中黏膜生炎有似腐爛而病及於腦也其病標在上其病本則在於下故內經謂系膽之移熱而愚臨證品驗以來知其熱不但來自膽經恆有來自他經者而其熱之甚者又恆來自陽明胃腑膽經之熱大抵由內傷積熱而成胃腑之熱大抵由伏氣化熱而成臨證者若見其脈象弦而有力宜用藥清其肝膽之熱若膽草白芍諸藥而少加連翹薄荷菊花諸藥輔之以宣散其熱且以防其有外感拘束也若見其脈象洪而有力宜用藥清其胃腑之熱若生石膏知母諸藥亦宜少加連翹薄荷菊花諸藥輔之且濁涕常流則含有毒性若金銀花甘草花粉諸藥皆可酌加也若病久陰虛脈有數象者一切滋陰退熱之藥皆可酌用也後世方書治此證者恆用蒼耳辛夷辛溫之品此顯與經旨相背也夫經既明言為膽之移熱則不宜治以溫藥可知且明言頞辛鼻淵不宜更用辛溫之藥助其頞益辛更可知矣即使證之初得者或因外感拘束宜先投以表散之藥然止宜辛涼而不可用辛溫也是以愚遇此證之脈象稍浮者恆先用西藥阿斯匹林瓦許汗之取其既能解表又能退熱也拙著石膏解中載有重用生石膏治愈此證之案數則可以參觀又此證便方用絲瓜蔓煎湯飲之亦有小效若用其湯當水煎治鼻淵諸藥其奏效當尤捷也詳論咽喉證治法咽喉之證有內傷外感或涼或熱或虛或實或有傳染或無傳染之殊今試逐條詳論之於下傷寒病恆兼有咽喉之證傷寒論陽明篇第二十節云陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽亦不痛按此節但言咽痛未言治法乃細審其文義是由太陽初傳陽明胃腑之熱猶未實是以能食其熱兼瀰漫於胸中胸中屬太陽當為陽明病連太陽上熏肺臟所以作咳更因咳而其熱上竄所以咽痛擬治以白虎湯去甘草加連翹川貝母少陰篇第三節病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛此節亦未列治法按少陰脈微細此則陰陽俱緊原為少陰之變脈緊脈原不能出汗因其不當出汗者而反自汗所以知其亡陽其咽痛者無根之陽上竄也擬用大劑八味地黃湯以芍藥易丹皮再加蘇子牛膝收斂元陽歸根以止汗而咽痛自愈也加減八味地黃湯大懷熟地一兩淨萸肉一兩生懷山藥八錢生杭芍三錢大雲苓片二錢澤瀉錢半烏附子二錢肉桂二錢去粗皮後入懷牛膝三錢蘇子二錢研炒煎湯盅半分兩次溫服少陰篇第三十節云少陰病下利咽痛胸滿心煩者豬膚湯主之按此證乃少陰之熱瀰漫於三焦也是以在上與中則為咽痛煩滿因腎中真陰不能上升與陽分相濟所以多生燥熱也在下則為下利因臟病移熱於腑其膀胱瘀滯致水歸大腸而下利也至治以豬膚湯者以豬為水蓄其膚可熬膠汁液尤勝原能助腎陰上升與心陽調劑以化燥熱而又伍以白蜜之涼潤小粉之沖和熬之如粥服後能留戀於腸胃不致隨下利瀉出自能徐徐敷布其氣化以清三焦瀰漫之熱也少陰篇第三十一節云少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯此亦少陰病之熱者也用甘草湯取其能潤肺利咽而其甘緩之性又能緩心火之上炎則下焦之燥熱可消也用桔梗湯者取其能升提腎中之真陰俾陰陽之氣互相接續則上焦之陽自不浮越以鑠肺熏咽且其上達之力又善散咽喉之鬱熱也按後世治咽喉證者皆忌用桔梗然果審其脈為少陰病之微細脈用之固不妨也況古所用之桔梗皆是苦桔梗其性能升而兼能降實具有開通之力也少陰篇第三十二節云少陰病咽中傷生瘡不能言語聲不出者苦酒湯主之按少陰之脈原絡肺上循喉嚨是以少陰篇多兼有咽喉之病至治以苦酒湯唐氏為苦酒與半夏同用可使咽中之瘡速破苦酒即今之醋醋調生半夏末外敷原可消瘡不必皆攻之使破之厥陰篇第九節云傷寒先厥後發熱下利必自止而反汗出咽中痛其喉為痹按此節之咽痛以多亡陰也與少陰篇之汗出亡陽者原互相對照蓋其人之肝臟蘊有實熱因汗出過多耗其陰液其熱遂上竄鬱於咽中而作痛故曰其咽為痹痹者熱與氣血凝滯不散也仲師當日未言治法而愚思此證當用酸斂之藥以止其汗涼潤之藥以復其液宣通之藥以利其咽彙集為方庶可奏功爰將所擬之方詳録於下斂陰瀉肝湯生杭芍兩半天花粉一兩射干四錢浙貝母四錢搗碎酸石榴一個連皮搗爛同煎湯一盅半分兩次溫服下上所録傷寒兼咽喉病者六節傷寒中之咽喉證大略已備而愚臨證多年知傷寒兼病咽喉又有出於六節之外者試舉治驗之案一則明之愚在奉時治一朱姓學生患傷寒三四日蜷臥昏昏似睡間作譫語呼之眼微開舌上似無苔而舌皮甚干且有黑斑咽喉疼痛小便赤而熱大便數日未行脈微細兼沉心中時覺發熱而肌膚之熱度如常此乃少陰傷寒之熱證因先有伏氣化熱乘腎臟虛損而竄入少陰遏抑腎氣不能上達是以上焦燥熱而舌斑咽痛也其舌上有黑斑者亦為腎虛之現象至其病既屬熱而脈微細者誠以脈發於心腎氣因病不能上達與心相濟其心之跳動即無力此所以少陰傷寒無論或涼或熱其脈皆微細也遂為疏方生石膏細末二兩生懷山藥一兩大潞參六錢知母六錢甘草二錢先用鮮茅根二兩煮水以之煎藥取清湯三盅每溫服一盅調入生雞子黃一枚服藥一次後六脈即起服至二次脈轉洪大服至三次脈象又漸和平精神亦復舌乾咽痛亦見愈翌日即原方略為加減再服一劑諸病全愈按上所用之方即坎離互根湯方之細解詳於本方後茲不贅至於溫病或溫而兼疹其兼咽喉證者尤多方書名其證為爛喉痧其證多繫有傳染之毒菌治之者宜注意清其溫熱解其疹毒其咽喉之證亦易愈試舉治驗之案以明之戌辰在津有宋長子患溫疹兼喉證醫者皆忌重用涼藥服其藥數劑病轉增劇繼延愚為診視其脈洪長有力純乎陽明胃腑蘊有實熱其疹似靨未靨視其咽喉兩旁紅微有爛處心中自覺熱甚小便短赤大便三日未行為開大劑白虎湯加連翹四錢薄荷葉錢半以托疹外出方中石膏重用生者四兩將藥煎湯三盅分三次溫飲下病大見愈而脈仍有力咽喉食物猶疼繼又用原方先取鮮白茅根二兩煮水以煎藥仍分三次服下盡劑而愈大便亦通下後其次子亦患溫疹喉證較其兄尤劇仍治以前方初次即用茅根湯煎藥藥方中生石膏初用三兩漸加至五兩始愈繼其幼女年七歲亦患溫疹喉證較其兩兄尤重其疹周身成一個肉皮皆紅俗謂此等疹皆不能治愈亦治以前方為其年幼方中生石膏初用二兩後加至六兩其熱稍退而喉痛不減其大便六日未行遂單用淨芒硝俾淬水服下大便即通其熱大減喉痛亦愈強半再診其脈雖仍有力實有浮而還表之象遂用西藥阿斯匹林一瓦因病機之外越而助其出汗果服後周身得汗霍然全愈溫疹之證西人名為猩紅熱有毒菌傳染原不易治而兼咽喉證者治之尤難仲景所謂陽毒為病面赤斑斑如錦紋咽喉痛唾膿血者當即此證近世方書中又名為爛喉痧謂可治以傷寒論麻杏甘石湯然麻杏甘石湯中石膏之分量原為麻黃之二倍若借用其方則石膏之分量當十倍於麻黃石膏一兩麻黃一錢其熱甚者石膏之分量又當二十倍於麻黃石膏二兩麻黃一錢然後用之無弊滄州友人董年過三旬初則感冒發頤繼則漸腫而下延至胸膺服藥無效時當中秋節後淋雨不止因病勢危急冒雨驅車迎愚既至見其頷下連頸壅腫異常撫之硬而且熱色甚紅純是一團火毒之氣下腫已至心口其牙關不開咽喉腫疼自牙縫進水半口必以手掩口十分用力始能下咽且痰涎填滿胸中上至咽喉並無容水之處進水少許必換出痰涎一口且覺有氣自下上衝常作厄逆其脈洪滑而長重按有力一分鐘約近九十至大便數日未行愚曰此俗所稱蝦蟆瘟也其毒熱熾盛盤踞陽明之府若火之燎原必重用生石膏清之乃可緩其毒熱之勢從前醫者在座謂曾用生石膏一兩毫無功效愚曰石膏乃微寒之藥神農本草經原有明文僅用兩許何能清此熾盛之熱毒遂為疏方用生石膏四兩清半夏四錢金線重樓三錢連翹二錢射干二錢煎服後覺藥停胸間不下其熱與腫似有益增之勢知其證兼結胸火熱無下行之路故益上衝也復急取生石膏四兩赭石三兩又煎湯服下仍覺停於胸間又急取赭石三兩蔞仁二兩芒硝八錢又煎湯飲下胸中仍不開通此時咽喉益腫再飲水亦不能下咽病家惶恐無措愚曉之曰余所以連次亟亟用藥者正為此病腫勢浸長恐稍緩則藥不能進今其胸中既貯如許多藥斷無不下行之理藥下行則結開便通毒火隨之下降而上焦之腫熱必消矣時當晚十點鐘至夜半覺藥力下行黎明下燥糞若干上焦腫熱覺輕水漿可進晨飯時牙關亦微開服茶湯一碗午後腫熱又漸增撫其胸熱又烙手脈仍洪實意其燥糞必未盡下遂投以大黃四錢芒硝五錢又下燥糞兼有溏糞病遂大愈而腫處之硬者仍不甚消胸間撫之猶熱脈象亦仍有餘熱又用生石膏四兩金銀花連翹各五錢煎湯一大碗分數次溫飲下日服一劑三日全愈按此病實溫疫疫有寒溫兩種而寒者甚少確有傳染至猛至烈之毒菌是以難治又按此證當二次用藥時若加硝黃於藥中早通其大便或不至以後如此危險而當時閲歷未深猶不能息息與病機相赴也有白喉證其發白或至腐爛實為傳染病之一端其證大抵先有蘊熱則易受傳染為其證內傷為重宜用涼潤滋陰清火之品而忌用表散之劑然用辛涼之藥以散其火鬱若薄荷連翹諸藥固所不忌也白喉忌表抉微中之養陰清肺湯神仙活命湯二方原為治白喉良方而神仙活命湯中宜加連翹三錢熱甚者可將方中生石膏加倍或加兩倍若大便不通者大黃芒硝皆可酌加白喉之病又恆有與爛喉痧相併者參觀醫案中溫疹兼喉痧治沈姓學生病案又靈樞癰疽篇謂癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死按此證即後世所謂截喉癰初起時咽喉之間紅腫甚劇宜用消瘡之藥散之兼用扁針刺之使多出血若待其膿成而後瀉之恐不容待其成膿即有危險也消腫利咽湯天花粉一兩連翹四錢金銀花四錢丹參三錢射干三錢玄參三錢乳香二錢沒藥二錢炙山甲錢半薄荷葉錢半脈象洪實者加生石膏一兩小便不利者加滑石六錢大便不通者加大黃三錢咽喉之證熱者居多然亦間有寒者參觀論喉證治法內治劉姓童子一案又咽喉兩旁微高處西人謂之扁桃腺若紅腫西人謂之扁桃腺炎若其處屢次紅腫漸起疙瘩服清火藥則微消或略有感冒或稍有內熱復起者此是扁桃腺炎已有根蒂非但服藥所能愈必用手術割去之再投以清火消腫之藥始能除根若不割去在幼童可纍其身體之發達金匱謂婦人咽中如有炙臠吐之不出吞之不下俗謂之梅核氣病此亦咽喉證之一也按此證注疏家謂系痰氣阻塞咽喉之中然此證實兼有沖氣之沖也原方半夏厚朴湯主之是以半夏降沖厚朴開氣茯苓利痰生薑蘇葉以宣通其氣化愚用此方時恆加赭石數錢兼針其合谷奏效更速此證不但婦人男子亦間有之論喉證治法愚弱冠時已為人疏方治病然因年少人多不相信值里中有病喉者延醫治療煩愚作陪病者喉腫甚呼吸頗難醫者猶重用發表之劑而所用發表之藥又非辛涼解肌愚甚不以為然出言駁之醫者謂系纏喉風證非發透其汗不能消腫病家信其説誤服其藥竟至不救後至津門應試值白喉忌表抉微書新出閲之見其立論以潤燥滋陰清熱為主惟少加薄荷連翹以散鬱熱正與從前醫者所用之藥相反因喜而試用其方屢奏功效後值邑中患喉證者頗多用白喉忌表抉微治法有效有不效觀喉中不必發白恆紅腫異常有言此係爛喉痧者又或言系截喉癰者大抵系一時之癘氣流行而互相傳染也其病初得脈多浮而微數或浮而有力久則兼有洪象此喉證兼瘟病也此時愚年近三旬臨證恆自有見解遇脈之初得浮數有力者重用玄參花粉以清其熱牛蒡連翹以利其喉再加薄荷葉二錢以透其表類能奏效其為日既深脈象洪而有力者又恆用白虎湯加銀花連翹乳香沒藥治愈為其有截喉癰之名間有加炙山甲以消其癰腫者其腫處甚劇呼吸有窒礙者恆先用鈹針刺出惡血俾腫消然後服藥針藥並施其奏功亦愈速然彼時雖治愈多人而爛喉痧截喉癰之名究未見諸書也後讀靈樞癰疽篇謂癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死經既明言癰發嗌中此後世截喉癰之名所由來也至謂不瀉其膿則危在目前是針刺瀉膿原為正治之法即不待其化膿針刺以出其惡血亦可為正治之法矣又閲傷寒論陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治王孟英解曰陽毒即後世之爛喉痧耳是爛喉痧衍之傷寒而相傳已久截喉癰即爛喉痧之重者也蓋白喉與爛喉痧證均有外感特白喉證內傷重而外感甚輕其外來之邪惟襲入三焦三焦色白是以喉現白色故方中宣散之品但少用薄荷連翹已能逐邪外出至爛喉痧原即傷寒論之陽毒其中挾有瘟毒之氣初得之時原宜重用宣散之品然宜散以辛涼而斷不可散以溫熱且又宜重用涼藥以佐之此為喉證之大略也而愚臨證數十年知喉證中原有諸多變證今詳録二則以備參觀愚在籍時有劉姓童子年逾十齡咽喉腫疼心中滿悶杜塞劇時呼吸頓停兩目上翻身軀後挺然其所以呼吸頓停者非咽喉杜塞實覺胸膈杜塞也診其脈微細而遲其胸膈常覺發涼有時其涼上衝即不能息而現目翻身挺之象即脈審證知系寒痰結胸無疑其咽喉腫疼者寒痰充溢於上焦迫其心肺之陽上浮也為擬方生赭石細末一兩乾薑烏附子各三錢厚朴陳皮各錢半煎服一劑胸次頓覺開通咽喉腫疼亦愈強半又服兩劑全愈奉天孫年二十得喉證屢經醫治不外白喉忌表抉微諸方加減病日增重醫者諉謂不治後愚為診視其脈細弱而數黏涎甚多須臾滿口即得吐出知系脾腎兩虛腎虛則氣化不攝陰火上逆痰水上泛而脾土虛損又不能制之若脾土不虛不但能制痰水上泛並能制陰火上逆故其咽喉腫疼黏涎若斯之多也投以六味地黃湯加於術又少加蘇子連服十劑全愈詳論猩紅熱治法自入夏以來各處發生猩紅熱互相傳染天氣炎熱而病益加多加劇治不如法恆至不救夫猩紅熱非他即痧疹而兼溫病也嘗實驗痧疹之證如不兼溫病其將出未出之先不過微有寒熱或頭微疼或眼胞微腫或肢體微痠懶或食欲不振其疹既出之後其表裡雖俱覺發熱而實無熾盛之劇熱治之者始終投以清表痧疹始終宜用表藥然宜表以辛涼不宜表以溫熱解毒之劑無不愈者即或始終不服藥聽其自出自靨在一星期間亦可自愈此以其但有疹毒之熱而無溫病之熱相助為虐故其病易愈耳至於疹而兼溫者則與斯迥異其初病之時疹猶未出即表裡壯熱因疹毒之熱尚未萌芽而溫病之熱已熾盛也治之者宜將薄荷連翹蟬蛻諸托表之藥與玄參沙參天花粉諸清裡之藥並用其連翹可用三錢薄荷葉蟬蛻可各用錢半玄參沙參花粉可各用五錢再少加金銀花甘草解毒若慮其痧疹不能透達可用鮮茅根二兩如無可代以鮮蘆根水煮數沸取清湯數盅以之代水煎藥煎湯一大盅溫服其疹必完全透出矣或以外更用鮮茅根數兩煎四五沸以其湯代茶更佳若其痧疹雖皆透發於外而火猶熾盛且深入陽明之府其舌從前白者至此則漸黃心中煩熱異常或氣粗微喘鼻翅搧動或神昏譫語腦膜生炎其大便乾燥小便赤澀此乃陽明胃腑大實之候而欲治陽明胃腑之實熱傷寒論白虎湯原為千古不祧之良方為其兼有疹毒可於方中加連翹二錢羚羊角一錢另煎兌服或銼細末送服或以金銀花二錢代之再用鮮茅根或鮮蘆根煮湯以之代水煎藥方中若用生石膏二兩可煎湯兩盅分兩次溫服若用生石膏三兩可煎湯三盅分三次溫服一劑熱未清者可服至數劑以服後熱退大便仍不滑瀉為度若其胃腑雖有大熱因小便不利而大便滑瀉者白虎湯又不可驟服宜先用滑石生懷山藥各一兩生杭芍八錢連翹蟬蛻各錢半甘草三錢此方即拙擬滋陰宣解湯煎湯一大盅服之其滑瀉當即止瀉止之後熱猶不退者宜於初次方中加滑石六錢服之以退其熱仍宜煎湯數盅徐徐溫服至於大熱已退疹已見靨而其餘熱猶盛者宜再治以滋陰清熱解毒之劑而仍少加托表之藥佐之方用玄參八錢沙參花粉各五錢連翹金銀花鮮蘆根各三錢甘草二錢可連服數劑其熱遞減藥劑亦宜隨之遞減逮服至其熱全消停服以上諸方若遇證兼喉痧者宜於方中加射干生蒲黃各三錢惟治大便滑瀉方中不宜加可外用硼砂生寒水石各二錢梅片薄荷冰各一分共研細吹喉中猩紅熱本非危險之證而所以多危險者以其證現白虎湯證時醫者不敢放膽用白虎湯治之也至愚治此證時不但胃腑大實之候可放膽投以大劑白虎湯即當其疹初見點其人表裡壯熱脈象浮洪但問其大便實者恆用生石膏一兩或兩半煎湯送服西藥阿斯匹林二分周身得微汗其疹全發出而熱亦退矣曾治一六七歲幼女病溫半月不愈其脈象數而有力肌膚熱而乾澀其心甚煩躁輾轉床上不能安臥疑其病久陰虧不堪外感之灼熱或其痧疹之毒伏藏未能透出是以其病之現狀若斯問其大便三日未行投以大劑白虎加人參湯以生山藥代粳米又為加連翹二錢蟬蛻一錢煎湯兩盅分數次溫飲下連服二劑大便通下大熱已退心中仍騷擾不安再診其脈已還浮分疑其餘熱可作汗解遂用阿斯匹林一瓦和白糖沖水服之周身得微汗透出白痧若干病遂愈由斯知阿斯匹林原可為透發痧疹之無上妙藥而石膏質重氣輕原亦具透表之性又伍以最善發表之阿斯匹林其涼散之力盡透於外化作汗液而不復留中石膏煮水毫無汁漿是以不復留中是以胃腑之熱未實而亦可用也愚臨證五十年治此證者不知凡幾其始終皆經愚一人治者約皆能為之治愈也天津許姓學生年八歲於庚申仲春出疹初見點兩日即靨家人初未介意遲數日忽又發熱其父原知醫意其疹毒未透自用藥表之不效延他醫治療亦無效延愚診視其脈象細數有力肌膚甚熱問其心中亦甚熱氣息微喘乾咳無痰其咽喉覺疼其外咽喉兩旁各起疙瘩大如桃核之巨者撫之則疼此亦疹毒未透之所致也且視其舌苔已黃大便數日未行知其陽明府熱已實必須清熱與表散之藥並用方能有效遂為疏方鮮茅根半斤切碎生石膏二兩搗細西藥阿斯匹林一瓦半先將茅根石膏水煮四五沸視茅根皆沉水底其湯即成取清湯一大碗分三次溫飲下每飲一次送服阿斯匹林半瓦初次飲後遲兩點鐘再飲第二次若初服後即出汗後二次阿斯匹林宜少用如法將藥服完翌日視之上半身微見紅點熱退強半脈亦較前平和喉疼亦稍輕其大便仍未通下遂將原方茅根改用五兩石膏改用兩半阿斯匹林改用一瓦仍將前二味煎湯分三次送服阿斯匹林服後疹出見多大便通下表裡之熱已退十之八九咽喉之疼又輕惟外邊疙瘩則仍舊愚恐其所出之疹仍如從前之靨急俾每日用鮮茅根四兩以之煮湯當茶外又用金銀花六錢甘草三錢煎湯一大杯分三次溫服每次送梅花點舌丹一丸若在大人可作兩次服每次送服二丸如此四日疙瘩亦消無芥蒂矣按此證脈僅細數有力原非洪大有力似石膏可以少用而方中猶用生石膏二兩及兩半者因與若干之茅根同煮而茅根之渣可以減去石膏之力也再此證若於方中多用羚羊角數錢另煎湯兌藥中服之亦可再將疹表出而其價此時太昂無力之家實辦不到是以愚擬得茅根石膏阿斯匹林並用以代之凡證之宜用羚羊角者可將此三味為方治之也且此三味並用又有勝於但用羚羊角之時也羚羊角解下有治愈之案可參觀論鼠疫之原因及治法附坎離互根湯自鼠疫之證流毒甚烈醫者對於此證未之前聞即治療此證未有專方致患此證者百中難愈二三良可慨也不知此證發生之初原是少陰傷寒中之熱證類至極點始醞釀成毒互相傳染今欲知此證之原因及治法須先明少陰傷寒之熱證嘗讀傷寒論少陰篇所載之證有寒有熱論者多謂寒水之氣直中於少陰則為寒證自三陽傳來則為熱證執斯説也何以陰病兩三日即有用黃連阿膠湯及大承氣湯者蓋寒氣侵人之重者若當時竄入陰為少陰傷寒之寒證其寒氣侵人之輕者伏於三焦脂膜之中不能使人即病而阻塞氣化之流通暗生內熱後因腎臟虛損則伏氣所化之熱即可乘虛而入腎或腎中因虛生熱與伏氣所化之熱相招引伏氣為同氣之求亦易入腎於斯虛熱實熱相助為虐互傷腎陰致腎氣不能上潮於心多生煩躁此少陰病有心中煩躁之理再者心主脈而屬火必得腎水之上濟然後陰陽互根跳動常旺今既腎水不上潮則陰陽之氣不相接續失其互根之妙用其脈之跳動多無力此少陰病無論寒熱其脈皆微細之理人身之精神與人身之氣化原相憑依今因陰陽之氣不相接續則精神失其憑依遂不能振作而昏昏欲睡此少陰病但欲寐之理且腎陰之氣既不能上潮以濡潤上焦則上焦必干而發熱口舌無津肺臟因乾熱而咳嗽咽喉因乾熱而作痛此皆少陰之兼證均見於少陰篇者也內經謂冬傷於寒春必病溫此言伏氣化熱為病也然其病未必入少陰也內經又謂冬不藏精春必病溫此則多系伏氣化熱乘虛入少陰之病因此病較伏氣入他臟而為病者難於辨認且不易治療故於冬傷於寒春必溫病之外特為明辨而重申之也蓋同是伏氣發動竄入少陰為病而有未屆春令先發於冬令者則為少陰傷寒即系少陰傷寒之熱證初得之即宜用涼藥者也其感春陽之萌動而後發及發於夏發於秋者皆可為少陰溫病即溫病之中有鬱熱其脈象轉微細無力者也其病雖異而治法則同也既明乎此試再進而論鼠疫鼠疫之證初起其心莫不煩躁也其脈不但微細恆至數兼遲間有初得脈洪數者乃鼠疫之最輕者其精神頽敗異常閉目昏昏不但欲睡且甚厭人呼喚其口舌不但發乾視其舌上毫無舌苔而舌皮乾亮如鏡其人不但咳嗽咽痛其肺燥之極可至腐爛嘔吐血水奉天人言辛亥年此證垂危時多嘔吐血水由斯而論鼠疫固少陰熱證之至重者也雖其成鼠疫之後釀為毒菌互相傳染變證歧出有為結核性者有為敗血性者而當其起點之初大抵不外上之所述也然此非愚之憑空擬議也試舉一案以徵之一九二一年黑龍江哈爾濱一帶鼠疫盛行奉天防範甚嚴未能傳染入境惟銀行之間互相交通鼠疫之毒菌因之有所傳染有銀行施年三十餘發生肺炎性鼠疫神識時明時憒恆作譫語四肢逆冷心中發熱思食涼物小便短赤大便數日未行其脈沉細而遲心雖發熱而周身肌膚之熱度無異常人且閉目昏昏似睡呼之眼微開此誠傷寒論少陰篇所謂但欲寐之景象也其舌上無苔干亮如鏡喉中亦幹甚且微覺疼時作乾咳此乃因燥生熱腎氣不能上達陰陽不相接續故證象脈象如此其為鼠疫無疑也此證若燥熱至於極點肺葉腐爛咳吐血水則不能治矣猶幸未至其候急用藥調治尚可挽回其治之之法當以潤燥清熱為主又必須助其腎氣使之上達與上焦之陽分相接續而成坎離相濟之實用則脈變洪大始為吉兆爰為疏方於下生石膏三兩搗細知母八錢玄參八錢生懷山藥六錢野臺參五錢甘草三錢共煎湯三茶盅分三次溫飲下按此方即白虎加人參湯以山藥代粳米而又加玄參也方中之意用石膏以清外感之實熱用山藥知母玄參以下滋腎陰上潤肺燥用人參者誠以熱邪下陷於少陰遏抑腎氣不能上達而人參補而兼升之力既能助腎氣上達更能助石膏以逐除下陷之熱邪使之上升外散也且凡陰虛兼有實熱者恆但用白虎湯不能退熱而治以白虎加人參湯始能退熱是人參與石膏並用原能立復真陰於邪熱熾盛之時也將藥三次服完身熱脈起舌上微潤精神亦明瞭惟大便猶未通下內蘊之熱猶未盡清俾即原方再服一劑其大便遂通下餘熱亦遂盡消矣為此證無結核敗血之現象而有肺燥舌乾喉疼之徵故可名之為肺炎性鼠疫也後又治一人其病之狀況大致皆與前證同惟其脈之沉細及咽喉之干疼則較前尤甚仍投以前方俾用鮮白茅根煎湯以之代水煎藥及將藥煎成又調入生雞子黃同服服後效驗異常因名其方為坎離互根湯爰將其方詳細録出以備醫界之採用坎離互根湯生石膏三兩搗細知母八錢玄參八錢野臺參五錢生懷山藥五錢甘草二錢雞子黃三枚鮮茅根四兩切碎先將茅根煎數沸視茅根皆沉水底取其湯以之代水煎方中前六味取湯三盅分三次溫服下每服一次調入生雞子黃一枚此方比前方多雞子黃而又以茅根湯煎藥者因雞子黃生用善滋腎潤肺而茅根稟少陽最初之氣其性涼而上升能發起脈象之沉細也上方乃取傷寒論少陰篇黃連阿膠湯與太陽篇白虎加人參湯之義而合為一方也黃連阿膠湯原黃連黃芩芍藥阿膠雞子黃並用為此時無真阿膠故以玄參代之為方中有石膏知母可以省去黃連黃芩諸藥西人謂雞子黃中含有副腎髓質之分泌素故能大滋腎中真陰實為黃連阿膠湯中之主藥而不以名湯者以其宜生調入而不可煎湯也是以單用此一味而黃連阿膠湯之功用仍在至於白虎加人參湯中去粳米而以生山藥代之以山藥之性既能和胃原方用粳米亦取其和胃又能助玄參雞子黃滋腎也用白虎湯以解伏氣之熱而更加人參者取人參與石膏並用最善生津止渴以解寒溫之燥熱而其補益之力又能入於下焦以助腎氣之上達俾其陰陽之氣相接續其脈之微細者可變為洪大而邪可外透矣繼又服之脈之洪大者漸臻於和平而病即全愈矣咳嗽者加川貝母三錢咽喉疼者加射干三錢嘔吐血水者加三七細末二錢犀角羚羊角細末各一錢三味和勻分三次送服或但用三七亦可其大便不實者宜斟酌緩服若大便滑瀉者非下焦有寒實因小便不利宜服拙擬滋陰清燥湯滑瀉止後再服前方又宜將方中石膏減作二兩生山藥倍作一兩緩緩與服其脈象間有不微細遲緩而近於洪數者此乃鼠疫之最輕者治以此方一服當即速愈總之此證燥熱愈甚則脈愈遲弱身轉不熱若服藥後脈起身熱則病機已向愈矣愚初治此證時曾但用白虎加人參湯以生山藥代粳米治愈後擬得此方奏效尤捷或疑寒溫之證皆不傳染鼠疫既為少陰寒溫證之劇者所成何以獨易傳染不知其傳染之毒菌皆生於病終不愈甚至臟腑潰敗或因陰陽之氣久不接續血脈之流通可至閉塞因閉塞而成腐敗此皆足以釀毒以相傳染也少陰寒溫之未變鼠疫者其劇不至此所以不傳染也至此證之因傳染而成者其毒愈醞釀而愈甚即病不甚劇而亦可傳他人所以此病偶有見端即宜嚴為防範也此證之傳變又分數種後觀哈爾濱斯年報告之病狀實甚復雜今録其原文於下以備參考一九二一年春哈爾濱報告文斯年鼠疫之病狀染後三日至七日為潛伏期先有頭痛眩暈食欲不振倦怠嘔吐等前驅證或有不發前驅證者繼則惡寒戰栗忽發大熱達一以上或稽留或漸次降下淋巴管發生腫脹在發熱前或發熱之一二日內即發腫塊一個有時一側同發兩個如左股腺與左腋窩腺而併發是也該腫塊或化膿或消散殊不一定大部沉嗜眠睡此即少陰證之但欲寐之理夜間每發譫語初期多泄瀉二三次尿含蛋白此傷腎之徵病後一二日肝脾常見肥大輕證三四日體溫下降可愈重證二日至七日多心臟麻痹其脈象細微同於少陰病脈可知此證可分腺腫性敗血性肺炎性百斯篤即鼠疫三種腺腫百斯篤最占多數一處或各處之淋巴管並其周圍組織俱發炎證其鼠溪腺及大腿上三角部之淋巴腺尤易罹之腋窩腺及頭部腺次之又間侵後頭腺肘前後腺耳前後腺膝膕腺等其敗血性百斯篤發大如小豆之斑疼痛頗甚且即變為膿疱或更進而變壞疽性潰瘍又有誘起淋巴腺炎者肺炎性百斯篤之證劇烈殊甚一如加答兒性肺炎或格魯布肺炎咯出之痰中含有百斯篤菌乃最猛惡者也上段述鼠疫之情狀可為詳悉盡致而竟未言及治法想西醫對於此證並無確實之治法也且其謂輕證三四日體溫下降可愈至其重證體溫不下降豈不可用藥使之下降至言重證垂危恆至心臟麻痹推其麻痹之由即愚所謂腎氣不上達於心其陰陽之氣不相接續心臟遂跳動無力致脈象沉遲細弱也此證若當其大熱之初急投以坎離互根湯既能退熱又能升達腎氣其心臟得腎氣之助不至麻痹即不難轉危為安也又其謂大部沉嗜眠睡與愚所經歷者之狀似昏睡皆有少陰病但欲寐之現象亦足徵愚謂此證系伏氣化熱入腎變成者原非無稽之談也特是愚前用之方因在奉天未見傳染之毒所以治法不備後閲山西醫志載有廈門吳錫璜鼠疫消弭及療法一篇其用藥注重解毒實能匡愚所不逮爰詳録之於下以備治斯證者之採取原文疫菌既染危險萬狀大略分為腺鼠疫肺鼠疫二種其為證也先犯心臟使心力衰弱凡脈搏如絲即為疫毒侵犯心臟惟一之確據其次體溫速升頭痛眩暈或作嘔吐漸漸意識朦朧陷於昏睡譫語狀態癡呆行步蹣跚眼結膜強度充血舌帶白色如石灰撒上或汙紫如熟李頸腺腋窩大腿上近陰處起腫脹疼痛劇烈者三日即死其神氣清者可多遷延數日尋常用方有效有不效茲將歷試有效者詳細録出以公諸醫界王孟英治結核法初起用王孟英治結核方合神犀丹多服纍效方用金銀花二兩蒲公英二兩皂刺錢半粉甘草一錢嘔者去甘草加鮮竹茹一兩若無鮮竹茹可以淨青黛三錢代之大便祕熱重者加大黃三錢水煎合神犀丹服如仍不止用藏紅花二錢煎湯送服真熊膽二分即止此方用蒲公英金銀花皂刺合神犀丹不但解毒兼能解血熱散血滯實為治鼠疫結核之聖藥若白泡疔本方去皂刺加白菊花一兩兼黑痘用神犀丹紫金錠間服達樵云病者發頭疼四肢倦怠骨節禁錮或長紅點或發丹疹或嘔或瀉舌乾喉痛間有猝然神昏痰湧竅閉者此係穢毒內閉毒氣攻心宜用芳香闢穢解毒護心之品闢穢驅毒飲主之闢穢驅毒飲西牛黃八分研沖人中黃三錢九節菖蒲五分靛葉錢半忍冬蕊五錢鮮者蒸露亦可野鬱金一錢水煎服如見結核或發斑或生疔加藏紅花八分桃仁三錢熊膽四分送服大渴引飲汗多加犀角金汁神昏譫語宜用至寶丹或安宮牛黃丸開水和服先開內竅此證初起不可即下審其口燥神昏熱熾有下證者先闢穢解毒然後議下每獲效下法用大黃煮湯泡紫雪丹五分良忌早用大苦大寒以致冰閉若脈道阻滯形容慘淡神氣模糊惡核痛甚者宜用解毒活血湯連翹三錢柴胡二錢葛根二錢生地五錢赤芍三錢紅花五錢桃仁八錢川朴一錢後下當歸錢半甘草二錢蘇木二兩輕證初起每三點鐘服一次危證初起兩點鐘服一次或合數劑熬膏連連服之或熱或渴或出汗或吐血加生石膏一兩蘆根汁一杯和藥膏服並多服羚羊角及犀角所磨之汁孕婦加桑寄生一兩黃芩一兩略減桃仁紅花熱甚口燥無津脈象洪數唇焦大渴者用清瘟敗毒飲項腫者俗名蝦蟆瘟用普濟消毒飲二方俱見溫熱經緯多服必效吐紅涎者鮮蘆根取汁和服便祕者加大黃三錢千金方曰惡核病者肉中忽有核纍大如李核小如豆粒皮肉瘮痛壯熱𤺢索惡寒是也與諸瘡根瘰癧結筋相似其瘡根瘰癧因瘡而生似緩無毒惡核病猝然而起有毒若不治入腹煩悶殺人皆由冬受溫風至春夏有暴寒相搏氣結成此毒也觀此論所謂惡核似即系鼠疫之惡核觀其所謂冬受溫風至春夏又感寒而發又似愚所謂伏氣化熱下陷少陰由寒溫而變鼠疫也蓋伏氣化熱之後恆有因薄受外感而後發者由斯知鼠疫之證自唐時已有特無鼠疫之名耳漢皋友人冉雪峰鼠疫問題解決謂水不濟火則為陽燥火不蒸水則又為陰燥火衰不交於水固為陰燥水凝自不與火交亦為陰燥鼠疫之病陰凝成燥燥甚化毒之為病也又謂他證以脈洪數為熱進微弱為熱退此證則以微弱為熱進洪數為熱退皆與愚所論少陰證可變鼠疫其病情脈狀莫不吻合至冉雪峰所著之書詳悉精微無理不徹無法不備洵可為治鼠疫者之金科玉律而拙論中未採用其方者正以全書之方皆宜遵用非僅可採用其一二也欲研究鼠疫之治法者取冉雪峰之書與拙論參觀可也香山友人劉蔚楚治鼠疫結核之劇者曾重用麝香六分作十餘次用解毒活血清火之藥煮湯連連送下而愈冉雪峰治鼠疫方中亦有用所煮湯藥送服麝香以通絡透毒者又可補吳錫璜方中所未備也欒州友人朱鉢文告愚曰余有善消鼠疫結核之方用川大黃五錢甘草五錢生牡蠣六錢搗碎栝蔞仁四十粒搗碎連翹三錢煎湯服之其核必消按此方大黃五錢似近猛烈而與甘草等分並用其猛烈之性已化為緩和矣所以能穩善建功也紹興何廉臣所編全國名醫驗案類編最推重廣東羅氏芝園謂其經驗弘富細心揣摹剖察病情如老吏斷獄羅列治法如名將談兵以活血去瘀之方劃清鼠疫主治界限允推卓識爰為節述其因證方藥俾後學有所取法一探原因城市汙穢必多鬱而成沴其毒先見鄉村汙穢較少鬱而成沴其毒次及故熱毒重蒸鼠先受之人隨感之由毛孔氣管入達於血管所以血壅不行也血已不行漸紅漸腫微痛微熱結核如瘰癧多見於頸脅醃膀大腿之間亦見於手足頭面腹背爾時體雖不安猶可支持病尚淺也由淺而深愈腫愈大邪氣與正氣相搏而熱作矣熱作而見為頭痛身痹熱甚而見為大汗作渴則病已重矣二辨證候鼠疫初起有先惡寒者有不惡寒者既熱之後即不惡寒有先核而後熱者有先熱而後核者有熱核同見者有見核不見熱者有見熱不見核者有汗有不汗者有渴有不渴者皆無不頭痛身痛四肢酸痹其兼見者療瘡癍疹衄嗽咯吐甚則煩躁懊憹昏譫癲狂痞滿腹痛便結旁流舌焦起刺鼻黑如煤目瞑耳聾骨痿足腫舌唇裂裂脈厥體厥種種惡證幾難悉數無非熱毒迫血成瘀所致然其間亦有輕重核小色白不發熱為輕證核小而紅頭微痛身微熱體微酸為稍重證單核紅腫大熱大渴頭痛身痛四肢酸痹為重證或陡見熱渴痛痹四證或初惡寒旋見四證未見結核及舌黑起刺循衣摸床手足擺舞脈厥體厥與疫證盛時忽手足抽搐不省人事面身紅赤不見結核感毒最盛壞人至速皆至危證三論治法方藥古方如普濟消毒飲銀翹敗毒散近方如銀翹散代賑普濟散等雖皆能清熱解毒而無活血去瘀之藥用之多不效惟王清任活血解毒湯桃仁八錢去皮尖打紅花五錢當歸錢半川朴一錢柴胡一錢連翹三錢赤芍三錢生地五錢葛根一錢生甘草一錢方以桃仁為君而輔以當歸去瘀而通壅連芍為臣而兼以地清熱而解毒朴甘為佐使疏氣而和藥氣行則血通柴葛以解肌退熱而拒邪邪除則病愈惟其對證用藥故能投無不效蓋此證熱毒本也瘀血標也而標實與本同重故標本未甚者原方可愈標本已甚者傳表宜加白虎傳裡宜加承氣毒甚宜加羚犀如連進後汗出熱清可減除柴葛毒下瘀少可減輕桃紅其他當隨證加減輕證照原方一服稍重證日夜二服加金銀花竹葉各二錢如口渴微汗加石膏五錢知母三錢重證危證至危證於初起惡寒照原方服柴胡葛根各加一錢若見大熱初加金銀花竹葉各三錢西藏紅花一錢危證錢半或加紫草三錢蘇木三錢疔瘡加紫花地丁三錢洋菊葉汁一杯沖小便不利加車前子三錢痰多加川貝母三錢生萊蔔汁兩杯沖若痰壅神昏又非前藥可治當加鮮石菖蒲汁一瓢沖鮮竹瀝兩瓢沖或礞石滾痰丸三錢包煎若見癲狂雙劑合服加重白虎並竹葉心羚角犀角西藏紅花各三錢血從上逆見衄咯等證加犀角丹皮各三錢鮮茅根鮮蘆根各四兩見癍加石膏一兩知母五錢元參二錢犀角二錢見疹加金銀花牛蒡子各三錢竹葉大青葉丹皮各二錢老弱幼小急進只用單劑日夜惟二服加石膏大黃減半所加各藥小兒皆宜減半五六歲一劑同煎分二次服重危之證一劑作一服幼小不能服藥用針刺結核三四刺以如意油調經驗塗核散山慈菰三錢真青黛一錢生黃柏錢半浙貝錢半赤小豆二錢共研細末日夜頻塗十餘次可愈婦女同治惟孕婦加黃芩桑寄生各三錢以安胎初起即宜急服熱甚尤宜急進熱久胎必墜若疑桃仁紅花墜胎可改用紫草紫背天葵各三錢惟宜下者除芒硝以上諸法俱從屢次試驗得來證以強壯者為多故於人屬強壯毒盛熱旺每於重危之證必加羚角犀角西藏紅花取其見效較捷耳無如人情多儉富者聞而退縮貧者更可知矣茲為推廣分別熱盛毒盛兩途隨證加藥亦足以治病如初系熱盛之證加石膏知母淡竹葉或螺靨菜或名雷公根龍膽草白茅根之類便可清熱如兼有毒盛之證加金銀花牛蒡子人中黃之類便可以解毒若熱毒入心包羚角犀角藏紅花雖屬緊要然加生竹葉心生燈心黃芩梔子麥冬心蓮子心元參心之類便可除心包之熱毒若熱毒入里加大黃朴硝枳殼以瀉之便可去腸胃之熱毒平潭友人李健頤著有鼠疫新篇一書蒙贈一册論鼠疫之病謂繫有一種黑蟻傳染於鼠再傳於人其中所載之醫案治法莫不精良而遇此證之熱甚者恆放膽重用生石膏有一劑而用至八兩者有治愈一證而用至二斤強者可為有膽有識爰録其治愈之案一則以為治斯病者之標準平潭蔡年五十八歲初起惡寒旋即發熱熱甚口渴手足痹疼胯下贅生一核熱痛非常胸脹嘔血目赤神昏脈數苔黃因其先觸睹死鼠毛竅大開毒氣傳入血管潛伏體內復因外感春陽之氣而為引線是以胃熱則嘔逆肺傷則噴血熱深內竄肺絡肺與心近影響阻礙心不守舍故昏迷譫語此證涉危篤急宜清胃瀉肺攻毒解熱重劑急進庶能挽救方擬用加減解毒活血湯加石膏蘆根荊芥穗三錢連翹三錢金銀花五錢浙貝母三錢生地黃五錢赤芍藥三錢桃仁五錢川紅花三錢紫草三錢生石膏二兩搗細鮮蘆根一兩雄黃精一錢冰片五分將前十一味煎湯兩盅分兩次溫服後二味共研細末分兩次用湯藥送服將藥連服二劑嘔平血止熱退胸舒將原方減雄黃加錦紋大黃五錢以瀉胃中餘毒服兩劑諸恙悉解論女子癥瘕治法附化瘀通經散女子癥瘕多因産後惡露未淨凝結於衝任之中而流走之新血又日凝滯其上以附益之遂漸積而為癥瘕矣癥者有實可徵在一處不移瘕者猶可移動按之或有或無若有所假託由斯而論癥固甚於瘕矣此證若在數月以里其身體猶強壯所結之癥瘕猶未甚堅可用金匱下瘀血湯下之然必如金匱所載服法先製為丸再煎為湯連渣服之方效若其病已逾年或至數年癥瘕積將滿腹硬如鐵石月信閉塞飲食減少浸成癆瘵病勢至此再投以下瘀血湯必不能任受即能任受亦不能將瘀血通下惟治以拙擬理沖湯補破之藥並用其身形弱者服之更可轉弱為強即十餘年久積之癥瘕硬如鐵石久久服之亦可徐徐盡消本方後附載有治愈之案若干可參觀也近在津門用其方因證加減治愈癥瘕數人爰録一案於下以為治斯病之粗規天津張氏婦年近四旬自言五年之前因産後惡露未淨積為硬塊其大如橘積久漸大初在臍下今則過臍已三四寸矣其後積而漸大者按之猶軟其初積之塊則硬如鐵石且覺其處甚涼初猶不疼自今年來漸覺疼痛從前服藥若干分毫無效轉致飲食減少身體軟弱不知還可治否言之似甚懼者愚曰此勿憂保必愈因問其月信猶通否言從前猶按月通行今雖些許通行已不按月且其來浸少今已兩月未見矣診其脈澀而無力兩尺尤弱爰為疏方生黃耆四錢黨參白朮當歸生山藥三稜莪朮生雞內金各三錢桃仁紅花生水蛭各二錢蟅蟲五個小茴香錢半煎湯一大盅溫服將藥連服四劑腹已不疼病處已不覺涼飲食加多脈亦略有起色遂即原方去小茴香又服五劑病雖未消而周遭已漸軟惟上焦覺微熱因於方中加玄參三錢樗雞八枚又連服十餘劑其癥瘕全消然癥瘕不必盡屬瘀血也大抵瘀血結為癥瘕者其人必礙生育月信恆閉若其人不礙生育月信亦屢見者其癥瘕多系冷積其身形壯實者可用炒熟牽牛頭次所軋之末三錢下之所下之積恆為半透明白色狀若緑豆粉所熬之糊若其身形稍弱者亦可用黃耆人參諸補氣之藥煎湯送服牽牛末若畏服此峻攻之藥者亦可徐服丸藥化之方用胡椒白礬各二兩再用炒熟麥面和之為丸桐子大每服錢半日兩次服至月餘其癥瘕自消若其處覺涼者多服溫暖宣通之藥其積亦可下曾治張氏婦寒積重用附子一案詳附子解後可參閲無論血瘀冷積日服真鹿角膠四五錢分兩次燉化服之日久亦可徐消蓋鹿角膠原能入衝任以通血脈又能入督脈以助元陽是以無論瘀血冷積皆能徐為消化也近又擬一消癥瘕兼通經閉方用炒白朮天冬生雞內金等分為細末以治癥瘕堅結及月事不通每服三錢開水送下日再服若用山楂片三錢煎湯沖化紅蔗糖三錢以之送藥更佳因用之屢有效驗爰名為化瘀通經散雞內金原饒有化瘀之力能化瘀當即善消癥瘕然向未嘗單用之以奏效也因所擬理沖湯中原有生雞內金三錢方後注云若虛弱者宜去三稜莪朮將雞內金改用四錢雞內金之消癥瘕誠不讓三稜莪朮矣夫能消癥瘕即能通月信此原一定之理然未經臨證實驗不敢但憑理想確定也後來津治楊氏女因患瘰癧過服寒涼開散之藥傷其脾胃以致食後脹滿不能消化重用溫補脾胃之劑加生雞內金二錢以運化藥力後服數劑來更方言病甚見愈惟初服此藥之夜經即通下隔前經期未旬日耳因其病已見愈聞此言未嘗注意更方中仍有生雞內金二錢又服數劑來求更方言病已全愈惟一月之內行經三次後二次在服藥之後所來甚少仍乞再為調治愚恍悟此誠因用雞內金之故由此可確知雞內金通經之力因憶在奉時曾治宋氏女胃有瘀積作疼方中重用生雞內金服數劑後二便下血而愈此固見雞內金消瘀之力實並見雞內金通經之力也總前後數案參觀雞內金消瘀通經之力洵兼擅其長矣此方中伍以白朮者恐脾胃虛弱不任雞內金之開通也更輔以天冬者恐陰虛有熱不受白朮之溫燥也然雞內金必須生用方有效驗若炒熟用之則無效矣論用藥以勝病為主不拘分量之多少嘗思用藥所以除病所服之藥病當之非人當之也惟用藥不對病者則人當之而有害矣乃有所用之藥本可除病而往往服之不效間有激動其病愈加重者此無他藥不勝病故也病足以當其藥而綽有餘力藥何以能除病乎愚感於醫界多有此弊略舉前賢之醫案數則時賢之醫案數則及拙治之醫案數則以貢諸醫界同人明李士材治魯藩陽極似陰證時方盛暑寢門重閉密設氈帷身復貂被而猶呼冷士材往視之曰此熱證也古有冷水灌頂法今姑通變用之乃以生石膏三斤煎湯三碗作三次服一服去貂被再服去氈帷服至三次體蒸流汗遂呼進粥病若失矣清道光間歸安江涵暾著筆花醫鏡內載治一時疫發斑案共用生石膏十四斤其斑始透吳鞠通治何姓叟手足拘攣誤服桂附人參熟地等補陽以致面赤脈洪數小便閉身重不能轉側手不能上至鬢足蜷曲絲毫不能移動每劑藥中重用生石膏半斤日進一劑服至三月後始收全功又治蠱脹無汗脈象沉弦而細投以金匱麻黃附子甘草湯行太陽之陽即以瀉厥陰之陰麻黃去節重用二兩熟附子兩六錢炙甘草二錢煎湯五飯碗先服半碗得汗至眉二次汗至眼約每次其汗下出寸許每次服藥後即啜鯉魚熱湯以助其汗一晝夜飲完藥二劑鯉魚湯飲一鍋汗出至膝上未能過膝臍以上腫盡消其腹仍大小便不利改用五苓散初服不效將方中肉桂改用新鮮紫油安邊青花桂四錢又加遼人參三錢服後小便大通腹脹遂消山東海豐清咸豐時有楊氏少婦得奇疾脊背腫熱赤身臥帳中若有一縷著身即熱不能支適有宜興蘇先生乘海船赴北闈經過其處其人精醫術延為診視斷為陽毒俾用大黃十斤煎湯十斤放量陸續飲之盡劑而愈蕭琢如著遁園醫案其案中最善用傷寒論金匱諸方載有治其從妹腹中寒涼作疼脈象沉遲而弦緊每劑中重用烏附子二兩連服附子近二十斤其病始愈又治余某妻左邊少腹內有塊常結不散痛時則塊膨脹如拳手足痹軟遍身冷汗不省人事脈象沉緊舌苔白厚而濕滑面色暗晦與通脈四逆湯烏附子八錢漸增至四兩煎湯一大碗分數次飲下內塊遞減證亦皆見輕病人以為藥既對證遂放膽煎好一劑頓服下頃之面熱如醉手足拘攣舌尖麻已而嘔吐汗出其病脫然全愈劉蔚楚著遇安齋證治叢録其中用大劑治愈險證尤多如其治極重鼠疫用白虎湯生石膏一劑漸加至斤余治産後溫熱用白虎加人參湯一劑中用生石膏半斤連服十餘劑始愈治陽虛汗脫用朮附湯每劑術用四兩漸加至一斤天雄用二兩漸加至半斤如此膽識俱臻極頂洵堪為挽回重病者之不二法程也至於愚生平用大劑挽回重證之案甚多其已載於醫方篇中茲不復贅惟即從前未登出者略録數則以質諸醫界同人奉天王姓婦受妊惡阻嘔吐半月勺水不存無論何藥下咽即吐出勢極危險爰用自制半夏二兩自制者中無礬味善止嘔吐生赭石細末半斤生懷山藥兩半共煎湯八百瓦藥瓶一瓶約二十兩強或涼飲溫飲隨病人所欲徐徐飲下二日盡劑而愈夫半夏赭石皆為妊婦禁藥而愚如此放膽用之毫無顧忌者即內經所謂有故無殞亦無殞也然此中仍另有妙理詳參赭鎮氣湯下可參觀西安縣張腿疼其人身體強壯三十未娶兩腿腫疼脛骨處尤甚服熱藥則加劇服涼藥則平平醫治年餘無效其脈象洪實右脈尤甚其疼腫之處皆發熱斷為相火熾盛小便必稍有不利因致濕熱相併下注宜投以清熱利濕之劑初用生石膏二兩連翹茅根各三錢煎湯服後漸加至石膏半斤連翹茅根仍舊日服兩劑其第二劑石膏減半如此月餘共計用生石膏十七斤疼與腫皆大輕減其飲食如常大便日行一次分毫未覺寒涼囑其仍服原方再十餘劑當脫然全愈矣奉天劉某因常受鍋爐之炙熱陰血暗耗臟腑經絡之間皆蘊有熱性至仲春又薄受外感其熱陡發表裡俱覺壯熱醫者治以滋陰清熱之藥十餘劑分毫無效其脈搏近六至右部甚實大便兩三日一行知其陽明府熱甚熾又兼陰分虛損也投以大劑白虎加人參湯生石膏用四兩人參用六錢以生山藥代方中粳米又加玄參天冬各一兩煎湯一大碗分三次溫飲下日進一劑乃服後其熱稍退藥力歇後仍如故後將石膏漸加至半斤一日連進二劑如此三日熱退十之八九其大便日下一次遂改用清涼滋陰之劑數日全愈共計所用生石膏已八斤強矣愚在籍時曾治一壯年癲狂失心六脈皆閉重按亦分毫不見於以知頑痰能閉脈投以大承氣湯加赭石二兩煎湯送服甘遂細末三錢此方名蕩痰加甘遂湯以治癲狂之重者若去甘遂名蕩痰湯以治癲狂之輕者二方救人多矣服後大便未行隔數日凡有甘遂之藥不可連日服之連服必作嘔吐將藥劑加重大黃赭石各用三兩仍送服甘遂三錢大便仍無行動遂改用巴豆霜五分單用赭石細末四兩煎湯送下間三日一服巴豆亦不可連服若連服則腸胃腐爛矣每服後大便行數次雜以成塊之痰若干服至兩次其脈即出至五次痰淨其癲狂遂愈復改用清火化瘀之藥服數劑以善其後論治疔宜重用大黃附大黃掃毒湯瘡瘍以疔毒為最緊要因其毒發於臟腑非僅在於經絡其脈多見沉緊緊者毒也緊在沉部其毒在內可知也至其重者發於鳩尾穴處名為半日疔言半日之間即有關於人性命也若系此種疔毒當於未發現之前其人或心中怔忡或鳩尾處隱隱作疼或其處若發炎熱似有漫腫形迹其脈象見沉緊者即宜預防鳩尾穴處生疔而投以大劑解毒清血之品其大便實者用大黃雜於解毒藥中下之其疔即可暗消於無形此等疔毒若待其發出始為療治恆有不及治者矣至若他處生疔原不必如此預防而用他藥治之不效者亦宜重用大黃降下其毒憶愚少時見同里患疔者二人一起於腦後二日死一起於手三里穴三日死彼時愚已為人疏方治病而聲名未孚於鄉里病家以為年少無閲歷不相延也後愚堂侄女於口角生疔疼痛異常心中忙亂投以清熱解毒藥不效脈象沉緊大便三日未行恍悟寒溫之證若脈象沉洪者可用藥下之以其熱在裡也今脈象沉緊夫緊為有毒非若傷寒之緊脈為寒也緊而且沉其毒在裡可知律以寒溫脈之沉洪者可下其熱則疔毒脈之沉緊者當亦可下其毒也況其大便三日未行乎遂為疏方大黃天花粉各一兩皂刺四錢穿山甲乳香沒藥皆不去油各三錢薄荷葉一錢全蜈蚣三大條煎服一劑大便通下疼減心安遂去大黃又服一劑全愈方用大黃通其大便不必其大便多日未行凡脈象沉緊其大便不滑瀉者皆可用若身體弱者大黃可以斟酌少用愚用此方救人多矣因用之屢建奇效遂名之為大黃掃毒湯友人朱鉢文傳一治疔方大黃甘草各一兩生牡蠣六錢栝蔞仁四十粒搗碎疔在上者川芎三錢作引在兩臂者桂枝尖三錢作引在下者懷牛膝三錢作引煎服立愈身壯實者大黃可斟酌多用此亦重用大黃是以奏效甚捷也答陳疑內經十二經有名無質一節中有刺疔法宜參觀四醫話臨症隨筆鹽山範年五十餘素有肺癆發時咳嗽連連微兼喘促仲夏末旬喘發甚劇咳嗽晝夜不止且嘔血甚多延醫服藥十餘日咳嗽嘔血似更加劇憊莫能支適愚自滄回籍求為診治其脈象洪而微數右部又實而有力視其舌苔白厚欲黃問其心中甚熱大便二三日一行診畢斷曰此溫病之熱盤據陽明之府逼迫胃氣上逆因並肺氣上逆所以咳喘連連且屢次嘔血也治病宜清其源若將溫病之熱治愈則咳喘嘔血不治自愈矣其家人謂從前原不覺有外感即屢次延醫服藥亦未嘗言有外感何以先生獨謂系溫病乎答曰此病脈象洪實舌苔之白厚欲黃及心中之發熱皆為溫病之顯徵其初不覺有外感者因此乃伏氣化熱而為溫病其受病之原因在冬令被寒伏於三焦脂膜之中因春令陽盛化熱而發動竄入各臟腑為溫病亦有遲至夏秋而發者其症不必有新受之外感亦間有薄受外感不覺而伏氣即因之發動者內經所謂冬傷於寒春必病溫者此也遂為疏方生地二兩生石膏一兩知母八錢甘草一錢廣犀角三錢另煎兌服三七二錢細末用水送服煎湯兩茶盅分三次溫飲下一劑而諸病皆愈又改用玄參貝母知母花粉甘草白芍諸藥煎湯服另用水送服三七末錢許服兩劑後俾用生山藥末煮粥少加白糖每次送服赭石細末錢許以治其從前之肺癆若覺熱時則用鮮白茅根四五兩切碎煮兩三沸當茶飲之如此調養月餘肺癆亦大見愈按吐血之症原忌驟用涼藥恐其離經之血得涼而凝變為血痹虛勞也而此症因有溫病之壯熱不得不用涼藥以清之而有三七之善化瘀血者以輔之所以服之而有益無弊也鹽山王年近六旬自孟夏患痢延醫服藥五十餘劑痢已愈而病轉加劇臥床昏昏有危在旦夕之虞此際適愚自滄回籍求為診治其脈左右皆洪實一息五至表裡俱覺發熱脅下連腹疼痛異常其舌苔白厚中心微黃大便二三日一行愚曰此伏氣化熱而為溫病也當其伏氣化熱之初腸為熱迫醞釀成痢與溫俱來然溫為正病痢為兼病醫者但知治其兼病而不知治其正病痢雖愈而溫益重綿延六十餘日病者何以堪乎其家人曰先生之論誠然特是既為溫病腹脅若是疼痛者何也將勿腹中有鬱積乎答曰從前云大便兩三日一行未必腹有鬱積以脈言之凡溫病之壯熱大抵現於右脈因壯熱原屬陽明胃府之脈診於右關也今左部之脈亦見洪實肝膽之火必熾盛而肝木之氣即乘火之熾盛而施其橫恣此腹脅所以作疼也遂為開大劑白虎加人參湯方用生石膏四兩人參六錢以滋陰分為其腹脅疼痛遵傷寒方例加生杭芍六錢更加川楝子六錢疏通肝膽之鬱熱下行以輔芍藥之不逮令煎湯三茶盅分三次溫飲下降下黏滯之物若干持其便盆者覺熱透盆外其病頓愈可以進食隔二日腹脅又微覺疼俾用元明粉四錢淨蜜兩半開水調服又降下黏滯之物若干病自此全愈愚孫年九歲於正月下旬感冒風寒兩三日間表裡俱覺發熱診其脈象洪實舌苔白厚問其大便兩日未行小便色黃知其外感之實熱已入陽明之府為疏方生石膏二兩知母六錢連殼三錢薄荷葉錢半甘草二錢晚六點時煎湯兩茶盅分兩次服下翌晨熱退強半因有事他出臨行囑煎渣與服閲四日來信言仍不愈按原方又服一劑亦不見輕斯時頭面皆腫愚遂進城往視見其頭面腫甚劇脈象之熱較前又盛舌苔中心已黃大便三日未行為疏方生石膏四兩玄參一兩連殼三錢銀花三錢甘草三錢煎湯三茶盅又將西藥阿斯匹林三分融化湯中分三次溫服下頭面周身微汗熱退腫消繼服清火養陰之劑兩劑以善其後又鄰村李姓少年亦同時得大頭瘟症醫治旬日病益劇亦求愚治其頭面連項皆腫心中煩躁不能飲食其脈象雖有熱而重按無力蓋其舊有鴉片嗜好下元素虛且大便不實不敢投以大涼之劑為疏方玄參一兩花粉五錢銀花五錢薄荷錢半甘草錢半煎湯一大盅送服阿斯匹林二分頭面周身皆出汗病遂脫然全愈鄰村孫年三十許自初夏得喘症動則作喘即安居呼吸亦似迫促服藥五十餘劑不愈醫者以為已成肺癆諉為不治聞愚回籍求為診治其脈浮而滑右寸關尤甚知其風與痰互相膠漆滯塞肺竅也為開麻杏甘石湯麻黃三錢杏仁三錢生石膏一兩甘草錢半煎湯送服苦葶藶子炒熟二錢一劑而喘定繼又服利痰潤肺少加表散之劑數服全愈鄰村刁年二十餘自孟冬得喘症遷延百餘日喘益加劇屢次延醫服藥分毫無效其脈浮而無力數近六至知其肺為風襲故作喘病久陰虛肝腎不能納氣故其喘浸劇也即其脈而論此時肺中之風邪猶然存在欲以散風之藥祛之又恐脈數陰虛益耗其陰分於是用麻黃三錢而佐以生山藥二兩臨睡時煎服夜間得微汗喘愈強半為脈象虛數不敢連用發表之劑俾繼用生山藥末八錢煮粥少調白糖當點心用日兩次若服之覺悶可用粥送服雞內金末五分如此服藥約半月喘又見輕再診其脈不若從前之數仍投以從前湯藥方又得微汗喘又稍輕又服山藥粥月餘全愈滄縣王媼年七旬有一於仲冬脅下作疼噁心嘔吐大便燥結服藥月餘更醫十餘人病浸加劇及愚診視時不食者已六七日大便不行者已二十餘日其脈數五至余弦而有力左右皆然舌苔滿布起芒刺色微黃其心中時覺發熱偶或作渴仍非燥渴脅下時時作疼聞食味則欲嘔吐所以不能進食小便赤澀短少此傷寒之熱已至陽明之府胃與大腸皆實原是承氣湯症特其脈雖有力然自弦硬中見其有力非自洪滑中見其有力此陰虛火實之脈且數近六至又年過七旬似不堪承氣之推蕩而愚有變通之法加藥數味於白虎湯中則嘔吐與脅疼皆止大便亦可通下矣病家聞之疑而問曰先生之論誠善然從前醫者皆未言有外感且此病初起亦未有頭疼惡寒外徵何以竟成傷寒傳府之重症答曰此乃伏氣為病也大約此外感受於秋冬之交因所受甚輕所以不覺有外感亦未能即病而其所受之邪伏於膜原之間阻塞氣化暗生內熱遂浸養成今日之病觀此舌苔微黃且有芒刺豈非有外感之顯徵乎遂為疏方生石膏兩半生山藥一兩知母五錢赭石五錢川楝子五錢生杭芍四錢甘草二錢煎湯兩盅分三次溫服下因其脅疼甚劇肝木不和但理以芍藥川楝仍恐不能奏效又俾用羚羊角一錢另煎湯當茶飲之以平肝瀉熱當日將藥服完次晨復診脈象已平舌上芒刺已無舌苔變白色已退強半脅疼亦大見愈略思飲食食稀粥一中碗亦未嘔吐惟大便仍未通下疏方再用天冬玄參沙參赭石各五錢甘草二錢西藥硫酸鎂二錢沖服煎服後大便遂通下諸病皆愈為其年高病久又俾服滋補之藥數劑以善其後此症之脈第一方原當服白虎加人參湯為其脅下作疼所以不敢加人參而權用生山藥一兩以代白虎湯中之粳米其養陰固氣之力又可以少代人參也又赭石重墜下行似不宜與石膏並用以其能迫石膏寒涼之力下侵也而此症因大腸甚實故並用無妨且不僅以之通燥結亦以之鎮嘔逆也滄縣李氏婦年近三旬月事五月未行目脹頭疼甚劇診其脈近五至左右皆有力而左脈又弦硬而長心中時覺發熱周身亦有熱時知其腦部充血過度是以目脹頭疼也蓋月事不行由於血室而血室為腎之副臟實借肝氣之疏瀉以為流通方書所謂肝行腎之氣也今因月事久瘀肝氣不能由下疏瀉而專於上行矧因心肝積有內熱氣火相併迫心中上輸之血液迅速過甚腦中遂受充血之病惟重用牛膝佐以涼瀉之品化血室之瘀血以下應月事此一舉兩得之法也遂為疏方懷牛膝一兩生杭芍六錢玄參六錢龍膽草二錢丹皮二錢生桃仁二錢紅花二錢一劑目脹頭疼皆愈強半心身之熱已輕減又按其方略為加減連服數劑諸病皆愈月事亦通下天津李氏婦年過四旬患痢三年不愈即稍愈旋又反復其痢或赤或白或赤白參半且痢而兼瀉其脈遲而無力平素所服之藥宜熱不宜涼其病偏於涼可知俾先用生山藥細末日日煮粥服之又每日嚼服蒸熟龍眼肉兩許如此旬日其瀉已愈痢已見輕又俾於服山藥粥時送服生硫黃細末三分日兩次又兼用木賊一錢淬水當茶飲之如此旬日其痢亦愈奉天呂姓童子年五歲於季夏初旬周身發熱至下午三句鍾時忽又發涼須臾涼已其熱愈烈此溫而兼瘧也東醫治以金雞納霜數日病不少減蓋彼但知治其間歇熱不知治其溫熱其溫熱不愈間歇熱亦不愈及愚視之羸弱已甚飲水服藥輒嘔吐大便數日未行脈非洪大而重按有力知其陽明之熱已實其嘔吐者陽明兼少陽也為兼少陽所以有瘧疾為擬方生石膏三兩生赭石六錢生山藥六錢碎竹茹三錢甘草三錢煎湯一盅半分三次溫飲下將藥飲完未吐一劑大熱已退大便亦通至翌日復作寒熱然較輕矣投以硫酸規泥涅二分強分三次用白糖水送下寒熱亦愈奉天馬姓幼女於午節前得溫病醫治旬日病益增劇周身灼熱精神恍惚煩躁不安形勢危殆其脈確有實熱而至數嫌其過數蓋因久經外感灼熱而陰分虧損也遂用生石膏兩半生山藥一兩單用此二味取其易服煮濃汁兩茶盅徐徐與之連盡兩劑灼熱已退從前兩日未大便至此大便亦通而仍有煩躁不安之意遂用阿斯匹林二分同白糖錢許開水沖化服之周身微汗透出白痧滿身而愈或問外感之症在表者當解其表由表而傳裡者當清其里今此症先清其里後復解其表者何也答曰子所論者治傷寒則然也而溫病恆表裡毗連因此表裡之界線不清其症有當日得之者有表未罷而即傳於裡者有傳裡多日而表症仍未罷者究其所以然之故多因此症內有伏氣又薄受外感伏氣因感而發一則自內而外一則自外而內以致表裡混淆後世治溫者恆不以六經立論而以三焦立論彼亦非盡無見也是以愚對於此症有重在解表而兼用清裡之藥者有重在清裡而兼用解表之藥者有其症似猶可解表因脈數煩躁遂變通其方先清其里而後解其表者如此則服藥不至瞑眩而其病亦易愈也下列所治之案蓋準此義試觀解表於清裡之後而白痧又可表出是知臨症者原可變通因心不必拘於一端也病者劉年二十五歲寄居天津病名臟腑瘀血病候其先偶患大便下血甚劇西醫於靜脈管中注射以流動麥角膏其血立止而血止之後已月餘矣仍不能起床但覺周身痠軟無力飲食不能恢復原量僅如從前之半大小便亦照常而惟覺便時不順利其脈搏至數如常芤而無力重按甚澀左右兩部皆然診斷此因下血之時血不歸經行血之道路紊亂遽用藥止之則離經之血瘀於臟腑經絡之間蓋麥角止血之力甚大愚嘗嚼服其小者一枚陡覺下部會陰穴處有抽掣之力其最能收閉血管可知此症因其血管收閉之後其瘀血留滯於臟腑之間阻塞氣化之流行致瘀不去而新不生是以周身痠軟無力飲食減少不能起床也此症若不急治其周身氣化阻塞日久必生灼熱灼熱久之必生咳嗽或成肺病或成癆瘵即難為調治矣今幸為日未久灼熱咳嗽未作則調治固易易也療法當以化其瘀血為目的將瘀血化盡身中氣化還其流通之常其飲食必然增加身體自能復原矣處方旱三七細末三錢為一日之量分兩次服空心時開水送下效果服藥數次後自大便下瘀血若干其色紫黑後每大便時必有瘀血若干至第五日下血漸少第七日便時不見瘀血矣遂停服藥後未旬日身體即健康如初矣病者王年四十九歲病名溫病兼泄瀉病因丙寅仲春來津其人素吸鴉片立志蠲除因致身弱於仲夏晚間乘涼稍過遂得溫病且兼泄瀉病候表裡俱壯熱舌苔邊黃中黑甚干精神昏憒時作譫語小便短澀大便一日夜四五次帶有黏滯其臭異常且含有灼熱之氣其脈左右皆洪長重診欠實至數略數兩呼吸間可九至診斷此純系溫病之熱陽明與少陽合病也為其病在陽明故脈象洪長為其兼入少陽故小便短少致水歸大便而滑瀉為其身形素弱故脈中雖挾有外感之實熱而仍重按不實也療法當瀉熱兼補其正又大劑徐徐服之方與滑瀉無礙也處方生石膏三兩細末生山藥一兩大生地兩半生杭芍八錢甘草三錢野臺參五錢煎湯三大盅徐徐溫飲下一次只飲一大口時為早六點鐘限至晚八點時服完此方即白虎加人參湯以生山藥代粳米以生地代知母而又加白芍也以白虎湯清陽明之熱為其脈不實故加人參為其滑瀉故以生山藥代粳米生地代知母為其少陽之府有熱致小便不利而滑瀉所以又加白芍以清少陽之熱即以利小便也效果所備之藥如法服完翌晨精神頓爽大熱已退滑瀉亦見愈脈象已近平和因瀉仍不止又為疏方用生山藥一兩滑石一兩生杭芍五錢玄參五錢甘草三錢此即拙擬之滋陰清燥湯加玄參也一劑瀉止脈靜身涼脫然全愈病者胡之幼子年三歲病名間歇熱病因先因失乳飲食失調泄瀉月餘甫愈身體虛弱後又薄受外感遂成間歇熱病候或晝或夜發灼無定時熱近兩點鐘微似有汗其熱始解如此循環不已體益虛弱診斷此乃內傷外感相併而為間歇熱蓋外感之症在少陽可生間歇熱內傷之病在厥陰亦生間歇熱肝虛者恆寒熱往來療法證雖兼內傷外感原宜內傷外感並治為治外感用西藥取孺子易服治內傷用中藥先後分途施治方為穩妥處方安知歇貌林一瓦為一日之量分作三次開水化服將此藥服完後其灼必減輕繼用生地八錢煎湯一茶杯分多次徐徐溫飲下灼熱當全愈但用生地者取其味甘易服也效果先將安知歇貌林服下每服一次周身皆微有涼汗其灼熱果見輕減翌日又將生地煎湯如法服完病即霍然愈矣蓋生地雖非補肝虛正藥而能滋腎水以生肝更能涼潤肝血則肝得其養其肝之虛者自然轉虛為強矣病者盧姓鹽山人病因孟秋天氣猶熱開窗夜寢受風初似覺涼翌日即大熱成溫病病候初次延醫服藥竟投以麻桂乾薑細辛大熱之劑服後心如火焚知誤服藥以箸探喉不能吐熱極在床上亂滾症甚危急急來迎愚及至言才飲涼水若干病熱稍愈然猶呻吟連聲不能安臥診其脈近七至洪大無倫右部尤甚舌苔黃厚大便三日未行診斷此乃陽明胃府之熱已實又誤服大熱之劑何異火上添油若不急用藥解救有危在目前之虞幸所攜藥囊中有自制離中丹系用生石膏一兩硃砂二分製成先與以五錢俾用溫開水送下過半點鐘心中之熱少解可以安臥俾再用五錢送服須臾呻吟亦止再診其脈較前和平此時可容取藥宜再治以湯劑以期全愈處方生石膏三兩知母一兩生山藥六錢玄參一兩甘草三錢煎湯三盅分三次溫飲下效果當日將藥服完翌日則脈靜身涼大便亦通下矣奉天宮某年三十餘胸中滿悶常作厄逆連連不止調治數年病轉加劇其脈洪滑有力關前尤甚知其心火熾盛熱痰凝郁上焦也遂用朴硝四兩白礬一兩摻炒熟麥面四兩煉蜜為丸三錢重每服一丸日兩次服盡一料全愈蓋朴硝味原鹹寒稟寒水之氣水能勝火寒能治熱為治心有實熱者之要品內經所謂熱淫於內治以鹹寒也用白礬者助朴硝以消熱痰也調以炒熟麥面者誠以麥為心谷以防朴硝白礬之過瀉傷心且炒之則氣香歸脾又能防硝礬之不宜於脾胃也診余隨筆西人謂膽汁滲入十二指腸能助小腸消化食物此理內經未嘗言之似為中醫疏忽之處不知後世名醫曾言之矣吳鞠通醫醫病書曰膽無出路借小腸以為出路此非謂膽汁能入小腸乎至於膽汁能化食之説中醫書中亦早寓其理神農本草經之論柴胡也謂能去腸胃中結氣飲食積聚寒熱邪氣推陳致新夫柴胡為少陽膽經之主藥而其功效多見於腸胃者為其善理肝膽使膽汁流通無滯自能入於腸中消化食物積聚以成推陳致新之功也至於徐靈胎注神農本草經則以木能疏土解之是謂肝膽屬木脾胃屬土徐氏既云木能疏土是明謂肝膽能助腸胃化食而膽汁能助小腸化食之理即在其中矣或問太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯夫既曰無陽何以復用石膏既曰不可發汗何以復用麻黃答曰人之血分屬陰氣分屬陽無陽從脈微弱看出是言其氣分不足也蓋證既熱多寒少其脈原當有力若脈果有力時可直投以越婢湯矣或麻杏甘石湯今因其氣分虛而脈象微弱故用桂枝助其脈凡脈之微弱者服桂枝則脈大以托肌肉中外感之邪外出隨麻黃以達於皮毛也其云不可發汗者蓋症止宜解肌麻黃髮汗之力雖猛然所用甚少且有石膏涼之芍藥斂之是以服藥之後止為解肌之小汗而不至於為淋漓之大汗也肺臟下無透竅而吸入之養氣實能隔肺胞息息透過以養胸中大氣由胸中大氣以敷布於全身而其吸入之氣又自喉管分支下達於心由心及肝由肝至衝任交會之處以及於腎故肝腎之氣化收斂自能容納下達之氣且能導引使之歸根有時肝腎陰虛其氣化不能固攝則肝氣忿急可透膈以干大氣腎氣膨脹可挾沖氣上衝則肝氣可挾所寄之相火上逆腎氣可挾副腎臟之沖氣上逆於是逆氣上干排擠胸中喉中皆不能容受外氣則喘作矣肺勞咳嗽最為難治之症愚向治此症惟用生懷山藥條切片者皆經水泡不如用條軋細過羅每用兩許煮作茶湯調以糖令適口以之送服川貝細末每日兩次當點心服之若其脾胃消化不良或服後微覺滿悶者可將黃色生雞內金軋成細末每用二三分與川貝同送服若覺熱時可嚼服天冬此方曾治愈肺癆作喘者若干人且能令人健壯離中丹治肺病發熱咳吐膿血兼治暴發眼疾紅腫作痛頭痛齒痛一切上焦實熱之症生石膏二兩細末甘草六錢細末硃砂末一錢半共和勻每服一錢日再服白水送熱甚者一次可服錢半咳嗽甚者方中加川貝五錢咳血多者加三七四錢大便不實者將石膏去一兩加滑石一兩用生山藥面熬粥送服此丹若陰虛作喘者亦宜山藥粥送服至於山藥面熬粥自五錢可至一兩下焦寒涼泄瀉及五更瀉者皆繫命門相火虛衰確能補助相火之藥莫如硫黃且更莫如生硫黃為其為石質之藥沉重下達耳不經水煮火爍而其熱力全也硫黃無毒其毒即其熱故可生用然愚向用硫黃治寒瀉症效者固多兼有服之瀉更甚者因本草原謂其大便潤小便長豈以其能潤大便即可作瀉乎後閲西人藥性書硫黃原列於輕瀉藥中乃知其服後間作瀉者無足怪也且其所謂輕瀉者與中醫説所謂大便潤者原相通也於斯再用硫黃時於石質藥中擇一性溫且饒有收澀之力者佐之即無斯弊且但熱下焦而性不僭上勝於但知用桂附者遠矣若於方中再少加辛香之品引其溫暖之力以入奇經更可治女子血海虛寒不孕坎中丹治下焦寒涼泄瀉及五更瀉硫黃純黃者一兩赤石脂一兩共為細末和勻每服五分食前服一日兩次不知則漸漸加多以服後移時微覺溫暖為度若以治女子血海虛寒不孕者宜於方中加炒熟小茴香末二錢孫按治此症時恆加肉桂少許與石脂硫黃同服且其止腹痛之力甚速也逐風通痹湯治風襲肌肉經絡初則麻木不仁浸至肢體關節不利生箭耆六錢麻黃三錢全當歸五錢丹參三錢乳香三錢沒藥三錢全蠍二錢脈象遲弱無力惡寒者將黃耆重用一兩再照加烏頭二三錢脈象有力惡熱者以薄荷易麻黃再加天花粉一兩初服以遍體皆得微汗為佳至汗後再服宜將麻黃減半或止用一錢筋骨軟弱者加明天麻三錢口眼歪斜者加蜈蚣二條其病劇者可加三條此風中身之外廓未入於臟腑也是以心中無病而病在於肌肉肢體經絡關節之處內經風論篇謂風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也又內經痹論曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹據內經二節之文觀之則風襲人之肌肉經絡可使麻木不仁浸至肢體關節不利可知也是以方中以黃耆為主藥取其能升補胸中大氣以通於衛氣自能逐風外出故神農本草經謂黃耆能主大風而又以最善發表之麻黃輔之一則扶正以祛邪一則發汗以透邪二藥相濟為用其逐風之力雖猛而實不至傷正氣也至當歸丹參乳沒全蠍諸藥或活血以祛風或通絡以祛風皆所以贊助黃耆麻黃以成功也至於病偏涼者加烏頭更將黃耆增重病偏熱者加花粉更以薄荷易麻黃此隨病機之所宜以細為調劑不使服藥後有覺涼覺熱之齟齬也筋骨軟弱者加明天麻取其能壯筋骨兼能祛風也口眼歪斜者加蜈蚣取其善理腦髓神經而有牽正口眼之力也曾治一人夏月開軒當窗而寢為風所襲其左半身即覺麻木肌肉漸形消瘦左手足漸覺不遂為擬此方其病偏於左又加鹿角膠二錢作引若偏於右宜用虎骨膠作引一劑周身得汗病愈強半即方略為加減又服二劑全愈後屢試其方莫不隨手奏效各處庭院中多有絡石與櫻薁此二種皆木本藤蔓類而皆可入藥絡石蔓粗而長葉若紅薯其節間出須須端作爪形經雨露濡濕其爪遂黏於磚石壁上俗呼為爬山虎即藥房中之絡石藤也本草又名為石龍藤其性善治喉痹腫塞用鮮者兩半煎湯一盅細細呷之少頃即通其性又善通經絡同續斷菟絲子煮酒須用黃酒不宜用燒酒日日飲之或單用絡石煮酒飲之善治周身拘攣肢體作痛若與狗脊猴薑煮酒飲之善治腰疼若兼腿疼者宜加牛膝名醫別録又謂此物久服能輕身明目潤澤好顏色不老誠如名醫別録之所云云則每日以之煮湯當茶飲之其為益不亦多乎櫻薁蔓類絡石而稍細花葉若雞爪形又多分歧以其須纏於高樹之枝柯上其藤中多通氣細孔截斷吹之有漿出可擦瘡瘍腫毒其性亦善治淋煎湯當茶最善止渴取其葉搗汁飲之善治嘔噦其所結之實大如廣紅豆形圓色紅而亮中有漿微甘微酸其功用能止渴益氣力悅顏色俗傳有謂其善解砒石毒者然未見其出載此則待質高明也愚於諸藥多喜生用欲存其本性也有如石膏為硫養輕鈣化合若煆之則硫養輕皆飛去其涼散之力頓失而所餘之鈣經煆即變質斷不可服故斯編之中於生石膏之能救人煆石膏之能傷人反復論之再三致意以其關於人命之安危甚重也又如赭石原鐵養化合其重墜涼鎮之力最善降胃止血且又能生血分毫不傷氣分至藥房中所鬻之赭石必煆以煤火則鐵養分離即不能生血且更淬之以醋轉成開破之性多用之即可令人泄瀉又如赤石脂原系粉末宜興茶壺即用此燒成為其質同粉末有黏滯之性研細服之可保護腸胃之內膜善治大便泄瀉而津沽藥房中竟將石脂為細末水和為泥捏作小餅煆以煤火即與宜興壺瓦無異若為末服之其傷人脾胃也必矣又如山萸肉其酸溫之性能補肝斂肝治肝虛自汗以固元氣之將脫實能挽回人命於至危之候藥房多酒浸蒸黑用之其斂肝固氣之力頓減矣如此者實難枚舉此所以愚於藥品多喜生用以存其本性也藥有非制過不可服者若半夏附子杏仁諸有毒之藥皆是也雖古方中之附子亦偶生用實系滷水淹透未經炮熟之附子亦非採取即用也凡此等藥方中雖未注明如何炮製坊間亦必為制至無毒若其藥本無毒原可生用者斯編方中若未注明制用皆宜生用有用斯編之方者甚勿另加製法致失藥之本性也威靈仙柴胡諸藥原是用根坊間恆雜以莖葉醫者不知甄別即可誤事細辛之葉其功用亦不如根故李瀕湖本草綱目亦謂用根至樗白皮與桑白皮亦皆用根上之皮其真偽尤屬難辨用者必自採取方的如樗根白皮大能固澀下焦而帶皮樗枝煎湯又能通大便俗傳便方大便不通者用帶皮樗枝七節每節長寸許煎湯服之甚效其枝與根性之相異如此用者可不慎哉煎時易沸之藥醫者須預告病家如知母若至五六錢微火煎之亦沸若至一兩幾不能煎然此藥最易煎透先將他藥煎十餘沸再加此藥敞開藥罐蓋略煎數沸其湯即成至若山藥阿膠諸有汁漿之藥龍骨牡蠣石膏滑石赭石諸搗末之藥亦皆易沸大凡煎藥其初滾最易沸煎至將滾時須預將藥罐之蓋敞開以箸攪之逮沸過初滾其後仍沸敞蓋煎之無妨若不沸者始可蓋而煎之蓋險急之證安危止爭此藥一劑故古之醫者藥餌必經己手修制即煎湯液亦必親自監視也自述治愈牙疼之經過愚素無牙疼病丙寅臘底自津回籍因感冒風寒覺外表略有拘束抵家後又眠於熱炕上遂陡覺心中發熱繼而左邊牙疼因思解其外表內熱當消牙疼或可自愈服西藥阿斯匹林一瓦半此藥原以一瓦為常量得微汗心中熱稍退牙疼亦覺輕遲兩日心中熱又增牙疼因又劇方書謂上牙齦屬足陽明下牙齦屬手陽明愚素為人治牙疼有內熱者恆重用生石膏少佐以宣散之藥清其陽明其牙疼即愈於斯用生石膏細末四兩薄荷葉錢半煮湯分兩次飲下日服一劑兩劑後內熱已清疼遂輕減翌日因有重證應診遠出時遍地雪深三尺嚴寒異常因重受外感外表之拘束甚於初次牙疼因又增劇而心中卻不覺熱遂單用麻黃六錢愚身體素強壯是以屢次用藥皆倍常量非可概以之治他人也於臨睡時煎湯服之未得汗繼又煎渣再服仍未得汗睡至夜半始得汗微覺肌膚松暢而牙疼如故劇時覺有氣循左側上潮疼徹輔頰且覺發熱有時其氣旁行更疼如錐刺恍悟此證確係氣血挾熱上衝滯於左腮若再上升至腦部即為腦充血矣遂用懷牛膝生赭石細末各一兩煎湯服之其疼頓愈分毫不復覺疼且從前頭面畏風從此亦不復畏風矣蓋愚向擬建瓴湯用治腦充血證甚效方中原重用牛膝赭石今單用此二藥以治牙疼更捷如影響此誠能為治牙疼者別開一門徑矣是以詳志之附録唐山趙來函二小兒年十二歲右邊牙疼連右腮亦腫疼因讀先生自述治愈牙疼之經過知腮腫系外感受風牙疼系胃火熾盛遂先用西藥阿斯匹林一瓦服後微見汗繼用生石膏二兩薄荷葉錢半連服三劑全愈虛勞溫病皆忌橘紅説半夏橘紅皆為利痰之藥然宜於濕寒之痰不宜於燥熱之痰至陰虛生熱有痰外感溫熱有痰尤所當忌究之伍藥得宜半夏或猶可用是以傷寒論竹葉石膏湯金匱麥門冬湯皆用之至橘紅則無論伍以何藥皆不宜用試略舉數案於下以明之本邑于姓媼勞熱喘嗽醫治數月病益加劇不能起床脈搏近七至心中熱而且干喘嗽連連勢極危險所服之方積三十餘紙曾經六七醫生之手而方中皆有橘紅其餘若玄參沙參枸杞天冬貝母牛蒡生熟地黃諸藥大致皆對證而其心中若是之熱而乾者顯系橘紅之弊也愚投以生懷山藥一兩玄參沙參枸杞龍眼肉熟地黃各五錢川貝甘草各二錢生雞內金錢半煎服一劑即不覺干即其方略為加減又服十餘劑全愈又治奉天李得風溫證發熱頭疼咳嗽延醫服藥一劑頭疼益劇熱嗽亦不少減其脈浮洪而長知其陽明經府皆熱也視所服方有薄荷連翹諸藥以解表知母玄參諸藥以清裡而雜以橘紅三錢諸藥之功盡為橘紅所掩矣為即原方去橘紅加生石膏一兩一劑而愈又治滄州孫肺臟受風咳嗽吐痰醫者投以散風利痰之劑中有毛橘紅二錢服後即大口吐血咳嗽益甚其脈浮而微數右部寸關皆有力投以傷寒論麻杏甘石湯方中生石膏用一兩麻黃用一錢煎湯送服旱三七細末二錢一劑血止又去三七加丹參三錢再服一劑痰嗽亦愈方中加丹參者恐其經絡中留有瘀血釀成異日虛勞之證故加丹參以化之統觀以上三案橘紅為虛勞溫病之禁藥不彰彰可考哉而醫者習慣用之既不能研究其性於平素至用之病勢增進仍不知為誤用橘紅所致不將夢夢終身哉鱉甲龜板不可用於虛弱之證神農本草經論鱉甲主心腹癥瘕堅積金匱鱉甲煎丸用之以消瘧母脅下硬塊藥房又皆以醋炙其開破肝經之力尤勝向曾單用鱉甲末三錢水送服以治久瘧不愈服後病者覺怔忡異常移時始愈由斯知肝虛弱者鱉甲誠為禁用之品也又龜板神農本草經亦主癥瘕兼開濕痹後世佛手散用之以催生下胎嘗試驗此藥若用生者原能滋陰潛陽引熱下行且能利小便是開濕痹之效而藥房中亦皆用醋炙之若服至一兩必令人泄瀉其開破之力雖遜於鱉甲而與鱉甲同用以誤治虛弱之證實能相助為虐也乃後世方書用此二藥以治虛勞之證者甚多即名醫如吳鞠通其治溫邪深入下焦熱深厥深脈細促心中憺憺大動此邪實正虛肝風煽動將脫當用白虎加人參湯再加龍骨牡蠣庶可挽回而吳氏竟治以三甲復脈湯方中鱉甲龜板並用雖有牡蠣之收澀亦將何補此乃名醫之偶失檢點也愚曾治一媼年近五旬患溫病半月不愈其左脈弦硬有真氣不斂之象右脈近洪而不任重按此邪實證虛也為擬補正祛邪之劑病者將藥飲一口嫌其味苦不服再延他醫為開三甲復脈湯方略有加減服後煩躁異常此心腎不交陰陽將離也醫者猶不省悟竟於原方中加大黃二錢服後汗出不止此時若重用山萸肉二兩汗猶可止汗止後病仍可治惜該醫見不及此竟至誤人性命也目疾由於伏氣化熱者治法目疾有實熱之證其熱屢服涼藥不解其目疾亦因之久不愈者大抵皆因伏氣化熱之後而移熱於目也丙寅季春李紡紗廠學徒病目久不愈眼瞼紅腫胬肉遮睛覺目睛脹疼甚劇又兼耳聾鼻塞見聞俱廢跬步須人扶持其脈洪長甚實左右皆然其心中甚覺發熱舌有白苔中心已黃其從前大便原燥因屢服西藥大便日行一次知系冬有伏寒感春陽而化熱其熱上攻目與耳鼻皆當其衝也擬用大劑白虎湯以清陽明之熱更加白芍龍膽草兼清少陽之熱病人謂廠中原有西醫不令服外人藥今因屢服其藥不愈偷來求治於先生或服丸散猶可斷乎不能在廠中煎服湯藥愚曰此易耳我有自制治眼妙藥送汝一包服之眼可立愈遂將預軋生石膏細末兩半與之囑其分作六次服日服三次開水送下服後又宜多喝開水令微見汗方好持藥去後隔三日復來眼疾已愈十之八九耳聾鼻塞皆愈心中已不覺熱脈已和平復與以生石膏細末一兩俾仍作六次服將藥服盡全愈至與以生石膏細末而不明言者恐其知之即不敢服也後屢遇因伏氣化熱病目者治以此方皆效天水散治中暑宜於南方北方用之宜稍變通河間天水散即六一散為清暑之妙藥究之南方用之最為適宜若北方用之原宜稍為變通蓋南方之暑多挾濕故宜重用滑石利濕即以瀉熱若在北方病暑者多不挾濕或更挾有燥氣若亦重用滑石以利其濕將濕去而燥愈甚暑熱轉不易消也愚因是擬得一方用滑石四兩生石膏四兩粉甘草二兩硃砂一兩薄荷冰一錢共為細末每服二錢名之曰加味天水散以治北方之暑病固效以治南方之暑病亦無不效也方中之義用滑石生石膏以解暑病之熱而石膏解熱兼能透表有薄荷冰以助之熱可自肌膚散出滑石解熱兼能利水有甘草以和之生甘草為末服之最善利水且水利而不傷陰熱可自小便瀉出又恐暑氣內侵心經為熱所傷故仿益元散之義加硃砂天水散加硃砂名益元散以涼心血即以鎮安神明使不至怔忡瞀亂也人受暑熱未必即病亦恆如冬令伏氣伏於膜原至秋深感涼氣激薄而陡然暴發腹疼作瀉其瀉也暴注下迫恆一點鐘瀉十餘次亦有吐瀉交作者其甚者或兩腿轉筋然身不涼脈不閉心中惟覺熱甚急欲飲涼食冰者此仍系暑熱為病實與霍亂不同丁卯季夏暑熱異常中秋節後發現此等證甚多重用生石膏煎湯送服益元散其病即愈腹中疼甚者可用白芍甘草益元散中甘草甚少故加之與石膏同煎湯送服益元散若瀉甚者可用生山藥甘草與石膏同煎湯送服益元散或用拙擬滋陰清燥湯加生石膏兩餘或二兩同煎服病亦可愈其欲食冰者可即與之以冰欲飲井泉涼水者可即與之以井泉水聽其儘量食之飲之無礙也且凡吐不止者若欲食冰聽其儘量食之其吐即可止腹疼下瀉亦可並愈其間有不並愈者而其吐既止亦易用藥為之調治也治幼年溫熱證宜預防其出痧疹幼年溫熱諸證多與痧疹並至然溫熱之病初得即知至痧疹初得其毒恆內伏而外無現象或遲至多日始出又或不能自出必俟服托表之藥而後能出若思患預防宜於治溫熱之時少用清表痧疹之藥不然恐其毒盤結於內不能發出其溫熱之病亦不能愈也愚臨證數十年治愈溫熱兼痧疹者不勝計莫不於治溫熱藥中時時少加以清表痧疹之品以防痧疹之毒內蘊而不能透出故恆有溫熱之病經他醫治療旬日不愈勢極危險後經愚為診治遂發出痧疹而愈者今略登數案於下以為徵實奉天馬氏幼女年六七歲得溫病屢經醫治旬余病勢益進亦遂委之於命不復治療適其族家有幼子得險證經愚治愈因轉念其女病猶可治殷勤相求其脈象數而有力肌膚熱而乾澀臥床上展轉不安其心中似甚煩躁以為病久陰虧不堪外感之灼熱或其痧疹之毒伏藏於內久未透出是以其病之現狀如是也問其大便數日一行遂為疏方生石膏細末二兩潞黨參四錢玄參天冬知母生懷山藥各五錢連翹甘草各二錢蟬蛻一錢煎湯兩盅分數次溫飲下連服二劑大熱已退大便通下其精神仍似騷擾不安再診其脈較前無力而浮疑其病已還表其餘熱當可汗解用西藥阿斯匹林二分強和白蔗糖水沖服下周身微汗透出白痧若干而愈乃知其從前展轉騷擾不安者因其白痧未發出也為每劑中皆有透表之品故其病易還表而其痧疹之毒復亦易隨發汗之藥透出也又奉天劉之幼女年五歲周身發熱上焦躁渴下焦滑瀉遷延日久精神昏憒危至極點脈象數而無力重診即無為疏方用生懷山藥一兩滑石八錢連翹生杭芍甘草各三錢蟬蛻羚羊角此一味另煎當水飲之煎至數次尚有力各一錢半煎湯一盅半分三次溫服下周身發出白痧上焦煩渴下焦滑瀉皆愈按此方即滋陰宣解湯加羚羊角也凡幼年得溫熱病即滑瀉者尤須防其痧疹之毒內伏不能外出滑瀉則身弱恆無力托痧疹之毒外出此方既能清熱止瀉又能表毒外出所以一藥而愈也奉天王子年二十八歲周身發熱出白痧甚密經醫調治失宜遷延至旬日病益加劇醫者又欲用大青龍湯減去石膏王疑其性熱不敢用延愚為之診治其周身發熱卻非大熱脈數五至似有力而非洪實舌苔乾黑言語不真其心中似怔忡又似煩躁自覺難受莫支其家人謂其未病之時實勞心過度後遂得此病參之脈象病情知其真陰內虧外感之實熱又相鑠耗故其舌乾如斯心中之怔忡煩躁又如斯也問其大便數日未行似欲便而不能下通遂疏方用生石膏細末三兩潞黨參五錢生山藥五錢知母天花粉各八錢連翹甘草各二錢生地黃一兩半蟬蛻一錢俾煎湯三盅分三次溫飲下又囑其服藥之後再用豬膽汁少調以醋用灌腸器注射之以通其大便病家果皆如所囑翌日視之大便已通下其灼熱怔忡煩躁皆愈強半舌苔未退而乾黑稍瘥又將涼方減石膏之半生地黃改用一兩連服三劑忽又遍身出疹大便又通下其灼熱怔忡煩躁始全愈恐其疹出回急復為開清毒托表之藥俾服數劑以善其後按此證既出痧矣原不料其後復出疹而每劑藥中皆有透表之品者實恐其蘊有痧毒未盡發出也而疹毒之終能發出實即得力於此然非臨時細細體察擬方時處處周密又何能得此意外之功效哉又此證非幼科亦因溫而兼疹故連類及之且俾人知溫而兼疹之證非獨幼科有之即壯年亦間有之也癇瘋治法附愈癇丸息神丸癇瘋最為難治之證因其根蒂最深故不易治耳愚平素對於此證有單用磨刀水治愈者有單用熊膽治愈者有單用蘆薈治愈者有用磁朱丸加赭石治愈者然如此治法效者固多不效者亦恆有之仍覺對於此證未有把握後治奉天王氏婦年近三旬得癇瘋證醫治年餘不愈浸至每日必發且病勢較重其證甫發時作狂笑繼則肢體抽掣昏不知人脈象滑實關前尤甚知其痰火充盛上並於心神不守舍故作狂笑痰火上並不已迫激腦筋失其所司故肢體抽掣失其知覺也先投以拙擬蕩痰湯間日一劑三劑後病勢稍輕遂改用丸藥硫化鉛生赭石芒硝各二兩硃砂青黛白礬各一兩黃丹五錢共為細末復用生懷山藥四兩為細末焙熟調和諸藥中煉蜜為丸二錢重當空心時開水送服一丸日兩次服至百丸全愈奉天劉姓學生素患癇瘋愚曾用羚羊角加清火理痰鎮肝之藥治愈隔二年證又反復再投以原方不效亦與以此丸服盡六十丸全愈瀋陽縣鄉間童子年七八歲夜間睡時騷擾不安似有抽掣之狀此亦癇瘋也亦治以此丸服至四十丸全愈此丸不但治癇瘋又善治神經之病奉天趙年五十許數年頭迷心亂精神恍惚不由自主屢次醫治不愈亦治以此丸惟方中白礬改為硼砂仍用一兩亦服至百丸全愈因此丸屢用皆效遂名此丸為愈癇丸而以硼砂易白礬者名為息神丸附制硫化鉛法用真黑鉛硫黃細末各一斤先將鉛入鐵鍋中熔化即將硫黃末四五兩撒在鉛上黃即發焰急用鐵鏟拌炒所熔之鉛即結成砂子其有未盡結者又須將硫黃末接續撒其上勿令火熄仍不住拌熔化之鉛盡結成砂子為度待晾冷所結砂子色若鉛灰入藥鉢細研為粉去其研之成餅者所餘之粉用芒硝半斤分三次沖水將其粉煮過三次然後入藥小兒痙病治法小兒為少陽之體是以或灼熱作有驚駭其身中之元陽恆挾氣血上衝以擾其腦部致其腦筋妄行失其所司而痙證作矣痙者其頸項硬直也而或角弓反張或肢體抽掣亦皆蓋其中矣此證治標之藥中莫如蜈蚣宜用全的用治標之藥以救其急即審其病因兼用治本之藥以清其源則標本並治後自不反復也癸亥季春愚在奉天旬日之間遇幼童溫而兼痙者四人愚皆以白虎湯治其溫以蜈蚣治其痙其痙之劇者全蜈蚣用至三條加白虎湯中同煎服之分數次飲下皆隨手奏效其詳案皆在藥物蜈蚣解下又皆少伍以他藥然其緊要處全在白虎湯蜈蚣並用又乙丑季夏愚在籍有張姓幼子患暑溫兼痙其痙發時氣息皆閉日數次灼熱又甚劇精神異常昏憒延醫數人皆諉為不治子投以大劑白虎湯加全蜈蚣三條俾分三次飲下亦一劑而愈丙寅季春天津俞姓童子病溫兼出疹周身壯熱渴嗜飲水疹出三日似靨非靨觀其神情恍惚不安脈象有力搖搖而動似將發痙為開白虎湯加羚羊角錢半另煎兌服此預防其發痙所以未用蜈蚣藥未及煎已抽搐大作急煎藥服下頓愈至痙之因驚駭得者當以清心鎮肝安魂定魄之藥與蜈蚣並用若硃砂鐵鏽水生龍骨生牡蠣諸藥是也有熱者加羚羊角青黛有痰者加節菖蒲膽南星有風者加全蠍殭蠶氣閉塞及牙關緊者先以藥吹鼻得嚏後灌以湯藥癩證治法癩之為證方書罕載愚初亦以為猶若疥癬不必注意也自戊午來奉天診病遇癩證之劇者若干有患證數年費藥資甚巨不能治愈者經愚手皆服藥數劑全愈後有錦州縣戎患此證在其本地服藥無效來奉求為診治服藥六劑即愈隔三年其證陡然反復先起自面上狀若頑癬搔破則流黃水其未破之處皮膚片片脫落奇癢難熬歌哭萬狀在其本處服藥十餘日分毫無效復來奉求為診治其脈象洪實自言心中煩躁異常夜間尤甚膚愈癢而心愈躁徹夜不眠若再不愈實難支持遂為疏方用蛇蛻四條蟬蛻殭蠶全蠍甘草各二錢黃連防風各三錢天花粉六錢大楓子十二粒連皮搗碎為其脈洪心躁又為加生石膏細末兩半煎湯兩茶盅分兩次溫飲下連服三劑面上流黃水處皆結痂其有舊結之痂皆脫落瘙癢煩躁皆愈強半脈之洪實亦減半遂去石膏加龍膽草三錢服一劑從前周身之似有似無者其癩亦皆發出作瘙癢仍按原方連服數劑全愈至方中之藥諸藥皆可因證加減或用或不用而蛇蛻則在所必需以其既善解毒以毒攻毒又善去風且有以皮達皮之妙也若畏大楓子有毒不欲服者減去此味亦可治夢遺法夢遺之病最能使人之腎經虛弱此病若不革除雖日服補腎藥無益也至若龍骨牡蠣萸肉金櫻諸固澀之品雖服之亦恆有效而究無確實把握此乃腦筋輕動妄行之病惟西藥若臭剝抱水諸品雖為麻醉腦筋之藥而少用之實可以安靖腦筋若再與龍骨牡蠣諸藥同用則奏效不難矣愚素有常用之方爰録於下煆龍骨一兩煆牡蠣一兩淨萸肉二兩共為細末再加西藥臭剝十四瓦煉蜜為百丸每臨睡時服七丸服至兩月病可永愈肢體受寒疼痛可尉以坎離砂及坎離砂製法藥房中所鬻坎離砂沃之以醋自能發熱以尉受寒腿疼及臂疼頗有效驗而醫者猶多不知其所以然之故究其實際不外物質化合之理也按此砂純系用鐵屑製成其製法將鐵屑煆紅即以醋噴滅之晾乾收貯用時復以醋拌濕即能生熱蓋火非養氣不著當鐵屑煆紅之時鐵屑中原具有養氣經醋噴滅其養氣即永留鐵中況養氣為酸素醋味至酸其含養氣頗多以之噴滅煆紅之鐵醋中之養氣亦盡歸鐵中用時再沃之以醋其從前所蘊之養氣遂感通發動而生熱以尉因寒痹疼之處不惟可以驅逐凝寒更可流通血脈以人之血脈得養氣則赤而血脈之瘀者可化也牛肉反紅荊之目睹敝邑多紅荊而縣北泊莊尤多各地阡塍皆有荊叢繞護乙巳季春牛多瘟死剝牛者棄其臟腑但食其肉未聞有中毒者獨泊莊因食牛肉同時中毒者二百餘人迎愚為之解救既至相距七里許死者已三人矣中毒之現象發熱噁心瞑眩脈象緊數投以黃連甘草金銀花天花粉諸藥皆隨手奏效細詢其中毒之由緣洗牛肉於溪中其溪中多浸荊條水色變紅洗後復晾於荊條柵上至煮肉時又以荊為薪及鬻此肉食者皆病食多則病劇食少則病輕耳愚聞此言因恍憶老牛反荊花原系邑中相傳古語想邑中古人必有中此毒者是以其語至今留詒人多知之特其事未經見雖知之亦淡然若忘耳然其相反之理究系何因須俟深於化學者研究也因又憶曩時閲小説見有田家婦饁于田間行荊芥中以饁之飯有牛肉食者遂中毒疑荊芥即系紅荊之訛不然豈牛肉反荊花而又反荊芥耶醫界諸大雅有能確知之者又期不吝指教駁方書貴陽抑陰論嘗思一陰一陽互為之根天地之氣化也人稟天地之氣化以生即人身各具一小天地其氣化何獨不然是以人之全身陰陽互相維繫上焦之陽藏於心中血中焦之陽涵於胃液下焦之陽存於腎水凡心血胃液腎水皆陰也充類言之凡全身津液脂膏脈腺存在之處即元陽留蓄之處陽無陰則飛越陰無陽則凝滯陽盛於陰則熱陰盛於陽則冷由斯知陰陽偏盛則人病陰陽平均則人安陰陽相維則人生陰陽相離則人死彼為貴陽抑陰之論者竟謂陽一分未盡則人不死陰一分未盡則人不仙斯何異夢中説夢也然此則論未病之時陰陽關於人身之緊要原無軒輊也若論已病又恆陽常有餘陰常不足朱丹溪曾有此論醫者當調其陰陽使之歸於和平或滋陰以化陽或瀉陽以保陰其宜如此治者又恆居十之八九倘曰不然試即諸病徵之病有內傷外感之殊而外感實居三分之二今先以外感言之傷寒溫病疫病皆外感也而傷寒中於陰經宜用熱藥者百中無二三也溫病則純乎溫熱已無他議疫病雖間有寒疫亦百中之一二也他如或瘧或疹或痧證或霍亂亦皆熱者居多而暑暍之病更無論矣試再以內傷言之內傷之病虛勞者居其半而勞字從火其人大抵皆陰虛陽盛究之亦非真陽盛乃陰獨虛致陽偏盛耳他如或吐衄或淋痢或肺病喉病眼疾或黃疸或水病腫脹二便不利或嗽或喘或各種瘡毒以上諸證已為內傷之大凡而陽盛陰虛者實為十之八九也世之業醫者能無於臨證之際以急急保其真陰為先務乎即其病真屬陽虛當用補陽之藥者亦宜少佐以滋陰之品蓋上焦陰分不虛而後可受參耆下焦陰分不虛而後可受桂附也閲劉華封爛喉痧證治辨異書後丙寅中秋後接到劉華封自濟南寄贈所著爛喉痧證治辨異一書細閲一過其辨證之精用藥之妙立論之通於喉證一門實能令人起觀止之嘆咽喉為人身緊要之處而論喉證之書向無善本自耐修子托之鸞語著白喉忌表抉微盛行於一時初則用其方效者甚多繼而用其方者有效有不效更有用之不惟不效而病轉增劇者於斯議論紛起有謂白喉不忌表散但宜表以辛涼而不可表以溫熱者又有謂白喉原宜表散雖麻黃亦可用但不可與升提之藥並用者按其人或有嚴寒外束不得汗咽喉疼而不腫者原可用麻黃湯解其表然麻黃可用桂枝不可用若用麻黃湯時宜去桂枝加知母連翹至升提之藥惟忌用升麻若桔梗亦升提之藥而傷寒論有桔梗湯治少陰病咽痛因其能開提肺氣散其咽喉鬱熱也若與涼藥並用又能引涼藥之力至咽喉散熱惟咽喉痛而且腫者似不宜用又有於白喉忌表抉微一書痛加詆譭謂其毫無足取者而劉華封則謂白喉證原分兩種耐修子所謂白喉忌表者內傷之白喉也其病因確係煤毒紙煙及過服煎炒辛熱之物或貪色過度以致陰液虧損虛火上炎所致用藥養陰清肺原為正治其由外感傳染者為爛喉痧喉中亦有白腐乃系天行時氣入於陽明上蒸於肺致咽喉潰爛或兼有疹子正是溫熱欲出不得所致正宜疏通發表使毒熱外出二證之辨白喉則咽中干喉痧則咽中多痰涎白喉止五心煩熱喉痧則渾身大熱云云誠能將此二證一內因一外因辨別極精及至後所載治喉痧諸方詳分病之輕重淺深而措施咸宜洵為喉科之金科玉律也惟其言今日之好人參難得若用白虎加人參湯及小柴胡湯方中人參可以沙參代之似非確論蓋小柴胡湯中之人參或可代以沙參若當下後小柴胡湯證仍在者用小柴胡湯時亦不可以沙參代人參至白虎加人參湯若其熱實脈虛者以沙參代人參其熱必不退此愚由經驗而知非想當然爾之談也且古方中人參即系今之黨參原非難得之物若恐人工種植者不堪用凡黨參之通體橫紋者若胡萊蔔之紋皆野生之參也至其後論喉證原有因下焦虛寒迫其真陽上浮致成喉證者宜治以引火歸原之法洵為見道之言答嚴代友問痰飲治法詳觀來案知此證乃寒飲結胸之甚者拙擬理飲湯原為治此證的方特其藥味與分量宜稍為變更耳今擬一方於下以備採擇方用生箭耆一兩乾薑八錢於朮四錢桂枝尖茯苓片炙甘草各三錢厚朴陳皮各二錢煎湯服方中之義用黃耆以補胸中大氣大氣壯旺自能運化水飲仲景所謂大氣一轉其氣指水飲之氣乃散也而黃耆協同乾薑桂枝又能補助心肺之陽使心肺陽足如日麗中天陰霾自開更用白朮茯苓以理脾之濕厚朴陳皮以通胃之氣氣順濕消痰飲自除用炙甘草者取其至甘之味能調幹薑之辛辣而乾薑得甘草且能逗留其熱力使之綿長並能緩和其熱力使不猛烈也按此方即金匱苓桂朮甘湯加黃耆乾薑厚朴陳皮亦即拙擬之理飲湯去芍藥也原方之用芍藥者因寒飲之證有迫其真陽外越周身作灼或激其真陽上竄目眩耳聾者芍藥酸斂苦降之性能收斂上竄外越之元陽歸根也然必與溫補之藥同用方有此效此病原無此證故不用白芍至黃耆在原方中原以痰飲既開自覺氣不足者加之茲則開始即重用黃耆者誠以寒飲固結二十餘年非有黃耆之大力者不能斡旋諸藥以成功也又按此方大能補助上焦之陽分而人之元陽其根柢實在於下若更兼服生硫黃以培下焦之陽則奏效更速所言東硫黃亦可用須擇其純黃者方無雜質惟其熱力減少不如中硫黃耳其用量初次可服細末一錢不覺熱則漸漸加多一日之極量可至半兩然須分四五次服下不必與湯藥同時服或先或後均可附原問敝友患寒飲喘嗽照方治療未效據其自述病因自二十歲六月遭兵燹困山澤中絶飲食五日夜歸家急汲井水一小桶飲之至二十一歲六月遂發大喘一日夜後飲二陳湯加乾薑細辛五味漸安從此痰飲喘嗽成為痼疾所服之藥大燥大熱則可涼劑點滴不敢下咽若誤服之即胸氣急而喘作須咳出極多水飲方止小便一點鐘五六次如白水若無喘小便亦照常飲食無論肉味菜蔬俱要燥熱之品粥湯菜湯概不敢飲其病情喜燥熱而惡冷濕者如此其病狀暑天稍安每至霜降後朝朝發喘必屆巳時吐出痰飲若干始稍定或飲極滾之湯亦能咳出痰飲數口胸膈略寬舒迄今二十六七載矣近用黎蘆散吐法及十棗湯等下法皆出痰飲數升證仍如故金匱痰飲篇及寒水所關等劑服過數十次證亦如故想此證既能延歲月必有療法乞先生賜以良方果能祓除病根感佩當無既也又衷中參西録載有服生硫黃法未審日本硫黃可服否服藥愈後謝函接函教蒙授妙方治療敝友奇異之宿病連服四五劑呼吸即覺順適後又照方服七八劑寒飲消除喘證全愈答翁問厄逆氣鬱治法詳觀一百十一號紹興醫藥學星期報所登之案其厄逆終不愈者以其虛而兼郁也然觀其飽時加重飢時見輕知病因之由於郁者多由於虛者少若能令其分毫不郁其厄當止郁開厄止氣化流通雖有所虛自能漸漸復原特是理虛中之郁最為難事必所用之藥分毫不傷氣化俾其鬱開得一分其氣化自能復原一分始克有效拙擬醫方篇中載有衛生防疫寶丹原系治霍亂急證之方無論其證因涼因熱皆屢試屢驗後有瀋陽趙得溫病甚劇舁至院中求為診治數日就愈忽作厄逆晝夜不止服藥無效因思衛生防疫寶丹最善行氣理郁俾一次服五十粒厄逆頓止又數日有陳姓患厄逆證旬日不止眠食俱廢精神疲憊幾不能支亦治以衛生防疫寶丹俾服八十粒亦一次即愈由斯知衛生防疫寶丹治厄逆確有把握無論其為虛為郁用之皆可奏效也蓋方中冰片薄荷冰為透竅通氣之妙藥而細辛善降逆氣白芷善達鬱氣硃砂能鎮沖氣之沖逆甘草能緩肝氣之忿激藥非為厄逆專方而無一味非治厄逆必需之品是以投之皆效也若其人下元虛甚者可濃煎生山藥汁送服其挾熱者白芍麥冬煎湯送服其挾寒者乾薑厚朴煎湯送服愚用之數十次未有不隨手奏效者若倉猝不暇作丸藥可為末服之答金問治吐血後咳嗽法詳觀病案知系因吐血過多下焦真陰虧損以致腎氣不斂沖氣上衝五更乃三陽升發之時沖氣上衝者必益甚所以腦筋跳動喘嗽加劇也欲治此症當滋陰納氣斂沖鎮肝方能有效爰擬方於下以備酌用生山藥一兩大熟地一兩淨萸肉六錢懷牛膝六錢柏子仁六錢生龍骨四錢生牡蠣四錢生赭石四錢生雞內金二錢玄參二錢炙甘草二錢日服一劑煎渣重服答胡問小兒暑天水瀉及由瀉變痢由瘧轉痢之治法小兒少陽之體不堪暑熱恆喜食涼飲冷以解暑飲食失宜遂多泄瀉瀉多亡陰益至燥渴多飲而陰分虛損者其小溲恆不利所飲之水亦遂盡歸大腸因之泄瀉愈甚此小兒暑天水瀉所以難治也而所擬之方若能與證吻合則治之亦非難事方用生懷山藥一兩滑石八錢生杭芍六錢甘草三錢煎湯一大盅分三次溫飲下一劑病減再劑全愈矣方中之意山藥滋真陰兼固其氣滑石瀉暑熱兼利其水甘草能和胃兼能緩大便芍藥能調肝又善利小便肝胃調和其泄瀉尤易愈也此方即拙擬滋陰清燥湯原治寒溫之證深入陽明之府上焦燥熱下焦滑瀉而小兒暑天水瀉其上焦亦必燥熱是以宜之至於由瀉變痢由瘧轉痢者治以此方亦能隨手奏效何者暑天熱痢最宜用天水散方中滑石甘草同用固河間之天水散也又可治以芍藥甘草湯方中白芍甘草同用即仲景之芍藥甘草湯也且由瀉變痢由瘧轉痢者其真陰必然虧損氣化必不固攝而又重用生山藥為之滋陰固氣化是以無論由泄變痢由瘧轉痢者皆宜若服此藥間有不效者可加白頭翁三錢因白頭翁原為治熱痢之要藥也答章問腹內動氣衝氣症治法觀此症陡有氣自臍上衝至胸腔集於左乳下跳動不休夫有氣陡起於臍上衝者此奇經八脈中衝脈發出之氣也衝脈之原上隸於胃而胃之大絡虛里貫膈絡肺出於左乳下為動脈然無病者其動也微故不覺其動也乃因此沖氣上衝犯胃且循虛里之大絡貫膈絡肺復出於左乳下與動脈相併以致動脈因之大動人即自覺其動而不安矣當用降沖斂沖鎮沖補沖之藥以治病源則左乳下之動脈自不覺其動矣爰擬兩方於下生山藥八錢生牡蠣八錢生赭石末四錢生芡實四錢清半夏足四錢中有礬須用溫水淘淨曬乾柏子仁四錢炒搗不去油寸麥冬三錢上藥七味磨取鐵鏽濃水煎藥又方用淨黑鉛半斤用鐵勺屢次熔化之取其屢次熔化所餘之鉛灰若干研細過羅再將熔化所餘之鉛稱之若余有四兩復用鐵勺熔化之化後用硫黃細末兩半撒入勺中急以鐵鏟炒拌之鉛經硫黃灼煉皆成紅色因炒拌結成砂子晾冷軋細過羅中有軋之成餅者系未化透之鉛務皆去淨二藥各用一兩和以炒熟麥面為丸不宜多摻以僅可作成丸為度如桐子大每服六七丸或至十餘丸以服後覺藥力下行不至下墜為度用生山藥末五六錢煮作稀粥送下一日再服以上二方單用同用皆可答章代友問病案治法詳觀病案知系胃陰虧損胃氣上逆當投以滋胃液降胃氣之品然病久氣虛又當以補氣之藥佐之爰擬方於下放膽服之必能止嘔吐通大便逮至飲食不吐大便照常然後再擬他方方用生赭石二兩生山藥一兩潞黨參五錢天冬八錢共煎湯兩茶杯分三次溫服下渣煎一杯半再分兩次溫服下一劑煎兩次共分五次服日盡一劑三劑後吐必止便必順用此方者赭石千萬不可減輕若此藥服之覺涼者可加生薑四五片或初服時加生薑四五片亦可答龐問大便脫肛治法脫肛之症用曼陀羅煎濃湯洗之甚效僕常用鮮曼陀羅四五斤煎取濃汁兩三大碗再以其汁煎萸肉二三兩取濃汁一大碗再用黨參二兩軋細末調汁中曬乾每用四五錢水煎融化洗之數次可全愈答徐讀傷寒論質疑四則古人之書不可不信又不可盡信愚不揣固陋敢將徐所疑傷寒論四則反復陳之第一疑在太陽下篇第二十節其節為病在太陽之表而不知汗解反用涼水噀之灌之其外感之寒已變熱者經內外之涼水排擠不能出入鬱於肉中而煩熱起粟然其熱在肌肉不在胃府故意欲飲水而不渴治宜文蛤散夫文蛤散乃蛤粉之未經煅煉者也服之其質不化藥力難出且雖為蛤殼而實則介蟲之甲其性沉降達表之力原甚微藉以消肉上之起粟似難奏功故繼曰若不瘥者與五苓散其方取其能利濕兼能透表又能健運脾胃以助利濕透表之原動力其病當瘥矣然又可慮者所灌之涼水過多與上焦外感之邪互相膠漆而成寒實結胸則非前二方所能治療矣故宜用三物小陷胸湯或白散夫白散之辛溫開通用於此證當矣至於三物小陷胸湯若即系小陷胸湯用於此證以寒治寒亦當乎注家謂此係反治之法夫反治者以熱治寒恐其扞格而少用涼藥為引以為熱藥之反佐非純以涼藥治寒也蓋注者震攝於古人之隆名即遇古書有舛錯遺失之處亦必曲為原護不知此正所以誤古人而更貽誤後人也是以拙著衷中參西録於古方之可確信者恆為之極力表彰或更通變化裁推行盡致以窮其妙用於其難確信者則恆姑為懸疑以待識者之論斷蓋欲為醫學力求進化不得不如斯也此節中三物小陷胸湯唐容川疑其另為一方非即小陷胸湯然傷寒太陽病實鮮有用水噀水灌之事愚疑此節非仲景原文也第二疑在太陽下篇三十二節其節為太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易治按此節文義必有訛遺之字陰陽氣並竭句陳氏釋為陰陽氣不交甚當至無陽則陰獨句鄙意以為獨下當有結字蓋言誤汗誤下上焦陽氣衰微不能宣通故陰氣獨結於心下而為痞也第三疑在太陽下篇五十四節其節為傷寒脈浮滑夫滑則熱入里矣乃滑而兼浮是其熱未盡入里半在陽明之府半在陽明之經也在經為表在府為里故曰表有熱里有寒內經謂熱病者皆傷寒之類也又謂人之傷於寒也則為病熱此所謂里有寒者蓋謂傷寒之熱邪已入里也陳氏之解原如斯愚則亦以為然至他注疏家有謂此寒熱二字宜上下互易當作外有寒里有熱者然其脈象既現浮滑其外表斷不至惡寒也有謂此寒字當系痰之誤因痰寒二音相近且脈滑亦為有痰之證也然在寒溫其脈有滑象原主陽明之熱已實且足徵病者氣血素充治亦易愈若因其脈滑而以為有痰則白虎湯豈為治痰之劑乎第四疑在陽明篇第七十六節其節為病人無表裡證蓋言無頭痛項強惡寒之表證又無腹滿便硬之裡證也繼謂發熱七八日雖脈浮數者可下之此數語殊令人詫異夫脈浮宜汗脈數忌下人人皆知況其脈浮數並見而竟下之其病不愈而脈更加數也必矣故繼言假令已下脈數不解云云後則因消穀善飢久不大便而復以抵當湯下之夫寒溫之證脈數者必不思飲食未見有消穀善飢者且即消穀善飢不大便何以見其必有瘀血而輕投以抵當湯乎繼則又言若脈數仍不解而下不止云云是因一下再下而其人已下脫也夫用藥以解其脈數其脈數未解而轉致其下脫此其用藥誠為節節失宜而猶可信為仲景之原文乎試觀陽明篇第三十一節仲景對於下證如何鄭重將兩節文對觀則此節為偽作昭然矣夫古經之中猶不免偽作如尚書之今文至方術之書其有偽作也原無足深訝所望注疏家審為辨別而批判之不至貽誤於醫界則幸甚矣答徐陽旦湯之商榷陽旦湯即桂枝加桂湯再加附子蓋此係他醫所治之案其失處在證原有熱因腳攣誤認為寒竟於桂枝中增桂加附以致汗出亡陽遂至厥逆仲景因門人之問重申之而明其所以厥逆之故實因汗出亡陽若欲挽回此證使至夜半可愈宜先急用甘草乾薑湯以回其陽雖因汗多損液以致咽乾且液傷而大便燥結成陽明之譫語亦不暇顧逮夜半陽回腳伸惟脛上微拘急此非陽之未回實因液傷不能濡筋也故繼服芍藥甘草湯以復其津液則脛上拘急與咽喉作干皆愈更用承氣湯以通其大便則譫語亦遂愈也所用之藥息息與病機相符故病雖危險可挽回也答王問神州醫藥學報何以用真武湯治其熱日夜無休止立效傷寒論真武湯乃仲景救誤治之方其人本少陰煩躁醫者誤認為太陽煩躁而投以大青龍湯清之散之太過遂至其人真陽欲脫而急用真武湯以收回其欲脫之元陽此真武湯之正用也觀神州醫藥學報所述之案原系外感在半表半裡中無大熱故寒熱往來脈象濡緩而投以濕溫之劑若清之散之太過證可變為裡寒外熱即真寒假熱其元陽不固較少陰之煩躁益甚是以其熱雖日夜無休止口唇焦而舌苔黃膩其脈反細數微浮而濡也若疑脈數為有熱而數脈與細浮濡三脈並見實為元陽搖搖欲脫之候猶火之垂垂欲滅也急用真武湯以迎回元陽俾復本位則內不涼而外不熱矣是投以真武湯原是正治之法故能立建奇功此中原無疑義也特其語氣激昂務令筆鋒搖曳生姿於病情之變更用藥之精義皆未發明是以閲者未能瞭然也答劉問七傷大飽傷脾因脾主運化飲食飲食太飽脾之運化力不足以勝之是以受傷其作噫者因脾不運化氣鬱中焦其氣鬱極欲通故噫以通之其欲臥者因脾主四肢脾傷四肢痠懶是以欲臥其色黃者因脾屬土凡人之五臟何臟有病即現何臟所屬之本色此四診之中所以望居首也大怒氣逆傷肝因肝屬木木之條上達木之根下達為肝氣能上達故能助心氣之宣通肝系下連氣海上連心故能接引氣海中元氣上達於心為肝氣能下達故能助腎氣之疏泄腎主閉藏有肝氣以疏泄之二便始能通順大怒其氣有升無降甚而至於橫行其中所藏之相火亦遂因之暴動相火生於命門寄於肝膽遊行於三焦耗其血液所以傷肝而血即少肝開竅於目目得血而能視肝傷血少所以其目暗也形寒飲冷傷肺因肺為嬌臟冷熱皆足以傷之也蓋肺主皮毛形寒則皮毛閉塞肺氣不能宣通遂鬱而生熱此肺之因熱而傷也飲冷則胃有寒飲留滯變為飲邪上逆於肺而為懸飲此肺之因冷而傷也肺主氣開竅於鼻有病則咳肺傷所以氣少咳嗽鼻鳴也憂愁思慮傷心因人之神明藏於腦故腦為精明之府內經脈要精微論而發出在心故心為君主之官內經靈蘭祕典神明屬陽陽者主熱憂愁思慮者神明常常由心發露心血必因熱而耗是以傷心也心傷上之不能充量輸血於腦下之不能充量輸血於肝腦中之神失其憑藉故苦驚喜忘肝中之魂失其護衛故夜不能寐且肝中血少必生燥熱故又多怒也強力入房久坐濕地傷腎因腎有兩枚皆屬於水中藏相火為真陰中之真陽以統攝下焦真陰真陽之氣強力入房則傷陰久坐濕地則傷陽腎之真陰真陽俱傷所以傷腎腎傷則呼吸之時不能納氣歸根所以短氣腰者腎之腑腎傷所以腰疼骨者腎所主腎傷所以腳骨作疼至於厥逆下冷亦腎中水火之氣不能敷布之故也風雨寒暑傷形因風雨寒暑原天地之氣化雖非若癘疫不正之氣而當其來時或過於猛烈即與人身之氣化有不宜乃有時為時勢所迫或自不經意被風雨寒暑之氣侵其身體氣弱不能捍禦則傷形矣形傷則發落肌膚枯稿此猶木傷其本而害及枝葉也大恐懼不節傷志因志者為心之所之必以中正之官輔之此志始百折不回中正之官者膽也若過恐懼則膽失其司即不能輔心以成志所以傷志志傷則心有所圖而畏首畏尾所以恍惚不樂也答劉問濕溫治法之理由濕溫病狀純系濕熱鬱中致經絡閉塞故其外雖覺寒涼而內則小便短澀赤黃也為小便難水氣必多歸大腸所以兼泄瀉也其肢體痠痛者濕而兼風也胸膈痞滿者濕氣挾飲也欲治此症甚屬易易用滑石兩許煎湯送服阿斯匹林一片半汗出即愈蓋二藥一發汗一利水可令內蘊之濕由汗與小便而解且二藥之性皆涼其熱亦可隨之而解阿斯匹林又善愈關節疼痛也余用此方連治數人皆一汗而愈若熱劇者滑石或多用或加生石膏數錢與滑石同煎亦莫不隨手奏效也答劉問肝與脾之關係及肝病善作疼之理附肝脾雙理丸肝脾者相助為理之臟也人多謂肝木過盛可以克傷脾土即不能消食不知肝木過弱不能疏通脾土亦不能消食蓋肝之系下連氣海兼有相火寄生其中為其連氣海也可代元氣布化脾胃之健運實資其輔助為其寄生相火也可借火以生土脾胃之飲食更賴之熟腐故曰肝與脾相助為理之臟也特是肝為厥陰中見少陽其性剛果其氣條達故內經靈蘭祕典名為將軍之官有時調攝失宜拂其條達之性恆至激發其剛果之性而近於橫恣於斯脾胃先當其衝向之得其助者至斯反受其損而其橫恣所及能排擠諸臟腑之氣致失其和故善作疼也於斯欲制肝氣之橫恣而平肝之議出焉至平之猶不足制其橫恣而伐肝之議又出焉所用之藥若三稜莪朮青皮延胡鱉甲諸品放膽雜投毫無顧忌獨不思肝木於時應春為氣化發生之始若植物之有萌芽而竟若斯平之伐之其萌芽有不挫折毀傷者乎豈除此平肝伐肝之外別無術以醫肝乎何以本屬可治之證而竟以用藥失宜者歸於不治乎愚近擬得肝脾雙理丸凡肝脾不和飲食不消滿悶脹疼或厄逆噯氣嘔吐或泄瀉或痢疾或女子月事不調行經腹疼關於肝脾種種諸證服之莫不奏效爰録其方於下肝脾雙理丸甘草十兩細末生杭芍二兩細末廣條桂兩半去粗皮細末川紫朴兩半細末薄荷冰三錢細末冰片二錢細末硃砂三兩細末上藥七味將硃砂一兩與前六味和勺水泛為丸桐子大晾乾忌曬用所餘二兩硃砂為衣勿令餘剩上衣時以糯米濃汁代水且令堅實光滑方不走氣其用量常時調養每服二十粒至三十粒急用除病時可服至百粒或一百二十粒答徐問腹疼治法少年素有痃癖忽然少腹脹疼屢次服藥多系開氣行氣之品或不效或效而復發脈象無力以愚意見度之不宜再用開氣行氣之藥近在奉天有治腹疼二案詳録於下以備參考一為門生張少腹素有寒積因飲食失慎腸結大便不下少腹脹疼兩日飲食不進用萆麻油下之便行三次而疼脹如故又投以溫暖下焦之劑服後亦不覺熱而疼脹如故細診其脈沉而無力詢之微覺短氣疑係胸中大氣下陷先用柴胡二錢煎湯試服疼脹少瘥遂用生箭耆一兩當歸黨參各三錢升麻柴胡桔梗各錢半煎服一劑疼脹全消氣息亦順惟覺口中發乾又即原方去升麻黨參加知母三錢連服數劑全愈一為奉天史姓學生少腹疼痛頗劇脈左右皆沉而無力疑為氣血凝滯治以當歸丹參乳香沒藥各三錢萊蔔子二錢煎服後疼益甚且覺短氣再診其脈愈形沉弱遂改用升陷湯一劑而愈此亦大氣下陷迫擠少腹作疼是以破其氣則疼益甚升舉其氣則疼自愈也若疑因有痃癖作疼愚曾經驗一善化痃癖之法憶在籍時有人問下焦虛寒治法俾日服鹿角膠三錢取其溫而且補也後月餘晤面言服藥甚效而兼獲意外之效少腹素有積聚甚硬前竟忘言因連服鹿角膠已盡消蓋鹿角膠具溫補之性而又善通血脈林屋山人陽和湯用之以消硬疽是以有效也又嘗閲喻氏寓意草載有袁聚東痞塊危證治驗亦宜參觀答宗弟問右臂疼治法據來案云云臂疼當系因熱而愚再三思之其原因斷乎非熱或經絡間因瘀生熱故乍服辛涼之品似覺輕也蓋此證純為經絡之病治之者宜以經絡為重而兼顧其臟腑蓋欲藥力由臟腑而達經絡也西人治急性關節疼痛恆用阿斯匹林然用其藥宜用中藥健運脾胃通行經絡之品輔之又細閲素服之方皆佳所以不見效者大抵因少開痹通竊之藥耳今擬一方於下於白朮此藥藥房中多用麩炒殊非所宜當購生者自炒熟其大小片分兩次炒之軋細取淨末一兩乳香沒藥二藥須購生者軋成粗渣隔紙在鍋內烘融化取出晾乾軋細各取淨末四錢朱血竭此藥未研時外皮作黑色若研之色若硃砂者方真研細三錢當歸身紙裹置爐旁候乾軋細淨末七錢細辛香白芷細末各錢半冰片用樟腦升成者不必用梅片薄荷冰細末各三分諸藥和勻貯瓶密封每服一錢半絡石藤俗名爬山虎能蔓延磚壁之上其須自黏於壁上不落者方真煎湯送服日兩次方中之義以白朮健脾開痹為主神農本草經謂白朮逐風寒濕痹佐以白芷去風細辛去寒當歸乳香沒藥血竭以通氣活血冰片薄荷冰以透竅即以通絡且脾主四肢因其氣化先行於右右關候脾脈是明徵故右臂尤為脾之所主丁氏化學本草謂沒藥善養脾胃其溫通之性不但能治氣血痹疼更可佐白朮以健補脾胃故於此證尤宜也至阿斯匹林初次宜服半瓦以得微汗為度以後每日服兩次撙節服之不必令其出汗宜與自制末藥相間服之或先或後皆可後接來函按法治愈答周為母問疼風證治法詳觀病案曾患兩膝腫疼愈而復發膝踝趾骨皆焮熱腫痛連臀部亦腫又兼目痛此誠因心肝皆有鬱熱而關節經絡之間又有風濕熱相併陰塞血脈之流通故作腫疼也後見有胡張皆有答覆所論病因及治法又皆盡善盡美似無庸再為擬議然愚從前治此等證亦純用中藥後閲東人醫報見治急性僂麻質斯即熱性歷節風喜用西藥阿斯匹林載有歷治諸案可考驗後乃屢試其藥更以中藥駕馭之尤效驗異常在奉曾治一幼童得此證已危至極點奄奄一息數日未斷舁至院中亦治愈詳案在石膏解下由斯知西藥之性近和平試之果有效驗且洞悉其原質者固不妨與中藥並用也爰擬方於下以備採擇阿斯匹林一瓦半生懷山藥一兩鮮茅根去淨皮切碎二兩將山藥茅根煎湯三茶杯一日之間分三次溫服每次送服阿斯匹林半瓦若服一次周身得汗後二次阿斯匹林可少用至翌日三次皆宜少用以一日間三次所服之阿斯匹林有一次微似有汗即可不可每次皆有汗也如此服之大約兩旬即可愈矣答女士問疼經治法詳觀病案知系血海虛寒其中氣化不宣通也夫血海者衝脈也居臍之兩旁微向下男女皆有在女子則上承諸經之血下應一月之信有任脈以為之擔任帶脈以為之約束陽維陰維陽蹺陰蹺為之擁護督脈為之督攝內經所謂女子二七太衝脈盛月事以時下者此也有時其中氣化虛損或兼寒涼其宣通主力微遂至凝滯而作疼也而諸脈之擔任擁護督攝者亦遂連帶而作疼也斯當溫補其氣化而宣通之其疼自止爰擬方於下全當歸一兩生乳香一兩生沒藥一兩小茴香一兩炒熟魚鰾膠一兩豬脂炸脆川芎五錢甘松五錢此藥原香郁若陳腐者不用亦可共為細末每服二錢五分用真鹿角膠錢半煎湯送下日服兩次答王問時方生化湯當歸之味甘勝於辛性溫雖能助熱而濡潤多液又實能滋陰退熱原不可但以助熱論故神農本草經謂可治溫瘧且謂煮汁飲之尤良誠以煮汁則其液濃厚濡潤之功益勝也其性雖流通活血而用之得當亦能止血友人王曾小便溺血用黃酒煮當歸一兩飲之而愈後其症反復再服原方不效問治於僕俾用鴉膽子去皮五十粒白糖水送服而愈繼其症又反復用鴉膽子又不效仍用酒煎當歸法治愈又傅青主治老婦血崩用黃耆當歸各一兩桑葉十四片煎湯送服三七細末三錢甚效又單用醋炒當歸一兩煎服治血崩亦恆有效是當歸可用以活血亦可用以止血故其藥原名文無為其能使氣血各有所歸而又名當歸也産後血脈淆亂且兼有瘀血故可謂産後良藥至川芎其香竄之性雖甚於當歸然善升清陽之氣凡清陽下陷作寒熱者用川芎治之甚效而産後又恆有此證同邑趙姓之婦因臨盆用力過甚産後得寒熱症其家人為購生化湯二劑服之病頓愈蓋其臨盆努力之時致上焦清陽下陷故産後遂發寒熱至服生化湯而愈者全賴川芎升舉清陽之力也旬余寒熱又作其叔父知醫往省視之謂系産後瘀血為恙又兼受寒於活血化瘀藥中重加乾薑數劑後寒熱益甚連連飲水不能解渴當時仲夏身熱如炙又復嚴裹厚被略以展動即覺冷氣侵膚後僕診視左脈沉細欲無右脈沉緊皆有數象知其上焦清陽之氣下陷又為熱藥所傷也從前服生化湯借川芎升舉之力而暫愈然川芎能升舉清陽實不能補助清陽之氣使之充盛是以愈而又反復也為疏方黃耆玄參各六錢知母八錢時已彌月故可重用涼藥柴胡桔梗各錢半升麻一錢一劑而寒熱已又少為加減服數劑全愈由是觀之川芎亦産後之要藥也吳鞠通王士雄之言皆不可奉為定論惟發熱汗多者不宜用耳至包氏所定生化湯大致亦順適惟限於四點鐘內服完三劑未免服藥過多每次衝入紹酒一兩其性過熱又能醉人必多有不能任受者僕於婦人産後用生化湯原方加生懷山藥數錢其大便難者加阿膠數錢俾日服一劑連服三日停止亦必不至有産後病也答吳問病所問婦人血淋之症因日久損其脾胃飲食不化大便滑泄且血淋又兼砂淋洵為難治之症今擬一方生山藥一斤軋細末每用八錢加生車前子二錢同煮作粥送服三七細末生雞內金細末各五分每日兩次當點心用之日久可愈方中之意用山藥車前煮粥以治泄瀉而車前又善治淋疼又送服三七以治血淋內金以消砂淋且雞內金又善消食與山藥並用又為健補脾胃之妙品也惟內金生用則力大而稍有破氣之副作用若氣分過虛時宜先用生者軋細焙熟用之若服藥數日而血淋不見輕者可用蓽澄茄細末一分加西藥哥拜拔油一分同服又此症大便不止血淋亦無從愈若服山藥車前粥而瀉不止可將熟雞子黃二三枚捻碎調在粥中再煮一兩開服之答徐問其妻蕩漾病治法詳觀所述病案謂脈象滑動且得之服六味地黃丸之餘其為熱痰鬱於中焦以致胃氣上逆沖氣上衝浸成上盛下虛之症無疑為其上盛下虛所以時時有蕩漾之病也法當利痰清火降胃斂沖處一小劑久久服之氣化歸根蕩漾自愈擬方於下清半夏三錢柏子仁三錢生赭石三錢軋末生杭芍三錢生芡實一兩生薑三片磨生鐵鏽濃水煎藥方中之意用半夏赭石以利痰墜痰即以降胃安沖用芡實以固下焦氣化使藥之降者墜者有所底止且以收斂沖氣而不使再上衝也用芍藥以清肝火利小便即以開痰之去路用柏子仁以養肝血滋腎水即以調半夏之辛燥用生薑以透竅絡通神明即以為治痰藥之佐使至用鐵鏽水煎藥者誠以諸風眩暈皆屬於肝蕩漾即眩暈也此中必有肝風萌動以助胃氣衝氣之上升不已律以金能制木之理可借鐵鏽之金氣以鎮肝木更推以鐵能重墜引肝中所寄龍雷之火下降也況鐵鏽為鐵與養氣化合而成最善補養人之血分強健人之精神即久久服之於臟腑亦無不宜也答郭問小兒耳聾口啞治法小兒之耳聾口啞乃連帶相關之證也蓋小兒必習聞大人之言而後能言故小兒當未能言時或甫能言時驟然耳聾不聞必至啞不能言是以治此證者當專治其耳聾然耳聾之證有可治者有不可治者其不可治者耳膜破也其可治者耳中核絡有窒塞也用靈磁石一塊口中含之將細鐵條插耳內磁鐵之氣相感如此十二日耳之窒塞當通若仍不通宜口含鐵塊耳際塞磁石如此十二日耳中之窒塞當通矣答王質疑犀黃誠如兄言為西黃之誤蓋牛黃之好者出於高麗因高麗之牛大故所出之黃亦最美從前高麗清心丸甚佳以其有牛黃也特別之曰東牛黃而其價亦較昂青海西藏之地亦多出牛黃其成色亞於東牛黃故又別之曰西牛黃而其地原有犀遂又誤西為犀也紫石英弟恆用之治女子不育甚效其未經煆者其色紫而透徹大小皆作五稜者佳蓋白石英屬陰紫石英屬陽陰者宜六稜陽者宜五梭至鐘乳石蛇含石皆未用過不敢置論答黃問接骨方並論及接筋方接骨之方甚多然求其效而速者獨有一方可以公諸醫界方用甜瓜子生菜子各一兩小榆樹的鮮嫩白皮一兩再加真芝麻油一兩同搗如泥敷患處以布纏之不過半點鐘覺骨接上即去藥不然恐骨之接處起節自得此方後門人李曾用以治馬甚效想用以治人亦無不效也且試驗可在數刻之間設有不效再用他方亦未晚也人之筋骨相著然骨以剛而易折筋以韌而難斷是以方書中治接骨之方甚夥而接筋之方甚鮮也諸家本草多言旋覆花能續斷筋群芳譜謂葍根能續斷筋葍根愚未試過至旋覆花邑中有以之治牛馬斷筋者甚效其方初則祕而不傳當耕地之時牛馬多有因驚駭奔逸被犁頭剷斷腿上筋者敷以所制之藥過兩旬必愈後愚為其家治病始詳言其方且言此方受之異人本以治人而以治物類亦無不效因將其方詳録於下方用旋覆花細末五六錢加白蔗糖兩許和水半茶杯同熬成膏候冷加麝香少許無麝香亦可攤布上纏傷處至旬日將藥揭下筋之兩端皆長一小疙瘩再換藥一帖其兩小疙瘩即連為一而斷者續矣若其筋斷在關節之處又必須設法閉住勿令其關節屈伸筋方能續按外臺祕要有急續斷筋方取旋覆花根洗淨搗敷創上日一二易瘥止是取其鮮根搗爛用之也因藥房無旋覆花根是以後世用者權用其花想性亦相近故能奏效答任問病三則問治蛇咬法驗方新編治蛇咬法用吸煙筒中油子涼水衝出冷飲之按此方甚驗設猶不效可用其相畏之物治之蛇之所畏者蜈蚣雄黃也擬方用全蜈蚣三條雄黃二錢共為末分三包每用一包甘草蚤休各二錢煎湯送下日服二次旬日當愈問治頑癬法及足底癢治法大楓子去皮將仁搗如泥加白砒細末少許少少的和豬脂調膏敷之此劇方也又用鮮曼陀羅熬膏梗葉花實皆可用加鴉膽子細末去皮研細調和作膏藥貼之此為和平方足底癢可用蛇蛻三條甘草二錢煎水飲之再將渣重煎熏洗半月可愈問喉症治法初秋時用大西瓜一個重約七八斤開一口裝入硼砂火硝細末各一斤仍將開下之皮堵上將西瓜裝於新出窯之瓦罐中瓦罐須未經水濕者將罐口嚴封懸於不動煙火不通空氣之靜室中過旬日視罐外透出白霜掃下每霜一兩調入薄荷冰二分瓶貯勿令泄氣遇紅腫喉症點之即消答黃問創傷及跌打損傷外敷內服止疼化瘀方外敷用生赤石脂細末旱三七細末等分和勻敷之立能止血止疼內服用旱三七細末二錢西藥臭剝細末二分同服下立能化瘀止疼孫按凡創傷跌打損傷用白附止痛粉甚佳今將該方列下白附子六兩白芷五錢羌活五錢防風五錢南星五錢均生用共軋末青腫者童便調塗破則干撒之雖腎子破出可能立止痛生肌止血去瘀且不忌風真良方也答陳疑內經十二經有名無質天下之妙理寓於迹象之中實超於迹象之外彼拘於迹象以索解者縱於理能窺其妙實未能窮其極妙也如九十六號紹興星期報陳因研究剖解之學者於十二經之起止莫能尋其迹象遂言內經所言十二經無可考據非無據也因其理甚玄妙超於迹象之外非常識所能索解也夫內經之靈樞原名針經故欲究十二經之奧妙非精針灸者不能得其實際愚於針灸非敢言精而嘗與友人盧遼陽人最精針灸得之祖傳談及此事盧謂斯可即余針愈疔毒之案以徵明之庚申八月間族妹左手少陽經關衝穴生疔至二日疼甚為刺耳門二穴立愈關衝為手少陽經之所起耳門為手少陽經之所止也又辛酉七月中族中男孫七歲在右足太陰經隱白穴生疔三日腫至膝下疼甚劇取右三陰交及公孫二穴刺之立愈隱白穴為足太陰經之所起公孫三陰交為足太陰經之所歷也設若刺其處仍不愈者刺太陰經止處之大包穴亦無不愈矣又於辛酉八月間本村田姓婦在手陽明二間穴生疔腫過手腕為刺曲池迎香二穴當時疼立止不日即消二間雖非陽明經起之處距經起處之商陽穴不過二寸曲池則經歷之處迎香則經止之處也又於九月中學生吳在手太陰經太淵穴生疔紅腫之線已至俠氣戶木不知疼噁心嘔吐診其脈象洪緊右寸尤甚知系太陰之毒火所發為刺本經尺澤中府及肺俞患處覺疼噁心嘔吐立止紅線亦立回半日全愈太淵距本經起處之少商穴不過三寸強中府則本經之所起也尺澤則本經之所歷也肺俞則本經之所注也由是觀之疔生於經之起處刺經之止處生於經之止處刺經之起處皆可隨手奏效則經之起處與止處非有一氣貫通之妙何以神效如是哉治瘋犬傷方瘋犬傷證甚為危險古方用斑蝥雖能治愈然百日之內忌見水忌聞鑼聲忌食諸豆忌行苘麻之地及手摩苘麻又須切忌房事百日犯以上所忌其證仍反復如此保養甚不易也歙縣友人胡深憫患此證者不易挽救曾登紹興醫報徵求良方繼有江東束登報相告謂曾用金匱下瘀血湯治愈二人又繼有江西黃登報相告謂系異人傳授一方用大蜈蚣一條大黃一兩甘草一兩煎湯服甚驗如服後病者稍安靜未幾又發再依此方續服病必愈乃可止後附有治驗之案二則皆瘋已發動服此藥治愈者按此方誠為至善良方胡謂俗傳冬令蛇藏土洞口銜或泥或草逮至春日出蟄口吐所銜之物犬嗅之即成瘋犬此理可信蓋犬性善嗅有殊異之氣味輒喜嗅之是以獨中其毒而瘋後咬人是蛇之毒遞傳於人也方中用蜈蚣一條則蛇毒可解矣又此證束氏謂曾用金匱下瘀血湯治愈兩人由斯知此證必有瘀血下之則可愈方中用大黃一兩其瘀血當可盡下又加甘草一兩既善解毒又能緩大黃之峻攻此所以為良方也然此方善矣而未知愈後亦多禁忌否若仍然有禁忌是善猶未盡善也而愚在奉天時得其地相傳之方凡用其方者服後即脫然無纍百無禁忌真良方也其方用片灰即槍藥之軋成片者系硫黃火硝木炭製成三錢鮮枸杞根三兩煎湯送下必自小便下惡濁之物若干而愈愈後惟禁房事旬日然藥不可早服必被傷後或五六日或七八日覺內風萌動騷擾不安然後服之方效此乃屢試屢效之方萬無閃失也枸杞根即藥中之地骨皮然地骨但用根上之皮茲則連皮中之木用之又吳縣友人陸於丁卯中秋相遇於津門論及此證陸言凡瘋狗脊骨中皆有毒蟲若將其脊骨中脂膜刮下炮作炭服之可自二便中下惡濁之物即愈有族孫患此證治以此方果愈然所慮者齧人之瘋犬未必能獲之也又無錫友人周小農曾登山西醫學雜志論治瘋犬咬傷之方謂歲己丑象邑多瘋犬遭其害者治多無效適有耕牛亦遭此患而斃剖其腹有血塊大如斗黧紫攪之蠕蠕然動一方驚傳異事有張君者曉醫理聞之悟曰仲景云瘀熱在裡其人發狂又云其人如狂者血證諦也下血狂乃愈今犯此證者大抵如狂如癲得非瘀血為之乎不然牛腹中何以有此怪物耶吾今得其要矣於斯用仲景下瘀血湯治之不論證之輕重毒之發與未發莫不應手而愈轉以告人百不失一其所用之方將古時分量折為今時分量而略有變通方用大黃三錢桃仁七粒地鱉蟲去足炒七個共為細末加蜂蜜三錢用酒一茶碗煎至七分連渣服之如不能飲酒者水酒各半煎服亦可服後二便當下惡濁之物日進一劑逮二便如常又宜再服兩劑總要大小便無纖毫惡濁為度服此藥者但忌房事數日其餘則一概不忌若治小兒藥劑減半妊婦亦可放膽服之切莫忌較按服此方果如上所云云誠為佳方附記同邑友人張據周云其戚某得一治瘋犬咬傷祕法其方系用白雄雞一隻取其嘴及腿之下截連爪及其膽肫皮翅尖翎尾上翎加銀硃三錢鰾須三寸用綿紙三四張裹之縞麻扎緊用香油四兩浸透以火燃之余油亦澆其上燒為炭研末黃酒送服通身得汗即愈愈後除忌房事旬日外余無所忌屢試屢驗解砒石毒兼解火柴毒方初受其毒者在胃上脘用生石膏一兩生白礬五錢共軋細先用雞子清七枚調服一半即當吐出若猶未吐或吐亦不多再用生雞子清七枚調服餘一半必然湧吐吐後若有餘熱單用生石膏細末四兩煮湯兩大碗將碗置冰水中或新汲井泉水中俾速冷分數次飲下以熱消為度若其毒已至中脘不必用吐藥可單用生石膏細末二三兩如前用雞子清調服酌熱之輕重或兩次服完或三次四次服完毒解不必盡劑且熱消十之七八即不宜再服石膏末宜仍如前煮生石膏湯飲之以消其餘熱若其毒已至下脘宜急導之下行自大便出用生石膏細末二兩芒硝一兩如前用雞子清調服毒甚者一次服完服後若有餘熱可如前飲生石膏湯此方前後雖不同而總以石膏為主此乃以石治石以石之涼者治石之熱者愚用此方救人多矣雖在垂危之候放膽用之亦可挽救附録崔來函介紹三方外傷甚重救急方神授普濟五行妙化丹治外傷甚重其人呼息已停或因驚嚇而猝然罔覺甚至氣息已斷急用此丹一釐點大眼角男左女右再用三分以開水吞服其不知服者開水沖藥灌之須臾即可蘇醒並治一切暴病霍亂痧證小兒痙癇火眼牙疳紅白痢疾等證皆效爰録其方於下火硝八兩皂礬二兩明雄黃一兩辰砂三錢真梅片二錢共為極細末瓶貯勿令泄氣戊辰冬本鎮有吳姓幼童年六歲由牛馬廠經過一牛以角抵入幼童口中破至耳邊血流不止幼童已死此童無祖無父其祖母及其母聞之皆嚇死急迎為挽救即取食鹽炒熱尉丹田用妙化丹點大眼角幼童即活再用妙化丹點其祖母及其母大眼角須臾亦活再用灰錳氧將幼童傷處內外洗淨外以膠布貼之加綁扎內食牛乳三日後視之已生肌矣又每日用灰錳氧沖水洗之兩旬全愈愈後並無疤痕又一九一七年四月中旬潛邑張港一婦人二十餘歲因割麥爭界言語不周被人舉足一踢仆地而死經數醫生有用吹鼻者有用鵝換氣者有用烏梅擦牙者百方千方種種無效求為往視其身冷如冰牙關緊閉一日有餘矣而其胸猶微溫急用妙化丹點其大眼角用食鹽二斤炒熱作兩包尉其丹田輪流更換得暖氣以助生氣二炷香之久牙關已開遂用紅糖衝開水服之即活又乙丑季夏上旬曾治劉年過四旬因分家起爭被其弟用刀傷臍下其腸流出盈盆忽然上氣喘急大汗如雨經數醫診治皆無把握因迎生速往診視觀其形狀危險有將脫之勢遂急用生黃耆淨萸肉生山藥各一兩固其氣以防其脫煎湯服後喘定汗止檢視其腸已破流有糞出遂先用灰錳氧沖水將糞血洗淨所破之腸又急用桑根白皮作線為之縫好再略上磺碘將其腸慢慢納進再用洋白線將肚皮縫好又用紗布浸灰錳氧水中候溫復其上用白士林少調磺碘作藥棉復其上用繃帶扎住一日一換內服用衷中參西録內託生肌散變為湯劑一日煎渣再服三星期全愈按此證未嘗用妙化丹因其傷重而且險竟能救愈洵堪為治此重傷者之表準故連類及之且所用內託生肌散為愚治瘡毒破後生肌之方凡瘡破後潰爛不速生肌者用之最效若欲將散劑變為湯劑宜先將天花粉改為四兩一劑分作八劑一日之間煎渣再服其生肌之力較服散藥尤效服食松脂法抱朴子內篇載有上黨趙姓身患癩病歷年不愈後遇異人指示服松脂百日癩病全愈初不知松脂為何物後參閲群書知松脂即是松香解毒除濕消腫止痛生肌化痰久服輕身延年辟穀不飢萬國藥方久咳丸系松脂甘草並用向曾患咳嗽百藥不效後每服松脂乾末一錢用涼茶送服月餘咳嗽全愈至今十年未嘗反復精神比前更強壯觀此松脂實有補髓健骨之力又丁卯夏川鄂戰爭救一兵士子彈由背透胸出由傷處檢出碎骨若干每日令食牛乳山藥數日飲食稍進口吐臭膿不能坐立後每日令服松脂兩次每次一錢三日後臭膿已盡傷口內另長新骨月餘傷口全平行步如常又一兵士李過食生冷身體浮腫腹大如箕百藥罔效令每日服松脂三錢分三次服下五日全愈鄉村一男子患肝癰潰破醫治五年不愈潰穿二孔日出臭水碗許口吐膿血臭氣異常戊辰孟夏迎為診治視其形狀危險萬分辭而不治再三懸求遂每早晚令服松脂一錢五日臭膿減少瘡口合平照前服之半月全愈又有患肺癰者服林屋山人犀黃丸不效而服松脂輒效者難以枚舉矣止咳方家母年五十時患咳嗽百藥不效嚴冬時臥不安枕遇一老醫傳授一方系米殼四兩北五味三錢杏仁去皮炒熟五錢枯礬二錢共為細末煉蜜為丸梧桐子大每服二十丸白糖開水送下吞服數日病若失永不復發家母生於甲辰現年八十有六貌若童顏以後用此丸療治咳嗽全愈者筆難悉述以上二三方皆為尋常藥品而能愈此難愈之大證且又屢試屢效誠佳方也五醫案一虛勞喘嗽門虛勞證陽亢陰虧天津張媼年九十二歲得上焦煩熱病病因平素身體康強所稟元陽獨旺是以能享高年至八旬後陰分浸衰陽分偏盛胸間恆覺煩熱延醫服藥多用滋陰之品始愈逮至年過九旬陰愈衰而陽愈亢仲春陽氣發生煩熱舊病反復甚劇證候胸中煩熱異常劇時若屋中莫能容恆至堂中當戶久坐以翕收庭中空氣有時覺心為熱迫怔忡不寧大便乾燥四五日一行甚或服藥始通其脈左右皆弦硬間現結脈至數如常診斷證脈細參純系陽分偏盛陰分不足之象然所以享此大年實賴元陽充足此時陽雖偏盛當大滋真陰以潛其陽實不可以苦寒瀉之至脈有結象高年者雖在所不忌而究系氣分有不足之處宜以大滋真陰之藥為主而少加補氣之品以調其脈處方生懷山藥一兩玄參一兩熟懷地黃一兩生懷地黃八錢天冬八錢甘草二錢大甘枸杞八錢生杭芍五錢野臺參三錢赭石六錢軋細生雞內金二錢黃色的搗共煎三大盅為一日之量徐徐分多次溫飲下方解方中之義重用涼潤之品以滋真陰少用野臺參三錢以調其脈猶恐參性溫升不宜於上焦之煩熱又倍用生赭石以引之下行且此證原艱於大便赭石又能降胃氣以通大便也用雞內金者欲其助胃氣以運化藥力也用甘草者以其能緩脈象之弦硬且以調和諸涼藥之性也效果每日服藥一劑至三劑煩熱大減脈已不結且較前柔和遂將方中玄參生地黃皆改用六錢又加龍眼肉五錢連服五劑諸病皆愈虛勞兼勞碌過度天津寧氏婦年近四旬素病虛勞偶因勞碌過甚益增劇病因處境不順家務勞心飲食減少浸成虛勞已病倒臥懶起床矣又因訟事強令公堂對質勞苦半日歸家病大加劇證候臥床閉目昏昏似睡呼之眼微開不發言語有若能言而甚懶於言者其面色似有浮熱體溫問其心中發熱乎覺怔忡乎皆頷之其左脈浮而弦硬右脈浮而芤皆不任重按一息六至兩日之間惟少飲米湯大便數日未行小便亦甚短少診斷即其脈之左弦右芤且又浮數無根知系氣血虧極有陰陽不相維繫之象是以陽氣上浮而面熱陽氣外越而身熱此乃虛勞中極危險之證也所幸氣息似稍促而不至於喘雖有咳嗽亦不甚劇知尤可治斯當培養其氣血更以收斂氣血之藥佐之俾其陰陽互相維繫即可安然無虞矣處方野臺參四錢生懷山藥八錢淨萸肉八錢生龍骨八錢搗碎大甘枸杞六錢甘草二錢生懷地黃六錢玄參五錢沙參五錢生赭石五錢軋細生杭芍四錢共煎湯一大盅分兩次溫飲下復診將藥連服三劑已能言語可進飲食浮越之熱已斂體溫度下降至心中已不發熱有時微覺怔忡大便通下一次小便亦利遂即原方略為加減俾再服之處方野臺參四錢生懷山藥一兩大甘枸杞八錢淨萸肉六錢生懷地黃五錢甘草二錢玄參五錢沙參五錢生赭石四錢軋細生杭芍三錢生雞內金錢半黃色的搗共煎湯一大盅溫服方解方中加雞內金者因虛勞之證脈絡多瘀金匱所謂血痹虛勞也用雞內金以化其血痹虛勞可以除根且與臺參並用又能運化參之補力不使作脹滿也效果將藥連服四劑新得之病全愈其素日虛勞未能盡愈俾停服湯藥日用生懷山藥細末煮粥少加白糖當點心服之每服時送服生雞內金細末少許以善其後肺勞咳嗽由於伏氣化熱所傷證瀋陽高三十二歲因伏氣化熱傷肺致成肺勞咳嗽證病因臘底感受寒涼未即成病而從此身不見汗繼則心中漸覺發熱至仲春其熱加甚飲食懶進發生咳嗽浸成肺勞病證候其咳嗽晝輕夜重時或咳而兼喘身體羸弱筋骨痠疼精神時昏憒腹中覺飢而飲食恆不欲下咽從前惟心中發熱今則日昳時身恆覺熱大便燥小便短赤脈左右皆弦長右部重按有力一息五至診斷此病之原因實由伏氣化熱久留不去不但傷肺而兼傷及諸臟腑也按此證自述因臘底受寒若當時即病則為傷寒矣乃因所受之寒甚輕不能即病惟伏於半表半里三焦脂膜之中阻塞氣化之升降流通是以從此身不見汗而心漸發熱逮時至仲春陽氣萌動原當隨春陽而化熱以成溫病內經謂冬傷於寒春必病溫乃其所化之熱又非如溫病之大熱暴發能自里達表而惟緣三焦脂膜散漫於諸臟腑是以胃受其熱而懶於飲食心受其熱而精神昏憒腎受其熱而陰虛潮熱肝受其熱而筋骨痠疼至肺受其熱而咳嗽吐痰則又其顯然者也治此證者當以清其伏氣之熱為主而以滋養津液藥輔之處方生石膏一兩搗碎黨參三錢天花粉八錢玄參八錢生杭芍五錢甘草錢半連翹三錢滑石三錢鮮茅根三錢射干三錢生遠志二錢共煎湯一大盅半分兩次溫服若無鮮茅根可以鮮蘆根代之方解方中之義用石膏以清伏氣之熱而助之以連翹茅根其熱可由毛孔透出更輔之以滑石杭芍其熱可由水道瀉出加花粉玄參者因石膏但能清實熱而花粉玄參兼能清虛熱也用射干遠志者因石膏能清肺寧嗽而佐以射干遠志更能利痰定喘也用甘草者所以緩諸涼藥之下趨不欲其寒涼侵下焦也至加黨參者實仿白虎加人參湯之義因身體虛弱者必石膏與人參並用始能逐久匿之熱邪外出也復診將藥連服四劑熱退三分之二咳嗽吐痰亦愈強半飲食加多脈象亦見緩和知其伏氣之熱已消所餘者惟陰虛之熱也當再投以育陰之方俾多服數劑自能全愈處方生懷山藥一兩大甘枸杞八錢玄參五錢生懷地黃五錢沙參五錢生杭芍三錢生遠志二錢川貝母二錢生雞內金錢半黃色的搗甘草錢半共煎湯一大盅溫服方中加雞內金者不但欲其助胃消食兼欲借之以化諸藥之滯泥也效果將藥連服五劑病遂全愈而夜間猶偶有咳嗽之時俾停服湯藥日用生懷山藥細末煮作粥調以白糖當點心服之以善其後虛勞咳嗽兼外感實熱證撫順一童九歲因有外感實熱久留不去變為虛勞咳嗽證病因從前曾受外感熱入陽明醫者純用甘寒之藥清之致病愈之後猶有些些餘熱稽留臟腑久之陰分虧耗浸成虛勞咳嗽證證候心中常常發熱有時身亦覺熱懶於飲食咳嗽頻吐痰涎身體瘦弱屢服清熱寧嗽之藥即稍效病仍反復其脈象弦數右部尤弦而兼硬診斷其脈象弦數者熱久涸陰血液虧損也其右部弦而兼硬者從前外感之餘熱猶留滯於陽明之腑也至其咳嗽吐痰亦熱久傷肺之現象也欲治此證當以清其陽明餘熱為初步熱清之後再用藥滋養其真陰病根自不難除矣處方生石膏兩半搗細大潞參三錢玄參五錢生懷山藥五錢鮮茅根三錢甘草二錢共煎湯一盅半分兩次溫飲下若無鮮茅根時可用鮮蘆根代之方解此方即白虎加人參湯以玄參代知母生山藥代粳米而又加鮮茅根也蓋陽明久郁之邪熱非白虎加人參湯不能清之為其病久陰虧故又將原方少為變通使之兼能滋陰也加鮮茅根者取其具有升發透達之性與石膏並用能清熱兼能散熱也復診將藥煎服兩劑身心之熱大減咳嗽吐痰已愈強半脈象亦較前和平知外邪之熱已清宜再用藥專滋其陰分俾陰分充足自能盡消其餘熱也處方生懷山藥一兩大甘枸杞八錢生懷地黃五錢玄參四錢沙參四錢生杭芍三錢生遠志二錢白朮二錢生雞內金二錢黃色的搗甘草錢半共煎湯一盅溫服效果將藥連服三劑飲食加多諸病皆愈方解陸九芝謂凡外感實熱之證最忌但用甘寒滯泥之藥治之其病縱治愈亦恆稽留餘熱永錮閉於臟腑之中不能消散致熱久耗陰浸成虛勞不能救藥者多矣此誠見道之言也而愚遇此等證其虛勞不至過甚且脈象仍有力者恆治以白虎加人參湯復略為變通使之退實熱兼能退虛熱約皆可隨手奏效也勞熱咳嗽鄰村許姓學生年十八歲於季春得勞熱咳嗽證病因秉性剛強勞心過度又當新婚之餘或年少失保養逮至春陽發動漸成勞熱咳嗽證證候日晡潮熱通夜作灼至黎明得微汗其灼乃退白晝咳嗽不甚劇夜則咳嗽不能安枕飲食減少身體羸瘦略有動作即氣息迫促左右脈皆細弱重按無根數逾七至夫脈一息七至即難挽回況復逾七至乎猶幸食量猶佳大便乾燥此等證忌滑瀉知猶可治擬治以峻補真陰之劑而佐以收斂氣化之品處方生懷山藥一兩大甘枸杞八錢玄參六錢生懷地黃六錢沙參六錢甘草三錢生龍骨六錢搗碎淨萸肉六錢生杭芍三錢五味子三錢搗碎牛蒡子三錢搗碎共煎湯一大盅溫服方解五味入湯劑藥房照例不搗然其皮味酸核味辛若囫圇入煎則其味過酸服之恆有滿悶之弊故徐靈胎謂宜與乾薑之味辛者同服若搗碎入煎正可惜其核味之辛以濟皮味之酸無事伍以乾薑而亦不發滿悶是以欲重用五味以治嗽者當注意令其搗碎或説給病家自檢點至於甘草多用至三錢者誠以此方中不但五味酸萸肉亦味酸若用甘草之至甘者與之化合可增加其補益之力如酸能齼齒得甘則不齼齒是明徵是以多用至三錢復診將藥連服三劑灼熱似見退不復出汗咳嗽亦稍減而脈仍七至強因恍悟此脈之數不但因陰虛實亦兼因氣虛猶若力小而強任重者其體發顫也擬仍峻補其真陰再輔以補氣之品處方生懷山藥一兩野臺參三錢大甘枸杞六錢玄參六錢生懷地黃六錢甘草三錢淨萸肉五錢天花粉五錢五味子三錢搗碎生杭芍三錢射干二錢生雞內金錢半黃色的搗共煎一大盅溫服為方中加臺參恐服之作悶是以又加雞內金以運化之且凡虛勞之甚者其脈絡間恆多瘀滯雞內金又善化經絡之瘀滯也三診將藥連服四劑灼熱咳嗽已愈十之七八脈已緩至六至此足徵補氣有效也爰即原方略為加減多服數劑病自除根處方生懷山藥一兩野臺參三錢大甘枸杞六錢玄參五錢生懷地黃五錢甘草二錢天冬五錢淨萸肉五錢生杭芍三錢川貝母三錢生遠志二錢生雞內金錢半黃色的搗共煎一大盅溫服效果將藥連服五劑灼熱咳嗽全愈脈已復常遂停服湯劑俾日用生懷山藥細末煮作茶湯兌以鮮梨自然汁當點心服之以善其後肺勞喘嗽遺傳性證天津陳年十八歲自幼得肺勞喘嗽證病因因其母素有肺勞病再上推之其外祖母亦有斯病是以自幼時因有遺傳性亦患此病證候其證初時猶輕至熱時即可如常人惟略有感冒即作喘嗽治之即愈不治則兩三日亦可自愈至過十歲則漸加重熱時亦作喘嗽冷時則甚於熱時服藥亦可見輕旋即反復至十六七歲時病又加劇屢次服藥亦無效然猶可支持也逮愚為診視在一九三年仲冬其時病劇已難支持晝夜伏几喘而且嗽咳吐痰涎連連不竭無論服何中藥皆分毫無效惟日延西醫注射藥針一次雖不能止咳喘而可保當日無虞診其脈左右皆弦細關前微浮兩尺重按無根診斷此等證原因肺臟氣化不能通暢其中諸細管即易為痰涎滯塞熱時肺胞鬆緩故病猶輕至冷時肺胞緊縮是以其病加劇治之者當培養其肺中氣化使之闟闢有力更疏瀹其肺中諸細管使之宣通無滯原為治此病之正規也而此證兩尺之脈無根不但其肺中有病其肝腎實亦有病且病因又為遺傳性原非一蹴所能治愈當分作數步治之處方生懷山藥一兩大甘枸杞一兩天花粉三錢天冬三錢生杭芍三錢細辛一錢射干三錢杏仁二錢去皮五味子二錢搗碎葶藶子二錢微炒廣三七二錢搗細藥共十一味前十味煎湯一大盅送服三七末一錢至煎渣再服時仍送服餘一錢方解方中用三七者恐肺中之氣窒塞肺中之血亦隨之凝滯三七為止血妄行之聖藥更為流通瘀血之聖藥故於初步藥中加之復診將藥連服四劑咳喘皆愈三分之二能臥睡兩三點鐘其脈關前不浮至數少減而兩尺似無根擬再治以納氣歸腎之方處方生懷山藥一兩大甘枸杞一兩野黨參三錢生赭石六錢軋細生懷地黃六錢生雞內金錢半黃色的搗淨萸肉四錢天花粉四錢天冬三錢牛蒡子三錢搗碎射干二錢共煎湯一大盅溫服方解參之性補而微升惟與赭石並用其補益之力直達湧泉況咳喘之劇者其沖胃之氣恆因之上逆赭石實又為降胃鎮沖之要藥也至方中用雞內金者因其含有稀鹽酸原善化肺管中之瘀滯以開其閉塞又兼能運化人參之補力不使作滿悶也三診將藥連服五劑咳喘皆愈惟其脈仍逾五至行動時猶覺氣息微喘此乃下焦陰分猶未充足不能與陽分相維繫也此當峻補其真陰俾陰分充足自能維繫其陽分氣息自不上奔矣處方生懷山藥一兩大甘枸杞一兩熟懷地黃一兩淨萸肉四錢玄參四錢生遠志錢半北沙參四錢懷牛膝三錢大雲苓片二錢蘇子二錢炒搗牛蒡子二錢搗碎生雞內金錢半共煎湯一大盅溫服效果將藥連服八劑行走動作皆不作喘其脈至數已復常從此停服湯藥俾日用生懷山藥細末水調煮作茶湯少調以生梨自然汁當點心用之以善其後肺勞痰喘天津徐年三十四歲得肺勞痰喘證病因因弱冠時遊戲競走努力過度傷肺致有喘病入冬以來又兼咳嗽證候平素雖有喘證然安養時則不犯入冬以來寒風陡至出外為風所襲忽發咳嗽咳嗽不已喘病亦發咳喘相助為虐屢次延醫服藥不愈夜不能臥其脈左部弦細而硬右部濡而兼沉至數如常診斷此乃氣血兩虧並有停飲之證是以其左脈弦細者氣虛也弦細兼硬者肝血虛津液短也其右脈濡者濕痰留飲也濡而兼沉者中焦氣化亦有所不足也其所以喘而且嗽者亦痰飲上溢之所迫致也擬用小青龍湯再加滋補之藥治之處方生懷山藥一兩當歸身四錢天冬四錢寸麥冬四錢生杭芍三錢清半夏三錢桂枝尖二錢五分五味子二錢搗碎杏仁二錢去皮乾薑錢半細辛一錢甘草錢半生薑三片共煎一大盅溫飲下方解凡用小青龍湯喘者去麻黃加杏仁此定例也若有外感之熱者更宜加生石膏此證無外感之熱故但加二冬以解薑桂諸藥之熱復診將藥煎服一劑其喘即愈又繼服兩劑咳嗽亦愈強半右脈已不沉似稍有力左脈仍近弦硬擬再以健胃養肺滋生血脈之品處方生懷山藥一兩生百合五錢大枸杞子五錢天冬五錢當歸身三錢蘇子錢半炒搗川貝母三錢白朮三錢炒生薏米三錢搗碎生遠志二錢生雞內金錢半黃色的搗甘草錢半共煎湯一大盅溫服效果將藥連服四劑咳嗽全愈脈亦調和如常矣肺勞喘咳天津羅年三十四歲得肺勞喘嗽病病因數年之前曾受肺風發咳嗽治失其宜病雖暫愈風邪錮閉肺中未去致成肺勞喘嗽證證候其病在暖燠之時甚輕偶發喘嗽一半日即愈至冬令則喘嗽連連必至天氣暖和時始漸愈其脈左部弦硬右部濡滑兩尺皆重按無根診斷此風邪錮閉肺中久而傷肺致肺中氣管滯塞暖時肌肉鬆緩氣管亦隨之鬆緩其呼吸猶可自如冷時肌肉緊縮氣管亦隨之緊縮遂至吸難呼易而喘作更因痰涎壅滯而嗽作矣其脈左部弦硬者肝腎之陰液不足也右部濡滑者肺胃中痰涎充溢也兩尺不任重按者下焦氣化虛損不能固攝則上焦之喘嗽益甚也欲治此證當先宣通其肺俾氣管之郁者皆開後再投以滋陰培氣肺腎雙補之劑以祓除其病根處方麻黃錢半天冬三錢天花粉三錢牛蒡子三錢搗碎杏仁二錢去皮搗碎甘草錢半蘇子二錢炒搗生遠志二錢去心生麥芽二錢生杭芍二錢細辛一錢共煎湯一大盅溫服復診將藥煎服兩劑喘嗽皆愈而勞動時仍微喘其脈左部仍似弦硬右部仍濡不若從前之滑兩尺猶虛此病已去而正未復也宜再為謀根本之治法而投以培養之劑處方野臺參三錢生赭石八錢軋細生懷山藥一兩熟懷地黃一兩生懷地黃一兩大雲苓片二錢大甘枸杞六錢天冬六錢淨萸肉五錢蘇子三錢炒搗牛蒡子三錢搗碎共煎一大盅溫服方解人參為補氣主藥實兼具上升之力喻嘉言謂氣虛欲上脫者專用之轉氣高不返是以凡喘逆之證皆不可輕用人參惟重用赭石以引之下行轉能納氣歸腎而下焦之氣化遂因之壯旺而固攝此方中人參赭石並用不但欲導引肺氣歸腎實又因其兩尺脈虛即藉以培補下焦之氣化也效果將藥連服十餘劑雖勞動亦不作喘再診其脈左右皆調和無病兩尺重按不虛遂將赭石減去二錢俾多服以善其後肺勞喘嗽兼不寐證天津于姓媼年近五旬咳嗽有痰微喘且苦不寐病因夜間因不能寐心中常覺發熱久之則肺臟受傷咳嗽多痰且微作喘證候素本夜間不寐至黎明時始能少睡後因咳嗽不止痰涎壅盛且復作喘不能安臥恆至黎明亦不能睡因之心中發熱益甚懶於飲食大便乾燥四五日一行兩旬之間大形困頓屢次服藥無效其脈左部弦而無力右部滑而無力數逾五至診斷此真陰虧損心腎不能相濟是以不眠久則心血耗散心火更易妄動以上鑠肺金是以咳嗽有痰作喘治此證者當以大滋真陰為主真陰足則心腎自然相交以水濟火而火不妄動真陰足則自能納氣歸根氣息下達而呼吸自順且肺腎為子母之臟原相連屬子虛有損於母子實即有益於母果能使真陰充足則肺金既不受心火之鑠耗更可得腎陰之津潤自能復其清肅下行之常其痰涎咳嗽不治自愈也若更輔以清火潤肺化痰寧嗽之品則奏效當更捷矣處方沙參一兩大枸杞一兩玄參六錢天冬六錢生赭石五錢軋細甘草二錢生杭芍三錢川貝母三錢牛蒡子一錢搗碎生麥芽三錢棗仁三錢炒搗射干二錢共煎湯一大盅溫服復診將藥連服六劑咳喘痰涎愈十分之八心中已不發熱食欲已振夜能睡數時大便亦不甚燥診其脈至數復常惟六部重按仍皆欠實左脈仍有弦意擬再峻補其真陰以除病根所謂上病取諸下也處方生懷山藥一兩大枸杞一兩遼沙參八錢生懷地黃六錢熟懷地黃六錢甘草二錢生赭石六錢軋細淨萸肉四錢生杭芍三錢生麥芽三錢生雞內金針半黃色的搗共煎湯一大盅溫服效果將藥連服二劑諸病皆愈俾用珠玉二寶粥常常當點心服之以善其後或問兩方中所用之藥若滋陰潤肺清火理痰止嗽諸品原為人所共知而兩方之中皆用赭石麥芽且又皆生用者其義何居答曰胃居中焦原以傳送飲食為專職是以胃中之氣以息息下行為順果其氣能息息下行則沖氣可阻其上衝膽火可因之下降大便亦可按時下通至於痰涎之壅滯咳嗽喘逆諸證亦可因之遞減而降胃之藥固莫赭石若也至於麥芽炒用之善於消食生用之則善於升達肝氣人身之氣化原左升右降若但知用赭石降胃其重墜下行之力或有礙於肝氣之上升是以方中用赭石降胃即用麥芽升肝此所以順氣化之自然而還其左升右降之常也肺病咳嗽吐血天津張年二十六歲得肺病咳嗽吐血病因經商勞心又兼新婚失於調攝遂患勞嗽繼延推拿者為推拿兩日咳嗽分毫未減轉添吐血之證證候連聲咳嗽不已即繼以吐血或痰中帶血或純血無痰或有咳嗽兼喘夜不能臥心中發熱懶食大便乾燥小便赤澀脈搏五至強其左部弦而無力右部浮取似有力而尺部重按豁然處方生懷山藥一兩大潞參三錢生赭石六錢軋細生懷地黃六錢玄參六錢天冬五錢淨萸肉五錢生杭芍四錢射干二錢甘草二錢廣三七二錢軋細藥共十一味將前十味煎湯一大盅送服三七末一半至煎渣重服時再送服其餘一半復診此藥服兩劑後血已不吐又服兩劑咳嗽亦大見愈大小便已順利脈已有根不若從前之浮弦遂即原方略為加減俾再服之處方生懷山藥一兩大潞參三錢生赭石六錢軋細生懷地黃六錢大甘枸杞六錢甘草二錢淨萸肉五錢沙參五錢生杭芍二錢射干二錢廣三七錢半軋細藥共十一味將前十味煎湯一大盅送服三七末一半至煎渣重服時再送其餘一半效果將藥連服五劑諸病皆愈脈已復常而尺部重按仍欠實遂於方中加熟懷地黃五錢俾再服數劑以善其後肺病咳吐膿血天津葉年三十二歲得肺病咳吐膿血病因其未病之前數月心中時常發熱由此浸成肺病證候初覺發熱時屢服涼藥熱不減退大便乾燥小便短赤後則漸生咳嗽繼則痰中帶血繼則痰血相雜又繼則膿血相雜診其脈左部弦長右部洪長皆重按頗實疹斷此乃伏氣化熱竄入陽明之腑醫者不知病因見其心中發熱而多用甘寒滯膩之品稽留其熱俾無出路久之上熏肺部至肺中結核因生咳嗽潰爛遂吐膿血斯必先清其胃腑之熱使不復上升熏肺而後肺病可愈特是此熱為伏氣之熱所化原非輕劑所能消除當先投以治外感實熱之劑處方生石膏兩半搗細大潞參三錢生懷山藥六錢天花粉六錢金銀花四錢鮮蘆根四錢川貝母三錢連翹二錢甘草二錢廣三七二錢軋細藥共十味將前九味煎湯一大盅送服三七末一錢至煎渣再服時仍送服餘一錢方解此方實仿白虎加人參湯之義而為之變通也方中以天花粉代知母以生山藥代粳米仍與白虎加人參湯無異故用之以清胃腑積久之實熱而又加金銀花三七以解毒蘆根連翹以引之上行此肺胃雙理之劑也復診將藥連服三劑膿血已不復吐咳嗽少愈大便之乾燥小便之短赤亦見愈惟心中仍覺發熱脈象仍然有力擬再投以清肺瀉熱之劑處方天花粉八錢北沙參五錢玄參五錢鮮蘆根四錢川貝母三錢牛蒡子三錢搗碎五味子二錢搗細射干三錢甘草二錢軋細藥共九味將前八味煎湯一大盅送服甘草末一錢至煎渣再服時仍送服餘一錢方中五味子必須搗碎入煎不然則服之恆多發悶方中甘草無論紅者黃者皆可用至軋之不細時切忌鍋炮若炮則其性即變非此方中用甘草之意矣用此藥者宜自監視軋之或但羅取其頭次所軋之末亦可效果將藥連服五劑諸病皆愈惟心中猶間有發熱之時脈象較常脈似仍有力為善後計俾用生懷山藥軋細每用七八錢或兩許煮作茶湯送服離中丹錢許或至錢半多少宜自酌當點心用之後此方服閲兩月脈始復常心中亦不復發熱矣離中丹為愚自制之方即益元散方以生石膏代滑石也蓋滑石宜於濕熱石膏宜於燥熱北方多熱而兼燥者故將其方變通之凡上焦有實熱者用之皆有捷效或問伏氣化熱原可成溫即無新受之外感而忽然鹹溫病者是也此證伏氣所化之熱何以不成溫病而成肺病答曰伏氣之侵人伏於三焦脂膜之中有多有少多者化熱重少者化熱輕化熱重者當時即成溫病化熱輕者恆循三焦脂膜而竄入各臟腑愚臨證五十年細心體驗知有竄入肝膽病目者竄入腸中病下痢者有竄入腎中病虛勞者竄入肺中病咳嗽久而成肺病者有竄入胃中病吐衄而其熱上熏亦可成肺病者如此證是也是以此證心中初發熱時醫者不知其有伏氣化熱入胃而泛以涼藥治之是以不效而投以白虎加人參湯即隨手奏效至於不但用白虎湯而必用白虎加人參湯者誠以此證已閲數月病久氣化虛損非人參與石膏並用不能托深陷之熱外出也肺病咳吐痰血天津喬年三十餘得咳吐痰血病病因前因偶受肺風服藥失宜遂息咳嗽咳嗽日久繼患咳血證候咳嗽已近一年服藥轉浸加劇繼則痰中帶血又繼則間有嘔血之時然猶不至於傾吐其心中時常發熱大便時常燥結幸食欲猶佳身形不至羸弱其脈左部近和平右部寸關俱有滑實之象診斷證脈合參知系從前外感之熱久留肺胃金畏火刑因熱久而肺金受傷是以咳嗽至於胃腑久為熱鑠致胃壁之膜腐爛連及血管是以嘔血至其大便恆燥結者因其熱下輸腸中且因胃氣因熱上逆失其傳送之職也治此證者當以清肺胃之熱為主而以養肺降胃之藥輔之處方生石膏二兩細末粉甘草六錢細末鏡面硃砂二錢細末共和勻每服一錢五分又方生懷山藥一兩生赭石八錢軋細天冬六錢玄參五錢沙參五錢天花粉五錢生杭芍四錢川貝母三錢射干二錢兒茶二錢甘草錢半廣三七二錢軋細共藥十二味將前十一味煎湯送服三七一錢至煎渣再服時再送服一錢每日午前十點鐘服散藥一次臨睡時再服一次湯藥則晚服頭煎翌晨服次煎效果服藥三日咳血吐血皆愈仍然咳嗽遂即原方去沙參加生百合五錢米殼錢半又服四劑咳嗽亦愈已不發熱大便已不燥結俾將散藥惟頭午服一次又將湯藥中赭石減半再服數劑以善後二氣病門大氣下陷兼小便不禁天津陳三十五歲於孟冬得大氣下陷兼小便不禁證病因稟賦素弱恆覺呼吸之氣不能上達屢次來社求診投以拙擬升陷湯即愈後以出外勞碌過度又兼受涼陡然反復甚劇不但大氣下陷且又小便不禁證候自覺胸中之氣息息下墜努力呼之猶難上達其下墜之氣行至少腹小便即不能禁且覺下焦涼甚肢體無力其脈左右皆沉濡而右部寸關之沉濡尤甚診斷此胸中大氣下陷之劇者也此證因大氣虛陷心血之循環無力是以脈象沉濡而遲肺氣之呼吸將停是以努力呼氣外出而猶難上達不但此也大氣雖在膈上實能斡旋全身統攝三焦今因下陷而失位無權是以全身失其斡旋肢體遂痠軟無力三焦失其統攝小便遂泄瀉不禁其下焦涼甚者外受之寒涼隨大氣下陷至下焦也此證之危已至極點當用重劑升舉其下陷之大氣使復本位更兼用溫暖下焦之藥祛其寒涼庶能治愈處方野臺參五錢烏附子四錢生懷山藥一兩煎湯一盅溫服此為第一方又方生箭耆一兩生懷山藥一兩白朮四錢炒淨萸肉四錢萆薢二錢升麻錢半柴胡錢半共煎藥一大盅溫服此為第二方先服第一方後遲一點半鐘即服第二方效果將藥如法各服兩劑下焦之涼與小便之不禁皆愈惟呼吸猶覺氣分不足肢體雖不痠軟仍覺無力遂但用第二方將方中柴胡減去加桂枝尖錢半連服數劑氣息已順又將方中升麻桂枝皆改用一錢服至五劑身體健康如常遂停藥勿服或問此二方前後相繼服之中間原為時無多何妨將二方併為一方答曰凡欲溫暖下焦之藥宜速其下行不可用升藥提之若將二方併為一方附子與升柴並用其上焦必生煩躁而下焦之寒涼轉不能去惟先服第一方附子得人參之助其熱力之敷布最速是以為時雖無多下焦之寒涼已化其強半且參附與山藥並用大能保合下焦之氣化小便之不禁者亦可因之收攝此時下焦受參附山藥之培養已有一陽來復徐徐上升之機已陷之大氣雖不能因之上升實已有上升之根基遂繼服第二方黃耆與升柴並用升提之力甚大借之以升提下陷之大氣如人欲登高山則或推之或挽之縱肢體軟弱亦不難登峰造極也且此一點余鍾附子之熱力已融化於下焦雖遇升柴之升提必不至上升作煩躁審斯則二方不可相併之理由及二方前後繼服之利益不昭然乎大氣下陷天津李年三十二歲拉洋車為業得大氣下陷證病因腹中覺飢未吃飯枵腹奔走七八里遂得此病證候呼吸短氣心中發熱懶食肢體痠懶無力略有動作即覺氣短不足以息其脈左部弦而兼硬右部則寸關皆沉而無力診斷此胸中大氣下陷其肝膽又蘊有鬱熱也蓋胸中大氣原為後天宗氣能代先天元氣主持全身然必賴水穀之氣以養之此證因忍飢勞力過度是以大氣下陷右寸關之沉而無力其明徵也其舉家數口生活皆賴一人勞力因氣陷不能勞力繼將斷炊肝膽之中遂多起急火其左脈之弦而兼硬是明徵也治之者當用拙擬之升陷湯升補其胸中大氣而輔以涼潤之品以清肝膽之熱處方生箭耆八錢知母五錢桔梗二錢柴胡二錢升麻錢半生杭芍五錢龍膽草二錢共煎湯一大盅溫服效果將藥連服兩劑諸病脫然全愈大氣下陷身冷天津宋氏婦年四旬於仲夏得大氣下陷周身發冷證病因稟賦素弱居恆自覺氣分不足偶因努力搬運重物遂覺呼吸短氣周身發冷證候呼吸之間恆覺氣息不能上達時當暑熱著夾衣猶覺寒涼頭午病稍輕午後則漸劇必努力始能呼吸外被大氅猶或寒戰飲食少許猶不消化其脈關前沉細欲無關後差勝亦在沉分一息不足四至診斷此上焦心肺之陽虛損又兼胸中大氣下陷也為其心肺陽虛是以周身惡寒而飲食不化為其胸中大氣下陷是以呼吸短氣頭午氣化上升之時是以病輕過午氣化下降之時所以增劇也擬治以回陽升陷湯加黨參之大力者以補助之處方生箭耆八錢野臺黨參四錢乾薑四錢當歸身四錢桂枝尖三錢甘草二錢共煎湯一大盅溫服效果將藥連服三劑氣息已順而兼有短氣之時周身已不發冷惟晚間睡時仍須厚復飲食能消化脈象亦大有起色遂即原方去黨參將乾薑桂枝皆改用二錢又加生懷山藥八錢俾再服數劑以善其後説明心為君火全身熱力之司命肺與心同居膈上一系相連血脈之循環又息息相通是以與心相助為理同主上焦之陽氣然此氣雖在上焦實如日麗中天照臨下土是以其熱力透至中焦胃中之飲食因之熟腐更透至下焦命門之相火因之生旺內溫臟腑外暖周身實賴此陽氣為布護宣通也特是心與肺皆在胸中大氣包舉之中其布護宣通之原動力實又賴於大氣此證心肺之陽本虛向賴大氣為之保護故猶可支持逮大氣陷而失其保護遂致虛寒之象頓呈此方以升補胸中大氣為主以培養心肺之陽為輔病藥針芥相投是以服之輒能奏效也大氣陷兼消食李年二十六歲得大氣下陷兼消食證病因其未病之前二年常覺呼吸短氣初未注意繼因校中功課勞心短氣益劇且覺食量倍增因成消食之證證候呼吸之間覺吸氣稍易而呼氣費力夜睡一點鐘許即覺氣不上達須得披衣起坐遲移時氣息稍順始能再睡一日之間進食四次猶飢飢時若不急食即覺怔忡且心中常覺發熱大便乾燥小便短赤其脈浮分無力沉分稍實至數略遲診斷此乃胸中大氣下陷兼有伏氣化熱因之成消食也為其大氣下陷是以脈象浮分無力為其有伏氣化熱是以其沉分猶實既有伏氣化熱矣而脈象轉稍遲者因大氣下陷之脈原多遲也蓋胃中有熱者恆多化食而大氣下陷其胃氣因之下降甚速者亦恆能多食今既病大氣下陷又兼伏氣化熱侵入胃中是以日食四次猶飢也此宜升補其胸中大氣再兼用寒涼之品以清其伏氣所化之熱則短氣與消食原不難並愈也處方生箭耆六錢生石膏一兩搗細天花粉五錢知母五錢玄參四錢升麻錢半柴胡錢半甘草錢半共煎湯一大盅溫服復診將藥連服四劑短氣已愈強半發熱與消食亦大見愈遂即原方略為加減俾再服之處方生箭耆六錢天花粉六錢知母六錢玄參六錢淨萸肉三錢升麻錢半柴胡錢半甘草錢半共煎湯一大盅溫服方解方中去石膏者以伏氣所化之熱所餘無多也既去石膏而又將花粉知母諸涼藥加重者因花粉諸藥原用以調劑黃耆之溫補生熱而今則兼用之以清伏氣所化之餘熱是以又加重也至於前方之外又加萸肉者欲以收斂大氣之渙散俾大氣之已升者不至復陷且又以萸肉得木氣最厚酸斂之中大具條暢之性雖伏氣之熱猶未盡消而亦不妨用之也效果將藥又連服四劑病遂全愈俾停服湯藥再用生箭耆天花粉等分軋為細末每服三錢日服兩次以善其後或問脈之遲數恆關於人身之熱力熱力過盛則脈數熱力微弱則脈遲此定理也今此證雖有伏氣化熱因大氣下陷而脈仍遲何以脈之遲數與大氣若斯有關係乎答曰胸中大氣亦名宗氣為其實用能斡旋全身故曰大氣為其為後天生命之宗主故又曰宗氣內經謂宗氣積於胸中以貫心脈而行呼吸深思內經之言知肺葉之闟闢固為大氣所司而心機之跳動亦為大氣所司也今因大氣下陷而失其所司是以不惟肺受其病心機之跳動亦受其病而脈遂遲也大氣陷兼疝氣天津陳年三十八歲得大氣下陷兼疝氣證病因初因勞心過度浸覺氣分不舒後又因出外辦事勞碌過甚遂覺呼吸短氣猶不以為意也繼又患疝氣下墜作疼始來寓求為診治證候呼吸之際常覺氣短似難上達勞動時則益甚夜間臥睡一點鐘許即覺氣分不舒披衣起坐移時將氣調勻然後能再睡至其疝氣之墜疼恆覺與氣分有關每當呼吸不利時則疝氣之墜疼必益甚其脈關前沉而無力右部尤甚至數稍遲診斷即此證脈參之其呼吸之短氣疝氣之下墜實皆因胸中大氣下陷也此氣一陷則肺臟之闟闢失其斡旋是以呼吸短氣三焦之氣化失其統攝是以疝氣下墜斯當升補其下陷之大氣俾仍還其本位則呼吸之短氣疝氣之墜疼自皆不難愈矣處方生箭耆六錢天花粉六錢當歸三錢荔枝核三錢生明沒藥三錢生五靈脂三錢柴胡錢半升麻錢半小茴香一錢炒搗共煎湯一大盅溫飲下復診將藥連服三劑短氣之病已大見愈惟與人談話多時仍覺短氣其疝氣已上升有時下墜亦不作疼脈象亦大有起色此藥已對證而服藥之功候未到也爰即原方略為加減俾再服之處方生箭耆六錢天花粉六錢淨萸肉四錢當歸三錢荔枝核三錢生明沒藥三錢生五靈脂三錢柴胡錢半升麻錢半廣砂仁一錢搗碎共煎一大盅溫服效果將藥連服四劑呼吸已不短氣然仍自覺氣分不足疝氣亦大輕減猶未全消遂即原方去萸肉將柴胡升麻皆改用一錢又加黨參天冬各三錢俾多服數劑以善其後沖氣上衝兼奔豚天津張年四十五歲得沖氣上衝兼奔豚證病因初秋之時患赤白痢證醫者兩次用大黃下之其痢愈而變為此證證候每夜間當醜寅之交有氣起自下焦挾熱上衝行至中焦覺悶而且熱心中煩亂遲十數分鐘其氣上出為厄熱即隨之消矣其脈大致近和平惟兩尺稍浮按之不實診斷此因病痢時連服大黃下之傷其下焦氣化而下焦之沖遂挾腎中之相火上衝也其在醜寅之交者陽氣上升之時也宜用仲師桂枝加桂湯加減治之處方桂枝尖四錢生懷山藥一兩生芡實六錢搗碎清半夏四錢水洗三次生杭芍四錢生龍骨四錢搗碎生牡蠣四錢搗碎生麥芽三錢生雞內金二錢黃色的搗黃柏二錢甘草二錢共煎湯一大盅溫服效果將藥煎服兩劑病愈強半遂即原方將桂枝改用三錢又加淨萸肉甘枸杞各四錢連服三劑全愈説明凡氣之逆者可降郁者可升惟此證沖氣挾相火上衝則升降皆無所施桂枝一藥而升降之性皆備凡氣之當升者遇之則升氣之當降者遇之則降此誠天生使獨而為不可思議之妙藥也山藥芡實皆能補腎又皆能斂戢下焦氣化龍骨牡蠣亦收斂之品然斂正氣而不斂邪氣用於此證初無收斂過甚之虞此四藥並用誠能於下焦之氣化培養而鎮安之也用芍藥黃柏者一瀉腎中之相火一瀉肝中之相火且桂枝性熱二藥性涼涼熱相濟方能奏效用麥芽雞內金者所以運化諸藥之力也用甘草者欲以緩肝之急不使肝木助氣衝相火上升也至於服藥後病愈強半遂減輕桂枝加萸肉枸杞者俾肝腎壯旺自能掃除病根胃氣不降大城王妻年近四旬時常嘔吐大便遲下數年不愈病因其人稟性暴烈處境又多不順浸成此證證候飯後每覺食停胃中似有氣上衝阻其下行因此大便恆至旬日始下至大便多日不下時則恆作嘔吐即屢服止嘔通便之藥下次仍然如故求為診治其脈左右皆弦右脈弦而且長重診頗實至數照常診斷弦為肝脈弦而且長則衝脈也弦長之脈見於右部尤按之頗實此又為胃氣上逆之脈肝胃沖三經之氣化皆有升無降宜其下焦便祕而上焦嘔吐也此當治以瀉肝降胃鎮沖之劑其大便自順嘔吐自止矣處方生赭石兩半軋細生杭芍六錢柏子仁六錢生懷山藥六錢天冬六錢懷牛膝五錢當歸四錢生麥芽三錢茵陳二錢甘草錢半共煎湯一大盅溫服效果服藥一劑大便即通下即原方略為加減又服數劑大便每日一次食後胃中已不覺停滯從此病遂除根或問麥芽生用能升肝氣茵陳為青蒿之嫩者亦具有升發之力此證即因臟腑之氣有升無降何以方中復用此二藥乎答曰肝為將軍之官中寄相火其性最剛烈若強制之恆激發其反動之力麥芽茵陳善舒肝氣而不至過於升提是將順肝木之性使之柔和不至起反動力也肝氣鬱兼胃氣不降天津姚年五十二歲得肝鬱胃逆證病因勞心太過因得斯證證候腹中有氣自下上衝致胃脘滿悶胸中煩熱脅下脹疼時常厄逆間作嘔吐大便燥結其脈左部沉細右部則弦硬而長大於左部數倍診斷此乃肝氣鬱結沖氣上衝更迫胃氣不降也為肝氣鬱結是以左脈沉細為沖氣上衝是以右脈弦長衝脈上隸陽明其氣上衝不已易致陽明胃氣不下降此證之嘔吐厄逆胃脘滿悶胸間煩熱皆沖胃之氣相併沖逆之明徵也其脅下脹疼肝氣鬱結之明徵也其大便燥結者因胃氣原宜息息下行傳送飲食下為二便今其胃氣既不下降是以大便燥結也擬治以舒肝降胃安沖之劑處方生赭石一兩軋細生懷山藥一兩天冬一兩寸麥冬六錢去心清半夏四錢水洗三次碎竹茹三錢生麥芽三錢茵陳二錢川續斷二錢生雞內金二錢黃色的搗甘草錢半煎湯一大盅溫服方解肝主左而宜升胃主右而宜降肝氣不升則先天之氣化不能由肝上達胃氣不降則後天之飲食不能由胃下輸此證之病根正因當升者不升當降者不降也故方中以生麥芽茵陳以升肝生赭石半夏竹茹以降胃即以安沖用續斷者因其能補肝可助肝氣上升也用生山藥二冬者取其能潤胃補胃可助胃氣下降也用雞內金者取其能化瘀止疼以運行諸藥之力也復診上方隨時加減連服二十餘劑肝氣已升胃氣已降左右脈均已平安諸病皆愈惟肢體乏力飲食不甚消化擬再治以補氣健胃之劑處方野臺參四錢生懷山藥一兩生赭石六錢軋細天冬六錢寸麥冬六錢生雞內金三錢黃色的搗生麥芽三錢甘草錢半煎湯一大盅溫服效果將藥煎服三劑飲食加多體力漸復於方中加枸杞五錢白朮三錢俾再服數劑以善其後説明身之氣化原左升右降若但知用赭石降胃不知用麥芽升肝久之肝氣將有郁遏之弊況此證之肝氣原鬱結乎此所以方中用赭石即用麥芽赭石生用而麥芽亦生用也且諸家本草謂麥芽炒用者為丸散計也若入湯劑何須炒用蓋用生者煮汁飲之則消食之力愈大也或問升肝之藥柴胡最效今方中不用柴胡而用生麥芽者將毋別有所取乎答曰柴胡升提肝氣之力甚大用之失宜恆並將胃氣之下行者提之上逆曾有患陽明厥逆吐血者初不甚劇醫者誤用柴胡數錢即大吐不止須臾盈一痰盂有危在頃刻之懼取藥無及適備有生赭石細末若干俾急用溫開水送下約盡兩半其血始止此柴胡並能提胃氣上逆之明徵也況此證之胃氣原不降乎至生麥芽雖能升肝實無妨胃氣之下降蓋其萌芽發生之性與肝木同氣相求能宣通肝氣之鬱結使之開解而自然上升非若柴胡之純於升提也胃氣不降掖縣任妻年五旬得胃氣不降證原因舉家人口衆多因其夫在外家務皆自操勞恆動肝火遂得此證證候食後停滯胃中艱於下行且時覺有氣挾火上衝口苦舌脹目眩耳鳴恆有厄欲嘔逆或噁心胸膈煩悶大便六七日始行一次或至服通利藥始通小便亦不順利其脈左部弦硬右部弦硬而長一息搏近五至受病四年屢次服藥無效診斷此肝火與肝氣相併沖激胃腑致胃腑之氣不能息息下行傳送飲食久之胃氣不但不能下行且更轉而上逆是以有種種諸病也宜治以降胃理沖之品而以滋陰清火之藥輔之處方生赭石兩半軋細生懷山藥一兩生杭芍六錢玄參六錢生麥芽三錢茵陳二錢生雞內金二錢黃色的搗甘草錢半共煎湯一大盅溫服效果每日服藥一劑三日後大便日行一次小便亦順利上焦諸病亦皆輕減再診其脈頗見柔和遂將赭石減去五錢又加柏子仁五錢連服數劑霍然全愈三血病門吐血證天津張年三十五歲得吐血證年餘不愈病因稟性褊急勞心之餘又兼有拂意之事遂得斯證證候初次所吐甚多屢經醫治所吐較少然終不能除根每日或一次或兩次覺心中有熱上衝即吐血一兩口因病久身羸弱臥床不起亦偶有扶起少坐之時偶或微喘幸食欲猶佳大便微溏日行兩三次其脈左部弦長重按無力右部大而芤一息五至診斷凡吐血久不愈者多系胃氣不降致胃壁破裂出血之處不能長肉生肌也再即此脈論之其左脈之弦右脈之大原現有肝火浮動挾胃氣上衝之象是以其吐血時覺有熱上逆至其脈之弦而無力者病久而氣化虛也大而兼芤者失血過多也至其呼吸有時或喘大便日行數次亦皆氣化虛而不攝之故治此證者當投以清肝降胃培養氣血固攝氣化之劑處方赤石脂兩半生懷山藥一兩淨萸肉八錢生龍骨六錢搗碎生牡蠣六錢搗碎生杭芍六錢大生地黃四錢甘草二錢廣三七二錢藥共九味將前八味煎湯送服三七末方解降胃之藥莫如赭石此愚治吐衄恆用之藥也此方中獨重用赤石脂者因赭石為鐵養化合其重墜之力甚大用之雖善降胃而其力達於下焦又善通大便此證大便不實赭石似不宜用赤石脂之性重用之亦能使胃氣下降至行至下焦其黏滯之力又能固澀大便且其性能生肌更可使腸壁破裂出血之處早愈誠為此證最宜之藥也效果將藥煎服兩劑血即不吐喘息已平大便亦不若從前之勤脈象亦較前和平惟心中仍有覺熱之時遂即原方將生地黃改用一兩又加熟地黃一兩連服三劑諸病皆愈咳血兼吐血證堂侄女適鄰村王氏年三十歲於乙酉仲春得吐血證病因因家務自理勞心過度且稟賦素弱當此春陽發動之時遂病吐血證候先則咳嗽痰中帶血繼則大口吐血其吐時覺心中有熱上衝一日夜吐兩三次劇時可吐半碗兩日之後覺精神氣力皆不能支持遂急迎愚診治自言心中搖搖似將上脫兩顴發紅面上發熱其脈左部浮而動右部浮而濡兩尺無根數逾五至診斷此肝腎虛極陰分陽分不相維繫而有危在頃刻之勢遂急為出方取藥以防虛脫處方生懷山藥一兩生懷地黃一兩熟懷地黃一兩淨萸肉一兩生赭石一兩軋細急火煎藥取湯兩盅分兩次溫服下效果將藥甫煎成未服又吐血一次吐後忽停息閉目惛然罔覺診其脈跳動仍舊知能蘇醒約四分鐘呼吸始續兩次將藥服下其血從此不吐俾即原方再服一劑至第三劑即原方加潞黨參三錢天冬四錢連服數劑身形亦漸復原繼用生懷山藥為細面每用八錢煮作茶湯少調以白糖送服生赭石細末五分作點心用之以善其後吐血兼咳嗽天津王年二十四歲得咳嗽吐血證病因稟賦素弱略有外感即發咳嗽偶因咳嗽未愈繼又勞心過度心中發熱遂至吐血證候先時咳嗽猶輕失血之後則嗽益加劇初則痰中帶血繼則大口吐血心中發熱氣息微喘脅下作疼大便乾燥其脈關前浮弦兩尺重按不實左右皆然數逾五至診斷此證乃肺金傷損肝木橫恣又兼胃氣不降腎氣不攝也為其肺金受傷是以咳嗽痰中帶血為胃氣不降是以血隨氣升致胃中血管破裂而大口吐血至脅下作疼乃肝木橫恣之明證其脈上盛下虛氣息微喘又腎氣不攝之明徵也治之者宜平肝降胃潤肺補腎以培養調劑其臟腑則病自愈矣處方生懷山藥一兩生赭石六錢軋細生懷地黃一兩生杭芍五錢天冬五錢大甘枸杞五錢川貝母四錢生麥芽三錢牛蒡子三錢搗碎射干二錢廣三七三錢細末粉甘草二錢細末藥共十二味將前十味煎湯一大盅送服三七甘草末各一半至煎渣再服仍送服其餘一半效果服藥一劑吐血即愈諸病亦輕減後即原方隨時為之加減連服三十餘劑其嗽始除根身體亦漸壯健吐血兼咳嗽天津孫年二十八歲得吐血兼咳嗽證病因因事心中著急起火遂致吐血咳嗽證候其吐血之始至今已二年矣經醫治愈屢次反復少有操勞心中發熱即復吐血又頻作咳嗽嗽時吐痰亦恆帶血肋下恆作刺疼嗽時其疼益甚口中發乾身中亦間有灼熱大便乾燥其脈左部弦硬右部弦長皆重按不實一息搏近五至診斷此證左脈弦硬者陰分虧損而肝膽有熱也右部弦長者因沖氣上衝並致胃氣上逆也為其沖沖胃逆是以胃壁血管破裂以至於吐血咳血也其脈重按不實者血虧而氣亦虧也至於口無津液身或灼熱大便乾燥無非血少陰虧之現象擬治以清肝降胃滋陰化瘀之劑處方生赭石八錢軋細生懷地黃一兩生懷山藥一兩生杭芍六錢玄參五錢川楝子四錢搗碎生麥芽三錢川貝母三錢甘草錢半廣三七二錢細末藥共十味將前九味煎湯一大盅送服三七末一半至煎渣重服時再送服其餘一半方解愚治吐血凡重用生地黃必用三七輔之因生地黃最善涼血以治血熱妄行猶恐妄行之血因涼而凝瘀塞於經絡中也三七善化瘀血與生地黃並用血止後自無他虞且此證肋下作疼原有瘀血則三七尤在所必需也復診將藥連服三劑吐血全愈咳嗽吐痰亦不見血肋疼亦愈強半灼熱已無惟口中仍發乾脈仍有弦象知其真陰猶虧也擬再治以滋補真陰之劑處方生懷山藥一兩生懷地黃六錢大甘枸杞六錢生杭芍四錢玄參四錢生赭石四錢軋細生麥芽二錢甘草二錢廣三七二錢細末服法如前效果將藥連服五劑病全愈脈亦復常遂去三七以熟地黃易生地黃俾多服數劑以善其後吐血證天津馮年三十二歲得吐血證久不愈病因因勞心勞力過度遂得此證證候吐血已逾二年治愈屢次反復病將發時覺胃中氣化不通滿悶發熱大便滯塞旋即吐血兼咳嗽多吐痰涎其脈左部弦長右部長而兼硬一息五至診斷此證當系肝火挾沖胃之氣上衝血亦隨之上逆又兼失血久而陰分虧也為其肝火熾盛是以左脈弦長為其肝火挾沖胃之氣上衝是以右脈長而兼硬為其失血久而真陰虧損是以其脈既弦硬弦硬即有陰虧之象而又兼數也此宜治以瀉肝降胃之劑而以大滋真陰之藥佐之處方生赭石一兩軋細玄參八錢大生地八錢生懷山藥六錢栝蔞仁六錢炒搗生杭芍四錢龍膽草三錢川貝母三錢甘草錢半廣三七二錢細末藥共十味先將前九味煎湯一大盅送服三七細末一半至煎渣重服時再送服其餘一半效果每日煎服一劑初服後血即不吐服至三劑咳嗽亦愈大便順利再診其脈左右皆有和柔之象問其心中悶熱全無遂去蔞仁龍膽草生山藥改用一兩俾多服數劑吐血之病可從此永遠除根矣吐血證天津張姓年過三旬偶患吐血證病因其人性嗜酒每日必飲且不知節初則飲酒過量即覺胸間煩熱後則不飲酒時亦覺煩熱遂至吐血證候其初吐血之時原不甚劇始則痰血相雜因咳吐出即或純吐鮮血亦不過一日數口繼復因延醫服藥方中有柴胡三錢服藥半點鐘後遂大吐不止倉猝迎愚往視及至則所吐之血已盈痰盂又復連連嘔吐若不立為止住實有危在目前之懼幸所攜藥囊中有生赭石細末一包俾先用溫水送下五錢其吐少緩須臾又再送下五錢遂止住不吐診其脈弦而芤數逾五至其左寸搖搖有動意問其心中覺怔忡乎答曰怔忡殊甚幾若不能支持診斷此證初傷於酒繼傷於藥臟腑之血幾於傾囊而出猶幸速為立止宜急服湯藥以養其血降其胃氣保其心氣育其真陰連服數劑庶其血不至再吐處方生懷山藥一兩生赭石六錢軋細玄參六錢生地黃六錢生龍骨六錢搗碎生牡蠣六錢搗碎生杭芍五錢酸棗仁四錢炒搗柏子仁四錢甘草錢半廣三七三錢細末此方將前十味煎湯三七分兩次用頭煎及二煎之湯送服效果每日服藥一劑連服三日血已不吐心中不復怔忡再診其脈芤動皆無至數仍略數遂將生地黃易作熟地黃俾再服數劑以善其後大便下血天津袁年三十二歲得大便下血證病因先因勞心過度心中時覺發熱繼又因朋友宴會飲酒過度遂得斯證證候自孟夏下血歷六月不止每日六七次腹中覺疼即須入廁心中時或發熱懶於飲食其脈浮而不實有似芤脈而不若芤脈之硬兩尺沉分尤虛至數微數診斷此證臨便時腹疼者腸中有潰爛處也心中時或發熱者陰虛之熱上浮也其脈近芤者失血過多也其兩尺尤虛者下血久而陰虧更兼下焦氣化不固攝也此宜用化腐生肌之藥治其腸中潰爛滋陰固氣之藥固其下焦氣化則大便下血可愈矣處方生懷山藥兩半熟地黃一兩龍眼肉一兩淨萸肉六錢樗白皮五錢金銀花四錢赤石脂四錢研細甘草二錢鴉膽子仁八十粒成實者生硫黃八分細末藥共十味將前八味煎湯送服鴉膽子硫黃各一半至煎渣再服時仍送服其餘一半至於硫黃生用之理詳於敦復湯下方解方中鴉膽子硫黃並用者因鴉膽子善治下血而此證之脈兩尺過弱又恐單用之失於寒涼故少加硫黃輔之況其腸中脂膜因下血日久易至腐敗釀毒二藥之性皆善消除毒菌也又其腹疼下血已歷半載不愈有似東人所謂阿米巴赤痢硫黃實又為治阿米巴赤痢之要藥也復診前藥連服三劑下血已愈心中亦不發熱脈不若從前之浮至數如常而其大便猶一日溏瀉四五次此宜投以健胃固腸之劑處方炙箭耆三錢炒白朮三錢生懷山藥一兩龍眼肉一兩生麥芽三錢建神麯三錢大雲苓片二錢共煎湯一大盅溫服效果將藥連服五劑大便已不溏瀉日下一次遂停服湯藥俾用生懷山藥細末煮作粥調以白糖當點心服之以善其後大便下血高年三十六歲得大便下血證病因冷時出外辦事寢於寒涼屋中床衾又甚寒涼遂得斯證證候每日下血數次或全是血或兼有大便或多或少其下時多在夜間每覺腹中作疼即須入廁夜間恆苦不寐其脈遲而芤兩尺尤不堪重按病已二年餘服溫補下元藥則稍輕然終不能除根久之則身體漸覺羸弱診斷此下焦虛寒太甚其氣化不能固攝而血下陷也視其從前所服諸方皆系草木之品其質輕浮溫暖之力究難下達當以礦質之品溫暖兼收澀者投之處方生硫黃半斤色純黃者赤石脂半斤純系粉末者將二味共軋細過羅先空心服七八分日服兩次品驗漸漸加多以服後移時微覺腹中溫暖為度效果後服至每次二錢腹中始覺溫暖血下亦漸少服至旬余身體漸壯夜睡安然可無入廁服至月餘則病根祓除矣方解按硫黃之性溫暖下達誠為溫補下焦第一良藥而生用之尤佳惟其性能潤大便本草謂其能使大便潤小便長西醫以為輕瀉藥於大便滑瀉者不宜故輔以赤石脂之黏膩收澀自有益而無弊矣大便下血崔童年十三歲得大便下血證病因仲夏天熱賽球競走勞力過度又兼受熱遂患大便下血證候每日大便必然下血便時腹中作疼或輕或劇若疼劇時則血之下者必多已年餘矣飲食減少身體羸弱面目黃白無血色脈搏六至左部弦而微硬右部濡而無力診斷此證當因脾虛不能統血是以其血下陷至其腹所以作疼其腸中必有損傷潰爛處也當用藥健補其脾胃兼調養其腸中潰爛處方生懷山藥一兩龍眼肉一兩金銀花四錢甘草三錢廣三七二錢半軋細末鴉膽子八十粒去皮揀其仁之成實者共藥六味將前四味煎湯送服三七鴉膽子各一半至煎渣再服時仍送服其餘一半效果將藥如法服兩次下血病即除根矣大便下血阜城杜年四十五歲得大便下血證病因因勞心過度每大便時下血服藥治愈因有事還籍值夏季暑熱過甚又復勞心過度舊證復發屢治不愈遂來津入西醫院治療西醫為其血在便後謂系內痔服藥血仍不止因轉而求治於愚證候血隨便下且所下甚多然不覺疼墜心中發熱懶食其脈左部弦長右部洪滑診斷此因勞心生內熱而牽動肝經所寄相火致肝不藏血而兼與溽暑之熱相併所以血妄行也宜治以清心涼肝兼消暑熱之劑而少以培補脾胃之藥佐之處方生懷地黃一兩白頭翁五錢龍眼肉五錢生懷山藥五錢知母四錢秦皮三錢黃柏二錢龍膽草二錢甘草二錢共煎湯一大盅溫服復診上方煎服一劑血已不見服至兩劑少腹覺微涼再診其脈弦長與洪滑之象皆減退遂為開半清半補之方以善其後處方生懷山藥一兩熟懷地黃八錢淨萸肉五錢龍眼肉五錢白頭翁五錢秦皮三錢生杭芍三錢地骨皮三錢甘草二錢共煎湯一大盅溫服效果將藥煎服一劑後食欲頓開腹已不疼俾即原方多服數劑下血病當可除根瘀血短氣鹽山劉年二十五歲得瘀血短氣證病因因出外修工努力抬重物當時覺脅下作疼數日疼愈仍覺脅下有物妨礙呼吸證候身形素強壯自受病之後遲延半載漸漸羸弱常覺右脅之下有物阻礙呼吸之氣與人言時恆半句而止候至氣上達再言若偶忿怒則益甚脈象近和平惟稍弱不能條暢診斷此因努力太過致肝經有不歸經之血瘀經絡之間阻塞氣息升降之道路也喜其脈雖稍弱猶能支持可但用化瘀血之藥徐徐化其瘀結氣息自能調順處方廣三七四兩軋為細末每服錢半用生麥芽三錢煎湯送下日再服方解三七為止血妄行之聖藥又為化瘀血之聖藥且又化瘀血不傷新血單服久服無礙此乃藥中特異之品其妙處直不可令人思議愚恆用以消積久之瘀血皆能奏效至麥芽原為消食之品生煮服之則善舒肝氣且亦能化瘀者也是以用之煎湯以送服三七也效果服藥四日後自鼻孔中出紫血一條呼吸較順繼又服至藥盡遂脫然全愈或問人之呼吸在於肺今謂肝經積有瘀血即可妨礙呼吸其義何居答曰按生理之學人之呼吸可達於衝任方書又謂呼出心肺吸入肝腎若謂呼吸皆在於肺是以上兩説皆可廢也蓋心肺肝原一系相連下又連於衝任而心肺相連之系其中原有兩管一為血脈管一為回血管血脈管下行回血管上行肺為發動呼吸之機關非呼吸即限於肺也是以吸入之氣可由血脈管下達呼出之氣可由回血管上達無論氣之上達下達皆從肝經過是以血瘀肝經即有妨於升降之氣息也據斯以論呼吸之關於肺者固多而心肺相連之系亦司呼吸之分支也四腦充血門腦充血頭疼京都談年五十二歲得腦充血頭疼證病因因勞心過度遂得腦充血頭疼證證候臟腑之間恆覺有氣上衝頭即作疼甚或至於眩暈其夜間頭疼益甚恆至疼不能寐醫治二年無效浸至言語謇澀肢體漸覺不利飲食停滯胃口不下行心中時常發熱大便乾燥其脈左右皆弦硬關前有力兩尺重按不實診斷弦為肝脈至弦硬有力無論見於何部皆繫有肝火過升之弊因肝火過升恆引動沖氣胃氣相併上升是以其臟腑之間恆覺有氣上衝也人之血隨氣行氣上升不已血即隨之上升不已以致腦中血管充血過甚是以作疼其夜間疼益劇者因其脈上盛下虛陰分原不充足是以夜則加劇其偶作眩暈亦職此也至其心常發熱肝火熾其心火亦熾也其飲食不下行大便多幹燥者又皆因其沖氣挾胃氣上升胃即不能傳送飲食以速達於大腸也其言語肢體蹇澀不利者因腦中血管充血過甚有妨礙於司運動之神經也此宜治以鎮肝降胃安沖之劑而以引血下行兼清熱滋陰之藥輔之又須知肝為將軍之官中藏相火強鎮之恆起其反動力又宜兼用舒肝之藥將順其性之作引也處方生赭石一兩軋細生懷地黃一兩懷牛膝六錢大甘枸杞六錢生龍骨六錢搗碎生牡蠣六錢搗碎淨萸肉五錢生杭芍五錢茵陳二錢甘草二錢共煎湯一大盅溫服復診將藥連服四劑頭疼已愈強半夜間可睡四五點鐘諸病亦皆見愈脈象之弦硬已減兩尺重診有根擬即原方略為加減俾再服之處方生赭石一兩軋細生懷地黃一兩生懷山藥八錢懷牛膝六錢生龍骨六錢搗碎生牡蠣六錢搗碎淨萸肉五錢生杭芍五錢生雞內金錢半黃色的搗茵陳錢半甘草二錢共煎湯一大盅溫服三診將藥連服五劑頭已不疼能徹夜安睡諸病皆愈惟辦事略覺操勞過度頭仍作疼脈象猶微有弦硬之意其心中仍間有覺熱之時擬再治以滋陰清熱之劑處方生懷山藥一兩生懷地黃八錢玄參四錢北沙參四錢生杭芍四錢淨萸肉四錢生珍珠母四錢搗碎生石決明四錢搗碎生赭石四錢軋細懷牛膝三錢生雞內金錢半黃色的搗甘草二錢共煎湯一大盅溫飲下效果將藥連服六劑至經理事務時頭亦不疼脈象已和平如常遂停服湯藥俾日用生山藥細末煮作茶湯調以白糖令適口送服生赭石細末錢許當點心服之以善其後腦充血頭疼天津李氏婦年過三旬得腦充血頭疼證病因稟性褊急家務勞心常起暗火因得斯證證候其頭疼或左或右或左右皆疼劇時至作呻吟心中常常發熱時或煩躁間有眩暈之時其大便燥結非服通下藥不行其脈左右皆弦硬而長重診甚實經中西醫診治二年毫無功效診斷其左脈弦硬而長者肝膽之火上升也其右脈弦硬而長者胃氣不降而逆行又兼沖氣上衝也究之左右脈皆弦硬實亦陰分有虧損也因其臟腑之氣化有升無降則血隨氣升者過多遂至充塞於腦部排擠其腦中之血管而作疼此內經所謂血之與氣並走於上之厥證也亦即西人所謂腦充血之證也其大便燥結不行者因胃氣不降失其傳送之職也其心中發煩躁者因肝胃之火上升也其頭部間或眩暈者因腦部充血過甚有礙於神經也此宜清其臟腑之熱滋其臟腑之陰更降其臟腑之氣以引腦部所充之血下行方能治愈處方生赭石兩半軋細懷牛膝一兩生懷山藥六錢生懷地黃六錢天冬六錢玄參五錢生杭芍五錢生龍齒五錢搗碎生石決明五錢搗碎茵陳錢半甘草錢半共煎湯一大盅溫服方解赭石能降胃平肝鎮安沖氣其下行之力又善通大便燥結而毫無開破之弊方中重用兩半者因此證大便燥結過甚非服藥不能通下也蓋大便不通是以胃氣不下降而肝火之上升沖氣之上衝又多因胃氣不降而增劇是治此證者當以通其大便為要務逮服藥至大便自然通順時則病愈過半矣牛膝為治腿疾要藥以其能引氣血下行也而名醫別録及千金翼方皆謂其除腦中痛蓋以其能引氣血下行即可輕減腦中之充血也愚生平治此等證必此二藥並用而又皆重用之用玄參天冬芍藥者取其既善退熱兼能滋陰也用龍齒石決明者以其皆為肝家之藥其性皆能斂戢肝火鎮熄肝風以緩其上升之勢也用山藥甘草者以二藥皆善和胃能調和金石之藥與胃相宜猶白虎湯用甘草粳米之義而山藥且善滋陰甘草亦善緩肝也用茵陳者因肝為將軍之官其性剛果且中寄相火若但用藥平之鎮之恆至起反動之力茵陳最能將順肝木之性且又善瀉肝熱李氏本草綱目謂善治頭痛是不但將順肝木之性使不至反動且又為清涼腦部之要藥也諸藥彙集為方久服之自有殊效復診將藥連服二十餘劑其中隨時略有加減頭已不疼惟夜失眠時則仍疼心中發熱煩躁皆無亦不復作眩暈大便屆時自行無須再服通藥脈象較前和平而仍有弦硬之意此宜注意滋其真陰以除病根處方生赭石一兩軋細懷牛膝八錢生懷山藥八錢生懷地黃八錢玄參六錢大甘枸杞六錢淨萸肉五錢生杭芍四錢柏子仁四錢生麥芽三錢甘草二錢共煎湯一大盅溫服方中用麥芽者藉以宣通諸藥之滯膩也且麥芽生用原善調和肝氣亦猶前方用茵陳之義也效果將藥又連服二十餘劑亦隨時略有加減病遂全愈脈象亦和平如常矣腦充血頭疼天津於氏婦年二十二歲得腦充血頭疼證病因其月信素日短少不調大便燥結非服降藥不下行浸至臟腑氣化有升無降因成斯證證候頭疼甚劇恆至夜不能眠心中常覺發熱偶動肝火即發眩暈胃中飲食恆停滯不消大便六七日不行必須服通下藥始行其脈弦細有力而長左右皆然每分鐘八十至延醫診治歷久無效診斷此因陰分虧損下焦氣化不能固攝沖氣遂挾胃氣上逆而肝臟亦因陰分虧損水不滋木致所寄之相火妄動恆助肝氣上衝由斯臟腑之氣化有升無降而自心注腦之血為上升之氣化所迫遂至充塞於腦中血管而作疼作暈也其飲食不消大便不行者因沖胃之氣皆逆也其月信不調且短少者因沖為血海肝為衝任行氣脾胃又為生血之源諸經皆失其常司是以月信不調且少也內經謂血菀同郁於上使人薄厥言為上升之氣血逼薄而厥也此證不急治則薄厥將成宜急治以降胃鎮沖平肝之劑再以滋補真陰之藥輔之庶可轉上升之氣血下行不成薄厥也處方生赭石一兩軋細懷牛膝一兩生懷地黃一兩大甘枸杞八錢生懷山藥六錢生杭芍五錢生龍齒五錢搗碎生石決明五錢搗碎天冬五錢生雞內金二錢黃色的搗蘇子二錢炒搗茵陳錢半甘草錢半共煎湯一大盅溫服復診將藥連服四劑諸病皆見輕脈象亦稍見柔和惟大便六日仍未通行因思此證必先使其大便如常則病始可愈擬將赭石加重再將余藥略為加減以通其大便處方生赭石兩半軋細懷牛膝一兩天冬一兩黑芝麻八錢炒搗大甘枸杞八錢生杭芍五錢生龍齒五錢搗碎生石決明五錢搗碎蘇子三錢炒搗生雞內金錢半黃色的搗甘草錢半淨柿霜五錢藥共十二味將前十一味煎湯一大盅入柿霜融化溫服三診將藥連服五劑大便間日一行諸證皆愈十之八九月信適來仍不甚多脈象仍有弦硬之意知其真陰猶未充足也當即原方略為加減再加滋陰生血之品處方生赭石一兩軋細懷牛膝八錢大甘枸杞八錢龍眼肉六錢生懷地黃六錢當歸五錢玄參四錢沙參四錢生懷山藥四錢生杭芍四錢生雞內金一錢黃色的搗甘草二錢生薑三錢大棗三枚掰開共煎湯一大盅溫服效果將藥連服四劑後心中已分毫不覺熱脈象亦大見和平大便日行一次遂去方中玄參沙參生赭石改用八錢生懷山藥改用六錢俾多服數劑以善其後腦充血兼腿痿弱天津崔年三十八歲得腦充血兼兩腿痿弱證病因出門採買木料數日始歸勞心勞力過度遂得斯證證候其初常覺頭疼時或眩暈心中發熱飲食停滯大便燥結延醫治療無效一日早起下床覺痿弱無力痿坐於地人扶起坐床沿休息移時自扶杖起立猶可徐步然時恐顛仆其脈左部弦而甚硬右部弦硬且長診斷其左脈弦硬者肝氣挾火上升也右脈弦硬且長者胃氣上逆更兼沖氣上衝也因其臟腑間之氣化有升無降是以血隨氣升充塞於腦部作疼作眩暈其腦部充血過甚或自微細血管溢血於外或隔血管之壁些些滲血於外其所出之血若著於司運動之神經其重者可使肢體痿廢其輕者亦可使肢體軟弱無力若此證之忽然痿坐於地者是也至其心中之發熱飲食之停滯大便之燥結亦皆其氣化有升無降之故此宜平肝清熱降胃安沖不使臟腑之氣化過升且導引其腦中過充之血使之下行則諸證自愈矣處方生赭石一兩軋細懷牛膝一兩生懷地黃一兩生珍珠母六錢搗碎生石決明六錢搗碎生杭芍五錢當歸四錢龍膽草二錢茵陳錢半甘草錢半共煎湯一大盅溫服復診將藥連服七劑諸病皆大見愈脈象亦大見緩和惟其步履之間仍須用杖未能復常心中仍間有發熱之時擬即原方略為加減再佐以通活血脈之品處方生赭石一兩軋細懷牛膝一兩生懷地黃一兩生杭芍五錢生珍珠母四錢搗碎生石決明四錢搗碎丹參四錢生麥芽三錢土鱉蟲五個甘草一錢共煎湯一大盅溫服效果將藥連服八劑步履復常病遂全愈腦充血兼痰厥天津駱年四十九歲得腦充血兼痰厥證病因平素常患頭暈間有疼時久則精神漸似短少言語漸形謇澀一日外出會友飲食過度歸家因事有拂意怒動肝火陡然昏厥證候閉目昏昏呼之不應喉間痰涎杜塞氣息微通診其脈左右皆弦硬而長重按有力知其證不但痰厥實素有腦充血病也診斷其平素頭暈作疼即腦充血之現證也其司知覺之神經為腦充血所傷是以精神短少其司運動之神經為腦充血所傷是以言語謇澀又凡腦充血之人其臟腑之氣多上逆胃氣逆則飲食停積不能下行肝氣逆則痰火相併易於上干此所以因飽食動怒而陡成痰厥也此其危險即在目前取藥無及當先以手術治之手術治痰厥之手術當以手指點其天突穴處詳見治痰點天突穴法近八分鐘許即咳嗽嘔吐約吐出痰涎飲食三碗許豁然頓醒自言心中發熱頭目脹疼此當繼治其腦部充血以求全愈擬用建瓴湯方治之因病脈之所宜而略為加減處方生赭石一兩軋細懷牛膝一兩生懷地黃一兩天花粉六錢生杭芍六錢生龍骨五錢搗碎生牡蠣五錢搗碎生麥芽三錢茵陳錢半甘草錢半磨取生鐵鏽濃水以之煎藥煎湯一盅溫服下復診將藥服三劑心中已不發熱頭疼目脹皆愈惟步履之時覺頭重足輕腳底如踏棉絮其脈象較前和緩似有上盛下虛之象爰即原方略為加減再添滋補之品處方生赭石一兩軋細懷牛膝一兩生懷地黃一兩大甘枸杞八錢生杭芍六錢淨萸肉六錢生龍骨五錢搗碎生牡蠣五錢搗碎柏子仁五錢炒搗茵陳錢半甘草錢半磨取生鐵鏽濃水以之煎藥煎湯一大盅溫服效果將藥連服五劑病遂脫然全愈將赭石牛膝地黃皆改用八錢俾多服數劑以善其後腦充血兼偏枯天津孫年四十六歲得腦充血證遂至偏枯病因稟性褊急又兼處境不順恆觸動肝火致得斯證證候未病之先恆覺頭疼時常眩暈一日又遇事有拂意遂忽然昏倒移時醒後左手足皆不能動並其半身皆麻木言語謇澀延醫服藥十個月手略能動其五指則握而不伸足可任地而不能行步言語仍然謇澀又服藥數月病仍如故診其脈左右皆弦硬右部似尤甚知雖服藥年餘腦充血之病猶未除也問其心中發熱乎腦中有時覺疼乎答曰心中有時覺有熱上衝胃口其熱再上升則腦中可作疼然不若病初得時腦疼之劇也問其大便兩三日一行證脈相參其腦中猶病充血無疑診斷按此證初得不但腦充血實兼腦溢血也其溢出之血著於左邊司運動之神經則右半身痿廢著於右邊司運動之神經則左半身痿廢此乃交叉神經以互司其身之左右也想其得病之初脈象之弦硬此時尤劇是以頭疼眩暈由充血之極而至於溢血因溢血而至於殘廢也即現時之證脈詳參其腦中溢血之病想早就愈而腦充血之病根確未除也宜注意治其腦充血而以通活經絡之藥輔之處方生懷山藥一兩生懷地黃一兩生赭石八錢研細懷牛膝八錢生杭芍六錢柏子仁四錢炒搗白朮三錢炒滴乳香三錢明沒藥三錢土鱉蟲四大個搗生雞內金錢半黃色的搗茵陳一錢共煎湯一大盅溫服復診將藥連服七劑腦中已不作疼心中間有微熱之時其左半身自覺肌肉鬆活不若從前之麻木言語之謇澀稍愈大便較前通順脈之弦硬已愈十之七八擬再注意治其左手足之痿廢處方生箭耆五錢天花粉八錢生赭石六錢軋細懷牛膝五錢滴乳香四錢明沒藥四錢當歸三錢絲瓜絡三錢土鱉蟲四大個搗地龍二錢去土共煎湯一大盅溫服三診將藥連服三十餘劑隨時略有加喊其左手之不伸者已能伸左足之不能邁步者今已舉足能行矣病人問從此再多多服藥可能復原否答曰此病若初得即治服藥四十餘劑即能脫然今已遲延年餘雖服數百劑亦不能保全愈因關節經絡之間瘀滯已久也然再多服數十劑仍可見愈遂即原方略為加減再設法以瞤動其神經補助其神經當更有效處方生箭耆六錢天花粉八錢生赭石六錢軋細懷牛膝五錢滴乳香四錢明沒藥四錢當歸三錢土鱉蟲四大個搗地龍二錢去土真鹿角膠二錢軋細廣三七二錢軋細制馬錢子末三分藥共十二味先將前九味共煎湯一大盅送服後三味各一半至煎渣再服時仍送服其餘一半方解方中用鹿角膠者因其可為左半身引經且其角為督脈所生是以其性善補益腦髓以滋養腦髓神經也用三七者關節經絡間積久之瘀滯三七能融化之也用制馬錢子者以其能瞤動神經使靈活也效果將藥又連服三十餘劑手足之舉動皆較前便利言語之謇澀亦大見愈可勉強出門作事矣遂俾停服湯藥日用生懷山藥細末煮作茶湯調以白糖令適口送服黃色生雞內金細末三分許當點心用之以善其後此欲用山藥以補益氣血少加雞內金以化瘀滯也説明按腦充血證最忌用黃耆因黃耆之性補而兼升氣升則血必隨之上升致腦中之血充而益充排擠腦中血管可至溢血甚或至破裂而出血不可救藥者多矣至將其腦充血之病治愈而肢體之痿廢仍不愈者皆因其經絡瘀塞血脈不能流通也此時欲化其瘀塞通其血脈正不妨以黃耆輔之特是其腦中素有充血之病終嫌黃耆升補之性能助血上升故方中仍加生赭石牛膝以防血之上升即所以監製黃耆也又慮黃耆性溫溫而且補即能生熱故又重用花粉以調劑之也五腸胃病門噎膈天津盛年五旬得噎膈證病因處境恆多不順且又秉性褊急易動肝火遂得斯證證候得病之初期覺飲食有不順時後則常常如此始延醫為調治服藥半年更醫十餘人皆無效驗轉覺病勢增劇自以為病在不治已停藥不服矣適其友人何勸其求愚為之診治其六脈細微無力強食餅乾少許必嚼成稀糜方能下咽咽時偶覺齟齬即作嘔吐帶出痰涎若干惟飲粳米所煮稠湯尚無阻礙其大便燥結如羊矢不易下行診斷楊素園謂此病與失血異證同源血之來也暴將胃壁之膜衝開則為吐血其來也緩不能衝開胃膜遂瘀於上脘之處致食管窄隘即成噎膈至西人則名為胃癌所謂癌者如山石之有岩其形凸出也此與楊氏之説正相符合其為瘀血致病無疑也其脈象甚弱者為其進食甚少氣血兩虧也至其便結如羊矢亦因其飲食甚少兼胃氣虛弱不輸送下行之故也此宜化其瘀血兼引其血下行而更輔以培養氣血之品處方生赭石一兩軋細野臺參五錢生懷山藥六錢天花粉六錢天冬四錢桃仁三錢去皮搗紅花二錢土鱉蟲五枚搗碎廣三七二錢搗細藥共九味將前八味煎湯一大盅送服三七末一半至煎渣再服時再送服其餘一半方解方中之義桃仁紅花土鱉蟲三七諸藥所以消其瘀血也重用生赭石至一兩所以引其血下行也用臺參山藥者所以培養胃中之氣化不使因服開破之藥而有傷損也用天冬天花粉者恐其胃液枯稿所瘀之血將益乾結故借其涼潤之力以滋胃液且即以防颱參之因補生熱也效果將藥服至兩劑後即可進食服至五劑大便如常因將赭石改用八錢又服數劑飲食加多仍覺胃口似有阻礙不能脫然俾將三七加倍為四錢仍分兩次服下連進四劑自大便瀉下膿血若干病遂全愈説明按噎膈之證有因痰飲而成者其胃口之間生有痰囊即喻氏寓意草中所謂窠囊本方去土鱉蟲三七加清半夏四錢數劑可愈有因胃上脘枯稿痿縮致成噎膈者本方去土鱉蟲三七將赭石改為八錢再加當歸龍眼肉枸杞子各五錢多服可愈有因胃上脘生瘤贅以致成噎膈者論胃病噎膈治法及反胃治法中曾詳論然此證甚少較他種噎膈亦甚難治蓋瘤贅之生恆有在胃之下脘成反胃者至生於胃之上脘成噎膈者則百中無一二也反胃吐食天津陳年五十六歲得反胃吐食證半年不愈病因初因夏日多食瓜果致傷脾胃廉於飲食後又因處境不順心多抑鬱致成反胃之證證候食後消化力甚弱停滯胃中不下行漸覺噁心久之則覺有氣自下上衝即將飲食吐出屢經醫診視服暖胃降氣之藥稍愈仍然反復遷延已年餘矣身體羸弱脈弦長按之不實左右皆然診斷此證之飲食不能消化固由於脾胃虛寒然脾胃虛寒者食後恆易作泄瀉此則食不下行而作嘔吐者因其有沖氣上衝並迫其胃氣上逆也當以溫補脾胃之藥為主而以降胃鎮沖之藥輔之處方生懷山藥一兩白朮三錢炒乾薑三錢生雞內金三錢黃色的搗生赭石六錢軋細炙甘草二錢共煎湯一大盅溫服效果將藥煎服後覺飲食下行不復嘔吐翌日頭午大便下兩次再診其脈不若從前之弦長知其下元氣化不固不任赭石之鎮降也遂去赭石加赤石脂五錢用頭煎和次煎之湯分兩次送服蘇子二錢日煎服一劑連服十劑霍然全愈蓋赤石脂為末送服可代赭石以降胃鎮沖而又有固澀下焦之力故服後不復滑瀉也胃脘疼悶天津徐氏婦年近三旬得胃脘疼悶證病因本南方人久居北方遠懷鄉里歸寧不得常起憂思因得斯證證候中焦氣化凝郁飲食停滯艱於下行時欲厄逆又苦不能上達甚則蓄極綿綿作疼其初病時惟覺氣分不舒服藥治療三年病益加劇且身形亦漸羸弱呼吸短氣口無津液時常作渴大便時常乾燥其脈左右皆弦細右脈又兼有牢意診斷內經謂脾主思此證乃過思傷脾以致脾不升胃不降也為其脾氣不上升是以口無津液厄逆不能上達為其胃氣不降是以飲食停滯大便乾燥治之者當調養其脾胃俾還其脾升胃降之常則中焦氣化舒暢疼脹自愈飲食加多而諸病自除矣處方生懷山藥一兩大甘枸杞八錢生箭耆三錢生雞內金三錢黃色的搗生麥芽三錢玄參三錢天花粉三錢天冬三錢生杭芍二錢桂枝尖錢半生薑三錢大棗三枚掰開共煎湯一大盅溫服方解此方以山藥枸杞黃耆薑棗培養中焦氣化以麥芽升脾麥芽生用善升以雞內金降胃雞內金生用善降以桂枝升脾兼以降胃氣之當升者遇之則升氣之當降者遇之則降又用玄參花粉諸藥以調劑薑桂黃耆之溫熱則藥性歸於和平可以久服無弊復診將藥連服五劑諸病皆大輕減而胃疼仍未脫然右脈仍有牢意度其疼處當有瘀血凝滯擬再於升降氣化藥中加消瘀血之品處方生懷山藥一兩大甘枸杞八錢生箭耆三錢玄參三錢天花粉三錢生麥芽三錢生雞內金二錢黃色的搗生杭芍二錢桃仁二錢去皮炒搗廣三七二錢軋細藥共十味將前九味煎湯一大盅送服三七末一半至煎渣再服時仍送服其餘一半效果將藥連服四劑胃中安然不疼諸病皆愈身形漸強壯脈象已如常人將原方再服數劑以善其後冷積腹疼大城王年五十歲少腹冷疼久服藥不愈病因自幼在家慣睡火炕後在津棲處寒涼飲食又多不慎遂得此證證候其少腹時覺下墜眠時須以暖水袋尉臍下不然則疼不能寐若屢服熱藥上焦即覺煩躁已歷二年不愈脈象沉弦左右皆然至數稍遲診斷即其兩尺沉弦涼而且墜論之知其腸中當有冷積此宜用溫通之藥下之處方與以自制通徹丸系用牽牛頭末和水為丸如秫米粒大三錢俾於清晨空心服下效果閲三點鐘腹中疼似加劇須臾下如緑豆糊所熬涼粉者若干疼墜脫然全愈亦不覺涼繼為開溫通化滯之方俾再服數劑以善其後腸結腹疼天津李年二十五歲於仲春得腹結作疼證病因偶因惱怒觸動肝氣遂即飲食停腸中結而不下作疼證候食結腸中時時切疼二十餘日大便不通始猶少進飲食繼則食不能進飲水一口亦吐出延醫服藥無論何藥下咽亦皆吐出其脈左右皆微弱猶幸至數照常按之猶有根柢知猶可救療法治此等證必止嘔之藥與開結之藥並用方能直達病所又必須內外兼治則久停之結庶可下行處方用硝蔔通結湯送服生赭石細末湯分三次服下每五十分鐘服一次共送服赭石末兩半外又用蔥白四斤切絲醋炒至極熱將熱布包尉患處涼則易之又俾用淨萸肉二兩煮湯一盅結開下後飲之以防虛脫效果自晚八點鐘服至夜半時將藥服完炒蔥外尉至翌日早八點鐘下燥糞二十枚後繼以溏便知其下淨遂將萸肉湯飲下安然全愈若虛甚者結開欲大便時宜先將萸肉湯服下腸結腹疼兼外感實熱瀋陽張姓媼年過六旬腸結腹疼兼心中發熱病因素有肝氣病因怒肝氣發動恆至大便不通必服瀉藥始通下此次舊病復發而嘔吐不能受藥是以病久不愈證候胃下臍上似有實積常常作疼按之則疼益甚表裡俱覺發熱噁心嘔吐連次延醫服藥下咽須臾即吐出大便不行已過旬日水漿不入者七八日矣脈搏五至左右脈象皆弱獨右關重按似有力舌有黃苔中心近黑因問其得病之初曾發冷否答云旬日前曾發冷兩日至三日即變為熱矣診斷即此證脈論之其陽明胃腑當蘊有外感實熱是以表裡俱熱因其腸結不通胃氣不能下行遂轉而上行與熱相併作嘔吐治此證之法當用鎮降之藥止其嘔咸潤之藥開其結又當輔以補益之品俾其嘔止結開而正氣無傷始克有濟處方生石膏一兩軋細生赭石一兩軋細玄參一兩潞參四錢芒硝四錢生麥芽二錢茵陳二錢共煎湯一大盅溫服效果煎服一劑嘔止結開大便通下燥糞若干表裡熱皆輕減可進飲食診其脈仍有餘熱未淨再為開滋陰清熱之方俾服數劑以善其後六頭部病門頭疼天津李姓得頭疼證日久不愈病因其人素羸弱因商務操勞遇事又多不順心肝之火常常妄動遂致頭疼證候頭疼不起床者已逾兩月每日頭午猶輕過午則浸加重夜間疼不能寐雞鳴後疼又漸輕可以少睡心中時或覺熱飲食懶進脈搏五至左部弦長關脈猶弦而兼硬右脈則稍和平診斷即此脈象論之顯系肝膽之熱上衝腦部作疼也宜用藥清肝火養肝陰鎮肝逆且兼用升清降濁之藥理其腦部處方生杭芍八錢柏子仁六錢玄參六錢生龜板六錢軋細龍膽草三錢川芎錢半甘菊花一錢甘草三錢共煎湯一大盅溫服效果服藥一劑病愈十之七八脈象亦較前和平遂將龍膽草減去一錢又服兩劑全愈或問川芎為升提氣分之品今其頭疼既因肝膽之熱上衝復用川芎以升提之其熱不益上衝乎何以服之有效也答曰川芎升清氣者也清氣即輕氣也按化學之理無論何種氣若在輕氣之中必然下降人之臟腑原有輕氣川芎能升輕氣上至腦中則腦中熱濁之氣自然下降是以其疼可愈也目病干疼天津崔年三十四歲患眼乾間有時作疼病因向因外感之熱傳入陽明之府服藥多甘寒之品致外感之邪未淨痼閉胃中永不消散其熱上衝遂發為眼疾證候兩目乾澀有時目睛脹疼漸至視物昏花心中時常發熱二便皆不通順其脈左右皆有力而右關重按有洪實之象屢次服藥已近二年仍不少愈診斷凡外感之熱傳裡最忌但用甘寒滯泥之藥痼閉其外感之邪不能盡去是以陸九芝謂如此治法其病當時雖愈後恆變成癆瘵此證因其稟賦強壯是以未變癆瘵而發為眼疾醫者不知清其外感之餘熱而泛以治眼疾之藥治之是以歷久不愈也愚有自制離中丹再佐以清熱托表之品以引久蘊之邪熱外出眼疾當愈處方離中丹一兩鮮蘆根五錢鮮茅根五錢藥共三味將後二味煎湯三杯分三次溫服每次服離中丹三錢強為一日之量若二種鮮根但有一種者可倍作一兩用之效果將藥如法服之至第三日因心中不發熱將離中丹減半又服數日眼之乾澀疼脹皆愈二便亦順利牙疼天津王姓年三十餘得牙疼病病因商務勞心又兼連日與友宴飲遂得斯證證候其牙疼甚劇有礙飲食夜不能寐服一切治牙疼之藥不效已遷延二十餘日矣其脈左部如常而右部弦長按之有力診斷此陽明胃氣不降也上牙齦屬足陽明胃下牙齦屬手陽明大腸究之胃氣不降腸中之氣亦必不降火隨氣升血亦因之隨氣上升並於牙齦而作疼是以牙疼者牙齦之肉多腫熱也宜降其胃氣兼引其上逆之血下行更以清熱之藥輔之處方生赭石一兩軋細懷牛膝一兩滑石六錢甘草一錢煎湯服效果將藥煎服一劑牙疼立愈俾按原方再服一劑以善其後説明方書治牙疼未見有用赭石牛膝者因愚曾病牙疼以二藥治愈後凡遇胃氣不降致牙疼者方中必用此二藥其陽明胃腑有實熱者又恆加生石膏數錢七肢體疼痛門脅疼天津陳年六旬得脅下作疼證病因因操勞過度遂得脅下作疼病證候其疼或在左脅或在右脅或有時兩脅皆疼醫者治以平肝舒肝柔肝之法皆不效遷延年餘病勢浸增疼劇之時覺精神昏憒其脈左部微細按之即無右脈似近和平其搏動之力略失於弱診斷人之肝居脅下其性屬木原喜條達此因肝氣虛弱不能條達故鬱於脅下作疼也其疼或在左或在右者難經云肝之為臟其治在左其藏在右脅右腎之前並胃著於胃之第九椎醫宗金鑑刺灸篇曾引此數語今本難經不知被何人刪去所謂臟者肝臟所居之地也謂治者肝氣所行之地也是知肝雖居右而其氣化實先行於左其疼在左者肝氣鬱於所行之地也其疼在右者肝氣鬱於所居之地也其疼劇時精神昏憒者因肝經之病原與神經有涉也肝主筋腦髓神經為灰白色之筋是以肝經之病與神經有涉治此證者當以補助肝氣為主而以升肝化郁之藥輔之處方生箭耆五錢生杭芍四錢玄參四錢滴乳香三錢炒明沒藥三錢不炒生麥芽三錢當歸三錢川芎二錢甘草錢半共煎湯一大盅溫服方解方書有謂肝虛無補法者此非見道之言也黃耆為補肝之主藥何則黃耆之性溫而能升而臟腑之中秉溫升之性者肝木也是以各臟腑氣虛黃耆皆能補之而以補肝經之氣虛實更有同氣相求之妙是以方中用之為主藥然因其性頗溫重用之雖善補肝氣恐並能助肝火故以芍藥玄參之滋陰涼潤者濟之用乳香沒藥者以之融化肝氣之郁也用麥芽芎藭者以之升達肝氣之郁也究之無論融化升達皆通行其經絡使之通則不痛也用當歸者以肝為藏血之臟既補其氣又欲補其血也且當歸味甘多液固善生血而性溫味又兼辛實又能調和氣分也用甘草者以其能緩肝之急而甘草與芍藥並用原又善治腹疼當亦可善治脅疼也再診將藥連服四劑脅疼已愈強半偶有疼時亦不甚劇脈象左部重按有根右部亦較前有力惟從前因脅疼食量減少至此仍未增加擬即原方再加健胃消食之品處方生箭耆四錢生杭芍四錢玄參四錢於白朮三錢滴乳香三錢炒明沒藥三錢不炒生麥芽三錢當歸三錢生雞內金二錢黃色的搗川芎二錢甘草錢半共煎湯一大盅溫服三診將藥連服四劑脅下已不作疼飲食亦較前增加脈象左右皆調和無病惟自覺兩腿筋骨軟弱此因病久使然也擬再治以舒肝健胃強壯筋骨之劑處方生箭耆四錢生懷山藥四錢天花粉四錢胡桃仁四錢於白朮三錢生明沒藥三錢當歸三錢生麥芽三錢寸麥冬三錢生雞內金二錢黃色的搗真鹿角膠三錢藥共十一味將前十味煎湯一大盅再將鹿角膠另用水燉化和勻溫服效果將藥連服十劑身體浸覺健壯遂停服湯藥俾用生懷山藥細末七八錢或至一兩涼水調和煮作茶湯調以蔗糖令其適口當點心服之服後再嚼服熟胡桃仁二三錢如此調養宿病可以永愈脅下疼兼胃口疼天津齊年五旬得脅下作疼兼胃口疼病病因素有肝氣不順病繼因設買賣賠纍激動肝氣遂致脅下作疼久之胃口亦疼證候其初次覺疼恆在申酉時且不至每日疼後浸至每日覺疼又浸至無時不疼屢次延醫服藥過用開破之品傷及脾胃飲食不能消化至疼劇時恆連胃中亦疼其脈左部沉弦微硬右部則弦而無力一息近五至診斷其左脈弦硬而沉者肝經血虛火盛而肝氣又鬱結也其右脈弦而無力者土為木傷脾胃失其蠕動健運也其脅疼之起點在申酉時者因肝屬木申酉屬金木遇金時其氣化益遏抑不舒也內經謂厥陰不治求之陽明夫厥陰為肝陽明為胃遵內經之微旨以治此證果能健補脾胃俾中焦之氣化運行無滯再少佐以理肝之品則胃疼可愈而脅下之疼亦即隨之而愈矣處方生懷山藥一兩大甘枸杞六錢玄參五錢寸麥冬四錢帶心於白朮三錢生杭芍三錢生麥芽三錢桂枝尖二錢龍膽草二錢生雞內金二錢黃色的搗厚朴錢半甘草錢半共煎湯一大盅溫服復診將藥連服四劑胃中已不作疼脅下之疼亦大輕減且不至每日作疼即有疼時亦須臾自愈脈象亦見和緩遂即原方略為加減俾再服之處方生懷山藥一兩大甘枸杞六錢玄參四錢寸麥冬四錢帶心於白朮三錢生杭芍三錢當歸三錢桂枝尖二錢龍膽草二錢生雞內金二錢黃色的搗醋香附錢半甘草錢半生薑二錢共煎湯一大盅溫服效果將藥連服五劑脅下之疼霍然全愈肝脈亦和平如常矣遂停服湯藥俾日用生懷山藥細末兩許水調煮作茶湯調以蔗糖令適口以之送服生雞內金細末二分許以善其後或問理肝之藥莫如柴胡其善舒肝氣之鬱結也今治脅疼兩方中皆用桂枝而不用柴胡將毋另有取義答曰桂枝與柴胡雖皆善理肝而其性實有不同之處如此證之疼肇於脅下是肝氣鬱結而不舒暢也繼之因脅疼纍及胃中亦疼是又肝木之橫恣而其所能勝也柴胡能舒肝氣之郁而不能平肝木之橫恣桂枝其氣溫升溫升為木氣能舒肝氣之鬱結則脅疼可愈其味辛辣辛辣為金味更能平肝木橫恣則胃疼亦可愈也惟其性偏於溫與肝血虛損有熱者不宜故特加龍膽草以調劑之俾其性歸和平而後用之有益無損也不但此也拙擬兩方之要旨不外升肝降胃而桂枝之妙用不但為升肝要藥實又為降胃要藥金匱桂枝加桂湯治腎邪奔豚上干直透中焦而方中以桂枝為主藥是其能降胃之明徵也再上溯神農本草經謂桂枝主上氣咳逆及吐吸吸不歸根即吐出即後世所謂喘也是桂枝原善降肺氣然必胃氣息息下行肺氣始能下達無礙細繹經旨則桂枝降胃之功用更可借善治上氣咳逆吐吸而益顯也蓋肝升胃降原人身氣化升降之常順人身自然之氣化而調養之則有病者自然無病此兩方之中所以不用柴胡皆用桂枝也脅疼鄰村李姓婦年近四旬得脅下疼證病因平素肝氣不舒繼因暴怒脅下陡然作疼證候兩脅下掀疼甚劇呻吟不止其左脅之疼尤甚倩人以手按之則其疼稍愈心中時覺發熱噁心欲作嘔吐脈左右兩部皆弦硬診斷此肝氣膽火相助橫恣欲上升而不能透膈鬱於脅下而作疼也當平其肝氣瀉其膽火其疼自愈處方川楝子八錢搗碎生杭芍四錢生明沒藥四錢生麥芽三錢三稜三錢莪朮三錢茵陳二錢龍膽草二錢連翹三錢磨取生鐵鏽濃水煎藥取湯一大盅溫服方解方中川楝芍藥龍膽引氣火下降者也茵陳生麥芽引氣火上散者也三稜莪朮開氣火之凝結連翹沒藥消氣火之瀰漫用鐵鏽水煎藥者借金之餘氣以鎮肝膽之木也效果煎服一劑後其疼頓止而仍覺氣分不舒遂將川楝三稜莪朮各減半再加柴胡二錢一劑全愈腰疼天津李年三十四歲得腰疼證病因勞心過度數日懶食又勉強遠出操辦要務因得斯證證候其疼劇時不能動轉輕時則似疼非疼綿綿不已亦恆數日不疼或動氣或勞力時則疼劇心中非常發悶其脈左部沉弦右部沉牢一息四至強觀其從前所服之方雖不一致大抵不外補肝腎強筋骨諸藥間有雜似祛風藥者自謂得病之初至今已三年服藥數百劑其疼卒未輕減診斷內經謂通則不痛此證乃痛則不通也肝腎果系虛弱其脈必細數今左部沉弦右部沉牢其為腰際關節經絡有瘀而不通之氣無疑擬治以利關節通經絡之劑處方生懷山藥一兩大甘枸杞八錢當歸四錢丹參四錢生明沒藥四錢生五靈脂四錢穿山甲二錢炒搗桃仁二錢去皮搗碎紅花錢半土鱉蟲五枚搗碎廣三七二錢軋細藥共十一味先將前十味煎湯一大盅送服三七細末一半至煎渣重服時再送其餘一半效果將藥連服三劑腰已不疼心中亦不發悶脈象雖有起色仍未復常遂即原方去山甲加川續斷生杭芍各三錢連服數劑脈已復常自此病遂除根説明醫者治病不可預有成見臨證時不復細審病因方書謂腰者腎之府腰疼則腎臟衰憊又謂肝主筋腎主骨腰疼為筋骨之病是以肝腎主之治腰疼者因先有此等説存於胸中恆多用補肝腎之品究之此在由於肝腎虛者甚少由於氣血瘀者頗多若因努力任重而腰疼者尤多瘀證曾治一人因擔重物後腰疼為用三七土鱉蟲等分共為細末每服二錢日兩次服三日全愈又一人因抬物用力過度腰疼半年不愈忽於疼處發出一瘡在脊梁之旁微似紅腫狀若覆盂大徑七寸瘍醫以為腰疼半年始發現此瘡其根蒂必深不敢保好轉求愚為治療調治兩旬始愈詳案載內託生肌散後然使當腰初覺疼之時亦服三七土鱉以開其瘀又何至有後時之危險乎又嘗治一婦每當行經之時腰疼殊甚診其脈氣分甚虛於四物湯中加黃耆八錢服數劑而疼愈又一婦腰疼綿綿不止亦不甚劇診其脈知其下焦虛寒治以溫補下焦之藥又於服湯藥之外俾服生硫黃細末一錢日兩次硫黃服盡四兩其疼除根是知同是腰疼而其致病之因各異治之者安可膠柱鼓瑟哉腿疼鄰村竇年過三旬於孟冬得腿疼證病因稟賦素弱下焦常畏寒涼一日因出門寢於寒涼屋中且鋪蓋甚薄晨起遂病腿疼證候初疼時猶不甚劇數延醫服藥無效後因食豬頭肉其疼陡然加劇兩腿不能任地夜則疼不能寐其脈左右皆弦細無力兩尺尤甚至數稍遲診斷此證因下焦相火虛衰是以易為寒侵而細審其脈實更兼氣虛不能充體即不能達於四肢以運化藥力是以所服之藥縱對證亦不易見效也此當助其相火祛其外寒而更加補益氣分之藥使氣分壯旺自能運行藥力以勝病也處方野黨參六錢當歸五錢懷牛膝五錢胡桃仁五錢烏附子四錢補骨脂三錢炒搗滴乳香三錢炒明沒藥三錢不炒威靈仙錢半共煎湯一大盅溫服復診將藥連服五劑腿之疼稍覺輕而仍不能任地脈象較前似稍有力問其心中服此熱藥多劑後仍不覺熱因思其疼在於兩腿當用性熱質重之品方能引諸藥之力下行以達病所處方野黨參五錢懷牛膝五錢胡桃仁五錢烏附子四錢白朮三錢炒補骨脂三錢炒搗滴乳香三錢炒明沒藥三錢不炒生硫黃一錢研細藥共九味將前八味煎湯一大盅送服硫黃末五分至煎渣再服時又送服所餘五分效果將藥連服八劑腿疼大見輕減可扶杖行步脈象已調和無病心中微覺發熱俾停服湯藥每日用生懷山藥細末七八錢許煮作茶湯送服青娥丸三錢或一次或兩次皆可後服至月餘兩腿分毫不疼步履如常人矣或問豬肉原為尋常服食之物何以因食豬頭肉而腿疼加劇乎答曰豬肉原有苦寒有毒之説曾見於各家本草究之其肉非苦寒亦非有毒而豬頭之肉實具有鹹寒開破之性是以善通大便燥結其鹹寒與開破皆與腿之虛寒作疼者不宜也此所以食豬頭肉後而腿之疼加劇也八腫脹門受風水腫邑北境劉氏婦年過三旬因受風得水腫證病因時當孟夏農家忙甚將飯炊熟復自饁田間因作飯時受熱出汗出門時途間受風此後即得水腫證證候腹中脹甚頭面周身皆腫兩目之腫不能開視心中發熱周身汗閉不出大便乾燥小便短赤其兩腕腫甚不能診脈按之移時水氣四開始能見脈其左部弦而兼硬右部滑而頗實一息近五至診斷金匱辨水證之脈謂風水脈浮此證脈之部位腫甚原無從辨其脈之浮沉然即其自述謂於有汗受風之後其為風水無疑也其左脈弦硬者肝膽有鬱熱也其右脈滑而實者外為風束胃中亦浸生熱也至於大便乾燥小便短赤皆肝胃有熱之所致也當用金匱越婢湯加減治之處方生石膏一兩搗細滑石四錢生杭芍四錢麻黃三錢甘草二錢大棗四枚掰開生薑二錢西藥阿斯匹林一瓦中藥七味共煎湯一大盅當煎湯將成之時先用白糖水將西藥阿斯匹林送下候周身出汗若不出汗仍可再服一瓦將所煎之湯藥溫服下其汗出必益多其小便當利腫即可消矣復診如法將藥服完果周身皆得透汗心中已不發熱小便遂利腹脹身腫皆愈強半脈象已近和平擬再治以滋陰利水之劑以消其餘腫處方生杭芍六錢生薏米六錢搗碎鮮白茅根一兩藥共三味先將前二味水煎十餘沸加入白茅根再煎四五沸取湯一大盅溫服效果將藥連服十劑其腫全消俾每日但用鮮白茅根一兩煎數沸當茶飲之以善其後或問前方中用麻黃三錢原可發汗何必先用西藥阿斯匹林先發其汗乎答曰麻黃用至三錢雖能發汗然有石膏滑石芍藥以監製之則其發汗之力頓減況肌膚腫甚者汗尤不易透出也若因其汗不易出擬復多加麻黃而其性熱而且燥又非所宜惟西藥阿斯匹林其性涼而能散既善發汗又善清熱以之為麻黃之前驅則麻黃自易奏功也或問風襲人之皮膚何以能令人小便不利積成水腫答曰小便出於膀胱膀胱者太陽之腑也襲入之風由經傳腑致膀胱失其所司是以小便不利麻黃能祛太陽在腑之風佐以石膏滑石更能清太陽在腑之熱是以服藥汗出而小便自利也況此證肝中亦有蘊熱內經謂肝熱病者小便先黃是肝與小便亦大有關係也方中兼用芍藥以清肝熱則小便之利者當益利至於薏米茅根亦皆為利小便之輔佐品彙集諸藥為方是以用之必效也陰虛水腫鄰村霍氏婦年二十餘因陰虛得水腫證病因因陰分虛損常作灼熱浸至小便不利積成水腫證候頭面周身皆腫以手按其腫處成凹移時始能復原日晡潮熱心中亦恆覺發熱小便赤澀一日夜間不過通下一次其脈左部弦細右部弦而微硬其數六至診斷此證因陰分虛損腎臟為虛熱所傷而生炎是以不能漉水以利小便且其左脈弦細則肝之疏泄力減可致小便不利右脈弦硬胃之蘊熱下溜亦可使小便不利是以積成水腫也宜治以大滋真陰之品俾其陰足自能退熱則腎炎可愈胃熱可清肝木得腎水之涵濡而其疏泄之力亦自充足再輔以利小便之品作嚮導其小便必然通利所積之水腫亦不難徐消矣處方生懷山藥一兩生懷地黃六錢生杭芍六錢玄參五錢大甘枸杞五錢沙參四錢滑石三錢共煎湯一大盅溫服復診將藥連服四劑小便已利頭面周身之腫已消弱半日晡之熱已無心中仍有發熱之時惟其脈仍數逾五至知其陰分猶未充足也仍宜注重補其真陰而少輔以利水之品處方熟懷地黃一兩生杭芍六錢生懷山藥五錢大甘枸杞五錢柏子仁四錢玄參四錢沙參三錢生車前子三錢裝袋大雲苓片二錢鮮白茅根五錢藥共十味先將前九味水煎十餘沸再入鮮白茅根煎四五沸取湯一大盅溫服若無鮮白茅根可代以鮮蘆根至兩方皆重用芍藥者因芍藥性善滋陰而又善利小便原為陰虛小便不利者之主藥也效果將藥連服六劑腫遂盡消脈已復常遂停服湯藥俾日用生懷山藥細末兩許熬作粥少兌以鮮梨自然汁當點心服之以善其後風水有痰遼寧馬年五旬得受風水腫兼有痰證病因因秋末遠出勞碌受風遂得斯證證候腹脹周身漫腫喘息迫促咽喉膺胸之間時有痰涎杜塞舌苔淡白小便赤澀短少大便間日一行脈象無火而微浮擬是風水當遵金匱治風水之方治之處方生石膏一兩搗細麻黃三錢甘草二錢生薑二錢大棗四枚掰開西藥阿斯匹林三分藥共六味將前五味煎湯一大盅沖化阿斯匹林溫服被復取汗方解此方即越婢湯原方加西藥阿斯匹林也當時冬初北方天氣寒涼汗不易出恐但服越婢湯不能得汗故以西藥之最善發汗兼能解熱者之阿斯匹林佐之復診將藥服後汗出遍體喘息頓愈他證如故又添心中熱渴不思飲食診其脈仍無火象蓋因痰飲多而濕勝故也斯當舍脈從證而治以清熱之重劑處方生石膏四兩搗細天花粉八錢薄荷葉錢半共煎湯一大碗俾分多次徐徐溫飲下三診將藥服後熱渴痰涎皆愈強半小便亦見多可進飲食而漫腫腹脹不甚見輕斯宜注重利其小便以消漫腫再少加理氣之品以消其腹脹處方生石膏一兩搗細滑石一兩地膚子三錢丈菊子三錢搗碎海金沙三錢檳榔三錢鮮茅根三錢共煎湯一大盅半分兩次溫服下丈菊俗名向日葵究之向日葵之名當屬之衛足花不可以名丈菊也丈菊子本草綱目未收因其善治淋疼利小便故方中用之效果將藥煎服兩劑小便大利腫脹皆見消因將方中石膏滑石檳榔皆減半連服三劑病全愈九黃疸門黃疸兼外感天津蘇媼年六十六歲於仲春得黃疸證病因事有拂意怒動肝火繼又薄受外感遂遍身發黃成疸證證候周身黃色如橘目睛黃尤甚小便黃可染衣大便色白而干心中發熱作渴不思飲食其脈左部弦長有力且甚硬右部脈亦有力而微浮舌苔薄而白無津液診斷此乃肝中先有蘊熱又為外感所束其熱益甚致膽管腫脹不能輸其膽汁於小腸而溢於血中隨血運遍周身是以周身無處不黃逮至隨血運行之餘又隨水飲滲出歸於膀胱是以小便亦黃至於大便色白者因膽汁不入小腸以化食大便中既無膽汁之色也金匱有硝石礬石散原為治女勞疸之專方愚恆借之以概治疸證皆效而煎湯送服之藥須隨證變更其原方原用大麥粥送服而此證肝膽之脈太盛當用瀉肝膽之藥煎湯送之處方淨火硝一兩研細皂礬一兩研細大麥面二兩焙熱如無可代以小麥面水和為丸桐子大每服二錢日兩次此即硝石礬石散而變散為丸也湯藥生懷山藥一兩生杭芍八錢連翹三錢滑石三錢梔子二錢茵陳二錢甘草二錢共煎湯一大盅送服丸藥一次至第二次服丸藥時仍煎此湯藥之渣送之再者此證舌苔猶白右脈猶浮當於初次服藥後遲一點鐘再服西藥阿斯匹林一瓦俾周身得微汗以解其未罷之表證復診將藥連服四劑阿斯匹林服一次已周身得汗其心中已不若從前之渴熱能進飲食大便已變黑色小便黃色稍淡周身之黃亦見退脈象亦較前和緩俾每日仍服丸藥兩次每次服一錢五分所送服之湯藥方則稍為加減湯藥生懷山藥一兩生杭芍六錢生麥芽三錢茵陳二錢鮮茅根三錢茅根無鮮者可代以鮮蘆根龍膽草二錢甘草錢半共煎湯送服丸藥如前效果將藥連服五劑周身之黃已減三分之二小便之黃亦日見清減脈象已和平如常遂俾停藥勿服日用生懷山藥生薏米等分軋細煮作茶湯調入鮮梨鮮荸薺自然汁當點心服之閲兩旬病遂全愈或問黃疸之證中法謂病發於脾西法謂病發於膽今此案全從病發於膽論治將勿中法謂病發於脾者不可信歟答曰黃疸之證有發於脾者有發於膽者為黃疸之原因不同是以仲聖治黃疸之方各異即如硝石礬石散原治病發於膽者也其礬石若用皂礬固為平肝膽要藥至硝石確係火硝其味甚辛辛者金味與礬石並用更可相助為理也且西人謂有因膽石成黃疸者而硝石礬石散又善消膽石有因鉤蟲成黃疸者而硝石礬石散並善除鉤蟲制方之妙誠不可令人思議也不但此也仲聖對於各種疸證多用茵陳因最善入少陽之府以清熱舒郁消腫透竅原為少陽之主藥仲聖若不知黃疸之證兼發於膽何以若斯喜用少陽之藥乎是以至明季南昌喻氏出深窺仲聖用藥之奧旨於治錢小魯酒疸一案直謂膽之熱汁溢於外以漸滲於經絡則周身俱黃云云不已顯然揭明黃疸有發於膽經者乎黃疸王年三十二歲於季秋得黃疸證病因出外行軍夜宿帳中勤苦兼受寒涼如此月餘遂得黃疸證證候周身黃色甚暗似兼灰色飲食減少肢體痠懶無力大便一日恆兩次似完穀不化脈象沉細左部更沉細欲無診斷此脾胃肝膽兩傷之病也為勤苦寒涼過度以致傷其脾胃是以飲食減少完穀不化傷其肝膽是以膽汁凝結於膽管之中不能輸腸以化食轉由膽囊滲出隨血流行於周身而發黃此宜用金匱硝石礬石散以化其膽管之凝結而以健脾胃補肝膽之藥煎湯送服處方用硝石礬石散所制丸藥每服二錢一日服兩次用後湯藥送服湯藥生箭耆六錢白朮四錢炒桂枝尖三錢生雞內金二錢黃色的搗甘草二錢共煎湯一大盅送服丸藥一次至第二次服丸藥時仍煎此湯藥之渣送之復診將藥連服五劑飲食增加消化亦頗佳良體力稍振周身黃退弱半脈象亦大有起色俾仍服丸藥一次服一錢五分日兩次所送服之湯藥宜略有加減湯藥生箭耆六錢白朮三錢炒當歸三錢生麥芽三錢生雞內金二錢黃色的搗甘草二錢共煎湯一大盅送服丸藥一次至第二次服丸藥時仍煎此湯藥之渣送服效果將藥連服六劑周身之黃已退十分之七身形亦漸強壯脈象已復其常俾將丸藥減去一次將湯藥中去白朮加生懷山藥五錢再服數劑以善其後黃疸天津範年三十二歲得黃疸證病因連日朋友飲宴飲酒過量遂得斯證證候周身面目俱黃飲食懶進時作嘔吐心中恆覺發熱小便黃甚大便白而乾澀脈象左部弦而有力右部滑而有力診斷此因脾中蘊有濕熱不能助胃消食轉輸其濕熱於胃以致胃氣上逆是以嘔吐膽火亦因之上逆黃坤載謂非胃氣下降則膽火不降致膽管腫脹不能輸其汁於小腸以化食遂溢於血中而成黃疸矣治此證者宜降胃氣除脾濕兼清肝膽之熱則黃疸自愈處方生赭石一兩軋細生薏米八錢搗細茵陳三錢梔子三錢生麥芽三錢竹茹三錢木通二錢檳榔二錢甘草二錢煎湯服效果服藥一劑嘔吐即止可以進食又服兩劑飲食如常遂停藥靜養旬日間黃疸皆退淨十痢疾門痢疾轉腸潰瘍滄縣楊年三十五歲於季秋因下痢成腸潰瘍證病因因業商賠纍歇業心中懊憹暗生內熱其肝膽之熱下迫致成痢疾痢久不愈又轉為腸潰瘍證候其初下痢時後重腹疼一晝夜十七八次所下者赤痢多帶鮮血間有白痢延醫治療閲兩月病益加劇所下者漸變為血水雜以脂膜其色腐敗其氣腥臭每腹中一覺疼即須入廁一晝夜二十餘次身體羸弱口中發乾心中怔忡其脈左右皆弦細其左部則弦而兼硬一分鐘九十二至診斷此乃因痢久不愈腸中脂膜腐敗由腐敗而至於潰爛是以純下血水雜以脂膜即西人所謂腸潰瘍也其脈象弦細者氣血兩虧也其左脈細而硬者肝腎之陰虧甚也其口乾心中怔忡者皆下血過多之所致也此宜培養其氣血而以解毒化瘀生新之藥佐之處方龍眼肉一兩生懷山藥一兩熟地黃一兩金銀花四錢甘草三錢廣三七三錢軋細藥共六味將前五味煎湯送服三七末一半至煎渣再服時仍送服其餘一半方解龍眼肉為補益脾胃之藥而又善生心血以愈怔忡更善治腸風下血治此證當為主藥山藥亦善補脾胃而又能上益肺氣下固腎氣其所含多量之蛋白質尤善滋陰養血凡氣血兩虛者洵為當用之藥熟地黃不但補腎陰也馮楚瞻謂能大補腎中元氣要亦氣血雙補之品也此三味並用久虧之氣血自能漸復氣血壯旺自能長肌肉排腐爛又佐以金銀花甘草以解毒三七以化瘀生新庶能挽回此垂危之證也復診將藥煎服三劑病大見愈一晝夜大便三四次間見好糞心中已不怔忡脈象猶弦而左部不若從前之硬因所服之藥有效遂即原方略為加減又服數劑其大便仍一日數次血糞相雜因思此證下痢甚久或有阿米巴毒菌伏藏於內擬方中加消除此毒菌之藥治之處方龍眼肉一兩生懷山藥一兩熟地黃一兩甘草三錢生硫黃八分研細鴉膽子成實者六十粒去皮藥共六味將前四味煎湯一大盅送服鴉膽子硫黃末各一半至煎渣再服時仍送服其餘一半方解方中用鴉膽子硫黃者因鴉膽子為治血痢要藥並善治二便下血硫黃為除阿米巴痢之毒菌要藥二藥並用則涼熱相濟性歸和平奏效當速也三診將藥煎服兩劑其大便仍血糞相雜一日數行因思鴉膽子與硫黃並用雖能消除痢中毒菌然鴉膽子化瘀之力甚大硫黃又為潤大便之藥本草謂其能使大便潤小便長西人以硫黃為輕下藥二藥雖能消除痢中毒菌究難使此病完全除根擬去此二藥於方中加保護脂膜固澀大便之品處方龍眼肉一兩生懷山藥一兩大熟地黃一兩赤石脂一兩搗細甘草三錢廣三七三錢軋細藥共六味將前五味煎湯一大盅送服三七細末一半至煎渣再服時仍送服其餘一半效果將藥連服五劑下血之證全愈口中已不發乾猶日下溏糞兩三次然便時腹中分毫不疼矣俾用生懷山藥軋細末每用兩許煮作茶湯調以白糖令適口當點心服之其大便久自能固痢疾天津張姓幼女年五歲於孟秋得痢證病因暑日恣食瓜果脾胃有傷入秋以來則先瀉後痢證候前因泄瀉旬日身體已羸弱繼又變瀉為痢日下十餘次赤白參半下墜腹疼屢次服藥不愈身益羸弱其脈象亦弱而左脈之力似略勝於右診斷按其左右脈皆弱者氣血兩虛也而左脈之力似略勝於右脈者知其肝膽虛而挾熱是以痢久不愈然此熱非純系實熱不可用過涼之藥因其虛而挾熱其虛又不受補是必所用之補品兼能瀉熱俾肝膽之虛熱皆愈而痢自愈矣處方鴨肝一具調以食料烹熟服之日服二次效果如法將鴨肝烹食兩日全愈此方愚在遼寧得之友人齊嘗閲李氏本草綱目鴨肉性涼善治痢鴨蛋之醃咸者亦善治痢而未嘗言及鴨肝然痢之為病多系肝火下迫腸中鴨肉涼想鴨肝亦涼此證先瀉後痢身體羸弱其肝經熱而且虛可知以鴨肝瀉肝之熱即以鴨肝補肝之虛此所謂臟器療法是以奏效甚速也且又香美適口以治孺子之苦於服藥者為尤宜也痢疾天津鄭年五旬於孟秋得下痢證病因連日勞心過度心中有熱多食瓜果遂至病痢證候腹疼後重下痢赤白參半一日夜七八次其脈左部弦而有力右部浮而濡重按不實病已八日飲食減少肢體痠軟診斷證脈合參當系肝膽因勞心生熱脾胃因生冷有傷冷熱相搏遂致成痢當清其肝膽之熱兼顧其脾胃之虛處方生懷山藥一兩生杭芍一兩當歸六錢炒薏米六錢金銀花四錢竹茹三錢碎者甘草三錢生薑三錢共煎湯一大盅溫服復診服藥兩劑腹疼後重皆除下痢次數亦減且純變為白痢再診脈左部已和平如常而右部之脈仍如從前斯再投以溫補脾胃之劑當愈處方生懷山藥一兩炒薏米五錢龍眼肉五錢山楂片三錢乾薑二錢生杭芍二錢共煎湯一大盅溫服效果將藥煎湯服兩劑痢遂全愈説明按欲溫補其脾胃而復用芍藥者防其肝膽因溫補復生熱也用山楂片者以其能化白痢之滯且與甘草同用則酸甘化合實有健運脾胃之功效也噤口痢天津施五十六歲得噤口痢證病因舉家數口寄食友家不能還鄉後友家助以資斧令還鄉道路又復不通日夜焦思頻動肝火時當孟秋心熱貪涼多食瓜果致患下痢證候一日夜下痢十五六次多帶鮮血後重甚劇腹偶覺疼即須入廁便後移時疼始稍愈病已五日分毫不能進食惟一日之間強飲米湯數口其脈左部弦而硬右部弦而浮其搏五至心中發熱常覺噁心診斷此肝火熾盛肝血虛損又兼胃氣挾熱上逆是以下痢甚劇而又噤口不食也當治以滋陰清熱平肝降胃之品處方生杭芍一兩生懷山藥一兩滑石七錢白頭翁五錢秦皮三錢碎竹茹三錢甘草三錢鴉膽子成實者五十粒去皮先用白糖水囫圇送服鴨膽子仁再將余藥煎湯一大盅溫服下復診將藥如法服兩劑痢中已不見鮮血次數減去三分之二其脈左部較前和平右部則仍有浮弦之象仍然不能飲食心中仍然發熱然不若從前之噁心此宜用藥再清其胃腑必然能食矣處方生懷山藥兩半生石膏兩半搗細生杭芍六錢白頭翁四錢秦皮二錢甘草二錢共煎湯一大盅分兩次溫服效果將藥煎服一劑即能進食痢已不見變作泄瀉日四五次俾用生懷山藥細末煮作粥少調以白糖服之三日全愈或問石膏為治外感實熱之藥今此證未夾雜外感何以方中亦用之答曰石膏為治陽明胃腑有實熱者之聖藥初不論其為外感非外感也蓋陽明胃氣以息息下行為順若有熱則其氣多不下行而上逆因其胃氣挾熱上逆所以多噁心嘔吐不思飲食若但知清其熱而不知降其氣治之恆不易見效惟石膏性涼質重雖煎為湯仍有沉重之力其涼也能清實熱其重也能鎮氣逆是以凡胃氣挾實熱上逆令人不思飲食者服之可須臾奏效若必謂石膏專治外感實熱不可用治內傷實熱則近代名醫徐氏吳氏醫案中皆有重用石膏治愈內傷實熱之案何妨取以參觀乎十一大小便病門泄瀉兼發灼天津胡年四十二歲於孟秋得泄瀉兼灼熱病病因其兄因痢病故鋪中之事及為其兄殯葬之事皆其一人經理哀痛之餘又兼心力俱瘁遂致大便泄瀉周身發熱證候一日夜瀉十四五次將瀉時先腹疼瀉後疼益甚移時始愈每過午一點鐘即覺周身發熱然不甚劇夜間三點鐘後又漸愈其脈六部皆弱兩尺尤甚診斷按此證系下焦虛寒及胸中大氣虛損也蓋下焦寒甚者能迫下焦之元陽上浮胸中大氣虛甚者恆不能收攝致衛氣外浮則元陽之上浮與衛氣之外浮相併即可使周身發熱其發在過午者因過午則下焦之陰寒益盛而胸中大氣益虛也胸中大氣乃上焦之陽氣過午陰盛是以大氣益虛此本虛寒泄瀉之證原不難治而醫者因其過午身熱皆不敢投以溫補是以屢治不愈擬治以大劑溫補之藥並收斂其元陽歸其本源則泄瀉止而灼熱亦愈矣處方白朮五錢炒熟懷地黃一兩生懷山藥一兩淨萸肉五錢乾薑三錢烏附子三錢生杭芍三錢雲苓片二錢炙甘草三錢共煎湯一大盅溫服復診服藥一劑身熱即愈服至三劑泄瀉已愈強半脈象亦較前有力遂即原方略為加減俾再服之處方白朮六錢炒熟懷地黃一兩生懷山藥一兩淨萸肉五錢龍眼肉五錢乾薑四錢烏附子四錢雲苓片二錢炙甘草三錢效果將藥連服十餘劑病遂全愈説明大隊溫補藥中復用芍藥者取其與附子並用能收斂元陽歸根於陰且能分利小便則泄瀉易愈也至後方去芍藥者因身已不熱元陽已歸其宅且泄瀉已就愈仍有茯苓以利其小便無須再用芍藥也小便白濁天津李年二十六歲得小便白濁證病因於季秋乘大車還家中途遇雨衣服盡濕夜宿店中又披衣至庭中小便為寒風所襲遂得白濁之證證候尿道中恆發刺癢每小便完時有類精髓流出數滴今已三閲月屢次服藥無效頗覺身體衰弱精神短少其脈左部弦硬右部微浮重按無力診斷內經謂腎主蟄藏肝主疏泄又謂風氣通於肝又謂肝行腎之氣此證因風寒內襲入肝肝得風助其疏泄之力愈大故當小便時肝為腎行氣過於疏泄遂致腎臟失其蟄藏之用尿出而精亦隨之出矣其左脈弦硬者肝脈挾風之象其右脈浮而無力者因病久而氣血虛弱也其尿道恆發刺癢者尤顯為風襲之明徵也此宜散其肝風固其腎氣而更輔以培補氣血之品處方生箭耆五錢淨萸肉五錢生懷山藥五錢生龍骨五錢搗碎生牡蠣五錢搗碎生杭芍四錢桂枝尖三錢生懷地黃三錢甘草錢半共煎湯一大盅溫服方解方中以黃耆為主者因神農本草經原謂黃耆主大風是以風之入臟者黃耆能逐之外出且其性善補氣氣盛自無滑脫之病也桂枝亦逐風要藥因其性善平肝故尤善逐肝家之風與黃耆相助為理則逐風之力愈大也用萸肉龍骨牡蠣者以其皆為收斂之品又皆善收斂正氣而不斂邪氣能助腎臟之蟄藏而無礙肝風之消散藥物解中論之詳矣用山藥者以其能固攝下焦氣化與萸肉同為腎氣丸中要品自能保合腎氣不使虛瀉也用芍藥地黃者欲以調劑黃耆桂枝之熱而芍藥又善平肝地黃又善補腎古方腎氣丸以乾地黃為主藥即今之生地黃也用甘草者取其能緩肝之急即能緩其過於疏泄之力也效果將藥連服三劑病即全愈因即原方去桂枝以熟地易生地俾再服數劑以善其後小便因寒閉塞遼寧石年三十二歲於仲冬得小便不通證病因晚飯之後食梨一顆至夜站岡又受寒過甚遂致小便不通證候病初得時先入西醫院治療西醫治以引溺管小便通出有頃小便復存蓄若干西醫又納以橡皮引溺管使久在其中有尿即通出乃初雖稍利繼則小便仍不出遂求為診治其脈弦細沉微不足四至自言下焦疼甚且涼甚知其小便因受寒而凝滯也斯當以溫熱之藥通之處方野黨參五錢椒目五錢炒搗懷牛膝五錢烏附子三錢廣肉桂三錢當歸三錢乾薑二錢小茴香二錢生明沒藥二錢威靈仙二錢甘草二錢共煎一大盅溫服方解方中之義人參靈仙並用可治氣虛小便不通椒目與桂附乾薑並用可治因寒小便不通又佐以當歸牛膝茴香沒藥甘草諸藥或潤而滑之或引而下之或辛香以透竅或溫通以開瘀或和中以止疼衆藥相濟為功自當隨手奏效也效果將藥煎服一劑小便通下服至三劑腹疼覺涼全愈脈已復常俾停服湯藥日用生硫黃錢許研細分作兩次服以善其後説明諸家本草皆謂硫黃之性能使大便潤小便長用於此證其暖而能通之性適與此證相宜也十二不寐病門心虛不寐天津徐年六十六歲於季春得不寐證病因因性嗜吟詠暗耗心血遂致不寐證候自冬令間有不寐之時未嘗介意至春日陽生病浸加劇逮至季春恆數夜不寐服一切安眠藥皆不效精神大為衰憊心中時常發熱懶於飲食勉強加餐恆覺食停胃脘不下行大便乾燥恆服藥始下其脈左部浮弦右脈尤弦而兼硬一息五至診斷其左脈浮弦者肝血虛損兼肝火上升也陰虛不能潛陽是以不寐其右脈弦而兼硬者胃中酸汁短少更兼胃氣上逆也酸汁少則不能化食氣上逆則不能息息下行傳送飲食是以食後恆停胃脘不下而其大便之燥結亦即由胃腑氣化不能下達所致治此證者宜清肝火生肝血降胃氣滋胃汁如此以調養肝胃則夜間自能安睡食後自不停滯矣處方生懷山藥一兩大甘枸杞八錢生赭石六錢軋細玄參五錢北沙參五錢生杭芍五錢酸棗仁四錢炒搗生麥芽三錢生雞內金錢半黃色的搗茵陳錢半甘草二錢共煎一大盅溫服復診將藥煎服兩劑夜間可睡兩三點鐘心中已不發熱食量亦少加增大便仍滯脈象不若從前之弦硬遂即原方略為加減俾再服之處方生懷山藥一兩大甘枸杞八錢生赭石六錢軋細玄參五錢北沙參五錢酸棗仁四錢炒搗龍眼肉三錢生杭芍三錢生雞內金錢半黃色的搗生遠志錢半茵陳一錢甘草錢半共煎湯一大盅溫服效果將藥連服三劑夜間安睡如常食欲已振大便亦自然通下惟脈象仍有弦硬之意遂將方中龍眼肉改用八錢俾多服數劑以善其後説明人稟天地之氣化以生是以上焦之氣化為陽下焦之氣化為陰當白晝時終日言語動作陰陽之氣化皆有消耗實賴嚮晦燕息以補助之誠以人當睡時上焦之陽氣下降潛藏與下焦之陰氣會合則陰陽自能互根心腎自然相交是以當熟睡之時其相火恆熾盛暗動得心陽之助此心有益於腎也至睡足之時精神自清爽異常得腎陰之助此腎有益於心也由斯知人能寐者由於陽氣之潛藏其不能寐者即由於陽氣之浮越究其所以浮越者實因臟腑之氣化有升無降也是以方中重用赭石以降胃鎮肝即以治大便燥結且其色赤質重能入心中引心陽下降以成寐若更佐以龍骨牡蠣諸收斂之品以鎮安精神則更可穩睡而方中未加入者因其收澀之性與大便燥結者不宜也又內經治目不得瞑有半夏秫米湯原甚效驗誠以胃居中焦胃中之氣化若能息息下行上焦之氣化皆可因之下行半夏善於降胃秫米善於和胃半夏與秫米並用俾胃氣調和順適不失下行之常是以能令人瞑目安睡方中赭石與山藥並用其和胃降胃之力實優於半夏秫米此乃取古方之義而通變化裁雖未顯用古方而不啻用古方也不寐兼驚悸表兄趙之妻年近三旬得不寐證兼心中恆驚悸病因因家中諸事皆其自理勞心過度因得不寐兼驚悸病證候初苦不寐時不過數日偶然其過半夜猶能睡繼則常常如此又繼則徹夜不寐一連七八日困頓已極倣佛若睡陡覺心中怦怦而動即暮然驚醒醒後心猶怔忡移時始定心常發熱呼吸似覺短氣懶於飲食大便燥結四五日始一行其脈左部弦硬右部近滑重診不實一息數近六至診斷此因用心過度心熱耗血更因熱生痰之證也為其血液因熱暗耗陰虛不能潛陽是以不寐痰停心下火畏水刑心屬火痰屬水是以驚悸其呼吸覺短氣者上焦凝滯之痰礙氣之升降也其大便燥結者火盛血虛腸中津液短也此宜治以利痰滋陰降胃柔肝之劑再以養心安神之品輔之處方生赭石八錢軋細大甘枸杞八錢生懷地黃八錢生懷山藥六錢栝蔞仁六錢炒搗天冬六錢生杭芍五錢清半夏四錢棗仁四錢炒搗生遠志二錢茵陳錢半甘草錢半硃砂二分研細藥共十三味將前十二味煎湯一大盅送服硃砂末復診將藥連服四劑心中已不覺熱夜間可睡兩點鐘驚悸已愈十之七八氣息亦較前調順大便之燥結亦見愈脈象左部稍見柔和右部仍有滑象至數稍緩遂即原方略為加減俾再服之處方生赭石八錢軋細大甘枸杞八錢生懷地黃八錢生懷山藥六錢龍眼肉五錢栝蔞仁五錢炒搗玄參五錢生杭芍五錢棗仁四錢炒搗生遠志二錢甘草二錢共煎湯一大盅溫服效果將藥連服六劑徹夜安睡諸病皆愈十三癇痙癲狂門癇風兼腦充血天津陳年三十八歲得癇風兼腦充血證病因因肝火素盛又在校中任講英文每日登堂演説時間過長勞心勞力皆過度遂得斯證證候其來社求診時但言患癇風或數日一發或旬餘一發其發必以夜亦不自覺惟睡醒後其舌邊覺疼有咬破之處即知其睡時已發癇風其日必精神昏憒身體痠懶診其脈左右皆弦硬異常因問其腦中發熱或作疼或兼有眩暈之時乎答曰此三種病腦中皆有余以為系癇風之連帶病故未言及耳愚曰非也是子患癇風兼患腦充血也診斷按癇風之證皆因腦髓神經失其所司而有非常之變動其腦部若充血過甚者恆至排擠腦髓神經使失其常司也此證既患癇風又兼腦部充血則治之者自當以先治其腦部充血為急務處方治以拙擬鎮肝熄風湯為其兼患癇風加全蜈蚣大者三條蓋鎮肝熄風湯原為拙擬治腦充血之主方而蜈蚣又善治癇風之要藥也復診前方連服十劑腦部熱疼眩暈皆除惟脈仍有力即原方略為加減又服十劑則脈象和平如常矣繼再治其癇風處方治以拙擬愈癇丹日服兩次每次用生懷山藥五錢煎湯送下效果服藥逾兩月舊病未發遂停藥勿服癇風從此愈矣受風瘛瘲天津董姓幼女年三歲患瘛瘲病病因暮春氣暖著衣過厚在院中珖戲出汗受風至夜間遂發瘛瘲證候劇時閉目昏昏身軀後挺兩手緊握輕時亦能明瞭而舌腫不能吮乳惟飲茶湯及代乳粉大便每日溏瀉兩三次如此三晝夜不愈精神漸似不支皮膚髮熱診其脈亦有熱象診斷此因春暖衣厚肝有鬱熱因外感激發其熱上衝腦部排擠腦髓神經失其運動之常度是以發搐法當清其肝熱散其外感兼治以鎮安神經之藥其病自愈處方生懷山藥一兩滑石八錢生杭芍六錢連翹三錢甘草三錢全蜈蚣兩條大者硃砂二分細末藥共七味將前六味煎湯一盅分數次將硃砂徐徐溫送下效果將藥煎服一劑瘛瘲已愈其頭仍向後仰左手仍拳曲不舒舌腫已消強半可以吮乳大便之溏已愈遂即原方減滑石之半加玄參六錢煎服後左手已不拳曲其頭有後仰之意遂減去方中滑石加全蠍三個服一劑全愈慢脾風遼寧侯姓幼子年七歲於季秋得慢脾風證病因秋初病瘧月餘方愈愈後覺左脅下痞硬又屢服消瘀之品致脾胃虛寒不能化食浸至吐瀉交作兼發抽掣證候日昳潮熱兩顴發紅昏睡露晴手足時作抽掣劇時督脈緊而頭向後仰俗名角弓反張無論飲食藥物服後半點鐘即吐出且帶出痰涎若干時作泄瀉其脈象細數無力診斷瘧為肝膽所受之邪木病侮土是以久病瘧者多傷脾胃此證從前之左脅下痞硬脾因受傷作脹也而又多次服消導開破之品則中焦氣化愈傷以致寒痰留飲積滿上溢迫激其心肺之陽上浮則面紅外越而身熱而其病本實則涼也其不受飲食者為寒痰所阻也其兼泄瀉者下焦之氣化不固也其手足抽掣者血虛不能榮筋養肝則肝風內動而筋緊縮也抽掣劇時頭向後仰者不但督脈因寒緊縮且以督脈與神經相連督脈病而腦髓神經亦病是以改其常度而妄行也擬先用福幼編逐寒蕩驚湯開其寒痰俾其能進飲食斯為要務處方胡椒一錢乾薑一錢肉桂一錢丁香十粒四味共搗成粗渣高麗參一錢甘草一錢先用灶心土三兩煮湯澄清以之代水先煎人參甘草七八沸再入前四味同煎三四沸取清湯八分杯徐徐灌之此方即逐寒蕩驚湯原方加人參甘草也原方乾薑原系炮用然炮之則其氣輕浮辣變為苦其開通下達之力頓減是以不如生者特是生用之則苛辣過甚故加甘草和之且能逗留乾薑之力使綿長也又加人參者欲以補助胸中大氣以運化諸藥之力仲師所謂大氣一轉其結即痰飲乃散也又此方原以胡椒為主若遇寒痰過甚者可用至錢半又此物在藥房中原系背藥陳久則力減宜向食料鋪中買之復診將藥服後嘔吐即止抽掣亦愈而潮熱泄瀉亦似輕減擬繼用福幼編中加味理中地黃湯略為加減俾服之處方熟懷地黃五錢生懷山藥五錢焦白朮三錢大甘枸杞三錢野黨參二錢炙箭耆二錢乾薑二錢生杭芍二錢淨萸肉二錢肉桂一錢後入紅棗三枚掰開炙甘草一錢胡桃一個用仁搗碎共煎湯一大盅分多次徐徐溫服下方解此方之藥為溫熱並用之劑熱以補陽溫以滋陰病本寒涼是以藥宜溫熱而獨雜以性涼之芍藥者因此證涼在脾胃不在肝膽若但知暖其脾胃不知涼其肝膽則肝膽因服熱藥而生火或更激動其所寄之相火以致小便因之不利其大便必益泄瀉芍藥能涼肝膽尤善利小便且尤善斂陽氣之浮越以退潮熱是以方中特加之也福幼編此方乾薑亦系炮用前方中之乾薑變炮為生以生者善止嘔吐也今嘔吐已止而乾薑復生用者誠以方中藥多滯膩猶恐因之生痰以乾薑生用之苛辣者開通之則滯膩可化而乾薑苛辣過甚之性即可因與滯膩之藥並用而變為緩和此藥性之相合而化亦即相得益彰也此方原亦用灶心土煎湯以之代水煎藥而此時嘔吐已止故可不用然須知灶心土含鹼質甚多凡柴中有鹼質者燒余其鹼多歸灶心土是以其所煮之湯苦鹹甚難下咽愚即用時恆以灶壙紅土代之且灶心土一名伏龍肝而雷斆謂用此土勿誤用灶下土宜用灶額中赤土此與灶壙中紅土無異愚從前原未見其説後得見之自喜拙見與古暗合也效果將藥連服兩劑潮熱與泄瀉皆愈脈象亦較前有力遂去白朮將乾薑改用一錢又服兩劑全愈慢脾風遼寧張幼孫年四歲得慢脾風證病因秋初恣食瓜果久則損傷脾胃消化力減猶不知戒中秋節後遂成慢脾風證證候食欲大減強食少許猶不能消化醫者猶投以消食開瘀之劑脾胃益弱浸至吐瀉交作間發抽掣始求愚為診視周身肌膚灼熱其脈則微細欲無昏睡露睛神氣虛弱診斷此證因脾胃虛寒不能熟腐水穀消化飲食所以作吐瀉且所食之物不能融化精微以生氣血惟多成寒飲積於胃中溢於膈上排擠心肺之陽外出是以周身灼熱而脈轉微細此里有真寒外作假熱也其昏睡露睛者因眼胞屬脾胃其脾胃如此虛寒眼胞必然緊縮是以雖睡時而眼猶微睜也其肢體抽掣者因氣血虧損不能上達於腦以濡潤斡旋其腦髓神經內經謂上氣不足則腦為之不滿蓋血隨氣升氣之上升者少血之上升亦少可知觀囟門未合之小兒患此證者其囟門必然下陷此實腦為不滿之明證亦即氣血不能上達之明徵也是以神經失其常司而肢體有時抽掣也此當投以溫暖之劑健補脾胃以消其寒飲諸病當自愈處方赤石脂一兩研細生懷山藥六錢熟懷地黃六錢焦白朮三錢烏附子二錢廣肉桂二錢去粗皮後入乾薑錢半大雲苓片錢半炙甘草二錢高麗參錢半搗為粗末藥共十味將前九味煎湯一大盅分多次徐徐溫服每次皆送服參末少許方解方中重用赤石脂者為其在上能鎮嘔吐在下能止泄瀉也人參為末送服者因以治吐瀉丸散優於湯劑蓋因丸散之渣滓能留戀於腸胃也效果將藥服完一劑嘔吐已止瀉愈強半抽掣不復作灼熱亦大輕減遂將乾薑減去白朮改用四錢再服一劑其瀉亦止又即原方將附子減半再加大甘枸杞五錢服兩劑病遂全愈説明按此證若嘔吐過甚者當先用福幼編逐寒蕩驚湯開其寒飲然後能受他藥而此證嘔吐原不甚劇是以未用將成慢脾風鄰村趙姓幼男年八歲脾胃受傷將成慢脾風證病因本系農家田園種瓜看守其間至秋日瓜熟飢恆食瓜當飯因之脾胃受傷顯露慢脾風朕兆證候食後飲食不化恆有吐時其大便一日三四次多帶完穀其腿有時不能行步恆當行走之時委坐於地其周身偶有灼熱之時其脈左部弦細右部虛濡且至數兼遲診斷此證之吐而且瀉及偶痿廢不能行步皆慢脾風朕兆也況其周身偶或灼熱而脈轉弦細虛濡至數且遲此顯系內有真寒外有假熱之象宜治以大劑溫補脾胃之藥俾脾胃健旺自能消化飲食不復作吐作瀉久之則中焦氣化舒暢周身血脈貫通余病自愈處方生懷山藥一兩白朮四錢炒熟懷地黃四錢龍眼肉四錢乾薑三錢生雞內金二錢黃色的搗生杭芍二錢甘草二錢共煎湯一大盅分兩次溫服下復診將藥煎服兩劑吐瀉灼熱皆愈惟行走時猶偶覺腿有不利因即原方略為加減俾多服數劑當全愈處方生懷山藥一兩熟懷地黃四錢龍眼肉四錢胡桃仁四錢白朮三錢炒川續斷三錢乾薑二錢生雞內金二錢黃色的搗生杭芍錢半甘草錢半共煎湯一大盅分兩次溫服效果將藥煎服兩劑病遂全愈因切戒其勿再食生冷之物以防病之反復癲狂失心都年三旬得癲狂失心證病因心郁生熱因熱生痰遂至癲狂失心證候言語錯亂精神昏瞀時或忿怒時或狂歌其心中猶似煩躁夜不能寐恆以手自撓其胸蓋自覺發悶也問之亦不能答觀其身形似頗強壯六脈滑實兩寸尤甚一息五至診斷人之元神在腦識神在心心腦息息相通其神明自湛然長醒生理學家謂心有四支血管通腦此即神明往來於心腦之路也此證之脈其關前之滑實太過繫有熱痰上壅將其心腦相通之路杜塞遂至神明有所隔礙失其常性此癲狂失心之所由來也治之者當投以開通重墜之劑引其痰火下行其四支血管為痰所瘀者復其流通之舊則神明之往來自無所隔礙而復湛然長醒之舊矣處方生赭石兩半軋細川大黃八錢清半夏五錢芒硝四錢藥共四味先將赭石半夏煎十餘沸加入大黃煎兩三沸取湯一大盅入芒硝融化溫服方解方中重用赭石者其重墜之性能引血管中之瘀痰下行也復診三日服藥一次凡降下之藥不可連服須俟其正氣稍緩再服共服三次每次服藥後通下大便兩三次似有痰涎隨下其精神較前稍明瞭診其脈仍有滑實之象身體未見衰弱擬再投以較重之劑蓋凡癲狂之甚者非重劑治之不能愈也處方生赭石二兩軋細川大黃一兩芒硝四錢甘遂錢半細末藥共四味先煎赭石十餘沸入大黃煎兩三沸取湯一大盅入芒硝融化將服時再調入甘遂末三診將藥如法煎服一劑下大便五六次帶有痰涎若干中隔兩日又服藥一次藥中有甘遂必須三日服一次不然必作嘔吐又下大便五六次中多兼痰塊挑之不開此所謂頑痰也從此精神大見明瞭脈象亦不復滑實矣擬改用平和之劑調治之處方生懷山藥一兩生杭芍六錢清半夏四錢石菖蒲三錢生遠志二錢清竹瀝三錢鏡面砂三分研細藥共七味將前五味煎湯一大盅調入竹瀝送服硃砂細末效果將藥如法煎服數劑病遂全愈神經堵亂天津黃年二十歲得神經錯亂病病因因心中忿鬱久之遂致神經錯亂證候心中滿悶發熱不思飲食有時下焦有氣上衝並覺胃脘之氣亦隨之上衝遂致精神昏瞀言語支離移時覺氣消稍順或吐痰數口精神遂復舊其左脈弦而硬右脈弦而長兩尺皆重按不實一息五至診斷此乃肝火屢動牽引沖氣胃氣相併上衝更挾痰涎上衝以滯塞於喉間並沖激其腦部是以其神經錯亂而精神言語皆失其常也其左脈弦硬者肝血虛而火熾盛也右脈弦長者沖氣挾胃氣上衝之現象也方書論脈有直上直下衝脈昭昭之語所謂直上直下者即脈弦且長之形狀也其兩尺不實者下焦之氣化不固也因下焦有虛脫之象是以沖氣易挾胃氣上衝也此當治以降胃斂沖鎮肝之劑更兼用涼潤滋陰之品以養肝血清肝熱庶能治愈處方生赭石一兩軋細靈磁石五錢軋細生懷山藥八錢生龍骨八錢搗碎生杭芍六錢玄參五錢柏子仁五錢雲苓片三錢清半夏三錢石菖蒲三錢生遠志二錢鏡面砂三分研細藥共十二味將前十一味煎湯一大盅送服硃砂細末復診將藥連服四劑滿悶發熱皆大見愈能進飲食有時氣復上沖而不復上干神經至於錯亂左右之脈皆較前平和而尺部仍然欠實擬兼用培補下元之品以除病根處方生赭石一兩軋細熟懷地黃八錢生懷山藥八錢大甘枸杞六錢淨萸肉五錢生杭芍四錢玄參四錢雲苓片二錢共煎湯一大盅溫服效果將藥連服六劑諸病皆愈脈亦復常或問地黃之性黏膩生痰胃脘脹滿有痰者多不敢用今重用之何以能諸病皆愈答曰用藥如用兵此醫界之恆言也如宋八字軍最弱劉錡將之即為徑卒遂能大敗金人奏順昌之捷以斯知兵無強弱在用之者何如耳至用藥亦何獨不然憶曾治一李姓媼胃口滿悶有痰其脈上盛下虛投以腎氣丸作湯服為加生赭石八錢服後覺藥有推蕩之力須臾胸次豁然腎氣丸非重用地黃者乎然如此用藥非前無師承而能有然也金匱云短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之夫飲即痰也氣短亦近於滿悶而仲師竟謂可治以腎氣丸愚為於金匱曾熟讀深思故臨證偶有會心耳十四傷寒門傷寒兼腦膜炎鹽山李年六旬於季冬患傷寒兼腦膜生炎病因素有頭昏證每逢上焦有熱精神即不清爽臘底偶冒風寒病傳陽明邪熱內熾則腦膜生炎纍及神明失其知覺證候從前醫者治不如法初得時未能解表遂致傷寒傳裡陽明腑實舌苔黃而帶黑其干如錯不能外伸譫語不休分毫不省人事兩目直視不瞬診其脈兩手筋惕不安脈象似有力而不實一息五至大便四日未行小便則溺時不知診斷此乃病實脈虛之證其氣血虧損難抗外邪是以有種種危險之象其舌苔黑而乾者陽明熱實津液不上潮也其兩目直視不瞬者肝火上衝而目發脹也其兩手筋惕不安者肝熱血耗而內風將動也其譫語不省人事者固有外感之邪熱過盛昏其神明實亦由外感之邪熱上蒸致腦膜生炎纍及腦髓神經也擬用白虎加人參湯更輔以滋補真陰之品庶可治愈處方生石膏五兩搗細生懷地黃二兩野臺參八錢天花粉八錢北沙參八錢知母六錢生杭芍六錢生懷山藥六錢甘草四錢荷葉邊一錢共煎湯三盅分三次溫服下每服一盅調入生雞子黃兩枚方中不用粳米者以生山藥可代粳米和胃也用生雞子黃者以其善熄肝風之內動也用荷葉者以善引諸涼藥之力直達腦中以清腦膜之炎也再診將藥如法煎服翌晨下大便一次舌苔干較愈而仍無津液精神較前明瞭而仍有譫語之時其目已不直視而能瞬診其脈筋惕已愈強半至數較前稍緩其浮分不若從前有力而重按卻比從前有根底此皆佳兆也擬即前方略為加減清其餘熱即以復其真陰庶可全愈處方生石膏四兩搗細生懷地黃二錢野臺參八錢大甘枸杞一兩生懷山藥一兩天花粉八錢北沙參八錢知母六錢生杭芍六錢甘草四錢共煎湯三盅為其大便已通俾分多次徐徐溫飲下一次只飲一大口效果閲十點鐘將藥服完精神清爽諸病皆愈説明按治腦膜炎證羚羊角最佳而以治筋惕不安亦羚羊角最效以其上可清頭腦下可熄肝風之萌動也然此藥價太昂僻處藥房又鮮真者是以方中未用且此證雖兼有腦膜炎病實因臟腑之邪熱上蒸清其邪熱則腦膜炎自愈原不必注重於清腦也傷寒脈閉天津張年三十八歲於季冬得傷寒證且無脈病因旬日前曾感冒風寒經醫治愈繼出門作事又感風寒遂得斯病證候內外俱覺寒涼頭疼氣息微喘身體微形寒戰六脈皆無診斷蓋其身體素弱又在重感之餘風寒深入阻塞經絡是以脈閉擬治以麻黃湯再重加補氣之藥補其正氣以逐邪外出當可奏效處方麻黃三錢生箭耆一兩桂枝尖二錢杏仁二錢去皮甘草二錢先煎麻黃數沸吹去浮沫再入余藥同煎湯一大盅溫服被復取微汗效果服藥後周身得汗其脈即出諸病皆愈説明按此證或疑係少陰傷寒因少陰傷寒脈原微細微細之至可至於無也而愚從太陽治者因其頭疼微喘寒戰皆為太陽經之現象而無少陰證蜷臥但欲寐之現象也是以於麻黃湯中重加生黃耆一兩以助麻桂成功此扶正即以逐邪也傷寒脈閉天津李姓童子年十四歲得傷寒脈閉證病因其左肋下素有鬱氣發動時輒作疼一日發動疼劇頭上汗出其汗未解出冒風寒遂得斯證證候頭疼身冷惡寒無汗心中發熱六脈皆閉診斷因其素有肋下作疼之病身形羸弱又當汗出之時感冒風寒則風寒之入者必深是以脈閉身寒又肋下素有鬱氣其肝膽之火必然鬱滯因外感所束激動其素郁之火所以心中覺熱法當以發表之藥為主而以清熱理郁兼補正之藥佐之處方麻黃二錢玄參六錢生懷山藥六錢野臺參二錢生雞內金二錢天花粉五錢甘草錢半先煎麻黃數沸吹去浮沫再入諸藥同煎一大盅溫服取汗若不出汗時宜再服西藥阿斯匹林一瓦以助其汗效果服藥兩點鐘周身微發熱汗欲出不出遂將阿斯匹林服下須臾汗出遍體翌日復診其脈已出五至無力已不惡寒心中仍覺發熱遂去麻黃將玄參山藥皆改用一兩服至三劑後心中已不發熱遂將玄參天花粉各減半再服數劑以善其後少陰傷寒天津李年三十二歲於夏季得傷寒證病因午間恣食瓜果因夜間失眠遂食余酣睡值東風驟至天氣忽變寒涼因而凍醒其未醒之時又復夢中遺精醒後遂覺周身寒涼抖戰腹中又復隱隱作疼懼甚遂急延為診視證候逮愚至為診視時其寒戰腹疼益甚其脈六部皆微細欲無知其已成直中少陰之傷寒也診斷按直中少陰傷寒為麻黃附子細辛湯證而因在夢遺之後腹中作疼則寒涼之內侵者益深入也是宜於麻黃附子細辛湯中再加溫暖補益之品處方麻黃二錢烏附子三錢細辛一錢熟地黃一兩生懷山藥五錢淨萸肉五錢乾薑三錢公丁香十粒煎湯一大盅溫服溫復取汗勿令過度效果將藥服後過一點鐘周身微汗寒戰與腹疼皆愈或問麻黃附子細辛湯證傷寒始得發熱脈沉也今斯證寒戰脈沉細夫寒戰與發熱迥異矣何以亦用麻黃附子細辛湯乎答曰麻黃附子細辛湯證是由太陽傳少陰也為其病傳少陰是以脈沉為其自太陽傳少陰是以太陽有反應之力而發熱此證晝眠凍醒是自太陽傳少陰又因恣食寒涼繼而晝寢夢遺其寒涼又直中少陰內外寒涼夾攻是以外寒戰而內腹疼太陽雖為表陽亦無反應之力也方中用麻黃以逐表寒用附子以解裡寒用細辛以通融表裡使表裡之寒盡化又因其少陰新虛加熟地黃萸肉山藥以補之養正即以除邪也又因其腹疼知寒侵太深又加乾薑丁香助附子細辛以除之寒邪自無遁藏也方中用意周匝是以服之即效至於麻黃髮汗止二錢者因當夏令也若當冬令則此證必須用四錢方能出汗此用藥因時令而有異也至若在南方雖當冬令用麻黃二錢亦能發汗且南方又有麻黃不過錢之説此又用藥因地點而有異也傷寒兼有伏熱證遼寧馬年五十一歲得傷寒兼有伏熱證病因因買賣賠錢家計頓窘懊悔不已致生內熱孟冬時因受風咳嗽有痰微喘小便不利周身漫腫愚為治愈旬日之外又重受外感因得斯證證候表裡大熱煩躁不安腦中脹疼大便數日一行甚乾燥舌苔白厚中心微黃脈極洪實左右皆然此乃陽明腑實之證凡陽明腑實之脈多偏見於右手此脈左右皆洪實者因其時常懊悔心肝積有內熱也其腦中脹疼者因心與肝膽之熱挾陽明之熱上攻也當用大劑寒涼微帶表散清其陽明胃腑之熱兼以清其心肝之熱處方生石膏四兩搗細知母一兩甘草四錢粳米六錢青連翹三錢共作湯煎至米熟取湯三盅分三次溫服下病愈勿盡劑方解此方即白虎湯加連翹也白虎湯為傷寒病陽明腑熱之正藥加連翹者取其色青入肝氣輕入心又能引白虎湯之力達於心肝以清熱也效果將藥三次服完其熱稍退翌日病復還原連服五劑將生石膏加至八兩病仍如故大便亦不滑瀉病家懼不可挽救因曉之曰石膏原為平和之藥惟服其細末則較有力聽吾用藥勿阻此次即愈矣為疏方方中生石膏仍用八兩將藥煎服之後又用生石膏細末二兩俾蘸梨片徐徐嚼服之服至兩半其熱全消遂停服從此病愈不再反復附記此案曾登於全國名醫驗案類編何廉臣評此案云日本謂石膏非大劑則無效故白虎湯竹葉石膏湯及其他石膏諸方其量皆過於平劑世醫不知此意為小劑用之譬如一杯水救一車薪之火宜乎無效也吾國善用石膏者除長沙漢方之外明有繆氏仲淳清有顧氏松園余氏師愚王氏孟英皆以善治溫熱名凡治陽明實熱之證無不重用石膏以奏功今用石膏由四兩加至八兩似已駭人聽聞然連服五六劑熱仍如故大便亦不滑瀉逮外加石膏細末梨片蘸服又至兩半熱始全消而病愈可見石膏為涼藥中純良之品世之畏石膏如虎者可以放膽而不必懷疑也十五溫病門溫病兼大氣下陷天津康幼女年九歲於孟秋得溫病兼大氣下陷病因因得罪其母懼譴謫藏樓下屋中屋窗四敞臥床上睡著被風吹襲遂成溫病證候初得病時服藥失宜熱邪內陷神昏不語後經中西醫多位診治二十餘日病益加劇醫者見病危已至極點皆辭不治繼延愚為診視其兩目上竄幾不見黑睛精神昏憒毫無知覺身體顫動不安時作噯聲其肌膚甚熱啓其齒見其舌縮而干苔薄微黃偶灌以水或米湯猶知下咽其氣息不勻間有喘時其脈數逾六至左部細而浮不任重按右部亦弦細重診似有力大便旬日未行診斷此外感之熱久不退灼耗真陰以致肝臟虛損木燥生風而欲上脫也當用藥清其實熱滋其真陰而更輔以酸收斂肝之品庶可救此極危之證處方生石膏二兩軋細野臺參三錢生懷地黃一兩淨萸肉一兩生懷山藥六錢甘草二錢共煎湯兩大盅分三次溫飲下每次調入生雞子黃一枚方解此方即白虎加人參湯以生地黃代知母生山藥代粳米而又加萸肉也此方若不加萸肉為愚常用之方以治寒溫證當用白虎加人參湯而體弱陰虧者今加萸肉藉以收斂肝氣之將脫也至此方不用白虎湯加減而必用白虎加人參為之加減者因病至此際非加人參於白虎湯中不能退其深陷之熱復其昏憒之神明也此理參觀藥物人參解後所附醫案自明復診將藥三次服完目睛即不上竄身體安穩不復顫動噯聲已止氣息已勻精神較前明瞭而仍不能言大便猶未通下肌膚猶熱脈數已減不若從前之浮弦而右部重診仍似有力遂即原方略為加減俾再服之處方生石膏兩半軋細野臺參三錢生懷地黃一兩淨萸肉六錢天冬六錢甘草二錢共煎湯兩盅分兩次溫飲下每次調入生雞子黃一枚三診日服藥一劑連服兩日熱已全退精神之明瞭似將復原而仍不能言大便仍未通下間有努力欲便之象遂用灌腸法以通其便再診其脈六部皆微弱無力知其所以不能言者胸中大氣虛陷不能上達於舌本也宜於大劑滋補藥中再加升補氣分之品處方生懷山藥一兩大甘枸杞一兩沙參一兩天冬六錢寸麥冬六錢生箭耆三錢野臺參三錢升麻一錢桔梗一錢共煎湯一盅半分兩次溫服下效果將藥煎服兩劑遂能言語因即原方去升麻減沙參之半再加萸肉生麥芽各三錢再服數劑以善後説明醫者救危險將脫之證喜用人參而喻嘉言謂氣若上脫但知重用人參轉令人氣高不返必重用赭石輔之始能奏效此誠千古不磨之論也此方中之用人參原非用其救脫因此證真陰大虧惟石膏與人參並用獨能於邪火熾盛之時立復真陰此白虎加人參湯之實用也至於萸肉其補益氣分之力遠不如參而其挽救氣分之上脫則遠勝於參誠以肝主疏泄人之元氣甚虛者恆因肝之疏泄過甚而上脫重用萸肉以斂肝使之不復疏泄則元氣之欲上脫者即可不脫此愚屢次用之奏效而確知其然者也溫病兼氣虛氣鬱天津遲氏婦年二十二歲於季秋得溫病病因其素日血分不調恆作灼熱心中亦恆發熱因熱貪涼薄受外感即成溫病證候初受外感時醫者以溫藥發其汗汗出之後表裡陡然大熱嘔吐難進飲食飲水亦恆吐出氣息不調恆作呻吟小便不利大便泄瀉日三四次其舌苔薄而黃脈象似有力而不實左部尤不任重按一分鐘百零二至搖搖有動象診斷其胃中為熱藥發表所傷是以嘔吐其素日陰虧肝腎有熱又兼外感之熱內迫致小便不利水歸大腸是以泄瀉其舌苔薄而黃者外感原不甚劇舌苔薄亦主胃氣虛而治以滋陰清熱上止嘔吐下調二便之劑處方生懷山藥一兩滑石八錢生杭芍八錢生懷地黃六錢清半夏五錢溫水洗三次碎竹茹三錢生麥芽三錢淨青黛二錢連翹二錢甘草三錢鮮茅根四錢藥共十一味先將前十味水煎十餘沸再入茅根同煎七八沸其湯即成取清湯兩盅分三次溫飲下服醫藥後防其嘔吐可口含生薑一片或於煎藥時加生薑三片亦可至藥房中若無鮮茅根可用干茅根兩半煎湯以之代水煎藥方解方中之義山藥與滑石並用一滋陰以退熱而能固大便一清火以退熱而善利小便芍藥與甘草並用為甘草芍藥湯仲師用之以復真陰而芍藥亦善利小便甘草亦善補大便彙集四味成方即拙擬之滋陰清燥湯也以治上有燥熱下焦滑瀉之證莫不隨手奏效半夏善止嘔吐然必須洗淨礬味藥房清半夏亦有礬屢洗之則藥力減是以用至五錢竹茹亦善止嘔吐其碎者為竹之皮津沽藥房名為竹茹粉其止嘔之力較整者為優至於青黛生薑亦止嘔吐之副品也用生麥芽鮮茅根者以二藥皆善利小便而又善達肝木之郁以調氣分也用生地黃者以其為滋補真陰之主藥即可為治脈數動搖者之要藥也復診將藥煎服一劑嘔吐與泄瀉皆愈小便已利脈象不復搖搖仍似有力至數未減其表裡之熱稍退氣息仍似不順舌苔仍黃欲投以重劑以清其熱猶恐大便不實擬再治以清解之劑處方生懷地黃一兩玄參八錢生杭芍六錢天花粉六錢生麥芽三錢鮮茅根三錢滑石三錢甘草三錢共煎湯一大盅分兩次溫服下三診將藥煎服後病又見輕家人以為病愈無須服藥矣至翌日晚十一點鐘後見其面紅精神昏憒時作呻吟始知其病猶未愈及愚診視時夜已過半其脈左右皆弦硬而長數近七至兩目直視其呻吟之聲似阻隔不順舌苔變黑問其心中何如自言熱甚且覺氣息不接續此其氣分虛而且郁又兼血虛陰虧而陽明之熱又熾盛也其脈近七至者固為陰虛有熱之象而正氣虛損不能抗拒外邪者其脈亦恆現數象至其脈不為洪滑而為弦硬者亦氣血兩虧邪熱熾盛之現象也擬用白虎加人參湯再加滋陰理氣之品蓋此時大便已實故敢放膽治之處方生石膏五兩軋細野臺參六錢知母六錢天花粉六錢玄參六錢生杭芍五錢生萊蔔子四錢搗碎生麥芽三錢鮮茅根三錢粳米三錢甘草三錢共煎湯一大碗分四次溫飲下病愈不必盡劑效果將藥分四次服完熱退強半精神已清氣息已順脈象較前緩和而大便猶未通下因即原方將石膏改用四兩萊蔔子改用二錢如前煎服服至三次後大便通下其熱全退遂停後服説明愚用白虎加人參湯或以玄參代知母産後寒溫證用之或以芍藥代知母寒溫兼下痢者用之或以生地黃代知母寒溫兼陰虛者用之或以生山藥代粳米寒溫熱實下焦氣化不固者用之産後寒溫證用之又恆於原方之外加生地黃玄參沙參諸藥以生津液加鮮茅根蘆根生麥芽諸藥以宣通氣化初未有加萊蔔子者惟此證之氣分虛而且郁白虎湯中加人參可補其氣分之虛再加萊蔔子更可理其氣分之郁也至於萊蔔子必須生用者取其有升發之力也又須知此證不治以白虎湯而必治以白虎加人參湯者不但為其氣分虛也凡人外感之熱熾盛真陰又復虧損此乃極危險之證此時若但用生地黃玄參諸滋陰之品不能奏效即將此等藥加於白虎湯中亦不能奏效惟生石膏與人參並用獨能於邪熱熾盛之時立復真陰此所以傷寒汗吐下後與渴者治以白虎湯時仲聖不加他藥而獨加人參也溫病兼吐瀉腿抽族侄年五十三歲於仲春下旬得溫病兼吐瀉腿筋抽縮作疼病因素為腿筋抽疼病犯時即臥床不能起一日在鋪中舊病陡發急乘車回寓因腿疼出汗在路受風遂成溫病繼又吐瀉交作證候表裡俱壯熱嘔吐連連不止飲水少許亦吐出一日夜瀉十餘次得病已三日小便滴瀝全無腿疼劇時恆作號呼其脈左部浮弦似有力按之不實右部則弦長有力重按甚硬一息逾五至診斷此證因陰分素虧血不榮筋是以腿筋抽疼今又加以外感之壯熱傳入陽明以灼耗其陰分是以其脈象不為洪滑有力而為弦硬有力此乃火盛陰虧之現象也其作嘔吐者因其右脈弦硬且長當有沖氣上衝因致胃氣不下行而上逆也其小便不利大便滑瀉者因陰虛腎虧不能漉水水歸大腸是以下焦之氣化不能固攝也當用拙擬滋陰宣解湯以清熱滋陰調理二便再加止嘔吐及舒筋定疼之品輔之處方生懷山藥一兩滑石一兩生杭芍一兩清半夏四錢溫水淘三次碎竹茹三錢淨青黛二錢連翹錢半蟬蛻錢半甘草三錢全蜈蚣大者一條為末藥共十味將前九味煎湯一大盅送服蜈蚣細末防其嘔吐俾分三次溫服蜈蚣末亦分三次送服服後口含生薑片以防噁心方解方中用蟬蛻者不但因其能托邪外出因蟬之為物飲而不食有小便無大便是以其蛻亦有利小便固大便之力也用蜈蚣者因其原善理腦髓神經腿筋之抽疼固由於肝血虛損不能榮筋而與神經之分支在腿者實有關係有蜈蚣以理之則神經不至於妄行也復診將藥服後嘔吐未止幸三次所服之藥皆未吐出小便通下兩次大便之瀉全止腿疼已愈強半表裡仍壯熱脈象仍弦長有力為其滑瀉已愈擬放膽用重劑以清陽明之熱陽明胃之熱清則嘔吐當自止矣處方生石膏三兩搗細生懷山藥兩半生懷地黃一兩生杭芍五錢滑石五錢碎竹茹三錢甘草三錢共煎湯一大碗分四次溫飲下方解按用白虎湯之定例凡在汗吐下後當加人參此方中以生地黃代知母生山藥代粳米與石膏甘草同用斯亦白虎湯也而不加人參者以其吐猶未止加之恐助胃氣上升於斯變通其方重用生山藥至兩半其沖和稠黏之液既可代粳米和胃其培脾滋腎之功又可代人參補益氣血也至於用白虎湯而復用滑石芍藥者因二藥皆善通利小便防其水飲仍歸大腸也且芍藥與甘草同用名甘草芍藥湯仲聖用以復真陰前方之小便得通實芍藥之功居多陰虛小便不利者必重用芍藥始能奏效矧弦為肝脈此證之脈象弦硬肝經必有熾盛之熱而芍藥能生肝血退肝熱為柔肝之要藥即為治脈象弦硬之要藥也三診將藥分四次服完表裡之熱退強半腿疼全愈脈象亦較前緩和惟嘔吐未能全愈猶噁心懶進飲食幸其大便猶固俾先用生赭石細末兩半煎湯一盅半分三次溫飲下飲至第二次後覺胃脘開通噁心全無遂將赭石停飲進稀米粥一大甌遂又為疏方以清餘熱處方生石膏一兩搗細生懷山藥一兩生懷地黃一兩生杭芍六錢甘草二錢共煎湯兩盅分兩次溫服下效果將藥兩次服完表裡之熱全消大便通下一次病遂脫然全愈惟其脈一息猶五至知其真陰未盡復也俾用生懷山藥軋細過羅每用七八錢或兩許煮粥調以蔗糖當點心服之若服久或覺發悶可以送服西藥百布聖五分若無西藥處可用生雞內金細末三分代之溫病少陰證劉二十五歲於季春得溫病病因自正二月間心中恆覺發熱懶於飲食喜坐房陰乘涼薄受外感遂成溫病證候初得病時延近處醫者診治閲七八日病勢益劇精神昏憒閉目蜷臥似睡非睡懶於言語咽喉微疼口唇乾裂舌乾而縮薄有黃苔欲黑頻頻飲水不少濡潤飲食懶進一日之間惟強飲米湯甌許自言心中熱而且干周身痠軟無力撫其肌膚不甚發熱體溫其脈六部皆微弱而沉左部又兼細至數如常大便四日未行小便短少赤澀診斷此伏氣觸發於外感而成溫因腎臟虛損而竄入少陰也內經謂冬傷於寒春必病溫此言冬時所受之寒甚輕不能即時成為傷寒恆伏於三焦脂膜之中阻塞氣化之升降暗生內熱至春陽萌動之時其所生之熱恆激發於春陽而成溫然此等溫病未必入少陰也內經又謂冬不藏精春必病溫此言冬不藏精之人因陰虛多生內熱至春令陽回其內熱必益加增略為外感激發即可成溫病而此等溫病亦未必入少陰也惟其人冬傷於寒又兼冬不藏精其所傷之寒伏於三焦隨春陽而化熱恆因其素不藏精乘虛而竄入少陰此等證若未至春令即化熱竄入少陰則為少陰傷寒即傷寒少陰證二三日以上宜用黃連阿膠湯者也若已至春令始化熱竄入少陰當可名為少陰溫病即溫病中內有實熱脈轉微細者也誠以脈生於心必腎陰上潮與心陽相濟而後其跳動始有力蓋此證因溫邪竄入少陰俾心腎不能相濟是以內雖蘊有實熱而脈轉微細其咽喉疼者因少陰之脈上通咽喉其熱邪循經上逆也其唇裂舌乾而縮者腎中真陰為邪熱遏抑不能上潮而心中之亢陽益妄動上升以鑠耗其津液也至於心中發熱且發乾以及大便燥結小便赤澀亦無非陰虧陽亢之所致為其腎陰心陽不能相濟為功是以精神昏憒閉目蜷臥煩人言語此乃熱邪深陷氣化隔閡之候在溫病中最為險證正不可因其脈象無火身不甚熱而視為易治之證也愚向擬有坎離互根湯可為治此病的方今將其方略為加減俾與病候相宜處方生石膏三兩軋細野臺參四錢生懷地黃一兩生懷山藥八錢玄參五錢遼沙參五錢甘草三錢鮮茅根五錢藥共八味先將前七味煎十餘沸再入鮮茅根煎七八沸其湯即成取清湯三盅分三次溫服下每服一次調入生雞子黃一枚此方若無鮮茅根可用干茅根兩半水煮數沸取其湯代水煎藥方解溫病之實熱非生石膏莫解輔以人參並能解邪實正虛之熱再輔以地黃山藥諸滋陰之品更能解腎虧陰虛之熱且人參與滋陰之品同用又能助腎陰上潮以解上焦之燥熱用雞子黃者化學家謂雞子黃中含有副腎髓質之分泌素為滋補腎臟最要之品也用茅根者其涼而能散用之作引能使深入下陷之邪熱上出外散以消解無餘也復診將藥三次服完周身之熱度增高脈象較前有力似近洪滑諸病皆見輕減精神已振惟心中仍覺有餘熱大便猶未通下宜再以大劑涼潤之藥清之而少佐以補氣之品處方生石膏一兩軋細大潞參三錢生懷地黃一兩玄參八錢遼沙參八錢大甘枸杞六錢甘草二錢鮮茅根四錢藥共八味先將前七味煎十餘沸再入茅根煎七八沸其湯即成取清湯兩大盅分兩次溫服下每服一次調入生雞子黃一枚效果將藥連服兩劑大便通下病遂全愈説明此證之脈象沉細是腎氣不能上潮於心而心腎不交也逮服藥之後脈近洪滑是腎氣已能上潮於心而心腎相交也為其心腎相交是以諸病皆見輕減非若尋常溫病其脈洪大為增劇也溫病結胸天津張姓叟年近五旬於季夏得溫熱結胸證病因心有忿怒繼復飽食夜眠又當窗受風晨起遂覺頭疼發熱心下痞悶服藥數次病益進證候初但心下痞悶繼則胸膈之間亦甚痞塞且甚煩熱其脈左部沉弦右部沉牢診斷寒溫下早成結胸若表有外感里有瘀積不知表散藥與消積藥並用而專事開破以消其積則外感乘虛而入亦可成結胸審證察脈其病屬結胸無疑然其結之非劇本陷胸湯之義而通變治之可也處方病者旬余輟工家幾斷炊愚憐其貧為擬簡便之方與以自制通徹丸即牽牛軋取頭次末水泛為小丸五錢及自制離中丹兩半俾先服通徹丸三錢遲一點半鐘若不覺藥力猛烈再服下所餘二錢候須臾再服離中丹三錢服後多飲開水俾出汗若痞塞開後仍有餘熱者將所餘離中丹分數次徐徐服之每服後皆宜多飲開水取微汗效果如法將兩種藥服下痞塞與煩熱皆愈溫病結胸天津趙年四十二歲得溫病結胸證病因季春下旬因飯後有汗出受風翌日頭疼身熱無汗心中發悶醫者外散其表熱內攻其發悶服藥後表未汗解而熱與發悶轉加劇醫者見服藥無效再疏方時益將攻破之藥加重下大便一次遂至成結胸證證候胸中滿悶異常似覺有物填塞壓其氣息不能上達且發熱嗜飲水小便不利大便日溏瀉兩三次其脈左部弦長右部中分似洪而重按不實一息五至強診斷此證因下早而成結胸又因小便不利而致溏瀉即其證脈合參此乃上實下虛外感之熱兼挾有陰虛之熱也治之者宜上開其結下止其瀉兼清其內傷外感之熱庶可奏效處方生懷山藥一兩五錢生萊蔔子一兩搗碎滑石一兩生杭芍六錢甘草三錢共煎湯一大盅溫服復診服藥後上焦之結已愈強半氣息頗形順適灼熱亦減已不感渴大便仍溏服藥後下一次脈象較前平和仍微數遂再即原方略加減之處方生懷山藥一兩五錢生萊蔔子八錢搗碎滑石八錢生杭芍五錢甘草三錢先用白茅根鮮者更好青竹茹各二兩同煎數沸取湯以之代水煎藥效果將藥煎服後諸病皆愈惟大便仍不實俾每日用生懷山藥細末兩許水調煮作茶湯以之送服西藥百布聖五分充作點心以善其後溫病天津俞年過四旬於孟夏得溫病病因與人動氣爭鬧頭面出汗為風所襲遂成溫病證候表裡俱發熱胸膈滿悶有似結胸呼吸甚覺不利夜不能寐其脈左右皆浮弦有力舌苔白厚大便三日未行診斷此病系在太陽而連及陽明少陽也為其病在太陽所以脈浮為其連及陽明所以按之有力為其更連及少陽是以脈浮有力而又兼弦也其胸膈滿悶呼吸不利者因其怒氣溢於胸中挾風邪痰飲凝結於太陽部位也宜外解太陽之表內清陽明之熱兼和解其少陽更開蕩其胸膈方為完全之策處方生石膏二兩搗細蔞仁二兩炒搗生萊蔔子八錢搗碎天花粉六錢蘇子三錢炒搗連翹三錢薄荷葉二錢茵陳二錢龍膽草二錢甘草二錢共煎湯一大盅溫服後復衾取微汗效果服藥後閲一小時遍身得汗胸次豁然溫熱全消夜能安睡脈已和平如常惟大便猶未通下俾但用西藥旃那葉一錢開水浸服兩次大便遂通下風溫邑北境趙年近三旬於孟秋得風溫病病因孟秋下旬農人忙甚因勞力出汗過多覆在樹陰乘涼過度遂得風溫病證候胃熱氣逆服藥多嘔吐因此屢次延醫服藥旬余無效及愚診視見其周身壯熱心中亦甚覺熱五六日間飲食分毫不進大便數日未行問何不少進飲食自言有時亦思飲食然一切食物聞之皆臭惡異常強食之即嘔吐所以不能食也診其脈弦長有力右部微有洪象一息五至診斷即此證脈相參知其陽明腑熱已實又挾沖氣上衝所以不能進食服藥亦多嘔也欲治此證當以清胃之藥為主而以降沖之藥輔之則沖氣不上衝胃氣亦必隨之下降而嘔吐能止即可以受藥進食矣處方生石膏三兩搗細生赭石一兩軋細知母八錢潞黨參四錢粳米三錢甘草二錢共煎湯一大碗分三次溫服下方解此方乃白虎加人參湯又加赭石為其胃腑熱實故用白虎湯為其嘔吐已久故加人參為其沖胃上逆故又加赭石也效果將藥三次服完嘔吐即止次日減去赭石又服一劑大便通下熱退強半至第三日減去石膏一兩加玄參六錢服一劑脈靜身涼而仍分毫不能飲食憎其臭味如前愚曉其家人曰此病已愈無須用藥所以仍不飲食者其胃氣不開也胃之食物莫如萊蔔可用鮮萊蔔切絲香油炒半熟而以蔥醬作湯勿過熟少調以緑豆粉俾服之至湯作熟時病人仍不肯服迫令嘗少許始知香美須臾服盡兩碗從此飲食復常病人謂其家人曰吾從前服藥十餘劑病未見愈今因服萊蔔湯而霍然全愈若早知萊蔔湯能如此治病則吾之病不早愈乎其家人不覺失笑附記曾記弱冠時比鄰有病外感痰喘者延邑中老醫皮投以小青龍湯一劑喘即愈然覺胸中似有霧氣瀰漫不能進食皮曰此乃濕氣充盛是以胃氣不開也此當投以開胃之劑為疏方用金匱苓桂朮甘湯煎服後未半刻陡覺胸中陰霾頓開毫無障礙遂能進食見者皆驚其用藥之神奇夫皮君能如此用藥誠無愧名醫之目而益嘆經方之神妙誠有不可令人思議者矣此因一用萊蔔一用古方均開胃於頃刻之間故附志之風溫兼伏氣化熱天津陳年四十六歲得風溫兼伏氣化熱病病因因有事乘京奉車北上時當仲夏歸途受風致成溫熱病證候其得病之翌日即延為診視起居如常惟覺咽喉之間有熱上衝咳嗽吐痰音微啞周身似拘束痠軟脈象浮而微滑右關重按甚實知其證雖感風成溫而其熱氣之上衝咽喉實有伏氣化熱內動也若投以拙擬寒解湯原可一汗而愈然當此病之初起而遽投以石膏重劑彼將疑而不肯服矣遂遷就為之擬方蓋醫以救人為目的正不妨委曲以行其道也處方薄荷葉三錢青連翹三錢蟬蛻二錢知母六錢玄參六錢天花粉六錢甘草二錢共煎湯一大盅溫服復診翌日復延為診視言服藥後周身得微汗而表裡反大熱咳嗽音啞益甚何以服如此涼藥而熱更增加將毋不易治乎言之若甚恐懼者診其脈洪大而實左右皆然知非重用石膏不可因謂之曰此病乃伏氣化熱又兼有新感之熱雖在初得亦必須用石膏清之方能治愈若果能用生石膏四兩今日必愈吾能保險也問石膏四兩一次全服乎答曰非也可分作數次服病愈則停服耳為出方蓋因其有恐懼之心故可使相信耳處方生石膏四兩搗細粳米六錢共煎湯至米熟取湯四盅分四次徐徐溫飲下病愈不必盡劑飲至熱退而止大便若有滑瀉尤宜將藥急停服復診翌日又延為診視相迎而笑曰我今熱果全消矣惟喉間似微覺疼先生可再為治之問藥四盅全服乎答曰全服矣當服至三盅後心猶覺稍熱是以全服且服後並無大便滑瀉之病石膏真良藥也再診其脈已平和如常原無須服藥問其大便三日猶未下行為開滋陰潤便之方謂服至大便通後喉疼亦必自愈即可停藥勿服矣溫病兼痧疹天津舒年四十五歲於仲夏得溫病兼痧疹病因舒原精醫術當溫疹流行之時屢次出門為人診病受其傳染因得斯病證候其前數日皆系自治屢次服表疹清熱之藥疹已遍身出齊而熱仍不退因求愚為診治其表裡俱覺發熱且又煩躁異常無片時寧靜而其脈則微弱不起舌苔薄而微黃大便日行一次不幹不溏小便赤澀短少診斷此證當先有伏氣化熱因受外感之傳染而激發緣三焦脂膜竄入少陰遏抑腎氣不能上與心火相濟是以舌苔已黃小便短赤陽明腑熱已實而其脈仍然無力也其煩躁異常者亦因水火之氣不相交也此雖溫病實與少陰傷寒之熱者無異故其脈亦與少陰傷寒之脈同當治以白虎加人參湯將原方少為變通而再加托表疹毒之品輔之處方生石膏二兩搗細大潞參四錢天花粉八錢生懷山藥八錢鮮茅根四錢甘草二錢共煎湯兩盅分兩次溫服下方解此方即白虎加人參湯以花粉代知母生山藥代粳米而又加鮮茅根也花粉與知母皆能清熱而花粉於清熱之外又善解毒山藥與粳米皆能和胃而山藥於和胃之外又能滋腎方中之義用白虎湯以治外感實熱如此變通則兼能清其虛熱解其疹毒且又助以人參更可治證實脈虛之熱引以鮮茅根並可治溫病下陷之熱也復診將藥煎服一劑熱退強半煩躁亦大輕減可安睡片時至翌日過午發熱煩躁又如舊脈象仍然無力因將生石膏改用三兩潞參改用五錢俾煎湯三盅分三次溫飲下每飲一次調入生雞子黃一枚服後其病亦見愈旋又反復且其大便一日兩次知此寒涼之藥不可再服乃此時愚恍然會悟得治此證之的方矣處方鮮白茅根六兩切碎添涼水五盅在爐上煎一沸即將藥罐離開爐眼約隔三寸許遲十分鐘再煎一沸又離開爐眼再遲十分鐘視其茅根皆沉水底其湯即成若茅根不沉水底可再煎一沸約可取清湯三盅乘熱頓飲之以得微汗方佳效果此方如法服兩劑其病脫然愈矣説明按此證其伏氣之化熱固在三焦而毒菌之傳染實先受於上焦於斯毒熱相併隨上焦之如霧而瀰漫於全身之臟腑經絡不分界限茅根涼而能散又能通達經絡臟腑無微不至惟性甚平和非多用不能奏效是以一劑重用至六兩其涼散之力能將臟腑經絡間之毒熱盡數排出茅根能微汗利小便皆其排出之道路毒熱清肅煩躁自除矣愚臨證五十年用白虎加人參湯時不知凡幾約皆隨手奏效今此證兩次用之無效而竟以鮮白茅根收其功此非愚所素知乃因一時會悟後則屢次用之皆效故特詳之以為治溫疹者開一法門也若其脈象洪滑甚實者仍須重用石膏清之或石膏茅根並用亦可又按白茅根必須用鮮者且必如此煎法方效但依之成功多用可至十兩少用亦須至四兩不然此證前兩方中皆有茅根四錢未見效驗其宜多用可知矣又藥房中若無鮮者可自向窪中剖之隨處皆有若剖多不能一時皆用以濕土埋之永久不壞溫病兼勞力過度族弟年三十八歲於孟夏來津於旅次得溫病病因時天氣炎熱途中自挽鹿車辛苦過力出汗受風至津遂成溫病證候表裡俱覺甚熱合目恆譫語所言多勞力之事舌苔白厚大便三日未行脈象左部弦硬右部洪實而浮數逾五至診斷此證因長途炎熱勞碌臟腑間先有積熱又為外感所襲則其熱陡發其左脈弦硬者勞力過度肝腎之陰分有傷也右部洪實者陽明之腑熱已實也其洪實兼浮者證猶連表也擬治以白虎加人參湯以玄參代知母生山藥代粳米更輔以透表之藥以引熱外出處方生石膏三兩搗細大潞參四錢玄參一兩生懷山藥六錢甘草三錢西藥阿斯匹林一瓦將前五味共煎湯兩大盅先溫服一盅遲半點鐘將阿斯匹林用開水送下俟汗出後再將所餘一盅分兩次溫服下效果將藥服一盅後即不作譫語須臾將阿斯匹林服下遍體得汗繼又將所餘之湯藥徐徐服下其病霍然全愈説明白虎湯中以石膏為主藥重用至三兩所以治右脈之洪實也於白虎湯中加人參更以玄參代知母生山藥代粳米退熱之中大具滋陰之力石膏人參並用能於溫寒大熱之際立復真陰所以治左脈之弦硬也用藥如用兵料敵詳審步伍整齊此所以戰則必勝也至於脈象兼浮知其表證未罷猶可由汗而解遂佐以阿斯匹林之善透表者以引之出汗此所謂因其病機而利導之也若無阿斯匹林之處於方中加薄荷葉一錢連翹二錢亦能出汗溫病兼下痢天津範姓媼年過五旬得溫病兼下痢證病因家務勞心恆動肝火時當夏初肝陽正旺其熱下迫遂患痢證因夜間屢次入廁又受感冒兼發生溫病證候表裡皆覺發熱時或作渴心中煩躁腹中疼甚劇恆作呻吟晝夜下痢十餘次旬日之後系純白痢其舌苔厚欲黃屢次延醫服藥但知治痢且用開降之品致身體虛弱臥不能起其脈左右皆弦而有力重按不實搏近五至診斷此病因肝火甚盛兼有外感之熱已入陽明所以脈象弦而有力其按之不實者因從前服開降之藥過多也其腹疼甚劇者因弦原主疼茲則弦而且有力致腹中氣化不和故疼甚劇也其煩躁者因下久陰虛腎氣不能上達與心相濟遂不耐肝火溫熱之灼耗故覺煩躁也宜治以清溫涼肝之品而以滋陰補正之藥輔之處方生杭芍一兩滑石一兩生懷山藥一兩天花粉五錢山楂片四錢連翹三錢甘草三錢共煎湯一大盅溫服復診將藥煎服一劑溫熱已愈強半下痢腹疼皆愈脈象亦見和緩擬再用涼潤滋陰之劑以清其餘熱處方生懷山藥一兩生杭芍六錢天花粉五錢生懷地黃五錢玄參五錢山楂片三錢連翹二錢甘草二錢共煎湯一大盅溫服效果將藥連服兩劑病遂全愈惟口中津液短少恆作渴運動乏力俾用生懷山藥細末煮作茶湯兌以鮮梨自然汁當點心服之日兩次浹辰之間當即可復原矣蓋山藥原善滋陰而其補益之力又能培養氣化之虛耗惟其性微溫恐與病後有餘熱者稍有不宜借鮮梨自然汁之涼潤以相濟為用則為益多矣溫病兼腦膜炎天津侯姓幼男年八歲得熱病兼腦膜炎病因蒙學暑假乍放幼童貪玩群在烈日中𪦞戲出汗受風遂得斯證證候閉目昏昏呼之不應周身灼熱無汗其脈洪滑而長兩寸尤盛其母言病已三日昨日猶省人事惟言心中發熱至夜間即昏無知覺然以水灌之猶知下咽問其大便三日未行診斷此溫熱之病陽明腑熱已實其熱循經上升兼發生腦膜炎也腦藏神明主知覺神經因熱受傷是以知覺全無宜投以大劑白虎湯以清胃腑之熱而復佐以輕清之品以引藥之涼力上行則腦中之熱與胃腑之熱全清神識自明瞭矣處方生石膏三兩搗細知母八錢連翹三錢茵陳錢半甘草三錢粳米五錢煎至米熟其湯即成取清汁三茶杯徐徐分三次溫服病愈無須盡劑效果服至兩次已明瞭能言自言心中猶發熱將藥服完其熱遂盡消霍然全愈溫熱泄瀉天津錢姓幼男年四歲於孟秋得溫熱兼泄瀉病久不愈病因季夏感受暑溫服藥失宜熱留陽明之腑久則灼耗胃陰嗜涼且多嗜飲水延至孟秋上熱未清而下焦又添泄瀉證候形狀瘦弱已極周身灼熱飲食少許則噁心欲嘔吐小便不利大便一晝夜十餘次多系稀水臥不能動哭泣無聲脈數十至且無力四歲時當以七至為正脈指紋現淡紅色已透氣關診斷此因外感之熱久留耗陰氣化傷損是以上焦發熱懶食下焦小便不利而大便泄瀉也宜治以滋陰清熱利小便兼固大便之劑處方生懷山藥一兩五錢滑石一兩生杭芍六錢甘草三錢煎湯一大盅分數次徐徐溫服下方解此方即拙擬滋陰清燥湯也原方生山藥是一兩今用兩半者因此幼童瘦弱已極氣化太虛也方中之義山藥與滑石同用一利小便一固大便一滋陰以退虛熱一瀉火以除實熱芍藥與甘草同用甘苦化合味近人參能補益氣化之虛損而芍藥又善滋肝腎以利小便甘草又善調脾胃以固大便是以彙集而為一方也效果將藥連服兩劑熱退瀉止小便亦利可進飲食惟身體羸瘦不能遽復俾用生懷山藥細末七八錢許煮作粥調以白糖作點心服之且每次送西藥百布聖一瓦如此將養月餘始胖壯溫病兼虛熱山西高年二十八歲客居天津於仲秋得溫病病因朋友招飲飲酒過度又多喝熱茶周身出汗出外受風證候周身骨節作疼身熱心中熱而且渴舌苔薄而微黃大便乾燥小便短赤時或干嗽身體痠軟殊甚動則弦暈脈數逾五至浮弦無力自始病至此已四十日矣屢次延醫服藥無效診斷此證乃薄受外感並非難治之證因治療失宜已逾月而外表未解內熱自不能清病則懶食又兼熱久耗陰遂由外感之實熱釀成內傷之虛熱二熱相併則愈難治矣斯當以大滋真陰之藥為主而以解表瀉熱之藥佐之處方生懷山藥一兩生懷地黃一兩玄參一兩沙參六錢生杭芍六錢大甘枸杞五錢天冬五錢天花粉五錢滑石三錢甘草三錢共煎湯一大碗分三次溫飲下其初飲一次時先用白糖水送服西藥阿斯匹林半瓦然後服湯藥復診初服藥一次後周身得汗骨節已不覺疼二次三次繼續服完熱退強半小便通暢脈已不浮弦跳動稍有力遂即原方略為加減俾再服之處方生懷山藥一兩生懷地黃八錢玄參六錢沙參六錢大甘枸杞六錢天門冬六錢滑石三錢甘草二錢真阿膠三錢搗碎藥共九味先將前八味煎湯兩大盅去渣入阿膠融化分兩次溫服其服初次時仍先用白糖水送服阿斯匹林三分之一瓦此方中加阿膠者以其既善滋陰又善潤大便之乾燥也效果將藥先服一次周身又得微汗繼將二分服下口已不渴其日大便亦通下便下之後頓覺精神清爽灼熱全無病遂從此愈矣説明方中重用大隊涼潤之品滋真陰即以退虛熱而復以阿斯匹林解肌滑石利小便者所以開實熱之出路也至於服阿斯匹林半瓦即遍身得汗者因體虛者其汗易出而心有燥熱之人得涼藥之濡潤亦恆自出汗也溫病體虛遼寧劉幼子年七歲於暮春得溫病病因因赴澡塘洗澡汗出未竭遽出冒風遂成溫病病初得時醫者不知用辛涼之藥解飢而竟用溫熱之藥為發其汗逮汗出遍體而灼熱轉劇又延他醫遽以承氣下之病尤加劇因其無可下之證而誤下也從此不敢輕於服藥遲延數日見病勢浸增遂延愚為診視其精神昏憒間作譫語氣息微喘肌膚灼熱問其心中亦甚覺熱唇乾裂有凝血其舌苔薄而黃中心乾黑頻頻飲水不能濡潤其脈弦而有力搏近六至按之不實而左部尤不任重按其大便自服藥下後未行診斷此因誤汗誤下傷其氣化兼溫熱既久陰分虧耗乃邪實正虛之候也宜治以大劑白虎加人參湯以白虎湯清其熱以人參補其虛再加滋陰之品數味以滋補陰分之虧耗處方生石膏四兩搗細知母一兩野黨參五錢大生地黃一兩生懷山藥七錢玄參四錢甘草三錢共煎湯三大盅分三次溫飲下病愈者勿須盡劑熱退即停服白虎加人參湯中無粳米者因方中有生山藥可代粳米和胃也效果三次將藥服完溫熱大減神已清爽大使猶未通下心中猶覺發熱診其脈仍似有力遂將原方去山藥仍煎三盅俾徐徐溫飲下服至兩盅大便通下遂停藥勿服病全愈溫熱腹疼兼下痢天津張姓媼年過五旬先得溫病腹疼即又下痢病因因其夫與子相繼病故屢次傷心蘊有內熱又當端陽節後天氣乾熱非常遂得斯證證候腹中攪疼號呼輾轉不能安臥周身溫熱心中亦甚覺熱為其臥不安枕手足擾動脈難細診其大致總近熱象其舌色紫而干舌根微有黃苔大便兩日未行診斷此乃因日日傷心身體虛損始則因痛悼而臟腑生熱繼則因熱久耗陰而更生虛熱繼又因時令之燥熱內侵與內蘊之熱相併激動肝火下迫腹中是以作疼火熱熾盛是以表裡俱覺發熱此宜清其溫熱平其肝火理其腹疼更宜防其腹疼成痢也處方先用生杭芍一兩甘草三錢煎湯一大盅分兩次溫服每次送服衛生防疫寶丹四十粒約點半鐘服完兩次腹已不疼又俾用連翹一兩甘草三錢煎湯一大盅分作三次溫服每次送服拙擬離中丹三錢囑約兩點鐘溫服一次復診翌日晚三點鐘復為診視閉目昏昏呼之不應其家人言前日將藥服完裡外之熱皆覺輕減午前精神頗清爽午後又漸發潮熱病勢一時重於一時前半點鐘呼之猶知答應茲則大聲呼之亦不應矣又自黎明時下膿血至午後已十餘次今則將近兩點鐘未見下矣診其脈左右皆似大而有力重按不實數近六至知其身體本虛又因屢次下痢更兼外感實熱之灼耗是以精神昏憒分毫不能支持也擬放膽投以大劑白虎加人參湯復即原方略為加減俾與病機適宜處方生石膏三兩搗細野臺參五錢生杭芍一兩生懷地黃一兩甘草三錢生懷山藥八錢共煎湯三盅分三次徐徐溫服下此方系以生地黃代原方中知母生山藥代原方中粳米而又加芍藥以芍藥與方中甘草並用即傷寒論中甘草芍藥湯為仲聖復真陰之妙方而用於此方之中又善治後重腹疼為治下痢之要藥也復診將藥三次服完後時過夜半其人豁然省悟其家人言自診脈疏方後又下膿血數次至將藥服完即不復下膿血矣再診其脈大見和平問其心中仍微覺熱且覺心中怔忡不安擬再治以涼潤育陰之劑以清餘熱而更加保合氣化之品以治其心中怔忡處方玄參一兩生杭芍六錢淨萸肉六錢生龍骨六錢搗碎生牡蠣六錢搗碎沙參四錢酸棗仁四錢炒搗甘草二錢共煎湯兩盅分兩次溫服每服一次調入生雞子黃一枚效果將藥連服三劑餘熱全消心中亦不復怔忡矣遂停服湯藥俾用生懷山藥細末一兩弱煮作茶湯少兌以鮮梨自然汁當點心服之以善其後説明溫而兼痢之證愚治之多矣未有若此證之劇者蓋此證腹疼至輾轉號呼不能診脈不但因肝火下迫欲作痢也實兼有外感毒癘之氣以相助為虐故用芍藥以瀉肝之熱甘草之緩肝之急更用衛生防疫寶丹以驅逐外侵之邪氣逮腹疼已愈又恐其溫熱增劇故又俾用連翹甘草煎湯送服離中丹以清其溫熱是以其證翌日頭午頗見輕若即其見輕時而早為之診脈服藥原可免後此之昏沉乃因翌日相延稍晚竟使病勢危至極點後幸用藥得宜猶能挽回然亦險矣諺有走馬看傷寒言其病勢變更之速也至治溫病亦何獨不然哉又此證過午所以如此加劇者亦以其素本陰虛又自黎明下痢膿血多次則虛而益虛再加以陰虧之虛熱與外感之實熱相併是以其精神即不能支持所賴方中藥味無多而舉凡虛熱實熱及下痢所生之熱兼顧無遺且又煎一大劑分三次溫飲下使藥力前後相繼此古人一煎三服之法愚遵此法以挽回險證救人多矣非然者則劑輕原不能挽回重病若劑重作一次服病人又將不堪惟將藥多煎少服病愈不必盡劑此以小心行其放膽洵為挽回險病之要著也溫病兼下痢袁姓婦年三十六歲得溫病兼下痢證病因仲秋乘火車赴保定歸母家省視往來辛苦路間又兼受風遂得溫病兼患下痢證候周身壯熱心中熱而且渴下痢赤多白少後重腹疼一晝夜十餘次舌苔白厚中心微黃其脈左部弦硬右部洪實一息五至診斷此風溫之熱已入陽明之腑是以右脈洪實其熾盛之肝火下迫腸中作痢是以左脈弦硬夫陽明脈實而渴者宜用白虎加入參湯因其肝熱甚盛證兼下痢又宜以生山藥代粳米以固下焦氣化更輔以涼肝調氣之品則溫與痢庶可並愈處方生石膏三兩搗細野黨參四錢生懷山藥一兩生杭芍一兩知母六錢白頭翁五錢生麥芽四錢甘草四錢將藥煎湯三盅分三次溫飲下復診將藥分三次服完溫熱已退強半痢疾已愈十之七八腹已不疼脈象亦較前和平遂即原方略為加減俾再服之處方生石膏二兩搗細野臺參三錢生懷山藥八錢生杭芍六錢知母五錢白頭翁五錢秦皮三錢甘草三錢共煎湯兩盅分兩次溫服下效果將藥煎服兩劑諸病皆愈惟脈象似仍有餘熱胃中似不開通懶於飲食俾用鮮梨鮮藕萊蔔三者等分切片煮汁送服益元散三錢許日服兩次至三次則喜進飲食脈亦和平如常矣説明凡溫而兼痢之證最為難治蓋溫隨下痢深陷而永無出路即痢為溫熱所灼而益加疼墜惟石膏與人參並用能升舉下陷之溫邪使之徐徐上升外散而方中生山藥一味在白虎湯中能代粳米以和胃在治痢藥中又能固攝下焦氣化協同芍藥白頭翁諸藥以潤肝滋腎從容以奏膚功也至於麥芽炒用之為消食之品生用之不但消食實能舒發肝氣宣散肝火而痢病之後重可除也至後方加秦皮者取其性本苦寒力善收澀借之以清熱補虛原為痢病將愈最宜之品是以傷寒論白頭翁湯中亦借之以清厥陰熱痢也溫病兼下痢天津姚姓媼年六旬有二於孟秋得溫病兼下痢病因孟秋天氣猶熱且自覺心中有火多食瓜果又喜當風乘涼遂致病溫兼下痢證候周身灼熱心中熱且渴連連呻吟不止一日夜下痢十二三次赤白參半後重腹疼飲食懶進噁心欲嘔其脈左部弦而兼硬右部似有力而重按不實數近六至延醫治療近旬日病益加劇診斷其左脈弦而兼硬者肝血虛而膽火盛也其右脈似有力而重按不實者因其下痢久而氣化已傷外感之熱又侵入陽明之腑也其數六至者緣外感之熱灼耗已久而其真陰大有虧損也證脈合參此乃邪實正虛之候擬用拙定通變白虎加人參湯及通變白頭翁湯二方相併治之處方生石膏二兩搗細野臺參四錢生懷山藥一兩生杭芍一兩白頭翁四錢金銀花四錢秦皮二錢生地榆二錢甘草二錢廣三七二錢軋細鴉膽子成實者五十粒去皮共藥十一味先用白糖水送服三七鴉膽子各一半再將余藥煎湯兩盅分兩次溫服下至煎渣再服時亦先服所餘之三七鴉膽子復診將藥煎服日進一劑服兩日表里之熱皆退痢變為瀉仍稍帶痢瀉時仍覺腹疼後重而較前輕減其脈象已近平和此宜以大劑溫補止其泄瀉再少輔以治痢之品處方生懷山藥一兩炒懷山藥一兩龍眼肉一兩大雲苓片三錢生杭芍三錢金銀花三錢甘草二錢共煎湯一大盅溫服效果將藥煎服兩劑痢已淨盡而瀉未全愈遂即原方去金銀花芍藥加白朮三錢服兩劑其瀉亦愈暑溫兼泄瀉天津侯姓學徒年十三歲得暑溫兼泄瀉病因季夏天氣暑熱出門送藥受暑表裡俱覺發熱兼頭目眩暈服藥失宜又兼患泄瀉證候每日泄瀉十餘次已逾兩旬而心中仍覺發熱懶食周身痠軟無力時或怔忡小便赤澀發熱其脈左部微弱右部重按頗實搏近六至診斷此暑熱鬱於陽明之腑是以發熱懶食而肝腎氣化不舒是以小便不利致大便泄瀉也當清瀉胃腑調補肝腎病當自愈處方生懷山藥兩半滑石一兩生杭芍六錢淨萸肉四錢生麥芽三錢甘草三錢共煎湯一大盅溫服復診服藥一劑瀉即止小便通暢惟心中猶覺發熱又間有怔忡之時遂即原方略為加減俾再服之處方生懷山藥一兩生懷地黃一兩淨萸肉八錢生杭芍六錢生麥芽二錢甘草二錢共煎湯一大盅溫服效果將藥連服兩劑其病霍然全愈説明初次所用之方即拙擬之滋陰清燥湯加山萸肉生麥芽也從來寒溫之熱傳入陽明其上焦燥熱下焦滑瀉者最為難治因欲治其上焦之燥熱則有礙下焦之滑瀉欲補其下焦之滑瀉則有礙上焦之燥熱是以醫者對之恆至束手然此等證若不急為治愈則下焦滑瀉愈久上焦燥熱必愈甚是以本屬可治之證因稍為遲延竟至不可救者多矣惟拙擬之滋陰清燥湯山藥與滑石並用一補大便一利小便而山藥多液滑石性涼又善清上焦之燥熱更輔以甘草芍藥以復其陰仲景謂作甘草芍藥湯以復其陰陰復自能勝燥熱而芍藥又善利小便甘草亦善調大便彙集四味為方凡遇證之上焦燥熱下焦滑瀉者莫不隨手奏效也間有陽明熱實服藥後滑瀉雖止而燥熱未盡清者不妨繼服白虎湯其熱實體虛者或服白虎加人參湯若慮其復作滑瀉可於方中仍加滑石三錢或更以生山藥代粳米煎取清湯一次只飲一大口徐徐將藥服完其熱全消亦不至復作滑瀉愚用此法救人多矣滋陰清燥湯後附有治愈多案可參觀也至此案方中加萸肉生麥芽者因其肝脈弱而不舒故以萸肉補之以生麥芽調之所以遂其條達之性也至於第二方中為瀉止小便已利故去滑石為心中猶怔忡故將萸肉加重為猶有餘熱未清故又加生地黃因其餘熱無多如此治法已可消除淨盡無須服白虎湯及白虎加人參湯也溫病武清縣孫年三十三歲於孟秋時得溫病病因未病之前心中常覺發熱繼因飯後有汗未暇休息陡有急事冒風出門致得溫病證候表裡俱覺壯熱嗜飲涼水食涼物舌苔白厚中心已黃大便乾燥小便短赤脈象洪長有力左右皆然一分鐘七十八至診斷此因未病之先已有伏氣化熱或有暑氣之熱內伏略為外感所激即表裡陡發壯熱一兩日間陽明府熱已實其脈之洪長有力是明徵也擬投以大劑白虎湯再少佐以宣散之品處方生石膏四兩搗細知母一兩鮮茅根六錢青連翹三錢甘草三錢粳米三錢共煎湯三盅分三次溫服下復診將藥分三次服完表裡之熱分毫未減脈象之洪長有力亦仍舊大便亦未通下此非藥不對證乃藥輕病重藥不勝病也夫石膏之性神農本草經原謂其微寒若遇陽明大熱之證當放膽用之擬即原方去連翹加天花粉再將石膏加重處方生石膏六兩知母一兩天花粉一兩鮮茅根六錢甘草四錢粳米四錢共煎湯三大盅分三次溫服下復診將藥分三次服完下燥糞數枚其表裡之熱仍然不退脈象亦仍有力愚謂孫曰餘生平治寒溫實熱證若屢次治以大劑白虎湯而其熱不退者恆將方中石膏研極細將余藥煎湯送服即可奏效今此證正宜用此方孫亦以為然處方生石膏二兩研極細生懷山藥二兩甘草六錢將山藥甘草煎湯一大碗分多次溫服每次送服石膏末二錢許熱退勿須盡劑即其熱未盡退若其大便再通下一次者亦宜將藥停服效果分六次將湯藥飲完將石膏送服強半熱猶未退大便亦未通下又煎渣取湯兩盅分數次送服石膏末甫完陡覺表裡熱勢大增時當夜深不便延醫孫自持其脈弦硬異常因常閲衷中參西録知脈雖有力而無洪滑之象者用白虎湯時皆宜加人參遂急買高麗參五錢煮湯頓飲下其脈漸漸和緩熱亦漸退至黎明其病霍然全愈矣説明按傷寒定例凡用白虎湯若在汗吐下後及渴者皆宜加人參細詢此證之經過始知曾發大汗一次此次所服之藥雖非白虎湯原方實以山藥代粳米又以石膏如此服法其力之大可以不用知母是其方亦白虎湯也若早加黨參數錢與山藥甘草同煎湯以送服石膏當即安然病愈乃因一時疏忽並未見及猶幸病者自知醫理以挽回於末路此雖白虎湯與人參前後分用之仍不啻同時並用之也此證加人參於白虎湯中其益有三發汗之後人之正氣多虛人參大能補助正氣俾正氣壯旺自能運化藥力以勝邪其為益一也又發汗易傷津液津液傷則人之陰分恆因之虧損人參與石膏並用能於邪熱熾盛之時滋津液以復真陰液滋陰復則邪熱易退其為益二也又用藥之法恆熱因涼用涼因熱用內經所謂伏其所因也此證用山藥甘草煎湯送服石膏之後病則純熱藥則純涼勢若冰炭不相容是以其熱益激發而暴動加人參之性溫者以為之作引此即涼因熱用之義為涼藥中有熱藥引之以消熱而後熱不格拒轉與化合熱與涼藥化合則熱即消矣此其為益三也統此三益觀之可曉然於此病之所以愈益嘆仲聖制方之妙即約略用之亦可挽回至險之證也溫病兼項後作疼李姓媼年八旬有三於孟夏得溫病兼項後作疼病因飯後頭面有汗忽隔窗紗透入涼風其汗遂閉因得斯證證候項疼不能轉側並不能俯仰周身發灼熱心中亦熱思涼物脈象左部弦而長右部則弦硬有力大便乾燥小便短少診斷此因汗出腠理不閉風襲風池風府是以項疼因而成風溫也高年之脈大抵弦細因其氣虛所以無甚起伏因其血液短少是以細而不濡至於弦硬而長有力是顯有溫熱之現象也此當清其實熱而輔以補正兼解表之品處方生石膏一兩軋細野臺參三錢生懷地黃一兩生懷山藥五錢玄參三錢沙參三錢連翹二錢西藥阿斯匹林一瓦先將阿斯匹林用白糖水送下繼將中藥煎湯一大盅至甫出汗時即將湯藥乘熱服下效果如法將藥服下後周身得汗表裡之熱皆退項之疼大減而仍未脫然俾每日用阿斯匹林一瓦強約三分分三次用白糖水送下隔四點鐘服一次若初次服後微見汗者後兩次宜少服如此兩日項疼全愈蓋阿斯匹林不但能發汗去熱且能為熱性關節疼痛之最妙藥也溫病兼脅疼天津李年三十八歲於孟冬上旬得溫病病因其妻於秋間病故子女皆幼處處須自經管傷心又兼勞心遂致暗生內熱薄受外感遽成溫病證候初得時即表裡俱熱醫者治以薄荷連翹菊花諸藥服後微見汗病稍見輕至再診時病人自覺呼吸短氣此氣鬱不舒也醫者誤以為氣虛遂於清熱藥中加黨參以補其氣服後右脅下陡然作疼徹夜不能臥亦不能眠心中發熱舌苔白厚大便四日未行其左右脈皆弦右部尤弦而有力一分鐘八十二至診斷凡脈象弦者主疼又主血液短少此證之右脅非常疼痛原為證脈相符而其傷心勞心以致暗生內熱者其血液必然傷損此亦證脈相符也其右脈弦而有力者外感之熱已入陽明之府也擬治以白虎湯而輔以開鬱滋陰之品處方生石膏二兩軋細知母八錢玄參八錢天冬八錢川楝子五錢搗碎生萊蔔子五錢搗碎連翹三錢甘草二錢粳米三錢共煎湯兩大盅分兩次溫服下復診將藥服完熱退強半脅疼已愈三分之二脈象變為浮弦惟胸膈似覺鬱悶大便猶未通下再治以寬胸清熱潤燥之劑為其脈浮有還表之象宜再少加透表之藥以引之外出其病當由汗而解處方糖栝蔞二兩切碎生石膏一兩搗細知母五錢玄參五錢連翹三錢川楝子四錢搗碎甘草二錢共煎湯兩盅分二次溫服下其服完兩次之後遲一點鐘再服西藥阿斯匹林一瓦溫復以取微汗效果如法將藥服完果周身皆得微汗病若失其大便亦通下矣風溫兼喘促遼寧赫姓幼子年五歲得風溫兼喘促證病因季春下旬在外邊𪦞戲出汗受風遂成溫病醫治失宜七八日間又添喘促證候面紅身熱喘息極迫促痰聲漉漉目似不瞬脈象浮滑重按有力指有紫紋上透氣關啓口視其舌苔白而潤問其二便言大便兩日未行小便微黃然甚通利診斷觀此證狀況已危至極點然脈象見滑雖主有痰亦足徵陰分充足且視其身體胖壯知猶可治宜用金匱小青龍加石膏湯再加杏仁川貝以利其肺氣處方麻黃一錢桂枝尖一錢生杭芍三錢清半夏二錢杏仁二錢去皮搗碎川貝母二錢搗碎五味子一錢搗碎乾薑六分細辛六分生石膏一兩搗細共煎湯一大盅分兩次溫服下方解金匱小青龍加石膏湯原治肺脹咳而上氣煩躁而喘然其石膏之分量僅為麻桂三分之二金匱小青龍加石膏湯其石膏之分量原有差誤曾詳論之而此方中之生石膏則十倍於麻桂誠以其面紅身熱脈象有力若不如此重用石膏則麻桂薑辛之熱即不能用矣又傷寒論小青龍湯加減之例喘者去麻黃加杏仁今加杏仁而不去麻黃者因重用生石膏以監製麻黃則麻黃即可不去也復診將藥服盡一劑喘愈強半痰猶壅盛肌膚猶灼熱大便猶未通下脈象仍有力擬再治以清熱利痰之品處方生石膏二兩搗細栝蔞仁二兩炒搗生赭石一兩軋細共煎湯兩盅分三次徐徐溫飲下效果將藥分三次服完火退痰消大便通下病遂全愈説明此案曾登於全國名醫驗案類編何廉臣評此案云風溫犯肺脹喘促小兒尤多病最危險兒科專家往往稱為馬脾風者此也此案斷定為外寒束內熱仿金匱小青龍加石膏湯再加貝母開豁清泄接方用二石蔞仁等清鎮滑降而痊先開後降步驟井然惟五歲小兒能受如此重量可見北方風氣剛強體質茁實不比南方人之體質柔弱也正惟能受重劑故能奏速功觀何廉臣評語雖亦推獎此案而究嫌藥量過重致有南北分別之設想不知此案藥方之分量若作一次服以治五歲孺子誠為過重若分作三次服則無論南北凡身體胖壯之孺子皆可服也試觀近今新出之醫書治産後溫病有一劑用生石膏半斤者矣曾見於劉蔚楚君遇安齋證治叢録劉君原廣東香山人也治鼠疫病亦有一劑用生石膏半斤者矣曾見於李健頤君鼠疫新篇李君原福建平潭人也若在北方治此等證豈藥之分量可再加增乎由此知醫者之治病用藥不可定存南北之見也且愚亦嘗南至漢皋矣曾在彼處臨證處方未覺有異於北方惟用發表之劑則南方出汗較易其分量自宜從輕然此乃地氣寒暖之關係非其身體強弱之關係也既如此一人之身則冬時發汗與夏時發汗其所用藥劑之輕重自迥殊也嘗細驗天地之氣化恆數十年而一變仲景當日原先著傷寒論後著金匱要略傷寒論小青龍湯原有五種加法而獨無加石膏之例因當時無當加石膏之病也至著金匱時則有小青龍加石膏湯矣想其時已現有當加石膏之病也憶愚弱冠時見醫者治外感痰喘證但投以小青龍湯原方即可治愈後數年愚臨證遇有外感痰喘證但投以小青龍湯不效必加生石膏數錢方效又遲數年必加生石膏兩許或至二兩方效由斯知為醫者當隨氣化之轉移而時時與之消息不可拘定成方而不知變通也秋溫兼伏氣化熱天津徐姓媼年五十九歲於中秋上旬得溫病帶有伏氣化熱病因從前原居他處因遷居勞碌天氣燥熱有汗受風遂得斯病證候晨起覺周身微發熱兼痠懶不舒過午陡覺表裡大熱且其熱浸增及晚四點鐘往視時見其臥床閉目精神昏昏呻吟不止診其脈左部沉弦右部洪實數近六至問其未病之前曾有拂意之事乎其家人曰誠然其稟性褊急恆多憂思且又易動肝火欲見其舌苔大聲呼數次始知啓口視其舌上似無苔而有腫脹之意問其大便言素恆乾燥診斷其左脈沉弦者知其肝氣鬱滯不能條達是以呻吟不止此欲借呻吟以舒其氣也其右脈洪實者知此證必有伏氣化熱竄入陽明不然則外感之溫病半日之間何至若斯之劇也此當用白虎湯以清陽明之熱而以調氣舒肝之藥佐之處方生石膏二兩搗細知母八錢生萊蔔子三錢搗碎青連翹三錢甘草二錢粳米四錢共煎湯兩盅分兩次溫服方解萊蔔子為善化鬱氣之藥其性善升亦善降炒用之則降多於升生用之則升多於降凡肝氣之郁者宜升是以方中用生者至於連翹原具有透表之力而用於此方之中不但取其能透表也其性又善舒肝凡肝氣之鬱而不舒者連翹皆能舒之也是則連翹一味既可佐白虎以清溫熱更可輔萊蔔以開肝氣之鬱滯復診將藥兩次服完周身得汗熱退十之七八精神驟然清爽左脈仍有弦象而不沉右脈已無洪象而仍似有力至數之數亦減問其心中仍有覺熱之時且腹中知飢而懶於進食此則再宜用涼潤滋陰之品清其餘熱處方玄參一兩沙參五錢生杭芍四錢生麥芽三錢鮮茅根四錢滑石三錢甘草二錢共煎湯一大盅溫服方中用滑石者欲其餘熱自小便瀉出也效果將藥連服兩劑大便通下其熱全消能進飲食脈象亦和平矣而至數仍有數象俾再用玄參兩半潞參三錢煎服數劑以善其後溫病兼嘔吐天津劉年三十二歲於季夏得溫熱病兼嘔吐不受飲食病因因在校中宿臥一日因校中無人其衾褥被人竊去追之不及因努力奔跑周身出汗乘涼歇息遂得斯病證候心中煩熱周身時時汗出自第二日嘔吐不受飲食今已四日屢次服藥亦皆吐出即渴時飲水亦恆吐出舌苔白厚大便四日未行其脈左部弦硬右部弦長有力一息五至診斷其脈左部弦硬者肝膽之火熾盛也右部弦長者沖氣挾胃氣上衝也弦長而兼有力者外感之熱已入陽明之府也此證因被盜怒動肝氣肝火上衝並激動沖氣挾胃氣亦上衝而外感之熱又復熾盛於胃中以相助為虐是以煩熱汗出不受飲食而吐藥吐水也此當投以清熱鎮逆之劑處方生石膏二兩細末生赭石六錢細末鏡面硃砂五錢細末和勻分作五包先送服一包過兩點鐘再送服一包病愈即停服不必盡劑方用散劑不用湯劑者止嘔吐之藥丸散優於湯劑也效果服至兩包嘔吐已愈心中猶覺煩熱服至四包煩熱全愈大便亦通下矣説明石膏為石質之藥本重墜且又寒涼是以白虎湯中以石膏為主而以甘草緩之以粳米和之欲其服後留戀於胃中不至速於下行故用石膏者忌再與重墜之藥並用恐其寒涼侵下焦也並不可與開破之藥同用因開破之藥力原下行也乃今因肝氣膽火相併上衝更激動沖氣挾胃氣上衝且更有外感之熱助之上衝因致臟腑之氣化有升無降是以飲食與藥至胃中皆不能存留此但恃石膏之寒涼重墜原不能勝任故特用赭石之最有壓力者以輔之此所以旋轉臟腑中之氣化而使之歸於常也設非遇此等證脈則石膏原不可與赭石並用也溫病兼嘔吐天津楊姓媼年過五旬於季春得溫病兼嘔吐病因家庭勃溪激動肝膽之火繼因汗出受風遂得此證證候表裡壯熱嘔吐甚劇不能服藥少進飲食亦皆吐出舌苔白厚中心微黃大便三日未行其脈左部弦長右部洪長重按皆實診斷此少陽陽明合病也為其外感之熱已入陽明胃府是以表裡俱壯熱而舌苔已黃為其激動之火積於少陽肝膽是以其火上衝頻作嘔吐治此證者欲其受藥不吐當變湯劑為散且又分毫無藥味庶可奏效處方生石膏一兩細末鮮梨兩大個將梨去皮切片蘸石膏末細細嚼服復診將梨片與石膏末嚼服一強半未吐遲兩點鐘又將所餘者服完自此不復嘔吐可進飲食大便通下一次診其脈猶有餘熱問其心中亦仍覺熱而較前則大輕減矣擬改用湯劑以清其未盡之熱處方生石膏一兩搗細生杭芍八錢玄參三錢沙參三錢連翹二錢甘草二錢鮮白茅根三錢藥共七味先將前六味水煎十餘沸入鮮白茅根再煎三四沸取湯一大盅溫服效果將藥如法煎服一劑熱又減退若干脈象已近和平遂即原方將石膏改用六錢芍藥改用四錢又服一劑病遂全愈或問石膏為清陽明之主藥此證原陽明少陽均有實熱何以用石膏但清陽明之熱而病即可愈答曰凡藥服下原隨氣血流行無處不到石膏雖善清陽明之熱究之凡臟腑間蘊有實熱石膏皆能清之且凡嘔吐者皆氣上逆也石膏末服其石質之重墜大能折其上逆之氣使之下行又有梨片之甘涼開胃者以輔之所以奏效甚捷也若當秋夏之交無鮮梨時可以西瓜代之溫病兼衄血便血天津陳姓童子年十五歲於仲秋得溫病兼衄血便血病因初因周身發熱出有斑點有似麻疹醫用涼藥清之斑點即回連服涼藥數劑周身熱已退而心中時覺煩躁逾旬日因薄受外感其熱陡然反復證候表裡壯熱衄血兩次小便時或帶血嘔吐不受飲食服藥亦多吐出心中自覺為熱所灼怔忡莫支其脈搖搖而動數逾五至左右皆有力而重按不實舌苔白而欲黃大便三日未行本擬投以白虎加人參湯恐其服後作嘔處方生石膏三兩細末生懷山藥二兩共煎湯一大碗俾徐徐溫飲下為防其嘔吐一次只飲一大口限定四小時將藥服完方解凡嘔吐之證飲湯則吐服粥恆可不吐生山藥二兩煎取濃汁與粥無異且無藥味服後其黏滯之力自能留戀於胃中且其溫補之性又能固攝下焦以止便血培養心氣以治怔忡也而以治此溫而兼虛之證與石膏相伍為方以石膏清其溫以山藥補其虛雖非白虎加人參湯而亦不啻白虎加人參湯矣復診翌日復診熱退十之七八心中亦不怔忡少進飲食亦不嘔吐衄血便血皆愈脈象力減至數仍數處方玄參二兩潞參五錢連翹五錢效果仍煎湯一大碗徐徐溫飲下盡劑而愈大便亦即通下方解蓋其大熱已退而脈仍數者以其有陰虛之熱也玄參潞參並用原善退陰虛作熱而猶恐其伏有疹毒故又加連翹以托之外出也説明此證若能服藥不吐投以大劑白虎加人參湯大熱退後其脈即可不數乃因其服藥嘔吐遂變通其方重用生山藥二兩與生石膏同煎服因山藥能健脾滋腎其補益之力雖不如人參實有近於人參處也至大熱退後脈象猶數遂重用玄參二兩以代石膏取其能滋真陰兼能清外感餘熱而又伍以潞參連翹各五錢潞參即古之人參此由白虎加人參之義化裁而出故虛熱易退而連翹又能助玄參涼潤之力外透肌膚則餘熱亦易清也溫疹天津楊姓幼子年四歲於季春發生溫疹病因春暖時氣流行比戶多有發生此病者因受傳染證候周身出疹甚密且灼熱異常閉目昏昏時作譫語氣息迫促其唇乾裂紫黑上多凝血脈象數而有力大便不實每日溏瀉兩三次診斷凡上焦有熱之證最忌下焦滑瀉此證上焦之熱已極而其大便又復溏瀉欲清其熱又恐其溏瀉益甚且在發疹更虞其因溏瀉毒內陷也是以治此證者當上清其熱下止其瀉兼托疹毒外出證候雖險自能治愈處方生懷山藥一兩滑石一兩生石膏一兩搗細生杭芍六錢甘草三錢連翹三錢蟬蛻錢半去土共煎一大盅分多次徐徐溫飲下效果分七八次將藥服完翌日視之其熱大減諸病皆見愈惟不能穩睡心中似騷擾不安其脈象仍似有力遂將方中滑石石膏皆減半煎湯送安宮牛黃丸半丸至煎渣再服時又送服半丸病遂全愈溫疹兼喉痧天津沈姓學生年十六歲於仲春得溫疹兼喉痧證病因因在體育場中遊戲努力過度周身出汗為風所襲遂得斯病證候初病時微覺惡寒頭疼翌日即表裡俱壯熱咽喉悶疼延醫服藥病未見輕喉中疼悶似加劇周身又復出疹遂延愚為診治其肌膚甚熱出疹甚密連無疹之處其肌膚亦紅誠西人所謂猩紅熱也其心中亦自覺熱甚其喉中扁桃腺處皆紅腫其左邊有如榆莢一塊發白自言不惟飲食疼難下咽即呼吸亦甚覺有礙診其脈左右皆洪滑有力一分鐘九十八至愚為刺其少商出血復為針其合谷又為擬一清咽表疹瀉火之方俾服之處方生石膏二兩搗細玄參六錢天花粉六錢射干三錢牛蒡子三錢搗碎浙貝母三錢青連翹三錢鮮蘆根三錢甘草錢半粳米三錢共煎湯兩大盅分兩次溫服下復診翌日過午復為診視其表裡之熱皆稍退脈象之洪滑亦稍減疹出又稍加多從前三日未大便至此則通下一次再視其喉其紅腫似加增白處稍大病人自言此時飲水必須努力始能下咽呼吸之滯礙似又加劇愚曰此為極危險之病非刺患處出血不可遂用圭式小刀於喉左右紅腫之處各刺一長口放出紫血若干遽覺呼吸順利擬再投以清熱消腫托表疹毒之劑處方生石膏一兩搗細天花粉六錢赤芍三錢板藍根三錢牛蒡子三錢搗細生蒲黃三錢浙貝母三錢青連翹三錢鮮蘆根三錢共煎一大盅半分兩次溫服方解赤芍藥張隱菴陳修園皆疑是山中野草之根以其紋理甚粗與園中所植之芍藥根迥異也然此物出於東三省愚親至其地見山坡多生此種芍藥開單瓣紅花其花小於尋常芍藥花約三倍而其葉則確係芍藥無疑蓋南方亦有赤芍藥而其根仍白茲則花赤其根亦赤是以善入血分活血化瘀也又浙貝治嗽不如川貝而以之治瘡浙貝似勝於川貝以其味苦性涼能清熱解毒也效果將藥連服兩劑其病脫然全愈説明內經靈樞癰疽篇謂癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死此證咽喉兩旁紅腫日增即癰發嗌中名為猛疽者也其膿成不瀉則危在目前若其劇者必俟其化膿而後瀉之又恆有迫不及待之時是以此證因其紅腫已甚有礙呼吸急刺之以出其紫血而紅腫遂愈此所謂防之於預也且化膿而後瀉之其瘡口恆至潰爛若未成膿而瀉其紫血所刺之口半日即合矣喉證原有內傷外感之殊其內傷者雖宜注重清熱亦宜少佐以宣散之品如白喉忌表抉微方中之用薄荷連翹是也由外感者雖不忌用表散之品然宜表散以辛涼不宜表散以溫熱若薄荷連翹蟬蛻蘆根諸藥皆表散之佳品也或有謂喉證若由於外感雖麻黃亦可用者然用麻黃必須重用生石膏佐之若傷寒論之麻杏甘石湯誠為治外感喉證之佳方也特是其方原非治喉證之方是以方中石膏僅為麻黃之兩倍若藉以治外感喉證則石膏當十倍於麻黃若遇外感實火熾盛者石膏尤宜多加方為穩妥是以愚用此方以治外感喉證時麻黃不過用至一錢而生石膏恆用至兩餘或重用至二兩也然此猶論喉證之紅腫不甚劇者若至腫甚有礙呼吸不惟麻黃不可用即薄荷亦不可用是以治此證方中止用連翹蘆根也以上所論者無論內傷外感皆咽喉證之屬熱者也而咽喉中之變證間有真寒假熱者又當另議治法溫病兼喉痧痰喘天津馬年二十八歲於季秋得溫病兼喉痧痰喘證病因初因外出受風感冒甚微醫者用熱藥發之陡成溫病而喉病喘病遂同時發現證候表裡俱壯熱喘逆咳嗽時吐痰涎咽喉左邊紅腫作疼即西人所謂扁桃體炎其外邊項左側亦腫脹呼吸皆有窒礙為其病喉且兼喘逆則吸氣尤形困難必十分努力始能將氣吸入其舌苔白而薄中心微黃小便赤澀大便四日未行其脈左右皆弦長右部重診有力一分鐘九十六至診斷此乃外感之熱已入陽明之府而沖氣又挾胃氣肝火上衝也為其外感之熱已入陽明之府是以右脈之力勝於左脈為其沖氣挾胃氣肝火上衝是以左右脈皆弦長病現喘逆及咽喉腫疼其腫痛偏左者正當肝火上升之路也擬治以麻杏甘石湯兼加鎮沖降胃納氣利痰之品以輔之又宜兼用針刺放血以救目前之急處方麻黃一錢生石膏二兩搗細生赭石一兩軋細生懷山藥八錢杏仁三錢去皮炒搗連翹三錢牛蒡子三錢搗碎射干二錢甘草一錢共煎湯兩盅分兩次溫服又於未服藥之前用三稜針刺其兩手少商出血用有尖小刀刺其咽喉腫處開兩小口令其出血且用硼砂西藥鹽酸加里融以三十倍之水俾其含漱又於兩手合谷處為之行針其咽喉腫處驟然輕減然後服藥復診將藥服後其喘頓愈強半呼吸似無妨礙表裡之熱亦愈強半脈象亦較前平和其右部仍然有力胸膈似覺鬱悶有時覺氣上衝仍然咳嗽大便猶未通下擬再治以開鬱降氣清熱理嗽之劑處方糖栝蔞二兩切碎生石膏一兩搗細生赭石五錢軋細生杭芍三錢川貝母三錢碎竹茹三錢牛蒡子三錢搗碎共煎湯一大盅溫服效果將藥煎服一劑大便通下諸病皆愈惟一日之間猶偶有咳嗽之時俾用川貝母細末和梨蒸食之以善其後説明凡用古人成方治病其藥味或可不動然必細審其藥之分量或加或減俾與病機相宜如麻杏甘石湯原方石膏之分量僅為麻黃之兩倍而此證所用麻杏甘石湯則石膏之分量二十倍於麻黃矣蓋傷寒論之麻杏甘石湯原非為治喉證而設今借之以治喉證原用麻黃以散風定喘又因此證之喉腫太甚有礙呼吸而方中猶用麻黃原為行險之道故麻黃僅用一錢而又重用生石膏二兩以監製之且於臨服藥時先用刀開其患處用針刺其少商與合谷此所以於險中求穩也嘗聞友人楊言有一名醫深於傷寒論自著有注解傷寒論之書行世偶患喉證自服麻杏甘石湯竟至不起使其用麻杏甘石湯時亦若愚所用者如此加減又何患喉證不愈乎縱使服藥不能即愈又何至竟不起乎由此知非古人之方誤人麻杏甘石湯原為發汗後及下後汗出而喘無大熱者之的方原未言及治喉證也而欲借之以治喉證能勿將藥味之分量為之加減乎嘗總核傷寒論諸方用於今日大抵多稍偏於熱此非仲景之不善制方也自漢季至今上下相隔已一千六百餘年其天地之氣化人生之稟賦必有不同之處是以欲用古方皆宜細為斟酌也溫病兼喉疼天津胡年五十四歲於仲秋感受溫病兼喉疼證病因勞心過度暗生內熱且日飲牛乳兩次作點心亦能助熱內熱上潮遂覺咽喉不利至仲秋感受風溫陡覺咽喉作疼證候表裡俱覺發熱咽喉疼痛妨礙飲食心中之熱時覺上衝則咽喉之疼即因之益甚周身痠懶無力大便乾燥脈象浮滑而長右關尤重按有力舌上白苔滿布診斷此證脈象猶浮舌苔猶白蓋得病甫二日表證猶未罷也而右關重按有力且時覺有熱上衝咽喉者是內傷外感相併而為病也宜用重劑清其胃腑之熱而少佐以解表之品表解里清喉之疼痛當自愈矣處方生石膏四兩搗細西藥阿斯匹林一瓦單將生石膏煎湯一大盅乘熱將阿斯匹林融化其中服之因阿斯匹林實為酸涼解肌之妙藥與大量之石膏並用服後須臾其內傷外感相併之熱自能化汗而解也效果服後約半點鐘其上半身微似有汗而未能遍身透出遲一點鐘覺心中之熱不復上衝咽喉疼痛輕減時在下午一點鐘至晚間臨睡時仍照原方再服一劑周身皆得透汗安睡一夜翌晨諸病若失矣溫病兼陰虛鄰村高年二十五歲於仲夏得溫病病因仲夏上旬麥秋將至遠出辦事又欲急回收麥長途趨行於烈日之中辛苦殊甚因得溫病其叔父與其表叔毛皆邑中名醫又皆善治溫病二人共治旬日無效蓋因其勞力過甚體虛不能託病外出也證候愚診視時其兩目清白竟無所見兩手循衣摸床亂動不休譫語無倫分毫不省人事其大便從前滑瀉此時雖不滑瀉每月仍溏便一兩次脈象浮而無力右寸之浮尤甚兩尺按之即無一分鐘數至一百二十至舌苔薄黃中心干而微黑診斷此證兩目清白無火而竟無所見者腎陰將竭也其兩手亂動不休者肝風已動也病勢至此危險已至極點幸喜脈浮為病還在太陽右寸浮尤甚又為將汗之兆其所以將汗而不汗者人身之有汗如天地之有雨天地陰陽和而後雨人身亦陰陽和而後汗此證兩尺脈甚弱陽升而陰不應是以不能作汗當用大滋真陰之品濟陰以應其陽必能自汗汗出則病愈矣然非強發其汗也強發其汗則汗出必脫調劑陰陽以聽其自汗是以汗出必愈也處方熟懷地黃二兩生懷山藥一兩玄參一兩大甘枸杞一兩甘草三錢真阿膠四錢藥共六味將前五味煎湯一大碗去渣入阿膠融化徐徐分數次溫飲下效果時當上午十點鐘將藥煎服至下午兩點鐘將藥服完形狀較前安靜再診其脈頗有起色俾再用原方煎湯一大碗陸續服之至秉燭時遍身得透汗其病霍然愈矣此案曾載於全國名醫驗案類編何廉臣對於此案似有疑意以為誠如案中所述病況實為不可挽救之證也故今將此案又登斯編以徵此案之事實説明嘗實驗天地之氣化恆數十年而一變醫者臨證用藥即宜隨氣化而轉移因病者所得之病已先隨氣轉移也愚未習醫時見醫者治傷寒溫病皆喜用下藥見熱已傳裡其大便稍實者用承氣湯下之則愈如此者約二十年及愚習醫學時其如此治法者則恆多僨事而愚所閲之醫書又皆系趙氏醫貫景嶽全書馮氏錦囊諸喜用熟地之書即外感證亦多喜用之愚之治愈此證實得力於諸書之講究而此證之外又有重用熟地治愈寒溫之壞證諸多驗案地黃解後載有數案可參觀此乃用藥適與時會故用之有效也且自治愈此證之後毛高深與愚相契亦仿用愚方而治愈若干外感之虛證而一變其從前之用藥矣後至愚年過四旬覺天地之氣化又變病者多系氣分不足或氣分下陷外感中亦多兼見此證即用白虎湯時多宜加人參方效其初得外感應發表時亦恆為加黃耆方效如是者又有年乃自一九二一年以來病多亢陽宜用大劑涼潤之藥濟陰以配其陽其外感實熱之證多宜用大劑白虎湯更佐以涼潤之品且人臟腑之氣化多有升無降或腦部充血或夜眠不寐此皆氣化過升之故亦即陽亢無制之故治之者宜鎮安其氣化潛藏其陽分再重用涼潤之藥輔之而病始可治此誠以天地之氣化又有轉移人所生之病即隨之轉移而醫者之用藥自不得不隨之轉移也由此悟自古名醫所著之書多有所偏者非偏也其所逢之時氣化不同也愚為濫竽醫界者已五十年故能舉生平之所經歷而細細陳之也溫病兼喘脹邑中王之女年十五歲於仲春得溫病久不愈病因仲春上旬感受風溫醫者診治失宜遷延旬余病益增劇醫者諉為不治始延愚為診視證候心下脹滿甚劇喘不能臥自言心中幹甚似難支持其舌苔白而微黃小便赤少大便從前滑瀉此時雖不滑瀉然仍每日下行脈搏一息五至強左部弦而有力右部似大而有力然皆不任重按診斷此其溫病之熱本不甚劇因病久真陰虧損致小便不利所飲之水停於腸胃則脹滿迫於心下則作喘其心中自覺幹甚固系溫病之熱未清亦足徵其真陰虧損陰精不能上奉也內經謂陰精上奉其人壽當滋其真陰利其小便真陰足則以水濟火而心中自然不幹小便利則水從下消而脹滿喘促自愈至於些些溫病之餘熱亦可皆隨小便瀉出而不治自愈矣處方鮮白茅根去淨皮及節間細根六兩銼碎用水三大碗煎一沸俟半點鐘視其茅根若不沉水底再煎一沸至茅根皆沉水底其湯即成去渣當茶徐徐溫飲之效果如法煎飲茅根兩日其病霍然全愈蓋白茅根涼潤滋陰又善治肝腎有熱小便不利且具有發表之性能透溫病之熱外出一藥而三善備故單用之而能立建奇功也然必剖取鮮者用之且復如此煎法過煎則無效方能有效凡藥之性能利水者多不能滋陰能下降者多不能上升能清裡者多不能達表惟茅根既善滋陰又善利水既善引水氣下行又善助腎陰上升且內清臟腑之熱外托肌表之邪而尤善清肺利痰定其喘逆溫病兼虛熱邑城東劉氏女年十五歲於季春患溫病久不愈病因因天氣漸熱猶勤紡織勞力之餘出外乘涼有汗被風遂成溫病證候初得周身發熱原宜辛涼解肌醫者竟用熱藥發之汗未出而熱益甚心中亦熱而且渴此時若用大劑白虎加人參湯清之病亦可愈而又小心不敢用惟些些投以涼潤小劑遷延二十餘日外感之熱似漸退然午前稍輕而午後則仍然灼熱且多日不能飲食形體異常清瘦左脈弦細無根右部關脈稍實一息六至舌苔薄而微黃毫無津液大便四五日一行頗乾燥診斷此因病久耗陰陰虛生熱又兼外感之熱留滯於陽明之府未盡消也當以清外感之熱為主而以滋補真陰之藥輔之處方生石膏一兩搗細野黨參三錢生懷地黃一兩生懷山藥一兩生杭芍四錢滑石三錢甘草三錢共煎湯一大盅分兩次溫服下復診將藥煎服兩劑後外感之熱已退右關脈已平和惟過午猶微發熱此其陰分猶虛也當再滋補其陰分處方玄參一兩生懷山藥一兩甘枸杞五錢大者生杭芍五錢滑石二錢熟地黃一兩生雞內金一錢黃色的搗甘草二錢共煎一大盅分兩次溫服效果日服藥一劑連服三日灼熱全愈説明按此方於大隊滋陰藥中猶少加滑石者恐外感之熱邪未盡引之自小便出也愚凡治外感之熱兼有虛熱者恆生山藥與滑石並用瀉熱補虛一舉兩得至上有外感燥熱而下焦復滑瀉者用之以清熱止瀉宜各用一兩尤屢次奏效二藥相伍原有化合之妙用若再加芍藥甘草即拙擬之滋陰清燥湯可參觀也溫病兼吐血滄州吳姓媼年過七旬偶得溫病兼患吐血病因年歲雖高家庭事務仍自操勞因勞心過度心常發熱時當季春有汗受風遂得溫病且兼吐血證候三四日間表裡俱壯熱心中熱極之時恆吐血一兩口急飲新汲井泉水其血即止舌苔白厚欲黃大便三日未行脈象左部弦長右部洪長一息五至診斷此證因家務勞心過度心肝先有蘊熱又兼外感之熱傳入陽明之府兩熱相併逼血妄行所以吐血然其脈象火熱雖盛而正猶不虛雖在高年知猶可治其治法當以清胃腑之熱為主而兼清其心肝之熱俾內傷外感之熱俱清血自不吐矣處方生石膏三兩軋細生懷地黃一兩五錢生懷山藥一兩生杭芍一兩知母三錢甘草三錢烏犀角一錢五分廣三七二錢軋細藥共八味將前六味煎湯三盅犀角另煎湯半盅和勻分三次溫服下每服藥一次即送服三七末三分之一效果將藥三次服完血止熱退脈亦平和大便猶未通下俾煎渣再服犀角亦煎渣取湯和於湯藥中服之大便通下全愈説明愚平素用白虎湯凡年過六旬者必加人參此證年過七旬而不加人參者以其證兼吐血也為不用人參所以重用生山藥一兩取其既能代粳米和胃又可代人參稍補益其正氣也溫病兼沖氣上衝奉天鄭年五十二歲於季春得溫病兼沖氣自下上衝病因其人素有痰飲偶有拂意之事肝火內動其沖氣即挾痰飲上湧連連嘔吐痰水季春之時因受感冒成溫病溫熱內傳觸動沖氣又復上沖證候表裡俱壯熱嗜飲涼水痰涎上泛屢屢咳吐厄逆噦氣連連不除兩脅作脹舌苔白厚而中心微黃大便三日未行其脈左部弦硬而長右部洪滑而長皆重按有力此溫病之熱已入陽明之府又兼肝火挾沖氣上衝也是以其左脈弦硬為肝火熾盛其弦硬而長即為衝脈上衝之現象也其右脈洪滑為溫熱已入陽明胃腑其洪滑而長亦沖氣上衝之現象也因衝脈雖居於上而與陽明厥陰皆有連帶之關係也欲治此證當重用白虎湯以清陽明之熱而以瀉肝降沖理痰之品輔之處方生石膏三兩搗細生赭石一兩軋細生龍骨八錢搗碎生牡蠣八錢搗碎白知母八錢生杭芍六錢清半夏三錢厚朴錢半甘草二錢粳米四錢共煎湯三盅分三次溫飲下效果將藥分三次服完熱退氣平痰涎亦減十之七八脈象亦近平和其大便猶未通下遂即原方將石膏龍骨牡蠣各減半再煎服一劑大便通下病全愈説明方書用石膏未有與赭石並用者即愚生平用石膏亦未嘗與赭石並用恐其寒涼之性與赭石之重墜者並用而直趨下焦也然遇有當用之病則病當之非人當之有如此證不重用石膏則陽明之大熱不除不重用赭石則上逆之沖氣莫制此所以並用之而無妨礙也設若此證但陽明熱實而無沖氣上逆服此藥後其大便當即通下或更至於滑瀉而陽明胃腑之熱轉難盡消為其兼有沖氣上逆故必俟服之第二劑大便始能通下此正所謂病當之非人當之之明徵也龍骨牡蠣之性皆善鎮肝斂沖以之治痰原非所長而陳修園謂龍骨牡蠣同用能引逆上之火泛濫之水下歸其宅為治痰之神品其所謂痰皆逆上之火泛濫之水所成即此證之沖氣上衝痰飲上泛者是也是以方中龍骨牡蠣各重用八錢輔翼赭石以成降逆消痰之功而非可泛以之治痰也至於二藥必生用者非但取其生則性涼能清熱也傷寒論太陽篇用龍骨牡蠣者三方皆表證未罷後世解者謂龍骨牡蠣斂正氣而不斂邪氣是以仲師於表證未罷者亦用之然三方中之龍骨牡蠣下皆未注有煆字其生用可知雖其性斂正氣不斂邪氣若煆之則其性過澀亦必於外感有礙也且煆之則其氣輕浮不能沉重下達以鎮肝斂沖更可知矣十六瘧疾門瘧疾兼陰虛天津吳年三十二歲於仲秋病瘧久不愈病因廠中作工歇人不歇機器輪流恆有夜班暑熱之時徹夜不眠辛苦有火多食涼物入秋遂發瘧疾證候其瘧初發時寒熱皆劇服西藥金雞納霜治愈旬日瘧復發如前又服金雞納霜治愈七八日瘧又發寒輕熱重服金雞納霜不愈服中藥治瘧湯劑亦不愈遷延旬余始求為診治自言瘧作時發熱固重即不發瘧之日身亦覺熱其脈左右皆弦而無力數逾五至知其陰分陽分俱虛而陰分之虛尤甚也此當培養其氣血而以治瘧之藥輔之處方玄參一兩知母六錢天冬六錢潞參三錢何首烏三錢炙鱉甲三錢常山錢半酒炒柴胡錢半茵陳錢半生薑三錢大棗三個掰開此方於發瘧之前一夕煎服翌晨煎渣再服又於發瘧之前四點鐘送服西藥鹽酸規尼涅即金雞納霜以鹽酸制者半瓦效果將藥如法服之一劑瘧即不發而有時身猶覺熱脈象猶數知其陰分猶虛也俾用玄參生懷山藥各一兩生薑三片大棗三枚同煎服以服至身不發熱時停服瘧疾兼脾脹天津張年十九歲學生於孟秋病瘧愈而屢次反復病因其人性篤於學當溽暑放假之時仍自補習功課勞心過度又復受熱過度兼又多食瓜果以解其熱入秋遂發瘧疾證候自孟秋中旬病瘧服西藥金雞納霜治愈後旬日反復又服金雞納霜治愈後又反復服金雞納霜無效以中藥治愈隔旬余病又反復服中西藥皆無效因來社求治於愚其脈洪滑而實右部尤甚自覺心中杜塞滿悶常覺有熱上攻其病瘧時則寒熱平均皆不甚劇其大便四日未行診斷此胃間積有熱痰又兼脾作脹也方書謂久瘧在肋下結有硬塊名瘧母其塊不消瘧即不愈而西人實驗所結之塊確係脾臟脹大此證之自覺滿悶即脾臟脹大也又方書謂無痰不作瘧是以治瘧之方多用半夏常山以理其痰此證之自覺滿悶且杜塞又時有熱上攻實為熱痰充塞於胃脘也治之者宜消其脾之脹大清其胃之熱痰兼以治瘧之品輔之且更可因其大便不通驅逐脾之病下行自大便瀉出其病瘧之根柢可除矣處方川大黃四錢生雞內金三錢黃色的搗清半夏三錢常山錢半酒炒柴胡錢半茵陳錢半甘草錢半淨芒硝錢半藥共八味將前七味煎湯一盅沖芒硝服之其瘧每日一發在下午七點鐘宜於午前早將藥服下至午後兩三點鐘時再服金雞納霜半瓦效果前午十點鐘將藥服下至午後一點時下大便兩次其心中已不覺悶熱杜塞遲至兩點將西藥服下其日瘧遂不發俾再用生懷山藥一兩熟萊蔔子二錢生雞內金錢半煎湯日服一劑連服數日以善其後瘧疾兼暑熱天津徐姓媼年近五旬於季夏得瘧疾病因勤儉持家中饋事多躬操且宅旁設有面粉莊其飯亦由家出勞而兼暑遂至病瘧證候其病間日一發先冷後熱其冷甚輕其熱甚劇噁心懶食心中時常發熱思食涼物其脈左部弦硬右部洪實大便乾燥小便赤澀屢次服藥無效診斷此乃肝膽伏有瘧邪胃腑郁有暑熱暑熱瘧邪相併而為寒熱往來然寒少熱多此方書所謂陽明熱瘧也宜祛其肝膽之邪兼清其胃腑之熱處方生石膏一兩研細均分作三包其未發瘧之日頭午用柴胡二錢煎湯送服一包隔半日許再用開水送服一包至次日前發瘧五小時再用生薑三錢煎湯送服一包效果將藥按期服完後瘧疾即愈心中發熱懶食亦愈蓋石膏善清胃熱兼能清肝膽之熱初次用柴胡煎湯送服者所以和解少陽之邪也至三次用生薑煎湯送服者是防其瘧疾將發與太陽相併而生寒也瘧痢兼證天津劉年三十二歲於季秋患瘧又兼下痢病因因需車孔亟機輪壞處須得急速收拾忙時恆徹夜不眠勞苦過甚遂至下痢繼又病瘧證候其痢赤白參半一晝夜十餘次下墜腹疼其瘧間日一發寒輕熱重其脈左右皆有弦象而左關獨弦而有力診斷此證之脈左右皆弦者病瘧之脈大抵如此其左關獨弦而有力者其病根在肝膽也為肝膽有外受之邪是以脈現弦象而病瘧為其所受之邪為外感之熱邪是以左關脈象弦而有力其熱下迫腸中而下痢擬清肝膽之熱散其外感之邪則瘧痢庶可同愈處方生杭芍一兩山楂片三錢茵陳二錢生麥芽二錢柴胡錢半常山錢半酒炒草果錢半搗碎黃芩錢半甘草二錢生薑三片煎湯一大盅於不發瘧之日晚間服之翌晨煎渣再服一次效果將藥如法服後瘧痢皆愈又為開生懷山藥一兩生杭芍三錢黃色生雞內金一錢俾日煎服一劑以滋陰培氣化瘀連服數日以善其後十七霍亂門霍亂兼轉筋天津王年三十八歲於季冬得霍亂證病因廠中臘底事務煩雜勞心過度暗生內熱又兼因怒激動肝火怒猶未歇遽就寢睡至一點鐘時覺心中擾亂腹中作疼移時則吐瀉交作遂成霍亂證候心中發熱而渴噁心怔忡飲水須臾即吐腹中時疼時止疼劇時則下瀉瀉時異常覺熱偶有小便熱亦如斯有時兩腿筋轉然不甚劇其脈象無力卻無閉塞之象診斷霍亂之證恆有脈象無火而其實際轉大熱者即或脈閉身冷顯露寒涼之象亦不可遽以涼斷此證脈象不見有熱而心中熱而且渴二便尤甚覺熱其為內蘊實熱無疑至其脈不見有熱象者以心臟因受毒麻痹而機關之啓閉無力也擬用大劑寒涼清其內熱而輔以解毒消菌之品處方生石膏三兩搗細生杭芍八錢清半夏五錢溫水淘三次生懷山藥五錢嫩竹茹三錢碎的甘松二錢甘草三錢共煎湯三盅分三次溫服下每次送服衛生防疫寶丹五十粒方載後方中甘松亦名甘松香即西藥中之纈草也本草綱目謂馬氏開寶本草載其主惡氣卒心腹痛滿西人謂其善治轉筋是以為治霍亂要藥且其性善熏勞瘵誠有解毒除菌之力也復診將藥分兩次服完吐瀉腹疼轉筋諸證皆愈惟心中猶覺熱作渴二便仍覺發熱診其脈較前有力顯呈有火之象蓋其心臟至此已不麻痹啓閉之機關靈活是以脈象變更也其猶覺熱與渴者因系餘火未清而吐瀉之甚者最足傷陰陰分傷損最易生熱且善作渴此不可但治以瀉火之涼藥也擬兼投以大滋真陰之品處方生懷山藥一兩大甘枸杞一兩北沙參一兩離中丹五錢藥共四味將前三味煎湯一大盅送服離中丹一半遲四點鐘再將藥渣煎湯一大盅送服其餘一半效果將藥分三次服完熱退渴止病遂全愈説明霍亂之證原陰陽俱有然愚五十年經驗以來知此證屬陽而宜治以涼藥者十居其八此證屬陰而宜治以熱藥者十居其一此證屬半陰半陽當涼熱之藥並用以調劑其陰陽者又十居其一而後世論者恆以傷寒論所載之霍亂為真霍亂至於以涼藥治愈之霍亂皆系假霍亂不知傷寒論對於霍亂之治法亦非專用熱藥也有如其篇第七節云霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之夫既明言熱多寒多是顯有寒熱可分也雖所用之五苓散中亦有桂枝而分量獨輕至澤瀉茯苓豬苓其性皆微涼其方原不可以熱論也且用顯微鏡審察此病之菌系彎曲杆形是以此證無論涼熱惟審察其傳染之毒菌現彎曲杆形即為霍亂無疑也至欲細審此病之涼熱百不失一當參觀霍亂方及論霍亂治法篇自能臨證無誤霍亂吐瀉天津李姓媼年過六旬於仲夏得霍亂證病因天氣炎熱有事出門道途受暑歸家又復自炊多受炭氣遂病霍亂證候噁心嘔吐腹疼泄瀉得病不過十小時吐瀉已十餘次矣其手足皆涼手涼至肘足涼至膝心中則覺發熱其脈沉細欲無不足四至診斷此霍亂之毒菌隨溽暑之熱傳入臟腑也其心臟受毒菌之麻痹跳動之機關將停是以脈沉細且遲其血脈之流通無力不能達於四肢是以手足皆涼其毒菌侵入腸胃俾腸胃之氣化失和兼以臟腑之正氣與侵入之邪氣互相格拒是以噁心腹疼吐瀉交作其心中發熱者固系夾雜暑氣而霍亂之屬陽者即不夾雜暑氣亦恆令人心中發熱也此宜治以解毒清熱之劑處方衛生防疫寶丹百六十粒離中丹四錢益元散四錢先將衛生防疫寶丹分三次用開水送服約半點多鐘服一次服完三次其噁心腹疼當愈嘔吐泄瀉亦當隨愈愈後若仍覺心中熱者再將後二味藥和勻亦分三次用開水送服每一點鐘服一次熱退者不必盡服效果將衛生防疫寶丹分三次服完果噁心嘔吐腹疼泄瀉皆愈而心中之熱未見輕減繼將離中丹益元散和勻分三次服完其熱遂消病全愈霍亂脫證遼寧寇姓媼年過六旬得霍亂脫證病因孟秋下旬染霍亂經醫數人調治兩日病勢垂危證候其證從前吐瀉交作至此吐瀉全無奄奄一息昏昏似睡肢體甚涼六脈全無詢之猶略能言語惟覺心中發熱難受診斷此證雖身涼脈閉而心中自覺發熱仍當以熱論其所以身涼脈閉者因霍亂之毒菌竄入心臟致心臟行血之機關將停血脈不達於周身所以內雖蘊熱而仍身涼脈閉也此當用藥消其毒菌清其內熱並以助心房之跳動雖危險仍可挽回處方鏡面硃砂錢半粉甘草一錢細面冰片三分薄荷冰二分共研細末分作三次服病急者四十分鐘服一次病緩者一點鐘服一次開水送下復診將藥末分三次服完心熱與難受皆愈強半而脈猶不出身仍發涼知其年過花甲吐瀉兩日未進飲食其血衰憊已極所以不能鼓脈外出以溫暖於周身處方野臺參一兩生懷地黃一兩生懷山藥一兩淨萸肉八錢甘草三錢蜜炙煎湯兩大盅分兩次溫服方解方中之義用臺參以回陽生懷地黃以滋陰萸肉以斂肝之脫此證吐瀉之始肝木助邪侮土至吐瀉之極而肝氣轉先脫炙甘草以和中氣之漓至於生山藥其味甘性溫可助臺參回陽其汁漿稠潤又可助地黃滋陰且此證胃中毫無穀氣又可惜之以培養脾胃俾脾胃運化諸藥有力也效果將藥兩次服完脈出周身亦熱惟自覺心中餘火未清知其陰分猶虧不能潛陽也又用玄參沙參生山藥各六錢煎湯服下病遂全愈霍亂暴脫證邑北境劉氏婦年近四旬得霍亂暴脫證病因受妊五六個月時當壬寅秋令霍亂盛行因受傳染吐瀉一晝夜病似稍愈而胎忽滑下自覺精神頓散心搖搖似不能支持遂急延為診視證候逮愚至欲為診視則病勢大革殮服已備著於身將舁諸床病家辭以不必入視愚曰此係暴脫之證一息尚存即可挽回遂入視之氣息若無大聲呼之亦不知應脈象模糊如水上浮麻莫辨至數診斷此證若系陳病狀況至此定難挽回惟因霍亂吐瀉已極又復流産則氣血暴脫故仍可用藥挽救夫暴脫之證其所脫者元氣也凡元氣之上脫必由於肝所以人之將脫者肝風先動當用酸斂之品直趨肝臟以收斂之即所以杜塞元氣上脫之路再用補助氣分之藥輔之雖病勢垂危至極點亦可挽回性命於呼吸之間處方淨杭萸肉二兩野黨參一兩生懷山藥一兩共煎湯一大盅溫服方雖開就而藥房相隔數里取藥迫不及待幸其比鄰劉是愚表兄有愚所開藥方取藥二劑未服中有萸肉共六錢遂急取來暴火煎湯灌之效果將藥徐徐灌下須臾氣息稍大呼之能應又急煎渣灌下較前尤明瞭問其心中何如言甚難受其音惟在喉間細聽可辨須臾藥已取到急煎湯兩茶杯此時已自能服藥俾分三次溫服下精神頓復可自動轉繼用生山藥細末八錢許煮作茶湯調以白糖令其適口當點心服之日兩次如此將養五六日以善其後説明按人之氣海有二一為先天之氣海一為後天之氣海內經論四海之名以膻中即膈上為氣海所藏者大氣即宗氣也養生家及針灸家皆以臍下為氣海所藏者元氣即養生家所謂祖氣也此氣海之形狀若倒提雞冠花形純系脂膜結成而中空剖解豬腹者名之為雞冠油肝臟下垂之脂膜與之相連是以元氣之上行原由肝而敷布而元氣之上脫亦即由肝而疏泄也內經謂肝主疏泄惟重用萸肉以酸斂防其疏泄藉以杜塞元氣上脫之路而元氣即可不脫矣所最足明徵者若初次即服所開之方以治愈此證鮮不謂人參之功居多乃因取藥不及遂單服萸肉且所服者只六錢即能建此奇功由此知萸肉救脫之力實遠勝人參蓋人參以救無氣之下脫猶足恃而以救元氣之上脫若單用之轉有氣高不返之弊説見俞氏寓意草以其性溫而兼升也至萸肉則無論上脫下脫用之皆效蓋元氣之上脫由於肝其下脫亦由於肝誠以肝能為腎行氣內經謂肝行腎之氣即能瀉元氣自下出也為其下脫亦由於肝故亦可重用萸肉治之也或問同為元氣之脫何以辨其上脫下脫答曰上脫與下脫其外現之證可據以辨別者甚多今但即脈以論如此證脈若水上浮麻此上脫之徵也若系下脫其脈即沉細欲無矣且元氣上脫下脫之外又有所謂外脫者周身汗出不止者是也萸肉最善斂汗是以萸肉亦能治之來復湯及山萸肉解後載有治驗之案數則可參觀也十八婦女科懷妊受溫病何姓婦年三十二歲受妊五月於孟秋感受溫病病因懷妊畏熱夜眠當窗未上窗幔自窗紗透風感冒成溫證候初病時調治失宜溫熱傳裡陽明府實延醫數人皆言病原當用大涼之藥因懷妊實不敢輕用繼延愚為診視見其面紅氣粗舌苔白厚中心已黃大便乾燥小便短赤診其脈左右皆洪滑而實一息五至強診斷據此證狀脈象觀之不但陽明胃府之熱甚實即肝膽之熱亦甚盛想其未病之前必曾怒動肝火若不急清其熱勢將迫血妄行危險即在目前治以白虎加人參湯以白虎湯解其熱加參以保其胎遂為疏方俾急服之處方生石膏三兩搗細野黨參四錢生懷地黃一兩生懷山藥一兩生杭芍五錢甘草三錢共煎湯三盅分三次溫服下方解按此方雖非白虎加人參湯原方而實以生地黃代知母以生山藥代粳米而外加芍藥也蓋知母地黃同能滋陰退熱而知母性滑地黃則饒有補腎之力粳米與山藥皆有濃汁能和胃而粳米汁濃而不黏山藥之汁濃而且黏大有固腎之力如此通變原方自於胎妊大有益也外加芍藥者欲借之以清肝膽之熱也復診將藥分三次服完翌日午前大便通下一次熱已退十之七八脈象已非洪實仍然有力心中仍覺發熱擬再用涼潤滋陰之品清之處方玄參一兩生懷地黃一兩天花粉五錢生杭芍五錢鮮茅根四錢甘草二錢共煎湯兩盅分兩次溫服下效果將藥煎服兩劑病遂霍然全愈説明凡外感有熱之證皆右部之脈盛於左部之脈至陽明府實之證尤必顯然於右部見之因胃府之脈原候於右關也今此證為陽明府實其右部之脈洪滑而實宜矣而左部之脈亦現此象是以知其未病之先肝中先有鬱熱繼為外感之熱所激則勃然發動而亦現洪滑而實之脈象也受妊嘔吐天津王氏婦年二十六歲受妊後嘔吐不止病因素有肝氣病偶有拂意激動肝氣恆作嘔吐至受妊後則嘔吐連連不止證候受妊至四十日時每日必吐然猶可受飲食後則吐浸加重逮至兩月以後勺水不存及愚診視時不能食者已數日矣困頓已極不能起床診其脈雖甚虛弱仍現滑象至數未改惟左關微浮稍似有力診斷惡阻嘔吐原妊婦之常茲因左關獨浮而有力知系肝氣膽火上衝是以嘔吐特甚有謂惡阻嘔吐雖甚劇無礙者此未有閲歷之言愚自行道以來耳聞目睹因此證僨事者已有多人甚勿忽視此宜急治以鎮肝降胃之品不可因其受妊而不敢放膽用藥也處方生赭石兩半軋細黨參三錢生懷山藥一兩生懷地黃八錢生杭芍六錢大甘枸杞五錢淨萸肉四錢青黛三錢清半夏六錢藥共九味先將半夏用溫水淘三次將礬味淘淨用做飯小鍋煮取清湯一盅調以麵粉煮作茶湯和以白糖令其適口服下其吐可止再將余藥八味煎湯一大盅分三次溫服復診將藥連服兩劑嘔吐即止精神氣力稍振可以起坐其脈左關之浮已去六部皆近和平惟仍有噁心之時懶於飲食擬再治以開胃理肝滋陰清熱之劑處方生懷山藥一兩生杭芍五錢冬瓜仁四錢搗碎北沙參四錢碎竹茹三錢淨青黛二錢甘草二錢共煎湯一大盅分兩次溫服下效果將藥連服三劑病遂全愈體漸復原能起床矣懷妊得溫病兼痰喘天津董姓婦年三十四歲懷妊感受溫病兼有痰作喘病因受妊已逾八月心中常常發熱時當季春喜在院中乘涼為風襲遂成此證證候喘息有聲呼吸迫促異常晝夜不能少臥心中煩躁舌苔白厚欲黃左右寸脈皆洪實異常兩尺則按之不實其數八至大便乾燥小便赤澀診斷此證前因醫者欲治其喘屢次用麻黃髮之致其元氣將脫又兼外感之熱已入陽明其實熱與外感之氣相併上衝是以其脈上盛下虛喘逆若斯迫促脈七至即為絶脈今竟八至恐難挽回欲辭不治而病家再三懇求遂勉為擬方以清其熱止其喘挽救其氣化之將脫處方淨萸肉一兩生懷地黃一兩生龍骨一兩搗碎生牡蠣一兩搗碎將四味煎湯送服生石膏細末三錢遲五點鐘若熱猶不退煎渣再服仍送服生石膏細末三錢復診服藥頭煎次煎後喘愈強半遂能臥眠逮至黎明胎忽滑下且系死胎再診其脈較前更數一息九至然不若從前之滑實而尺脈則按之即無其喘似又稍劇其心中煩躁依舊且覺怔忡不能支持此乃肝腎陰分大虧不能維繫陽分而氣化欲渙散也當峻補肝腎之陰兼清外感未盡之餘熱處方生懷山藥六兩玄參兩半熟雞子黃六個捻碎真西洋參二錢搗為粗末先將山藥煎十餘沸再入玄參雞子黃煎湯一大碗分多次徐徐溫飲下每飲一次送服洋參末少許飲完再煎渣取湯接續飲之洋參末亦分多次送服勿令餘剩三診翌日又為診視其脈已減去三至為六至尺脈按之有根知其病已回生問其心中已不怔忡惟其心中猶覺發熱此非外感之熱乃真陰未復之熱也當純用大滋真陰之品以復其陰處方玄參三兩生懷山藥兩半當歸四錢真西洋參二錢搗為粗末將前三味共煎湯一大碗分多次溫飲下每飲一次送服洋參末少許四診前方服一劑心中已不覺熱惟腹中作疼問其惡露所下甚少當系瘀血作疼治以化瘀血之品其疼當自愈處方生懷山藥一兩當歸五錢懷牛膝五錢生雞內金二錢黃色的搗桃仁二錢紅花錢半真西洋參二錢搗為粗末將前六味共煎湯一大盅送服洋參末一半至煎渣服時再送服餘一半效果前方日服一劑服兩日病遂全愈或問他方用石膏皆與諸藥同煎此證何以獨將石膏為末送服答曰石膏原為石質重墜之品此證之喘息迫促呼吸惟在喉間分毫不能下達幾有將脫之勢石膏為末服之欲借其重墜之力以引氣下達也且石膏末服其退熱之力一錢可抵半兩此乃屢經自服以試驗之而確能知其如斯此證一日服石膏末至六錢大熱始退若用生石膏三兩同諸藥煎湯病家將不敢服此為救人計不得不委曲以行其術也或問産後忌用寒涼第三方用於流産之後方中玄參重用三兩獨不慮其過於苦寒乎答曰玄參細嚼之其味甘而微苦原甘涼滋陰之品實非苦寒之藥是以神農本草經謂其微寒善治産乳余疾故産後忌用涼藥而玄參則毫無所忌也且後世本草謂大便滑瀉者忌之因誤認其為苦寒也而此證服過三兩玄參之後大便仍然乾燥則玄參之性可知矣或問此證之胎已逾八月即系流産其胎應活何以産下竟為死胎答曰胎在腹中原有臍呼吸實借母之呼吸以為呼吸是以凡受妊者其吸入之氣可由任脈以達於胎兒臍中此證因吸入之氣分毫不能下達則胎失所蔭所以不能資生也為其不能資生所以下降此非因服藥而下降也懷妊受溫病兼下痢天津張氏婦年近三旬懷妊受溫病兼下痢病因受妊已六個月心中恆覺發熱繼因其夫驟爾賦間遂致激動肝火其熱益甚又薄為外感所束遂致溫而兼痢證候表裡俱壯熱無汗心中熱極思飲冰水其家人不敢豫舌苔干而黃頻飲水不濡潤腹中常覺疼墜下痢赤多白少間雜以鮮血一晝夜十餘次其脈左部弦長右部洪滑皆重診有力一息五至診斷其脈左部弦長有力者肝膽之火熾盛也惟其肝膽之火熾盛下迫是以不但下痢赤白且又兼下鮮血腹疼下墜為其右部洪滑有力知溫熱已入陽明之府是以舌苔干黃心為熱迫思飲冰水所猶喜者脈象雖熱不至甚數且又流利無滯胎氣可保無恙也宜治以白虎加人參湯以解溫病之熱而更重用芍藥以代方中知母則肝熱能清而痢亦可愈矣處方生石膏三兩搗細大潞參五錢生杭芍一兩粳米五錢甘草三錢共煎湯三盅分三次溫飲下復診將藥分三次服完表裡之熱已退強半痢愈十之七八腹中疼墜亦大輕減舌苔由黃變白已有津液脈象仍然有力而較前則和緩矣遂即原方為之加減俾再服之處方生石膏二兩搗細大潞參三錢生懷山藥八錢生杭芍六錢白頭翁四錢秦皮三錢甘草二錢共煎湯三盅分三次溫飲下方解按此方即白虎加人參湯與白頭翁湯相併為一方也為方中有芍藥山藥是以白虎加人參湯中可省去知母粳米為白虎加人參湯中之石膏可抵黃連黃柏是以白頭翁湯中止用白頭翁秦皮合用之則一半治溫一半治痢安排周匝步伍整齊當可奏效效果將藥如法服兩劑病遂全愈或問傷寒論用白虎湯之方定例汗吐下後加人參渴者加人參此案之證非當汗吐下後亦未言渴何以案中兩次用白虎皆加人參乎答曰此案證兼下痢下痢亦下之類也其舌苔干黃毫無津液舌乾無液亦渴之類也且其溫病之熱不但入胃更隨下痢陷至下焦永無出路惟人參與石膏並用實能升舉其下陷之溫熱而清解消散之不至久留下焦以耗真陰況此證溫病與下痢相助為虐實有纍於胎氣幾至於莫能支加人參於白虎湯中亦所以保其胎氣使無意外之虞也産後下血天津李氏婦年近四旬得産後下血證病因身形素弱臨盆時又勞碌過甚遂得斯證證候産後未見惡露純下鮮血屢次延醫服藥血終不止及愚診視已二十八日矣其精神衰憊身體羸弱周身時或發灼自覺心中怔忡莫支其下血劇時腰際疼甚呼吸常覺短氣其脈左部弦細右部沉虛一分鐘八十二至診斷即此脈證細參當系血下陷氣亦下陷從前所服之藥但知治血不知治氣是以屢次服藥無效此當培補其氣血而以收斂固澀之藥佐之處方生箭耆一兩當歸身一兩生懷地黃一兩淨萸肉八錢生龍骨八錢搗碎桑葉十四片廣三七三錢細末藥共七味將前六味煎湯一大盅送服三七末一半至煎渣再服時仍送服其餘一半方解此乃傅青主治老婦血崩之方愚又為之加生地黃萸肉龍骨也其方不但善治老婦血崩即用以治少年者亦效初但用其原方後因治一壯年婦人患血崩甚劇投以原方不效且服藥後心中覺熱遂即原方為加生地黃一兩則效從此愚再用其方時必加生地黃一兩以濟黃耆之熱皆可隨手奏效今此方中又加萸肉龍骨者因其下血既久下焦之氣化不能固攝加萸肉龍骨所以固攝下焦之氣化也復診服藥兩劑下血與短氣皆愈強半諸病亦皆見愈脈象亦有起色而起坐片時自覺筋骨痠軟此仍宜治以培補氣血固攝下焦氣化兼壯筋骨之劑處方生箭耆一兩龍眼肉八錢生懷地黃八錢淨萸肉八錢胡桃肉五錢北沙參五錢升麻一錢鹿角膠三錢藥共八味將前七味煎湯一大盅鹿角膠另燉化兌服方中加升麻者欲以助黃耆升補氣分使之上達兼以升提血分使不下陷也三診將藥連服三劑呼吸已不短氣而血分則猶見少許然非鮮血而為從前未下之惡露此吉兆也若此惡露不下後必為恙且又必須下淨方妥此當兼用化瘀之藥以催之速下處方生箭耆一兩龍眼肉八錢生懷地黃八錢生懷山藥六錢胡桃肉五錢當歸四錢北沙參三錢鹿角膠四錢廣三七三錢細末藥共九味先將前七味煎湯一大盅鹿角膠另燉化兌湯藥中送服三七末一半至煎渣再服時仍將所餘之鹿角膠燉化兌湯藥中送服所餘之三七末方解按此方欲用以化瘀血而不用桃仁紅花諸藥者恐有妨於從前之下血也且此方中原有善化瘀血之品鹿角膠三七是也蓋鹿角之性原善化瘀生新熬之成膠其性仍在前此之惡露自下實多賴鹿角膠之力今又助之以三七亦化瘀血不傷新血之品連服數劑自不難將惡露盡化也效果將藥連服五劑惡露下盡病遂全愈産後手足抽掣天津於氏婦年過三旬於産後得四肢抽掣病病因産時所下惡露甚少至兩日又分毫惡露不見遲半日遂發抽掣證候心中發熱有時覺氣血上湧即昏然身驅後挺四肢抽掣其腹中有時作疼令人揉之則少瘥其脈左部沉弦右部沉澀一息四至強診斷此乃肝氣膽火挾敗血上衝以瘀塞經絡而其氣火相併上衝不已兼能妨礙神經是以昏然後挺而四肢作抽掣也當降其敗血使之還為惡露瀉出其病自愈處方懷牛膝一兩生杭芍六錢丹參五錢玄參五錢蘇木三錢桃仁三錢去皮紅花二錢土鱉蟲五大個搗紅娘蟲即樗雞六大個搗共煎湯一盅溫服效果此藥煎服兩劑敗血盡下病若失産後癥瘕邑城西韓氏婦年三十六歲得産後癥瘕證病因生産時惡露所下甚少未嘗介意遲至半年遂成癥瘕證候初因惡露下少彌月之後漸覺少腹脹滿因系農家時當麥秋忙甚未暇延醫服藥又遲月餘則脹而且疼始服便方數次皆無效後則疼處按之覺硬始延醫服藥診治月餘其疼似減輕而硬處轉見增大月信自産後未見診其脈左部沉弦右部沉澀一息近五至診斷按生理正規産後兩月月信當見有孩吃乳至四月亦當見矣今則已半載月信未見因其産後未下之惡露結癥瘕於衝任之間後生之血遂不能下為月信而盡附益於其上俾其日有增長是以積久而其硬處益大也是當以消癥瘕之藥消之又當與補益之藥並用使之消癥瘕而不至有傷氣化處方生箭耆五錢天花粉五錢生懷山藥五錢三稜三錢莪朮三錢當歸三錢白朮二錢知母二錢生雞內金二錢黃色的搗桃仁二錢去皮共煎湯一大盅溫服復診將藥連服六劑腹已不疼其硬處未消按之覺軟且從前食量減少至斯已復其舊其脈亦較前舒暢遂即原方為之加減俾再服之處方生箭耆五錢天花粉五錢生懷山藥四錢三稜三錢莪朮三錢懷牛膝三錢野黨參三錢知母三錢生雞內金二錢黃色的搗生水蛭二錢搗碎共煎湯一大盅溫服效果將藥連服十五六劑隨時略有加減忽下紫黑血塊若干病遂全愈説明婦女癥瘕治愈者甚少非其病之果難治也金匱下瘀血湯原可為治婦女癥瘕之主方特其藥性猛烈原非長服之方於癥瘕初結未堅硬者服此藥兩三次或可將病消除若至纍月纍年癥瘕結如鐵石必須久服方能奏效者下瘀血湯原不能用乃醫者亦知下瘀血湯不可治堅結之癥瘕遂改用桃仁紅花丹參赤芍諸平和之品見其癥瘕處作疼或更加香附延胡青皮木香諸理氣之品如此等藥用之以治堅結之癥瘕可決其雖服至百劑亦不能奏效然仗之奏效則不足傷人氣化則有餘若視為平和而連次服之十餘劑外人身之氣化即暗耗矣此所以治癥瘕者十中難愈二三也若拙擬之方其三稜莪朮水蛭皆為消癥瘕專藥即雞內金人皆用以消食而以消癥瘕亦甚有力更佐以參耆術諸補益之品則消癥瘕諸藥不慮其因猛烈而傷人且又用花粉知母以調劑補藥之熱牛膝引藥下行以直達病所是以其方可久服無弊而堅結之癥瘕即可徐徐消除也至於水蛭必生用者理沖丸後論之最詳且其性並不猛烈過甚治此證者宜放膽用之以挽救人命血閉成癥瘕鄰莊劉氏婦年二十五歲經血不行結成癥瘕病因處境不順心多抑鬱以致月信漸閉結成癥瘕證候癥瘕初結時大如核桃屢治不消漸至經閉後則癥瘕浸長三年之後大如覆盂按之甚硬漸至飲食減少寒熱往來咳嗽吐痰身體羸弱亦以為無可醫治待時而已後忽聞愚善治此證求為診視其脈左右皆弦細無力一息近六至診斷此乃由經閉而積成癥瘕由癥瘕而浸成虛勞之證也此宜先注意治其虛勞而以消癥瘕之品輔之處方生懷山藥一兩大甘枸杞一兩生懷地黃五錢玄參四錢沙參四錢生箭耆三錢天冬三錢三稜錢半莪朮錢半生雞內金錢半黃色的搗共煎湯一大盅溫服方解方中用三稜莪朮非但以之消癥瘕也誠以此證廉於飲食方中雞內金固能消食而三稜莪朮與黃耆並用更有開胃健脾之功脾胃健壯不但善消飲食兼能運化藥力使病速愈也復診將藥連服六劑寒熱已愈飲食加多咳嗽吐痰亦大輕減癥瘕雖未見消然從前時或作疼今則不復疼矣其脈亦較前頗有起色擬再治以半補虛勞半消癥瘕之方處方生懷山藥一兩大甘枸杞一兩生懷地黃八錢生箭耆四錢沙參四錢生杭芍四錢天冬四錢三稜二錢莪朮二錢桃仁二錢去皮生雞內金錢半黃色的搗共煎一大盅溫服三診將藥連服六劑咳嗽吐痰皆愈身形已漸強壯脈象又較前有力至數復常至此虛勞已愈無庸再治其癥瘕雖未見消而較前頗軟擬再專用藥消之處方生箭耆六錢天花粉五錢生懷山藥五錢三稜三錢莪朮三錢懷牛膝三錢潞黨參三錢知母三錢桃仁二錢去皮生雞內金二錢黃色的搗生水蛭二錢搗碎共煎湯一大盅溫服效果將藥連服十二劑其瘀血忽然降下若干紫黑成塊雜以脂膜癥瘕全消為其病積太久恐未除根俾日用山楂片兩許煮湯沖紅蔗糖當茶飲之以善其後産後溫病天津李氏婦年二十七歲於中秋節後得溫病病因産後六日更衣入廁受風證候自廁返後覺周身發冷更數小時冷已又復發熱自用生薑紅糖煎湯乘熱飲之周身得汗稍愈至汗解而其熱如故遷延兩日熱益盛心中煩躁作渴急延愚為診視見其滿面火色且微喘診其脈象洪實右部尤甚一分鐘九十三至舌苔滿布白而微黃大便自病後未行診斷此乃産後陰虛生內熱略為外感拘束而即成溫病也其心中煩躁而渴者因産後腎陰虛損不能上達舌本且不能與心火相濟也其微喘者因腎虛不能納氣也其舌苔白而微黃者熱已入陽明之府也其脈洪實兼數者此陽明府熱已實又有陰虛之象也宜治以白虎加人參湯更少為變通之方於産後無礙處方生石膏三兩搗細野臺參四錢玄參一兩生懷山藥八錢甘草三錢共煎湯三盅分三次溫飲下方解按此方即白虎加人參湯以玄參代知母生山藥代粳米也傷寒書中用白虎湯之定例汗吐下後加人參以其虛也渴者加人參以其津液不上潮也至産後則虛之尤虛且又作渴其宜加人參明矣至以玄參代知母者因玄參神農本草經原謂其治産乳余疾也以生山藥代粳米者因山藥之甘溫既能代粳米和胃而其所含多量之蛋白質更能補益産後者之腎虛也如此變通其方雖在産後用之可毫無妨礙況石膏神農本草經原謂其微寒且明載其主産乳乎復診服藥一劑熱退強半渴喘皆愈脈象已近和平大便猶未通下宜大滋真陰以退其餘熱而復少加補氣之藥佐之誠以氣旺則血易生即真陰易復也處方玄參二錢野黨參五錢共煎湯兩盅分兩次溫飲下效果將藥煎服兩劑大便通下病遂全愈流産後滿悶天津張姓婦年二十六歲流産之後胃脘滿悶不能進食病因孕已四月自覺胃口滿悶倩人以手為之下推因用力下推至臍遂至流産證候流産之後忽覺氣血上湧充塞胃口三日之間分毫不能進食動則作喘頭目眩暈心中怔忡脈象微弱兩尺無根診斷此證因流産後下焦暴虛腎氣不能固攝沖氣遂因之上衝夫衝脈原上隸陽明胃府其氣上衝胃氣即不能下降胃氣以息息下行為順是以胃中脹滿不能進食治此等證者若用開破之藥開之脹滿去而其人或至於虛脫宜投以峻補之劑更用重鎮之藥輔之以引之下行則上之郁開而下焦之虛亦即受此補劑之培養矣處方大潞參四錢生赭石一兩軋細生懷山藥一兩熟懷地黃一兩玄參八錢淨萸肉八錢紫蘇子三錢炒搗生麥芽三錢共煎湯一大盅分兩次溫服下方解按方中用生麥芽非取其化食消脹也誠以人之肝氣宜升胃氣宜降凡用重劑降胃必須少用升肝之藥佐之以防其肝氣不舒麥芽生用原善舒肝況其性能補益胃中酸汁兼為化食消脹之妙品乎效果將藥煎服一劑胃中豁然頓開能進飲食又連服兩劑喘與怔忡皆愈月閉兼溫疹靨急天津楊氏女年十五歲先患月閉繼又染溫疹靨急病因自十四歲月信已通後因肝氣不舒致月信半載不至繼又感發溫疹初見點即靨證候初因月信久閉已發熱瘦弱懶於飲食恆倦臥終日不起繼受溫疹寒熱往來其寒時覺體熱減輕至熱時較從前之熱增加數倍又加以疹初見點即靨其毒熱內攻心中煩躁怔忡劇時精神昏憒恆作譫語舌苔白而中心已黃毫無津液大便數日未行其脈覺寒時似近閉塞覺熱時又似洪大而重按不實一息五至強診斷此證因陰分虧損將成癆瘵又兼外感內侵病連少陽是以寒熱往來又加以疹毒之熱不能外透而內攻是以煩躁怔忡神昏譫語此乃內傷外感兩劇之證也宜用大劑滋其真陰清其毒熱更佐以托疹透表之品當能奏效處方生石膏二兩搗細野臺參三錢玄參一兩生懷山藥一兩大甘枸杞六錢知母四錢連翹三錢蟬蛻二錢茵陳二錢殭蠶錢半鮮蘆根四錢共煎湯三盅分三次溫飲下囑其服一劑熱不退時可即原方再服若服至大便通下且微溏時即宜停藥勿服復診將藥煎服兩劑大熱始退不復寒熱往來疹未表出而心已不煩躁怔忡知其毒由內消當不變生他故大便通下一次亦未見溏再診其脈已近和平惟至數仍數和其外感已愈十之八九而真陰猶未復也擬再滋補其真陰培養其血脈俾其真陰充足血脈調和月信自然通順而不愆期矣處方生懷山藥一兩大甘枸杞一兩玄參五錢地骨皮五錢龍眼肉五錢北沙參五錢生杭芍三錢生雞內金錢半黃色的搗甘草二錢共煎湯一大盅溫服三診將藥連服四劑飲食增加精神較前振作自覺諸病皆無惟腹中間有疼時此月信欲通而未能即通也再診其脈已和平四至矣知方中涼藥宜減再少加活血化瘀之品處方生懷山藥一兩大甘枸杞一兩龍眼肉六錢當歸五錢玄參三錢地骨皮三錢生杭芍三錢生雞內金錢半黃色的搗土鱉蟲五個大者搗甘草錢半生薑三片共煎湯一大盅溫服效果此藥連服十劑腹已不疼身形已漸胖壯惟月信仍未至俾停藥靜候旬日後月信遂見因將原方略為加減再服數劑以善其後或問方書治溫疹之方未見有用參者開首之方原以治溫疹為急務即有內傷亦當從緩治之而方中用野臺參者其義何居答曰傷寒論用白虎湯之例汗吐下後加人參以其虛也渴者加人參以其氣虛不能助津液上潮也令此證當久病內虧之餘不但其血分虛損其氣分亦必虛損若但知用白虎湯以清其熱不知加參以助之而熱轉不清且更有病轉加劇之時觀白虎加人參以山藥代粳米湯後附載醫案可知此證之用人參實欲其熱之速退也且此證疹靨之急亦氣分不足之故用參助石膏以清外感之熱即借其力以托疹毒外出更可借之以補從前之虛勞是此方中之用參誠為內傷外感兼顧之要藥也或問凡病見寒熱往來者多系病兼少陽是以治之者恆用柴胡以和解之今方中未用柴胡而寒熱往來亦愈何也答曰柴胡雖能和解少陽而其升提之力甚大此證根本已虛實不任柴胡之升提方中茵陳其性涼而能散最能宣通少陽之鬱熱可為柴胡之代用品實為少陽病兼虛者無尚之妙藥也況又有蘆根亦少陽藥更可與之相助為理乎此所以不用柴胡亦能愈其寒熱往來也處女經閉天津陳氏女年十七歲經通忽又半載不至病因項側生有瘰癧服藥療治過於鹹寒致傷脾胃飲食減少遂至經閉證候午前微覺寒涼日加申時又復潮熱然不甚劇黎明時或微出汗咳嗽有痰夜間略甚然仍無妨於安眠飲食消化不良較尋常減半心中恆覺發熱思食涼物大便乾燥三四日一行其脈左部弦而微硬右部脈亦近弦而重診無力一息搏逾五至診斷此因飲食減少生血不足以至經閉也其午前覺涼者其氣分亦有不足不能乘陽氣上升之時而宣布也至其晚間之覺熱則顯為血虛之象至於心中發熱是因陰虛生內熱也其熱上升傷肺易生咳嗽胃中消化不良易生痰涎此咳嗽又多痰也其大便燥結者因脾胃傷損失傳送之力而血虛陰虧又不能潤其腸也左脈弦而兼硬者心血虛損不能潤肝滋腎也右脈弦而無力者肺之津液胃之酸汁皆虧又兼肺胃之氣分皆不足也擬治以資生通脈湯復即原方略為加減俾與證相宜處方白朮三錢炒生懷山藥八錢大甘枸杞六錢龍眼肉五錢生懷地黃五錢玄參四錢生杭芍四錢生赭石四錢軋細當歸四錢桃仁二錢紅花錢半甘草二錢共煎湯一大盅溫服復診將藥連服二十餘劑隨時略有加減飲食增多身形健壯諸病皆愈惟月信猶未通宜再注意通其月信處方生水蛭一兩軋為細末生懷山藥半斤軋為細末每用山藥末七錢涼水調和煮作茶湯加紅蔗糖融化令其適口以之送服水蛭末六分一日再服當點心用之久則月信必通效果按方服過旬日月信果通下從此經血調和無病方解按水蛭神農本草經原無炙用之文而後世本草謂若不炙即用之得水即活殊為荒唐之言嘗試用此藥先用炙者無效後改用生者見效甚速其性並不猛烈惟稍有刺激性屢服恐於胃不宜用山藥煮粥送服此即金匱硝石礬石散送以大麥粥之義也且山藥饒有補益之力又為尋常服食之品以其粥送水蛭既可防其開破傷正且又善於調和胃腑也血崩證天津徐姓婦年十八歲得血崩證病因家庭不和激動肝火因致下血不止證候初時下血甚多屢經醫治月餘血雖見少而終不能止脈象濡弱而搏近五至呼吸短氣自覺當呼氣外出之時稍須努力不能順呼吸之自然過午潮熱然不甚劇診斷此胸中大氣下陷其陰分兼虧損也為其大氣下陷所以呼氣努力下血不止為其陰分虧損所以過午潮熱宜補其大氣滋其真陰而兼用升舉固澀之品方能治愈處方生箭耆一兩白朮五錢炒大生地一兩龍骨一兩煅搗牡蠣一兩煅搗天花粉六錢苦參四錢黃柏四錢柴胡三錢海螵蛸三錢去甲茜草二錢西藥麥角中者一個攙乳糖五分共研細將中藥煎湯兩大盅分兩次服麥角末亦分兩次送服效果煎服一劑其血頓止分毫皆無短氣與潮熱皆愈再為開調補氣血之劑俾服數劑以善其後
